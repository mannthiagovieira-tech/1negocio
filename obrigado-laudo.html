<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>1Negócio · Pagamento Confirmado</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef5f0;--bg1:#ffffff;--em:#1a7a4a;--em-d:rgba(26,122,74,.08);--em-l:rgba(26,122,74,.25);--ink:#0d2b1e;--ink3:#4a7c5c;--ink4:#8aaa96;--line:rgba(13,43,30,.12)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--bg1);border:1px solid var(--line);border-radius:20px;padding:40px 32px;max-width:420px;width:100%;text-align:center}
.icon{width:64px;height:64px;background:var(--em-d);border:2px solid var(--em-l);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 24px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.02em;color:var(--ink);margin-bottom:32px}
.logo em{color:var(--em);font-style:normal}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--ink);letter-spacing:-.02em;margin-bottom:12px;line-height:1.2}
.sub{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:32px}
.sub strong{color:var(--ink)}
.divider{height:1px;background:var(--line);margin-bottom:24px}
.aviso{font-size:11px;color:var(--ink4);line-height:1.6;margin-bottom:24px;padding:12px 16px;background:var(--bg);border-radius:10px}
.btn{display:block;width:100%;padding:16px;background:var(--em);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;border-radius:12px;text-decoration:none;margin-bottom:12px;transition:opacity .15s}
.btn:hover{opacity:.9}
.btn-sec{display:block;width:100%;padding:14px;background:transparent;color:var(--ink3);font-family:'DM Mono',monospace;font-size:12px;border:1px solid var(--line);border-radius:12px;text-decoration:none;transition:background .15s}
.btn-sec:hover{background:var(--bg)}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><em>1</em>NEGÓCIO</div>
  <div class="icon">✓</div>
  <h1>Pagamento confirmado!</h1>
  <p class="sub">Seu laudo está sendo gerado agora. Você receberá o link por <strong>WhatsApp</strong> em instantes.</p>
  <div class="divider"></div>
  <div class="aviso">Não recebeu em 5 minutos? Pode ser que o número informado esteja incorreto. Fale com a gente pelo botão abaixo.</div>
  <a href="https://wa.me/5511952136406?text=Ol%C3%A1%2C%20acabei%20de%20pagar%20o%20laudo%20R%24%2099%20mas%20n%C3%A3o%20recebi%20o%20link.%20Pode%20me%20ajudar%3F" class="btn" target="_blank">Falar com a 1Negócio →</a>
  <a href="https://1negocio.com.br" class="btn-sec">Voltar ao início</a>
</div>
</body>
</html>
