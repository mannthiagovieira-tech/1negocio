<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Negócio · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090a;--bg1:#0d1012;--bg2:#131820;
  --em:#3dff7a;--em-d:rgba(61,255,122,.07);--em-l:rgba(61,255,122,.25);
  --am:#ffb03a;--am-d:rgba(255,176,58,.07);
  --pu:#a78bfa;--pu-d:rgba(167,139,250,.07);
  --red:#ff5c5c;--red-d:rgba(255,92,92,.07);
  --ink:rgba(255,255,255,.88);--ink2:rgba(255,255,255,.46);
  --ink3:rgba(255,255,255,.22);--ink4:rgba(255,255,255,.10);
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:rgba(7,9,10,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.02em;display:flex;align-items:center;gap:4px}
.logo span{color:var(--em)}.logo b{color:var(--ink)}
.logo-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);border:1px solid var(--line2);border-radius:20px;padding:2px 8px;margin-left:8px}
.topbar-r{display:flex;align-items:center;gap:12px}
.live{width:7px;height:7px;border-radius:50%;background:var(--em);box-shadow:0 0 8px var(--em);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.upd{font-size:9px;letter-spacing:.08em;color:var(--ink3)}
.wrap{padding:68px 24px 40px;max-width:1280px;margin:0 auto}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg1);border:1px solid var(--line2);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.s-g::before{background:var(--em)}.s-a::before{background:var(--am)}.s-p::before{background:var(--pu)}.s-r::before{background:var(--red)}
.slbl{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
.sval{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-.04em;line-height:1}
.s-g .sval{color:var(--em)}.s-a .sval{color:var(--am)}.s-p .sval{color:var(--pu)}.s-r .sval{color:var(--red)}
.ssub{font-size:9px;color:var(--ink3);margin-top:3px}
/* FILTERS */
.frow{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:20px;border:1px solid var(--line2);background:transparent;color:var(--ink3);cursor:pointer;transition:all .15s}
.fbtn:hover{color:var(--ink);border-color:var(--line)}
.fbtn.on{background:var(--em-d);border-color:var(--em-l);color:var(--em)}
.fsearch{flex:1;min-width:180px;background:var(--bg1);border:1px solid var(--line2);border-radius:8px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);outline:none}
.fsearch::placeholder{color:var(--ink3)}
.fsearch:focus{border-color:var(--em-l)}
/* TABLE */
.twrap{background:var(--bg1);border:1px solid var(--line2);border-radius:12px;overflow:hidden}
.thead{display:grid;grid-template-columns:96px 1fr 1fr 100px 72px 110px 84px;padding:9px 18px;border-bottom:1px solid var(--line2);background:var(--bg2)}
.th{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3)}
.tbody{max-height:60vh;overflow-y:auto}
.tbody::-webkit-scrollbar{width:3px}
.tbody::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.trow{display:grid;grid-template-columns:96px 1fr 1fr 100px 72px 110px 84px;padding:11px 18px;border-bottom:1px solid var(--line);transition:background .1s;cursor:pointer;align-items:center}
.trow:last-child{border-bottom:none}
.trow:hover{background:var(--bg2)}
.td{font-size:11px}
.td.slug{color:var(--em);font-size:10px;letter-spacing:.06em;font-weight:500}
.td.nome{color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.td.neg{color:var(--ink2);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.td.dt{color:var(--ink3);font-size:9px}
/* BADGES */
.badge{font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:20px;display:inline-block}
.bc{background:var(--em-d);color:var(--em);border:1px solid var(--em-l)}
.ba{background:var(--am-d);color:var(--am);border:1px solid rgba(255,176,58,.25)}
.bp{background:var(--pu-d);color:var(--pu);border:1px solid rgba(167,139,250,.25)}
.br{background:var(--red-d);color:var(--red);border:1px solid rgba(255,92,92,.2)}
.tpill{font-size:8px;color:var(--ink3);background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:2px 6px;display:inline-block}
.ctok{color:var(--em);font-size:10px}.ctno{color:var(--ink4);font-size:10px}
/* EMPTY/LOAD */
.center{text-align:center;padding:60px;color:var(--ink3);font-size:11px}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line2);border-top-color:var(--em);border-radius:50%;animation:rot .7s linear infinite;margin-bottom:10px}
@keyframes rot{to{transform:rotate(360deg)}}
/* MODAL */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mover.open{display:flex}
.mbox{background:var(--bg1);border:1px solid var(--line2);border-radius:16px;width:100%;max-width:500px}
.mtop{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.mtitle{font-family:'Syne',sans-serif;font-weight:700;font-size:14px}
.mclose{background:none;border:1px solid var(--line2);border-radius:50%;width:28px;height:28px;color:var(--ink3);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.mclose:hover{color:var(--ink)}
.mbody{padding:18px 20px}
.drow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);align-items:center}
.drow:last-child{border-bottom:none}
.dlbl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
.dval{font-size:11px;color:var(--ink);text-align:right}
.mact{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px}
.abtn{flex:1;padding:10px;border-radius:8px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s}
.abtn-g{background:var(--em-d);color:var(--em);border:1px solid var(--em-l)}
.abtn-g:hover{background:rgba(61,255,122,.14)}
.abtn-w{background:rgba(37,211,102,.08);color:#25D366;border:1px solid rgba(37,211,102,.2)}
.abtn-w:hover{background:rgba(37,211,102,.16)}
.abtn:disabled{opacity:.3;cursor:not-allowed}
@media(max-width:900px){
  .stats{grid-template-columns:1fr 1fr}
  .thead,.trow{grid-template-columns:88px 1fr 90px 84px}
  .th:nth-child(3),.td:nth-child(3),
  .th:nth-child(5),.td:nth-child(5),
  .th:nth-child(6),.td:nth-child(6){display:none}
}
@media(max-width:560px){
  .wrap{padding:64px 14px 32px}
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .sval{font-size:26px}
}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center">
    <div class="logo"><span>1</span><b>Negócio</b></div>
    <div class="logo-tag">Admin</div>
  </div>
  <div class="topbar-r">
    <div class="live"></div>
    <div class="upd" id="upd">carregando...</div>
  </div>
</div>

<div class="wrap">
  <div class="stats">
    <div class="stat s-g"><div class="slbl">Total de leads</div><div class="sval" id="s1">—</div><div class="ssub">desde o início</div></div>
    <div class="stat s-g"><div class="slbl">Diagnósticos concluídos</div><div class="sval" id="s2">—</div><div class="ssub" id="s2s">taxa de conclusão</div></div>
    <div class="stat s-a"><div class="slbl">Em andamento</div><div class="sval" id="s3">—</div><div class="ssub">pausados no meio</div></div>
    <div class="stat s-p"><div class="slbl">Com contato</div><div class="sval" id="s4">—</div><div class="ssub">WhatsApp ou email</div></div>
  </div>

  <div class="frow">
    <button class="fbtn on" onclick="setF('todos',this)">Todos</button>
    <button class="fbtn" onclick="setF('concluido',this)">Concluídos</button>
    <button class="fbtn" onclick="setF('andamento',this)">Em andamento</button>
    <button class="fbtn" onclick="setF('sem',this)">Sem sessão</button>
    <button class="fbtn" onclick="setF('contato',this)">Com contato</button>
    <input class="fsearch" id="q" placeholder="Buscar nome, negócio ou código..." oninput="render()">
  </div>

  <div class="twrap">
    <div class="thead">
      <div class="th">Código</div>
      <div class="th">Nome</div>
      <div class="th">Negócio</div>
      <div class="th">Status</div>
      <div class="th">Tela</div>
      <div class="th">Criado em</div>
      <div class="th">Contato</div>
    </div>
    <div class="tbody" id="tbody"><div class="center"><div class="spin"></div><br>Carregando...</div></div>
  </div>
</div>

<div class="mover" id="modal" onclick="closeM(event)">
  <div class="mbox">
    <div class="mtop">
      <div class="mtitle" id="mtitle">Lead</div>
      <button class="mclose" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    </div>
    <div class="mbody" id="mbody"></div>
    <div class="mact" id="mact"></div>
  </div>
</div>

<script>
const SB = 'https://dbijmgqlcrgjlcfrastg.supabase.co/rest/v1';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI2NDIxMTIsImV4cCI6MjA1ODIxODExMn0.vAFKHmFdPMPLPNXQbiyFo7VWFfcSzHIqGbLLKiDEP0M';
const H = {'apikey':KEY,'Authorization':'Bearer '+KEY};

let rows=[], filtro='todos';

function dt(d){
  if(!d) return '—';
  const o=new Date(d);
  return o.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+' '+o.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function status(r){
  if(r.concluido===true) return {l:'Concluído',c:'bc'};
  if(r.concluido===false && r.tela_atual) return {l:'Em andamento',c:'ba'};
  if(r.tela_atual==='fim') return {l:'Concluído',c:'bc'};
  return {l:'Sem sessão',c:'br'};
}

async function load(){
  try{
    const [rL, rS] = await Promise.all([
      fetch(`${SB}/leads_entrada?select=*&order=criado_em.desc&limit=300`,{headers:H}),
      fetch(`${SB}/diagnostico_sessoes?select=slug,tela_atual,concluido,atualizado_em`,{headers:H})
    ]);
    const leads = await rL.json();
    const sessoes = await rS.json();
    const mapa = {};
    (Array.isArray(sessoes)?sessoes:[]).forEach(s=>{ mapa[s.slug]=s; });
    rows = (Array.isArray(leads)?leads:[]).map(l=>{
      const s = mapa[l.codigo_lead]||{};
      return {...l, tela_atual:s.tela_atual||null, concluido:s.concluido??null, atualizado_em:s.atualizado_em||null};
    });
    stats();
    render();
    document.getElementById('upd').textContent='atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('tbody').innerHTML='<div class="center">Erro ao carregar. Verifique se está hospedado no Vercel.</div>';
  }
}

function stats(){
  const total=rows.length;
  const conc=rows.filter(r=>r.concluido===true||r.tela_atual==='fim').length;
  const and=rows.filter(r=>r.concluido===false&&r.tela_atual&&r.tela_atual!=='fim').length;
  const cont=rows.filter(r=>r.whatsapp||r.email).length;
  document.getElementById('s1').textContent=total;
  document.getElementById('s2').textContent=conc;
  document.getElementById('s2s').textContent=total?Math.round(conc/total*100)+'% taxa de conclusão':'—';
  document.getElementById('s3').textContent=and;
  document.getElementById('s4').textContent=cont;
}

function filtrar(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  return rows.filter(r=>{
    const st=status(r);
    if(filtro==='concluido'&&st.c!=='bc') return false;
    if(filtro==='andamento'&&st.c!=='ba') return false;
    if(filtro==='sem'&&st.c!=='br') return false;
    if(filtro==='contato'&&!r.whatsapp&&!r.email) return false;
    if(q){
      const t=`${r.codigo_lead||''} ${r.nome||''} ${r.nome_negocio||''}`.toLowerCase();
      if(!t.includes(q)) return false;
    }
    return true;
  });
}

function render(){
  const fr=filtrar();
  const el=document.getElementById('tbody');
  if(!fr.length){el.innerHTML='<div class="center">Nenhum lead encontrado.</div>';return;}
  el.innerHTML=fr.map(r=>{
    const st=status(r);
    const ct=r.whatsapp?'<span class="ctok">WPP</span>':r.email?'<span class="ctok">Email</span>':'<span class="ctno">—</span>';
    const tl=r.tela_atual&&r.tela_atual!=='fim'?`<span class="tpill">${r.tela_atual}</span>`:'';
    const rd=JSON.stringify(r).replace(/'/g,"\\'");
    return `<div class="trow" onclick='abrirM(${rd})'>
      <div class="td slug">${r.codigo_lead||'—'}</div>
      <div class="td nome">${r.nome||'<span style="color:var(--ink3)">—</span>'}</div>
      <div class="td neg">${r.nome_negocio||'<span style="color:var(--ink4)">—</span>'}</div>
      <div class="td"><span class="badge ${st.c}">${st.l}</span></div>
      <div class="td">${tl}</div>
      <div class="td dt">${dt(r.criado_em)}</div>
      <div class="td">${ct}</div>
    </div>`;
  }).join('');
}

function setF(f,btn){
  filtro=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function abrirM(r){
  const st=status(r);
  document.getElementById('mtitle').textContent=r.nome_negocio||r.nome||r.codigo_lead;
  document.getElementById('mbody').innerHTML=`
    <div class="drow"><div class="dlbl">Código</div><div class="dval" style="color:var(--em);font-family:'DM Mono'">${r.codigo_lead}</div></div>
    <div class="drow"><div class="dlbl">Nome</div><div class="dval">${r.nome||'—'}</div></div>
    <div class="drow"><div class="dlbl">Negócio</div><div class="dval">${r.nome_negocio||'—'}</div></div>
    <div class="drow"><div class="dlbl">Status</div><div class="dval"><span class="badge ${st.c}">${st.l}</span></div></div>
    <div class="drow"><div class="dlbl">Tela atual</div><div class="dval">${r.tela_atual||'—'}</div></div>
    <div class="drow"><div class="dlbl">WhatsApp</div><div class="dval">${r.whatsapp||'—'}</div></div>
    <div class="drow"><div class="dlbl">Email</div><div class="dval">${r.email||'—'}</div></div>
    <div class="drow"><div class="dlbl">Criado em</div><div class="dval">${dt(r.criado_em)}</div></div>
    <div class="drow"><div class="dlbl">Última atividade</div><div class="dval">${dt(r.atualizado_em)}</div></div>
  `;
  const temLaudo=r.concluido===true||r.tela_atual==='fim';
  const temWpp=!!r.whatsapp;
  const wppNum=temWpp?(r.whatsapp.replace(/\D/g,'')):'';
  const wppMsg=encodeURIComponent(`Oi${r.nome?' '+r.nome.split(' ')[0]:''}! Aqui é a equipe da 1Negócio.`);
  document.getElementById('mact').innerHTML=
    (temLaudo?`<button class="abtn abtn-g" onclick="window.open('https://1negocio.com.br/laudo?lead=${r.codigo_lead}','_blank')">Ver laudo →</button>`:'')
    +`<button class="abtn abtn-w"${!temWpp?' disabled':''} onclick="window.open('https://wa.me/${wppNum}?text=${wppMsg}','_blank')">WhatsApp</button>`;
  document.getElementById('modal').classList.add('open');
}

function closeM(e){if(e.target.id==='modal')document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('open');});

load();
setInterval(load,60000);
</script>
</body>
</html>
