<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1Negócio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Mono:wght@400;500&family=Syne:wght@800;900&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#080D0A;-webkit-font-smoothing:antialiased}
body{
  font-family:'Cabinet Grotesk',sans-serif;
  background:#080D0A;color:#F0F5F1;
  max-width:680px;margin:0 auto;min-height:100vh;
}

/* ─── TOKENS ─────────────────────────────── */
:root{
  --green:#3DFF7A;
  --amber:#FFB03A;
  --bg:#080D0A;
  --surface:#0d1109;
  --border:rgba(255,255,255,.07);
  --dim:rgba(240,245,241,.45);
  --faint:rgba(240,245,241,.18);
}

/* ─── CABEÇALHO ──────────────────────────── */
.hdr{
  background:var(--bg);
  border-radius:0 0 20px 20px;
  overflow:hidden;
  position:sticky;top:0;z-index:200;
}

/* linha 1 — logo + botão */
.h1{display:flex;align-items:center;justify-content:space-between;height:40px;padding:0 13px;border-bottom:.5px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.02em;color:#F0F5F1;text-decoration:none}
.logo em{color:var(--green);font-style:normal}
.btn-av{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--bg);background:var(--green);padding:5px 13px;border:none;border-radius:20px;cursor:pointer;white-space:nowrap;text-decoration:none}

/* linha 2 — ticker */
.ticker{height:24px;overflow:hidden;border-bottom:.5px solid var(--border);position:relative}
.ticker::before,.ticker::after{content:'';position:absolute;top:0;bottom:0;width:24px;z-index:2;pointer-events:none}
.ticker::before{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.ticker::after{right:0;background:linear-gradient(-90deg,var(--bg),transparent)}
.ticker-t{display:flex;align-items:center;height:100%;white-space:nowrap;animation:tick 32s linear infinite}
.ticker-t:hover{animation-play-state:paused}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:5px;padding:0 11px;border-right:.5px solid var(--border);height:100%;flex-shrink:0}
.ti-l{font-family:'DM Mono',monospace;font-size:6.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}
.ti-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:10px;color:#F0F5F1;letter-spacing:-.02em}
.ti-v.g{color:var(--green)}.ti-v.a{color:var(--amber)}

/* linha 3 — nav */
.nav{display:flex;align-items:stretch;height:26px;border-bottom:.5px solid var(--border);overflow-x:auto}
.nav::-webkit-scrollbar{display:none}
.nl{font-family:'Cabinet Grotesk',sans-serif;font-weight:500;font-size:9px;color:var(--faint);padding:0 11px;display:flex;align-items:center;border-right:.5px solid rgba(255,255,255,.05);white-space:nowrap;flex-shrink:0;text-decoration:none}
.nl.on{color:var(--green);font-weight:700}

/* linha 4 — categorias */
.cats{display:flex;align-items:center;height:34px;padding:0 8px;gap:5px;overflow-x:auto;border-bottom:.5px solid var(--border)}
.cats::-webkit-scrollbar{display:none}
.tag-all{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.05em;padding:3px 10px;border-radius:20px;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;background:rgba(240,245,241,.88);color:var(--bg);transition:all .15s}
.tag-all.off{background:rgba(255,255,255,.08);color:var(--faint)}
.cat-tag{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.04em;padding:3px 10px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;opacity:.42;transition:all .15s}
.cat-tag.on{opacity:1}

/* linha 5 — estados */
.ests{display:flex;align-items:center;height:28px;padding:0 8px;gap:5px;overflow-x:auto}
.ests::-webkit-scrollbar{display:none}
.est-tag{font-family:'Cabinet Grotesk',sans-serif;font-weight:600;font-size:8px;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:20px;border:.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.38);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.est-tag.on{border-color:rgba(255,255,255,.45);color:rgba(255,255,255,.85);background:rgba(255,255,255,.06)}
.est-tag.sem{opacity:.18;cursor:default;pointer-events:none}

/* ponte */
.bridge{height:16px;background:var(--bg)}

/* ─── CARDS ──────────────────────────────── */
.main{padding:8px 8px 32px}

.card{
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.1);
  height:168px;
  cursor:pointer;
  display:flex;
  position:relative;
  margin-top:-48px;
  box-shadow:0 -4px 18px rgba(0,0,0,.4);
  animation:rise .38s cubic-bezier(.34,1.4,.64,1) both;
}
.card:first-child{margin-top:0;box-shadow:none}
@keyframes rise{from{transform:translateY(16px);opacity:.4}to{transform:translateY(0);opacity:1}}

/* coluna esquerda */
.cl{flex:1;min-width:0;padding:10px 8px 10px 12px;display:flex;flex-direction:column;gap:4px}
.c-code{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;opacity:.4}
.c-title{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:.02em;text-transform:uppercase;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c-ise{font-family:'Cabinet Grotesk',sans-serif;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:20px;display:inline-block;white-space:nowrap;align-self:flex-start}

/* linha de KPIs — logo abaixo do ISE */
.c-kpis{display:flex;border-top:.5px solid rgba(0,0,0,.14);padding-top:6px;margin-top:2px}
.kp{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;padding-right:6px;border-right:.5px solid rgba(0,0,0,.12)}
.kp:last-child{border-right:none;padding-right:0}
.kp+.kp{padding-left:6px}
.kp-l{font-family:'DM Mono',monospace;font-size:7px;font-weight:400;text-transform:uppercase;letter-spacing:.07em;opacity:.5}
.kp-v{font-family:'Cabinet Grotesk',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.02em;white-space:nowrap}

/* divisor vertical */
.cd{width:.5px;background:rgba(0,0,0,.18);flex-shrink:0}

/* coluna direita */
.cr{width:104px;flex-shrink:0;padding:10px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0;justify-content:center}
.cr-vl{font-family:'DM Mono',monospace;font-size:6px;text-transform:uppercase;letter-spacing:.1em;opacity:.3}
/* pontinho oportunidade ao lado do label */
.cr-vl.op{display:flex;align-items:center;justify-content:center;gap:3px}
.op-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.cr-vv{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.025em;line-height:1.1;display:flex;align-items:baseline;gap:1px;margin-top:2px}
.cr-rs{font-size:10px;font-weight:700;opacity:.55}
.cr-sep{width:100%;height:.5px;background:rgba(0,0,0,.14);margin:6px 0}
.cr-obs{display:flex;flex-direction:column;gap:2px;width:100%}
.cr-ol{font-family:'DM Mono',monospace;font-size:5.5px;text-transform:uppercase;letter-spacing:.08em;opacity:.28}
.cr-ov{font-family:'Cabinet Grotesk',sans-serif;font-weight:500;font-size:8.5px;opacity:.4}
.cr-el{font-family:'DM Mono',monospace;font-size:5.5px;text-transform:uppercase;letter-spacing:.08em;opacity:.3}
.cr-ev{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:10px;opacity:.6}
.cr-mul{width:100%;padding-top:4px;border-top:.5px solid rgba(0,0,0,.14);margin-top:6px}
.cr-ml{font-family:'DM Mono',monospace;font-size:5.5px;text-transform:uppercase;letter-spacing:.08em;opacity:.28}
.cr-mv{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:12px}

/* ─── PALETA POR CATEGORIA ───────────────── */
.p-alim  {background:#1A2E1E;color:#6EE87A;border-color:rgba(110,232,122,.18)}
.p-tech  {background:#1B2438;color:#7AB0F5;border-color:rgba(122,176,245,.18)}
.p-serv  {background:#251C38;color:#C4A5F7;border-color:rgba(196,165,247,.18)}
.p-varejo{background:#2E2010;color:#F5C26B;border-color:rgba(245,194,107,.18)}
.p-saude {background:#2E1818;color:#F58A8A;border-color:rgba(245,138,138,.18)}
.p-edu   {background:#182828;color:#7DD4C8;border-color:rgba(125,212,200,.18)}
.p-ind   {background:#281E10;color:#E8A96E;border-color:rgba(232,169,110,.18)}
.p-outros{background:#1E1E1E;color:#A0A0A0;border-color:rgba(160,160,160,.18)}

/* ─── OVERLAY — CARD EXPANDIDO ──────────── */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{
  width:100%;max-width:680px;
  height:calc(100dvh - 44px);
  border-radius:20px 20px 0 0;
  overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,0,.15,1);
  background:inherit;
}
.overlay.on .sheet{transform:translateY(0)}

/* topo do sheet — cor do card */
.sh-hdr{flex-shrink:0;padding:12px 14px 14px;position:relative;border-bottom:.5px solid rgba(0,0,0,.1)}
.sh-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,.12);margin:0 auto 9px}
.sh-close{position:absolute;top:10px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.1);border:.5px solid rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:inherit;font-family:'Cabinet Grotesk',sans-serif}
.sh-code{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;opacity:.4;margin-bottom:2px}
.sh-title{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;letter-spacing:.03em;text-transform:uppercase;line-height:1.2;margin-bottom:10px}
.sh-vals{display:flex;border-top:.5px solid rgba(0,0,0,.1);padding-top:9px}
.sv{display:flex;flex-direction:column;gap:2px;flex:1;padding-right:10px;border-right:.5px solid rgba(0,0,0,.1)}
.sv:last-child{border-right:none;padding-right:0}
.sv+.sv{padding-left:10px}
.sv-l{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:currentColor;opacity:.42}
.sv-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:14px;letter-spacing:-.02em;line-height:1;color:currentColor}

/* carrossel */
.car{flex:1;overflow:hidden;display:flex;flex-direction:column;background:inherit;min-height:0}
.car-vp{flex:1;overflow:hidden;min-height:0}
.car-track{display:flex;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.slide{min-width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 13px 10px;display:flex;flex-direction:column;gap:8px;background:inherit;font-family:'DM Mono',monospace}

/* dots + nav */
.car-dots{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 0;background:rgba(0,0,0,.15);border-top:.5px solid rgba(0,0,0,.12);flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.14);cursor:pointer;transition:all .2s}
.dot.on{width:16px;border-radius:3px;background:var(--green)}
.car-hint{font-family:'DM Mono',monospace;font-size:8px;color:var(--faint);margin-left:8px}
.car-nav{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 6px;background:rgba(0,0,0,.15);border-top:.5px solid rgba(0,0,0,.12);flex-shrink:0}
.car-btn{background:rgba(0,0,0,.08);border:.5px solid rgba(0,0,0,.12);font-family:'DM Mono',monospace;font-size:10px;color:currentColor;opacity:.55;padding:4px 12px;cursor:pointer;border-radius:20px}
.car-btn:disabled{opacity:.2;pointer-events:none}
.car-n{font-family:'DM Mono',monospace;font-size:10px;color:currentColor;opacity:.45}

/* rodapé fixo */
.car-foot{display:flex;gap:8px;padding:10px 14px 14px;background:rgba(0,0,0,.1);border-top:.5px solid rgba(0,0,0,.12);flex-shrink:0}
.btn-sol{flex:1;background:#3DFF7A;color:#080D0A;border:2px solid #3DFF7A;font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:12px;padding:12px;cursor:pointer;border-radius:10px;text-transform:uppercase;letter-spacing:.04em}
.btn-shr{background:transparent;border:1.5px solid currentColor;opacity:.45;font-family:'DM Mono',monospace;font-size:10px;color:currentColor;padding:12px 14px;cursor:pointer;border-radius:10px;display:flex;align-items:center;gap:5px}

/* ─── SLIDES ─────────────────────────────── */
.sl{font-family:'DM Mono',monospace;font-size:.55rem;text-transform:uppercase;letter-spacing:.14em;color:var(--faint)}
.blk{background:rgba(0,0,0,.12);border:.5px solid rgba(0,0,0,.1);border-radius:10px;padding:10px 12px;font-family:'DM Mono',monospace}
.blk-h{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:.78rem;color:var(--green);margin-bottom:4px}
.blk-p{font-size:.67rem;color:var(--dim);line-height:1.65}
.nums{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.nc{background:rgba(0,0,0,.12);border:.5px solid rgba(0,0,0,.1);border-radius:8px;padding:8px 10px}
.nc-l{font-family:'DM Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:2px}
.nc-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:.95rem;color:#F0F5F1;letter-spacing:-.02em;line-height:1}
.nc-v.g{color:var(--green)}.nc-v.a{color:var(--amber)}
.nc-s{font-family:'DM Mono',monospace;font-size:.5rem;color:var(--faint);margin-top:2px}
.dre,.vb,.bp{background:rgba(0,0,0,.12);border:.5px solid rgba(0,0,0,.1);border-radius:10px;padding:10px 12px}
.bp{background:rgba(0,0,0,.12);border:.5px solid rgba(0,0,0,.1);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.dr,.vr,.bpr{display:flex;align-items:baseline;justify-content:space-between;padding:4px 0;border-bottom:.5px solid rgba(255,255,255,.04)}
.dr:last-child,.vr:last-child,.bpr:last-child{border-bottom:none}
.dr.tot{border-top:.5px solid rgba(255,255,255,.07);margin-top:2px;padding-top:6px}
.dr-l,.vr-l,.bpr-l{font-family:'DM Mono',monospace;font-size:.63rem;color:currentColor;opacity:.55}
.dr-l.i{padding-left:10px;font-size:.58rem;color:rgba(255,255,255,.22)}
.bps{font-family:'DM Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin-bottom:3px}
.dr-v,.vr-v,.bpr-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:.7rem;color:currentColor;opacity:.85}
.dr-v.g,.vr-v.g{color:var(--green)}.dr-v.r{color:var(--amber)}.dr-v.b{font-size:.82rem;font-weight:800;color:currentColor;opacity:1}
.vr-v.ink{color:#F0F5F1}
.bp-tot{display:flex;justify-content:space-between;padding-top:6px;border-top:.5px solid rgba(255,255,255,.07)}
.bp-tot-l{font-family:'DM Mono',monospace;font-size:.63rem;color:var(--dim)}
.bp-tot-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:.85rem;color:var(--green)}
.ise-h{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(61,255,122,.05);border:.5px solid rgba(61,255,122,.18);border-radius:10px}
.ise-n{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:2.2rem;color:var(--green);letter-spacing:-.03em;line-height:1}
.ise-t{font-family:'Cabinet Grotesk',sans-serif;font-size:.68rem;color:rgba(61,255,122,.85);font-weight:600}
.ise-s{font-family:'DM Mono',monospace;font-size:.55rem;color:rgba(61,255,122,.42);margin-top:2px}
.pilar{margin-bottom:6px}
.pi-h{display:flex;justify-content:space-between;margin-bottom:2px;font-family:'DM Mono',monospace;font-size:.58rem}
.pi-n{color:var(--faint)}.pi-s{font-weight:500}
.pi-bg{height:2px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.pi-f{height:100%;border-radius:2px}
.bench{margin-bottom:8px}
.be-h{display:flex;justify-content:space-between;margin-bottom:3px;font-family:'DM Mono',monospace;font-size:.58rem}
.be-l{color:var(--faint)}.be-v{font-weight:500;color:var(--green)}.be-r{color:rgba(255,255,255,.22)}
.be-bar{height:4px;background:rgba(255,255,255,.05);border-radius:3px;position:relative}
.be-ref{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.1);border-radius:3px}
.be-val{position:absolute;left:0;top:0;height:100%;background:var(--green);border-radius:3px}
.be-val.lo{background:var(--amber)}
.up-c{background:rgba(61,255,122,.04);border:.5px solid rgba(61,255,122,.13);border-radius:10px;overflow:hidden;margin-bottom:5px}
.up-h{padding:8px 12px 6px}
.up-t{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:.72rem;color:var(--green);margin-bottom:2px}
.up-d{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--faint);line-height:1.5}
.up-ks{display:grid;grid-template-columns:1fr 1fr;border-top:.5px solid rgba(61,255,122,.1)}
.uk{padding:6px 12px;border-right:.5px solid rgba(61,255,122,.1)}
.uk:last-child{border-right:none}
.uk-l{font-family:'DM Mono',monospace;font-size:.5rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(61,255,122,.4);margin-bottom:1px}
.uk-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:.72rem;color:var(--green)}
.mais{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.mais-i{width:26px;height:26px;border-radius:50%;background:rgba(61,255,122,.1);display:flex;align-items:center;justify-content:center;font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:11px;color:var(--green);flex-shrink:0}
.mais-t{font-family:'Cabinet Grotesk',sans-serif;flex:1;font-size:.63rem;color:var(--dim);font-weight:500}
.mais-s{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--faint);margin-top:1px}
.vb-tag{font-family:'Cabinet Grotesk',sans-serif;font-size:.5rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.desc-b{background:rgba(61,255,122,.06);border:.5px solid rgba(61,255,122,.18);border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.db-l{font-family:'DM Mono',monospace;font-size:.6rem;color:rgba(61,255,122,.65)}
.db-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:.82rem;color:var(--green)}
.nota{font-family:'DM Mono',monospace;font-size:.52rem;color:rgba(255,255,255,.18);line-height:1.7;padding-top:5px}

/* modal estado */
.modal{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.72);align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.modal-sh{width:100%;max-width:680px;background:var(--surface);border-radius:22px 22px 0 0;padding:18px 16px 36px;border:.5px solid var(--border)}
.modal-h{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.1);margin:0 auto 14px}
.modal-sh h3{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:14px;color:#F0F5F1;margin-bottom:12px}
.modal-opts{display:flex;flex-wrap:wrap;gap:7px}

<script>
const SUPA='https://dbijmgqlcrgjlcfrastg.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';
const NS=8;
let all=[],fil=[],catF=null,estF=null,cur=0;

/* paleta */
const CMAP={'saude':'saude','saúde':'saude','saude_estetica':'saude','saúde & estética':'saude','beleza_saude':'saude','beleza':'saude','tecnologia':'tech','tech':'tech','tecnologia / saas':'tech','saas':'tech','alimentacao':'alim','alimentação':'alim','educacao':'edu','educação':'edu','varejo':'varejo','moda':'varejo','varejo & moda':'varejo','industria':'ind','indústria':'ind','comércio / distribuição':'ind','comercio':'ind','industria leve':'ind','servicos':'serv','serviços':'serv','hospedagem':'serv','pet':'serv'};

const gf=cat=>CMAP[(cat||'').toLowerCase().trim()]||'outros';

/* helpers */
const brl=v=>{if(v==null)return'—';v=parseFloat(v);if(v>=1e9)return'R$\u00a0'+(v/1e9).toFixed(1)+'B';if(v>=1e6)return'R$\u00a0'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return'R$\u00a0'+Math.round(v/1e3)+'k';return'R$\u00a0'+Math.round(v).toLocaleString('pt-BR')};
const brlS=v=>{if(v==null)return'—';v=parseFloat(v);if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return Math.round(v/1e3)+'k';return Math.round(v).toLocaleString('pt-BR')};
const pct=v=>v!=null?parseFloat(v).toFixed(0)+'%':'—';
const n=v=>v?parseFloat(v):0;
const calcIO=nd=>{
  const d=n(nd.valor_1n)&&n(nd.preco_pedido)?Math.max(0,(n(nd.valor_1n)-n(nd.preco_pedido))/n(nd.valor_1n)):0;
  const tags=Array.isArray(nd.tags_calculadas)?nd.tags_calculadas:[];
  return Math.round((d>=.15?35:d>=.05?22:d>0?12:0)+(n(nd.score_saude)||0)/100*25+(tags.length>=3?20:tags.length>=2?14:8)+(nd.abertura_negociacao==='negociavel'?15:8));
};
const iseL=s=>s>=75?{t:'1N SÓLIDO',bg:'rgba(5,150,105,.12)',c:'#065f46'}:s>=50?{t:'1N EM DESENVOLVIMENTO',bg:'rgba(180,83,9,.12)',c:'#92400e'}:{t:'1N FRAGILIZADO',bg:'rgba(185,28,28,.12)',c:'#991b1b'};
const calcPL=nd=>{
  const a=nd.ativos_json&&typeof nd.ativos_json==='object'?Object.values(nd.ativos_json).reduce((s,v)=>s+n(v),0):0;
  const p=nd.passivos_json&&typeof nd.passivos_json==='object'?Object.values(nd.passivos_json).reduce((s,v)=>s+n(v),0):0;
  return a-p;
};
const ader=nd=>{const b={'Saúde & Estética':21,'Tecnologia / SaaS':28,'Alimentação':18,'Educação':22,'Comércio / Distribuição':12};const m=n(nd.margem_ebitda);return m?Math.round(m-(b[nd.categoria]||18)):null};

/* fetch */
async function load(){
  const r=await fetch(`${SUPA}/rest/v1/negocios?status=eq.publicado&select=id,codigo,titulo_anuncio,categoria,cidade,estado,faturamento_anual,resultado_liquido_mensal,ebitda,margem_ebitda,folha_pagamento,aluguel_mensal,impostos_mensais,prolabore_mensal,cmv_mensal,preco_pedido,valor_1n,score_saude,score_pilares,ativos_json,passivos_json,tags_calculadas,tag_preco,abertura_negociacao,descricao_geral,teaser_contexto_ia&titulo_anuncio=not.is.null&preco_pedido=not.is.null&valor_1n=not.is.null&order=publicado_em.desc`,{headers:{apikey:KEY,Authorization:'Bearer '+KEY}});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

/* ── BUILD CARD ── */

  const el=document.createElement('div');
  el.className=`card ${cls}`;
  el.style.cssText=`z-index:${i+1};animation-delay:${Math.min(i*.05,.22)}s`;

  const p=PAL[gf(nd.categoria)]||PAL.outros;
  el.innerHTML=`
<div class="cl">
  <div class="c-code" style="color:${p.dot};opacity:.7">${nd.codigo} · ${nd.categoria||'–'} · ${nd.cidade}, ${nd.estado}</div>

    <div class="kp" style="border-color:${p.dot}18"><div class="kp-l" style="color:${p.dot}">Res. op.</div><div class="kp-v" style="color:${p.txt}">${pct(nd.margem_ebitda)}</div></div>
    <div class="kp" style="border-color:${p.dot}18"><div class="kp-l" style="color:${p.dot}">Ader.</div><div class="kp-v" style="color:${am!=null&&am>0?p.dot:p.txt}">${am!=null?(am>0?'+'+am+'pp':am+'pp'):'—'}</div></div>
    <div class="kp"><div class="kp-l" style="color:${p.dot}">Aval. 1N</div><div class="kp-v" style="color:${p.txt}">${brlS(nd.valor_1n)}</div></div>
  </div>
</div>
<div class="cd" style="background:${p.dot}30"></div>
<div class="cr">

  <div class="cr-vv" style="color:${p.txt}"><span class="cr-rs">R$</span>${brlS(nd.preco_pedido)}</div>

  <div class="cr-obs">
    <div><div class="cr-ol" style="color:${p.dot}">Patrimônio líq.</div><div class="cr-ov" style="color:${p.txt}">${pl>=0?'+ ':'– '}${brl(Math.abs(pl))} ${pl>=0?'incluso':'assumido'}</div></div>

/* catraca */
function catraca(c){
  let on=false,sy=0;
  document.addEventListener('touchstart',e=>{const s=document.scrollingElement;if(s.scrollTop+s.clientHeight>=s.scrollHeight-6){on=true;sy=e.touches[0].clientY;}},{passive:true});
  document.addEventListener('touchmove',e=>{if(!on)return;const dy=sy-e.touches[0].clientY;if(dy>0)c.style.transform=`scaleY(${1+Math.min(dy,22)*.003}) translateY(-${Math.min(dy,22)*.5}px)`;},{passive:true});
  document.addEventListener('touchend',()=>{if(!on)return;on=false;c.style.transition='transform .35s cubic-bezier(.34,1.56,.64,1)';c.style.transform='';setTimeout(()=>c.style.transition='',400);},{passive:true});
}

/* ── SLIDES ── */
function mkSlides(nd,p,pl,ef,op){
  const sc=n(nd.score_saude),tags=Array.isArray(nd.tags_calculadas)?nd.tags_calculadas:[],

  const negD=nd.descricao_geral||`${nd.titulo_anuncio} — negócio em ${nd.cidade}, ${nd.estado}.`;
  const pc={'0':'#dc2626','1':'#dc2626','2':'#dc2626','3':'#FFB03A','4':'#FFB03A','5':'#FFB03A',
    '6':'#3DFF7A','7':'#3DFF7A','8':'#3DFF7A','9':'#3DFF7A','10':'#3DFF7A'};
  // múltiplo base por setor
  const mulBase={'tech':8,'alim':3.5,'serv':5,'varejo':3.5,'saude':5,'edu':5,'ind':4,'outros':4};
  const mulSetor={'tech':'8–15×','alim':'3–5×','serv':'5–8×','varejo':'3–5×','saude':'4–7×','edu':'4–8×','ind':'4–6×','outros':'4–6×'};
  const fam=gf(nd.categoria);
  const mulB=mulBase[fam]||4;
  const mulAdj=sc?Math.round((mulB+(sc/100)*1.5)*10)/10:mulB;
  const dcfCalc=Math.round(n(nd.ebitda)*mulAdj/1000)*1000;

  const s=(cls,content)=>`<div class="slide" style="background:${p.fill}">${content}</div>`;
  const blk=(h,body)=>`<div class="blk" style="background:${p.dot}11;border-color:${p.dot}22"><div class="blk-h" style="color:${p.dot}">${h}</div><div class="blk-p" style="color:${p.txt}">${body}</div></div>`;
  const nc=(l,v,cls='')=>`<div class="nc" style="background:${p.dot}0e;border-color:${p.dot}1a"><div class="nc-l" style="color:${p.dot}">${l}</div><div class="nc-v ${cls}">${v}</div></div>`;

  const dblk=(content)=>`<div class="dblk" style="background:${p.dot}0e;border-color:${p.dot}1a">${content}</div>`;

  return [
/* 01 — O NEGÓCIO */
s('',`
<div class="sl" style="color:${p.dot}">01 · O negócio</div>
${blk('Sobre o negócio', negD)}
${blk('Mercado & localização', `Setor ${nd.categoria||'–'} em ${nd.cidade}, ${nd.estado}. Demanda ativa no mercado brasileiro.`)}
${blk('Perfil do comprador ideal', 'Investidor estratégico ou financeiro com interesse no setor e capacidade operacional.')}

/* 02 — GRANDES NÚMEROS */
s('',`

${nc('EBITDA anual', brl(nd.ebitda), 'g')}${nd.margem_ebitda?`<div class="nc-s" style="color:${p.dot}">${pct(nd.margem_ebitda)} margem</div>`:''}

${nc('ISE', (sc||'—')+'/100', 'g')}
</div>

s('',`
<div class="sl" style="color:${p.dot}">03 · DRE mensal estimada</div>
${dblk(`
${dr('(+) Receita bruta', brl(fm))}
${n(nd.impostos_mensais)?dr('(–) Impostos','– '+brl(nd.impostos_mensais),'r',true):''}
${n(nd.cmv_mensal)?dr('(–) CMV','– '+brl(nd.cmv_mensal),'r',true):''}
<div class="dr tot">${dr('(=) Margem bruta', brl(mb), 'g b').replace('<div class="dr">','').replace('</div>','')}</div>
${n(nd.folha_pagamento)?dr('(–) Folha','– '+brl(nd.folha_pagamento),'r',true):''}
${n(nd.aluguel_mensal)?dr('(–) Aluguel','– '+brl(nd.aluguel_mensal),'r',true):''}

`)}

s('',`

<div class="pt"><span class="ptl" style="color:${p.dot}">Patrimônio líquido</span><span class="ptv" style="color:${pl>=0?'#3DFF7A':'#FFB03A'}">${pl>=0?'+ ':'– '}${brl(Math.abs(pl))}</span></div>

`),

s('',`

  <div class="isen">${sc||'—'}</div>
  <div>
    <div class="iset">${sc>=75?'Negócio atraente':sc>=60?'Negócio sólido':sc>=40?'Negócio básico':'Em risco'}</div>
    <div class="ises">${sc>=75?'Venda facilitada — compradores disputam':sc>=60?'Condições normais de venda':sc>=40?'Venda com desconto':'Venda difícil, garantias exigidas'}</div>
  </div>
</div>
${dblk(Object.keys(pilares).length
  ? Object.entries(pilares).map(([k,v])=>`<div class="pil"><div class="pi-h"><span class="pi-n" style="color:${p.dot}">${k}</span><span class="pi-s" style="color:${pc[String(v)]||'#3DFF7A'}">${v}/10</span></div><div class="pi-bg"><div class="pi-f" style="width:${n(v)*10}%;background:${pc[String(v)]||'#3DFF7A'}"></div></div></div>`).join('')
  : `<p style="font-size:.65rem;color:${p.dot};opacity:.5;font-family:'DM Mono',monospace">Pilares disponíveis após curadoria.</p>`
)}
`),

/* 06 — BENCHMARKS */
s('',`
<div class="sl" style="color:${p.dot}">06 · Benchmarks de mercado</div>
${dblk(`
<div class="bench">
  <div class="be-h"><span class="be-l" style="color:${p.dot}">Margem EBITDA</span><div><span class="be-v" style="color:#3DFF7A">${pct(nd.margem_ebitda)} empresa</span> · <span class="be-r" style="color:${p.dot}">benchmark setor</span></div></div>
  <div class="be-bar" style="background:${p.dot}15"><div class="be-ref" style="width:40%;background:${p.dot}25"></div><div class="${n(nd.margem_ebitda)>=18?'be-val':'be-val lo'}" style="width:${Math.min(n(nd.margem_ebitda)*2,100)}%"></div></div>
</div>
${am!=null?`<div class="bench"><div class="be-h"><span class="be-l" style="color:${p.dot}">Aderência ao mercado</span><span class="be-v" style="color:${am>=0?'#3DFF7A':'#FFB03A'}">${am>0?'+'+am+'pp acima':am+'pp abaixo'}</span></div><div class="be-bar" style="background:${p.dot}15"><div class="be-ref" style="width:50%;background:${p.dot}25"></div><div class="${am>=0?'be-val':'be-val lo'}" style="width:${Math.min(50+am*2,100)}%"></div></div></div>`:''}
${n(nd.ebitda)?`<div class="bench" style="margin-bottom:0"><div class="be-h"><span class="be-l" style="color:${p.dot}">Múltiplo EBITDA</span><div><span class="be-v" style="color:#3DFF7A">${(n(nd.valor_1n)/n(nd.ebitda)).toFixed(1)}× empresa</span> · <span class="be-r" style="color:${p.dot}">${mulSetor[fam]||'4–7×'} setor</span></div></div><div class="be-bar" style="background:${p.dot}15"><div class="be-ref" style="width:70%;background:${p.dot}25"></div><div class="${(n(nd.valor_1n)/n(nd.ebitda))>=(mulB-1)?'be-val':'be-val lo'}" style="width:${Math.min((n(nd.valor_1n)/n(nd.ebitda))/(mulB+2)*100,100)}%"></div></div></div>`:''}
`)}
`),

/* 07 — UPSIDES */
s('',`
<div class="sl" style="color:${p.dot}">07 · Upsides identificados</div>
${tags.length
  ? tags.map(t=>`<div class="up-c" style="background:rgba(61,255,122,.04);border-color:rgba(61,255,122,.13)"><div class="up-h"><div class="up-t">${t}</div><div class="up-d" style="color:${p.dot}">Oportunidade de valorização identificada pela 1Negócio.</div></div></div>`).join('')
  : `<p style="font-size:.65rem;color:${p.dot};opacity:.5;font-family:'DM Mono',monospace;padding:8px 0">Upsides disponíveis no dossiê completo.</p>`
}
<div class="mais" style="background:${p.dot}0e;border-color:${p.dot}1a">
  <div class="mais-i" style="background:rgba(61,255,122,.1);color:#3DFF7A">${tags.length}</div>
  <div>
    <div class="mais-t" style="color:${p.txt}">${tags.length} upside${tags.length!==1?'s':''} identificado${tags.length!==1?'s':''}</div>
    <div class="mais-s" style="color:${p.dot}">Solicite o dossiê para análise completa</div>
  </div>
</div>
`),

/* 08 — VALOR × 1N */
s('',`
<div class="sl" style="color:${p.dot}">08 · Valor de venda × avaliação 1N</div>
<div class="cmp" style="background:${p.dot}0e;border-color:${p.dot}1a">
  <div class="crow" style="border-color:${p.dot}15">
    <div class="crl" style="color:${p.dot}">Preço pedido pelo vendedor</div>
    <div class="crv" style="color:${p.txt}">${brl(nd.preco_pedido)}</div>
  </div>
  <div class="crow">
    <div class="crl" style="color:${p.dot}">Avaliação independente 1N</div>
    <div style="display:flex;align-items:center;gap:7px">
      <div class="crv" style="color:#3DFF7A">${brl(nd.valor_1n)}</div>
      ${op?'<span class="badge">OPORTUNIDADE</span>':n(nd.valor_1n)>n(nd.preco_pedido)*1.1?'<span class="badge" style="background:#FFB03A;color:#080D0A">ACIMA</span>':'<span class="badge" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)">NA FAIXA</span>'}
    </div>
  </div>
</div>
${disc&&parseFloat(disc)>0?`<div class="disc" style="background:rgba(61,255,122,.07);border-color:rgba(61,255,122,.18)"><div class="discl">Desconto implícito</div><div class="discv">${disc}% abaixo</div></div>`:''}
<div class="met" style="background:${p.dot}0e;border-color:${p.dot}1a">
  <div class="meth" style="color:${p.dot}">Como chegamos em ${brl(nd.valor_1n)}</div>
  <div class="metrow" style="border-color:${p.dot}15"><span class="metl" style="color:${p.dot}">EBITDA anual declarado</span><span class="metv" style="color:${p.txt}">${brl(nd.ebitda)}</span></div>
  <div class="metrow" style="border-color:${p.dot}15"><span class="metl" style="color:${p.dot}">Múltiplo base — ${nd.categoria||'–'}</span><span class="metv" style="color:${p.txt}">${mulSetor[fam]||'4–6×'}</span></div>
  <div class="metrow" style="border-color:${p.dot}15"><span class="metl" style="color:${p.dot}">Múltiplo aplicado (ISE ${sc}/100)</span><span class="metv" style="color:${p.txt}">${mulAdj}×</span></div>
  <div class="metrow"><span class="metl" style="color:${p.dot}">Avaliação 1N (EBITDA × múltiplo)</span><span class="metv" style="color:#3DFF7A;font-weight:800;font-size:13px">${brl(nd.valor_1n)}</span></div>
</div>
<div class="pat" style="background:${p.dot}0e;border-color:${p.dot}1a">
  <div class="prs" style="color:${p.dot}">Patrimônio líquido incluso</div>
  ${Object.keys(ativos).length?Object.entries(ativos).map(([k,v])=>`<div class="pr"><span class="prl" style="color:${p.dot}">${k}</span><span class="prv" style="color:${p.txt}">${brl(v)}</span></div>`).join(''):''}
  ${Object.keys(passivos).length?Object.entries(passivos).map(([k,v])=>`<div class="pr"><span class="prl" style="color:${p.dot}">${k}</span><span class="prv neg">${brl(v)}</span></div>`).join(''):''}
  <div class="pt"><span class="ptl" style="color:${p.dot}">Patrimônio líquido</span><span class="ptv" style="color:${pl>=0?'#3DFF7A':'#FFB03A'}">${pl>=0?'+ ':'– '}${brl(Math.abs(pl))}</span></div>
</div>
<div class="nota" style="color:${p.dot}">Avaliação 1N independente · EBITDA × múltiplo setorial<br>ISE ${sc}/100 ajusta o múltiplo aplicado · patrimônio sobre declaração do vendedor</div>
`)
  ];
}

/* ── ABRIR ── */
function open(nd){
  const il=iseL(n(nd.score_saude));
  const pl=calcPL(nd);
  const ef=n(nd.preco_pedido)-pl;
  const op=calcIO(nd)>=75||nd.tag_preco==='oportunidade';
  const cls=gclass(nd.categoria);

  // topo do sheet herda a cor do card via classe CSS
  const hdr=document.getElementById('shHdr');
  const p=PAL[gf(nd.categoria)]||PAL.outros;
  hdr.style.cssText=`background:${p.fill};color:${p.dot}`;
  document.getElementById('sheet').style.background=p.fill;
  hdr.innerHTML=`
    <div class="sh-handle"></div>
    <button class="sh-close" onclick="close_()">✕</button>
    <div class="sh-code" style="color:${p.dot}">${nd.codigo} · ${nd.categoria||'–'} · ${nd.cidade}, ${nd.estado}</div>
    <div class="sh-title" style="color:${p.txt}">${nd.titulo_anuncio}</div>
    <div style="margin-bottom:10px">
      <span class="c-ise" style="background:${p.dot}22;color:${p.dot}">${il.t}</span>
    </div>
    <div class="sh-vals" style="border-color:${p.dot}22">
      <div class="sv" style="border-color:${p.dot}22"><div class="sv-l" style="color:${p.dot}">Valor de venda</div><div class="sv-v" style="color:${p.txt}">${brl(nd.preco_pedido)}</div></div>
      <div class="sv" style="border-color:${p.dot}22"><div class="sv-l" style="color:${p.dot}">Valor efetivo</div><div class="sv-v" style="color:${p.txt}">${brl(ef)}</div></div>
      <div class="sv"><div class="sv-l" style="color:${p.dot}">Avaliação 1N</div><div class="sv-v" style="color:${op?'#3DFF7A':p.txt}">${brl(nd.valor_1n)}</div></div>
    </div>`;

  const track=document.getElementById('carTrack');
  const slides=mkSlides(nd,p,pl,ef,op);
  track.innerHTML=slides.join('');
  track.style.width=(NS*100)+'%';
  track.querySelectorAll('.slide').forEach(s=>s.style.width=(100/NS)+'%');

  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  for(let i=0;i<NS;i++){const d=document.createElement('div');d.className='dot'+(i===0?' on':'');d.onclick=()=>goTo(i);dotsEl.appendChild(d);}

  document.getElementById('btnSol').onclick=()=>{const m=encodeURIComponent(`Olá! Vi na 1Negócio [${nd.codigo}] e tenho interesse. Pode me passar mais detalhes?`);window.open(`https://wa.me/5548999999999?text=${m}`,'_blank');};

  cur=0;goTo(0);
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}
function close_(){document.getElementById('overlay').classList.remove('on');document.body.style.overflow='';}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))close_();});

/* carrossel */
function goTo(i){
  cur=Math.max(0,Math.min(NS-1,i));
  document.getElementById('carTrack').style.transform=`translateX(-${cur*(100/NS)}%)`;
  document.querySelectorAll('#dots .dot').forEach((d,j)=>d.classList.toggle('on',j===cur));
  document.getElementById('cNum').textContent=`${cur+1} / ${NS}`;
  document.getElementById('cPrev').disabled=cur===0;
  document.getElementById('cNext').disabled=cur===NS-1;
}
const nav=d=>goTo(cur+d);
let sx=0,sy2=0;
document.getElementById('sheet').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy2=e.touches[0].clientY;},{passive:true});
document.getElementById('sheet').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy2;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)nav(dx<0?1:-1);},{passive:true});
const share=()=>{if(navigator.share)navigator.share({title:'1Negócio',url:location.href}).catch(()=>{});else{navigator.clipboard?.writeText(location.href);alert('Link copiado!');}};

/* ticker */
function buildTicker(list){
  const fat=list.reduce((s,x)=>s+n(x.faturamento_anual),0);
  const val=list.reduce((s,x)=>s+n(x.valor_1n),0);
  const res=list.reduce((s,x)=>s+n(x.resultado_liquido_mensal)*12,0);
  const il=list.filter(x=>n(x.score_saude)>0);
  const ise=il.length?Math.round(il.reduce((s,x)=>s+n(x.score_saude),0)/il.length):0;
  const items=[
    {l:'Empresas à venda',v:String(list.length),c:''},
    {l:'Fat. combinado',v:'R$ '+brlS(fat),c:'g'},
    {l:'Valor avaliado',v:'R$ '+brlS(val),c:'g'},
    {l:'Resultado anual',v:'R$ '+brlS(res),c:'g'},
    {l:'ISE médio',v:String(ise)+'/100',c:ise>=70?'g':'a'},
    {l:'Setores',v:String(new Set(list.map(x=>x.categoria).filter(Boolean)).size),c:''},
    {l:'Estados',v:String(new Set(list.map(x=>x.estado).filter(Boolean)).size),c:''},
    {l:'Independente',v:'100%',c:'g'},
  ];
  const a=[...items,...items];
  document.getElementById('tickerT').innerHTML=a.map(i=>`<div class="ti"><span class="ti-l">${i.l}</span><span class="ti-v ${i.c}">${i.v}</span></div>`).join('');
}

/* categorias */
function buildCats(list){
  const cnt={};list.forEach(x=>{const f=gf(x.categoria);cnt[f]=(cnt[f]||0)+1;});
  const sc=document.getElementById('cats');
  sc.querySelectorAll('.cat-tag').forEach(t=>t.remove());
  CATS.filter(f=>cnt[f]).sort((a,b)=>cnt[b]-cnt[a]).forEach(f=>{
    const p=PAL[f];
    const b=document.createElement('button');
    b.className='cat-tag';b.dataset.f=f;
    b.style.cssText=`background:${p.fill};color:${p.dot};border-color:${p.dot}40`;
    b.textContent=p.lbl.toUpperCase();
    b.onclick=()=>filtCat(f);
    sc.appendChild(b);
  });
}
function filtCat(f){
  catF=f;
  document.getElementById('tagAll').classList.toggle('off',f!==null);
  document.querySelectorAll('.cat-tag').forEach(t=>t.classList.toggle('on',t.dataset.f===f));
  aplicar();
}

/* estados */
function buildEsts(list){
  const cnt={};list.forEach(x=>{if(x.estado)cnt[x.estado]=(cnt[x.estado]||0)+1;});
  const com=ESTADOS.filter(e=>cnt[e]).sort((a,b)=>cnt[b]-cnt[a]);
  const sem=ESTADOS.filter(e=>!cnt[e]);
  const el=document.getElementById('ests');el.innerHTML='';const allBtn=document.createElement('button');allBtn.className='tag-all'+(estF===null?' ':'off ');allBtn.textContent='TODOS';allBtn.onclick=()=>filtEst(null);el.appendChild(allBtn);
  [...com,...sem].forEach(e=>{
    const b=document.createElement('button');
    b.className='est-tag'+(estF===e?' on':'')+(cnt[e]?'':' sem');
    b.textContent=e;
    if(cnt[e])b.onclick=()=>filtEst(estF===e?null:e);
    el.appendChild(b);
  });
}
function filtEst(e){
  estF=e;
  document.querySelectorAll('.est-tag:not(.sem)').forEach(t=>t.classList.toggle('on',t.textContent===e));
  aplicar();
}
function abrirModal(){document.getElementById('modal').classList.add('on');document.body.style.overflow='hidden'}
function fecharModal(){document.getElementById('modal').classList.remove('on');document.body.style.overflow=''}

/* render */
function aplicar(){
  let l=[...all];
  if(catF)l=l.filter(x=>gf(x.categoria)===catF);
  if(estF)l=l.filter(x=>x.estado===estF);
  l.sort((a,b)=>calcIO(b)-calcIO(a));
  fil=l;render();
}
function render(){
  const s=document.getElementById('stack');s.innerHTML='';
  if(!fil.length){s.innerHTML='<p style="text-align:center;padding:3rem 0;font-size:12px;color:#fff3">Nenhum anúncio com estes filtros.</p>';return;}
  fil.forEach((nd,i)=>s.appendChild(mkCard(nd,i,fil.length)));
}

(async()=>{
  try{
    all=await load();
    all.sort((a,b)=>calcIO(b)-calcIO(a));
    fil=[...all];
    buildTicker(all);buildCats(all);buildEsts(all);render();
  }catch(e){
    document.getElementById('stack').innerHTML=`<p style="text-align:center;padding:3rem 0;font-size:12px;color:#f874">Erro: ${e.message}</p>`;
    console.error(e);
  }
})();
</script>
</body>
</html>
