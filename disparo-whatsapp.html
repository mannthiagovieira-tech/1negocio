<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Negócio · Central de Disparo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#10b981;--bg:#0c0c0a;--surface:#111110;--surface2:#161614;--text:#e8e8e4;--text-dim:#888880;--text-muted:#555550;--amber:#f59e0b;--blue:#60a5fa;--red:#f87171;--sep:#222220;--wpp:#25d366}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);font-size:13px}
button{cursor:pointer;font-family:inherit;font-size:inherit}
input,select{font-family:inherit;font-size:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--sep);padding:6px 10px;outline:none}
input:focus{border-color:var(--green)}
textarea{font-family:inherit;font-size:13px;background:var(--surface2);color:var(--text);border:1px solid var(--sep);padding:8px 10px;outline:none;width:100%;resize:vertical;min-height:50px}

.wrap{display:grid;grid-template-columns:1fr 380px;height:100vh;overflow:hidden}

/* ═══ LEFT: CONTATOS ═══ */
.left{display:flex;flex-direction:column;border-right:1px solid var(--sep)}
.left-header{padding:16px;border-bottom:1px solid var(--sep)}
.left-header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.03em;margin-bottom:12px}
.left-header h1 em{color:var(--green);font-style:normal}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.filters input{width:180px}
.filters select{width:120px}
.select-bar{display:flex;gap:8px;align-items:center;font-size:11px;color:var(--text-muted)}
.select-bar span{color:var(--green);font-weight:500}
.btn{padding:5px 12px;border:1px solid var(--sep);background:var(--surface2);color:var(--text);font-size:10px;letter-spacing:.05em;text-transform:uppercase}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn-green{background:var(--green);color:#000;border-color:var(--green)}
.btn-green:hover{background:#0d9668}
.btn-wpp{background:var(--wpp);color:#fff;border-color:var(--wpp)}
.btn-red{border-color:var(--red);color:var(--red)}

.list{flex:1;overflow-y:auto}
.row{display:flex;align-items:center;padding:6px 16px;border-bottom:1px solid var(--sep);font-size:11px;gap:8px;transition:background .1s}
.row:hover{background:var(--surface2)}
.row.contacted{opacity:.35}
.row input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);flex-shrink:0}
.row .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .tel{width:110px;flex-shrink:0;color:var(--text-dim)}
.row .ddd{width:30px;flex-shrink:0;color:var(--text-muted);font-size:10px}
.row .gen{width:16px;flex-shrink:0;font-size:10px}
.row .login{width:35px;flex-shrink:0;text-align:center}
.badge-hot{color:var(--green);font-size:10px}
.badge-warm{color:var(--amber);font-size:10px}
.badge-cold{color:var(--text-muted);font-size:10px}
.row .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-pending{background:var(--sep)}
.dot-sent{background:var(--wpp)}

.left-footer{padding:8px 16px;border-top:1px solid var(--sep);font-size:11px;color:var(--text-muted);display:flex;justify-content:space-between}

/* ═══ RIGHT: FILA DE ENVIO ═══ */
.right{display:flex;flex-direction:column;background:var(--surface)}
.right-header{padding:16px;border-bottom:1px solid var(--sep)}
.right-header h2{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;letter-spacing:-.02em;margin-bottom:10px}
.msg-box{margin-bottom:10px}
.msg-box label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);display:block;margin-bottom:4px}
.msg-hint{font-size:9px;color:var(--text-muted);margin-top:4px}
.config-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.config-row label{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
.config-row input{width:60px}

.queue-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.stat{background:var(--surface2);padding:8px;text-align:center;border:1px solid var(--sep)}
.stat .val{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;letter-spacing:-.03em}
.stat .val.green{color:var(--green)}
.stat .val.amber{color:var(--amber)}
.stat .val.wpp{color:var(--wpp)}
.stat .lab{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-top:2px}

.fire-btn{width:100%;padding:12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;border:none}
.fire-btn:disabled{opacity:.4;cursor:not-allowed}

.queue-list{flex:1;overflow-y:auto;border-top:1px solid var(--sep)}
.q-item{display:flex;align-items:center;gap:8px;padding:6px 16px;border-bottom:1px solid var(--sep);font-size:11px}
.q-item .q-name{flex:1}
.q-item .q-status{font-size:10px;letter-spacing:.05em;text-transform:uppercase}
.q-status-waiting{color:var(--text-muted)}
.q-status-sending{color:var(--amber)}
.q-status-sent{color:var(--wpp)}
.q-status-error{color:var(--red)}
.q-remove{background:none;border:none;color:var(--red);font-size:14px;padding:0 4px;cursor:pointer}

.right-footer{padding:8px 16px;border-top:1px solid var(--sep)}
.log{font-size:10px;color:var(--text-muted);max-height:80px;overflow-y:auto;white-space:pre-wrap}

/* ═══ PROGRESS BAR ═══ */
.progress-wrap{height:4px;background:var(--sep);margin-bottom:10px}
.progress-bar{height:100%;background:var(--wpp);transition:width .5s;width:0%}
</style>
</head>

      <div class="select-bar">

    <div class="left-footer">

    </div>
  </div>

  <!-- RIGHT: FILA DE ENVIO -->
  <div class="right">
    <div class="right-header">
      <h2>Fila de envio</h2>
      <div class="msg-box">
        <label>Mensagem (♂ Fala / ♀ Oi + {nome})</label>
        <textarea id="msgM">Fala {nome}, Levi da 1Negócio aqui, tudo bem?</textarea>
        <textarea id="msgF" style="margin-top:4px">Oi {nome}, Levi da 1Negócio aqui, tudo bem?</textarea>
        <div class="msg-hint">Mensagem de cima = masculino · Mensagem de baixo = feminino</div>
      </div>
      <div class="config-row">
        <label>Intervalo (seg):</label>
        <input type="number" id="intervalo" value="120" min="30" max="600">
        <span style="font-size:10px;color:var(--text-muted)">= <span id="intervaloMin">2</span> min</span>
      </div>
      <div class="queue-stats">
        <div class="stat"><div class="val amber" id="qTotal">0</div><div class="lab">Na fila</div></div>
        <div class="stat"><div class="val wpp" id="qSent">0</div><div class="lab">Enviados</div></div>
        <div class="stat"><div class="val" id="qTime">0m</div><div class="lab">Tempo est.</div></div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <button class="btn-green fire-btn" id="fireBtn" onclick="startDisparo()">▶ DISPARAR</button>
    </div>
    <div class="queue-list" id="queueList"></div>
    <div class="right-footer">
      <div class="log" id="log"></div>
    </div>
  </div>

</div>

async function doLogin() {

  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  try {

let contactedTels = new Set();
let selectedIdxs = new Set();
let queue = []; // {idx, status: waiting|sending|sent|error}
let isRunning = false;

// ═══ LOAD CONTACTED FROM SUPABASE ═══
async function loadContacted() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/disparos_whatsapp?select=telefone`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const data = await res.json();
    if (Array.isArray(data)) {
      contactedTels = new Set(data.map(d => d.telefone));
      document.getElementById('contactedTotal').textContent = contactedTels.size + ' contatados';
      renderList();
    }
  } catch(e) { log('Erro Supabase: ' + e.message); }
}

async function saveContacted(tel, nome, email) {
  try {
    await fetch(`${SUPA_URL}/rest/v1/disparos_whatsapp`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ telefone: tel, nome, email })
    });
    contactedTels.add(tel);
    document.getElementById('contactedTotal').textContent = contactedTels.size + ' contatados';
  } catch(e) { log('Erro ao salvar: ' + e.message); }
}

// ═══ RENDER CONTACT LIST ═══
function getFiltered() {
  const search = (document.getElementById('fSearch').value || '').toLowerCase();
  const ddd = document.getElementById('fDDD').value;
  const loginMax = document.getElementById('fLogin').value;
  const tipo = document.getElementById('fTipo').value;
  const contacted = document.getElementById('fContacted').value;

  return DATA.map((r, i) => ({...r, _idx: i})).filter(r => {
    if (search && !(r.n || '').toLowerCase().includes(search) && !(r.e || '').toLowerCase().includes(search)) return false;
    if (ddd && r.d !== ddd) return false;
    if (loginMax && r.l > Number(loginMax)) return false;
    if (tipo === 'v' && !r.v) return false;
    const isContacted = contactedTels.has(r.t);
    if (contacted === 'hide' && isContacted) return false;
    if (contacted === 'only' && !isContacted) return false;
    return true;
  });
}

function renderList() {
  const filtered = getFiltered();
  const showing = filtered.slice(0, 300);
  
  document.getElementById('contactList').innerHTML = showing.map(r => {
    const isContacted = contactedTels.has(r.t);
    const isSelected = selectedIdxs.has(r._idx);
    const inQueue = queue.some(q => q.idx === r._idx);
    const loginClass = r.l <= 7 ? 'badge-hot' : r.l <= 30 ? 'badge-warm' : 'badge-cold';
    return `<div class="row ${isContacted ? 'contacted' : ''}">
      <input type="checkbox" ${isSelected ? 'checked' : ''} ${inQueue ? 'disabled' : ''} onchange="toggleSelect(${r._idx}, this.checked)">
      <div class="status-dot ${isContacted ? 'dot-sent' : 'dot-pending'}"></div>
      <div class="gen">${r.g === 'F' ? '♀' : '♂'}</div>
      <div class="name" title="${r.n}">${r.n}</div>
      <div class="ddd">${r.d}</div>
      <div class="tel">${r.t}</div>
      <div class="login ${loginClass}">${r.l}d</div>
    </div>`;
  }).join('');

  document.getElementById('listCount').textContent = filtered.length + ' contatos' + (filtered.length > 300 ? ' (mostrando 300)' : '');
  updateSelectedCount();
}

function toggleSelect(idx, checked) {
  if (checked) selectedIdxs.add(idx); else selectedIdxs.delete(idx);
  updateSelectedCount();
}

function selectAll() {
  const filtered = getFiltered();
  filtered.slice(0, 300).forEach(r => {
    if (!queue.some(q => q.idx === r._idx)) selectedIdxs.add(r._idx);
  });
  renderList();
}

function selectNone() {
  selectedIdxs.clear();
  renderList();
}

function updateSelectedCount() {
  document.getElementById('selectedCount').textContent = selectedIdxs.size + ' selecionados';
}

// ═══ QUEUE ═══
function addSelectedToQueue() {
  if (selectedIdxs.size === 0) return;
  const existingIdxs = new Set(queue.map(q => q.idx));
  selectedIdxs.forEach(idx => {
    if (!existingIdxs.has(idx) && !contactedTels.has(DATA[idx].t)) {
      queue.push({ idx, status: 'waiting' });
    }
  });
  selectedIdxs.clear();
  renderList();
  renderQueue();
}

function removeFromQueue(idx) {
  queue = queue.filter(q => q.idx !== idx);
  renderQueue();
}

function clearQueue() {
  queue = queue.filter(q => q.status === 'sent');
  renderQueue();
}

function renderQueue() {
  const waiting = queue.filter(q => q.status === 'waiting').length;
  const sent = queue.filter(q => q.status === 'sent').length;
  const intervalo = Number(document.getElementById('intervalo').value) || 120;
  const timeMin = Math.round(waiting * intervalo / 60);

  document.getElementById('qTotal').textContent = waiting;
  document.getElementById('qSent').textContent = sent;
  document.getElementById('qTime').textContent = timeMin + 'm';

  const total = queue.length;
  const pct = total ? (sent / total * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';

  document.getElementById('queueList').innerHTML = queue.map(q => {
    const r = DATA[q.idx];
    const statusClass = 'q-status-' + q.status;
    const statusText = {waiting:'aguardando', sending:'enviando...', sent:'✓ enviado', error:'✗ erro'}[q.status];
    return `<div class="q-item">
      <div class="gen">${r.g === 'F' ? '♀' : '♂'}</div>
      <div class="q-name">${r.p}</div>
      <div style="color:var(--text-muted)">${r.t}</div>
      <div class="q-status ${statusClass}">${statusText}</div>
      ${q.status === 'waiting' ? `<button class="q-remove" onclick="removeFromQueue(${q.idx})">✕</button>` : ''}
    </div>`;
  }).join('');

  // Update button state
  const btn = document.getElementById('fireBtn');
  if (isRunning) {
    btn.textContent = '⏸ PAUSAR';
    btn.className = 'btn-red fire-btn';
    btn.onclick = () => { isRunning = false; };
  } else if (waiting > 0) {
    btn.textContent = `▶ DISPARAR (${waiting})`;
    btn.className = 'btn-green fire-btn';
    btn.disabled = false;
    btn.onclick = startDisparo;
  } else {
    btn.textContent = '▶ DISPARAR';
    btn.className = 'btn-green fire-btn';
    btn.disabled = true;
  }
}

// ═══ DISPARO ═══
function getMsg(r) {
  const templateM = document.getElementById('msgM').value;
  const templateF = document.getElementById('msgF').value;
  const template = r.g === 'F' ? templateF : templateM;
  return template.replace(/\{nome\}/g, r.p);
}

async function sendWhatsApp(tel, msg) {
  const res = await fetch(`${ZAPI_URL}/send-text`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone: tel, message: msg })
  });
  return res.json();
}

async function startDisparo() {
  if (isRunning) { isRunning = false; return; }
  isRunning = true;
  renderQueue();

  const intervalo = Number(document.getElementById('intervalo').value) || 120;
  const waiting = queue.filter(q => q.status === 'waiting');

  log(`Início disparo: ${waiting.length} mensagens, intervalo ${intervalo}s`);

  for (const q of queue) {
    if (!isRunning) { log('Disparo pausado'); break; }
    if (q.status !== 'waiting') continue;

    const r = DATA[q.idx];
    const msg = getMsg(r);
    q.status = 'sending';
    renderQueue();

    try {
      const result = await sendWhatsApp(r.t, msg);
      if (result.zapiId || result.messageId || result.id) {
        q.status = 'sent';
        await saveContacted(r.t, r.n, r.e);
        log(`✅ ${r.p} (${r.t})`);
      } else {
        q.status = 'error';
        log(`⚠️ ${r.p}: ${JSON.stringify(result)}`);
      }
    } catch(e) {
      q.status = 'error';
      log(`❌ ${r.p}: ${e.message}`);
    }

    renderQueue();
    renderList();

    // Aguardar intervalo
    if (isRunning && queue.some(q => q.status === 'waiting')) {
      await new Promise(resolve => setTimeout(resolve, intervalo * 1000));
    }
  }

  isRunning = false;
  renderQueue();
  log('Disparo concluído');
}

// ═══ LOG ═══
function log(msg) {
  const el = document.getElementById('log');
  const time = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  el.textContent = `[${time}] ${msg}\n` + el.textContent;
}

// ═══ INTERVALO DISPLAY ═══
document.getElementById('intervalo').addEventListener('input', function() {
  document.getElementById('intervaloMin').textContent = Math.round(this.value / 60 * 10) / 10;
  renderQueue();
});

// ═══ INIT ═══
loadContacted();
renderQueue();
</script>
