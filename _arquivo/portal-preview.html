<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1Negócio — Empresas à venda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d2b1f;--ink2:#122e21;
  --green:#10b981;
  --cab:'Cabinet Grotesk',sans-serif;
  --mono:'DM Mono',monospace;
  --bg:#eef2ee;
  /* paleta por categoria */
  --saude-bg:#d1fae5;--saude-bd:#6ee7b7;--saude-cor:#064e3b;--saude-acc:#059669;
  --tech-bg:#dbeafe;--tech-bd:#93c5fd;--tech-cor:#1e3a8a;--tech-acc:#2563eb;
  --alim-bg:#fef3c7;--alim-bd:#fcd34d;--alim-cor:#78350f;--alim-acc:#d97706;
  --edu-bg:#ede9fe;--edu-bd:#c4b5fd;--edu-cor:#3b0764;--edu-acc:#7c3aed;
  --varejo-bg:#fce7f3;--varejo-bd:#f9a8d4;--varejo-cor:#831843;--varejo-acc:#db2777;
  --ind-bg:#e0f2fe;--ind-bd:#7dd3fc;--ind-cor:#0c4a6e;--ind-acc:#0284c7;
  --serv-bg:#f0fdf4;--serv-bd:#86efac;--serv-cor:#14532d;--serv-acc:#16a34a;
  --outros-bg:#f8fafc;--outros-bd:#cbd5e1;--outros-cor:#334155;--outros-acc:#64748b;
}
html{background:var(--bg);-webkit-font-smoothing:antialiased;font-size:16px}
body{min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);font-family:var(--mono)}

/* ════════════════════════
   CABEÇALHO
   ════════════════════════ */
.hdr{background:var(--ink);border-radius:0 0 20px 20px;overflow:hidden;position:sticky;top:0;z-index:200;flex-shrink:0}

/* L1 — logo + botão */
.h1{display:flex;align-items:center;justify-content:space-between;height:40px;padding:0 12px;border-bottom:0.5px solid rgba(255,255,255,0.07)}
.logo{font-family:var(--cab);font-weight:800;font-size:15px;letter-spacing:-0.03em;color:#fff;text-decoration:none}
.logo em{color:var(--green);font-style:normal}
.btn-av{font-family:var(--cab);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink);background:var(--green);padding:5px 13px;border:none;border-radius:20px;cursor:pointer;white-space:nowrap;text-decoration:none}

/* L2 — stats scroll */
.s1{display:flex;align-items:stretch;height:28px;border-bottom:0.5px solid rgba(255,255,255,0.07);overflow-x:auto;-webkit-overflow-scrolling:touch}
.s1::-webkit-scrollbar{display:none}
.st{display:flex;align-items:center;gap:5px;padding:0 10px;border-right:0.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.sv{font-family:var(--cab);font-weight:800;font-size:11px;color:#fff;letter-spacing:-0.02em;white-space:nowrap}
.sv em{color:var(--green);font-style:normal}
.sl{font-size:7px;text-transform:uppercase;letter-spacing:0.07em;color:rgba(255,255,255,0.25);white-space:nowrap}

/* L3 — tags de categoria */
.s2{display:flex;align-items:center;height:36px;padding:0 10px;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:0.5px solid rgba(255,255,255,0.06)}
.s2::-webkit-scrollbar{display:none}

.tag-all{font-family:var(--cab);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.05em;padding:4px 10px;border-radius:20px;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;background:rgba(255,255,255,0.9);color:var(--ink)}
.tag-all.off{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.45)}

.cat-tag{font-family:var(--cab);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.04em;padding:4px 10px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.15s;opacity:0.5}
.cat-tag.on{opacity:1}

/* L4 — localização */
.s3{display:flex;align-items:stretch;height:28px;background:var(--ink2)}
.loc-btn{display:flex;align-items:center;gap:5px;padding:0 12px;border:none;cursor:pointer;background:transparent;font-family:var(--cab);font-weight:500;font-size:10px;color:rgba(255,255,255,0.5);border-right:0.5px solid rgba(255,255,255,0.06)}
.loc-arr{opacity:0.4;font-size:9px;margin-left:2px}
.fbadge{margin-left:auto;padding:0 9px;font-size:8px;color:rgba(255,255,255,0.28);display:flex;align-items:center;gap:3px;flex-shrink:0;font-family:var(--mono)}
.fdot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:blink 2.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.fbadge strong{color:rgba(255,255,255,0.6);font-weight:500}

/* ponte */
.bridge{height:16px;background:var(--ink)}

/* ════════════════════════
   MODAL LOCALIZAÇÃO
   ════════════════════════ */
.loc-modal{display:none;position:fixed;inset:0;z-index:400;background:rgba(13,43,31,0.5);align-items:flex-end;justify-content:center}
.loc-modal.on{display:flex}
.loc-sheet{width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;padding:16px 16px 32px;max-height:70vh;overflow-y:auto}
.loc-sheet h3{font-family:var(--cab);font-weight:800;font-size:15px;color:var(--ink);margin-bottom:12px}
.loc-opts{display:flex;flex-wrap:wrap;gap:7px}
.loc-opt{font-family:var(--cab);font-weight:600;font-size:11px;padding:6px 13px;border-radius:20px;border:0.5px solid rgba(13,43,31,0.15);background:#fff;color:rgba(13,43,31,0.55);cursor:pointer;transition:all 0.12s}
.loc-opt.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ════════════════════════
   CARDS — altura fixa, cor por categoria
   ════════════════════════ */
.main{flex:1;padding:8px 8px 24px}
.card{border-radius:14px;overflow:hidden;position:relative;margin-top:-32px;border:0.5px solid;height:128px;cursor:pointer;transition:filter 0.15s}
.card:first-child{margin-top:0}
.card:hover{filter:brightness(1.03)}

/* z-index dinâmico via JS */
.cl{display:flex;height:100%}
.left{flex:1;min-width:0;padding:9px 8px 9px 11px;display:flex;flex-direction:column;justify-content:space-between}
.top-area{display:flex;align-items:flex-start;justify-content:space-between;gap:5px}
.tt{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.tmeta{font-size:7.5px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.42}
.ttitle{font-family:var(--cab);font-weight:800;font-size:11.5px;letter-spacing:0.03em;text-transform:uppercase;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ise-tag{font-size:6.5px;font-weight:700;text-transform:uppercase;padding:1.5px 6px;border-radius:20px;display:inline-block;margin-top:2px;white-space:nowrap}
.op-tag{font-size:6.5px;font-weight:700;text-transform:uppercase;padding:2.5px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:10px;background:#059669;color:#fff}
.row5{display:flex;align-items:stretch;border-top:0.5px solid rgba(0,0,0,0.08);padding-top:5px;flex-shrink:0}
.d{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;padding-right:4px;border-right:0.5px solid rgba(0,0,0,0.08)}
.d:last-child{border-right:none;padding-right:0}
.d.pl{padding-left:4px}
.dl{font-size:6px;text-transform:uppercase;letter-spacing:0.07em;opacity:0.36;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dv{font-family:var(--cab);font-weight:800;font-size:9.5px;letter-spacing:-0.01em}
.cdiv{width:0.5px;background:currentColor;opacity:0.1;flex-shrink:0}
.right{width:88px;flex-shrink:0;padding:8px 9px;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:space-between}
.rsep{width:100%;height:0.5px;background:currentColor;opacity:0.08}
.vl{font-size:5px;text-transform:uppercase;letter-spacing:0.1em;opacity:0.3}
.vv{font-family:var(--cab);font-weight:800;font-size:17px;letter-spacing:-0.025em;line-height:1;display:flex;align-items:baseline;gap:1px}
.vrs{font-size:9px;font-weight:700;opacity:0.55}
.obs{display:flex;flex-direction:column;gap:3px;width:100%}
.pll{font-size:5px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.26}
.plv{font-family:var(--cab);font-weight:500;font-size:7.5px;opacity:0.42}
.ell{font-size:5px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.28}
.elv{font-family:var(--cab);font-weight:700;font-size:8.5px;opacity:0.55}
.mll{font-size:5px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.28}
.mlv{font-family:var(--cab);font-weight:800;font-size:10px}

/* ════════════════════════
   CARD EXPANDIDO — bottom sheet responsivo
   ════════════════════════ */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(13,43,31,0.55);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}

.exp-sheet{
  width:100%;max-width:480px;
  /* altura responsiva: ocupa quase tudo mas deixa ver o topo */
  height:calc(100dvh - 48px);
  border-radius:22px 22px 0 0;
  overflow:hidden;display:flex;flex-direction:column;background:#fff;
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(.32,0,.15,1);
}
.overlay.on .exp-sheet{transform:translateY(0)}

/* header do sheet */
.exp-hdr{padding:12px 14px 10px;flex-shrink:0;position:relative}
.exp-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.3);margin:0 auto 8px}
.btn-fechar{position:absolute;top:10px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.18);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;line-height:1}
.exp-meta{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:3px;font-family:var(--mono)}
.exp-title{font-family:var(--cab);font-weight:800;font-size:13px;letter-spacing:0.03em;text-transform:uppercase;line-height:1.2;margin-bottom:8px;color:#fff}
.exp-vals{display:flex;gap:12px;padding-top:8px;border-top:0.5px solid rgba(255,255,255,0.18);flex-wrap:wrap}
.ev{display:flex;flex-direction:column;gap:2px}
.ev-l{font-size:7.5px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.45);font-family:var(--mono)}
.ev-v{font-family:var(--cab);font-weight:800;font-size:13px;color:#fff}
.exp-badge{font-size:8px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,0.2);color:#fff;white-space:nowrap;margin-left:auto;align-self:center;font-family:var(--cab)}

/* carrossel */
.car-outer{flex:1;overflow:hidden;display:flex;flex-direction:column;background:#f8faf8;min-height:0}
.car-wrap{flex:1;overflow:hidden;min-height:0}
.car-track{display:flex;height:100%;transition:transform 0.3s cubic-bezier(.4,0,.2,1)}
.slide{min-width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 10px;display:flex;flex-direction:column;gap:10px;font-size:0.875rem}

/* dots */
.car-dots{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 0;background:#fff;border-top:0.5px solid rgba(13,43,31,0.07);flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(13,43,31,0.15);cursor:pointer;transition:all 0.2s}
.dot.on{width:16px;border-radius:3px;background:var(--green)}

/* nav prev/next */
.car-nav{display:flex;align-items:center;justify-content:space-between;padding:5px 12px 6px;background:#fff;border-top:0.5px solid rgba(13,43,31,0.06);flex-shrink:0}
.car-btn{background:none;border:0.5px solid rgba(13,43,31,0.12);font-family:var(--mono);font-size:10px;color:rgba(13,43,31,0.45);padding:4px 11px;cursor:pointer;border-radius:20px}
.car-btn:disabled{opacity:0.2;pointer-events:none}
.car-lbl{font-size:10px;color:rgba(13,43,31,0.3);font-family:var(--mono)}

/* ações */
.car-actions{display:flex;gap:8px;padding:8px 12px 12px;background:#f8faf8;border-top:0.5px solid rgba(13,43,31,0.07);flex-shrink:0}
.btn-info{flex:1;background:var(--ink);color:#fff;border:none;font-family:var(--cab);font-weight:700;font-size:11px;padding:10px;cursor:pointer;border-radius:10px;text-transform:uppercase;letter-spacing:0.04em}
.btn-share{background:none;border:0.5px solid rgba(13,43,31,0.18);font-family:var(--mono);font-size:11px;color:rgba(13,43,31,0.45);padding:10px 12px;cursor:pointer;border-radius:10px;display:flex;align-items:center;gap:4px}

/* componentes dos slides — tamanhos relativos para responsividade */
.slide-lbl{font-size:0.56rem;text-transform:uppercase;letter-spacing:0.14em;color:rgba(13,43,31,0.35)}
.ia-block{background:#fff;border:0.5px solid rgba(13,43,31,0.08);border-radius:10px;padding:10px 12px}
.ia-tit{font-family:var(--cab);font-weight:700;font-size:0.8rem;color:#064e3b;margin-bottom:4px}
.ia-txt{font-size:0.68rem;color:rgba(13,43,31,0.6);line-height:1.6}
.ia-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{font-size:0.56rem;padding:2px 8px;border-radius:20px;background:rgba(6,78,59,0.07);color:#064e3b}
.nums-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.nc{background:#fff;border:0.5px solid rgba(13,43,31,0.08);border-radius:8px;padding:8px 10px}
.nc-l{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(13,43,31,0.38);margin-bottom:2px}
.nc-v{font-family:var(--cab);font-weight:800;font-size:1rem;color:#064e3b;letter-spacing:-0.02em;line-height:1}
.nc-v.g{color:#059669}.nc-v.a{color:#b45309}
.nc-sub{font-size:0.5rem;color:rgba(13,43,31,0.32);margin-top:2px}
.dre-wrap,.bp-wrap,.val-bloco{background:#fff;border:0.5px solid rgba(13,43,31,0.08);border-radius:10px;padding:10px 12px}
.bp-wrap{display:flex;flex-direction:column;gap:8px}
.dre-row,.bp-row,.vb-row{display:flex;align-items:baseline;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid rgba(13,43,31,0.05)}
.dre-row:last-child,.bp-row:last-child,.vb-row:last-child{border-bottom:none}
.dre-row.tot{border-top:0.5px solid rgba(13,43,31,0.12);margin-top:2px;padding-top:6px}
.dre-l,.bp-l,.vb-l{font-size:0.65rem;color:rgba(13,43,31,0.5)}
.dre-l.ind{padding-left:10px;font-size:0.6rem;color:rgba(13,43,31,0.38)}
.bp-sec{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.12em;color:rgba(13,43,31,0.32);margin-bottom:3px}
.dre-v,.bp-v,.vb-v{font-family:var(--cab);font-weight:700;font-size:0.72rem;color:#064e3b}
.dre-v.g,.vb-v.g{color:#059669}.dre-v.r{color:#b45309}.dre-v.b{font-size:0.82rem;font-weight:800}
.vb-v.ink{color:#064e3b}
.bp-total{display:flex;justify-content:space-between;padding-top:6px;border-top:0.5px solid rgba(13,43,31,0.12)}
.bp-total-l{font-size:0.65rem;color:#064e3b;font-weight:500}
.bp-total-v{font-family:var(--cab);font-weight:800;font-size:0.85rem}
.ise-hero{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f0fdf4;border:0.5px solid #bbf7d0;border-radius:10px}
.ise-num{font-family:var(--cab);font-weight:800;font-size:2rem;color:#059669;letter-spacing:-0.03em;line-height:1}
.ise-lbl{font-size:0.68rem;color:#065f46;font-weight:500}
.ise-sub{font-size:0.56rem;color:rgba(6,78,59,0.55);margin-top:2px}
.pilar{margin-bottom:6px}
.pilar-head{display:flex;justify-content:space-between;margin-bottom:2px;font-size:0.6rem}
.pilar-nome{color:rgba(13,43,31,0.55)}
.pilar-nota{font-weight:500}
.pilar-bar{height:2px;background:rgba(13,43,31,0.07);border-radius:2px;overflow:hidden}
.pilar-fill{height:100%;border-radius:2px}
.bench-item{margin-bottom:8px}
.bench-head{display:flex;justify-content:space-between;margin-bottom:3px;font-size:0.6rem}
.bench-l{color:rgba(13,43,31,0.5)}
.bench-emp{font-weight:500;color:#059669}
.bench-set{color:rgba(13,43,31,0.32)}
.bench-bar{height:4px;background:rgba(13,43,31,0.06);border-radius:3px;position:relative}
.bf-s{position:absolute;left:0;top:0;height:100%;background:rgba(13,43,31,0.15);border-radius:3px}
.bf-e{position:absolute;left:0;top:0;height:100%;background:#059669;border-radius:3px}
.bf-e.low{background:#b45309}
.up-card{background:#f0fdf4;border:0.5px solid #bbf7d0;border-radius:10px;overflow:hidden;margin-bottom:5px}
.up-head{padding:8px 12px 6px}
.up-tit{font-family:var(--cab);font-weight:800;font-size:0.72rem;color:#064e3b;margin-bottom:2px}
.up-desc{font-size:0.6rem;color:rgba(6,78,59,0.6);line-height:1.5}
.up-nums{display:grid;grid-template-columns:1fr 1fr;border-top:0.5px solid #bbf7d0}
.un{padding:6px 12px;border-right:0.5px solid #bbf7d0}
.un:last-child{border-right:none}
.un-l{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(6,78,59,0.45);margin-bottom:1px}
.un-v{font-family:var(--cab);font-weight:800;font-size:0.72rem;color:#059669}
.mais-up{background:#fff;border:0.5px solid rgba(13,43,31,0.1);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.mu-icon{width:26px;height:26px;border-radius:50%;background:rgba(5,150,105,0.1);display:flex;align-items:center;justify-content:center;font-family:var(--cab);font-weight:800;font-size:11px;color:#059669;flex-shrink:0}
.mu-t{flex:1;font-size:0.65rem;color:#064e3b;font-weight:500}
.mu-sub{font-size:0.58rem;color:rgba(13,43,31,0.4);margin-top:1px}
.vb-tag{font-size:0.5rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border-radius:20px}
.desc-box{background:rgba(5,150,105,0.07);border:0.5px solid #a7f3d0;border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.db-l{font-size:0.6rem;color:#065f46}
.db-v{font-family:var(--cab);font-weight:800;font-size:0.82rem;color:#059669}
.metod{font-size:0.53rem;color:rgba(13,43,31,0.28);line-height:1.7;padding-top:5px}

@keyframes sk{0%,100%{opacity:1}50%{opacity:0.4}}
</style>
</head>
<body>

<!-- CABEÇALHO -->
<div class="hdr" id="hdr">
  <div class="h1">
    <a class="logo" href="/"><em>1</em>NEGÓCIO</a>
    <a class="btn-av" href="/diagnostico.html">AVALIAR →</a>
  </div>
  <div class="s1">
    <div class="st"><div class="sv" id="sN">—</div><div class="sl">empresas</div></div>
    <div class="st"><div class="sv" id="sFat">—</div><div class="sl">fat. combinado</div></div>
    <div class="st"><div class="sv" id="sVal">—</div><div class="sl">valor avaliado</div></div>
    <div class="st"><div class="sv" id="sRes">—</div><div class="sl">resultado anual</div></div>
    <div class="st"><div class="sv" id="sIse">—</div><div class="sl">ISE médio</div></div>
    <div class="st" style="border-right:none"><div class="sv"><em>100%</em></div><div class="sl">independente</div></div>
  </div>
  <!-- tags de categoria -->
  <div class="s2" id="tagStripe">
    <button class="tag-all" id="tagAll" onclick="filtrarCat(null)">TODOS</button>
    <!-- tags inseridas via JS -->
  </div>
  <!-- localização -->
  <div class="s3">
    <button class="loc-btn" onclick="abrirLoc()">
      📍 <span id="locLabel">Todos os estados</span> <span class="loc-arr">▾</span>
    </button>

function getP(cat){

/* helpers */
function brl(v){
  if(v==null)return '—';v=parseFloat(v);
  if(v>=1e9)return 'R$\u00a0'+(v/1e9).toFixed(1).replace('.',',')+'B';
  if(v>=1e6)return 'R$\u00a0'+(v/1e6).toFixed(1).replace('.',',')+'M';
  if(v>=1e3)return 'R$\u00a0'+Math.round(v/1e3)+'k';
  return 'R$\u00a0'+Math.round(v).toLocaleString('pt-BR');
}
function brlS(v){
  if(v==null)return '—';v=parseFloat(v);
  if(v>=1e9)return (v/1e9).toFixed(1).replace('.',',')+'B';
  if(v>=1e6)return (v/1e6).toFixed(1).replace('.',',')+'M';
  if(v>=1e3)return Math.round(v/1e3)+'k';
  return Math.round(v).toLocaleString('pt-BR');
}
function pct(v){return v!=null?parseFloat(v).toFixed(0)+'%':'—'}
function n(v){return v?parseFloat(v):0}

function calcIO(nd){
  const d=n(nd.valor_1n)&&n(nd.preco_pedido)?Math.max(0,(n(nd.valor_1n)-n(nd.preco_pedido))/n(nd.valor_1n)):0;
  const dPts=d>=0.15?35:d>=0.05?22:d>0?12:0;
  const isePts=(n(nd.score_saude)||0)/100*25;
  const tags=Array.isArray(nd.tags_calculadas)?nd.tags_calculadas:[];
  const uPts=tags.length>=3?20:tags.length>=2?14:8;
  const aPts=nd.abertura_negociacao==='negociavel'?15:nd.abertura_negociacao==='firme_aberto'?8:0;
  return Math.round(dPts+isePts+uPts+aPts);
}

function iseLabel(s){
  if(s>=75)return{label:'1N SÓLIDO',bg:'rgba(5,150,105,0.12)',cor:'#065f46'};
  if(s>=50)return{label:'1N EM DESENVOLVIMENTO',bg:'rgba(180,83,9,0.12)',cor:'#92400e'};
  return{label:'1N FRAGILIZADO',bg:'rgba(185,28,28,0.12)',cor:'#991b1b'};
}

function calcPL(nd){
  const a=nd.ativos_json&&typeof nd.ativos_json==='object'?Object.values(nd.ativos_json).reduce((s,v)=>s+n(v),0):0;
  const p=nd.passivos_json&&typeof nd.passivos_json==='object'?Object.values(nd.passivos_json).reduce((s,v)=>s+n(v),0):0;
  return a-p;
}

function aderMerc(nd){
  const b={'Saúde & Estética':21,'Tecnologia / SaaS':28,'Alimentação':18,'Educação':22,'Comércio / Distribuição':12};
  const bench=b[nd.categoria]||18;
  const m=n(nd.margem_ebitda);
  return m?Math.round(m-bench):null;
}

/* ── FETCH ── */
async function fetchNegocios(){
  const r=await fetch(
    `${SUPA}/rest/v1/negocios?status=eq.publicado`+
    `&select=id,codigo,titulo_anuncio,categoria,cidade,estado,`+
    `faturamento_anual,resultado_liquido_mensal,ebitda,margem_ebitda,`+

    `&titulo_anuncio=not.is.null&preco_pedido=not.is.null&valor_1n=not.is.null`+
    `&order=publicado_em.desc`,
    {headers:{apikey:KEY,Authorization:'Bearer '+KEY}}
  );
  if(!r.ok)throw new Error('fetch');
  return r.json();
}

        <div class="vb-row"><span class="vb-l">Valor efetivo</span><span class="vb-v ink">${brl(efetivo)}</span></div>
      </div>
      <div class="metod">Avaliação 1N independente · EBITDA × múltiplo setorial ajustado · patrimônio calculado sobre ativos e passivos declarados</div>
    </div>`,
  ];
}

/* ── ABRIR CARD ── */
function abrirCard(nd){
  const p=getP(nd.categoria);
  const pl=calcPL(nd);
  const efetivo=n(nd.preco_pedido)-pl;

  const hdr=document.getElementById('expHdr');
  hdr.style.background=p.acc;
  hdr.innerHTML=`
    <div class="exp-handle"></div>
    <button class="btn-fechar" onclick="fechar()">✕</button>
    <div class="exp-meta">${nd.codigo} · ${nd.categoria} · ${nd.cidade}, ${nd.estado}</div>
    <div class="exp-title">${nd.titulo_anuncio}</div>
    <div class="exp-vals">
      <div class="ev"><div class="ev-l">Valor de venda</div><div class="ev-v">${brl(nd.preco_pedido)}</div></div>
      <div class="ev"><div class="ev-l">Valor efetivo</div><div class="ev-v">${brl(efetivo)}</div></div>
      <div class="ev"><div class="ev-l">Aval. 1N</div><div class="ev-v">${brl(nd.valor_1n)}</div></div>
    </div>`;

  const track=document.getElementById('carTrack');
  const slides=buildSlides(nd,p,pl,efetivo);
  track.innerHTML=slides.join('');
  track.style.width=(NS*100)+'%';
  track.querySelectorAll('.slide').forEach(s=>s.style.width=(100/NS)+'%');

  const dots=document.getElementById('carDots');
  dots.innerHTML='';
  for(let i=0;i<NS;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.onclick=()=>goSlide(i);
    dots.appendChild(d);
  }

  document.getElementById('btnInfo').onclick=()=>{
    const msg=encodeURIComponent(`Olá! Vi na 1Negócio [${nd.codigo}] e tenho interesse. Pode me passar mais detalhes?`);
    window.open(`https://wa.me/5548999999999?text=${msg}`,'_blank');
  };

  carCur=0;goSlide(0);
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}

function fechar(){
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow='';
}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)fechar();});

/* ── CARROSSEL ── */
function goSlide(i){
  carCur=Math.max(0,Math.min(NS-1,i));
  document.getElementById('carTrack').style.transform=`translateX(-${carCur*(100/NS)}%)`;
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('on',j===carCur));
  document.getElementById('carLbl').textContent=`${carCur+1} / ${NS}`;
  document.getElementById('carPrev').disabled=carCur===0;
  document.getElementById('carNext').disabled=carCur===NS-1;
}
function carNav(d){goSlide(carCur+d)}
function compartilhar(){
  if(navigator.share)navigator.share({title:'1Negócio',url:window.location.href}).catch(()=>{});
  else{navigator.clipboard?.writeText(window.location.href);alert('Link copiado!');}
}

/* swipe no carrossel */
let sx=0,sy=0;
document.getElementById('expSheet').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.getElementById('expSheet').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)carNav(dx<0?1:-1);
},{passive:true});

/* ── TAGS DE CATEGORIA ── */
const CATS_ORDER=['saude','tech','alim','edu','varejo','ind','serv','outros'];

function buildTagStripe(list){
  /* descobre quais famílias existem nos dados */
  const families=new Set(list.map(x=>{
    const k=(x.categoria||'').toLowerCase().trim();
    return CAT_MAP[k]||'outros';
  }));
  const stripe=document.getElementById('tagStripe');
  /* remove tags anteriores */
  stripe.querySelectorAll('.cat-tag').forEach(t=>t.remove());
  CATS_ORDER.filter(f=>families.has(f)).forEach(f=>{
    const p=PALETA[f];
    const btn=document.createElement('button');
    btn.className='cat-tag';
    btn.dataset.fam=f;
    btn.style.cssText=`background:${p.bg};border-color:${p.bd};color:${p.cor}`;
    btn.textContent=p.label.toUpperCase();
    btn.onclick=()=>filtrarCat(f);
    stripe.appendChild(btn);
  });
}

function filtrarCat(fam){
  catAtiva=fam;
  /* atualiza visual das tags */
  document.getElementById('tagAll').classList.toggle('off',fam!==null);
  document.querySelectorAll('.cat-tag').forEach(t=>{
    t.classList.toggle('on',t.dataset.fam===fam);
  });
  aplicar();
}

/* ── LOCALIZAÇÃO ── */
function buildLoc(list){
  const estados=[...new Set(list.map(x=>x.estado).filter(Boolean))].sort();
  const opts=document.getElementById('locOpts');
  opts.innerHTML='';
  /* TODOS */
  const all=document.createElement('button');
  all.className='loc-opt on';all.textContent='Todos os estados';
  all.onclick=()=>filtrarEstado(null);
  opts.appendChild(all);
  estados.forEach(e=>{
    const b=document.createElement('button');
    b.className='loc-opt';b.textContent=e;b.dataset.est=e;
    b.onclick=()=>filtrarEstado(e);
    opts.appendChild(b);
  });
}

function filtrarEstado(est){
  estadoAtivo=est;
  document.querySelectorAll('.loc-opt').forEach(o=>{
    o.classList.toggle('on',est===null?!o.dataset.est:o.dataset.est===est);
  });
  document.getElementById('locLabel').textContent=est||'Todos os estados';
  fecharLoc();
  aplicar();
}

function abrirLoc(){document.getElementById('locModal').classList.add('on');document.body.style.overflow='hidden'}
function fecharLoc(e){
  if(!e||e.target===document.getElementById('locModal')){
    document.getElementById('locModal').classList.remove('on');
    document.body.style.overflow='';
  }
}

/* ── STATS ── */
function popularStats(list){
  const fat=list.reduce((s,x)=>s+n(x.faturamento_anual),0);
  const val=list.reduce((s,x)=>s+n(x.valor_1n),0);
  const res=list.reduce((s,x)=>s+n(x.resultado_liquido_mensal)*12,0);
  const iseList=list.filter(x=>n(x.score_saude)>0);
  const iseMed=iseList.length?Math.round(iseList.reduce((s,x)=>s+n(x.score_saude),0)/iseList.length):0;
  document.getElementById('sN').textContent=list.length;
  document.getElementById('sFat').innerHTML=`<em>R$ ${brlS(fat)}</em>`;
  document.getElementById('sVal').innerHTML=`<em>R$ ${brlS(val)}</em>`;
  document.getElementById('sRes').innerHTML=`<em>R$ ${brlS(res)}</em>`;
  document.getElementById('sIse').textContent=iseMed;
}

/* ── FILTRAR + ORDENAR ── */
function aplicar(){
  let lista=[...todos];
  if(catAtiva){
    lista=lista.filter(x=>{
      const k=(x.categoria||'').toLowerCase().trim();
      return (CAT_MAP[k]||'outros')===catAtiva;
    });
  }
  if(estadoAtivo){
    lista=lista.filter(x=>x.estado===estadoAtivo);
  }
  /* ordena por IO1N decrescente */
  lista.sort((a,b)=>calcIO(b)-calcIO(a));
  filtrados=lista;
  renderStack();
}

function renderStack(){
  const stack=document.getElementById('stack');
  const cnt=document.getElementById('fCount');
  stack.innerHTML='';
  if(!filtrados.length){
    stack.innerHTML='<p style="text-align:center;font-size:12px;color:rgba(13,43,31,0.3);padding:3rem 0">Nenhum anúncio com estes filtros.</p>';
    cnt.innerHTML='';return;
  }
  cnt.innerHTML=`<strong>${filtrados.length}</strong> anúncio${filtrados.length!==1?'s':''}`;
  filtrados.forEach((nd,i)=>stack.appendChild(buildCard(nd,i)));
}

/* ── INIT ── */
(async()=>{
  try{
    todos=await fetchNegocios();
    /* ordena inicialmente por IO1N */
    todos.sort((a,b)=>calcIO(b)-calcIO(a));
    filtrados=[...todos];
    buildTagStripe(todos);
    buildLoc(todos);
    popularStats(todos);
    renderStack();
  }catch(e){
    document.getElementById('stack').innerHTML=
      '<p style="text-align:center;font-size:12px;color:rgba(13,43,31,0.3);padding:3rem 0">Erro ao carregar. Recarregue a página.</p>';
    console.error(e);
  }
})();
</script>
