<html lang="pt-BR">
<head>

<style>
:root{
  --bg:#080d0a;--bg1:#0e1510;--bg2:#131a14;--bg3:#1a2218;
  --em:#3dff7a;--em-d:rgba(61,255,122,.08);--em-l:rgba(61,255,122,.25);
  --am:#ffb03a;--am-d:rgba(255,176,58,.10);--am-l:rgba(255,176,58,.25);
  --rd:#ff5c5c;--rd-d:rgba(255,92,92,.08);--rd-l:rgba(255,92,92,.25);
  --pu:#a78bfa;--pu-d:rgba(167,139,250,.08);--pu-l:rgba(167,139,250,.25);
  --ink:#f0f5f1;--ink2:#a8b8ac;--ink3:#5a7060;--ink4:#3a4e3e;
  --line:rgba(255,255,255,.05);--line2:rgba(255,255,255,.10);
  --r:8px;--r2:14px;--r3:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--ink);
  font-family:'Cabinet Grotesk',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.022}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(8,13,10,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.02em}
.logo em{color:var(--em);font-style:normal}
.top-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink4);background:var(--bg2);
  border:1px solid var(--line);border-radius:20px;padding:4px 12px}

/* ── PAGE ── */
.page{position:relative;z-index:1;min-height:100vh;padding:70px 16px 120px}
.container{max-width:680px;margin:0 auto}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:16px}
.loading-spinner{width:40px;height:40px;border:2px solid var(--line2);
  border-top-color:var(--em);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);
  letter-spacing:.12em;text-transform:uppercase}

/* ── ERROR ── */
.error-state{text-align:center;padding:60px 20px}
.error-icon{font-size:48px;margin-bottom:16px}
.error-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:8px}
.error-sub{color:var(--ink3);font-size:14px;margin-bottom:24px}
.error-btn{display:inline-block;padding:12px 24px;background:var(--em);color:#080d0a;
  border-radius:var(--r2);font-weight:700;font-size:13px;text-decoration:none}

/* ── HEADER ── */
.laudo-header{margin-bottom:32px}
.laudo-tag{display:inline-flex;align-items:center;gap:6px;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--em);margin-bottom:12px}
.laudo-tag svg{width:14px;height:14px}
.laudo-setor{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink4);margin-bottom:8px}
.laudo-nome{font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(26px,6vw,36px);line-height:1.1;letter-spacing:-.03em;
  color:var(--ink);margin-bottom:6px}
.laudo-local{font-size:14px;color:var(--ink3)}

/* ── RESUMO IA ── */
.resumo-ia{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r2);
  padding:20px;margin-bottom:28px}
.resumo-ia-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--pu);margin-bottom:10px;
  display:flex;align-items:center;gap:6px}
.resumo-ia-text{font-size:14px;line-height:1.7;color:var(--ink2)}

/* ── SECTION ── */
.section{margin-bottom:28px}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--ink4)}
.section-line{flex:1;height:1px;background:var(--line)}

/* ── VALOR CARD ── */
.valor-card{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r2);
  padding:24px;margin-bottom:28px}
.valor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.valor-col{text-align:center}
.valor-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink4);margin-bottom:8px}
.valor-num{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;
  letter-spacing:-.02em}
.valor-col.expectativa .valor-num{color:var(--ink3)}
.valor-col.avaliacao .valor-num{color:var(--em)}
.valor-col.potencial .valor-num{color:var(--pu)}
.valor-sub{font-size:10px;color:var(--ink4);margin-top:4px}

/* ── VALOR DESTAQUE ── */
.valor-destaque{text-align:center;padding:32px 20px;margin-bottom:28px;
  background:linear-gradient(180deg,var(--em-d) 0%,var(--bg1) 100%);
  border:1px solid var(--em-l);border-radius:var(--r3)}
.valor-destaque-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--em);margin-bottom:12px}
.valor-destaque-num{font-family:'Syne',sans-serif;font-weight:800;
  font-size:clamp(42px,10vw,56px);line-height:1;letter-spacing:-.03em;color:var(--ink)}
.valor-destaque-sub{font-size:13px;color:var(--ink3);margin-top:10px}

/* ── TERMÔMETRO ── */
.termo-card{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r2);padding:24px}
.termo-bar{position:relative;height:8px;background:var(--bg3);border-radius:4px;margin:50px 0 60px}
.termo-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--ink4) 0%,var(--em) 50%,var(--pu) 100%)}
.termo-marker{position:absolute;top:-40px;transform:translateX(-50%)}
.termo-marker-line{width:2px;height:50px;margin:0 auto;border-radius:1px}
.termo-marker.expectativa .termo-marker-line{background:var(--ink3)}
.termo-marker.avaliacao .termo-marker-line{background:var(--em)}
.termo-marker.potencial .termo-marker-line{background:var(--pu)}
.termo-marker-label{text-align:center;font-size:10px;color:var(--ink3);margin-top:6px;white-space:nowrap}
.termo-marker-label strong{display:block;font-family:'DM Mono',monospace;font-size:11px;margin-top:2px}
.termo-marker.expectativa .termo-marker-label strong{color:var(--ink3)}
.termo-marker.avaliacao .termo-marker-label strong{color:var(--em)}
.termo-marker.potencial .termo-marker-label strong{color:var(--pu)}
.termo-legend{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.termo-leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3)}
.termo-leg-item .dot{width:8px;height:8px;border-radius:50%}
.termo-leg-item .dot.gray{background:var(--ink4)}
.termo-leg-item .dot.green{background:var(--em)}
.termo-leg-item .dot.purple{background:var(--pu)}

/* ── ISE COCKPIT ── */
.ise-cockpit{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r2);padding:24px}
.ise-cockpit-center{position:relative;width:200px;height:120px;margin:0 auto 16px}
.ise-gauge{width:100%;height:100%}
.ise-cockpit-num{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  font-family:'Syne',sans-serif;font-weight:800;font-size:36px;color:var(--ink)}
.ise-cockpit-label{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:10px;color:var(--ink4)}
.ise-cockpit-class{text-align:center;margin-bottom:20px}
.ise-cockpit-fator{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);margin-top:8px}
.ise-cockpit-fator strong{color:var(--em)}
.ise-cockpit-pilares{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.ise-mini{text-align:center;padding:8px 10px;background:var(--bg2);border-radius:var(--r);min-width:60px}
.ise-mini-val{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:2px}
.ise-mini-val.verde{color:var(--em)}
.ise-mini-val.amarelo{color:var(--am)}
.ise-mini-val.vermelho{color:var(--rd)}
.ise-mini-name{font-size:9px;color:var(--ink4);text-transform:uppercase;letter-spacing:.08em}
.ise-class{padding:6px 14px;border-radius:20px;font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:600}
.ise-class.estruturado{background:var(--em-d);color:var(--em);border:1px solid var(--em-l)}
.ise-class.consolidado{background:var(--em-d);color:var(--em);border:1px solid var(--em-l)}
.ise-class.operacional{background:var(--am-d);color:var(--am);border:1px solid var(--am-l)}
.ise-class.dependente{background:var(--am-d);color:var(--am);border:1px solid var(--am-l)}
.ise-class.embrionario{background:var(--rd-d);color:var(--rd);border:1px solid var(--rd-l)}

/* ── DRE ── */
.dre-toggle{display:flex;gap:4px;margin:0 12px}
.dre-toggle-btn{padding:4px 12px;border:1px solid var(--line2);background:transparent;
  color:var(--ink3);font-size:10px;border-radius:var(--r);cursor:pointer;transition:all .15s}
.dre-toggle-btn.active{background:var(--em-d);border-color:var(--em);color:var(--em)}
.dre-card{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r2);padding:20px}
.dre-header{display:grid;grid-template-columns:1fr 90px 90px;gap:8px;
  padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:8px}
.dre-header span{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink4)}
.dre-header span:not(:first-child){text-align:right}
.dre-row{display:grid;grid-template-columns:1fr 90px 90px;gap:8px;padding:8px 0;
  border-bottom:1px solid var(--line)}
.dre-row:last-child{border-bottom:none}
.dre-row.destaque{background:var(--em-d);margin:0 -20px;padding:10px 20px;border-radius:0}
.dre-row.destaque:last-child{margin-bottom:-20px;border-radius:0 0 var(--r2) var(--r2)}
.dre-label{font-size:12px;color:var(--ink2)}
.dre-row.destaque .dre-label{color:var(--ink);font-weight:600}
.dre-val{font-family:'DM Mono',monospace;font-size:12px;text-align:right}
.dre-val.empresa{color:var(--ink)}
.dre-val.setor{color:var(--ink3)}
.dre-row.destaque .dre-val{font-weight:600}
.dre-row.destaque .dre-val.empresa{color:var(--em)}
.dre-diff{display:inline-block;font-size:9px;padding:2px 6px;border-radius:10px;margin-left:4px}
.dre-diff.up{background:var(--em-d);color:var(--em)}
.dre-diff.down{background:var(--rd-d);color:var(--rd)}
.dre-diff.neutral{background:var(--line);color:var(--ink3)}

/* ── INDICADORES ── */
.ind-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ind-card{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r2);
  padding:14px 16px}
.ind-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ind-name{font-size:11px;color:var(--ink3)}
.ind-status{width:8px;height:8px;border-radius:50%}
.ind-status.verde{background:var(--em)}
.ind-status.amarelo{background:var(--am)}
.ind-status.vermelho{background:var(--rd)}
.ind-val{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--ink)}
.ind-bench{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink4);margin-top:2px}

/* ── BP ── */
.bp-card{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r2);padding:20px}
.bp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.bp-col{text-align:center}
.bp-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink4);margin-bottom:8px}
.bp-val{font-family:'Syne',sans-serif;font-weight:700;font-size:18px}
.bp-val.ativo{color:var(--em)}
.bp-val.passivo{color:var(--rd)}
.bp-val.pl{color:var(--ink)}

/* ── CÁLCULO ── */
.calc-card{background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r2);
  padding:20px;font-family:'DM Mono',monospace}
.calc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;color:var(--ink2)}
.calc-row.total{border-top:1px solid var(--line);padding-top:12px;margin-top:6px;
  font-weight:600;font-size:14px;color:var(--em)}

/* ── OPORTUNIDADES 1SÓCIO ── */
.socio-tag-small{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--pu);background:var(--pu-d);border:1px solid var(--pu-l);
  padding:4px 10px;border-radius:20px;margin-left:12px}
.upside-card{background:var(--bg1);border:1px solid var(--line2);border-radius:var(--r2);
  padding:16px;margin-bottom:10px}
.upside-card.socio{background:linear-gradient(135deg,var(--pu-d) 0%,var(--bg1) 100%);
  border:1px solid var(--pu-l)}
.upside-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.upside-icon{width:32px;height:32px;border-radius:8px;display:flex;
  align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.upside-icon.socio{background:var(--pu-d);border:1px solid var(--pu-l)}
.upside-content{flex:1}
.upside-title{font-weight:700;font-size:13px;color:var(--ink);margin-bottom:4px}
.upside-desc{font-size:12px;color:var(--ink3);line-height:1.5}
.upside-valor{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;
  color:var(--pu);white-space:nowrap}
.upside-periodo{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink4)}
.upside-cta{background:var(--pu-d);border:1px solid var(--pu-l);border-radius:var(--r2);
  padding:16px;margin-top:16px;text-align:center;cursor:pointer;transition:all .15s}
.upside-cta:hover{background:var(--pu-l)}
.upside-cta-text{font-size:13px;color:var(--ink)}
.upside-cta-text strong{color:var(--pu);font-weight:700}
.upside-totais{display:flex;justify-content:center;gap:24px;margin-top:8px}
.upside-totais span{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3)}
.upside-totais strong{color:var(--pu)}

/* ── CTAs ── */
.cta-section{margin-top:40px;padding-top:32px;border-top:1px solid var(--line)}
.cta-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;
  margin-bottom:6px}
.cta-sub{font-size:13px;color:var(--ink3);margin-bottom:20px}
.cta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cta-btn{display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:20px 16px;border-radius:var(--r2);cursor:pointer;transition:all .15s;
  text-decoration:none}
.cta-btn.primary{background:var(--em);color:#080d0a}
.cta-btn.secondary{background:var(--bg1);border:1px solid var(--line2);color:var(--ink)}
.cta-btn:hover{transform:translateY(-2px)}
.cta-label{font-weight:700;font-size:13px;margin-bottom:4px}
.cta-detail{font-size:10px;opacity:.7}

/* ── 1SÓCIO BANNER ── */
.socio-banner{background:linear-gradient(135deg,var(--pu-d) 0%,var(--bg1) 100%);
  border:1px solid var(--pu-l);border-radius:var(--r3);padding:28px;margin-top:28px}
.socio-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--pu);margin-bottom:12px}
.socio-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;
  line-height:1.2;margin-bottom:10px}
.socio-sub{font-size:13px;color:var(--ink2);line-height:1.6;margin-bottom:20px}
.socio-btn{display:inline-block;padding:14px 28px;background:var(--pu);color:#080d0a;
  border-radius:var(--r2);font-weight:700;font-size:13px;text-decoration:none;
  transition:all .15s}
.socio-btn:hover{transform:translateY(-2px)}

/* ── RODAPÉ FIXO ── */
.footer-cta{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(8,13,10,.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--line);padding:14px 20px;
  display:flex;align-items:center;justify-content:center;gap:16px}
.footer-text{font-size:13px;color:var(--ink2)}
.footer-text strong{color:var(--ink);font-weight:700}
.footer-btn{padding:10px 20px;background:var(--em);color:#080d0a;border:none;
  border-radius:var(--r);font-family:'DM Mono',monospace;font-size:11px;
  font-weight:600;letter-spacing:.08em;cursor:pointer;transition:all .15s}
.footer-btn:hover{transform:translateY(-1px)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .valor-grid{grid-template-columns:1fr}
  .valor-col{text-align:left;display:flex;align-items:center;justify-content:space-between;
    padding:12px 0;border-bottom:1px solid var(--line)}
  .valor-col:last-child{border-bottom:none}
  .ise-pilares{grid-template-columns:1fr}
  .dre-header,.dre-row{grid-template-columns:1fr 70px 70px}
  .ind-grid{grid-template-columns:1fr}
  .bp-grid{grid-template-columns:1fr}
  .bp-col{display:flex;justify-content:space-between;padding:10px 0;
    border-bottom:1px solid var(--line)}
  .bp-col:last-child{border-bottom:none}
  .cta-grid{grid-template-columns:1fr}
}
</style>
</head>

async function init(){
  const params = new URLSearchParams(location.search);
  const slug = params.get('lead') || params.get('id');
  
  // Modo de teste: se não tem slug, usa dados mockados
  if(!slug){
    console.log('Modo de teste: usando dados mockados');
    renderLaudo(MOCK_DATA, 'teste-acai-ze');
    document.getElementById('footer-cta').style.display = 'flex';
    document.getElementById('top-tag').textContent = 'Preview de teste';
    return;
  }
  
  try{
    // Buscar dados da sessão
    const r = await fetch(`${SUPA_URL}/functions/v1/diagnostico-sessao?action=load&slug=${slug}`);
    const json = await r.json();
    
    if(!json.found || !json.dados){
      mostrarErro('Laudo não encontrado','Este diagnóstico não existe ou expirou.');
      return;
    }
    
    renderLaudo(json.dados, slug);
    document.getElementById('footer-cta').style.display = 'flex';
    
  }catch(e){
    console.error(e);
    mostrarErro('Erro ao carregar','Tente novamente em alguns instantes.');
  }
}

function mostrarErro(titulo, sub){
  document.getElementById('main-content').innerHTML = `
    <div class="error-state">
      <div class="error-icon">😕</div>
      <div class="error-title">${titulo}</div>
      <div class="error-sub">${sub}</div>
      <a href="/diagnostico" class="error-btn">Fazer diagnóstico →</a>
    </div>`;
}

function renderLaudo(D, slug){
  // Cálculos
  const setor = D.setor || 'outro';
  const faturamento = parseFloat(D.faturamento_mensal||0) * 12;
  const cmv = parseFloat(D.cmv||0) * 12;
  const folha = parseFloat(D.folha_total||0) * 12;
  const despesas = parseFloat(D.despesas_fixas||0) * 12;
  const depreciacao = parseFloat(D.depreciacao||0) * 12;
  const impostos = parseFloat(D.impostos||0) * 12;
  const prolabore = parseFloat(D.prolabore||0) * 12;
  
  const lucroBruto = faturamento - cmv;
  const despesasOp = folha + despesas;
  const ebitda = lucroBruto - despesasOp;
  const lucroLiq = ebitda - depreciacao - impostos;
  
  // ISE
  const ise = calcularISE(D);
  const iseClass = ise>=85?'estruturado':ise>=70?'consolidado':ise>=50?'operacional':ise>=35?'dependente':'embrionario';
  const iseFator = ise>=85?1.5:ise>=70?1.25:ise>=50?1.0:ise>=35?0.75:0.5;
  
  // Valuation
  const multiplo = MULTIPLOS[setor] || 1.5;
  const fator1N = multiplo * iseFator;
  const valorOp = ebitda > 0 ? ebitda * fator1N : 0;
  
  const ativos = parseFloat(D.ativo_imobilizado||0) + parseFloat(D.ativo_estoque||0) + parseFloat(D.ativo_caixa||0);
  const passivos = parseFloat(D.passivo_emprestimos||0) + parseFloat(D.passivo_fornecedores||0) + parseFloat(D.passivo_impostos||0) + parseFloat(D.passivo_trabalhista||0);
  const pl = ativos - passivos;
  
  const valorVenda = valorOp + pl;
  const expectativaDono = parseFloat(D.expectativa_venda) || valorVenda * 1.2;
  const potencial1Socio = valorVenda * 1.35; // Com melhorias
  
  // Benchmarks
  const benchCMV = (BENCH_CMV[setor]||35)/100;
  const benchFolha = (BENCH_FOLHA[setor]||25)/100;
  const cmvPct = faturamento>0 ? cmv/faturamento : 0;
  const folhaPct = faturamento>0 ? folha/faturamento : 0;
  const margemBruta = faturamento>0 ? lucroBruto/faturamento : 0;
  const margemLiq = faturamento>0 ? lucroLiq/faturamento : 0;
  
  // Indicadores implícitos

function renderDRERow(label, val, bench, destaque, diff){
  const diffClass = Math.abs(diff) < 0.02 ? 'neutral' : diff > 0 ? 'up' : 'down';
  const diffLabel = Math.abs(diff) < 0.02 ? '' : (diff > 0 ? '+' : '') + (diff*100).toFixed(1) + '%';
  return `
    <div class="dre-row${destaque?' destaque':''}">
      <span class="dre-label">${label}</span>
      <span class="dre-val empresa">${fmt(val)}</span>
      <span class="dre-val setor">${fmt(bench)}${diffLabel ? `<span class="dre-diff ${diffClass}">${diffLabel}</span>` : ''}</span>
    </div>`;
}

function renderIndicador(nome, val, bench, status){
  return `
    <div class="ind-card">
      <div class="ind-top">
        <span class="ind-name">${nome}</span>
        <span class="ind-status ${status}"></span>
      </div>
      <div class="ind-val">${val}</div>
      <div class="ind-bench">${bench}</div>
    </div>`;
}

function renderOportunidades(D, fat, cmvPct, benchCMV, folhaPct, benchFolha){
  const ops = [];
  
  // CMV acima do benchmark
  if(cmvPct > benchCMV + 0.02){
    const economia = fat * (cmvPct - benchCMV);
    ops.push({
      icon:'📦', title:'Redução de custos variáveis',
      desc:`CMV está ${((cmvPct-benchCMV)*100).toFixed(1)}pp acima da média do setor. Renegociar fornecedores e otimizar compras pode gerar economia significativa.`,
      valor: economia
    });
  }
  
  // Folha acima do benchmark
  if(folhaPct > benchFolha + 0.03){
    const economia = fat * (folhaPct - benchFolha) * 0.5;
    ops.push({
      icon:'👥', title:'Otimização de equipe',
      desc:`Folha representa ${(folhaPct*100).toFixed(1)}% do faturamento vs ${(benchFolha*100).toFixed(0)}% do setor. Automação e redistribuição de funções podem reduzir custos.`,
      valor: economia
    });
  }
  
  // Falta de recorrência
  if(D.recorrencia === 'nenhuma' || D.recorrencia === 'baixa'){
    const potencial = fat * 0.15;
    ops.push({
      icon:'🔄', title:'Modelo de recorrência',
      desc:'Implementar assinaturas ou contratos recorrentes aumenta previsibilidade e valor do negócio.',
      valor: potencial
    });
  }
  
  // Concentração de clientes
  if(D.concentracao_clientes === 'alta'){
    ops.push({
      icon:'📈', title:'Diversificação de carteira',
      desc:'Alta dependência de poucos clientes representa risco. Expandir base pode aumentar múltiplo de avaliação.',
      valor: fat * 0.10
    });
  }
  
  // Pegar top 3
  ops.sort((a,b) => b.valor - a.valor);
  return ops.slice(0,3).map(op => `
    <div class="upside-card socio">
      <div class="upside-top">
        <div class="upside-icon socio">${op.icon}</div>
        <div class="upside-content">
          <div class="upside-title">${op.title}</div>
          <div class="upside-desc">${op.desc}</div>
        </div>
        <div style="text-align:right">
          <div class="upside-valor">+${fmt(op.valor)}</div>
          <div class="upside-periodo">/ano</div>
        </div>
      </div>
    </div>`).join('');
}

function renderOportunidadesSocio(D, fat, cmvPct, benchCMV, folhaPct, benchFolha, upsideTrib){
  const ops = [];
  
  if(cmvPct > benchCMV + 0.02){
    const economia = fat * (cmvPct - benchCMV);
    ops.push({icon:'📦', title:'Redução de custos variáveis', valor: economia});
  }
  if(folhaPct > benchFolha + 0.03){
    const economia = fat * (folhaPct - benchFolha) * 0.5;
    ops.push({icon:'👥', title:'Otimização de equipe', valor: economia});
  }
  if(D.recorrencia === 'nenhuma' || D.recorrencia === 'baixa'){
    ops.push({icon:'🔄', title:'Modelo de recorrência', valor: fat * 0.15});
  }
  if(D.concentracao_clientes === 'alta'){
    ops.push({icon:'📈', title:'Diversificação de carteira', valor: fat * 0.10});
  }
  ops.push({icon:'⚡', title:'Automação de processos', valor: fat * 0.05});
  ops.push({icon:'📱', title:'Presença digital', valor: fat * 0.08});
  
  ops.sort((a,b) => b.valor - a.valor);
  const top3 = ops.slice(0,3);
  const totalOps = ops.length;
  const totalGanho = ops.reduce((s,o)=>s+o.valor, 0) + (upsideTrib||0);
  const valoracaoExtra = totalGanho * 1.5; // Impacto no valuation
  
  let html = top3.map(op => `
    <div class="upside-card socio">
      <div class="upside-top">
        <div class="upside-icon socio">${op.icon}</div>
        <div class="upside-content">
          <div class="upside-title">${op.title}</div>
        </div>
        <div style="text-align:right">
          <div class="upside-valor">+${fmt(op.valor)}</div>
          <div class="upside-periodo">/ano</div>
        </div>
      </div>
    </div>`).join('');
  
  // CTA final
  html += `
    <div class="upside-cta" onclick="window.open('https://wa.me/5511952136406?text=Quero%20saber%20mais%20sobre%20as%20oportunidades%20mapeadas%20no%20meu%20laudo','_blank')">
      <div class="upside-cta-text">Veja mais <strong>${totalOps} oportunidades</strong> mapeadas</div>
      <div class="upside-totais">
        <span>Potencial: <strong>+${fmt(totalGanho)}/ano</strong></span>
        <span>Valorização: <strong>+${fmt(valoracaoExtra)}</strong></span>
      </div>
    </div>`;
  
  return html;
}

// Toggle DRE mensal/anual
let dreMode = 'mensal';
function toggleDRE(mode){
  dreMode = mode;
  document.querySelectorAll('.dre-toggle-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.dre-toggle-btn[onclick*="${mode}"]`).classList.add('active');
  document.querySelectorAll('.dre-val.empresa[data-anual]').forEach(el=>{
    const val = parseFloat(el.dataset[mode]);
    el.textContent = fmt(val);
  });
}

function renderDRERowToggle(label, val, bench, destaque, diff){
  const diffClass = Math.abs(diff) < 0.02 ? 'neutral' : diff > 0 ? 'up' : 'down';
  const diffLabel = Math.abs(diff) < 0.02 ? '' : (diff > 0 ? '+' : '') + (diff*100).toFixed(1) + '%';
  const mensal = val/12;
  const benchMensal = bench/12;
  return `
    <div class="dre-row${destaque?' destaque':''}">
      <span class="dre-label">${label}</span>
      <span class="dre-val empresa" data-anual="${val}" data-mensal="${mensal}">${fmt(mensal)}</span>
      <span class="dre-val setor">${fmt(benchMensal)}${diffLabel ? `<span class="dre-diff ${diffClass}">${diffLabel}</span>` : ''}</span>
    </div>`;
}

function calcularISE(D){
  // Simplificado - em produção viria dos pilares calculados
  const p1 = D.p1 || 5;
  const p2 = D.p2 || 5;
  const p3 = D.p3 || 5;
  const p4 = D.p4 || 5;
  const p5 = D.p5 || 5;
  const p6 = D.p6 || 5;
  const p7 = D.p7 || 5;
  const p8 = D.p8 || 5;
  
  let score = (p1*0.18 + p2*0.15 + p3*0.15 + p4*0.10 + p5*0.10 + p6*0.10 + p7*0.08 + p8*0.05) * 10;
  
  // Trava dupla
  if(p1 < 3 && p2 < 3) score = Math.min(score, 40);
  
  return Math.round(score);
}

function formatarSetor(setor){
  const map = {
    'alimentacao':'Alimentação','varejo':'Varejo','saude':'Saúde',
    'beleza_estetica':'Beleza e Estética','educacao':'Educação',
    'servicos_locais':'Serviços Locais','servicos_empresas':'Serviços B2B',
    'bem_estar':'Bem-estar','hospedagem':'Hospedagem','industria':'Indústria',
    'construcao':'Construção','tech_saas':'Tecnologia/SaaS','outro':'Outros'
  };
  return map[setor] || setor || 'Negócio';
}

function gerarResumoIA(D, setor, fat, ise){
  const porte = fat > 1200000 ? 'médio porte' : fat > 360000 ? 'pequeno porte' : 'microempresa';
  const saude = ise >= 70 ? 'saudável e bem estruturado' : ise >= 50 ? 'com fundamentos sólidos' : 'em fase de desenvolvimento';

  return `Negócio de ${porte} no setor de ${setor.toLowerCase()}, com ${anos} anos de operação. Apresenta estrutura ${saude}, com faturamento anual de ${fmt(fat)}. O Índice de Solidez Empresarial de ${ise}/100 indica ${ise >= 70 ? 'boa maturidade operacional' : ise >= 50 ? 'potencial de crescimento com ajustes pontuais' : 'oportunidades significativas de melhoria'}.`;
}
