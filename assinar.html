<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Assinar documento · 1Negócio</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Cabinet+Grotesk:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f6f7f5;--surface:#ffffff;--surface-2:#f1f3ef;
  --line:rgba(13,43,30,.08);--line-2:rgba(13,43,30,.16);
  --ink:#0d2b1e;--ink-2:#2d5a3d;--ink-3:#4a7c5c;--ink-4:#8aaa96;
  --em:#0aa85a;--em-d:rgba(10,168,90,.10);--em-l:rgba(10,168,90,.30);
  --rd:#c84444;--rd-d:rgba(200,68,68,.08);
  --warn:#dca726;
  --serif:'Syne',sans-serif;--sans:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;min-height:100vh}
.header{padding:20px 24px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:10}
.logo{font-family:var(--serif);font-weight:800;font-size:22px;color:var(--ink);letter-spacing:-.02em}
.logo .em{color:var(--em)}
.container{max-width:720px;margin:0 auto;padding:24px 18px 80px}
.card{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:28px 24px;box-shadow:0 4px 24px rgba(13,43,30,.04)}
.tag{font-family:var(--mono);font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.codigo{font-family:var(--mono);font-size:13px;color:var(--em);font-weight:600;margin-bottom:6px}
.status{display:inline-block;padding:4px 12px;border-radius:999px;font-family:var(--mono);font-size:10px;letter-spacing:.10em;text-transform:uppercase;font-weight:600;margin-left:8px}
.status.pendente,.status.gerado{background:rgba(220,167,38,.12);color:var(--warn)}
.status.enviado,.status.visualizado{background:rgba(10,168,90,.10);color:var(--em)}
.status.assinado{background:var(--em);color:#fff}
.status.cancelado{background:rgba(200,68,68,.10);color:var(--rd)}
.divisor{height:1px;background:var(--line-2);margin:28px 0}
.divisor-titulo{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin:24px 0 14px;display:flex;align-items:center;gap:12px}
.divisor-titulo:before,.divisor-titulo:after{content:'';flex:1;height:1px;background:var(--line-2)}
.doc-box{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:24px;font-family:var(--sans);color:var(--ink);max-height:400px;overflow:auto;font-size:14px;line-height:1.7}
.doc-box h1{font-family:var(--serif);font-weight:800;font-size:20px;margin:0 0 12px;color:var(--ink)}
.doc-box h2{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--em);margin:18px 0 8px}
.doc-box p{margin:8px 0;color:var(--ink-2)}
.doc-box strong{color:var(--ink);font-weight:700}
.doc-box ul,.doc-box ol{padding-left:22px;color:var(--ink-2);margin:8px 0}
.label{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;margin-bottom:6px;display:block}
.input{width:100%;padding:14px 16px;border:1px solid var(--line-2);border-radius:12px;background:var(--surface);color:var(--ink);font-family:var(--sans);font-size:15px;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--em)}
.input.readonly{background:var(--surface-2);color:var(--ink-2);cursor:not-allowed}
.input.codigo-otp{font-family:var(--mono);letter-spacing:.4em;font-size:18px;text-align:center;font-weight:600}
.row{display:flex;gap:8px;align-items:flex-end}
.row > .col{flex:1}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;margin:18px 0;cursor:pointer;user-select:none}
.checkbox-row input[type=checkbox]{margin-top:3px;width:18px;height:18px;accent-color:var(--em);cursor:pointer;flex-shrink:0}
.checkbox-row span{font-size:14px;color:var(--ink-2);line-height:1.5}
.btn{display:block;width:100%;background:var(--em);color:#fff;font-family:var(--serif);font-weight:700;font-size:14px;padding:16px;border-radius:999px;border:none;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;margin-top:8px}
.btn:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
.btn:disabled{background:var(--ink-4);cursor:not-allowed;opacity:.6}
.btn-otp{margin-top:8px;background:var(--ink);color:#fff;padding:12px;font-size:12px;border-radius:10px}
.btn-otp.reenviar{background:transparent;color:var(--ink-3);border:1px solid var(--line-2)}
.btn-otp:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{display:inline-block;background:transparent;color:var(--em);border:1.5px solid var(--em);font-family:var(--serif);font-weight:600;font-size:13px;padding:10px 22px;border-radius:999px;text-decoration:none;cursor:pointer;text-align:center}
.juridico{font-family:var(--mono);font-size:11px;color:var(--ink-4);text-align:center;margin-top:14px;letter-spacing:.04em;line-height:1.5}
.banner{padding:14px 18px;border-radius:12px;margin-bottom:18px;font-family:var(--mono);font-size:12px;line-height:1.5;display:flex;align-items:flex-start;gap:10px}
.banner-ok{background:var(--em-d);border:1px solid var(--em-l);color:var(--em)}
.banner-erro{background:var(--rd-d);border:1px solid rgba(200,68,68,.30);color:var(--rd)}
.banner-info{background:rgba(10,168,90,.06);border:1px solid var(--em-l);color:var(--ink-2)}
.banner strong{font-weight:700}
.dados-box{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;font-family:var(--mono);font-size:11px;color:var(--ink-3);line-height:1.7;margin:16px 0}
.dados-box .lbl{color:var(--ink-4);text-transform:uppercase;letter-spacing:.10em;font-size:9px}
.dados-box .v{color:var(--ink-2);font-weight:500}
.aud{margin-top:18px;padding-top:18px;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;font-family:var(--mono);font-size:11px;color:var(--ink-3);line-height:1.6}
.aud strong{color:var(--ink-2)}
.loading{padding:60px;text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:13px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--line-2);border-top-color:var(--em);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:14px 22px;border-radius:999px;font-family:var(--mono);font-size:12px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:100;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.toast.erro{background:var(--rd)}
.otp-bloco{background:var(--em-d);border:1px solid var(--em-l);border-radius:12px;padding:16px;margin:14px 0}
@media (max-width:520px){.card{padding:22px 18px}.doc-box{padding:18px;max-height:320px}}
</style>
</head>
<body>

<header class="header">
  <div class="container" style="padding:0 18px;display:flex;align-items:center;justify-content:space-between">
    <div class="logo">1<span class="em">Negócio</span></div>
    <a class="btn-sec" href="https://wa.me/5511952136406" target="_blank" rel="noopener">Suporte</a>
  </div>
</header>

<div class="container">
  <div id="root">
    <div class="loading"><div class="spinner"></div><div>Carregando documento...</div></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SB = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

const STATUS_LBL = {
  pendente:'Pendente', gerado:'Pendente', enviado:'Pendente', visualizado:'Aguardando assinatura',
  assinado:'Assinado', em_analise:'Assinado · em análise', aprovado:'Aprovado',
  cancelado:'Cancelado', reprovado:'Recusado'
};

let _doc = null;
let _token = null;
let _otpConfirmado = false;
let _otpTimer = null;
let _ipInfo = { ip: '', cidade: '', estado: '' };

function escapeHtml(s){if(s===null||s===undefined)return '';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderMarkdown(md){
  if(!md) return '<p style="color:var(--ink-4)">Texto não disponível.</p>';
  let html = md.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^\s*-\s+(.+)$/gm,'<li>$1</li>').replace(/(<li>[^]*?<\/li>)/g,'<ul>$1</ul>').replace(/<\/ul>\s*<ul>/g,'');
  html = html.split(/\n\s*\n/).map(b=>{if(b.match(/^\s*<(h1|h2|ul|ol|li)/))return b;return '<p>'+b.trim().replace(/\n/g,'<br>')+'</p>';}).join('\n');
  return html;
}

function showToast(msg, erro=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (erro?' erro':'');
  setTimeout(()=>{t.classList.remove('show');}, 2800);
}

function dataBR(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function dataHoraBR(iso){if(!iso)return '—';return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}

function formatTel(t){
  const d = String(t||'').replace(/\D/g,'');
  if (d.length === 13) return `+${d.slice(0,2)} ${d.slice(2,4)} ${d.slice(4,9)}-${d.slice(9)}`;
  if (d.length === 12) return `+${d.slice(0,2)} ${d.slice(2,4)} ${d.slice(4,8)}-${d.slice(8)}`;
  if (d.length === 11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  return t || '—';
}
function formatCpfMask(v){
  const d = String(v||'').replace(/\D/g,'').slice(0,11);
  return d.replace(/^(\d{3})(\d)/,'$1.$2').replace(/^(\d{3})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1-$2');
}

function detectarDispositivo(){
  const ua = navigator.userAgent;
  let browser = 'Navegador'; let os = 'desconhecido';
  if (/Chrome/.test(ua) && !/Edg/.test(ua)) browser = 'Chrome';
  else if (/Safari/.test(ua) && !/Chrome/.test(ua)) browser = 'Safari';
  else if (/Firefox/.test(ua)) browser = 'Firefox';
  else if (/Edg/.test(ua)) browser = 'Edge';
  if (/iPhone/.test(ua)) os = 'iPhone';
  else if (/iPad/.test(ua)) os = 'iPad';
  else if (/Android/.test(ua)) os = 'Android';
  else if (/Mac OS X/.test(ua)) os = 'macOS';
  else if (/Windows/.test(ua)) os = 'Windows';
  else if (/Linux/.test(ua)) os = 'Linux';
  return `${browser} no ${os}`;
}

async function detectarLocalizacao(){
  try {
    const r = await fetch('https://ipapi.co/json/');
    if (!r.ok) throw new Error('rate limit');
    const j = await r.json();
    return { ip: j.ip || '', cidade: j.city || '', estado: j.region_code || j.region || '' };
  } catch(e) { return { ip: '', cidade: '', estado: '' }; }
}

async function carregar(){
  const params = new URLSearchParams(location.search);
  _token = params.get('token') || params.get('link_token');
  if(!_token){renderErro('Link inválido','Este link não tem o token necessário.');return;}
  try {
    const r = await fetch(`${SB}/functions/v1/assinar-documento?link_token=${encodeURIComponent(_token)}`, { headers: { apikey: AK } });
    if(r.status === 404){renderErro('Documento não encontrado','Verifique o link com quem te enviou.');return;}
    if(!r.ok){renderErro('Erro de carregamento','Não foi possível carregar o documento.');return;}
    const j = await r.json();
    if(!j.ok){renderErro('Erro', j.erro||'Não foi possível carregar.');return;}
    _doc = j;
    // detectar IP/localização em background
    detectarLocalizacao().then(info => { _ipInfo = info; atualizarDadosBox(); });
    renderDoc();
  } catch(e){ renderErro('Erro de rede','Verifique sua conexão e tente novamente.'); }
}

function renderErro(titulo, msg){
  document.getElementById('root').innerHTML = `
    <div class="card">
      <div class="banner banner-erro"><span>⚠</span><div><strong>${escapeHtml(titulo)}</strong><br>${escapeHtml(msg)}</div></div>
      <a class="btn-sec" href="https://wa.me/5511952136406" target="_blank">Falar com a 1Negócio</a>
    </div>`;
}

function renderDoc(){
  const d = _doc;
  const tituloTipo = d.tipo === 'termo' ? `Termo de Adesão · ${(d.formato||'').toUpperCase()}` : 'Termo de Confidencialidade (NDA)';
  const status = d.status;
  const statusLbl = STATUS_LBL[status] || status;
  const cancelado = status === 'cancelado' || status === 'reprovado';
  const assinado = d.ja_assinado;

  let bannerTopo = '';
  if (assinado) {
    bannerTopo = `<div class="banner banner-ok"><span>✓</span><div><strong>Documento assinado em ${dataBR(d.assinado_em)}</strong></div></div>`;
  } else if (cancelado) {
    bannerTopo = `<div class="banner banner-erro"><span>⚠</span><div><strong>Documento ${status==='reprovado'?'recusado':'cancelado'}</strong> · não pode mais ser assinado.</div></div>`;
  }

  const telFmt = formatTel(d.assinante_telefone||'');
  const formAssinatura = (!assinado && !cancelado) ? `
    <div class="divisor-titulo">Assinatura eletrônica</div>

    <label class="label">Nome completo (como no documento de identidade)</label>
    <input class="input" id="assinante" type="text" placeholder="Digite seu nome completo" autocomplete="name" />

    <label class="label" style="margin-top:14px">CPF</label>
    <input class="input" id="cpf" type="text" placeholder="000.000.000-00" inputmode="numeric" maxlength="14" oninput="this.value=formatCpfMask(this.value)" />

    <label class="label" style="margin-top:14px">Telefone para confirmação (WhatsApp)</label>
    <input class="input readonly" id="telefone" value="${escapeHtml(telFmt)}" readonly />

    <div class="otp-bloco" id="otp-bloco">
      <div id="otp-inicio">
        <button class="btn btn-otp" id="btn-enviar-otp" onclick="enviarOTP()">Enviar código por WhatsApp</button>
      </div>
      <div id="otp-form" style="display:none">
        <label class="label">Código de 6 dígitos enviado pra você</label>
        <div class="row">
          <div class="col"><input class="input codigo-otp" id="cod-otp" type="text" inputmode="numeric" maxlength="6" placeholder="••••••" oninput="this.value=this.value.replace(/\\D/g,'')" /></div>
          <button class="btn btn-otp" style="width:auto;margin:0;padding:12px 16px" onclick="verificarOTP()">Confirmar</button>
        </div>
        <button class="btn btn-otp reenviar" id="btn-reenviar" onclick="enviarOTP()" disabled>Reenviar (60s)</button>
      </div>
      <div id="otp-ok" style="display:none">
        <div style="font-family:var(--mono);font-size:12px;color:var(--em);font-weight:600">✓ Código confirmado · você pode assinar agora</div>
      </div>
    </div>

    <label class="checkbox-row">
      <input type="checkbox" id="aceite" />
      <span>Li, entendi e concordo com o termo acima e declaro que as informações são verdadeiras. Minha assinatura digital tem validade jurídica equivalente à manuscrita.</span>
    </label>

    <div class="divisor-titulo">Dados da assinatura</div>
    <div class="dados-box" id="dados-box">
      <div><span class="lbl">Data e hora:</span> <span class="v" id="d-data">—</span></div>
      <div><span class="lbl">IP de origem:</span> <span class="v" id="d-ip">detectando...</span></div>
      <div><span class="lbl">Localização aproximada:</span> <span class="v" id="d-loc">via IP</span></div>
      <div><span class="lbl">Dispositivo:</span> <span class="v" id="d-disp">—</span></div>
    </div>

    <button class="btn" id="btn-assinar" disabled onclick="assinar()">Aceitar e assinar digitalmente</button>
    <p class="juridico">Lei nº 14.063/2020 e MP nº 2.200-2/2001 (ICP-Brasil)</p>
  ` : '';

  const auditoria = (assinado || cancelado) ? `
    <div class="aud">
      ${d.gerado_em ? `<div><strong>Gerado:</strong><br>${dataHoraBR(d.gerado_em)}</div>` : ''}
      ${d.assinado_em ? `<div><strong>Assinado:</strong><br>${dataHoraBR(d.assinado_em)}</div>` : ''}
      <div><strong>Documento:</strong><br>${escapeHtml(d.codigo)}</div>
    </div>
  ` : '';

  document.getElementById('root').innerHTML = `
    <div class="card">
      ${bannerTopo}
      <div class="tag">${escapeHtml(tituloTipo)}</div>
      <div class="codigo">Documento: ${escapeHtml(d.codigo)}<span class="status ${status}">${escapeHtml(statusLbl)}</span></div>
      <div class="doc-box">${renderMarkdown(d.texto_renderizado)}</div>
      ${formAssinatura}
      ${auditoria}
    </div>
  `;

  if (!assinado && !cancelado) {
    atualizarDadosBox();
    const inp = document.getElementById('assinante');
    const cpf = document.getElementById('cpf');
    const cb = document.getElementById('aceite');
    const upd = () => {
      const nomeOk = inp.value.trim().length >= 3;
      const cpfOk = (cpf.value||'').replace(/\D/g,'').length === 11;
      document.getElementById('btn-assinar').disabled = !(nomeOk && cpfOk && _otpConfirmado && cb.checked);
    };
    inp.addEventListener('input', upd);
    cpf.addEventListener('input', upd);
    cb.addEventListener('change', upd);
  }
}

function atualizarDadosBox(){
  const dataEl = document.getElementById('d-data');
  if (!dataEl) return;
  dataEl.textContent = new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) + ' BRT';
  document.getElementById('d-ip').textContent = _ipInfo.ip || 'detectando...';
  const loc = _ipInfo.cidade ? `${_ipInfo.cidade}${_ipInfo.estado?'/'+_ipInfo.estado:''} (via IP)` : 'Não detectada';
  document.getElementById('d-loc').textContent = loc;
  document.getElementById('d-disp').textContent = detectarDispositivo();
}

async function enviarOTP(){
  const tel = (_doc?.assinante_telefone || '').replace(/\D/g,'');
  if (!tel || tel.length < 10) { showToast('Telefone do assinante inválido', true); return; }
  const btn = document.getElementById('btn-enviar-otp');
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando...'; }
  try {
    const r = await fetch(`${SB}/functions/v1/otp-send`, {
      method: 'POST',
      headers: { apikey: AK, 'Content-Type': 'application/json' },
      body: JSON.stringify({ whatsapp: tel })
    });
    const j = await r.json();
    if (!j.ok) {
      if (btn) { btn.disabled = false; btn.textContent = 'Enviar código por WhatsApp'; }
      showToast(j.error || 'Não foi possível enviar', true);
      return;
    }
    document.getElementById('otp-inicio').style.display = 'none';
    document.getElementById('otp-form').style.display = 'block';
    iniciarTimerReenvio();
    showToast('Código enviado · cheque seu WhatsApp/SMS');
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Enviar código por WhatsApp'; }
    showToast('Erro de rede · tente de novo', true);
  }
}

function iniciarTimerReenvio(){
  if (_otpTimer) clearInterval(_otpTimer);
  let s = 60;
  const btn = document.getElementById('btn-reenviar');
  btn.disabled = true; btn.textContent = `Reenviar (${s}s)`;
  _otpTimer = setInterval(() => {
    s--;
    if (s <= 0) { clearInterval(_otpTimer); btn.disabled = false; btn.textContent = 'Reenviar código'; }
    else { btn.textContent = `Reenviar (${s}s)`; }
  }, 1000);
}

async function verificarOTP(){
  const tel = (_doc?.assinante_telefone || '').replace(/\D/g,'');
  const code = document.getElementById('cod-otp').value.trim();
  if (code.length !== 6) { showToast('Código deve ter 6 dígitos', true); return; }
  try {
    const r = await fetch(`${SB}/functions/v1/otp-verify`, {
      method: 'POST',
      headers: { apikey: AK, 'Content-Type': 'application/json' },
      body: JSON.stringify({ whatsapp: tel, codigo: code })
    });
    const j = await r.json();
    if (!j.ok) { showToast(j.error || 'Código inválido', true); return; }
    _otpConfirmado = true;
    document.getElementById('otp-form').style.display = 'none';
    document.getElementById('otp-ok').style.display = 'block';
    if (_otpTimer) clearInterval(_otpTimer);
    showToast('Código confirmado');
    document.getElementById('assinante').dispatchEvent(new Event('input'));
  } catch(e) { showToast('Erro de rede', true); }
}

async function assinar(){
  const nome = document.getElementById('assinante').value.trim();
  const cpf = (document.getElementById('cpf').value||'').replace(/\D/g,'');
  const cb = document.getElementById('aceite');
  if (nome.length < 3) { showToast('Digite seu nome completo', true); return; }
  if (cpf.length !== 11) { showToast('CPF inválido', true); return; }
  if (!_otpConfirmado) { showToast('Confirme o código OTP primeiro', true); return; }
  if (!cb.checked) { showToast('Marque a caixa de aceite', true); return; }
  const btn = document.getElementById('btn-assinar');
  btn.disabled = true; btn.textContent = 'Registrando...';
  try {
    const r = await fetch(`${SB}/functions/v1/assinar-documento`, {
      method: 'POST',
      headers: { apikey: AK, 'Content-Type': 'application/json' },
      body: JSON.stringify({ link_token: _token, assinante_nome: nome, assinante_cpf: cpf, otp_confirmado: true })
    });
    const j = await r.json();
    if (r.status === 409) { showToast('Documento já foi assinado', true); await carregar(); return; }
    if (!j.ok) {
      btn.disabled = false; btn.textContent = 'Aceitar e assinar digitalmente';
      showToast(j.erro || 'Não foi possível assinar', true);
      return;
    }
    showToast('Assinado com sucesso');
    setTimeout(carregar, 600);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Aceitar e assinar digitalmente';
    showToast('Erro de rede · tente de novo', true);
  }
}

carregar();
</script>
