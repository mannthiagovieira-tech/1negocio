<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Assinar documento · 1Negócio</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Cabinet+Grotesk:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f6f7f5;--surface:#ffffff;--surface-2:#f1f3ef;
  --line:rgba(13,43,30,.08);--line-2:rgba(13,43,30,.16);
  --ink:#0d2b1e;--ink-2:#2d5a3d;--ink-3:#4a7c5c;--ink-4:#8aaa96;
  --em:#0aa85a;--em-d:rgba(10,168,90,.10);--em-l:rgba(10,168,90,.30);
  --rd:#c84444;--rd-d:rgba(200,68,68,.08);
  --warn:#dca726;
  --serif:'Syne',sans-serif;--sans:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;min-height:100vh}
.header{padding:20px 24px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:10}
.logo{font-family:var(--serif);font-weight:800;font-size:22px;color:var(--ink);letter-spacing:-.02em}
.logo .em{color:var(--em)}
.container{max-width:720px;margin:0 auto;padding:24px 18px 80px}
.card{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:28px 24px;box-shadow:0 4px 24px rgba(13,43,30,.04)}
.tag{font-family:var(--mono);font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.codigo{font-family:var(--mono);font-size:13px;color:var(--em);font-weight:600;margin-bottom:6px}
.status{display:inline-block;padding:4px 12px;border-radius:999px;font-family:var(--mono);font-size:10px;letter-spacing:.10em;text-transform:uppercase;font-weight:600;margin-left:8px}
.status.pendente,.status.gerado{background:rgba(220,167,38,.12);color:var(--warn)}
.status.enviado,.status.visualizado{background:rgba(10,168,90,.10);color:var(--em)}
.status.assinado{background:var(--em);color:#fff}
.status.cancelado{background:rgba(200,68,68,.10);color:var(--rd)}
.saudacao{font-family:var(--serif);font-weight:700;font-size:24px;color:var(--ink);margin:14px 0 8px;line-height:1.2}
.contexto{color:var(--ink-2);font-size:15px;margin-bottom:24px;line-height:1.6}
.divisor{height:1px;background:var(--line-2);margin:28px 0}
.doc-box{background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:24px;font-family:var(--sans);color:var(--ink);max-height:400px;overflow:auto;font-size:14px;line-height:1.7}
.doc-box h1{font-family:var(--serif);font-weight:800;font-size:20px;margin:0 0 12px;color:var(--ink)}
.doc-box h2{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--em);margin:18px 0 8px}
.doc-box p{margin:8px 0;color:var(--ink-2)}
.doc-box strong{color:var(--ink);font-weight:700}
.doc-box ul,.doc-box ol{padding-left:22px;color:var(--ink-2);margin:8px 0}
.assinatura-titulo{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}
.label{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;margin-bottom:6px;display:block}
.input{width:100%;padding:14px 16px;border:1px solid var(--line-2);border-radius:12px;background:var(--surface);color:var(--ink);font-family:var(--sans);font-size:15px;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--em)}
.checkbox-row{display:flex;align-items:flex-start;gap:10px;margin:18px 0;cursor:pointer;user-select:none}
.checkbox-row input[type=checkbox]{margin-top:3px;width:18px;height:18px;accent-color:var(--em);cursor:pointer;flex-shrink:0}
.checkbox-row span{font-size:14px;color:var(--ink-2);line-height:1.5}
.btn-primario{display:block;width:100%;background:var(--em);color:#fff;font-family:var(--serif);font-weight:700;font-size:14px;padding:16px;border-radius:999px;border:none;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;margin-top:8px}
.btn-primario:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
.btn-primario:disabled{background:var(--ink-4);cursor:not-allowed;opacity:.6}
.btn-sec{display:inline-block;background:transparent;color:var(--em);border:1.5px solid var(--em);font-family:var(--serif);font-weight:600;font-size:13px;padding:10px 22px;border-radius:999px;text-decoration:none;cursor:pointer;text-align:center}
.juridico{font-family:var(--mono);font-size:11px;color:var(--ink-4);text-align:center;margin-top:14px;letter-spacing:.04em;line-height:1.5}
.banner{padding:14px 18px;border-radius:12px;margin-bottom:18px;font-family:var(--mono);font-size:12px;line-height:1.5;display:flex;align-items:flex-start;gap:10px}
.banner-ok{background:var(--em-d);border:1px solid var(--em-l);color:var(--em)}
.banner-erro{background:var(--rd-d);border:1px solid rgba(200,68,68,.30);color:var(--rd)}
.banner strong{font-weight:700}
.banner-ok .icone,.banner-erro .icone{font-size:18px;line-height:1}
.aud{margin-top:18px;padding-top:18px;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;font-family:var(--mono);font-size:11px;color:var(--ink-3);line-height:1.6}
.aud strong{color:var(--ink-2)}
.loading{padding:60px;text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:13px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--line-2);border-top-color:var(--em);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:14px 22px;border-radius:999px;font-family:var(--mono);font-size:12px;box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.toast.erro{background:var(--rd)}
@media (max-width:520px){.card{padding:22px 18px}.saudacao{font-size:20px}.doc-box{padding:18px;max-height:320px}}
</style>
</head>
<body>

<header class="header">
  <div class="container" style="padding:0 18px;display:flex;align-items:center;justify-content:space-between">
    <div class="logo">1<span class="em">Negócio</span></div>
    <a class="btn-sec" href="https://wa.me/5511952136406" target="_blank" rel="noopener">Suporte</a>
  </div>
</header>

<div class="container">
  <div id="root">
    <div class="loading"><div class="spinner"></div><div>Carregando documento...</div></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SB = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

const STATUS_LBL = {
  pendente:'Pendente', gerado:'Pendente', enviado:'Pendente', visualizado:'Aguardando assinatura',
  assinado:'Assinado', em_analise:'Assinado · em análise', aprovado:'Aprovado',
  cancelado:'Cancelado', reprovado:'Recusado'
};

let _doc = null;
let _token = null;

function escapeHtml(s){if(s===null||s===undefined)return '';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderMarkdown(md){
  if(!md) return '<p style="color:var(--ink-4)">Texto não disponível.</p>';
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^\s*-\s+(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[^]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g,'');
  html = html.split(/\n\s*\n/).map(b => {
    if (b.match(/^\s*<(h1|h2|ul|ol|li)/)) return b;
    return '<p>' + b.trim().replace(/\n/g,'<br>') + '</p>';
  }).join('\n');
  return html;
}

function showToast(msg, erro=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (erro?' erro':'');
  setTimeout(()=>{t.classList.remove('show');}, 2800);
}

function dataBR(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function dataHoraBR(iso){if(!iso)return '—';return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}

async function carregar(){
  const params = new URLSearchParams(location.search);
  _token = params.get('token') || params.get('link_token');
  if(!_token){
    renderErro('Link inválido', 'Este link não tem o token necessário. Verifique com quem te enviou.');
    return;
  }
  try {
    const r = await fetch(`${SB}/functions/v1/assinar-documento?link_token=${encodeURIComponent(_token)}`, {
      headers: { apikey: AK }
    });
    if(r.status === 404){
      renderErro('Documento não encontrado', 'Verifique o link com quem te enviou.');
      return;
    }
    if(!r.ok){
      renderErro('Erro de carregamento', 'Não foi possível carregar o documento. Tente recarregar a página.');
      return;
    }
    const j = await r.json();
    if(!j.ok){renderErro('Erro', j.erro||'Não foi possível carregar.');return;}
    _doc = j;
    renderDoc();
  } catch(e){
    renderErro('Erro de rede', 'Verifique sua conexão e tente novamente.');
  }
}

function renderErro(titulo, msg){
  document.getElementById('root').innerHTML = `
    <div class="card">
      <div class="banner banner-erro"><span class="icone">⚠</span><div><strong>${escapeHtml(titulo)}</strong><br>${escapeHtml(msg)}</div></div>
      <a class="btn-sec" href="https://wa.me/5511952136406" target="_blank">Falar com a 1Negócio</a>
    </div>
  `;
}

function renderDoc(){
  const d = _doc;
  const tituloTipo = d.tipo === 'termo' ? `Termo de Adesão · ${(d.formato||'').toUpperCase()}` : 'Termo de Confidencialidade (NDA)';
  const status = d.status;
  const statusLbl = STATUS_LBL[status] || status;
  const cancelado = status === 'cancelado' || status === 'reprovado';
  const assinado = d.ja_assinado;

  let bannerTopo = '';
  if (assinado) {
    bannerTopo = `<div class="banner banner-ok"><span class="icone">✓</span><div><strong>Documento assinado em ${dataBR(d.assinado_em)}</strong>${d.assinante_nome?` · por ${escapeHtml(d.assinante_nome)}`:''}</div></div>`;
  } else if (cancelado) {
    bannerTopo = `<div class="banner banner-erro"><span class="icone">⚠</span><div><strong>Documento ${status==='reprovado'?'recusado':'cancelado'}</strong> · não pode mais ser assinado.</div></div>`;
  }

  const formAssinatura = (!assinado && !cancelado) ? `
    <div class="divisor"></div>
    <div class="assinatura-titulo">Assinatura eletrônica</div>
    <label class="label">Nome completo (como assinatura)</label>
    <input class="input" id="assinante" type="text" placeholder="Digite seu nome completo" autocomplete="name" />
    <label class="checkbox-row">
      <input type="checkbox" id="aceite" />
      <span>Li, entendi e concordo com o termo acima. Minha assinatura digital tem validade jurídica equivalente à manuscrita.</span>
    </label>
    <button class="btn-primario" id="btn-assinar" disabled onclick="assinar()">Aceitar e assinar digitalmente</button>
    <p class="juridico">Lei nº 14.063/2020 e MP nº 2.200-2/2001 (ICP-Brasil)</p>
  ` : '';

  const auditoria = (assinado || cancelado) ? `
    <div class="aud">
      ${d.gerado_em ? `<div><strong>Gerado:</strong><br>${dataHoraBR(d.gerado_em)}</div>` : ''}
      ${d.assinado_em ? `<div><strong>Assinado:</strong><br>${dataHoraBR(d.assinado_em)}</div>` : ''}
      <div><strong>Documento:</strong><br>${escapeHtml(d.codigo)}</div>
    </div>
  ` : '';

  document.getElementById('root').innerHTML = `
    <div class="card">
      ${bannerTopo}
      <div class="tag">${escapeHtml(tituloTipo)}</div>
      <div class="codigo">Documento: ${escapeHtml(d.codigo)}<span class="status ${status}">${escapeHtml(statusLbl)}</span></div>
      <div class="doc-box">${renderMarkdown(d.texto_renderizado)}</div>
      ${formAssinatura}
      ${auditoria}
    </div>
  `;

  if (!assinado && !cancelado) {
    const inp = document.getElementById('assinante');
    const cb = document.getElementById('aceite');
    const btn = document.getElementById('btn-assinar');
    const upd = () => { btn.disabled = !(inp.value.trim().length >= 3 && cb.checked); };
    inp.addEventListener('input', upd);
    cb.addEventListener('change', upd);
  }
}

async function assinar(){
  const nome = document.getElementById('assinante').value.trim();
  const cb = document.getElementById('aceite');
  if (nome.length < 3) { showToast('Digite seu nome completo', true); return; }
  if (!cb.checked) { showToast('Marque a caixa de aceite', true); return; }
  const btn = document.getElementById('btn-assinar');
  btn.disabled = true; btn.textContent = 'Registrando...';
  try {
    const r = await fetch(`${SB}/functions/v1/assinar-documento`, {
      method: 'POST',
      headers: { apikey: AK, 'Content-Type': 'application/json' },
      body: JSON.stringify({ link_token: _token, assinante_nome: nome })
    });
    const j = await r.json();
    if (r.status === 409) {
      showToast('Documento já foi assinado', true);
      await carregar();
      return;
    }
    if (!j.ok) {
      btn.disabled = false; btn.textContent = 'Aceitar e assinar digitalmente';
      showToast(j.erro || 'Não foi possível assinar', true);
      return;
    }
    showToast('Assinado com sucesso');
    setTimeout(carregar, 600);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Aceitar e assinar digitalmente';
    showToast('Erro de rede · tente de novo', true);
  }
}

carregar();
</script>

</body>
</html>
