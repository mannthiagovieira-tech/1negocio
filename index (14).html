<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Cabinet Grotesk',sans-serif;background:linear-gradient(160deg,#e4f0e7 0%,#f2f7f3 55%,#ebf4ed 100%);height:100dvh;max-width:420px;margin:0 auto;color:#0d2b1e;display:flex;flex-direction:column;overflow:hidden}

/* 1 — TOPBAR: logo + CTA */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 16px 7px;background:rgba(255,255,255,.65);border-bottom:.5px solid rgba(13,43,30,.07)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.02em;color:#0d2b1e}
.logo em{color:#1a7a3c;font-style:normal}
.btn-avaliar{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;padding:8px 13px;border-radius:20px;background:#1a7a3c;color:#fff;border:none;cursor:pointer;white-space:nowrap;box-shadow:0 2px 10px rgba(26,122,60,.3);-webkit-tap-highlight-color:transparent}
.btn-avaliar:active{transform:scale(.97)}

/* 2 — TICKER BLOOMBERG */
.ticker{height:24px;flex-shrink:0;background:rgba(13,43,30,.05);border-bottom:.5px solid rgba(13,43,30,.07);overflow:hidden;position:relative}
.ticker::before,.ticker::after{content:'';position:absolute;top:0;bottom:0;width:20px;z-index:2;pointer-events:none}
.ticker::before{left:0;background:linear-gradient(to right,rgba(226,240,229,1),transparent)}
.ticker::after{right:0;background:linear-gradient(to left,rgba(226,240,229,1),transparent)}
.ticker-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:tickscroll 28s linear infinite}
@keyframes tickscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:5px;padding:0 13px;border-right:.5px solid rgba(13,43,30,.08);height:100%;flex-shrink:0}
.ti-l{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:rgba(13,43,30,.35)}
.ti-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:11px;color:#0d2b1e}
.ti-v.g{color:#1a7a3c}

/* 3 — STRIPE GRANDES NÚMEROS */
.stripe{flex-shrink:0;background:rgba(255,255,255,.5);border-bottom:.5px solid rgba(13,43,30,.07);padding:7px 16px;display:flex;align-items:center}
.stripe-nums{display:flex;align-items:center;width:100%;justify-content:space-around}
.sn{display:flex;flex-direction:column;align-items:center;gap:1px}
.sn-v{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:-.02em;color:#0d2b1e;line-height:1}
.sn-l{font-family:'DM Mono',monospace;font-size:6.5px;text-transform:uppercase;letter-spacing:.08em;color:rgba(13,43,30,.3)}
.sdiv{width:.5px;height:22px;background:rgba(13,43,30,.1);flex-shrink:0}

/* 4 — FILTROS */
.hdr{padding:7px 16px 0;flex-shrink:0}
.hdr-top{display:none}
.filter-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:5px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.f-chip{flex-shrink:0;font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.04em;padding:4px 12px;border-radius:20px;border:1.5px solid rgba(13,43,30,.1);background:rgba(255,255,255,.5);color:#5a9a6e;cursor:pointer;white-space:nowrap;transition:all .15s}
.f-chip.on{background:rgba(13,43,30,.15);color:#0d2b1e;border-color:rgba(13,43,30,.4)}
.estado-row{display:flex;gap:4px;overflow-x:auto;padding-bottom:7px;-webkit-overflow-scrolling:touch}
.estado-row::-webkit-scrollbar{display:none}
.e-chip{flex-shrink:0;font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:8px;border:.5px solid rgba(13,43,30,.1);background:transparent;color:#8ab89a;cursor:pointer;white-space:nowrap;transition:all .15s}
.e-chip.on{background:rgba(13,43,30,.1);color:#0d2b1e;border-color:rgba(13,43,30,.3)}
.hdr-div{height:.5px;background:rgba(13,43,30,.07)}

/* ÁREA DE CARDS */
.car-area{flex:1;min-height:0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.car-area::before,.car-area::after{content:'';position:absolute;top:0;bottom:0;width:68px;z-index:20;pointer-events:none}
.car-area::before{left:0;background:linear-gradient(to right,rgba(228,240,231,1) 0%,rgba(228,240,231,.8) 40%,transparent 100%)}
.car-area::after{right:0;background:linear-gradient(to left,rgba(228,240,231,1) 0%,rgba(228,240,231,.8) 40%,transparent 100%)}
.car-track{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}

/* CARD */
.c-card{position:absolute;width:calc(100vw - 96px);max-width:294px;height:calc(100dvh - 285px);min-height:360px;max-height:560px;background:#0d2b1e;border-radius:24px;overflow:hidden;cursor:pointer;transition:transform .35s cubic-bezier(.34,1.2,.64,1),box-shadow .35s ease,opacity .35s ease;opacity:.35;transform:scale(.84);box-shadow:none;will-change:transform}
.c-card.active{opacity:1;transform:scale(1);box-shadow:0 28px 72px rgba(13,43,30,.32),0 6px 20px rgba(13,43,30,.18)}

/* VIEWS DO CARD */
.card-view{padding:0;display:flex;flex-direction:column;height:100%;overflow:hidden}
.card-view::-webkit-scrollbar{display:none}
.card-view.hidden{display:none}

.cc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.cc-code{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.26);line-height:1.5}
.cc-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.cc-ise{font-family:'DM Mono',monospace;font-size:7.5px;color:#a8d5b5;background:rgba(168,213,181,.12);padding:2px 8px;border-radius:8px;white-space:nowrap}
.cc-data{font-family:'DM Mono',monospace;font-size:7px;color:rgba(255,255,255,.2)}

.cc-title{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;text-transform:uppercase;line-height:1.2;color:#fff;margin-bottom:4px}
.cc-loc{font-family:'DM Mono',monospace;font-size:8.5px;color:rgba(255,255,255,.24);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.cc-price-lbl{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.22);margin-bottom:3px}
.cc-price{font-family:'Syne',sans-serif;font-weight:800;font-size:42px;letter-spacing:-.04em;line-height:1;color:#fff;display:flex;align-items:baseline;gap:3px;margin-bottom:6px}
.cc-rs{font-size:18px;font-weight:700;color:rgba(255,255,255,.36)}
.cc-delta{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:11px;margin-bottom:auto}
.cc-delta.up{background:rgba(168,213,181,.15);color:#a8d5b5}
.cc-delta.dn{background:rgba(245,200,66,.1);color:#f5c842}
.cc-delta.eq{background:rgba(255,255,255,.06);color:rgba(255,255,255,.3)}
.cc-sep{width:100%;height:.5px;background:rgba(255,255,255,.07);margin:12px 0 10px}
.cc-kpis{display:flex}
.ck{flex:1;display:flex;flex-direction:column;gap:2px;padding-right:8px;border-right:.5px solid rgba(255,255,255,.07)}
.ck:last-child{border-right:none;padding-right:0}.ck+.ck{padding-left:8px}
.ck-l{font-family:'DM Mono',monospace;font-size:6.5px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.22)}
.ck-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:13px;color:#fff;letter-spacing:-.02em;line-height:1}
.ck-v.g{color:#a8d5b5}

.sec-ttl{font-family:'Syne',sans-serif;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:rgba(255,255,255,.35);margin-bottom:9px}
.r{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.06)}
.r:last-of-type{border-bottom:none}
.r.tot{border-top:.5px solid rgba(255,255,255,.1);padding-top:9px;margin-top:2px}
.r-l{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.34);letter-spacing:.02em}
.r-l.i{padding-left:10px;font-size:8px;color:rgba(255,255,255,.2)}
.r-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:12px;color:#fff}
.r-v.g{color:#a8d5b5;font-weight:800}
.r-v.rr{color:#f5a280}
.r-v.big{font-size:20px;font-weight:800}

.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.cgc{background:rgba(255,255,255,.05);border-radius:10px;padding:10px 11px}
.cgc-l{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.26);margin-bottom:2px}
.cgc-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:18px;color:#fff;letter-spacing:-.02em;line-height:1}
.cgc-v.g{color:#a8d5b5}

.ise-num{font-family:'Syne',sans-serif;font-weight:800;font-size:48px;letter-spacing:-.04em;line-height:1;color:#fff;margin-bottom:1px}
.ise-lbl{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:#a8d5b5;margin-bottom:8px}
.ise-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-bottom:11px}
.ise-fill{height:100%;background:linear-gradient(90deg,#a8d5b5,#3DFF7A);border-radius:2px}
.pilar{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid rgba(255,255,255,.05)}
.pilar:last-child{border-bottom:none}
.pilar-n{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,.34)}
.pilar-peso{font-size:7px;color:rgba(255,255,255,.18);margin-left:3px}
.pilar-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:12px}
.pilar-v.g{color:#a8d5b5}.pilar-v.a{color:#f5c842}.pilar-v.rr{color:#f5a280}

.ind-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.05)}
.ind-row:last-child{border-bottom:none}
.ind-l{display:flex;flex-direction:column;gap:1px}
.ind-nome{font-family:'DM Mono',monospace;font-size:8.5px;color:rgba(255,255,255,.34);letter-spacing:.02em}
.ind-desc{font-size:8.5px;color:rgba(255,255,255,.18);line-height:1.4;max-width:155px}
.ind-r{text-align:right;flex-shrink:0;padding-left:8px}
.ind-val{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:14px;line-height:1}
.ind-tag{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.06em;padding:2px 6px;border-radius:6px;display:inline-block;margin-top:2px}
.ind-tag.g{background:rgba(168,213,181,.15);color:#a8d5b5}
.ind-tag.a{background:rgba(245,200,66,.12);color:#f5c842}
.ind-tag.rr{background:rgba(245,162,128,.12);color:#f5a280}

.ups-row{padding:6px 0;border-bottom:.5px solid rgba(255,255,255,.05)}
.ups-row:last-child{border-bottom:none}
.ups-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.ups-nome{font-family:'Cabinet Grotesk',sans-serif;font-weight:700;font-size:11px;color:#fff}
.ups-val{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:10px;color:#a8d5b5;white-space:nowrap;padding-left:6px}
.ups-desc{font-size:8.5px;color:rgba(255,255,255,.28);line-height:1.4}

/* novos elementos view visão */

.cc-price2{font-family:'Syne',sans-serif;font-weight:800;font-size:34px;letter-spacing:-.04em;line-height:1;color:#fff;display:flex;align-items:baseline;gap:3px;margin-bottom:6px}
.cc-rs2{font-size:16px;font-weight:700;color:rgba(255,255,255,.36)}
/* stripe comparativa */
.stripe-comp{margin-bottom:0}
.stripe-bar{position:relative;height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:5px}
.sbar-fill{position:absolute;top:-3px;width:3px;height:9px;border-radius:2px;transform:translateX(-50%)}
.sbar-ped{background:rgba(245,200,66,.8)}
.sbar-1n{background:#a8d5b5}
.stripe-labels{display:flex;justify-content:space-between}
.sl{display:flex;flex-direction:column;align-items:center;gap:0}
.sl-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:11px;letter-spacing:-.01em;line-height:1}
.sl-l{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.22)}
/* equação de valor */
.cc-eq{display:flex;align-items:center;justify-content:space-between;gap:2px}
.eq-item{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.eq-l{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.22)}
.eq-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:13px;color:#fff;letter-spacing:-.01em;line-height:1}
.eq-v.g{color:#a8d5b5}
.eq-op{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:rgba(255,255,255,.2);flex-shrink:0;margin:0 1px}



/* localização + código no rodapé do cabeçalho */
.cc-loc-row{display:flex;align-items:center;gap:5px;margin-bottom:10px;margin-top:1px}
.cc-loc-row span{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.06em}
.cc-code-pill{margin-left:auto;font-family:'DM Mono',monospace;font-size:7.5px;color:rgba(255,255,255,.18);background:rgba(255,255,255,.05);padding:2px 7px;border-radius:6px;letter-spacing:.06em;white-space:nowrap}

/* bloco de valores: pedido sólido + aval 1N sombreada */
.val-block{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px}
.val-main{display:flex;flex-direction:column;gap:1px}
.val-shadow{display:flex;flex-direction:column;gap:1px}
.val-lbl{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.22);margin-bottom:1px}
.val-num{font-family:'Syne',sans-serif;font-weight:800;line-height:1;color:#fff;display:flex;align-items:baseline;gap:2px}
.val-num > :first-child{font-size:14px;color:rgba(255,255,255,.4)}
.val-num span{font-size:30px;letter-spacing:-.04em}
.val-num-dim{font-family:'Syne',sans-serif;font-weight:800;line-height:1;color:rgba(255,255,255,.22);display:flex;align-items:baseline;gap:2px}
.val-num-dim > :first-child{font-size:12px}
.val-num-dim span{font-size:22px;letter-spacing:-.04em}
.val-div{width:.5px;height:36px;background:rgba(255,255,255,.08);align-self:flex-end;margin-bottom:4px;flex-shrink:0}

/* equação de valor */
.eq-box{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.04);border-radius:10px;padding:8px 10px;margin-bottom:8px}





/* ═══ CARD VISÃO ═══ */
.card-view{padding:0;display:flex;flex-direction:column;height:100%;overflow:hidden}

.crd{
  display:flex;flex-direction:column;
  height:100%;
  padding:16px 18px 15px;
  gap:10px;
}

/* linha 1: localização · código */
.crd-line1{display:flex;align-items:center;justify-content:space-between}
.crd-loc{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3)}
.crd-loc svg{color:rgba(255,255,255,.25);flex-shrink:0}
.crd-codigo{font-family:'DM Mono',monospace;font-size:8px;color:rgba(255,255,255,.2);letter-spacing:.08em}

/* bloco título */
.crd-titulo-bloco{
  background:rgba(255,255,255,.05);
  border-radius:10px;
  padding:11px 13px;
  flex-shrink:0;
}
.crd-titulo{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:16px;text-transform:uppercase;
  line-height:1.15;color:#fff;letter-spacing:.01em;
}

/* valores lado a lado */
.crd-valores{
  display:flex;align-items:stretch;
  background:rgba(255,255,255,.05);
  border-radius:10px;
  overflow:hidden;
  flex-shrink:0;
}
.crd-val-col{flex:1;padding:10px 13px;display:flex;flex-direction:column;gap:3px}
.crd-val-col-right{align-items:flex-end}
.crd-val-divider{width:.5px;background:rgba(255,255,255,.08);flex-shrink:0}
.crd-val-lbl{font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.28)}
.crd-val-num{font-family:'Syne',sans-serif;font-weight:800;line-height:1;color:#fff;display:flex;align-items:baseline;gap:2px}
.crd-val-num > :not(strong){font-size:10px;color:rgba(255,255,255,.35);font-weight:700}
.crd-val-num strong{font-size:clamp(14px,4.5vw,20px);letter-spacing:-.04em}
.crd-val-dim{color:rgba(255,255,255,.25)}
.crd-val-dim > :not(strong){color:rgba(255,255,255,.15)!important}
.crd-val-dim strong{color:rgba(255,255,255,.22)!important}

/* barra de delta */
.crd-delta-bar{
  display:flex;align-items:center;justify-content:center;gap:4px;
  border-radius:8px;padding:8px 12px;
  font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:12px;
  flex-shrink:0;letter-spacing:-.01em;
}
.crd-delta-bar.up{background:rgba(168,213,181,.12);color:#a8d5b5;border:1px solid rgba(168,213,181,.15)}
.crd-delta-bar.dn{background:rgba(245,200,66,.1);color:#f5c842;border:1px solid rgba(245,200,66,.15)}
.crd-delta-bar.eq{background:rgba(255,255,255,.05);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.08)}
.crd-delta-sinal{font-size:10px}



/* descrição do negócio */
.crd-desc{
  font-family:'DM Mono',monospace;
  font-size:8.5px;line-height:1.6;
  color:rgba(255,255,255,.32);
  letter-spacing:.02em;
  flex-shrink:0;
}

/* linhas de dados */
.crd-dados{display:flex;align-items:center;flex:1}
.crd-dado{flex:1;display:flex;align-items:baseline;gap:6px}
.crd-dado-v{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.01em;line-height:1}
.crd-dado-v.crd-g{color:#a8d5b5}
.crd-dado-l{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.22)}
.crd-dado-sep{width:.5px;height:20px;background:rgba(255,255,255,.08);flex-shrink:0;margin:0 12px}



/* ═══ FIM CARD VISÃO ═══ */

/* ═══ GRID 2×4 DE DADOS ═══ */
.crd-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  border:.5px solid rgba(255,255,255,.08);
  border-radius:10px;
  overflow:hidden;
  flex-shrink:0;
  margin-top:auto;
}
.crd-cell{
  padding:9px 12px;
  display:flex;flex-direction:column;gap:2px;align-items:center;text-align:center;
  border-right:.5px solid rgba(255,255,255,.07);
  border-bottom:.5px solid rgba(255,255,255,.07);
}
.crd-cell:nth-child(even){border-right:none}

<script>
const brl=v=>v>=1e6?'R$'+(v/1e6).toFixed(1)+'M':v>=1e3?'R$'+Math.round(v/1e3)+'k':'R$'+v;

// Dados carregados do Supabase em tempo real
let RAW = [];

const SUPABASE_URL = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

// Categoria → tipo de negócio legível
const catTipo = {
  'Tecnologia / SaaS': 'Tecnologia',
  'Tecnologia': 'Tecnologia',
  'Saúde & Estética': 'Saúde',
  'Saúde': 'Saúde',
  'Alimentação': 'Alimentação',
  'Educação': 'Educação',
  'Serviços': 'Serviços',
  'Varejo & Moda': 'Varejo',
  'Indústria': 'Indústria',
};

// cat → filtro chip
const catChip = {
  'Tecnologia / SaaS': 'tech',
  'Tecnologia': 'tech',
  'Saúde & Estética': 'saude',
  'Saúde': 'saude',
  'Alimentação': 'alim',
  'Educação': 'edu',
  'Serviços': 'serv',
  'Varejo & Moda': 'varejo',
  'Indústria': 'ind',
};

async function loadNegocios() {
  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/negocios' +
      '?select=codigo,titulo_anuncio,categoria,cidade,estado,' +
      'faturamento_anual,margem_ebitda,resultado_liquido_mensal,' +
      'score_saude,valor_1n,preco_pedido,patrimonio_liquido,' +
      'recorrencia_pct,anos_existencia,num_funcionarios,' +
      'modelo_negocio,descricao,upsides_json,avaliacao_finalizada_em' +
      '&status=eq.publicado' +
      '&vendedor_id=neq.aaaaaaaa-0000-0000-0000-000000000001' +
      '&titulo_anuncio=not.is.null' +
      '&preco_pedido=not.is.null' +
      '&order=score_saude.desc.nullslast' +
      '&limit=40',
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
    );
    const data = await res.json();

    RAW = data.map(d => {
      const fat = parseFloat(d.faturamento_anual) || 0;
      const margem = parseFloat(d.margem_ebitda) || 20;
      const rlm = parseFloat(d.resultado_liquido_mensal) || Math.round(fat * margem/100 / 12);
      const preco = parseFloat(d.preco_pedido) || 0;
      const aval = parseFloat(d.valor_1n) || Math.round(preco * 1.18);
      const ise = d.score_saude || 60;
      const delta = aval > 0 ? Math.round((aval - preco) / aval * 100) : 0;
      const pl = parseFloat(d.patrimonio_liquido) || 0;
      const rec = parseFloat(d.recorrencia_pct) || 0;
      const anos = d.anos_existencia || 0;
      const funcs = d.num_funcionarios || 0;
      const cat = d.categoria || 'Serviços';
      const tipo = catTipo[cat] || cat;
      const catKey = catChip[cat] || 'serv';
      const iseNome = ise>=80?'Sólido':ise>=65?'Estável':ise>=50?'Operacional':ise>=30?'Em desenvolvimento':'Fragilizado';

      // upsides do banco ou fallback
      let ups = [];
      if (d.upsides_json && Array.isArray(d.upsides_json) && d.upsides_json.length > 0) {
        ups = d.upsides_json.map(u => ({
          n: u.titulo || u.n || 'Upside identificado',
          v: u.ganho_mensal ? '+R$' + Math.round(u.ganho_mensal/1000) + 'k/mês' : (u.v || '+R$10k/mês'),
          d: u.descricao || u.d || ''
        }));
      } else {
        // upsides estimados
        ups = [
          {n:'Expansão de canais', v:'+R$' + Math.round(fat*0.03/1000/12) + 'k/mês', d:'Oportunidade de crescimento via novos canais.'},
          {n:'Redução de custos', v:'+R$' + Math.round(fat*0.02/1000/12) + 'k/mês', d:'Otimização operacional identificada.'},
          {n:'Upsell para base atual', v:'+R$' + Math.round(fat*0.015/1000/12) + 'k/mês', d:'Oferta complementar para clientes existentes.'},
        ];
      }

      // destaque e highlights
      const dest = rec >= 50 ? rec + '% recorrente' :
                   funcs > 0 ? funcs + ' funcionários' :
                   margem > 30 ? 'Margem ' + margem + '%' : tipo + ' — ' + iseNome;

      // data de avaliação
      const avData = d.avaliacao_finalizada_em
        ? new Date(d.avaliacao_finalizada_em).toLocaleDateString('pt-BR')
        : 'Em avaliação';

      return {
        id: d.codigo || '1N-???',
        t: d.titulo_anuncio,
        cat: catKey,
        preco: preco,
        aval: aval,
        fat: fat,
        margem: Math.round(margem),
        ise: ise,
        cidade: d.cidade || '—',
        est: d.estado || '—',
        delta: delta,
        rec: Math.round(rec),
        ebitda: Math.round(fat * margem / 100),
        rlm: rlm,
        avaliado: avData,
        bench_ro: margem > 25 ? Math.round(margem * 0.8) : 20,
        ciclo: delta > 15 ? '-5 dias' : '10 dias',
        ncg: Math.round(fat * 0.05),
        dtro: pl > 0 ? 0.5 : 1.2,
        cob_caixa: ise >= 75 ? 3.2 : 1.8,
        conc: 15,
        pl: Math.round(pl/1000),
        dest: dest,
        tempo: anos,
        funcs: funcs || '—',
        tipo: tipo,
        desc: d.descricao || tipo + ' com ' + anos + ' anos de operação em ' + (d.cidade || '—') + '. Faturamento anual de R$' + Math.round(fat/1000) + 'k.',
        ups: ups,
      };
    });

    // rankear por oportunidade
    RAW.sort((a, b) => scoreOpp(b) - scoreOpp(a));

  } catch(e) {
    console.error('Erro ao carregar negócios:', e);
    RAW = [];
  }
}

const scoreOpp=d=>d.delta*2.2+d.ise*.5+d.margem*.3+d.rec/10;
const DATA_COMPUTED=()=>[...RAW]; // já ordenado pelo loadNegocios
let activeCat='todos',activeEst='todos',activeIdx=0,activeSec='visao';
let filtered=[...DATA_COMPUTED()];

function buildTicker(){
  const items=[{l:'Volume avaliado',v:'R$ 56,7M',g:1},{l:'Resultado anual',v:'R$ 18,8M',g:1},{l:'ISE médio',v:'81/100',g:1},{l:'Oportunidades ativas',v:'8',g:1},{l:'Setores',v:'8'},{l:'Estados',v:'7'},{l:'Compradores ativos',v:'1.423'}];
  const t=document.getElementById('tickerTrack');
  let h='';
  for(let i=0;i<2;i++)items.forEach(x=>{h+=`<div class="ti"><span class="ti-l">${x.l}</span><span class="ti-v${x.g?' g':''}">${x.v}</span></div>`;});
  t.innerHTML=h;
}

const pv=v=>v>=7?'g':v>=4?'a':'rr';

const VIEWS={
  visao:d=>{
    const iseNome=d.ise>=80?'Sólido':d.ise>=65?'Estável':d.ise>=50?'Operacional':d.ise>=30?'Em dev.':'Fragilizado';
    const iseCor=d.ise>=65?'#a8d5b5':d.ise>=50?'#f5c842':'#f5a280';
    const iseBg=d.ise>=65?'rgba(168,213,181,.12)':d.ise>=50?'rgba(245,200,66,.1)':'rgba(245,162,128,.1)';
    const iseBd=d.ise>=65?'rgba(168,213,181,.18)':d.ise>=50?'rgba(245,200,66,.15)':'rgba(245,162,128,.15)';
    const fmtV=v=>v>=1e6?(v/1e6).toFixed(1)+'M':Math.round(v/1e3)+'k';
    const totalUps=d.ups.reduce((s,u)=>s+parseInt(u.v.replace(/[^0-9]/g,'')),0);
    const dc=d.delta>5?'up':d.delta<-5?'dn':'eq';
    const dtxt=d.delta>5?d.delta+'% acima da avaliação':d.delta<-5?Math.abs(d.delta)+'% abaixo':'na faixa da avaliação';
    const dsinal=d.delta>5?'▲ ':d.delta<-5?'▼ ':'';
    return `<div class="crd">

      <div class="crd-line1">
        <span class="crd-loc">
          <svg width="8" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${d.cidade}, ${d.est}
        </span>
        <span class="crd-codigo">${d.id}</span>
      </div>

      <div class="crd-titulo-bloco">
        <div class="crd-titulo">${d.t}</div>
      </div>

      <div class="crd-desc">${d.desc}</div>

      <div class="crd-valores">
        <div class="crd-val-col">
          <div class="crd-val-lbl">Avaliação 1N</div>
          <div class="crd-val-num crd-val-dim">R$<strong>${fmtV(d.aval)}</strong></div>
        </div>
        <div class="crd-val-divider"></div>
        <div class="crd-val-col crd-val-col-right">
          <div class="crd-val-lbl">Valor de venda</div>
          <div class="crd-val-num">R$<strong>${fmtV(d.preco)}</strong></div>
        </div>
      </div>

      <div class="crd-delta-bar ${dc}">
        <span>${dsinal}${dtxt}</span>
      </div>

      <div class="crd-grid">
        <div class="crd-cell">
          <div class="crd-cell-v">${brl(d.fat)}</div>
          <div class="crd-cell-l">Faturamento ano</div>
        </div>
        <div class="crd-cell crd-cell-right">
          <div class="crd-cell-v crd-g">${brl(d.rlm*12)}</div>
          <div class="crd-cell-l">Resultado op. ano</div>
        </div>
        <div class="crd-cell">
          <div class="crd-cell-v">${d.tempo} anos</div>
          <div class="crd-cell-l">Tempo de empresa</div>
        </div>
        <div class="crd-cell crd-cell-right">
          <div class="crd-cell-v">${d.funcs}</div>
          <div class="crd-cell-l">Funcionários</div>
        </div>
        <div class="crd-cell">
          <div class="crd-cell-v ${d.pl>=0?'crd-g':'crd-r'}">${d.pl>=0?'+':'-'}R$${Math.abs(d.pl)}k</div>
          <div class="crd-cell-l">Balanço patrimonial</div>
        </div>
        <div class="crd-cell crd-cell-right">
          <div class="crd-cell-v crd-hi-dest">${d.dest}</div>
          <div class="crd-cell-l">Destaque</div>
        </div>
        <div class="crd-cell">
          <div class="crd-cell-v" style="color:${iseCor}">${d.ise} — ${iseNome}</div>
          <div class="crd-cell-l">ISE</div>
        </div>
        <div class="crd-cell crd-cell-right">
          <div class="crd-cell-v crd-g">+${totalUps}k/mês</div>
          <div class="crd-cell-l">Total upsides</div>
        </div>
      </div>

    </div>`;
  },
  numeros:d=>`
    <div class="cc-head"><span class="cc-code">${d.id}</span><span class="cc-ise">ISE ${d.ise}</span></div>
    <div class="sec-ttl">Grandes números</div>
    <div class="cgrid">
      <div class="cgc"><div class="cgc-l">Fat. anual</div><div class="cgc-v">${brl(d.fat)}</div></div>
      <div class="cgc"><div class="cgc-l">EBITDA</div><div class="cgc-v g">${brl(d.ebitda)}</div></div>
      <div class="cgc"><div class="cgc-l">Margem</div><div class="cgc-v g">${d.margem}%</div></div>
      <div class="cgc"><div class="cgc-l">Res./mês</div><div class="cgc-v">${brl(d.rlm)}</div></div>
    </div>
    <div class="r"><span class="r-l">Recorrência da receita</span><span class="r-v g">${d.rec}%</span></div>
    <div class="r"><span class="r-l">RO vs benchmark setor</span><span class="r-v ${d.margem>=d.bench_ro?'g':'a'}">${d.margem>=d.bench_ro?'▲ acima':'▼ abaixo'} (ref ${d.bench_ro}%)</span></div>
    <div class="r tot"><span class="r-l">Delta oportunidade</span><span class="r-v g big">+${d.delta}%</span></div>`,

  dre:d=>`
    <div class="cc-head"><span class="cc-code">${d.id}</span><span class="cc-ise">ISE ${d.ise}</span></div>
    <div class="sec-ttl">DRE mensal estimada</div>
    <div class="r"><span class="r-l">(+) Receita bruta</span><span class="r-v">${brl(d.fat/12)}</span></div>
    <div class="r"><span class="r-l i">(–) Impostos est.</span><span class="r-v rr">– ${brl(d.fat/12*.1)}</span></div>
    <div class="r"><span class="r-l i">(–) CMV est.</span><span class="r-v rr">– ${brl(d.fat/12*(1-d.margem/100)*.6)}</span></div>
    <div class="r"><span class="r-l i">(–) Folha est.</span><span class="r-v rr">– ${brl(d.fat/12*.18)}</span></div>
    <div class="r"><span class="r-l i">(–) Outros CF est.</span><span class="r-v rr">– ${brl(d.fat/12*.08)}</span></div>
    <div class="r tot"><span class="r-l">(=) Resultado líquido</span><span class="r-v g big">${brl(d.rlm)}</span></div>
    <div class="card-note">Valores estimados. Dados reais no dossiê após solicitação.</div>`,

  ise:d=>{
    const cls=d.ise>=80?'1N Sólido':d.ise>=65?'1N Estável':d.ise>=50?'1N Operacional':'Em desenvolvimento';
    const ps=[['Financeiro','20%',Math.min(10,Math.round(d.ise*.9/10))],['Resultado','15%',Math.min(10,Math.round(d.ise*.85/10))],['Comercial','15%',Math.min(10,Math.round(d.ise*.88/10))],['Gestão','15%',Math.min(10,Math.round(d.ise*.82/10))],['Sócio-dep.','10%',Math.min(10,Math.round(d.ise*.78/10))],['Risco legal','10%',Math.min(10,Math.round(d.ise*.9/10))],['Balanço','8%',Math.min(10,Math.round(d.ise*.84/10))],['Marca','7%',Math.min(10,Math.round(d.ise*.8/10))]];
    return `<div class="cc-head"><span class="cc-code">${d.id}</span><span class="cc-ise">ISE ${d.ise}</span></div>
    <div class="ise-num">${d.ise}</div>
    <div class="ise-lbl">${cls}</div>
    <div class="ise-bar"><div class="ise-fill" style="width:${d.ise}%"></div></div>
    ${ps.map(([n,p,v])=>`<div class="pilar"><span class="pilar-n">${n}<span class="pilar-peso">${p}</span></span><span class="pilar-v ${pv(v)}">${v}/10</span></div>`).join('')}`;
  },

  valor:d=>`
    <div class="cc-head"><span class="cc-code">${d.id}</span><span class="cc-ise">ISE ${d.ise}</span></div>
    <div class="sec-ttl">Como chegamos no valor</div>
    <div class="r"><span class="r-l">Preço pedido</span><span class="r-v">${brl(d.preco)}</span></div>
    <div class="r"><span class="r-l">Avaliação 1N</span><span class="r-v g big">${brl(d.aval)}</span></div>
    <div class="r"><span class="r-l">Delta oportunidade</span><span class="r-v g">▲ +${d.delta}%</span></div>
    <div class="r"><span class="r-l">EBITDA anual</span><span class="r-v">${brl(d.ebitda)}</span></div>
    <div class="r"><span class="r-l">Fator 1N aplicado</span><span class="r-v g">${(d.aval/d.ebitda).toFixed(2)}×</span></div>
    <div class="r tot"><span class="r-l">Equação resumida</span><span class="r-v" style="font-size:9px">${brl(d.ebitda)} × ${(d.aval/d.ebitda).toFixed(1)}× EBITDA</span></div>`,

  indicadores:d=>{
    const tag=v=>v==='g'?'Saudável':v==='a'?'Atenção':'Crítico';
    const cls=(v,bom,ruim)=>v<=bom?'g':v<=ruim?'a':'rr';
    const cor=v=>v==='g'?'#a8d5b5':v==='a'?'#f5c842':'#f5a280';
    const rows=[
      {n:'Ciclo Financeiro',v:d.ciclo,st:d.ciclo.startsWith('-')?'g':'a',d:'Diferença entre prazo de recebimento e pagamento'},
      {n:'Capital de Giro (NCG)',v:brl(d.ncg),st:d.ncg<=0?'g':d.ncg<50000?'a':'rr',d:'Capital imobilizado para girar o negócio'},
      {n:'Dívida Total / RO anual',v:d.dtro.toFixed(1)+'×',st:cls(d.dtro,1,3),d:'Tempo de resultado para quitar a dívida'},
      {n:'Cobertura de Caixa',v:d.cob_caixa.toFixed(1)+' meses',st:d.cob_caixa>=3?'g':d.cob_caixa>=1.5?'a':'rr',d:'Meses de custo fixo cobertos pelo caixa'},
      {n:'Concentração de Cliente',v:d.conc+'%',st:cls(d.conc,15,30),d:'Participação do maior cliente no faturamento'},
    ];
    return `<div class="cc-head"><span class="cc-code">${d.id}</span><span class="cc-ise">ISE ${d.ise}</span></div>
    <div class="sec-ttl">Indicadores Chave</div>
    ${rows.map(r=>`<div class="ind-row">
      <div class="ind-l"><div class="ind-nome">${r.n}</div><div class="ind-desc">${r.d}</div></div>
      <div class="ind-r"><div class="ind-val" style="color:${cor(r.st)}">${r.v}</div><div class="ind-tag ${r.st}">${tag(r.st)}</div></div>
    </div>`).join('')}`;
  },

  upsides:d=>{
    const atr=Math.min(10,d.ise/10*.4+d.delta*.15+d.rec/10*.3+(d.margem>=d.bench_ro?2:0)).toFixed(1);
    const al=atr>=8?'Alta':atr>=6.5?'Boa':atr>=5?'Moderada':'Baixa';
    return `<div class="cc-head"><span class="cc-code">${d.id}</span><span class="cc-ise">ISE ${d.ise}</span></div>
    <div class="sec-ttl">Upsides identificados</div>
    <div class="r" style="margin-bottom:8px"><span class="r-l">Índice de Atratividade 1N</span><span class="r-v g big">${atr}/10 — ${al}</span></div>
    <div class="r"><span class="r-l">Recorrência confirmada</span><span class="r-v g">${d.rec}%</span></div>
    <div style="height:.5px;background:rgba(255,255,255,.08);margin:8px 0"></div>
    ${d.ups.map(u=>`<div class="ups-row"><div class="ups-top"><span class="ups-nome">${u.n}</span><span class="ups-val">${u.v}</span></div><div class="ups-desc">${u.d}</div></div>`).join('')}`;
  },
};

function renderCards(){
  const track=document.getElementById('carTrack');
  track.innerHTML='';
  document.getElementById('countPill').textContent=filtered.length+' negócios';
  filtered.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='c-card';
    Object.keys(VIEWS).forEach(v=>{
      const div=document.createElement('div');
      div.className='card-view'+(v==='visao'?'':' hidden');
      div.dataset.view=v;
      div.innerHTML=VIEWS[v](d);
      el.appendChild(div);
    });
    el.addEventListener('click',()=>{if(getPos(i)!==0){activeIdx=i;activeSec='visao';resetBtn();positionCards();showSec('visao');updateFooter();}});
    track.appendChild(el);
  });
  positionCards();setupSwipe();updateFooter();
}

function getPos(i){let p=i-activeIdx;const n=filtered.length;if(p>n/2)p-=n;if(p<-n/2)p+=n;return p;}

function positionCards(){
  const cards=[...document.getElementById('carTrack').querySelectorAll('.c-card')];
  const W=document.getElementById('carArea').clientWidth;
  const CW=Math.min(294,W-96);
  const OFF=CW*.72;
  cards.forEach((c,i)=>{
    const pos=getPos(i);const abs=Math.abs(pos);
    const scale=pos===0?1:abs===1?.88:.82;
    const opacity=pos===0?1:abs===1?.55:abs===2?.28:0;
    const z=pos===0?15:abs===1?8:abs===2?3:0;
    const blur=pos===0?'none':abs===1?'brightness(.6)':'brightness(.4)';
    c.style.zIndex=z;
    c.style.transform=`translateX(${pos*OFF}px) scale(${scale})`;
    c.style.opacity=opacity;
    c.style.filter=blur;
    c.style.pointerEvents=abs<=2?'auto':'none';
    c.style.boxShadow=pos===0?'0 28px 72px rgba(13,43,30,.32),0 6px 20px rgba(13,43,30,.18)':'none';
  });
}

function setupSwipe(){
  const area=document.getElementById('carArea');
  let sx=0,sy=0,dx=0,act=false;
  area.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;act=true;dx=0;},{passive:true});
  area.addEventListener('touchmove',e=>{if(!act)return;dx=e.touches[0].clientX-sx;const dy=e.touches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy))e.preventDefault();},{passive:false});
  area.addEventListener('touchend',()=>{
    if(!act)return;act=false;
    if(dx<-60&&activeIdx<filtered.length-1)activeIdx++;
    else if(dx>60&&activeIdx>0)activeIdx--;
    activeSec='visao';resetBtn();positionCards();showSec('visao');updateFooter();
  },{passive:true});
  let ms=0,md=false;
  area.addEventListener('mousedown',e=>{md=true;ms=e.clientX;});
  area.addEventListener('mouseup',e=>{
    if(!md)return;md=false;
    const mdx=e.clientX-ms;
    if(mdx<-60&&activeIdx<filtered.length-1)activeIdx++;
    else if(mdx>60&&activeIdx>0)activeIdx--;
    activeSec='visao';resetBtn();positionCards();showSec('visao');updateFooter();
  });
}

function setSec(el){document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');activeSec=el.dataset.sec;showSec(activeSec);updateFooter();}
function showSec(sec){const cards=[...document.getElementById('carTrack').querySelectorAll('.c-card')];const ac=cards[activeIdx];if(!ac)return;ac.querySelectorAll('.card-view').forEach(v=>v.classList.toggle('hidden',v.dataset.view!==sec));}
function resetBtn(){document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));document.querySelector('[data-sec="visao"]').classList.add('on');}
function updateFooter(){
  const d=filtered[activeIdx];if(!d)return;
  document.getElementById('btnsLbl').textContent=activeSec==='visao'?'Analisar negócio selecionado':d.t.slice(0,36)+'…';
  document.getElementById('btnSol').onclick=()=>{const m=encodeURIComponent(`Olá! Vi o negócio ${d.id} — ${d.t} no 1Negócio e tenho interesse. Pode me passar mais informações?`);window.open(`https://wa.me/5548999999999?text=${m}`,'_blank');};
}
function filtCat(el){document.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');activeCat=el.dataset.cat;applyFilters();}
function filtEst(el){document.querySelectorAll('.e-chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');activeEst=el.dataset.est;applyFilters();}
function applyFilters(){filtered=DATA_COMPUTED().filter(d=>(activeCat==='todos'||d.cat===activeCat)&&(activeEst==='todos'||d.est===activeEst));activeIdx=0;activeSec='visao';resetBtn();renderCards();}

buildTicker();
loadNegocios().then(() => { filtered = [...DATA_COMPUTED()]; renderCards(); });
</script>
</body>
</html>
