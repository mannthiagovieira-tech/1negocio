<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0c0a;
    --bg2:#111110;
    --bg3:#161614;
    --sep:rgba(255,255,255,.08);
    --sep2:rgba(255,255,255,.05);
    --ink:rgba(255,255,255,.9);
    --ink2:rgba(255,255,255,.55);
    --ink3:rgba(255,255,255,.28);
    --green:#10b981;
    --amber:#f59e0b;
    --blue:#60a5fa;
    --red:#f87171;
    --violet:#a78bfa;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;min-height:100vh;}

  /* ── HEADER ── */
  .hdr{
    position:fixed;top:0;left:0;right:0;z-index:100;
    height:52px;background:rgba(12,12,10,.92);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--sep);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;
  }
  .logo{
    font-family:'Syne',sans-serif;font-size:15px;font-weight:800;
    color:#fff;text-decoration:none;letter-spacing:-.01em;
  }
  .logo em{color:var(--green);font-style:normal;}
  .hdr-back{
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink3);text-decoration:none;transition:color .15s;
  }
  .hdr-back:hover{color:var(--ink);}
  .hdr-code{font-size:10px;color:var(--ink3);letter-spacing:.06em;}

  /* ── LAYOUT ── */
  .page{padding-top:52px;max-width:680px;margin:0 auto;padding-bottom:80px;}
  .page-inner{padding:0 20px;}

  /* ── LOADING ── */
  .loading{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:60vh;gap:16px;
  }
  .loading-dot{
    width:6px;height:6px;border-radius:50%;background:var(--green);
    animation:pulse 1s ease-in-out infinite;
  }
  .loading-dot:nth-child(2){animation-delay:.2s;}
  .loading-dot:nth-child(3){animation-delay:.4s;}
  .loading-dots{display:flex;gap:6px;}
  @keyframes pulse{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}

  /* ── HERO ── */
  .hero{
    padding:28px 0 24px;
    border-bottom:1px solid var(--sep);
    animation:up .4s ease;
  }
  @keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .hero-eyebrow{
    font-size:9px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink3);margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .hero-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
  .hero-title{
    font-family:'Syne',sans-serif;font-size:clamp(20px,4vw,28px);
    font-weight:800;color:#fff;line-height:1.2;margin-bottom:10px;
    letter-spacing:-.02em;
  }
  .hero-meta{
    font-size:10px;color:var(--ink3);
    display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  }
  .hero-meta span{display:flex;align-items:center;gap:4px;}

  /* ── BADGES ── */
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px;}
  .badge{
    font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 8px;border:.5px solid var(--sep);color:var(--ink3);
  }
  .badge.g{border-color:rgba(16,185,129,.3);color:rgba(16,185,129,.8);}
  .badge.a{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.8);}
  .badge.b{border-color:rgba(96,165,250,.3);color:rgba(96,165,250,.8);}
  .badge.v{border-color:rgba(167,139,250,.3);color:rgba(167,139,250,.8);}

  /* ── ISE CARD ── */
  .ise-card{
    margin:20px 0;
    background:var(--bg2);border:.5px solid var(--sep);
    padding:18px;
    animation:up .4s ease .05s both;
  }
  .ise-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .ise-label{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);}
  .ise-nivel{font-size:9px;letter-spacing:.1em;text-transform:uppercase;}
  .ise-score{
    font-family:'Syne',sans-serif;font-size:42px;font-weight:800;
    letter-spacing:-.04em;line-height:1;
  }
  .ise-bar-wrap{margin-top:10px;height:3px;background:var(--sep2);}
  .ise-bar{height:100%;transition:width 1.2s cubic-bezier(.16,1,.3,1);}
  .ise-sublabel{font-size:9px;color:var(--ink3);margin-top:6px;}

  /* ── VALOR CARD ── */
  .valor-card{
    background:rgba(16,185,129,.04);
    border:.5px solid rgba(16,185,129,.2);
    padding:20px;margin:0 0 4px;
    animation:up .4s ease .08s both;
  }
  .valor-eyebrow{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(16,185,129,.6);margin-bottom:6px;}
  .valor-num{
    font-family:'Syne',sans-serif;font-size:clamp(28px,6vw,40px);
    font-weight:800;color:var(--green);letter-spacing:-.04em;line-height:1;
    margin-bottom:4px;
  }
  .valor-faixa{font-size:10px;color:var(--ink3);}

  /* ── SEÇÕES ── */
  .section{
    background:var(--bg2);border:.5px solid var(--sep);
    padding:18px;margin-bottom:4px;
    animation:up .4s ease .1s both;
  }
  .section-title{
    font-size:8px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink3);margin-bottom:14px;
    display:flex;align-items:center;gap:8px;
  }
  .section-title::after{
    content:'';flex:1;height:.5px;background:var(--sep);
  }

  /* ── GRID DE MÉTRICAS ── */
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--sep2);}
  .metric{background:var(--bg);padding:12px 14px;}
  .metric-l{font-size:8px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
  .metric-v{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--ink);}
  .metric-v.g{color:var(--green);}
  .metric-v.a{color:var(--amber);}
  .metric-v.r{color:var(--red);}
  .metric-v.b{color:var(--blue);}

  /* ── PILARES ── */
  .pilar{margin-bottom:10px;}
  .pilar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .pilar-nome{font-size:10px;color:var(--ink2);}
  .pilar-val{font-size:10px;color:var(--green);}
  .pilar-bar{height:2px;background:var(--sep);}
  .pilar-fill{height:100%;background:var(--green);transition:width 1s ease;}

  /* ── NARRATIVA ── */
  .narrativa{font-size:12px;color:var(--ink2);line-height:1.8;}

  /* ── ROW INFO ── */
  .info-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;border-bottom:.5px solid var(--sep2);
    font-size:11px;
  }
  .info-row:last-child{border-bottom:none;}
  .info-l{color:var(--ink3);}
  .info-v{color:var(--ink);text-align:right;}
  .info-v.g{color:var(--green);}
  .info-v.a{color:var(--amber);}

  /* ── CTA FIXO ── */
  .cta-fixed{
    position:fixed;bottom:0;left:0;right:0;z-index:200;
    background:rgba(12,12,10,.96);backdrop-filter:blur(16px);
    border-top:1px solid var(--sep);
    padding:12px 20px;
    display:flex;gap:8px;max-width:680px;margin:0 auto;
  }
  .cta-fixed-inner{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:680px;
    background:rgba(12,12,10,.96);backdrop-filter:blur(16px);
    border-top:1px solid var(--sep);
    padding:12px 20px;
    display:flex;gap:8px;
  }
  .btn-cta{
    font-family:'Syne',sans-serif;font-size:10px;font-weight:800;
    letter-spacing:.1em;text-transform:uppercase;
    padding:12px 16px;border:none;cursor:pointer;
    transition:opacity .15s;flex:1;
  }
  .btn-cta:hover{opacity:.85;}
  .btn-cta.g{background:var(--green);color:#000;}
  .btn-cta.o{background:transparent;color:var(--ink2);border:.5px solid var(--sep);}
  .btn-cta.b{background:rgba(96,165,250,.12);color:var(--blue);border:.5px solid rgba(96,165,250,.2);}

  /* ── DISCLAIMER ── */
  .disclaimer{
    font-size:9px;color:var(--ink3);line-height:1.7;
    padding:16px 0;border-top:.5px solid var(--sep);margin-top:8px;
  }

  /* ── VIEWS ── */
  .views-row{
    display:flex;align-items:center;gap:6px;
    font-size:9px;color:var(--ink3);
    padding:10px 0;border-bottom:.5px solid var(--sep2);
    margin-bottom:4px;
  }
  .views-dot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}

  /* ── MODAL NDA ── */
  .modal-bg{
    display:none;position:fixed;inset:0;z-index:500;
    background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
    align-items:center;justify-content:center;padding:20px;
  }
  .modal-bg.on{display:flex;}
  .modal{
    background:var(--bg2);border:.5px solid var(--sep);
    width:100%;max-width:460px;padding:28px;
    animation:up .25s ease;
  }
  .modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:8px;}
  .modal-text{font-size:11px;color:var(--ink2);line-height:1.7;margin-bottom:20px;}
  .modal-btns{display:flex;gap:8px;}

  /* ── NOT FOUND ── */
  .not-found{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:60vh;text-align:center;gap:12px;
  }
  .not-found-code{font-family:'Syne',sans-serif;font-size:60px;font-weight:800;color:var(--sep);line-height:1;}
  .not-found-msg{font-size:12px;color:var(--ink3);}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a href="/index.html" class="logo"><em>1</em>NEGÓCIO</a>
  <span class="hdr-code" id="hdr-code">—</span>
  <a href="/index.html" class="hdr-back">← Ver todos</a>
</header>

<!-- CONTEÚDO PRINCIPAL -->
<main class="page">
  <div class="page-inner" id="main-content">
    <!-- Loading state -->
    <div class="loading" id="loading-state">
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>

<!-- CTA FIXO -->
<div class="cta-fixed-inner" id="cta-bar" style="display:none">

<div class="modal-bg" id="modal-interesse">

      <button class="btn-cta o" onclick="fecharModal()" style="flex:.4">Cancelar</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

let NEG = null;
let USER = null;

// ── UTILS ──────────────────────────────────────────────────────────────────
function fmtBRL(v){
  if(!v && v !== 0) return '—';
  const a = Math.abs(v), s = v < 0 ? '-' : '';
  if(a >= 1e6) return s+'R$ '+(a/1e6).toFixed(1).replace('.',',')+'M';
  if(a >= 1e3) return s+'R$ '+Math.round(a/1e3).toLocaleString('pt-BR')+' mil';
  return s+'R$ '+Math.round(a).toLocaleString('pt-BR');
}
function fmtNum(v){ return v ? Math.round(v).toLocaleString('pt-BR') : '—'; }
function iseColor(s){
  if(s >= 81) return '#10b981';
  if(s >= 61) return '#f59e0b';
  if(s >= 41) return '#60a5fa';
  return '#a78bfa';
}
function iseLabel(s){
  if(s >= 81) return 'Sólida';
  if(s >= 61) return 'Estruturada';
  if(s >= 41) return 'Em desenvolvimento';
  return 'Vulnerável';
}
function catLabel(c){
  const m = {
    alimentacao:'Alimentação', beleza_saude:'Beleza & Saúde',
    tecnologia:'Tecnologia', servicos:'Serviços B2B',
    educacao:'Educação', varejo:'Varejo', saude:'Saúde',
    pet:'Pet', industria:'Indústria', comercio:'Comércio'
  };
  return m[c] || c || '—';
}
function anos(a){
  if(!a) return null;
  const y = new Date().getFullYear() - parseInt(a);
  return y > 0 ? y + (y === 1 ? ' ano' : ' anos') : null;
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init(){
  // Pegar ID da URL
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if(!id){
    renderNotFound('URL inválida — ID não informado');
    return;
  }

  // Checar sessão
  const { data: { session } } = await sb.auth.getSession();
  if(session) USER = session.user;

  // Buscar negócio
  const { data, error } = await sb
    .from('negocios')
    .select(`
      id, titulo_anuncio, detalhe, nome_negocio, categoria, subcategoria,
      cidade, estado, ano_inicio, origem_negocio,
      faturamento_anual, resultado_liquido_mensal, caixa_mensal,
      divida_total, balanco_patrimonial, valor_venda, valor_negocio,
      valor_venda_min, valor_venda_max,
      avaliacao_min, avaliacao_max,
      score_saude, score_pilares, mult_ajustado,
      funcionarios, num_clt, num_pj, num_socios,
      tipo_imovel, plano, status,
      funil_visualizacoes, funil_cliques, funil_info_solicitadas, funil_mesas_abertas,
      is_franquia, franquia_nome, is_marca_registrada,
      tags_calculadas, analise_1n, tese, abertura,
      teaser_contexto_ia, publicado_em, codigo
    `)
    .eq('id', id)
    .eq('status', 'publicado')
    .single();

  if(error || !data){
    renderNotFound('Anúncio não encontrado ou não está publicado.');
    return;
  }

  NEG = data;

  // Atualizar title
  const titulo = NEG.titulo_anuncio || NEG.detalhe || catLabel(NEG.categoria);
  document.title = titulo + ' · 1Negócio';
  document.getElementById('hdr-code').textContent = NEG.codigo || '';

  // Registrar visualização
  registrarView(id);

  // Renderizar
  renderPage();
}

// ── REGISTRAR VIEW ─────────────────────────────────────────────────────────
async function registrarView(negocioId){
  try{
    // Gerar visitor_id anônimo (fingerprint simples)
    let vid = localStorage.getItem('1n_vid');
    if(!vid){
      vid = Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('1n_vid', vid);
    }

    await sb.from('negocio_views').insert({
      negocio_id: negocioId,
      visitor_id: vid,
      user_id: USER ? USER.id : null,
      referrer: document.referrer || null
    });

    // Incrementar contador no banco
    await sb.rpc('incrementar_funil', {
      neg_id: negocioId,
      campo: 'funil_visualizacoes'
    }).catch(() => {}); // silencioso se RPC não existir

  }catch(e){ /* silencioso */ }
}

// ── RENDER PAGE ────────────────────────────────────────────────────────────
function renderPage(){
  const N = NEG;
  const cont = document.getElementById('main-content');
  const cta = document.getElementById('cta-bar');

  const titulo = N.titulo_anuncio || N.detalhe || catLabel(N.categoria);
  const loc = [N.cidade, N.estado].filter(Boolean).join(' / ');
  const anosFund = anos(N.ano_inicio);
  const totalColabs = (N.num_clt || 0) + (N.num_pj || 0) + (N.num_socios || 0) || N.funcionarios;
  const scoreColor = iseColor(N.score_saude || 0);
  const scoreNivel = iseLabel(N.score_saude || 0);
  const valorVenda = N.valor_venda || N.avaliacao_max || 0;
  const fatMensal = N.faturamento_anual ? N.faturamento_anual / 12 : 0;
  const views = N.funil_visualizacoes || 0;

  // Pilares
  let pilares = [];
  if(N.score_pilares){
    try{ pilares = typeof N.score_pilares === 'string' ? JSON.parse(N.score_pilares) : N.score_pilares; }catch(e){}
  }

  // Teaser IA
  const teaser = N.teaser_contexto_ia || null;
  const analise = N.analise_1n || (teaser && teaser.headline) || null;

  let html = '';

  // ── HERO ──────────────────────────────────────────────────────────────────
  html += `<div class="hero">
    <div class="hero-eyebrow">
      <div class="hero-dot"></div>
      ${catLabel(N.categoria)}
      ${N.is_franquia ? '<span style="color:var(--amber)">· Franquia</span>' : ''}
    </div>
    <h1 class="hero-title">${titulo}</h1>
    <div class="hero-meta">
      ${loc ? `<span>${loc}</span>` : ''}
      ${anosFund ? `<span>${anosFund} de operação</span>` : ''}
      ${totalColabs ? `<span>${totalColabs} colaborador${totalColabs !== 1 ? 'es' : ''}</span>` : ''}
    </div>
    <div class="badges">
      <span class="badge g">${N.plano === 'guiado' ? 'Plano Guiado' : 'Publicado'}</span>
      ${N.is_franquia ? `<span class="badge a">Franquia${N.franquia_nome ? ' · '+N.franquia_nome : ''}</span>` : ''}
      ${N.is_marca_registrada ? '<span class="badge b">Marca registrada</span>' : ''}
      ${N.tipo_imovel ? `<span class="badge">${{proprio:'Imóvel próprio',alugado:'Imóvel alugado',sem_ponto:'Sem ponto fixo',online:'Online'}[N.tipo_imovel] || N.tipo_imovel}</span>` : ''}
    </div>
  </div>`;

  // ── VIEWS LIVE ─────────────────────────────────────────────────────────────
  if(views > 0){
    html += `<div class="views-row">
      <div class="views-dot"></div>
      ${fmtNum(views + 1)} visualizações
      ${N.funil_info_solicitadas ? `· ${N.funil_info_solicitadas} solicitações de teaser` : ''}
      ${N.funil_mesas_abertas ? `· ${N.funil_mesas_abertas} mesa${N.funil_mesas_abertas !== 1 ? 's' : ''} em negociação` : ''}
    </div>`;
  }

  // ── ISE ────────────────────────────────────────────────────────────────────
  if(N.score_saude){
    html += `<div class="ise-card">
      <div class="ise-top">
        <div>
          <div class="ise-label">Índice de Solidez Empresarial</div>
          <div class="ise-nivel" style="color:${scoreColor}">${scoreNivel}</div>
        </div>
        <div class="ise-score" style="color:${scoreColor}">${N.score_saude}</div>
      </div>
      <div class="ise-bar-wrap"><div class="ise-bar" id="ise-bar" style="width:0;background:${scoreColor}"></div></div>
      <div class="ise-sublabel">de 100 pontos · avaliado pela equipe 1Negócio</div>
    </div>`;
  }

  // ── VALOR ──────────────────────────────────────────────────────────────────
  if(valorVenda > 0){
    const vMin = N.valor_venda_min || Math.round(valorVenda * .88);
    const vMax = N.valor_venda_max || Math.round(valorVenda * 1.12);
    html += `<div class="valor-card">
      <div class="valor-eyebrow">Valor de venda — porteira fechada</div>
      <div class="valor-num">${fmtBRL(valorVenda)}</div>
      <div class="valor-faixa">Faixa estimada: ${fmtBRL(vMin)} – ${fmtBRL(vMax)}</div>
    </div>`;
  }

  // ── MÉTRICAS PRINCIPAIS ────────────────────────────────────────────────────
  html += `<div class="section">
    <div class="section-title">Financeiro</div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-l">Faturamento/mês</div>
        <div class="metric-v g">${fmtBRL(fatMensal)}</div>
      </div>
      <div class="metric">
        <div class="metric-l">Resultado op./mês</div>
        <div class="metric-v ${N.resultado_liquido_mensal >= 0 ? 'g' : 'r'}">${fmtBRL(N.resultado_liquido_mensal)}</div>
      </div>
      <div class="metric">
        <div class="metric-l">Geração de caixa</div>
        <div class="metric-v ${N.caixa_mensal >= 0 ? 'g' : 'a'}">${fmtBRL(N.caixa_mensal)}</div>
      </div>
      <div class="metric">
        <div class="metric-l">Payback aplicado</div>
        <div class="metric-v">${N.mult_ajustado ? N.mult_ajustado.toFixed(2) + '×' : '—'}</div>
      </div>
    </div>
    ${N.balanco_patrimonial !== null && N.balanco_patrimonial !== undefined ? `
    <div style="margin-top:1px">
      <div class="metric">
        <div class="metric-l">Balanço patrimonial</div>
        <div class="metric-v ${N.balanco_patrimonial >= 0 ? 'g' : 'r'}">${fmtBRL(N.balanco_patrimonial)}</div>
      </div>
    </div>` : ''}
  </div>`;

  // ── ANÁLISE / TESE ─────────────────────────────────────────────────────────
  if(analise || N.tese || N.abertura){
    html += `<div class="section">
      <div class="section-title">O que é este negócio</div>
      ${analise ? `<p class="narrativa" style="margin-bottom:${N.tese ? '14px' : '0'}">${analise}</p>` : ''}
      ${N.tese ? `<div style="margin-top:10px;padding:12px;background:rgba(16,185,129,.04);border-left:2px solid rgba(16,185,129,.25)">
        <div style="font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:rgba(16,185,129,.6);margin-bottom:6px">Tese do comprador</div>
        <p class="narrativa">${N.tese}</p>
      </div>` : ''}
    </div>`;
  }

  // ── PILARES ISE ────────────────────────────────────────────────────────────
  if(pilares.length > 0){
    html += `<div class="section">
      <div class="section-title">Pilares ISE</div>
      ${pilares.map(p => `
        <div class="pilar">
          <div class="pilar-row">
            <span class="pilar-nome">${p.nome}</span>
            <span class="pilar-val">${p.val}/10</span>
          </div>
          <div class="pilar-bar">
            <div class="pilar-fill" style="width:${p.val * 10}%;background:${p.val >= 7 ? 'var(--green)' : p.val >= 4 ? 'var(--amber)' : 'var(--blue)'}"></div>
          </div>
        </div>
      `).join('')}
    </div>`;
  }

  // ── DADOS OPERACIONAIS ────────────────────────────────────────────────────
  const infoRows = [];
  if(totalColabs) infoRows.push(['Equipe', totalColabs + ' colaborador' + (totalColabs !== 1 ? 'es' : '')]);
  if(N.num_clt || N.num_pj){
    if(N.num_clt) infoRows.push(['CLT', N.num_clt]);
    if(N.num_pj) infoRows.push(['PJ / Terceiros', N.num_pj]);
  }
  if(N.num_socios) infoRows.push(['Sócios ativos', N.num_socios]);
  if(N.divida_total) infoRows.push(['Dívida total', fmtBRL(N.divida_total), N.divida_total > 0 ? 'a' : 'g']);
  if(anosFund) infoRows.push(['Tempo de operação', anosFund]);
  if(N.origem_negocio) infoRows.push(['Origem', N.origem_negocio === 'fundei' ? 'Fundada pelos sócios' : 'Empresa adquirida']);

  if(infoRows.length > 0){
    html += `<div class="section">
      <div class="section-title">Operacional</div>
      ${infoRows.map(r => `
        <div class="info-row">
          <span class="info-l">${r[0]}</span>
          <span class="info-v ${r[2] || ''}">${r[1]}</span>
        </div>
      `).join('')}
    </div>`;
  }

  // ── TEASER IA ─────────────────────────────────────────────────────────────
  if(teaser && (teaser.setor || teaser.momento_mercado)){
    html += `<div class="section">
      <div class="section-title">Contexto de mercado</div>
      ${teaser.setor ? `<p class="narrativa" style="margin-bottom:${teaser.momento_mercado ? '12px' : '0'}">${teaser.setor.tendencia || ''}</p>` : ''}
      ${teaser.momento_mercado ? `
        <div style="margin-top:8px;padding:12px;background:rgba(245,158,11,.04);border-left:2px solid rgba(245,158,11,.2)">
          <div style="font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:rgba(245,158,11,.6);margin-bottom:6px">Momento para comprar</div>
          <p class="narrativa">${teaser.momento_mercado.oportunidade || ''}</p>
        </div>
      ` : ''}
    </div>`;
  }

  // ── DISCLAIMER ────────────────────────────────────────────────────────────
  html += `<div class="disclaimer">
    Dados apresentados com base nas informações fornecidas pelo vendedor e avaliação técnica da equipe 1Negócio. 
    Nome da empresa, sócios, CNPJ e informações detalhadas são disponibilizados após assinatura de NDA e aprovação da equipe.
    A 1Negócio não se responsabiliza pelas informações prestadas pelo vendedor.
  </div>`;

  // Inserir conteúdo
  cont.innerHTML = html;
  cta.style.display = 'flex';

  // Animar barra ISE
  setTimeout(() => {
    const bar = document.getElementById('ise-bar');
    if(bar) bar.style.width = (N.score_saude || 0) + '%';
  }, 300);
}

// ── NOT FOUND ──────────────────────────────────────────────────────────────
function renderNotFound(msg){
  document.getElementById('main-content').innerHTML = `
    <div class="not-found">
      <div class="not-found-code">404</div>
      <div class="not-found-msg">${msg}</div>
      <a href="/index.html" style="font-size:10px;color:var(--green);letter-spacing:.1em;text-transform:uppercase;margin-top:8px">← Voltar para home</a>
    </div>
  `;
}

// ── CTAs ───────────────────────────────────────────────────────────────────
function verMais(){
  // Solicitar teaser — vai para portal ou login
  if(USER){
    window.location.href = '/portal-usuario.html?acao=teaser&negocio=' + NEG.id;
  } else {
    window.location.href = '/portal-usuario.html?redirect=teaser&negocio=' + NEG.id;
  }
}

function abrirNDA(){
  document.getElementById('modal-interesse').classList.add('on');
}

function fecharModal(){
  document.getElementById('modal-interesse').classList.remove('on');
}

function irParaCadastro(){
  window.location.href = '/portal-usuario.html?modo=comprador&negocio=' + NEG.id;
}

// Fechar modal clicando fora
document.getElementById('modal-interesse').addEventListener('click', function(e){
  if(e.target === this) fecharModal();
});

// ── START ─────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
