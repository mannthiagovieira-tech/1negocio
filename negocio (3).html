<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Negócio · 1Negócio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root[data-theme="light"]{
  --bg:#fafaf7;
  --surface:#ffffff;
  --surface-2:#f5f5f0;
  --line:rgba(20,20,18,.08);
  --line-strong:rgba(20,20,18,.16);
  --ink:#0c0c0a;
  --ink-2:#2a2a26;
  --ink-3:#5e5e58;
  --ink-4:#92928a;
  --accent:#10b981;
  --accent-ink:#053a28;
  --accent-soft:rgba(16,185,129,.10);
  --accent-line:rgba(16,185,129,.28);
  --warn:#d97706;
  --warn-soft:rgba(217,119,6,.08);
  --alert:#dc2626;
  --alert-soft:rgba(220,38,38,.08);
  --info:#2563eb;
  --info-soft:rgba(37,99,235,.08);
  --serif:'Syne',Georgia,serif;
  --mono:'DM Mono',ui-monospace,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 12px 32px rgba(0,0,0,.08);
}
:root[data-theme="dark"]{
  --bg:#0c0c0a;
  --surface:#161614;
  --surface-2:#1c1c1a;
  --line:rgba(255,255,255,.08);
  --line-strong:rgba(255,255,255,.16);
  --ink:#f5f5f0;
  --ink-2:#d4d4cc;
  --ink-3:#92928a;
  --ink-4:#5e5e58;
  --accent:#3dff95;
  --accent-ink:#08130c;
  --accent-soft:rgba(61,255,149,.10);
  --accent-line:rgba(61,255,149,.28);
  --warn:#fbbf24;
  --warn-soft:rgba(251,191,36,.10);
  --alert:#f87171;
  --alert-soft:rgba(248,113,113,.10);
  --info:#60a5fa;
  --info-soft:rgba(96,165,250,.10);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow-md:0 4px 16px rgba(0,0,0,.5);
  --shadow-lg:0 12px 32px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:780px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-family:var(--serif);font-weight:800;font-size:17px;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
.brand em{color:var(--accent);font-style:normal}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:1px solid var(--line);border-radius:50%;color:var(--ink-2);cursor:pointer;transition:all .15s ease}
.icon-btn:hover{background:var(--surface-2);color:var(--ink);border-color:var(--line-strong)}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
main{flex:1;max-width:780px;width:100%;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:32px}
@media (min-width:680px){main{padding:28px 24px;gap:40px}}
.state-box{margin:40px auto;max-width:480px;padding:32px 24px;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-md)}
.state-box.preparing{border-color:rgba(217,119,6,.2);background:var(--warn-soft)}
.state-icon{width:48px;height:48px;margin:0 auto 16px;display:inline-flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent);border-radius:50%}
.state-box.preparing .state-icon{background:rgba(217,119,6,.16);color:var(--warn)}
.state-icon svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none}
.state-title{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.02em;color:var(--ink);margin-bottom:8px}
.state-msg{font-size:14px;color:var(--ink-3);line-height:1.6;margin-bottom:20px}
.state-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.hero{display:flex;flex-direction:column;gap:20px}
.hero-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink-4);text-transform:uppercase}
.hero-meta svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;fill:none;display:inline}
.hero-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-line);border-radius:999px;font-weight:600;font-size:10px}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent)}
.hero-title{font-family:var(--serif);font-weight:800;font-size:clamp(28px,6vw,44px);letter-spacing:-.035em;line-height:1.05;color:var(--ink)}
.val-hero{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:18px 20px;background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-sm)}
@media (max-width:520px){.val-hero{grid-template-columns:1fr;text-align:left}.val-hero .val-side{order:2}.val-hero .val-delta{order:3;justify-self:start}.val-hero .val-main{order:1}}
.val-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-4);display:block;margin-bottom:4px}
.val-aval,.val-num{font-family:var(--serif);font-weight:800;letter-spacing:-.03em;line-height:1;display:block}
.val-aval{font-size:clamp(20px,4vw,28px);color:var(--ink-3)}
.val-num{font-size:clamp(28px,5.5vw,38px);color:var(--ink)}
.val-aval .rs,.val-num .rs{font-size:.55em;color:var(--ink-4);font-weight:600;margin-right:3px}
.val-delta{display:inline-flex;flex-direction:column;align-items:center;padding:8px 14px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:14px;white-space:nowrap}
.val-delta b{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
.val-delta span{font-family:var(--mono);font-size:11px;color:var(--accent-ink);font-weight:500}
.val-delta.dn{background:var(--alert-soft);border-color:rgba(220,38,38,.28)}
.val-delta.dn b,.val-delta.dn span{color:var(--alert)}
.val-delta.eq{background:var(--surface-2);border-color:var(--line-strong)}
.val-delta.eq b,.val-delta.eq span{color:var(--ink-3)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat{padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.stat-l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4)}
.stat-v{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:-.025em;color:var(--ink);line-height:1.1}
.stat-v.g{color:var(--accent)}
.stat-v.w{color:var(--warn)}
.stat-v.a{color:var(--alert)}
.stat-v .rs{font-size:.6em;color:var(--ink-4);font-weight:500;margin-right:2px}
.stat-v .unit{font-size:.55em;color:var(--ink-4);font-weight:500;margin-left:2px}
.stat-bar{position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--line)}
.stat-bar > div{height:100%;transition:width .6s ease}
.section{display:flex;flex-direction:column;gap:14px}
.section-head{display:flex;flex-direction:column;gap:4px}
.section-title{font-family:var(--serif);font-weight:700;font-size:24px;letter-spacing:-.025em;color:var(--ink);line-height:1.15}
.section-sub{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink-3)}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow-sm)}
@media (min-width:520px){.panel{padding:22px 24px}}
.dre-wrap{overflow-x:auto;margin:-2px}
.dre{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
.dre th,.dre td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
.dre th{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);font-weight:500}
.dre td.v{font-family:var(--mono);text-align:right;font-weight:500}
.dre td.pct{font-family:var(--mono);text-align:right;color:var(--ink-3);font-size:11px}
.dre td.bench{font-family:var(--mono);text-align:right;color:var(--ink-4);font-size:10px}
.dre tr.neg td.v{color:var(--alert)}
.dre tr.sub td{font-weight:600;background:var(--surface-2)}
.dre tr.total td{font-weight:700;font-size:14px;background:var(--accent-soft);color:var(--accent);border-top:2px solid var(--accent-line)}
.balanco{display:flex;flex-direction:column;gap:0;margin-top:6px}
.b-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;font-family:var(--mono);font-size:13px;border-bottom:1px solid var(--line)}
.b-row:last-child{border-bottom:0}
.b-row.b-sub{padding-left:28px;color:var(--ink-3);font-size:12px;background:var(--surface-2)}
.b-row.b-total{font-weight:600;font-size:14px;color:var(--ink);background:var(--surface-2);margin-top:4px}
.b-row.b-total.g{color:var(--accent);background:var(--accent-soft)}
.b-row.b-total.r{color:var(--alert);background:var(--alert-soft);margin-top:8px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.ind-box{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.ind-l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4)}
.ind-v{font-family:var(--serif);font-weight:700;font-size:18px;letter-spacing:-.02em;color:var(--ink)}
.ind-v .unit{font-size:.6em;color:var(--ink-3);font-weight:500;margin-left:2px}
.ind-v.g{color:var(--accent)}
.ind-v.w{color:var(--warn)}
.ind-v.a{color:var(--alert)}
.ind-sub{font-family:var(--sans);font-size:11px;color:var(--ink-3);margin-top:2px}
.ise-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:14px}
.ise-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px}
.ise-pill-bar{flex-shrink:0;width:6px;height:36px;border-radius:3px;background:var(--line);position:relative;overflow:hidden}
.ise-pill-bar > div{position:absolute;left:0;right:0;bottom:0;border-radius:3px}
.ise-pill-body{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.ise-pill-l{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase}
.ise-pill-v{font-family:var(--serif);font-weight:700;font-size:14px;color:var(--ink)}
.ise-pill-v .max{color:var(--ink-4);font-weight:500;font-size:.75em}
.ana-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media (min-width:680px){.ana-grid{grid-template-columns:1fr 1fr}.ana-block.featured{grid-column:1 / -1}}
.ana-block{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px 22px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.ana-block.featured{border-color:var(--accent-line);background:linear-gradient(180deg,var(--accent-soft) 0%,var(--surface) 60%)}
.ana-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
.ana-tag{font-size:9px;color:var(--accent);padding:3px 8px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:999px}
.ana-big{font-family:var(--serif);font-weight:800;font-size:clamp(24px,4vw,32px);letter-spacing:-.03em;line-height:1.1;color:var(--ink)}
.ana-big.g{color:var(--accent)}
.ana-big.a{color:var(--alert)}
.ana-big .rs{font-size:.55em;color:var(--ink-3);margin-right:3px;font-weight:600}
.ana-formula{font-size:12px;color:var(--ink-3);line-height:1.6}
.ana-formula em{color:var(--ink-2);font-style:normal;font-weight:500}
.ana-conclusion{margin-top:8px;padding:10px 12px;background:var(--surface-2);border-radius:10px;font-size:13px;color:var(--ink-2);line-height:1.5}
.ana-conclusion em{color:var(--accent);font-style:normal;font-weight:600}
.ana-ise-score{display:flex;align-items:center;gap:14px;margin:6px 0}
.ise-n{font-family:var(--serif);font-weight:800;font-size:48px;letter-spacing:-.03em;line-height:1}
.ise-n span{font-size:.4em;color:var(--ink-3);font-weight:500}
.ise-cls{padding:6px 12px;border-radius:999px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.ana-ise-desc{font-size:13px;color:var(--ink-2);line-height:1.5}
.upsides{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.upside-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface-2);border-radius:12px;border:1px solid var(--line)}
.upside-n{flex-shrink:0;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--accent);color:var(--accent-ink);font-family:var(--mono);font-weight:700;font-size:11px}
.upside-body{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.upside-t{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2}
.upside-sub{font-size:11px;color:var(--ink-3);line-height:1.3}
.upside-imp{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--accent);flex-shrink:0;text-align:right}
.upsides-more{font-family:var(--mono);font-size:11px;color:var(--ink-4);text-align:center;padding:8px;letter-spacing:.06em}
.ana-checks{display:flex;flex-direction:column;gap:8px;margin:6px 0}
.ck{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--ink-2);line-height:1.4}
.ck-i{flex-shrink:0;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;font-weight:700;background:var(--accent-soft);color:var(--accent)}
.ck.warn .ck-i{background:var(--warn-soft);color:var(--warn)}
.atr-bars{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.atr-row{display:flex;align-items:center;gap:10px}
.atr-label{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase;width:100px;flex-shrink:0}
.atr-bar{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.atr-bar > div{height:100%;background:var(--accent);border-radius:3px;transition:width .6s ease}
.atr-val{font-family:var(--mono);font-size:11px;color:var(--ink-2);width:32px;text-align:right;flex-shrink:0}
.regime-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:6px}
@media (min-width:520px){.regime-grid{grid-template-columns:1fr 1fr 1fr}}
.regime-card{padding:14px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;gap:4px}
.regime-card.atual{border-color:rgba(37,99,235,.3);background:var(--info-soft)}
.regime-card.otimo{border-color:var(--accent-line);background:var(--accent-soft)}
.regime-name{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.regime-card.atual .regime-name{color:var(--info)}
.regime-card.otimo .regime-name{color:var(--accent)}
.regime-tag{font-size:8px;padding:2px 6px;border-radius:999px;background:currentColor;color:var(--bg);font-weight:700;letter-spacing:.06em}
.regime-imp{font-family:var(--serif);font-weight:700;font-size:18px;color:var(--ink);letter-spacing:-.02em}
.regime-pct{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.regime-economy{margin-top:14px;padding:14px 16px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:12px}
.regime-economy strong{display:block;font-family:var(--serif);font-weight:700;font-size:18px;color:var(--accent);letter-spacing:-.02em}
.regime-economy span{font-size:13px;color:var(--ink-2)}
.icd-block{display:flex;flex-direction:column;gap:12px}
.icd-bar{height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.icd-bar > div{height:100%;background:var(--accent);border-radius:4px;transition:width .8s ease}
.icd-cols{display:grid;grid-template-columns:1fr;gap:10px}
@media (min-width:520px){.icd-cols{grid-template-columns:1fr 1fr}}
.icd-col{padding:12px 14px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px}
.icd-col h4{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;font-weight:600}
.icd-col.ok h4{color:var(--accent)}
.icd-col.faltam h4{color:var(--warn)}
.icd-col ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.icd-col li{font-size:12px;color:var(--ink-2);padding-left:14px;position:relative}
.icd-col.ok li::before{content:'✓';position:absolute;left:0;color:var(--accent);font-weight:700}
.icd-col.faltam li::before{content:'·';position:absolute;left:0;color:var(--warn);font-weight:700}
.c3-block{padding:24px;background:linear-gradient(180deg,var(--accent-soft) 0%,var(--surface) 100%);border:1px solid var(--accent-line);border-radius:20px;text-align:center}
.c3-icon{width:48px;height:48px;margin:0 auto 12px;display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:var(--accent-ink);border-radius:14px}
.c3-icon svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none}
.c3-title{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.025em;color:var(--ink);margin-bottom:8px}
.c3-msg{font-size:14px;color:var(--ink-2);line-height:1.5;max-width:480px;margin:0 auto 20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;font-family:var(--sans);font-weight:600;font-size:14px;border:0;border-radius:999px;cursor:pointer;text-decoration:none;transition:all .15s ease}
.btn-primary{background:var(--accent);color:var(--accent-ink)}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-secondary{background:var(--surface);border:1px solid var(--line-strong);color:var(--ink)}
.btn-secondary:hover{background:var(--surface-2)}
.footer{margin-top:48px;padding:24px 20px 40px;border-top:1px solid var(--line);text-align:center}
.footer p{font-size:12px;color:var(--ink-4);font-family:var(--mono);letter-spacing:.04em}
.footer a{color:var(--ink-3);text-decoration:none}
.footer a:hover{color:var(--accent)}
.skel{background:linear-gradient(90deg,var(--surface-2) 0%,var(--line) 50%,var(--surface-2) 100%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-hero{height:200px;margin-bottom:16px}
.skel-stats{height:80px;margin-bottom:16px}
.skel-section{height:240px;margin-bottom:16px}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="/" class="brand"><em>1</em>NEGÓCIO</a>

  } else {
    try { await navigator.clipboard.writeText(url); alert('Link copiado!'); }

});

async function init(){

      const arr = await r.json();
      if (arr && arr[0]) resolvedId = arr[0].id;
    } catch(e) {}
  }
  if (!resolvedId) return showError('Negócio não encontrado', 'O código informado não corresponde a nenhum negócio.');

function renderFinanceiro(){
  const c = CALC;
  if (n(c.fat_mensal) <= 0) return;
  const fam = n(c.fat_mensal);

  const bench = c.bench_dre || {};
  const pctF = v => fat > 0 ? ((Math.abs(v)/fat)*100).toFixed(1).replace('.0','') + '%' : '—';
  const benchF = (key, v) => {
    if (!bench[key]) return '—';
    const realPct = fat > 0 ? Math.abs(v)/fat*100 : 0;
    const diff = realPct - bench[key];
    if (Math.abs(diff) < 1) return `${bench[key]}% (na média)`;
    return `${bench[key]}% (${diff>0?'+':''}${diff.toFixed(1)})`;
  };
  const row = (label, mensal, anual, cls, benchKey) => `<tr class="${cls||''}"><td>${label}</td><td class="v">R$${brl(Math.abs(mensal))}</td><td class="v">R$${brl(Math.abs(anual))}</td><td class="pct">${pctF(anual)}</td><td class="bench">${benchKey?benchF(benchKey, anual):'—'}</td></tr>`;

  const recLiq = n(c.rec_liq);
  const cmv = n(c.cmv);
  const lb = n(c.lb);
  const folha = n(c.clt_folha) + n(c.clt_encargos) + n(c.clt_provisoes) + n(c.pj_custo) + n(c.prol);
  const aluguel = n(c.aluguel);
  const facilities = n(c.facilities);
  const sistemas = n(c.sistemas);
  const cf = n(c.cf);
  const mkt = n(c.mkt);
  const ro = n(c.ro_mensal);
  const roA = n(c.ro_anual);

          <tbody>
            ${row('Receita Bruta', fam, fat)}
            ${row('(-) Impostos', -n(c.impostos), -n(c.impostos)*12, 'neg', 'imp')}
            ${row('(-) Taxas recebimento', -n(c.taxas), -n(c.taxas)*12, 'neg', 'tax')}
            ${row('(-) Comissões', -n(c.comissoes), -n(c.comissoes)*12, 'neg', 'com')}
            ${n(c.royalty) ? row('(-) Royalty', -n(c.royalty), -n(c.royalty)*12, 'neg') : ''}
            ${n(c.mkt_franq) ? row('(-) Marketing franquia', -n(c.mkt_franq), -n(c.mkt_franq)*12, 'neg') : ''}
            ${row('Receita líquida', recLiq, recLiq*12, 'sub')}
            ${row('(-) CMV / Custos variáveis', -cmv, -cmv*12, 'neg', 'cmv')}
            ${row('Lucro bruto', lb, lb*12, 'sub')}
            ${row('(-) Folha + encargos', -folha, -folha*12, 'neg', 'fol')}
            ${aluguel ? row('(-) Aluguel', -aluguel, -aluguel*12, 'neg', 'alu') : ''}
            ${facilities ? row('(-) Utilidades', -facilities, -facilities*12, 'neg') : ''}
            ${sistemas ? row('(-) Sistemas', -sistemas, -sistemas*12, 'neg') : ''}
            ${mkt ? row('(-) Marketing', -mkt, -mkt*12, 'neg') : ''}
            ${cf ? row('(-) Custos fixos', -cf, -cf*12, 'neg') : ''}
            <tr class="total"><td>Resultado operacional</td><td class="v">R$${brl(ro)}</td><td class="v">R$${brl(roA)}</td><td class="pct">${n(c.margem_pct).toFixed(1).replace('.0','')}%</td><td class="bench">${bench.ro || '12'}% benchmark</td></tr>
          </tbody>
        </table>
      </div>
      <h3 style="font-family:var(--serif);font-weight:700;font-size:18px;letter-spacing:-.02em;margin:24px 0 12px 0">Balanço patrimonial</h3>
      ${renderBalanco(c)}

  $('#main').appendChild(sec);
}

function renderBalanco(c){
  const ativos = n(c.totAtiv);
  const passivos = n(c.totPass);

      ${n(c.estoque) ? `<div class="b-row b-sub"><span>Estoque</span><span>R$${brl(c.estoque)}</span></div>` : ''}

      <div class="b-row b-total r"><span>Passivos totais</span><span>R$${brl(passivos)}</span></div>
      ${n(c.forn) ? `<div class="b-row b-sub"><span>Fornecedores</span><span>R$${brl(c.forn)}</span></div>` : ''}

      <div class="b-row b-total"><span>Patrimônio líquido</span><span>R$${brl(pl)}</span></div>

function renderIndicadores(){

        ${ro_func>0 ? indBox('Resultado/funcion.', `R$${brl(ro_func)}`, 'g', 'por colaborador/ano') : ''}
        ${indBox('Ponto equilíbrio', `R$${brl(pe)}`, '', 'estimativa setor')}

    </div>
  `;

    {k:'ise_fin', l:'Financeiro', max:10},

function renderAnalise1N(){
  const c = CALC;
  const aval = n(c.valor_venda);
  if (!aval) return;
  const fator = n(c.fator);
  const ise = Math.round(n(c.ise_total));
  const iseCls = c.mul_ise_nome || c.ise_class || '—';
  const iseColor = ise>=65?'var(--accent)':ise>=50?'var(--warn)':'var(--alert)';
  const iseBgAlpha = ise>=65?'var(--accent-soft)':ise>=50?'var(--warn-soft)':'var(--alert-soft)';
  const ops = c.ops || [];
  const totalOps = n(c.total_ops);
  const valorPotencial = aval + (totalOps * 12);
  const upsidePct = aval > 0 ? Math.round(((totalOps*12)/aval)*100) : 0;
  const opsTop = ops.slice(0,3);
  const opsOutros = Math.max(0, ops.length - 3);
  const dep = n(c.ise_dep) >= 7 ? 'Baixa' : n(c.ise_dep) >= 5 ? 'Média' : 'Alta';
  const rec = Math.round(n(c.recorrencia));
  const checks = [
    {ok: c.num_funcs >= 3, txt: c.num_funcs >= 3 ? `Equipe de ${c.num_funcs} colaboradores — operação independente` : 'Equipe enxuta — verificar transferibilidade'},
    {ok: c.processos === 'sim', txt: c.processos === 'sim' ? 'Processos documentados' : c.processos === 'parcial' ? 'Processos parcialmente documentados' : 'Processos informais'},
    {ok: dep === 'Baixa', txt: `Sócio-dependência ${dep.toLowerCase()}`},
    {ok: rec >= 30, txt: rec >= 30 ? `Receita recorrente ${rec}% — fluxo previsível` : 'Baixa recorrência — avaliar pipeline'},
  ];
  const trOk = checks.filter(ck => ck.ok).length;
  const trConclusion = trOk >= 3 ? 'Risco de continuidade <em>BAIXO</em>' : trOk >= 2 ? 'Risco de continuidade <em>MÉDIO</em>' : 'Risco de continuidade <em>ALTO</em>';
  const ro = n(c.ro_anual);
  const paybackAnos = ro > 0 ? (aval/ro).toFixed(1) : '—';
  const paybackOk = ro > 0 && (aval/ro) <= 6;
  const pl = n(c.pl);

  const sec = document.createElement('section');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-head">
      <div class="section-sub">ANÁLISE 1N</div>
      <h2 class="section-title">Análise técnica</h2>
    </div>
    <div class="ana-grid">
      <div class="ana-block">
        <div class="ana-head"><span>Como chegamos na avaliação</span><span class="ana-tag">FATOR ${fator.toFixed(1)}×</span></div>
        <div class="ana-big g"><span class="rs">R$</span>${brl(aval)}</div>
        <div class="ana-formula"><em>método:</em> Resultado operacional anual × Fator 1N + Patrimônio<br><span style="font-size:11px;opacity:.75">Fator 1N composto por modelagem setorial e maturidade empresarial</span></div>
      </div>
      ${ops.length > 0 ? `
      <div class="ana-block featured">
        <div class="ana-head"><span>Valor potencial · com upsides</span>${upsidePct>0?`<span class="ana-tag">+${upsidePct}%</span>`:''}</div>
        <div class="ana-big g"><span class="rs">até R$</span>${brl(valorPotencial)}</div>
        <div class="ana-ise-desc" style="margin-top:-2px">${ops.length} oportunidade${ops.length>1?'s':''} identificada${ops.length>1?'s':''} · +R$${brl(totalOps)}/mês potencial</div>
        <div class="upsides">
          ${opsTop.map((u,idx) => `<div class="upside-row"><span class="upside-n">${idx+1}</span><div class="upside-body"><span class="upside-t">${u.titulo}</span><span class="upside-sub">${u.descricao}</span></div><span class="upside-imp">${u.ganho_label}</span></div>`).join('')}
        </div>
        ${opsOutros > 0 ? `<div class="upsides-more">+ ${opsOutros} outra${opsOutros>1?'s':''} oportunidade${opsOutros>1?'s':''} no laudo completo</div>` : ''}
      </div>` : ''}
      <div class="ana-block">
        <div class="ana-head"><span>Índice de Saúde Empresarial</span></div>
        <div class="ana-ise-score">
          <div class="ise-n" style="color:${iseColor}">${ise}<span>/100</span></div>
          <div class="ise-cls" style="color:${iseColor};background:${iseBgAlpha}">${iseCls}</div>
        </div>
        <div class="ana-ise-desc">${ise>=80?'Negócio com estrutura operacional madura e baixo risco.':ise>=65?'Operação estável com fundamentos consistentes.':ise>=50?'Operação com pontos a monitorar — due diligence recomendada.':'Requer atenção em múltiplos pilares — alto potencial de melhoria.'}</div>
      </div>
      <div class="ana-block">
        <div class="ana-head"><span>Fator de transferibilidade</span></div>
        <div class="ana-checks">${checks.map(ck => `<div class="ck ${ck.ok?'':'warn'}"><span class="ck-i">${ck.ok?'✓':'!'}</span><span>${ck.txt}</span></div>`).join('')}</div>
        <div class="ana-conclusion">${trConclusion}</div>
      </div>
      <div class="ana-block">
        <div class="ana-head"><span>Prazo estimado de ROI</span><span>payback</span></div>
        <div class="ana-big ${paybackOk?'g':''}">${paybackAnos}<span class="rs" style="margin-left:4px">anos</span></div>
        <div class="ana-formula"><em>avaliação:</em> R$${brl(aval)}<br><em>fluxo anual:</em> R$${brl(ro)}</div>
        <div class="ana-conclusion">${paybackOk?'Payback <em>dentro</em> do esperado para o setor':ro>0?'Payback <em>acima</em> da média — reavaliar valor':'Resultado não calculável'}</div>
      </div>
      ${pl !== 0 ? `
      <div class="ana-block">
        <div class="ana-head"><span>Patrimônio na avaliação</span></div>
        <div class="ana-big ${pl>0?'g':'a'}"><span class="rs">R$</span>${brl(Math.abs(pl))}</div>
        <div class="ana-formula"><em>ativos:</em> R$${brl(c.totAtiv)}<br><em>passivos:</em> R$${brl(c.totPass)}</div>
        <div class="ana-conclusion">${pl > 0 ? 'PL positivo — ativos superam passivos, somando ao valor da operação.' : 'PL negativo — passivos superam ativos, reduzindo o valor da operação.'}</div>
      </div>` : ''}
    </div>
  `;
  $('#main').appendChild(sec);
}

function renderAtratividade(){
  const c = CALC;
  if (!c.atr_score) return;
  const score = n(c.atr_score);
  const lbl = c.atr_lbl || '—';
  const bars = [
    {k:'atr_set', l:'Setor', max:10},
    {k:'atr_rec', l:'Recorrência', max:10},
    {k:'atr_ind', l:'Indicadores', max:10},
    {k:'atr_cre', l:'Crescimento', max:10},
    {k:'atr_mar', l:'Margem', max:10},
    {k:'atr_sol', l:'Solidez', max:10},
  ].filter(b => c[b.k] !== undefined && c[b.k] !== null);
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-head">
      <div class="section-sub">ATRATIVIDADE</div>
      <h2 class="section-title">Para o comprador</h2>
    </div>
    <div class="panel">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div class="ise-n" style="color:${score>=7?'var(--accent)':score>=5?'var(--warn)':'var(--alert)'}">${score.toFixed(1)}<span>/10</span></div>
        <div class="ise-cls" style="color:${score>=7?'var(--accent)':score>=5?'var(--warn)':'var(--alert)'};background:${score>=7?'var(--accent-soft)':score>=5?'var(--warn-soft)':'var(--alert-soft)'}">${lbl}</div>
      </div>
      <div class="atr-bars">
        ${bars.map(b => {
          const v = n(c[b.k]);
          const pct = (v/b.max)*100;
          return `<div class="atr-row"><span class="atr-label">${b.l}</span><div class="atr-bar"><div style="width:${pct}%"></div></div><span class="atr-val">${v.toFixed(1)}</span></div>`;
        }).join('')}
      </div>
    </div>
  `;
  $('#main').appendChild(sec);
}

function renderTributario(){
  const c = CALC;
  const reg = c.analise_regimes;
  if (!reg || !reg.regimes || reg.regimes.length === 0) return;
  const atual = reg.regime_atual ? reg.regime_atual.toLowerCase() : '';
  const cards = reg.regimes.map(r => {
    const nome = r.regime.toLowerCase();
    const isAtual = nome.includes(atual.replace('_',' ')) || atual.includes(nome.replace(' ','_'));
    const isOtimo = r.regime === reg.regime_otimo;
    return `<div class="regime-card ${isOtimo?'otimo':isAtual?'atual':''}">
      <span class="regime-name">${r.regime}${isAtual?'<span class="regime-tag">ATUAL</span>':''}${isOtimo?'<span class="regime-tag">RECOMENDADO</span>':''}</span>
      <span class="regime-imp">R$${brl(r.imposto_mensal)}</span>
      <span class="regime-pct">${n(r.pct).toFixed(1)}% efetivo / mês</span>
    </div>`;
  }).join('');
  const econ = reg.tem_oportunidade ? `<div class="regime-economy"><strong>Economia potencial: R$${brl(reg.economia_anual)}/ano</strong><span>Migrando de ${reg.regime_atual === 'simples' ? 'Simples Nacional' : reg.regime_atual} para ${reg.regime_otimo}</span></div>` : '';
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-head">
      <div class="section-sub">TRIBUTÁRIO</div>
      <h2 class="section-title">Análise de regimes</h2>
    </div>
    <div class="panel">
      <div class="regime-grid">${cards}</div>
      ${econ}
    </div>
  `;
  $('#main').appendChild(sec);
}

function renderICD(){
  const c = CALC;
  if (!c.icd_pct && !c.icd_respondidos) return;
  const pct = Math.round(n(c.icd_pct));
  const ok = c.icd_respondidos || [];
  const faltam = c.icd_nao_respondidos || [];
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="section-head">
      <div class="section-sub">COMPLETUDE</div>
      <h2 class="section-title">Confiabilidade da análise</h2>
    </div>
    <div class="panel">
      <div class="icd-block">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <span style="font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em">${ok.length} de ${ok.length+faltam.length} indicadores respondidos</span>
          <span style="font-family:var(--serif);font-weight:700;font-size:24px;color:var(--accent);letter-spacing:-.02em">${pct}%</span>
        </div>
        <div class="icd-bar"><div style="width:${pct}%"></div></div>
        <div class="icd-cols">
          ${ok.length ? `<div class="icd-col ok"><h4>Respondidos (${ok.length})</h4><ul>${ok.map(i => `<li>${i}</li>`).join('')}</ul></div>` : ''}
          ${faltam.length ? `<div class="icd-col faltam"><h4>Não declarados (${faltam.length})</h4><ul>${faltam.map(i => `<li>${i}</li>`).join('')}</ul></div>` : ''}
        </div>
      </div>
    </div>
  `;
  $('#main').appendChild(sec);
}

function renderCamada3(){
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.innerHTML = `
    <div class="c3-block">
      <div class="c3-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
      <h2 class="c3-title">Material confidencial</h2>
      <p class="c3-msg">Acesse dados sigilosos do negócio (identificação, sócios, ponto comercial, contatos, documentos) após assinar o termo de confidencialidade.</p>
      <div class="state-actions"><a href="/" class="btn btn-primary">Solicitar acesso</a></div>
    </div>
  `;
  $('#main').appendChild(sec);
}

init();
</script>
</body>
</html>
