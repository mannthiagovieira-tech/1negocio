<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1Negócio — Empresas à venda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Mono:wght@400;500&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080D0A;--surface:#0d1109;--surface2:#111a0f;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --green:#3DFF7A;--amber:#FFB03A;--fog:#F0F5F1;
  --dim:rgba(240,245,241,0.45);--faint:rgba(240,245,241,0.18);
  --cab:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;--syne:'Syne',sans-serif;
}
html{background:var(--bg);-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:var(--bg);font-family:var(--mono);color:var(--fog);max-width:680px;margin:0 auto}

/* ══════════════════════════════
   CABEÇALHO
══════════════════════════════ */
.hdr{background:var(--bg);border-radius:0 0 20px 20px;overflow:hidden;position:sticky;top:0;z-index:200}

.h-logo{display:flex;align-items:center;justify-content:space-between;height:40px;padding:0 13px;border-bottom:0.5px solid var(--border)}
.logo{font-family:var(--syne);font-weight:900;font-size:15px;letter-spacing:-0.02em;color:var(--fog);text-decoration:none}
.logo em{color:var(--green);font-style:normal}
.btn-av{font-family:var(--cab);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.07em;color:var(--bg);background:var(--green);padding:5px 13px;border:none;border-radius:20px;cursor:pointer;white-space:nowrap;text-decoration:none}

/* ticker bloomberg */
.ticker-wrap{height:24px;overflow:hidden;border-bottom:0.5px solid var(--border);position:relative}
.ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:28px;z-index:2;pointer-events:none}
.ticker-wrap::before{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.ticker-wrap::after{right:0;background:linear-gradient(-90deg,var(--bg),transparent)}
.ticker-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:tickerScroll 32s linear infinite}
.ticker-track:hover{animation-play-state:paused}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t-item{display:inline-flex;align-items:center;gap:5px;padding:0 11px;border-right:0.5px solid var(--border);flex-shrink:0;height:100%}
.t-lbl{font-size:6.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--faint)}
.t-val{font-family:var(--cab);font-weight:800;font-size:10px;color:var(--fog);letter-spacing:-0.02em}
.t-val.g{color:var(--green)}.t-val.a{color:var(--amber)}

.h-nav{display:flex;align-items:stretch;justify-content:center;height:28px;border-bottom:0.5px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.h-nav::-webkit-scrollbar{display:none}
.nl{font-family:var(--cab);font-weight:500;color:var(--faint);font-size:9px;padding:0 11px;display:flex;align-items:center;border-right:0.5px solid rgba(255,255,255,.05);white-space:nowrap;flex-shrink:0;text-decoration:none}
.nl.on{color:var(--green);font-weight:700}

.h-filter{display:flex;align-items:center;height:34px;overflow:hidden}
.btn-estado{display:flex;align-items:center;gap:4px;height:100%;padding:0 10px;border:none;cursor:pointer;background:var(--surface);font-family:var(--cab);font-weight:700;font-size:9px;color:var(--dim);border-right:0.5px solid var(--border);flex-shrink:0;white-space:nowrap;position:relative}
.btn-estado.ativo{color:var(--green)}
.btn-estado.ativo::after{content:'';position:absolute;top:5px;right:5px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.tags-scroll{flex:1;min-width:0;display:flex;align-items:center;gap:5px;padding:0 8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tags-scroll::-webkit-scrollbar{display:none}
.tag-all{font-family:var(--cab);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:20px;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;background:rgba(240,245,241,.88);color:var(--bg);transition:all .15s}
.tag-all.off{background:rgba(255,255,255,.08);color:var(--faint)}
.cat-tag{font-family:var(--cab);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0;opacity:.42;transition:all .15s}
.cat-tag.on{opacity:1}
.hdr-bridge{height:16px;background:var(--bg)}
/* stripe de estados */
.h-estados{display:flex;align-items:center;height:30px;border-top:0.5px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 10px;gap:5px}
.h-estados::-webkit-scrollbar{display:none}
.est-tag{font-family:var(--cab);font-weight:600;font-size:8px;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:20px;border:.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.4);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.est-tag.on{border-color:rgba(255,255,255,.45);color:rgba(255,255,255,.85);background:rgba(255,255,255,.06)}
.est-tag.sem{opacity:.18;cursor:not-allowed;border-color:rgba(255,255,255,.07)}


/* ══════════════════════════════
   CARDS
══════════════════════════════ */
.main{padding:8px 8px 32px}

.card{
  border-radius:14px;overflow:hidden;
  position:relative;margin-top:-44px;
  border:1px solid rgba(255,255,255,.1);
  height:172px;cursor:pointer;
  box-shadow:0 -4px 18px rgba(0,0,0,.4);
  animation:floatIn .38s cubic-bezier(.34,1.4,.64,1) both;
  transition:border-color .15s;
}
.card:first-child{margin-top:0;box-shadow:none}
.card:hover{border-color:rgba(255,255,255,.2)}
/* OPORTUNIDADE — pontinho + texto inline, opção C */
.card-op{display:inline-flex;align-items:center;gap:3px;margin-left:6px}
.card-op-dot{width:5px;height:5px;border-radius:50%;background:#3DFF7A;flex-shrink:0;margin-top:1px}
.card-op-txt{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
@keyframes floatIn{from{transform:translateY(18px);opacity:.4}to{transform:translateY(0);opacity:1}}

.card-inner{display:flex;height:100%}
.card-left{flex:1;min-width:0;padding:10px 8px 10px 11px;display:flex;flex-direction:column;justify-content:space-between}
.card-top{display:flex;flex-direction:column;gap:2px}
.card-meta{font-size:8px;letter-spacing:.1em;text-transform:uppercase;opacity:.42}
.card-title{font-family:var(--cab);font-weight:800;font-size:13px;letter-spacing:.03em;text-transform:uppercase;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* tag ISE */
.card-ise{font-size:7.5px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:20px;display:inline-block;white-space:nowrap}

/* KPIs proporcionais — substituem row5 */
.card-kpis{
  display:flex;align-items:stretch;
  border-top:.5px solid rgba(0,0,0,.15);
  padding-top:6px;
  flex-shrink:0;
  gap:0;
}
.ck{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0;padding-right:5px;border-right:.5px solid rgba(0,0,0,.12)}
.ck:last-child{border-right:none;padding-right:0}
.ck.pl{padding-left:5px}
.ck-l{font-size:8px;text-transform:uppercase;letter-spacing:.06em;opacity:.42;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ck-v{font-family:var(--cab);font-weight:800;font-size:13px;letter-spacing:-.01em;white-space:nowrap}

.card-div{width:.5px;background:rgba(0,0,0,.18);flex-shrink:0}
.card-right{width:96px;flex-shrink:0;padding:9px 10px;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:space-between}
.csep{width:100%;height:.5px;background:rgba(0,0,0,.14)}
.csep-op{display:flex;align-items:center;gap:3px;width:100%;padding:3px 0}
.csep-op-dot{width:5px;height:5px;border-radius:50%;background:#3DFF7A;flex-shrink:0}
.csep-op-txt{font-family:var(--cab);font-weight:700;font-size:8px;text-transform:uppercase;letter-spacing:.08em}
.vl{font-size:6px;text-transform:uppercase;letter-spacing:.1em;opacity:.32}
.vv{font-family:var(--cab);font-weight:800;font-size:20px;letter-spacing:-.025em;line-height:1;display:flex;align-items:baseline;gap:1px}
.vrs{font-size:10px;font-weight:700;opacity:.55}
.obs{display:flex;flex-direction:column;gap:3px;width:100%}
.ol{font-size:6px;text-transform:uppercase;letter-spacing:.08em;opacity:.28}
.ov{font-family:var(--cab);font-weight:500;font-size:8.5px;opacity:.42}
.el{font-size:6px;text-transform:uppercase;letter-spacing:.08em;opacity:.3}
.ev{font-family:var(--cab);font-weight:700;font-size:10px;opacity:.6}
.ml{font-size:6px;text-transform:uppercase;letter-spacing:.08em;opacity:.28}
.mv{font-family:var(--cab);font-weight:800;font-size:12px}

/* ══════════════════════════════
   OVERLAY + SHEET EXPANDIDO
══════════════════════════════ */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.65);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{
  width:100%;max-width:680px;
  height:calc(100dvh - 44px);
  border-radius:20px 20px 0 0;
  overflow:hidden;display:flex;flex-direction:column;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.32,0,.15,1);
}
.overlay.on .sheet{transform:translateY(0)}

/* TOPO DO SHEET — mesma cor do card */
.sheet-hdr{
  flex-shrink:0;
  position:relative;
  /* cor injetada via JS */
}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,.15);margin:0 auto 10px}
.btn-close{
  position:absolute;top:11px;right:12px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.1);border:.5px solid rgba(0,0,0,.15);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:inherit;transition:background .15s;
}
.btn-close:hover{background:rgba(0,0,0,.18)}
.sh-meta{font-size:8px;letter-spacing:.12em;text-transform:uppercase;opacity:.42;margin-bottom:3px;font-family:var(--mono)}
.sh-title{font-family:var(--cab);font-weight:800;font-size:14px;letter-spacing:.03em;text-transform:uppercase;line-height:1.2;margin-bottom:10px}
/* linha de valores no topo — mesma estrutura dos KPIs do card */
.sh-vals{display:flex;align-items:stretch;border-top:.5px solid rgba(0,0,0,.12);padding-top:10px;gap:0}
.sv-col{display:flex;flex-direction:column;gap:3px;flex:1;padding-right:12px;border-right:.5px solid rgba(0,0,0,.12)}
.sv-col:last-child{border-right:none;padding-right:0}
.sv-col.pl{padding-left:12px}
.sv-l{font-size:7.5px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;font-family:var(--mono)}
.sv-v{font-family:var(--cab);font-weight:800;font-size:16px;letter-spacing:-.02em;line-height:1}
.sv-tag{margin-top:3px}

/* CARROSSEL */
.car-body{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);min-height:0}
.car-vp{flex:1;overflow:hidden;min-height:0}
.car-track{display:flex;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.slide{min-width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 10px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}

/* indicador de carrossel — dots numerados */
.car-indicator{
  display:flex;align-items:center;justify-content:center;gap:4px;
  padding:7px 0;
  background:var(--surface);
  border-top:.5px solid var(--border);
  flex-shrink:0;
}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.14);cursor:pointer;transition:all .2s}
.dot.on{width:18px;border-radius:3px;background:var(--green)}
.car-hint{font-size:8px;color:var(--faint);font-family:var(--mono);margin-left:8px}

/* nav setas */
.car-nav{display:flex;align-items:center;justify-content:space-between;padding:5px 14px 6px;background:var(--surface);border-top:.5px solid var(--border);flex-shrink:0}
.car-btn{background:none;border:.5px solid var(--border2);font-family:var(--mono);font-size:10px;color:var(--faint);padding:4px 12px;cursor:pointer;border-radius:20px;transition:all .12s}
.car-btn:hover:not(:disabled){border-color:var(--dim);color:var(--dim)}
.car-btn:disabled{opacity:.18;pointer-events:none}
.car-num{font-size:10px;color:var(--faint);font-family:var(--mono)}

/* RODAPÉ FIXO */
.car-footer{
  display:flex;gap:8px;padding:10px 14px 14px;
  background:var(--bg);
  border-top:.5px solid var(--border);
  flex-shrink:0;
}
.btn-solicitar{
  flex:1;background:var(--green);color:var(--bg);border:none;
  font-family:var(--cab);font-weight:700;font-size:12px;
  padding:12px;cursor:pointer;border-radius:10px;
  text-transform:uppercase;letter-spacing:.04em;
  transition:opacity .15s;
}
.btn-solicitar:hover{opacity:.88}
.btn-share{
  background:none;border:.5px solid var(--border2);
  font-family:var(--mono);font-size:11px;color:var(--faint);
  padding:12px 14px;cursor:pointer;border-radius:10px;
  display:flex;align-items:center;gap:5px;transition:all .12s;
}
.btn-share:hover{border-color:var(--dim);color:var(--dim)}

/* ══════════════════════════════
   SLIDES INTERNOS — dark
══════════════════════════════ */
.s-lbl{font-size:.56rem;text-transform:uppercase;letter-spacing:.14em;color:var(--faint)}
.ia-block{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:10px 12px}
.ia-h{font-family:var(--cab);font-weight:700;font-size:.8rem;color:var(--green);margin-bottom:4px}
.ia-p{font-size:.68rem;color:var(--dim);line-height:1.65}
.nums{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.nc{background:var(--surface);border:.5px solid var(--border);border-radius:8px;padding:9px 10px}
.nc-l{font-size:.52rem;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:2px}
.nc-v{font-family:var(--cab);font-weight:800;font-size:1rem;color:var(--fog);letter-spacing:-.02em;line-height:1}
.nc-v.g{color:var(--green)}.nc-v.a{color:var(--amber)}
.nc-s{font-size:.52rem;color:var(--faint);margin-top:2px}
.dre,.bp,.vblock{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:10px 12px}
.bp{display:flex;flex-direction:column;gap:8px}
.dr,.bpr,.vbr{display:flex;align-items:baseline;justify-content:space-between;padding:4px 0;border-bottom:.5px solid rgba(255,255,255,.04)}
.dr:last-child,.bpr:last-child,.vbr:last-child{border-bottom:none}
.dr.tot{border-top:.5px solid rgba(255,255,255,.07);margin-top:2px;padding-top:6px}
.dr-l,.bpr-l,.vbr-l{font-size:.65rem;color:var(--faint)}
.dr-l.i{padding-left:10px;font-size:.6rem;color:rgba(255,255,255,.22)}
.bp-sec{font-size:.52rem;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);margin-bottom:3px}
.dr-v,.bpr-v,.vbr-v{font-family:var(--cab);font-weight:700;font-size:.72rem;color:var(--dim)}
.dr-v.g,.vbr-v.g{color:var(--green)}.dr-v.r{color:var(--amber)}.dr-v.b{font-size:.82rem;font-weight:800;color:var(--fog)}
.vbr-v.ink{color:var(--fog)}
.bp-tot{display:flex;justify-content:space-between;padding-top:6px;border-top:.5px solid rgba(255,255,255,.07)}
.bp-tot-l{font-size:.65rem;color:var(--dim);font-weight:500}
.bp-tot-v{font-family:var(--cab);font-weight:800;font-size:.85rem;color:var(--green)}
.ise-hero{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(61,255,122,.05);border:.5px solid rgba(61,255,122,.18);border-radius:10px}
.ise-n{font-family:var(--cab);font-weight:800;font-size:2.2rem;color:var(--green);letter-spacing:-.03em;line-height:1}
.ise-t{font-size:.7rem;color:rgba(61,255,122,.88);font-weight:500}
.ise-s{font-size:.57rem;color:rgba(61,255,122,.42);margin-top:2px}
.pilar{margin-bottom:6px}
.pilar-h{display:flex;justify-content:space-between;margin-bottom:2px;font-size:.6rem}
.pilar-n{color:var(--faint)}.pilar-s{font-weight:500}
.pilar-bg{height:2px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.pilar-fill{height:100%;border-radius:2px}
.bench{margin-bottom:8px}
.bench-h{display:flex;justify-content:space-between;margin-bottom:3px;font-size:.6rem}
.bench-l{color:var(--faint)}.bench-v{font-weight:500;color:var(--green)}.bench-ref{color:rgba(255,255,255,.22)}
.bench-bar{height:4px;background:rgba(255,255,255,.05);border-radius:3px;position:relative}
.bar-ref{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.1);border-radius:3px}
.bar-val{position:absolute;left:0;top:0;height:100%;background:var(--green);border-radius:3px}
.bar-val.lo{background:var(--amber)}
.up-card{background:rgba(61,255,122,.04);border:.5px solid rgba(61,255,122,.14);border-radius:10px;overflow:hidden;margin-bottom:5px}
.up-head{padding:8px 12px 6px}
.up-t{font-family:var(--cab);font-weight:800;font-size:.72rem;color:var(--green);margin-bottom:2px}
.up-d{font-size:.6rem;color:var(--faint);line-height:1.5}
.up-kpis{display:grid;grid-template-columns:1fr 1fr;border-top:.5px solid rgba(61,255,122,.1)}
.uk{padding:6px 12px;border-right:.5px solid rgba(61,255,122,.1)}
.uk:last-child{border-right:none}
.uk-l{font-size:.52rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(61,255,122,.42);margin-bottom:1px}
.uk-v{font-family:var(--cab);font-weight:800;font-size:.72rem;color:var(--green)}
.mais{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.mais-ic{width:26px;height:26px;border-radius:50%;background:rgba(61,255,122,.1);display:flex;align-items:center;justify-content:center;font-family:var(--cab);font-weight:800;font-size:11px;color:var(--green);flex-shrink:0}
.mais-t{flex:1;font-size:.65rem;color:var(--dim);font-weight:500}
.mais-s{font-size:.57rem;color:var(--faint);margin-top:1px}
.vb-tag{font-size:.52rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.desc-box{background:rgba(61,255,122,.06);border:.5px solid rgba(61,255,122,.18);border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.db-l{font-size:.62rem;color:rgba(61,255,122,.7)}
.db-v{font-family:var(--cab);font-weight:800;font-size:.82rem;color:var(--green)}
.note{font-size:.52rem;color:rgba(255,255,255,.18);line-height:1.7;padding-top:5px}

/* modal estado */
.modal{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.72);align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.modal-sheet{width:100%;max-width:680px;background:var(--surface);border-radius:22px 22px 0 0;padding:18px 16px 36px;border:.5px solid var(--border)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.1);margin:0 auto 14px}
.modal-sheet h3{font-family:var(--cab);font-weight:800;font-size:14px;color:var(--fog);margin-bottom:12px}
.modal-opts{display:flex;flex-wrap:wrap;gap:7px}
.opt{font-family:var(--cab);font-weight:600;font-size:11px;padding:6px 13px;border-radius:20px;border:.5px solid rgba(255,255,255,.1);background:transparent;color:var(--faint);cursor:pointer;transition:all .12s}
.opt.on{background:var(--green);color:var(--bg);border-color:var(--green)}

@keyframes sk{0%,100%{opacity:1}50%{opacity:.35}}
.sk{border-radius:14px;animation:sk 1.4s ease-in-out infinite}
</style>
</head>
<body>

<div class="hdr">
  <div class="h-logo">
    <a class="logo" href="/"><em>1</em>NEGÓCIO</a>
    <a class="btn-av" href="/diagnostico.html">AVALIAR →</a>
  </div>
  <div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>
  <div class="h-nav">

  const iP=(n(nd.score_saude)||0)/100*25;
  const tags=Array.isArray(nd.tags_calculadas)?nd.tags_calculadas:[];

};
const calcPL=nd=>{
  const a=nd.ativos_json&&typeof nd.ativos_json==='object'?Object.values(nd.ativos_json).reduce((s,v)=>s+n(v),0):0;
  const p=nd.passivos_json&&typeof nd.passivos_json==='object'?Object.values(nd.passivos_json).reduce((s,v)=>s+n(v),0):0;
  return a-p;
};
const aderMerc=nd=>{
  const b={'Saúde & Estética':21,'Tecnologia / SaaS':28,'Alimentação':18,'Educação':22,'Comércio / Distribuição':12};
  const m=n(nd.margem_ebitda);return m?Math.round(m-(b[nd.categoria]||18)):null;
};

async function fetchData(){
  const r=await fetch(
    `${SUPA}/rest/v1/negocios?status=eq.publicado`+
    `&select=id,codigo,titulo_anuncio,categoria,cidade,estado,`+
    `faturamento_anual,resultado_liquido_mensal,ebitda,margem_ebitda,`+
    `folha_pagamento,aluguel_mensal,impostos_mensais,prolabore_mensal,cmv_mensal,`+
    `preco_pedido,valor_1n,score_saude,score_pilares,`+
    `ativos_json,passivos_json,tags_calculadas,tag_preco,`+

    `&titulo_anuncio=not.is.null&preco_pedido=not.is.null&valor_1n=not.is.null`+
    `&order=publicado_em.desc`,

</div></div>`,

`<div class="slide"><div class="s-lbl">05 · ISE — solidez empresarial</div>
<div class="ise-hero"><div class="ise-n">${score||'—'}</div><div><div class="ise-t">${score>=75?'Negócio atraente':score>=60?'Negócio sólido':score>=40?'Negócio básico':'Em risco'}</div><div class="ise-s">${score>=75?'Venda facilitada':score>=60?'Condições normais':score>=40?'Com desconto':'Difícil'}</div></div></div>
${Object.keys(pilares).length?Object.entries(pilares).map(([k,v])=>`<div class="pilar"><div class="pilar-h"><span class="pilar-n">${k}</span><span class="pilar-s" style="color:${pc[String(v)]||'#3DFF7A'}">${v}/10</span></div><div class="pilar-bg"><div class="pilar-fill" style="width:${n(v)*10}%;background:${pc[String(v)]||'#3DFF7A'}"></div></div></div>`).join(''):'<p style="font-size:.65rem;color:#fff3">Disponível após curadoria.</p>'}
</div>`,

`<div class="slide"><div class="s-lbl">06 · Benchmarks de mercado</div>
<div class="bench"><div class="bench-h"><span class="bench-l">Margem EBITDA</span><div><span class="bench-v">${pct(nd.margem_ebitda)} empresa</span> · <span class="bench-ref">benchmark setor</span></div></div><div class="bench-bar"><div class="bar-ref" style="width:40%"></div><div class="${n(nd.margem_ebitda)>=18?'bar-val':'bar-val lo'}" style="width:${Math.min(n(nd.margem_ebitda)*2,100)}%"></div></div></div>
${am!=null?`<div class="bench"><div class="bench-h"><span class="bench-l">Aderência ao mercado</span><span class="bench-v" style="color:${am>=0?'#3DFF7A':'#FFB03A'}">${am>0?'+'+am+'pp acima':am+'pp abaixo'}</span></div><div class="bench-bar"><div class="bar-ref" style="width:50%"></div><div class="${am>=0?'bar-val':'bar-val lo'}" style="width:${Math.min(50+am*2,100)}%"></div></div></div>`:''}
${n(nd.ebitda)?`<div class="bench"><div class="bench-h"><span class="bench-l">Múltiplo EBITDA</span><div><span class="bench-v">${(n(nd.valor_1n)/n(nd.ebitda)).toFixed(1)}× empresa</span> · <span class="bench-ref">4–7× setor</span></div></div><div class="bench-bar"><div class="bar-ref" style="width:70%"></div><div class="${(n(nd.valor_1n)/n(nd.ebitda))>=4?'bar-val':'bar-val lo'}" style="width:${Math.min((n(nd.valor_1n)/n(nd.ebitda))/7*100,100)}%"></div></div></div>`:''}
</div>`,

`<div class="slide"><div class="s-lbl">07 · Upsides identificados</div>
${tags.length?tags.map(t=>`<div class="up-card"><div class="up-head"><div class="up-t">${t}</div><div class="up-d">Oportunidade com potencial de valorização identificada pela 1N.</div></div><div class="up-kpis"><div class="uk"><div class="uk-l">Impacto estimado</div><div class="uk-v">A quantificar</div></div><div class="uk"><div class="uk-l">Upside valuation</div><div class="uk-v">A quantificar</div></div></div></div>`).join(''):'<p style="font-size:.65rem;color:#fff3">Disponível no dossiê.</p>'}
<div class="mais"><div class="mais-ic">${tags.length}</div><div><div class="mais-t">${tags.length} upsides identificados</div><div class="mais-s">Solicite o dossiê para análise completa</div></div></div>
</div>`,

`<div class="slide"><div class="s-lbl">08 · Valor de venda × avaliação 1N</div>
<div class="vblock">
<div class="vbr"><span class="vbr-l">Valor de venda (dono)</span><span class="vbr-v ink">${brl(nd.preco_pedido)}</span></div>
<div class="vbr"><span class="vbr-l">Avaliação independente 1N</span><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px"><span class="vbr-v g">${brl(nd.valor_1n)}</span>${op?`<span class="vb-tag" style="background:#3DFF7A;color:#080D0A">OPORTUNIDADE</span>`:'<span class="vb-tag" style="background:rgba(255,255,255,.07);color:rgba(255,255,255,.35)">NA FAIXA</span>'}</div></div>
</div>
${disc&&parseFloat(disc)>0?`<div class="desc-box"><span class="db-l">Desconto implícito</span><span class="db-v">${disc}% abaixo</span></div>`:''}
<div class="vblock">
<div class="vbr"><span class="vbr-l">Patrimônio líquido</span><span class="vbr-v" style="color:${pl>=0?'#3DFF7A':'#FFB03A'}">${pl>=0?'+ ':'– '}${brl(Math.abs(pl))}</span></div>
<div class="vbr"><span class="vbr-l">Valor efetivo</span><span class="vbr-v ink">${brl(ef)}</span></div>
</div>
<div class="note">Avaliação 1N independente · EBITDA × múltiplo setorial · patrimônio sobre ativos e passivos declarados</div>
</div>`,
  ];
}

/* ── TICKER ── */

const TODOS_ESTADOS=['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA','MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN','RO','RR','RS','SC','SE','SP','TO'];
function buildEstados(list){
  /* conta negócios por estado nos dados carregados */
  const contagem={};
  list.forEach(x=>{if(x.estado)contagem[x.estado]=(contagem[x.estado]||0)+1;});
  /* ordena: com negócios primeiro (desc), depois sem negócios */
  const comNegocios=TODOS_ESTADOS.filter(e=>contagem[e]>0).sort((a,b)=>(contagem[b]||0)-(contagem[a]||0));
  const semNegocios=TODOS_ESTADOS.filter(e=>!contagem[e]);
  const ordenados=[...comNegocios,...semNegocios];
  const el=document.getElementById('hEstados');
  el.innerHTML='';
  ordenados.forEach(e=>{
    const tem=!!contagem[e];
    const b=document.createElement('button');
    b.className='est-tag'+(estF===e?' on':'')+(tem?'':' sem');
    b.textContent=e;
    if(tem){
      b.onclick=()=>{
        estF=estF===e?null:e;
        document.querySelectorAll('.est-tag').forEach(t=>t.classList.toggle('on',t.textContent===estF));
        aplicar();
      };
    }else{
      b.disabled=true;
    }
    el.appendChild(b);
  });
}

function buildTicker(list){
  const fat=list.reduce((s,x)=>s+n(x.faturamento_anual),0);
  const val=list.reduce((s,x)=>s+n(x.valor_1n),0);
  const res=list.reduce((s,x)=>s+n(x.resultado_liquido_mensal)*12,0);
  const iseList=list.filter(x=>n(x.score_saude)>0);
  const ise=iseList.length?Math.round(iseList.reduce((s,x)=>s+n(x.score_saude),0)/iseList.length):0;
  const items=[
    {l:'Empresas à venda',v:String(list.length),c:''},
    {l:'Fat. combinado',v:'R$ '+brlS(fat),c:'g'},
    {l:'Valor avaliado',v:'R$ '+brlS(val),c:'g'},
    {l:'Resultado anual',v:'R$ '+brlS(res),c:'g'},
    {l:'ISE médio',v:String(ise)+'/100',c:ise>=70?'g':'a'},
    {l:'Setores',v:String(new Set(list.map(x=>x.categoria).filter(Boolean)).size),c:''},
    {l:'Estados',v:String(new Set(list.map(x=>x.estado).filter(Boolean)).size),c:''},
    {l:'Independente',v:'100%',c:'g'},
  ];
  const all=[...items,...items];
  document.getElementById('tickerTrack').innerHTML=
    all.map(it=>`<div class="t-item"><span class="t-lbl">${it.l}</span><span class="t-val ${it.c}">${it.v}</span></div>`).join('');
}

/* ── TAGS ── */
function buildTags(list){
  /* conta por família e ordena desc */
  const cnt={};
  list.forEach(x=>{const f=CMAP[(x.categoria||'').toLowerCase().trim()]||'outros';cnt[f]=(cnt[f]||0)+1;});
  const fams=new Set(Object.keys(cnt));
  const sc=document.getElementById('tagsScroll');
  sc.querySelectorAll('.cat-tag').forEach(t=>t.remove());
  CATS.filter(f=>fams.has(f)).sort((a,b)=>(cnt[b]||0)-(cnt[a]||0)).forEach(f=>{
    const p=PAL[f],b=document.createElement('button');
    b.className='cat-tag';b.dataset.fam=f;
    b.style.cssText=`background:${p.bg};border-color:${p.bd};color:${p.cor}`;
    b.textContent=p.lbl.toUpperCase();
    b.onclick=()=>filtrarCat(f);
    sc.appendChild(b);
  });
}
const filtrarCat=fam=>{
  catF=fam;
  document.getElementById('tagAll').classList.toggle('off',fam!==null);
  document.querySelectorAll('.cat-tag').forEach(t=>t.classList.toggle('on',t.dataset.fam===fam));
  aplicar();
};

/* ── LOCALIZAÇÃO ── */
function buildLoc(list){
  const ests=[...new Set(list.map(x=>x.estado).filter(Boolean))].sort();
  const opts=document.getElementById('modalOpts');
  opts.innerHTML='';
  const all=document.createElement('button');
  all.className='opt on';all.textContent='Todos os estados';all.onclick=()=>filtrarEst(null);
  opts.appendChild(all);
  ests.forEach(e=>{const b=document.createElement('button');b.className='opt';b.textContent=e;b.dataset.e=e;b.onclick=()=>filtrarEst(e);opts.appendChild(b);});
}
const filtrarEst=e=>{
  estF=e;
  document.querySelectorAll('.opt').forEach(o=>o.classList.toggle('on',e===null?!o.dataset.e:o.dataset.e===e));
  document.querySelectorAll('.est-tag').forEach(t=>t.classList.toggle('on',t.textContent===e));
  fecharModal();aplicar();
};
function abrirModal(){document.getElementById('modal').classList.add('on');document.body.style.overflow='hidden'}
function fecharModal(){document.getElementById('modal').classList.remove('on');document.body.style.overflow=''}

/* ── RENDER ── */
function aplicar(){
  let l=[...all];
  if(catF)l=l.filter(x=>(CMAP[(x.categoria||'').toLowerCase().trim()]||'outros')===catF);
  if(estF)l=l.filter(x=>x.estado===estF);
  l.sort((a,b)=>calcIO(b)-calcIO(a));
  filtered=l;render();
}
function render(){
  const stack=document.getElementById('stack');
  stack.innerHTML='';
  if(!filtered.length){stack.innerHTML='<p style="text-align:center;padding:3rem 0;font-size:12px;color:#fff3">Nenhum anúncio.</p>';return;}
  filtered.forEach((nd,i)=>stack.appendChild(mkCard(nd,i,filtered.length)));
}

(async()=>{
  try{
    all=await fetchData();
    all.sort((a,b)=>calcIO(b)-calcIO(a));
    filtered=[...all];
    buildTicker(all);buildTags(all);buildLoc(all);buildEstados(all);render();
  }catch(e){
    document.getElementById('stack').innerHTML=`<p style="text-align:center;padding:3rem 0;font-size:12px;color:#f874">Erro: ${e.message}</p>`;
    console.error(e);
  }
})();
</script>
</body>
</html>
