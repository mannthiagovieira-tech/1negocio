<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Negócio · 1Negócio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --serif:'Syne',Georgia,serif;
  --mono:'DM Mono',ui-monospace,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
:root[data-theme="light"]{
  --bg:#fafaf7;--surface:#ffffff;--surface-2:#f5f5f0;
  --line:rgba(20,20,18,.08);--line-strong:rgba(20,20,18,.16);
  --ink:#0c0c0a;--ink-2:#2a2a26;--ink-3:#5e5e58;--ink-4:#92928a;
  --accent:#10b981;--accent-ink:#053a28;
  --accent-soft:rgba(16,185,129,.10);--accent-line:rgba(16,185,129,.28);
  --warn:#d97706;--warn-soft:rgba(217,119,6,.08);
  --alert:#dc2626;--alert-soft:rgba(220,38,38,.08);
  --info:#2563eb;--info-soft:rgba(37,99,235,.08);
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.06);
}
:root[data-theme="dark"]{
  --bg:#0c0c0a;--surface:#161614;--surface-2:#1c1c1a;
  --line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.16);
  --ink:#f5f5f0;--ink-2:#d4d4cc;--ink-3:#92928a;--ink-4:#5e5e58;
  --accent:#3dff95;--accent-ink:#08130c;
  --accent-soft:rgba(61,255,149,.10);--accent-line:rgba(61,255,149,.28);
  --warn:#fbbf24;--warn-soft:rgba(251,191,36,.10);
  --alert:#f87171;--alert-soft:rgba(248,113,113,.10);
  --info:#60a5fa;--info-soft:rgba(96,165,250,.10);
  --shadow-sm:0 1px 2px rgba(0,0,0,.4);
  --shadow-md:0 4px 16px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:780px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-family:var(--serif);font-weight:800;font-size:17px;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
.brand em{color:var(--accent);font-style:normal}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;border:1px solid var(--line);border-radius:50%;color:var(--ink-2);cursor:pointer;transition:all .15s ease}
.icon-btn:hover{background:var(--surface-2);color:var(--ink);border-color:var(--line-strong)}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
main{flex:1;max-width:780px;width:100%;margin:0 auto;padding:24px 20px;display:flex;flex-direction:column;gap:36px}
@media (min-width:680px){main{padding:32px 24px;gap:48px}}
.state-box{margin:40px auto;max-width:480px;padding:32px 24px;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-md)}
.state-box.preparing{border-color:rgba(217,119,6,.2);background:var(--warn-soft)}
.state-icon{width:48px;height:48px;margin:0 auto 16px;display:inline-flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent);border-radius:50%}
.state-box.preparing .state-icon{background:rgba(217,119,6,.16);color:var(--warn)}
.state-icon svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none}
.state-title{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.02em;color:var(--ink);margin-bottom:8px}
.state-msg{font-size:14px;color:var(--ink-3);line-height:1.6;margin-bottom:20px}
.state-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ─── HERO ─── */
.hero{display:flex;flex-direction:column;gap:16px}
.hero-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--mono);font-size:13px;letter-spacing:.04em;color:var(--ink-2);text-transform:none;font-weight:500}
.hero-title{font-family:var(--serif);font-weight:800;font-size:clamp(28px,6vw,44px);letter-spacing:-.035em;line-height:1.1;color:var(--ink);margin:4px 0}
.hero-meta .sep{color:var(--ink-4);font-weight:400}
.hero-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-line);border-radius:999px;font-weight:700;font-size:11px;letter-spacing:.06em}
.hero-tag::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent)}
.hero-subtitle{font-size:15px;color:var(--ink-3);line-height:1.6;max-width:600px}

/* ─── PRICE BLOCK (valor pedido principal) ─── */
.price-hero{
  margin-top:8px;
  padding:24px;
  background:linear-gradient(180deg,var(--surface) 0%,var(--accent-soft) 100%);
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow-md);
  display:flex;flex-direction:column;gap:14px;
}
.price-label{
  font-family:var(--mono);font-size:10px;
  letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-3);
}
.price-main{
  font-family:var(--serif);font-weight:800;
  font-size:clamp(40px,9vw,64px);
  letter-spacing:-.04em;line-height:1;
  color:var(--ink);
}
.price-main .rs{font-size:.45em;color:var(--ink-3);margin-right:4px;font-weight:600}
.price-aval-line{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding-top:14px;border-top:1px solid var(--line);
}
.price-aval-l{
  font-family:var(--mono);font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-4);
}
.price-aval-v{
  font-family:var(--serif);font-weight:700;font-size:16px;
  letter-spacing:-.02em;color:var(--ink-2);
}
.price-aval-v .rs{font-size:.7em;color:var(--ink-4);margin-right:2px;font-weight:600}
.price-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;
  background:var(--accent-soft);color:var(--accent);
  border:1px solid var(--accent-line);
  border-radius:999px;
  font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
}
.price-tag.dn{background:var(--alert-soft);color:var(--alert);border-color:rgba(220,38,38,.28)}
.price-tag.eq{background:var(--surface-2);color:var(--ink-3);border-color:var(--line-strong)}
.price-aval-only{
  display:flex;flex-direction:column;gap:4px;
  padding-top:14px;border-top:1px solid var(--line);
}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.stat{padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
.stat-l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4)}
.stat-v{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:-.025em;color:var(--ink);line-height:1.1}
.stat-v.g{color:var(--accent)}
.stat-v.w{color:var(--warn)}
.stat-v.a{color:var(--alert)}
.stat-v .rs{font-size:.6em;color:var(--ink-4);font-weight:500;margin-right:2px}
.stat-v .unit{font-size:.55em;color:var(--ink-4);font-weight:500;margin-left:2px}
.stat-bar{position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--line)}
.stat-bar > div{height:100%;transition:width .6s ease}

/* Sections */
.section{display:flex;flex-direction:column;gap:14px}
.section-head{display:flex;flex-direction:column;gap:4px}
.section-title{font-family:var(--serif);font-weight:700;font-size:24px;letter-spacing:-.025em;color:var(--ink);line-height:1.15}
.section-sub{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--ink-3);text-transform:uppercase}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow-sm)}
@media (min-width:520px){.panel{padding:22px 24px}}

/* Editorial - texto fluido */
.editorial p{font-size:15px;color:var(--ink-2);line-height:1.7;margin-bottom:14px}
.editorial p:last-child{margin-bottom:0}
.editorial p strong{color:var(--ink);font-weight:600}

/* Highlights — Por que investir */
.highlights{display:flex;flex-direction:column;gap:10px}
.hl{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px}
.hl-i{flex-shrink:0;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;background:var(--accent);color:var(--accent-ink);font-family:var(--serif);font-weight:800;font-size:13px}
.hl-body{flex:1;display:flex;flex-direction:column;gap:2px}
.hl-t{font-size:14px;font-weight:600;color:var(--ink);line-height:1.3}
.hl-d{font-size:13px;color:var(--ink-3);line-height:1.4}

/* DRE */
.dre-wrap{overflow-x:auto;margin:-2px}
.dre{width:100%;border-collapse:collapse;font-size:13px;min-width:480px}
.dre th,.dre td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
.dre th{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4);font-weight:500}
.dre td.v{font-family:var(--mono);text-align:right;font-weight:500}
.dre td.pct{font-family:var(--mono);text-align:right;color:var(--ink-3);font-size:11px}
.dre td.bench{font-family:var(--mono);text-align:right;color:var(--ink-4);font-size:10px}
.dre tr.neg td.v{color:var(--alert)}
.dre tr.sub td{font-weight:600;background:var(--surface-2)}
.dre tr.total td{font-weight:700;font-size:14px;background:var(--accent-soft);color:var(--accent);border-top:2px solid var(--accent-line)}

/* Balanço */
.balanco{display:flex;flex-direction:column;gap:0;margin-top:6px}
.b-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;font-family:var(--mono);font-size:13px;border-bottom:1px solid var(--line)}
.b-row:last-child{border-bottom:0}
.b-row.b-sub{padding-left:28px;color:var(--ink-3);font-size:12px;background:var(--surface-2)}
.b-row.b-total{font-weight:600;font-size:14px;color:var(--ink);background:var(--surface-2);margin-top:4px}
.b-row.b-total.g{color:var(--accent);background:var(--accent-soft)}
.b-row.b-total.r{color:var(--alert);background:var(--alert-soft);margin-top:8px}

/* Indicadores */
.ind-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}
.ind-box{background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.ind-l{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-4)}
.ind-v{font-family:var(--serif);font-weight:700;font-size:18px;letter-spacing:-.02em;color:var(--ink)}
.ind-v .unit{font-size:.6em;color:var(--ink-3);font-weight:500;margin-left:2px}
.ind-v.g{color:var(--accent)}
.ind-v.w{color:var(--warn)}
.ind-v.a{color:var(--alert)}
.ind-sub{font-family:var(--sans);font-size:11px;color:var(--ink-3);margin-top:2px}

/* ISE pills */
.ise-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:14px}
.ise-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px}
.ise-pill-bar{flex-shrink:0;width:6px;height:36px;border-radius:3px;background:var(--line);position:relative;overflow:hidden}
.ise-pill-bar > div{position:absolute;left:0;right:0;bottom:0;border-radius:3px}
.ise-pill-body{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0}
.ise-pill-l{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase}
.ise-pill-v{font-family:var(--serif);font-weight:700;font-size:14px;color:var(--ink)}
.ise-pill-v .max{color:var(--ink-4);font-weight:500;font-size:.75em}

/* Análise 1N */
.ana-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media (min-width:680px){.ana-grid{grid-template-columns:1fr 1fr}.ana-block.featured{grid-column:1 / -1}}
.ana-block{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px 22px;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.ana-block.featured{border-color:var(--accent-line);background:linear-gradient(180deg,var(--accent-soft) 0%,var(--surface) 60%)}
.ana-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
.ana-tag{font-size:9px;color:var(--accent);padding:3px 8px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:999px}
.ana-big{font-family:var(--serif);font-weight:800;font-size:clamp(24px,4vw,32px);letter-spacing:-.03em;line-height:1.1;color:var(--ink)}
.ana-big.g{color:var(--accent)}
.ana-big.a{color:var(--alert)}
.ana-big .rs{font-size:.55em;color:var(--ink-3);margin-right:3px;font-weight:600}
.ana-formula{font-size:12px;color:var(--ink-3);line-height:1.6}
.ana-formula em{color:var(--ink-2);font-style:normal;font-weight:500}
.ana-conclusion{margin-top:8px;padding:10px 12px;background:var(--surface-2);border-radius:10px;font-size:13px;color:var(--ink-2);line-height:1.5}
.ana-conclusion em{color:var(--accent);font-style:normal;font-weight:600}
.ana-ise-score{display:flex;align-items:center;gap:14px;margin:6px 0}
.ise-n{font-family:var(--serif);font-weight:800;font-size:48px;letter-spacing:-.03em;line-height:1}
.ise-n span{font-size:.4em;color:var(--ink-3);font-weight:500}
.ise-cls{padding:6px 12px;border-radius:999px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.ana-ise-desc{font-size:13px;color:var(--ink-2);line-height:1.5}
.upsides{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.upside-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface-2);border-radius:12px;border:1px solid var(--line)}
.upside-n{flex-shrink:0;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--accent);color:var(--accent-ink);font-family:var(--mono);font-weight:700;font-size:11px}
.upside-body{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
.upside-t{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2}
.upside-sub{font-size:11px;color:var(--ink-3);line-height:1.3}
.upside-imp{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--accent);flex-shrink:0;text-align:right}
.upsides-more{font-family:var(--mono);font-size:11px;color:var(--ink-4);text-align:center;padding:8px;letter-spacing:.06em}
.ana-checks{display:flex;flex-direction:column;gap:8px;margin:6px 0}
.ck{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--ink-2);line-height:1.4}
.ck-i{flex-shrink:0;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-size:12px;font-weight:700;background:var(--accent-soft);color:var(--accent)}
.ck.warn .ck-i{background:var(--warn-soft);color:var(--warn)}

/* Tributário */
.regime-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:6px}
@media (min-width:520px){.regime-grid{grid-template-columns:1fr 1fr 1fr}}
.regime-card{padding:14px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;gap:4px}
.regime-card.atual{border-color:rgba(37,99,235,.3);background:var(--info-soft)}
.regime-card.otimo{border-color:var(--accent-line);background:var(--accent-soft)}
.regime-name{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.regime-card.atual .regime-name{color:var(--info)}
.regime-card.otimo .regime-name{color:var(--accent)}
.regime-tag{font-size:8px;padding:2px 6px;border-radius:999px;background:currentColor;color:var(--bg);font-weight:700;letter-spacing:.06em}
.regime-imp{font-family:var(--serif);font-weight:700;font-size:18px;color:var(--ink);letter-spacing:-.02em}
.regime-pct{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.regime-economy{margin-top:14px;padding:14px 16px;background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:12px}
.regime-economy strong{display:block;font-family:var(--serif);font-weight:700;font-size:18px;color:var(--accent);letter-spacing:-.02em}
.regime-economy span{font-size:13px;color:var(--ink-2)}

/* Camada 3 */
.c3-locked{padding:24px;background:linear-gradient(180deg,var(--accent-soft) 0%,var(--surface) 100%);border:1px solid var(--accent-line);border-radius:20px;text-align:center}
.c3-icon{width:48px;height:48px;margin:0 auto 12px;display:inline-flex;align-items:center;justify-content:center;background:var(--accent);color:var(--accent-ink);border-radius:14px}
.c3-icon svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none}
.c3-title{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.025em;color:var(--ink);margin-bottom:8px}
.c3-msg{font-size:14px;color:var(--ink-2);line-height:1.5;max-width:520px;margin:0 auto 20px}
.c3-bullets{max-width:480px;margin:0 auto 20px;text-align:left;display:flex;flex-direction:column;gap:6px}
.c3-bullet{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--ink-2)}
.c3-bullet::before{content:'';flex-shrink:0;width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px}

/* Camada 3 quando liberada */
.c3-content{display:flex;flex-direction:column;gap:32px}
.c3-status-bar{
  padding:12px 16px;
  background:var(--accent-soft);
  border:1px solid var(--accent-line);
  border-radius:12px;
  display:flex;align-items:center;gap:10px;
  font-family:var(--mono);font-size:11px;color:var(--accent);
  letter-spacing:.08em;text-transform:uppercase;
}
.c3-status-bar svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}

/* Botões */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;font-family:var(--sans);font-weight:600;font-size:14px;border:0;border-radius:999px;cursor:pointer;text-decoration:none;transition:all .15s ease}
.btn-primary{background:var(--accent);color:var(--accent-ink)}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-secondary{background:var(--surface);border:1px solid var(--line-strong);color:var(--ink)}
.btn-secondary:hover{background:var(--surface-2)}

/* Footer */
.footer{margin-top:48px;padding:24px 20px 40px;border-top:1px solid var(--line);text-align:center}
.footer p{font-size:12px;color:var(--ink-4);font-family:var(--mono);letter-spacing:.04em}
.footer a{color:var(--ink-3);text-decoration:none}
.footer a:hover{color:var(--accent)}

/* Skeleton */
.skel{background:linear-gradient(90deg,var(--surface-2) 0%,var(--line) 50%,var(--surface-2) 100%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-hero{height:200px;margin-bottom:16px}
.skel-stats{height:80px;margin-bottom:16px}
.skel-section{height:240px;margin-bottom:16px}

/* Tabela 2 colunas C3 */
.c3-grid-2{display:grid;grid-template-columns:1fr;gap:8px;margin-top:6px}
@media (min-width:520px){.c3-grid-2{grid-template-columns:1fr 1fr}}
.c3-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;font-size:13px;gap:8px}
.c3-row-l{font-family:var(--mono);font-size:10px;letter-spacing:.06em;color:var(--ink-3);text-transform:uppercase}
.c3-row-v{font-family:var(--sans);color:var(--ink);font-weight:500;text-align:right}

/* Sócios cards */
.socio-card{padding:16px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;display:flex;flex-direction:column;gap:6px}
.socio-name{font-family:var(--serif);font-weight:700;font-size:16px;color:var(--ink);letter-spacing:-.02em}
.socio-meta{font-family:var(--mono);font-size:11px;color:var(--ink-3);display:flex;gap:10px;flex-wrap:wrap}
.socio-pct{display:inline-flex;align-items:center;padding:2px 8px;background:var(--accent-soft);color:var(--accent);border-radius:999px;font-weight:700}

/* ─── STAGE-FOOTER-BAR (tabs + CTA empilhados, fixed bottom — replica .stage-footer do index) ─── */
.stage-footer-bar{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  display:flex;flex-direction:column;gap:8px;
  padding:8px 20px calc(12px + env(safe-area-inset-bottom)) 20px;
  background:linear-gradient(180deg,transparent 0%,var(--bg) 30%,var(--bg) 100%);
  pointer-events:none;
}
.stage-footer-bar > *{pointer-events:auto}
.stage-footer-bar .tabs-row{
  display:flex;justify-content:center;
}
.tabs-sticky-inner{
  display:flex;gap:2px;
  background:rgba(0,0,0,.04);
  border:1px solid var(--line);
  border-radius:999px;
  padding:3px;
  max-width:560px;width:100%;
}
:root[data-theme="dark"] .tabs-sticky-inner{background:rgba(255,255,255,.04)}
.tab-btn{
  flex:1;padding:7px 10px;
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  background:transparent;border:0;cursor:pointer;
  font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink-3);
  border-radius:999px;transition:all .15s ease;
  min-width:0;white-space:nowrap;
}
.tab-btn:hover{color:var(--ink-2)}
.tab-btn.on{background:var(--ink);color:var(--bg)}
.tab-brand{font-family:var(--serif);font-weight:800;font-size:11px;letter-spacing:-.04em;display:inline-flex;align-items:baseline;line-height:1}
.tab-brand em{color:var(--accent);font-style:normal;margin-right:1px}
.tab-btn.on .tab-brand em{color:var(--accent)}
.stage-footer-bar .cta-row{
  display:flex;gap:8px;max-width:560px;width:100%;margin:0 auto;
}
@media(max-width:520px){
  .tab-btn{padding:6px 6px;font-size:9px;letter-spacing:.04em}
  .stage-footer-bar{padding:6px 14px calc(10px + env(safe-area-inset-bottom)) 14px}
}

/* ─── ABAS ─── */
.aba-conteudo{display:flex;flex-direction:column;gap:36px;padding-top:24px}
.aba{display:none;flex-direction:column;gap:24px}
.aba[data-active="true"]{display:flex}

.aviso-nda{
  margin-top:12px;padding:10px 14px;
  background:var(--warn-soft);border-left:3px solid var(--warn);border-radius:8px;
  font-size:12px;color:var(--ink-2);line-height:1.5;
}
.aviso-nda strong{color:var(--warn);font-weight:700}

/* ─── CTA dentro do stage-footer-bar ─── */
.cta-row .btn-primary{flex:1;height:44px;border-radius:12px;font-size:14px;letter-spacing:.01em;padding:0 20px;box-shadow:0 4px 14px rgba(0,0,0,.15)}
.cta-row .btn-secondary{width:44px;height:44px;flex-shrink:0;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;border-radius:12px}
body.has-cta-flutuante{padding-bottom:130px}
@media (max-width:520px){
  body.has-cta-flutuante{padding-bottom:120px}
}

/* ─── BOTÃO VOLTAR (header esquerdo) ─── */
.btn-voltar{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 12px 7px 10px;
  background:transparent;border:1px solid var(--line);border-radius:999px;
  font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-2);
  text-decoration:none;cursor:pointer;transition:all .15s ease;
}
.btn-voltar:hover{background:var(--surface-2);color:var(--ink);border-color:var(--line-strong)}
.btn-voltar svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.topbar-inner{justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
@media (max-width:520px){
  .btn-voltar{padding:7px 9px;font-size:0;gap:0}
  .btn-voltar svg{width:16px;height:16px}
  .brand{font-size:15px}
}

/* ─── ELEMENTOS ESPECÍFICOS DAS ABAS ─── */
.kv-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;font-family:var(--mono);font-size:13px;
  border-bottom:1px solid var(--line);
}
.kv-row:last-child{border-bottom:0}
.kv-row strong{font-weight:600;color:var(--ink)}
.kv-row.total{font-weight:700;background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:12px 14px}
.kv-label{color:var(--ink-3);font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.kv-value{font-family:var(--mono);font-weight:500;color:var(--ink)}

.bench-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;
  padding:2px 8px;border-radius:999px;text-transform:uppercase;
}
.bench-pill[data-status="no_alvo"]{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-line)}
.bench-pill[data-status="atencao"]{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(217,119,6,.28)}
.bench-pill[data-status="abaixo"]{background:var(--alert-soft);color:var(--alert);border:1px solid rgba(220,38,38,.28)}
.bench-pill[data-status="neutro"]{background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line)}

.diferencial-item{
  display:flex;gap:10px;align-items:flex-start;padding:10px 0;
  border-bottom:1px solid var(--line);font-size:14px;line-height:1.5;color:var(--ink-2);
}
.diferencial-item:last-child{border-bottom:0}
.diferencial-item::before{
  content:'';flex-shrink:0;width:6px;height:6px;border-radius:50%;
  background:var(--accent);margin-top:8px;
}

</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <a href="/" id="btn-voltar" class="btn-voltar" aria-label="Voltar">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Voltar</span>
      </a>
      <a href="/" class="brand"><em>1</em>NEGÓCIO</a>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="btn-theme" aria-label="Alternar tema" title="Alternar tema">
        <svg viewBox="0 0 24 24" id="icon-theme"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <button class="icon-btn" id="btn-share" aria-label="Compartilhar" title="Compartilhar">
        <svg viewBox="0 0 24 24"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      </button>
    </div>
  </div>
</header>

<main id="main">
  <div class="skel skel-hero"></div>
  <div class="skel skel-stats"></div>
  <div class="skel skel-section"></div>
</main>

<footer class="footer">
  <p>1Negócio · <a href="/">1negocio.com.br</a> · plataforma de M&A para PMEs</p>
</footer>

<script src="/js/track.js"></script>
<script>
const SUPABASE_URL='https://dbijmgqlcrgjlcfrastg.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';
const H={'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SUPABASE_ANON};

const $=s=>document.querySelector(s);
const n=v=>(v!==undefined&&v!==null&&!isNaN(parseFloat(v)))?parseFloat(v):0;
const brl=v=>{
  v=Math.round(n(v));
  if(Math.abs(v)>=1e6) return (v/1e6).toFixed(1).replace('.0','').replace('.',',')+'M';
  if(Math.abs(v)>=1e3) return Math.round(v/1e3)+'k';
  return v.toLocaleString('pt-BR');
};

/* Sessão (mesmo padrão do portal) */
function getSession(){
  try{
    const raw=localStorage.getItem('1n-session');
    if(!raw) return null;
    const s=JSON.parse(raw);
    return (s && s.token && s.user_id) ? s : null;
  }catch(e){return null}
}

/* Theme */
function initTheme(){
  let theme=localStorage.getItem('1n-theme');
  if(!theme||(theme!=='light'&&theme!=='dark')) theme='light';
  setTheme(theme);
}
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('1n-theme',t);
  const icon=$('#icon-theme');
  if(t==='dark') icon.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  else icon.innerHTML='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
}
$('#btn-theme').addEventListener('click',()=>{
  const cur=document.documentElement.getAttribute('data-theme');
  setTheme(cur==='dark'?'light':'dark');
});

$('#btn-share').addEventListener('click',async()=>{
  const url=window.location.href;
  const title=document.title;
  if(navigator.share){
    try{await navigator.share({title,url});}catch(e){}
  }else{
    try{await navigator.clipboard.writeText(url);alert('Link copiado!');}
    catch(e){alert('URL: '+url);}
  }
});

const params=new URLSearchParams(window.location.search);
let codigoParam=params.get('c')||params.get('codigo')||params.get('slug');
if(!codigoParam){
  const m=window.location.pathname.match(/\/negocios\/([^\/?#]+)/);
  if(m) codigoParam=decodeURIComponent(m[1]);
}
const idParam=params.get('id');

let ANUNCIO=null;
let NEG=null;
let CALC=null;
let TEXTOS=null;
let SESSION=null;
let ACESSO_C3=null;
let MATERIAL_C3=null;

async function init(){
  initTheme();
  SESSION=getSession();

  if(!codigoParam&&!idParam) return showError('Anúncio não informado','Acesse via /negocios/<código>.');

  try{
    if(codigoParam){
      const r=await fetch(SUPABASE_URL+'/rest/v1/anuncios_v2?codigo=eq.'+encodeURIComponent(codigoParam)+'&select=id,codigo,negocio_id,laudo_v2_id,titulo,descricao_card,valor_pedido,status,publicado_em,textos_negocio',{headers:H});
      const arr=await r.json();
      if(arr&&arr[0]) ANUNCIO=arr[0];
    }else if(idParam){
      const r=await fetch(SUPABASE_URL+'/rest/v1/anuncios_v2?negocio_id=eq.'+idParam+'&select=id,codigo,negocio_id,laudo_v2_id,titulo,descricao_card,valor_pedido,status,publicado_em,textos_negocio&order=publicado_em.desc&limit=1',{headers:H});
      const arr=await r.json();
      if(arr&&arr[0]) ANUNCIO=arr[0];
    }
  }catch(e){console.error('resolver anuncio:',e)}

  if(!ANUNCIO) return showError('Anúncio não encontrado','Verifique o link ou volte ao início.');

  window.ANUNCIO_CODIGO=ANUNCIO.codigo;
  TEXTOS=ANUNCIO.textos_negocio||{};

  try{
    const [rNeg,rLaudo]=await Promise.all([
      fetch(SUPABASE_URL+'/rest/v1/negocios?id=eq.'+ANUNCIO.negocio_id+'&select=id,nome,categoria,subcategoria,cidade,estado,setor,faturamento_anual,publicado_em,created_at,codigo_diagnostico,titulo_anuncio',{headers:H}),
      fetch(SUPABASE_URL+'/rest/v1/laudos_v2?id=eq.'+ANUNCIO.laudo_v2_id+'&select=calc_json,criado_em',{headers:H})
    ]);
    const negArr=await rNeg.json();
    const lauArr=await rLaudo.json();
    console.log('[negocio.html] ANUNCIO:', ANUNCIO);
    console.log('[negocio.html] negArr:', negArr);
    console.log('[negocio.html] lauArr:', lauArr);
    if(!Array.isArray(negArr)||negArr.length===0) return showError('Negócio não encontrado','Verifique o link.');
    NEG=negArr[0];
    if(Array.isArray(lauArr)&&lauArr[0]&&lauArr[0].calc_json){
      CALC=lauArr[0].calc_json;
      if(SESSION) await verificarAcessoC3(NEG.id);
      renderPaginaCompleta();
    }else{
      console.warn('[negocio.html] Caindo em showPreparing. laudo response:', lauArr);
      showPreparing(NEG);
    }
  }catch(e){
    console.error(e);
    showError('Erro ao carregar','Tente novamente em instantes.');
  }
}

/* ─── ACESSO C3 ─── */
async function verificarAcessoC3(negId){
  try{
    const headers={'apikey':SUPABASE_ANON,'Authorization':'Bearer '+SESSION.token};
    const r=await fetch(SUPABASE_URL+'/rest/v1/solicitacoes_info?comprador_id=eq.'+SESSION.user_id+'&negocio_id=eq.'+negId+'&select=id,status,liberado_em,liberado_ate&order=created_at.desc&limit=1',{headers});
    const sol=r.ok?(await r.json())[0]:null;
    if(!sol){ACESSO_C3={tipo:'logado_sem_solicitar'};return;}
    if(sol.status==='liberado'&&sol.liberado_ate&&new Date(sol.liberado_ate)>new Date()){
      ACESSO_C3={tipo:'liberado',solicitacao_id:sol.id,liberado_ate:sol.liberado_ate};
      // Carrega material confidencial via Edge Function
      await carregarMaterialC3(negId);
    }else if(sol.status==='liberado'){
      ACESSO_C3={tipo:'expirado'};
    }else if(sol.status==='aprovada'){
      ACESSO_C3={tipo:'aprovado_assinar'};
    }else if(sol.status==='nda_assinado'){
      ACESSO_C3={tipo:'aguardando_liberacao'};
    }else{
      ACESSO_C3={tipo:'aguardando_analise'};
    }
  }catch(e){
    console.error('verificarAcessoC3:',e);
    ACESSO_C3={tipo:'logado_sem_solicitar'};
  }
}

async function carregarMaterialC3(negId){
  try{
    const r=await fetch(SUPABASE_URL+'/functions/v1/material-fetch',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SESSION.token},
      body:JSON.stringify({negocio_id:negId})
    });
    if(!r.ok) throw new Error('http_'+r.status);
    MATERIAL_C3=await r.json();
  }catch(e){
    console.warn('material-fetch falhou:',e);
    MATERIAL_C3=null;
  }
}

/* ─── ESTADOS DE ERRO/PREPARAÇÃO ─── */
function showError(title,msg){
  $('#main').innerHTML=`
    <div class="state-box">
      <div class="state-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <h2 class="state-title">${title}</h2>
      <p class="state-msg">${msg}</p>
      <div class="state-actions"><a href="/" class="btn btn-primary">Voltar para a home</a></div>
    </div>`;
}
function showPreparing(neg){
  const codigo=neg.codigo_diagnostico||(neg.id||'').substring(0,8).toUpperCase();
  const local=[neg.cidade,neg.estado].filter(Boolean).join(', ');
  $('#main').innerHTML=`
    <div class="state-box preparing">
      <div class="state-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <h2 class="state-title">Avaliação em preparação</h2>
      <p class="state-msg">Estamos finalizando a análise técnica deste negócio. Volte em instantes — a página será carregada com todos os dados assim que o laudo estiver pronto.</p>
      <div style="font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.06em;margin-bottom:20px">${codigo}${local?' · '+local:''}</div>
      <div class="state-actions">
        <a href="/" class="btn btn-secondary">Ver outros negócios</a>
        <button class="btn btn-primary" onclick="location.reload()">Atualizar</button>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════
   RENDER MASTER (v2 — 4 abas)
═══════════════════════════════════════════════ */
function renderPaginaCompleta(){
  const titulo = (TEXTOS.titulo_negocio && TEXTOS.titulo_negocio.conteudo) || ANUNCIO.titulo || NEG.titulo_anuncio || NEG.nome || 'Negócio';
  document.title = titulo + ' · 1Negócio';
  document.body.classList.add('has-cta-flutuante');

  const main = $('#main');
  main.innerHTML = '';

  // 1. Hero
  const heroEl = document.createElement('section');
  heroEl.className = 'hero';
  heroEl.innerHTML = renderHeroV2();
  main.appendChild(heroEl);

  // 2. Conteúdo das 4 abas
  main.insertAdjacentHTML('beforeend', `
    <div id="aba-conteudo" class="aba-conteudo">
      ${renderAbaResumo()}
      ${renderAbaFinanceiro()}
      ${renderAbaIndicadores()}
      ${renderAbaAnalise()}
    </div>
  `);

  // 3. Camada 3 (NDA) — bloco condicional reutilizado da v1
  renderCamada3();

  // 4. Stage footer bar (tabs + CTA empilhados, fixed bottom)
  document.body.insertAdjacentHTML('beforeend', renderStageFooterBar());

  // 5. Bind voltar button
  const btnVoltar = document.getElementById('btn-voltar');
  if(btnVoltar && ANUNCIO && ANUNCIO.codigo){
    btnVoltar.setAttribute('href', '/#' + ANUNCIO.codigo);
    btnVoltar.addEventListener('click', () => {
      if(window.track) window.track('click_voltar_home');
    });
  }

  inicializarTabs();
  inicializarTracking();
}

function renderHeroV2(){
  const codigo = ANUNCIO.codigo || NEG.codigo_diagnostico || '';
  const setorLbl = safe(CALC,'identificacao.setor.label','') || NEG.setor || NEG.categoria || '';
  const setorCap = setorLbl ? setorLbl.charAt(0).toUpperCase()+setorLbl.slice(1) : '';
  const cidade = safe(CALC,'identificacao.localizacao.cidade', NEG.cidade || '');
  const estado = safe(CALC,'identificacao.localizacao.estado', NEG.estado || '');
  const cidadeCap = cidade ? cidade.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ') : '';
  const localCap = [cidadeCap, estado].filter(Boolean).join(', ');
  const anos = safe(CALC,'identificacao.tempo_operacao_anos',null) || safe(CALC,'operacional.tempo_operacao_anos',null);
  const titulo = (TEXTOS.titulo_negocio && TEXTOS.titulo_negocio.conteudo) || ANUNCIO.titulo || NEG.titulo_anuncio || NEG.nome || 'Negócio';
  const subtitulo = (TEXTOS.descricao_publica && TEXTOS.descricao_publica.conteudo) || ANUNCIO.descricao_card || '';
  const valorPedido = n(ANUNCIO.valor_pedido);
  const valorVenda = n(safe(CALC,'valuation.valor_venda',0));

  let tag = '';
  if(valorPedido>0 && valorVenda>0){
    const delta = (valorVenda - valorPedido) / valorVenda * 100;
    if(delta>3) tag = `<span class="price-tag">Oportunidade</span>`;
    else if(delta<-3) tag = `<span class="price-tag dn">Acima da faixa</span>`;
    else tag = `<span class="price-tag eq">Preço justo</span>`;
  }

  let priceBlock = '';
  if(valorPedido>0){
    priceBlock = `
      <div class="price-hero">
        <span class="price-label">Valor do anúncio</span>
        <div class="price-main"><span class="rs">R$</span>${brl(valorPedido)}</div>
        ${valorVenda>0 ? `
          <div class="price-aval-line">
            <span class="price-aval-l">Avaliação técnica 1N</span>
            <span class="price-aval-v"><span class="rs">R$</span>${brl(valorVenda)}</span>
            ${tag}
          </div>` : ''}
      </div>`;
  } else if(valorVenda>0){
    priceBlock = `
      <div class="price-hero">
        <span class="price-label">Valor do anúncio</span>
        <div class="price-main" style="color:var(--ink-3);font-size:clamp(28px,6vw,40px)">A definir</div>
        <div class="price-aval-line">
          <span class="price-aval-l">Avaliação técnica 1N · referência</span>

function renderAbaIndicadores(){
  const ind = (CALC && CALC.indicadores_vs_benchmark) || {};

  const fmtVal = (val, u) => {
    if(val==null||isNaN(val)) return '—';
    if(u==='R$') return brlR(val);
    if(u==='%') return Number(val).toFixed(1)+'%';
    if(u==='dias') return Math.round(val)+' dias';
    if(u==='x'||u==='×') return Number(val).toFixed(2)+'×';
    return Math.round(val)+(u?' '+u:'');
  };

  // 6 indicadores que vêm de indicadores_vs_benchmark (com benchmark + status)
  const ordemBench = ['margem_operacional','margem_bruta','recorrencia','concentracao','ciclo_financeiro_dias','endividamento_vs_ro'];
  const benchBoxes = ordemBench.map(key => {
    const i = ind[key];
    if(!i || i.valor==null) return '';
    const u = i.unidade || '';
    const valorFmt = fmtVal(i.valor, u);
    const benchFmt = (i.benchmark!=null) ? fmtVal(i.benchmark, u) : '';
    const status = i.status || 'neutro';
    const statusLabel = status==='no_alvo'?'no alvo':status==='atencao'?'atenção':status==='abaixo'?'abaixo':'';
    return `
      <div class="ind-box">
        <div class="ind-l">${escapeHtml(i.label||key)}</div>
        <div class="ind-v">${valorFmt}</div>
        ${benchFmt ? `<div class="ind-sub">vs ${benchFmt} setor</div>` : ''}
        ${statusLabel ? `<div style="margin-top:6px"><span class="bench-pill" data-status="${status}">${statusLabel}</span></div>` : ''}
      </div>
    `;
  }).filter(x=>x).join('');

  // Indicadores derivados (calculados a partir do calc_json)
  const valorPedido = n(ANUNCIO && ANUNCIO.valor_pedido);
  const roAnual = n(safe(CALC,'dre.ro_anual',0));
  const ativos = n(safe(CALC,'balanco.ativos.total',0));
  const passivos = n(safe(CALC,'balanco.passivos.total',0));
  const numFuncs = n(safe(CALC,'operacional.num_funcionarios',0));
  const roPorFunc = ind.ro_por_funcionario_mensal && ind.ro_por_funcionario_mensal.valor;

  const liquidez = (passivos>0 && ativos>0) ? (ativos/passivos) : null;
  const payback = (roAnual>0 && valorPedido>0) ? (valorPedido/roAnual) : null;

  const derivedBoxes = [];
  if(liquidez!=null){
    const cls = liquidez>=2?'g':liquidez>=1?'w':'a';
    derivedBoxes.push(`
      <div class="ind-box">
        <div class="ind-l">Liquidez (ativos/passivos)</div>
        <div class="ind-v ${cls}">${liquidez.toFixed(2)}<span class="unit">×</span></div>
        <div class="ind-sub">${liquidez>=2?'saudável':liquidez>=1?'aceitável':'apertado'}</div>
      </div>
    `);
  }
  if(payback!=null){
    derivedBoxes.push(`
      <div class="ind-box">
        <div class="ind-l">Payback simples</div>
        <div class="ind-v">${payback.toFixed(1)}<span class="unit">anos</span></div>
        <div class="ind-sub">valor pedido / RO anual</div>
      </div>
    `);
  }
  if(numFuncs>0){
    derivedBoxes.push(`
      <div class="ind-box">
        <div class="ind-l">Equipe</div>
        <div class="ind-v">${numFuncs}<span class="unit">pessoas</span></div>
        <div class="ind-sub">colaboradores</div>
      </div>
    `);
  }
  if(roPorFunc!=null && numFuncs>0){
    derivedBoxes.push(`
      <div class="ind-box">
        <div class="ind-l">RO / funcionário</div>
        <div class="ind-v">${brlR(roPorFunc)}<span class="unit">/mês</span></div>
        <div class="ind-sub">rentabilidade por pessoa</div>
      </div>
    `);
  }

  const allBoxes = benchBoxes + derivedBoxes.join('');

  // ISE pillars (8 ao todo agora — full set)
  const ise = (CALC && CALC.ise) || {};
  const pilares = (ise.pilares||[]).slice(0,8);
  const isePillarsHTML = pilares.map(p => {
    const score = Math.round(n(p.score_0_10)*10);
    const color = score>=70?'var(--accent)':score>=50?'var(--warn)':'var(--alert)';
    return `
      <div class="ise-pill">
        <div class="ise-pill-bar"><div style="height:${score}%;background:${color}"></div></div>
        <div class="ise-pill-body">
          <div class="ise-pill-l">${escapeHtml(p.label||'')}</div>
          <div class="ise-pill-v">${score}<span class="max">/100</span></div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <section class="aba" data-aba="indicadores" data-active="false">
      <div class="section">
        <div class="section-head">
          <div class="section-sub">INDICADORES VS. BENCHMARK</div>
          <h2 class="section-title">Como o negócio compara com o setor</h2>
        </div>
        <div class="panel">
          ${allBoxes ? `<div class="ind-grid">${allBoxes}</div>` : '<p style="color:var(--ink-3);font-size:13px">Indicadores comparativos não disponíveis para este negócio.</p>'}
          <p class="aviso-nda" style="margin-top:14px"><strong>Indicadores adicionais após NDA:</strong> CMV, folha, aluguel, prazo médio de pagamento e recebimento, NCG, marketing, ticket médio, número de clientes ativos.</p>
        </div>
      </div>

      ${isePillarsHTML ? `
        <div class="section">
          <div class="section-head">
            <div class="section-sub">8 PILARES DE SOLIDEZ</div>
            <h2 class="section-title">Avaliação ISE por dimensão</h2>
          </div>
          <div class="panel">
            <div class="ise-grid">${isePillarsHTML}</div>
          </div>
        </div>
      ` : ''}
    </section>
  `;
}

  const iseBgAlpha = iseTotal>=65?'rgba(16,185,129,.12)':iseTotal>=50?'rgba(217,119,6,.15)':'rgba(220,38,38,.15)';

  const valorAval = n(valuation.valor_venda);

    const anos = numerador / roAnual;
    if(anos > 50) return '50+';
    return anos.toFixed(1);
  };
  const paybackBruto = fmtPayback(valorPedido);
  const valorEfetivo = (valorPedido>0) ? Math.round(valorPedido - pl) : null;
  const paybackEfetivo = fmtPayback(valorEfetivo!=null ? valorEfetivo : 0);

  const ativos = upsides.ativos || [];
  const upsidesTop = ativos.slice(0, 3);
  const upsidesOutros = Math.max(0, ativos.length - 3);

  const potencial = (TEXTOS.potencial_crescimento && TEXTOS.potencial_crescimento.conteudo) || '';
  const comprador = (TEXTOS.perfil_comprador_ideal && TEXTOS.perfil_comprador_ideal.conteudo) || '';
  const cta = (TEXTOS.call_to_action && TEXTOS.call_to_action.conteudo) || '';

          <div class="section-sub">ANÁLISE 1NEGÓCIO</div>

          </div>
          <div class="ana-big g"><span class="rs">R$</span>${brl(valorAval)}</div>
          <div class="ana-formula">
            <em>método:</em> Resultado operacional anual × múltiplo 1N${multSetor?` (${Number(multSetor).toFixed(2)}× ${escapeHtml(setorLbl)})`:''}<br>
            ${fatorClasseLbl?`<span style="opacity:.75;font-size:11px">${escapeHtml(fatorClasseLbl)}</span>`:''}

            ${iseClasse?`<span class="ana-tag">${escapeHtml(iseClasse).toUpperCase()}</span>`:''}

function inicializarTabs(){
  const tabs = document.querySelectorAll('.tab-btn');
  const abas = document.querySelectorAll('.aba');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.aba;
      tabs.forEach(t => {
        const on = t.dataset.aba === target;
        t.classList.toggle('on', on);
        t.setAttribute('aria-selected', on?'true':'false');
      });
      abas.forEach(a => a.dataset.active = (a.dataset.aba === target ? 'true' : 'false'));
      if(window.track) window.track('click_aba_' + target);
      // tabs estão fixed no rodapé; ao trocar de aba, scroll suave pro topo do conteúdo
      const conteudo = document.getElementById('aba-conteudo');
      if(conteudo){
        const top = conteudo.getBoundingClientRect().top + window.scrollY - 80;
        window.scrollTo({top:Math.max(0,top), behavior:'smooth'});
      }
    });
  });
}

function inicializarTracking(){
  if(window.track) window.track('view_pagina');

  const marcos = [25, 50, 75, 100];
  const disparados = new Set();
  window.addEventListener('scroll', () => {
    const total = document.body.scrollHeight - window.innerHeight;
    if(total<=0) return;
    const pct = Math.round(window.scrollY / total * 100);
    marcos.forEach(m => {
      if(pct >= m && !disparados.has(m)){
        disparados.add(m);
        if(window.track) window.track('scroll_' + m);
      }
    });
  }, { passive: true });

  const inicio = Date.now();
  window.addEventListener('beforeunload', () => {
    const segundos = Math.round((Date.now() - inicio) / 1000);
    if(window.track) window.track('tempo_sessao', { segundos });
  });
}

/* helpers v2 */
function brlR(v){
  if(v===null||v===undefined||isNaN(v)) return '—';
  const num = Math.round(n(v));
  if(num===0) return 'R$0';
  if(num<0) return '-R$'+brl(-num);
  return 'R$'+brl(num);
}
function safe(o, path, fb){
  try{
    const parts = path.split('.');
    let cur = o;
    for(const p of parts){ if(cur==null) return fb; cur = cur[p]; }
    return (cur==null||cur==='')?fb:cur;
  }catch(e){return fb}
}
function escapeHtml(s){
  if(s==null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

        ${mat.cnpj_nome_fantasia?`<div class="c3-row"><span class="c3-row-l">Nome fantasia</span><span class="c3-row-v">${mat.cnpj_nome_fantasia}</span></div>`:''}
        ${mat.cidade?`<div class="c3-row"><span class="c3-row-l">Cidade</span><span class="c3-row-v">${mat.cidade}/${mat.estado||''}</span></div>`:''}
        ${mat.bairro?`<div class="c3-row"><span class="c3-row-l">Bairro</span><span class="c3-row-v">${mat.bairro}</span></div>`:''}
        ${mat.regime_tributario?`<div class="c3-row"><span class="c3-row-l">Regime fiscal</span><span class="c3-row-v">${mat.regime_tributario}</span></div>`:''}
      </div>
    </div>
  `;

  // 2. Sócios
  if(mat.socios&&mat.socios.length>0){
    html+=`
      <div class="section-head">
        <div class="section-sub">SOCIETÁRIO</div>
        <h3 class="section-title" style="font-size:20px">Sócios</h3>
      </div>
      <div class="panel">
        <div style="display:flex;flex-direction:column;gap:10px">
          ${mat.socios.map(s=>`
            <div class="socio-card">
              <span class="socio-name">${s.nome||'—'}</span>
              <div class="socio-meta">
                ${s.participacao?`<span class="socio-pct">${s.participacao}%</span>`:''}
                ${s.funcao?`<span>${s.funcao}</span>`:''}
                ${s.is_lider?`<span>· Líder</span>`:''}
                ${s.is_ativo===false?`<span>· Inativo</span>`:''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // 3. Equipe
  if(mat.colaboradores&&mat.colaboradores.length>0){
    html+=`
      <div class="section-head">
        <div class="section-sub">EQUIPE PRINCIPAL</div>
        <h3 class="section-title" style="font-size:20px">Colaboradores-chave</h3>
      </div>
      <div class="panel">
        <div style="display:flex;flex-direction:column;gap:10px">
          ${mat.colaboradores.map(co=>`
            <div class="socio-card">
              <span class="socio-name">${co.nome||'—'}</span>
              <div class="socio-meta">
                ${co.cargo?`<span>${co.cargo}</span>`:''}
                ${co.tempo_casa?`<span>· ${co.tempo_casa}</span>`:''}
                ${co.regime?`<span>· ${co.regime.toUpperCase()}</span>`:''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // 4. Ponto comercial
  if(mat.ponto_loc||mat.ponto_m2||mat.ponto_condominio){
    html+=`
      <div class="section-head">
        <div class="section-sub">PONTO COMERCIAL</div>
        <h3 class="section-title" style="font-size:20px">Imóvel e localização</h3>
      </div>
      <div class="panel">
        ${mat.ponto_loc?`<p style="font-size:15px;color:var(--ink);margin-bottom:14px;line-height:1.6"><strong>Endereço:</strong> ${mat.ponto_loc}</p>`:''}
        <div class="c3-grid-2">
          ${mat.ponto_m2?`<div class="c3-row"><span class="c3-row-l">Metragem</span><span class="c3-row-v">${mat.ponto_m2} m²</span></div>`:''}
          ${mat.ponto_condominio?`<div class="c3-row"><span class="c3-row-l">Condomínio</span><span class="c3-row-v">R$${brl(mat.ponto_condominio)}/mês</span></div>`:''}
          ${mat.ponto_iptu?`<div class="c3-row"><span class="c3-row-l">IPTU</span><span class="c3-row-v">R$${brl(mat.ponto_iptu)}/ano</span></div>`:''}
          ${mat.prazo_contrato_imovel?`<div class="c3-row"><span class="c3-row-l">Contrato</span><span class="c3-row-v">${mat.prazo_contrato_imovel}</span></div>`:''}
          ${mat.ponto_relacao_prop?`<div class="c3-row"><span class="c3-row-l">Relação proprietário</span><span class="c3-row-v">${mat.ponto_relacao_prop}</span></div>`:''}
          ${mat.ponto_reajuste?`<div class="c3-row"><span class="c3-row-l">Reajuste</span><span class="c3-row-v">${mat.ponto_reajuste}</span></div>`:''}
        </div>
        ${mat.ponto_pontos_fortes?`<div style="margin-top:14px;padding:12px;background:var(--accent-soft);border-radius:10px;font-size:13px;line-height:1.5"><strong style="color:var(--accent);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);display:block;margin-bottom:6px">Pontos fortes do ponto</strong>${mat.ponto_pontos_fortes}</div>`:''}
        ${mat.ponto_pontos_fracos?`<div style="margin-top:10px;padding:12px;background:var(--warn-soft);border-radius:10px;font-size:13px;line-height:1.5"><strong style="color:var(--warn);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);display:block;margin-bottom:6px">Pontos a observar</strong>${mat.ponto_pontos_fracos}</div>`:''}
      </div>
    `;
  }

  // 5. Motivação e termos
  if(mat.motivo_venda||mat.urgencia||mat.aceita_parcelamento!==undefined){
    html+=`
      <div class="section-head">
        <div class="section-sub">MOTIVAÇÃO E TERMOS</div>
        <h3 class="section-title" style="font-size:20px">Sobre a venda</h3>
      </div>
      <div class="panel">
        ${mat.motivo_venda?`<p style="font-size:15px;color:var(--ink-2);line-height:1.7;margin-bottom:14px"><strong>Motivação:</strong> ${mat.motivo_venda}</p>`:''}
        <div class="c3-grid-2">
          ${mat.urgencia?`<div class="c3-row"><span class="c3-row-l">Urgência</span><span class="c3-row-v">${mat.urgencia}</span></div>`:''}
          ${mat.prazo_transicao?`<div class="c3-row"><span class="c3-row-l">Prazo de transição</span><span class="c3-row-v">${mat.prazo_transicao}</span></div>`:''}
          ${mat.aceita_parcelamento!==undefined?`<div class="c3-row"><span class="c3-row-l">Aceita parcelamento</span><span class="c3-row-v">${mat.aceita_parcelamento?'Sim':'Não'}</span></div>`:''}
          ${mat.aceita_transicao!==undefined?`<div class="c3-row"><span class="c3-row-l">Aceita transição</span><span class="c3-row-v">${mat.aceita_transicao?'Sim':'Não'}</span></div>`:''}
          ${mat.tentou_vender_antes!==undefined?`<div class="c3-row"><span class="c3-row-l">Tentou vender antes</span><span class="c3-row-v">${mat.tentou_vender_antes?'Sim':'Não'}</span></div>`:''}
        </div>
        ${mat.itens_excluidos_venda?`<div style="margin-top:14px;padding:12px;background:var(--warn-soft);border-radius:10px;font-size:13px;line-height:1.5"><strong style="color:var(--warn);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);display:block;margin-bottom:6px">Itens excluídos da venda</strong>${mat.itens_excluidos_venda}</div>`:''}
      </div>
    `;
  }

  // 6. Crescimento detalhado
  if(mat.crescimento_motivos||mat.crescimento_perspectiva){
    html+=`
      <div class="section-head">
        <div class="section-sub">CRESCIMENTO</div>
        <h3 class="section-title" style="font-size:20px">Histórico e perspectivas</h3>
      </div>
      <div class="panel editorial">
        ${mat.crescimento_motivos?`<p><strong>O que tem impulsionado o crescimento:</strong> ${mat.crescimento_motivos}</p>`:''}
        ${mat.crescimento_perspectiva?`<p><strong>Perspectiva para os próximos anos:</strong> ${mat.crescimento_perspectiva}</p>`:''}
      </div>
    `;
  }

  // 7. Competição
  if(mat.concorrentes||mat.diferenciais||mat.posicionamento_preco){
    html+=`
      <div class="section-head">
        <div class="section-sub">CONTEXTO COMPETITIVO</div>
        <h3 class="section-title" style="font-size:20px">Concorrência e posicionamento</h3>
      </div>
      <div class="panel editorial">
        ${mat.diferenciais?`<p><strong>Diferenciais:</strong> ${mat.diferenciais}</p>`:''}
        ${mat.concorrentes?`<p><strong>Concorrentes principais:</strong> ${mat.concorrentes}</p>`:''}
        ${mat.posicionamento_preco?`<p><strong>Posicionamento de preço:</strong> ${mat.posicionamento_preco}</p>`:''}
        ${mat.ameacas_competitivas?`<p><strong>Ameaças a observar:</strong> ${mat.ameacas_competitivas}</p>`:''}
      </div>
    `;
  }

  // 8. Documentos
  if(mat.documentos&&mat.documentos.length>0){
    html+=`
      <div class="section-head">
        <div class="section-sub">DOCUMENTOS</div>
        <h3 class="section-title" style="font-size:20px">Anexos disponíveis</h3>
      </div>
      <div class="panel">
        <div style="display:flex;flex-direction:column;gap:8px">
          ${mat.documentos.map(d=>`
            <a href="${d.url}" target="_blank" rel="noopener" class="c3-row" style="text-decoration:none;color:inherit">
              <span class="c3-row-l">${d.tipo||'Documento'}</span>
              <span class="c3-row-v" style="color:var(--accent);font-weight:600">${d.nome||'Ver'} →</span>
            </a>
          `).join('')}
        </div>
      </div>
    `;
  }

  html+=`</div>`;
  sec.innerHTML=html;
}

init();
</script>
</body>
</html>
