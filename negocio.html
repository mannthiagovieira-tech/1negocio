<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Negócio · 1Negócio</title>
  <meta name="description" content="Detalhes do negócio na 1Negócio - avaliação, números e oportunidade.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f0c;
  --bg-2:#0d1310;
  --surface:#11181a;
  --surface-2:#0f1714;
  --line:rgba(255,255,255,.07);
  --line-2:rgba(255,255,255,.12);
  --ink:#f4f7f4;
  --ink-2:rgba(244,247,244,.78);
  --ink-3:rgba(244,247,244,.55);
  --ink-4:rgba(244,247,244,.35);
  --accent:#3dff95;
  --accent-soft:rgba(61,255,149,.12);
  --accent-line:rgba(61,255,149,.3);
  --warn:#f5b800;
  --warn-soft:rgba(245,184,0,.12);
  --alert:#ff6b5b;
  --alert-soft:rgba(255,107,91,.12);

  --serif:'Syne',ui-serif,serif;
  --sans:'Geist','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh}
body{
  background:radial-gradient(ellipse 100% 60% at 50% -10%, rgba(61,255,149,.06) 0%, transparent 50%), var(--bg);
}

a{color:inherit;text-decoration:none}
button{font-family:var(--sans)}

/* HEADER */
.hd{
  position:sticky;top:0;z-index:50;
  background:rgba(10,15,12,.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.hd-in{
  max-width:1100px;margin:0 auto;
  padding:18px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.brand{
  font-family:var(--serif);font-weight:800;font-size:22px;
  letter-spacing:-.02em;
  color:var(--ink);
}
.brand em{color:var(--accent);font-style:normal}
.hd-actions{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--ink-3)}
.hd-actions a{color:var(--ink-2)}
.hd-actions a:hover{color:var(--accent)}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:48px 28px 96px}
@media (max-width:580px){
  main{padding:32px 20px 72px}
  .hd-in{padding:14px 20px}
}

/* HERO */
.hero{
  background:linear-gradient(180deg,var(--surface-2) 0%,var(--surface) 100%);
  border:1px solid var(--line-2);
  border-radius:28px;
  padding:32px;
  position:relative;
  overflow:hidden;
  margin-bottom:32px;
  box-shadow:0 1px 0 0 rgba(255,255,255,.06) inset, 0 0 0 1px rgba(61,255,149,.08), 0 20px 48px -12px rgba(0,0,0,.5);
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 120% 60% at 50% -20%, var(--accent) 0%, transparent 45%);
  opacity:.08;pointer-events:none;
}
.hero-top{
  position:relative;z-index:1;
  display:flex;justify-content:space-between;align-items:flex-start;gap:18px;
  margin-bottom:22px;flex-wrap:wrap;
}
.hero-tag{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);
  background:var(--accent-soft);
  border:1px solid var(--accent-line);
  padding:6px 12px;border-radius:999px;
}
.hero-title{
  position:relative;z-index:1;
  font-family:var(--serif);font-weight:800;
  font-size:clamp(28px,4vw,42px);
  letter-spacing:-.03em;line-height:1.05;
  margin:0 0 12px 0;
}
.hero-sub{
  position:relative;z-index:1;
  font-size:15px;color:var(--ink-2);
  margin:0;max-width:680px;line-height:1.5;
}

/* VALOR HERO */
.val-hero{
  position:relative;z-index:1;
  margin-top:24px;
  display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;
  background:rgba(0,0,0,.25);
  border:1px solid var(--line);
  border-radius:18px;padding:18px 22px;
}
@media (max-width:680px){
  .val-hero{grid-template-columns:1fr;gap:10px;text-align:left}
  .val-hero .val-side{order:2}
  .val-hero .val-delta{order:3;justify-self:start}
  .val-hero .val-main{order:1}
}
.val-label{
  display:block;
  font-family:var(--mono);font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-4);margin-bottom:4px;
}
.val-aval, .val-num{
  font-family:var(--serif);font-weight:800;
  font-size:clamp(20px,2.4vw,28px);
  letter-spacing:-.02em;line-height:1;
  color:var(--ink);
}
.val-aval .rs, .val-num .rs{font-size:.65em;color:var(--ink-3);margin-right:2px;font-weight:600}
.val-num{color:var(--accent);font-size:clamp(24px,3vw,34px)}
.val-delta{
  display:inline-flex;flex-direction:column;align-items:center;gap:2px;
  font-family:var(--mono);font-size:10px;
  letter-spacing:.08em;text-transform:uppercase;
  padding:8px 14px;border-radius:10px;
  border:1px solid var(--line-2);
}
.val-delta b{font-weight:700;color:var(--ink);font-size:11px}
.val-delta span{color:var(--ink-3)}
.val-delta.up{border-color:var(--accent-line);background:var(--accent-soft)}
.val-delta.up b{color:var(--accent)}
.val-delta.dn{border-color:rgba(255,107,91,.3);background:var(--alert-soft)}
.val-delta.dn b{color:var(--alert)}

/* STATS */
.stats{
  margin-top:18px;
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  position:relative;z-index:1;
}
.stat{
  background:rgba(0,0,0,.2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px 14px;
}
.stat-l{
  display:block;font-family:var(--mono);font-size:10px;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-4);margin-bottom:6px;
}
.stat-v{
  display:block;font-family:var(--serif);font-weight:700;
  font-size:18px;letter-spacing:-.02em;
}
.stat-v .unit{font-size:.6em;color:var(--ink-3);margin-left:3px;font-weight:500}
.stat-v.g{color:var(--accent)}
.stat-v.w{color:var(--warn)}
.stat-v.a{color:var(--alert)}
.stat-bar{
  margin-top:8px;height:4px;
  background:rgba(255,255,255,.06);
  border-radius:999px;overflow:hidden;
}
.stat-bar div{height:100%;border-radius:999px;transition:width .3s}

/* SECTION */
.section{margin-top:32px}
.section-title{
  font-family:var(--serif);font-weight:700;
  font-size:22px;letter-spacing:-.02em;
  margin:0 0 12px 0;
}
.section-sub{
  font-size:13px;color:var(--ink-3);
  margin:0 0 18px 0;
}

.panel{
  background:linear-gradient(180deg,var(--surface-2) 0%,var(--surface) 100%);
  border:1px solid var(--line);
  border-radius:20px;
  padding:24px;
}

/* DRE / BALANCO */
.dre{width:100%;border-collapse:collapse;font-size:13px}
.dre th, .dre td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line)}
.dre th{
  font-family:var(--mono);font-size:10px;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-4);font-weight:500;
}
.dre td.v{font-family:var(--mono);text-align:right;font-weight:500}
.dre td.pct{font-family:var(--mono);text-align:right;color:var(--ink-3);font-size:12px}
.dre tr.neg td.v{color:var(--alert)}
.dre tr.sub td{font-weight:600;background:rgba(255,255,255,.02)}
.dre tr.total td{
  font-weight:700;font-size:14px;
  background:var(--accent-soft);color:var(--accent);
  border-top:2px solid var(--accent-line);
}
.dre td.bench{font-family:var(--mono);text-align:right;font-size:11px;color:var(--ink-4)}

/* BALANÇO */
.balanco{display:flex;flex-direction:column;gap:0;margin-top:6px}
.b-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 14px;
  font-family:var(--mono);font-size:13px;
  border-bottom:1px solid var(--line);
}
.b-row:last-child{border-bottom:0}
.b-row.b-sub{
  padding-left:28px;color:var(--ink-3);font-size:12px;
  background:rgba(255,255,255,.015);
}
.b-row.b-total{
  font-weight:600;font-size:14px;color:var(--ink);
  background:rgba(255,255,255,.04);
  margin-top:4px;
}
.b-row.b-total.g{color:var(--accent);background:var(--accent-soft)}
.b-row.b-total.r{color:var(--alert);background:var(--alert-soft);margin-top:8px}

/* INDICADORES */
.ind-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}
.ind-box{
  background:rgba(0,0,0,.2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 16px;
  display:flex;flex-direction:column;gap:4px;
}
.ind-l{
  font-family:var(--mono);font-size:10px;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-4);
}
.ind-v{
  font-family:var(--serif);font-weight:700;font-size:18px;
  letter-spacing:-.02em;color:var(--ink);
}
.ind-v .unit{font-size:.6em;color:var(--ink-3);font-weight:500;margin-left:2px}
.ind-v.g{color:var(--accent)}
.ind-v.w{color:var(--warn)}
.ind-v.a{color:var(--alert)}
.ind-sub{
  font-family:var(--sans);font-size:11px;
  color:var(--ink-3);margin-top:2px;
}

/* ANÁLISE TÉCNICA */
.ana-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:14px;
  margin-top:6px;
}
.ana-block{
  background:linear-gradient(180deg,var(--surface-2) 0%,var(--surface) 100%);
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px 22px;
  display:flex;flex-direction:column;gap:8px;
}
.ana-block.featured{
  border-color:var(--accent-line);
  background:linear-gradient(180deg,rgba(61,255,149,.06) 0%,var(--surface) 100%);
  grid-column:span 2;
}
@media (max-width:680px){
  .ana-block.featured{grid-column:span 1}
}
.ana-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  font-family:var(--mono);font-size:10px;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-4);
}
.ana-tag{
  font-size:9px;color:var(--accent);
  padding:3px 8px;border:1px solid var(--accent-line);border-radius:999px;
}
.ana-big{
  font-family:var(--serif);font-weight:800;
  font-size:clamp(24px,3vw,32px);
  letter-spacing:-.03em;line-height:1;
  color:var(--ink);
}
.ana-big.g{color:var(--accent)}
.ana-big.a{color:var(--alert)}
.ana-big .rs{font-size:.55em;color:var(--ink-3);margin-right:3px;font-weight:600}
.ana-formula{
  font-size:12px;color:var(--ink-3);line-height:1.6;
}
.ana-formula em{color:var(--ink-2);font-style:normal;font-weight:500}
.ana-conclusion{
  margin-top:8px;padding:10px 12px;
  background:rgba(0,0,0,.2);border-radius:10px;
  font-size:12px;color:var(--ink-2);line-height:1.5;
}
.ana-conclusion em{
  color:var(--accent);font-style:normal;font-weight:600;
}
.ana-ise-score{
  display:flex;align-items:center;gap:14px;margin:6px 0;
}
.ise-n{
  font-family:var(--serif);font-weight:800;
  font-size:48px;letter-spacing:-.03em;line-height:1;
}
.ise-n span{font-size:.4em;color:var(--ink-3);font-weight:500}
.ise-cls{
  padding:6px 12px;border-radius:999px;
  font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
}
.ana-ise-desc{
  font-size:13px;color:var(--ink-2);line-height:1.5;
}
.ana-checks{
  display:flex;flex-direction:column;gap:8px;margin:6px 0;
}
.ck{
  display:flex;align-items:flex-start;gap:10px;
  font-size:13px;color:var(--ink-2);line-height:1.4;
}
.ck-i{
  flex-shrink:0;width:20px;height:20px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:12px;font-weight:700;
  background:var(--accent-soft);color:var(--accent);
}
.ck.warn .ck-i{background:var(--warn-soft);color:var(--warn)}
.upsides{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.upside-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;
  background:rgba(0,0,0,.2);border-radius:10px;
}
.upside-n{
  flex-shrink:0;width:22px;height:22px;
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:50%;background:var(--accent);color:#08130c;
  font-family:var(--mono);font-weight:700;font-size:11px;
}
.upside-body{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.upside-t{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2}
.upside-sub{font-size:11px;color:var(--ink-3);line-height:1.2}
.upside-imp{
  font-family:var(--mono);font-weight:600;font-size:13px;color:var(--accent);
  flex-shrink:0;
}
.upsides-more{
  font-family:var(--mono);font-size:11px;color:var(--ink-4);
  text-align:center;padding:8px;
  letter-spacing:.06em;
}

/* CTAs */
.cta-row{
  display:flex;flex-wrap:wrap;gap:12px;
  margin-top:24px;
}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 22px;border-radius:999px;
  font-family:var(--sans);font-weight:600;font-size:14px;
  cursor:pointer;text-decoration:none;
  border:1px solid var(--line-2);
  background:transparent;color:var(--ink);
  transition:all .18s;
}
.btn:hover{border-color:var(--ink);background:var(--ink);color:var(--bg)}
.btn.primary{
  background:var(--accent);color:#08130c;border-color:var(--accent);
}
.btn.primary:hover{opacity:.92;background:var(--accent);color:#08130c}
.btn.warn{border-color:var(--warn);color:var(--warn)}
.btn.warn:hover{background:var(--warn);color:#08130c;border-color:var(--warn)}

/* ACCESS BLOCK */
.access-block{
  background:var(--accent-soft);
  border:1px solid var(--accent-line);
  border-radius:18px;
  padding:24px;margin-top:32px;
}
.access-block.warn{background:var(--warn-soft);border-color:rgba(245,184,0,.3)}
.access-block.alert{background:var(--alert-soft);border-color:rgba(255,107,91,.3)}
.access-tag{
  font-family:var(--mono);font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--accent);margin-bottom:8px;
}
.access-block.warn .access-tag{color:var(--warn)}
.access-block.alert .access-tag{color:var(--alert)}
.access-h{
  font-family:var(--serif);font-weight:700;font-size:20px;
  letter-spacing:-.02em;margin:0 0 6px 0;
}
.access-p{font-size:14px;color:var(--ink-2);margin:0 0 14px 0;line-height:1.5}

/* CAMADA 3 */
.c3-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:14px;margin-top:16px;
}
.c3-card{
  background:rgba(0,0,0,.2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px 18px;
}
.c3-label{
  font-family:var(--mono);font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink-4);margin-bottom:6px;
}
.c3-value{
  font-family:var(--serif);font-weight:600;font-size:16px;
  letter-spacing:-.01em;color:var(--ink);
  word-break:break-word;
}
.c3-text{
  font-size:14px;color:var(--ink-2);
  line-height:1.6;margin-top:6px;
}

/* COUNTDOWN */
.countdown{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent-soft);
  border:1px solid var(--accent-line);
  border-radius:999px;
  padding:6px 14px;
  font-family:var(--mono);font-size:11px;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--accent);
}

/* LOADING / EMPTY */
.loading{
  text-align:center;padding:96px 20px;
  color:var(--ink-4);
  font-family:var(--mono);font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;
}

.error-box{
  text-align:center;padding:48px 24px;
  background:rgba(255,107,91,.06);
  border:1px solid rgba(255,107,91,.2);
  border-radius:18px;
  color:var(--alert);
}
</style>
</head>
<body>

<header class="hd">
  <div class="hd-in">
    <a href="/" class="brand"><em>1</em>NEGÓCIO</a>
    <div class="hd-actions" id="hd-user">
      <a href="/portal-usuario.html">Minha área</a>
    </div>
  </div>
</header>

<main id="main">
  <div class="loading">Carregando negócio...</div>
</main>

<script>
const SUPABASE_URL = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

function $(id){ return document.getElementById(id); }
function brl(n){ if(n==null||isNaN(n)) return '—'; return Number(n).toLocaleString('pt-BR',{maximumFractionDigits:0}); }
function fmtMoney(n){ return n==null?'—':'R$ '+brl(n); }
function getQS(k){ return new URLSearchParams(window.location.search).get(k); }

// Sessao salva pelo portal (mesmo padrao do portal-usuario.html)
function getSession(){
  try {
    const raw = localStorage.getItem('1n_session');
    if(!raw) return null;
    const s = JSON.parse(raw);
    if(!s || !s.token || !s.user_id) return null;
    return s;
  } catch(e) { return null; }
}

const session = getSession();
const negocioId = getQS('id');

if(session && session.nome){
  $('hd-user').innerHTML = `<a href="/portal-usuario.html">Olá, ${session.nome.split(' ')[0]}</a>`;
}

if(!negocioId){
  $('main').innerHTML = '<div class="error-box"><h2 style="font-family:var(--serif);margin:0 0 8px">Negócio não especificado</h2><p>Volte para a home e escolha um negócio.</p><a href="/" class="btn" style="margin-top:16px">Voltar para a home</a></div>';
} else {
  carregarNegocio();
}

async function carregarNegocio(){
  // 1) Busca camadas 1+2 do negocio (publicas - RLS ja libera publicados)
  let neg;
  try {
    const headers = { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + (session?.token || SUPABASE_ANON) };
    const r = await fetch(SUPABASE_URL + '/rest/v1/negocios?id=eq.' + encodeURIComponent(negocioId)
      + '&select=id,tag,codigo,codigo_anuncio,titulo_anuncio,categoria,subcategoria,cidade,estado,faturamento_anual,ebitda,margem_bruta,margem_ebitda,ticket_medio,funcionarios,num_funcionarios,folha_pagamento,aluguel_mensal,preco_pedido,valor_1n,avaliacao_min,avaliacao_max,score_saude,multiplo,analise_1n,atencao_1n,abertura,tese,resultado_liquido_mensal,ano_fundacao,anos_existencia,recorrencia_pct,patrimonio_liquido,descricao,status,publicado_em', { headers });
    if(!r.ok) throw new Error('http_' + r.status);
    const arr = await r.json();
    neg = arr[0];
    if(!neg) throw new Error('not_found');
  } catch(e) {
    $('main').innerHTML = '<div class="error-box"><h2 style="font-family:var(--serif);margin:0 0 8px">Negócio não encontrado</h2><p>Este negócio não existe ou não está disponível.</p><a href="/" class="btn" style="margin-top:16px">Voltar para a home</a></div>';
    return;
  }

  // 2) Verifica estado de acesso do usuario logado pra esse negocio
  let acesso = { tipo: 'anonimo' };
  if(session){
    try {
      const headers = { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + session.token };
      // 2a) Solicitacao de info do user pra esse negocio
      const rs = await fetch(SUPABASE_URL + '/rest/v1/solicitacoes_info?comprador_id=eq.' + session.user_id
        + '&negocio_id=eq.' + negocioId
        + '&select=id,status,liberado_em,liberado_ate,visualizacoes&order=created_at.desc&limit=1', { headers });
      const sol = rs.ok ? (await rs.json())[0] : null;

      if(!sol){
        acesso = { tipo: 'logado_sem_solicitar' };
      } else if(sol.status === 'liberado' && sol.liberado_ate && new Date(sol.liberado_ate) > new Date()){
        acesso = { tipo: 'liberado', solicitacao_id: sol.id, liberado_ate: sol.liberado_ate, visualizacoes: sol.visualizacoes || 0 };
      } else if(sol.status === 'liberado'){
        acesso = { tipo: 'expirado', solicitacao_id: sol.id };
      } else if(sol.status === 'aprovada'){
        // Verifica se tem nda_solicitacao com token ainda valido
        const rn = await fetch(SUPABASE_URL + '/rest/v1/nda_solicitacoes?usuario_id=eq.' + session.user_id
          + '&negocio_id=eq.' + negocioId
          + '&status=eq.aprovado&expira_em=gt.' + encodeURIComponent(new Date().toISOString())
          + '&select=id,token,expira_em&order=aprovado_em.desc&limit=1', { headers });
        const ndaP = rn.ok ? (await rn.json())[0] : null;
        if(ndaP && ndaP.token){
          acesso = { tipo: 'aprovado_assinar', token: ndaP.token, expira_em: ndaP.expira_em };
        } else {
          acesso = { tipo: 'aprovado_sem_token' };
        }
      } else if(sol.status === 'nda_assinado'){
        acesso = { tipo: 'aguardando_liberacao' };
      } else if(sol.status === 'aguardando'){
        acesso = { tipo: 'aguardando_analise' };
      } else if(sol.status === 'recusada'){
        acesso = { tipo: 'recusado' };
      } else {
        acesso = { tipo: 'outro_status', status: sol.status };
      }
    } catch(e){ /* mantem anonimo */ }
  }

  // 3) Renderiza camadas 1+2 (paridade com card do index)
  const ctx = normalizeNeg(neg);
  renderResumo(ctx);
  renderFinanceiro(ctx);
  renderIndicadores(ctx);
  renderAnaliseTecnica(ctx);

  // 4) Renderiza bloco de acesso e Camada 3 se aplicavel
  if(acesso.tipo === 'liberado'){
    await carregarECamada3(neg, acesso);
  } else {
    renderBlocoAcesso(neg, acesso);
  }
}

// ===== NORMALIZA NEGOCIO (mesma logica do index) =====
function normalizeNeg(d){
  const fat = parseFloat(d.faturamento_anual) || 0;
  const margem = parseFloat(d.margem_ebitda) || 20;
  const rlm = parseFloat(d.resultado_liquido_mensal) || Math.round(fat * margem/100 / 12);
  const preco = parseFloat(d.preco_pedido) || 0;
  const valor1n = parseFloat(d.valor_1n);
  const aval = (d.avaliacao_min && d.avaliacao_max)
    ? Math.round((Number(d.avaliacao_min) + Number(d.avaliacao_max))/2)
    : (valor1n || Math.round(preco * 1.18));
  const ise = d.score_saude || 0;
  const pl = parseFloat(d.patrimonio_liquido) || 0;
  const rec = Math.round(parseFloat(d.recorrencia_pct) || 0);
  const anos = d.anos_existencia || (d.ano_fundacao ? (new Date().getFullYear() - d.ano_fundacao) : 0);
  const funcs = d.num_funcionarios || d.funcionarios || 0;
  const cls = ise>=80?'Sólido':ise>=65?'Estável':ise>=50?'Operacional':ise>=30?'Em desenvolvimento':'Fragilizado';

  // Balanço derivado (mesmo padrao do index)
  const ativos = Math.abs(pl) + Math.round(fat*.15);
  const pass = Math.max(0, ativos - pl);

  const codigo = d.tag || d.codigo_anuncio || d.codigo || (d.id || '').substring(0,8).toUpperCase();
  const titulo = d.titulo_anuncio || d.categoria || 'Negócio';
  const local = [d.cidade, d.estado].filter(Boolean).join(', ');
  const setor = d.categoria || '—';
  const idStr = d.id || codigo;

  return {
    raw: d,
    id: idStr, codigo, titulo, setor, local,
    cidade: d.cidade, uf: d.estado,
    fat, rlm: Math.round(rlm), aval, preco, valor1n,
    ise, cls,
    margem: Math.round(margem),
    rec, anos, funcs,
    ativos, pass, pl,
    desc: d.descricao || d.abertura || d.tese || ''
  };
}

// ===== VIEW 2: FINANCEIRO (DRE + Balanço + análises 1N) =====
function renderFinanceiro(c){
  const { fat, rlm, ativos, pass, raw } = c;
  if(!fat) return;
  const fam = Math.round(fat/12);
  const impostosA = Math.round(fat*.095);
  const cmvA = Math.round(fat*.32);
  const folhaA = raw.folha_pagamento ? Number(raw.folha_pagamento)*12 : Math.round(fat*.28);
  const aluguelA = raw.aluguel_mensal ? Number(raw.aluguel_mensal)*12 : 0;
  const despA = Math.round(fat*.105) + aluguelA;
  const ro_derived = fat - impostosA - cmvA - folhaA - despA;
  const roA = Math.max(rlm*12, ro_derived);
  const pctF = (v) => fat>0 ? ((v/fat)*100).toFixed(1).replace('.0','') + '%' : '—';
  const row = (label, mensal, anual, cls, bench) => `<tr class="${cls||''}"><td>${label}</td><td class="v">R$${brl(Math.abs(mensal))}</td><td class="v">R$${brl(Math.abs(anual))}</td><td class="pct">${pctF(Math.abs(anual))}</td><td class="bench">${bench||'—'}</td></tr>`;

  const margemReal = fat>0 ? Math.round((roA/fat)*100) : 0;
  const dreCom = margemReal>=25 ? 'Margem operacional acima da média setorial — bom controle de custos.'
              : margemReal>=18 ? 'Margem operacional dentro da média do setor.'
              : 'Margem abaixo do benchmark — oportunidade de otimização.';

  const ana = raw.analise_1n ? `<div class="panel" style="margin-top:18px"><strong style="color:var(--accent);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);display:block;margin-bottom:8px">Análise 1N</strong><div class="c3-text" style="margin:0">${raw.analise_1n}</div></div>` : '';
  const aten = raw.atencao_1n ? `<div class="panel" style="margin-top:14px;background:var(--warn-soft);border-color:rgba(245,184,0,.3)"><strong style="color:var(--warn);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);display:block;margin-bottom:8px">Pontos de atenção</strong><div class="c3-text" style="margin:0">${raw.atencao_1n}</div></div>` : '';

  $('content-extra').innerHTML += `
    <section class="section">
      <h2 class="section-title">Demonstrativo financeiro</h2>
      <p class="section-sub">DRE estimada · benchmarks setoriais · balanço simplificado</p>
      <div class="panel">
        <table class="dre">
          <thead><tr><th>Rubrica</th><th style="text-align:right">Mensal</th><th style="text-align:right">Anual</th><th style="text-align:right">% Rec</th><th style="text-align:right">Benchmark</th></tr></thead>
          <tbody>
            ${row('Receita Bruta', fam, fat)}
            ${row('(-) Impostos', -Math.round(impostosA/12), -impostosA, 'neg', '8-10%')}
            ${row('Receita líquida', fam - Math.round(impostosA/12), fat - impostosA, 'sub')}
            ${row('(-) Custos variáveis', -Math.round(cmvA/12), -cmvA, 'neg', '28-35%')}
            ${row('(-) Folha + encargos', -Math.round(folhaA/12), -folhaA, 'neg', '25-32%')}
            ${row('(-) Despesas operac.', -Math.round(despA/12), -despA, 'neg', '10-14%')}
            <tr class="total"><td>Resultado operacional</td><td class="v">R$${brl(Math.round(roA/12))}</td><td class="v">R$${brl(roA)}</td><td class="pct">${pctF(roA)}</td><td class="bench">${margemReal>=20?'acima':margemReal>=15?'na média':'abaixo'}</td></tr>
          </tbody>
        </table>

        <div style="margin-top:14px;padding:12px 16px;background:rgba(0,0,0,.2);border-radius:10px;font-size:13px;color:var(--ink-2);line-height:1.5">${dreCom}</div>

        <h3 style="font-family:var(--serif);font-weight:700;font-size:18px;letter-spacing:-.02em;margin:24px 0 12px 0">Balanço patrimonial <span style="font-family:var(--mono);font-size:11px;color:var(--ink-3);font-weight:400;margin-left:6px">· simplificado</span></h3>
        <div class="balanco">
          <div class="b-row b-total g"><span>Ativos totais</span><span>R$${brl(ativos)}</span></div>
          <div class="b-row b-sub"><span>Caixa e equivalentes</span><span>R$${brl(Math.round(ativos*.08))}</span></div>
          <div class="b-row b-sub"><span>Equipamentos/imóveis</span><span>R$${brl(Math.round(ativos*.65))}</span></div>
          <div class="b-row b-sub"><span>Estoque/suprimentos</span><span>R$${brl(Math.round(ativos*.27))}</span></div>
          <div class="b-row b-total r"><span>Passivos totais</span><span>R$${brl(pass)}</span></div>
          <div class="b-row b-sub"><span>Dívidas bancárias</span><span>R$${brl(Math.round(pass*.55))}</span></div>

// ===== VIEW 4: ANÁLISE TÉCNICA 1N (avaliação, upsides, transferibilidade, payback) =====
function renderAnaliseTecnica(c){
  const { fat, rlm, ise, rec, funcs, pass, ativos, aval, preco, margem, id } = c;
  if(!fat || !aval) return;
  const roA = rlm*12;
  const seed = String(id);
  const socioDep = ise>=75?'Baixa':ise>=55?'Média':'Alta';
  const processos = ise>=55;
  const concentr = 6 + ((seed.charCodeAt(3)||0)%12);

  const iseCls = ise>=80?'SÓLIDO':ise>=65?'ESTÁVEL':ise>=50?'OPERACIONAL':ise>=30?'EM DESENV.':'FRAGILIZADO';
  const iseColor = ise>=65?'var(--accent)':ise>=50?'var(--warn)':'var(--alert)';
  const iseBgAlpha = ise>=65?'rgba(61,255,149,.12)':ise>=50?'rgba(255,183,77,.15)':'rgba(255,107,107,.15)';
  const paybackAnos = roA>0 ? (preco/roA).toFixed(1) : '—';
  const paybackOk = roA>0 && (preco/roA) <= 6;
  const pl = ativos - pass;

  // ===== UPSIDES =====
  const upsidesPool = [];
  if (margem < 22) upsidesPool.push({ t: 'Migração tributária', sub: 'Simples → Lucro Real', impRs: Math.round(fat*.055) });
  if (rec < 55) upsidesPool.push({ t: 'Aumento de recorrência', sub: 'Contratos + assinaturas', impRs: Math.round(roA*.18) });
  if (ise < 78) upsidesPool.push({ t: 'Profissionalização da gestão', sub: 'Processos + sistema + indicadores', impRs: Math.round(aval*.12) });
  if (socioDep !== 'Baixa') upsidesPool.push({ t: 'Redução de sócio-dependência', sub: 'Liderança intermediária + SOPs', impRs: Math.round(aval*.08) });
  if (concentr > 15) upsidesPool.push({ t: 'Diversificação de clientes', sub: 'Reduzir concentração top-3', impRs: Math.round(aval*.06) });
  if (funcs > 0 && (roA/funcs) < 45000) upsidesPool.push({ t: 'Otimização de produtividade', sub: 'Resultado por colaborador', impRs: Math.round(roA*.10) });
  if (upsidesPool.length < 3) upsidesPool.push({ t: 'Expansão de margem', sub: 'Renegociação + pricing', impRs: Math.round(roA*.08) });
  if (upsidesPool.length < 3) upsidesPool.push({ t: 'Estruturação para venda', sub: 'Auditoria + governança', impRs: Math.round(aval*.05) });

  const upsidesTop = upsidesPool.slice(0,3);
  const upsidesOutros = Math.max(0, upsidesPool.length-3);
  const upsideTotalRs = upsidesPool.reduce((s, u) => s + u.impRs, 0);
  const valorPotencial = aval + upsideTotalRs;
  const upsidePct = Math.round((upsideTotalRs / aval) * 100);

  // ===== TRANSFERIBILIDADE =====
  const checks = [];
  checks.push({ok: funcs>=3, txt: funcs>=3 ? `Equipe de ${funcs} colaboradores — operação independente` : 'Equipe enxuta — verificar transferibilidade'});
  checks.push({ok: processos, txt: processos ? 'Processos documentados' : 'Processos parcialmente documentados'});
  checks.push({ok: socioDep==='Baixa', txt: `Sócio-dependência ${socioDep.toLowerCase()}`});
  checks.push({ok: rec>=30, txt: rec>=30 ? `Receita recorrente ${rec}% — fluxo previsível` : 'Baixa recorrência — avaliar pipeline'});
  const trOk = checks.filter(c=>c.ok).length;
  const trConclusion = trOk>=3 ? 'Risco de continuidade <em>BAIXO</em>' : trOk>=2 ? 'Risco de continuidade <em>MÉDIO</em>' : 'Risco de continuidade <em>ALTO</em>';

  $('content-extra').innerHTML += `

      <h2 class="section-title">Análise técnica 1N</h2>
      <p class="section-sub">Como chegamos na avaliação · upsides · transferibilidade · payback</p>

      <div class="ana-grid">

        <div class="ana-block">
          <div class="ana-head"><span>Como chegamos nessa avaliação</span><span class="ana-tag">AVAL. 1N</span></div>
          <div class="ana-big g"><span class="rs">R$</span>${brl(aval)}</div>
          <div class="ana-formula">
            <em>método:</em> Resultado operacional anual ajustado × múltiplo 1N<br>
            <span style="opacity:.75;font-size:11px">(mercado × modelagem × saúde e maturidade) + balanço patrimonial</span>
          </div>
        </div>

        <div class="ana-block featured">
          <div class="ana-head"><span>Valor potencial</span><span class="ana-tag">+${upsidePct}%</span></div>
          <div class="ana-big g"><span class="rs">até R$</span>${brl(valorPotencial)}</div>
          <div class="ana-ise-desc" style="margin-top:-2px">com ${upsidesPool.length} upsides identificados</div>
          <div class="upsides">
            ${upsidesTop.map((u,idx)=>`
              <div class="upside-row">
                <span class="upside-n">${idx+1}</span>
                <div class="upside-body">
                  <span class="upside-t">${u.t}</span>
                  <span class="upside-sub">${u.sub}</span>
                </div>
                <span class="upside-imp">+R$${brl(u.impRs)}</span>
              </div>
            `).join('')}
          </div>
          ${upsidesOutros>0 ? `<div class="upsides-more">+ ${upsidesOutros} outro${upsidesOutros>1?'s':''} upside${upsidesOutros>1?'s':''} no laudo completo</div>` : ''}
        </div>

        <div class="ana-block">
          <div class="ana-head"><span>Índice de Saúde Estimado</span></div>
          <div class="ana-ise-score">
            <div class="ise-n" style="color:${iseColor}">${ise}<span>/100</span></div>
            <div class="ise-cls" style="color:${iseColor};background:${iseBgAlpha}">${iseCls}</div>
          </div>
          <div class="ana-ise-desc">
            ${ise>=80 ? 'Negócio com estrutura operacional madura e baixo risco.'
              : ise>=65 ? 'Operação estável com fundamentos consistentes.'
              : ise>=50 ? 'Operação com pontos a monitorar — due diligence recomendada.'
              : 'Requer atenção em múltiplos pilares — alto potencial de melhoria.'}
          </div>
        </div>

        <div class="ana-block">
          <div class="ana-head"><span>Fator de transferibilidade</span></div>
          <div class="ana-checks">
            ${checks.map(c=>`<div class="ck ${c.ok?'':'warn'}"><span class="ck-i">${c.ok?'✓':'!'}</span><span>${c.txt}</span></div>`).join('')}
          </div>
          <div class="ana-conclusion">${trConclusion}</div>
        </div>

        <div class="ana-block">
          <div class="ana-head"><span>Prazo estimado de ROI</span><span>payback</span></div>
          <div class="ana-big ${paybackOk?'g':''}">${paybackAnos}<span class="rs" style="margin-left:4px">anos</span></div>
          <div class="ana-formula">
            <em>valor pedido:</em> R$${brl(preco)}<br>
            <em>fluxo anual:</em> R$${brl(roA)}
          </div>
          <div class="ana-conclusion">
            ${paybackOk ? 'Payback <em>dentro</em> do esperado para o setor' : 'Payback <em>acima</em> da média — negociar valor'}
          </div>
        </div>

        <div class="ana-block">
          <div class="ana-head"><span>Valor efetivo pago pelo negócio</span></div>
          <div class="ana-big ${pl > 0 ? 'g' : pl < 0 ? 'a' : ''}"><span class="rs">R$</span>${brl(preco - pl)}</div>
          <div class="ana-formula">
            <em>valor pedido:</em> R$${brl(preco)}<br>
            <em>balanço patrimonial:</em> ${pl >= 0 ? '+' : ''}R$${brl(Math.abs(pl))} ${pl > 0 ? '(positivo)' : pl < 0 ? '(negativo)' : '(neutro)'}
          </div>
          <div class="ana-conclusion">
            ${ pl < 0 ? 'BP negativo — passivos superam ativos. Você está pagando efetivamente <em>mais</em> do que o preço pedido.'
               : pl > 0 ? 'BP positivo — ativos superam passivos. Parte do valor pedido é patrimônio real; o negócio em si custa <em>menos</em> do que o preço pedido.'
               : 'BP neutro — o valor efetivo é exatamente o valor pedido.' }
          </div>
        </div>

      </div>
    </section>
  `;
}

async function carregarECamada3(n, acesso){
  // Mostra loading enquanto chama a Edge Function
  $('content-extra').innerHTML += `
    <section class="section" id="c3-section">
      <h2 class="section-title">Material completo</h2>
      <p class="section-sub">Acesso liberado · ${calcDiasRestantes(acesso.liberado_ate)}</p>
      <div class="loading">Carregando material...</div>
    </section>
  `;

  try {
    const r = await fetch(SUPABASE_URL + '/functions/v1/material-fetch', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + session.token,
        'apikey': SUPABASE_ANON
      },
      body: JSON.stringify({ negocio_id: negocioId })
    });

    if(!r.ok){
      const err = await r.json().catch(()=>({}));
      $('c3-section').innerHTML = `
        <h2 class="section-title">Material completo</h2>
        <div class="error-box">
          <p style="margin:0">Não foi possível carregar o material: ${err.error || 'erro_desconhecido'}</p>
        </div>
      `;
      return;
    }

    const data = await r.json();
    renderCamada3(data, acesso);

  } catch(e){
    $('c3-section').innerHTML = `
      <h2 class="section-title">Material completo</h2>
      <div class="error-box">
        <p style="margin:0">Erro de conexão ao carregar material.</p>
      </div>
    `;
  }
}

function calcDiasRestantes(ateIso){
  if(!ateIso) return '';
  const ms = new Date(ateIso).getTime() - Date.now();
  if(ms <= 0) return 'expirado';
  const dias = Math.ceil(ms/86400000);
  if(dias === 1) return '1 dia restante · até '+new Date(ateIso).toLocaleDateString('pt-BR');
  return dias + ' dias restantes · até '+new Date(ateIso).toLocaleDateString('pt-BR');
}
