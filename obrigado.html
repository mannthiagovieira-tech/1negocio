<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento confirmado · 1Negócio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0a;--green:#10b981;--ink:rgba(255,255,255,.88);--ink2:rgba(255,255,255,.5);--ink3:rgba(255,255,255,.24);--sep:rgba(255,255,255,.07)}
body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{max-width:480px;width:100%;text-align:center}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:48px}
.logo em{color:var(--green);font-style:normal}
.check{width:64px;height:64px;border-radius:50%;background:rgba(16,185,129,.12);border:1.5px solid rgba(16,185,129,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;font-size:28px}
.titulo{font-family:'Syne',sans-serif;font-size:clamp(24px,5vw,36px);font-weight:800;margin-bottom:12px}
.titulo em{color:var(--green);font-style:normal}
.subtitulo{font-size:13px;color:var(--ink2);line-height:1.8;margin-bottom:8px}
.detalhe{font-size:11px;color:var(--ink3);line-height:1.7;margin-bottom:40px}
.sep{height:1px;background:var(--sep);margin:32px 0}
.info-box{border:.5px solid rgba(16,185,129,.2);background:rgba(16,185,129,.04);padding:20px 24px;text-align:left;margin-bottom:32px}
.info-label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);margin-bottom:10px}
.info-item{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--ink2);line-height:1.7;margin-bottom:6px}
.info-item:last-child{margin-bottom:0}
.info-item::before{content:'→';color:var(--green);flex-shrink:0;margin-top:1px}
.btns{display:flex;flex-direction:column;gap:8px}
.btn-primary{background:var(--green);color:#000;border:none;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:14px 24px;cursor:pointer;width:100%;text-decoration:none;display:block;text-align:center;transition:background .15s}
.btn-primary:hover{background:#0ea572}
.btn-sec{background:transparent;border:.5px solid var(--sep);color:var(--ink2);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:12px 24px;cursor:pointer;width:100%;text-decoration:none;display:block;text-align:center;transition:all .15s}
.btn-sec:hover{border-color:rgba(255,255,255,.2);color:var(--ink)}
.nota{font-size:10px;color:var(--ink3);margin-top:20px;line-height:1.7}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><em>1</em>NEGÓCIO</div>

  <div class="check">✓</div>
  <div class="titulo" id="titulo">Pagamento <em>confirmado!</em></div>
  <div class="subtitulo" id="subtitulo">Recebemos seu pagamento com sucesso.</div>
  <div class="detalhe" id="detalhe">Você receberá uma confirmação por e-mail em instantes.</div>

  <div class="info-box" id="info-box">
    <div class="info-label" id="info-label">O que acontece agora</div>
    <div id="info-items"></div>
  </div>

  <div class="btns">
    <a href="/portal-usuario.html" class="btn-primary">Acessar minha conta →</a>
    <a href="/" class="btn-sec">Voltar para a home</a>
  </div>

  <div class="nota">Dúvidas? Fale conosco pelo chat no portal ou em <span style="color:var(--green)">contato@1negocio.com.br</span></div>
</div>

<script>
// Detectar produto pelo parâmetro na URL
var params = new URLSearchParams(window.location.search);
var produto = params.get('produto') || params.get('p') || 'laudo';

var config = {
  laudo: {
    titulo: 'Pagamento <em>confirmado!</em>',
    subtitulo: 'Seu laudo PDF está sendo preparado.',
    detalhe: 'Geralmente entregamos em até 10 minutos. Máximo 24 horas.',
    label: 'Seu laudo PDF · R$ 99',
    items: [
      'Nossa equipe foi notificada e está preparando seu laudo',
      'Você receberá o PDF por e-mail — verifique também a caixa de spam',
      'O laudo contém avaliação técnica completa com ISE e valuation',
      'Em caso de dúvidas, acesse o portal e use o chat de suporte'
    ]
  },
  guiado: {
    titulo: 'Bem-vindo ao <em>Plano Guiado!</em>',
    subtitulo: 'Seu consultor dedicado entrará em contato em breve.',
    detalhe: 'Normalmente agendamos em até 24 horas.',
    label: 'Plano Guiado · R$ 588',
    items: [
      'Nossa equipe recebeu seu cadastro e irá entrar em contato',
      'Um consultor dedicado conduzirá sua avaliação do início ao fim',
      'Sua comissão de sucesso é de 5% (em vez de 10% no plano gratuito)',
      'Prepare: DRE dos últimos 12 meses, lista de ativos e passivos'
    ]
  },
  avaliacao: {
    titulo: 'Avaliação <em>agendada!</em>',
    subtitulo: 'Nossa equipe entrará em contato para confirmar o horário.',
    detalhe: 'Normalmente confirmamos em até 24 horas.',
    label: 'Avaliação Profissional · R$ 397',
    items: [
      'Você receberá um e-mail com as instruções para a reunião',
      'A sessão dura aproximadamente 90 minutos via Google Meet',
      'Prepare os dados financeiros do negócio para a conversa',
      'Após a reunião, entregaremos o relatório completo em até 48 horas'
    ]
  }
};

var c = config[produto] || config.laudo;

document.getElementById('titulo').innerHTML = c.titulo;
document.getElementById('subtitulo').textContent = c.subtitulo;
document.getElementById('detalhe').textContent = c.detalhe;
document.getElementById('info-label').textContent = c.label;

var itemsHtml = c.items.map(function(item) {
  return '<div class="info-item">' + item + '</div>';
}).join('');
document.getElementById('info-items').innerHTML = itemsHtml;
</script>
</body>
</html>
