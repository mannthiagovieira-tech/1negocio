<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Abrindo proposta… · 1Negócio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--accent:#0aa85a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef0ec;display:flex;align-items:center;justify-content:center;
  min-height:100vh;font-family:'JetBrains Mono',monospace}
.wrap{text-align:center;padding:32px}
.logo{font-family:'Syne',serif;font-size:22px;font-weight:800;letter-spacing:-.03em;
  margin-bottom:28px;color:#0a1510}
.logo span{color:var(--accent)}
.spinner{width:36px;height:36px;border:3px solid rgba(10,168,90,.2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.msg{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(10,21,16,.4)}
.err{display:none;margin-top:20px;padding:14px 20px;background:#fff;
  border:1px solid rgba(201,64,46,.2);border-radius:10px;
  font-size:12px;color:#c9402e;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><span>1</span>Negócio</div>
  <div class="spinner"></div>
  <div class="msg" id="msg">Abrindo proposta…</div>
  <div class="err" id="err"></div>
</div>
<script>
const SUPABASE_URL  = 'https://dbijmgqlcrgjlcfrastg.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA'

async function redirecionar() {
  // Extrai o slug do path: /p/SLUG
  const parts = window.location.pathname.split('/').filter(Boolean)
  const slug  = parts[parts.length - 1]

  if (!slug || slug === 'p') {
    mostrarErro('Link inválido. Nenhum slug encontrado na URL.')
    return
  }

  try {
    const res  = await fetch(
      `${SUPABASE_URL}/rest/v1/propostas_comerciais?slug=eq.${encodeURIComponent(slug)}&select=storage_url,status,contato_nome`,
      { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
    )
    const data = await res.json()

    if (!data || !data.length) {
      mostrarErro(`Proposta não encontrada.<br>Código: <strong>${slug}</strong>`)
      return
    }

    const proposta = data[0]

    if (proposta.status === 'expirada') {
      mostrarErro('Esta proposta expirou.<br>Entre em contato com a equipe 1Negócio para gerar uma nova.')
      return
    }

    if (!proposta.storage_url) {
      mostrarErro('Arquivo da proposta não encontrado. Contate o suporte.')
      return
    }

    document.getElementById('msg').textContent = `Abrindo proposta${proposta.contato_nome ? ' de ' + proposta.contato_nome.split('·')[1]?.trim() || '' : ''}…`
    window.location.href = proposta.storage_url

  } catch (e) {
    mostrarErro('Erro ao buscar proposta: ' + e.message)
  }
}

function mostrarErro(msg) {
  document.querySelector('.spinner').style.display = 'none'
  document.getElementById('msg').style.display = 'none'
  const err = document.getElementById('err')
  err.innerHTML = msg + '<br><br><a href="https://wa.me/5548991994080" style="color:#0aa85a;font-weight:600">Falar com a equipe →</a>'
  err.style.display = 'block'
}

redirecionar()
</script>
</body>
</html>
