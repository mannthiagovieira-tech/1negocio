<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Negócio · Laudo de Avaliação</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#eef5f0;--bg1:#ffffff;--bg2:#f4f9f5;--bg3:#e8f2eb;
  --em:#1a7a4a;--em-d:rgba(26,122,74,.08);--em-l:rgba(26,122,74,.22);
  --am:#92470a;--am-d:rgba(146,71,10,.08);--am-l:rgba(146,71,10,.22);
  --rd:#b91c1c;--rd-d:rgba(185,28,28,.08);--rd-l:rgba(185,28,28,.22);
  --pu:#6d28d9;--pu-d:rgba(109,40,217,.08);--pu-l:rgba(109,40,217,.22);
  --bl:#1e40af;--bl-d:rgba(30,64,175,.08);--bl-l:rgba(30,64,175,.22);
  --ink:#0d2b1e;--ink2:#1f4a32;--ink3:#2d6644;--ink4:#4a7c5c;
  --line:rgba(13,43,30,.08);--line2:rgba(13,43,30,.15);
}
/* Tema escuro — D-1 do mapeamento. Default mantém light (impressão amigável). */
:root[data-theme="dark"]{
  --bg:#0c0c0a;--bg1:#161614;--bg2:#1a1a18;--bg3:#1a1a18;
  --em:#10b981;--em-d:rgba(16,185,129,.10);--em-l:rgba(16,185,129,.30);
  --am:#f59e0b;--am-d:rgba(245,158,11,.10);--am-l:rgba(245,158,11,.30);
  --rd:#f87171;--rd-d:rgba(248,113,113,.10);--rd-l:rgba(248,113,113,.30);
  --pu:#a78bfa;--pu-d:rgba(167,139,250,.10);--pu-l:rgba(167,139,250,.30);
  --bl:#60a5fa;--bl-d:rgba(96,165,250,.10);--bl-l:rgba(96,165,250,.30);
  --ink:#e8e8e6;--ink2:#c8c8c4;--ink3:#a8a8a4;--ink4:#6a6a66;
  --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.15);
}
/* Toggle dark/light — fixed top-right. Hidden em impressão. */
.theme-toggle{
  position:fixed;top:14px;right:14px;z-index:100;
  background:var(--bg1);border:1px solid var(--line2);
  color:var(--ink2);padding:6px 12px;
  font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;letter-spacing:.05em;
}
.theme-toggle:hover{border-color:var(--em);color:var(--em)}
@media print{.theme-toggle{display:none}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace}
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
#loading.hide{opacity:0;visibility:hidden;pointer-events:none}
.ld-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.02em;margin-bottom:28px}
.ld-logo em{color:var(--em);font-style:normal}
.ld-bar-wrap{width:200px;height:3px;background:var(--line2);border-radius:2px;overflow:hidden;margin-bottom:20px}
.ld-bar{height:100%;width:0%;background:var(--em);border-radius:2px;transition:width .6s ease}
.ld-msg{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink4);min-height:16px}
#wrap{opacity:0;transition:opacity .6s}
#wrap.show{opacity:1}
.page-break{page-break-before:always;break-before:page}
.doc{max-width:680px;margin:0 auto;padding-bottom:60px}
.capa{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);border-bottom:2px solid var(--line2);position:relative;overflow:hidden}
.capa-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--em),transparent)}
.capa-top{display:flex;align-items:center;justify-content:space-between;padding:24px 32px;border-bottom:1px solid var(--line2)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.02em;color:var(--ink);display:flex;align-items:center;gap:2px}
.logo-1{color:var(--em)}
.capa-badge{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--am);background:var(--am-d);border:1px solid var(--am-l);padding:5px 12px}
/* Capa (Fase 3.2.4): logo só no header, nome do negócio à ESQUERDA, sem subtítulo de setor */
.capa-body{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;text-align:left;padding:48px 48px;gap:24px}
.capa-hero-nome{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(36px,8vw,56px);letter-spacing:-.03em;line-height:1;color:var(--ink);max-width:560px}
.capa-subtitulo{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:.04em;color:var(--em);text-transform:uppercase;display:flex;align-items:center;gap:14px;margin-top:6px}
.capa-subtitulo::before{content:'';width:32px;height:1.5px;background:var(--em)}
/* Rodapé da capa: encomenda + código (canto inferior esquerdo, alinhado à esquerda) */
.capa-rodape{position:absolute;left:48px;bottom:28px;display:flex;flex-direction:column;gap:4px;font-size:9px;letter-spacing:.04em;color:var(--ink4)}
.capa-rodape-linha strong{color:var(--ink3);font-family:'DM Mono',monospace;font-weight:500}
/* Folha de rosto (Fase 3.2.4 — "Apresentação" simples, sem mega título) */
.intro{min-height:100vh;display:flex;flex-direction:column;justify-content:space-between;background:var(--bg1);border-bottom:1px solid var(--line2);padding:96px 48px 40px;position:relative}
.intro-top{max-width:560px}
/* Eyebrow simples no mesmo tamanho do corpo, peso médio — não é título de destaque */
.intro-eyebrow{font-size:13px;color:var(--ink2);margin-bottom:24px;font-weight:600;letter-spacing:0}
.intro-texto{font-size:13px;color:var(--ink2);line-height:1.85;margin-bottom:16px}
.intro-texto:last-child{margin-bottom:0}
/* Elementos auditáveis em destaque (datas, versões, nomes) */
.intro-texto strong{color:var(--em);font-weight:600}
.intro-rodape{display:flex;justify-content:space-between;align-items:flex-end;padding-top:24px;border-top:1px solid var(--line2);font-size:9px;color:var(--ink4);letter-spacing:.05em}
.intro-rodape strong{color:var(--ink3);font-weight:500;font-family:'DM Mono',monospace;letter-spacing:.05em}
/* Índice (C) */
.indice{min-height:100vh;background:var(--bg);border-bottom:1px solid var(--line2);padding:80px 48px 40px}
.indice-eyebrow{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--em);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.indice-eyebrow::before{content:'';width:22px;height:1.5px;background:var(--em)}
.indice-titulo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,5vw,36px);letter-spacing:-.03em;line-height:1.05;color:var(--ink);margin-bottom:36px}
.indice-list{list-style:none;padding:0;margin:0}
.indice-item{display:flex;align-items:baseline;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.indice-item:last-child{border-bottom:none}
.indice-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--em);font-weight:500;width:28px;flex-shrink:0;letter-spacing:.05em}
.indice-nome{flex:1;font-size:13px;color:var(--ink);line-height:1.4}
.indice-dots{flex:1;border-bottom:1px dotted var(--line2);margin:0 8px;align-self:flex-end;height:0;min-width:24px}
.indice-pag{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink4);letter-spacing:.05em;flex-shrink:0;width:24px;text-align:right}
.sec{border-bottom:1px solid var(--line2)}
.sec-header{padding:28px 32px 0;display:flex;align-items:flex-start;gap:16px;margin-bottom:22px}
.sec-num{font-size:9px;letter-spacing:.12em;color:var(--em);flex-shrink:0;padding-top:3px}
.sec-label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;color:var(--ink);line-height:1.2}
.sec-body{padding:0 32px 32px}
.txt{font-size:11px;color:var(--ink2);line-height:1.85;margin-bottom:12px}
.txt:last-child{margin-bottom:0}
.txt-pendente{font-size:11px;color:var(--ink4);line-height:1.7;padding:14px 18px;background:rgba(13,43,30,.04);border:1px dashed var(--line2);border-radius:4px;font-style:italic;margin-bottom:14px}
.val-nota{font-size:11px;color:var(--ink2);line-height:1.7;padding:14px 16px;background:var(--bg2);border-left:3px solid var(--em);margin-top:10px}
.alert{font-size:11px;line-height:1.65;padding:12px 14px;margin-bottom:14px;border-left:3px solid}
.alert.r{background:var(--rd-d);border-color:var(--rd);color:var(--rd)}
.alert.a{background:var(--am-d);border-color:var(--am);color:var(--am)}
.alert.g{background:var(--em-d);border-color:var(--em);color:var(--em)}
.alert.b{background:var(--bl-d);border-color:var(--bl);color:var(--bl)}
.tbl{width:100%;border-collapse:collapse;margin-bottom:4px}
.tbl th{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);padding:9px 7px;text-align:right;border-bottom:1px solid var(--line2)}
.tbl th:first-child{text-align:left}
.tbl td{padding:9px 7px;border-bottom:1px solid var(--line);font-size:11px;text-align:right;color:var(--ink)}
.tbl td:first-child{text-align:left;color:var(--ink2)}
.tbl tr.sub td{background:var(--bg2);font-weight:700;color:var(--ink);border-bottom:1px solid var(--line2)}
.tbl tr.tot td{background:var(--em-d);font-weight:700;color:var(--em);border-bottom:2px solid var(--em-l)}
/* hl (Fase 3.2.4): linha "base" em destaque (ex: Faturamento) — peso + bg sutil */
.tbl tr.hl td{background:#f0fdf4;font-weight:700;font-size:12px;color:var(--ink)}
.tbl tr.hl td:first-child{color:var(--ink)}
/* DRE: colunas alinhadas verticalmente entre os 5 blocos via table-layout fixed + colgroup */
.tbl.dre{table-layout:fixed}
.tbl.dre td,.tbl.dre th{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl.dre td:first-child{white-space:normal} /* label pode quebrar */
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot.g{background:var(--em)}.dot.a{background:var(--am)}.dot.r{background:var(--rd)}.dot.m{background:var(--ink4)}
.chip{display:inline-block;font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:10px;font-weight:500;margin-left:6px}
.chip.g{background:var(--em-d);color:var(--em)}.chip.a{background:var(--am-d);color:var(--am)}.chip.r{background:var(--rd-d);color:var(--rd)}.chip.m{background:rgba(13,43,30,.06);color:var(--ink4)}
.chip.b{background:var(--bl-d);color:var(--bl)}.chip.p{background:var(--pu-d);color:var(--pu)}
.diag-bloco{margin-bottom:18px}
.diag-bloco-title{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--em);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.diag-bloco-title::after{content:'';flex:1;height:1px;background:var(--em-l)}
.ise-hero{display:flex;align-items:center;gap:20px;padding:18px;background:var(--em-d);border:1px solid var(--em-l);margin-bottom:16px}
.ise-score{font-family:'Syne',sans-serif;font-weight:800;font-size:56px;color:var(--em);line-height:1;letter-spacing:-.03em}
.ise-class{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.ise-class-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--em)}
.ise-desc{font-size:10px;color:var(--ink3);margin-top:5px;line-height:1.55;max-width:280px}
.pilar{margin-bottom:14px}
.pilar-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.pilar-nome{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);width:140px;flex-shrink:0}
.pilar-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pilar-fill{height:100%;border-radius:3px}
.pilar-fill.g{background:var(--em)}.pilar-fill.a{background:var(--am)}.pilar-fill.r{background:var(--rd)}
.pilar-val{font-size:10px;width:46px;text-align:right;flex-shrink:0;font-weight:500}
.pilar-val.g{color:var(--em)}.pilar-val.a{color:var(--am)}.pilar-val.r{color:var(--rd)}
.pilar-meta{font-size:9px;color:var(--ink4);padding-left:150px;margin-bottom:6px}
.submet-list{padding-left:150px;margin-top:6px}
.submet{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;color:var(--ink3);padding:4px 0;border-bottom:1px dashed var(--line)}
.submet:last-child{border:none}
.submet-l{flex:1}
.submet-v{font-family:'DM Mono',monospace;color:var(--ink2);white-space:nowrap}
.submet-v.g{color:var(--em)}.submet-v.a{color:var(--am)}.submet-v.r{color:var(--rd)}
.atr-hero{background:var(--bg1);border:1px solid var(--line2);padding:18px;margin-bottom:16px}
.atr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.atr-score{font-family:'Syne',sans-serif;font-weight:800;font-size:40px;color:var(--em);line-height:1}
.atr-denom{font-size:14px;color:var(--ink3)}
.atr-badge{font-size:8px;letter-spacing:.1em;text-transform:uppercase;background:var(--em);color:#fff;padding:5px 12px;font-weight:700}
.atr-bar-wrap{height:4px;background:var(--line2);margin-bottom:14px;overflow:hidden}
.atr-bar{height:100%;background:var(--em)}
.atr-comp{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.atr-comp:last-child{border:none}
.atr-comp-nome{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);width:140px;flex-shrink:0}
.atr-comp-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.atr-comp-fill{height:100%;border-radius:2px;background:var(--em)}
.atr-comp-val{font-size:10px;color:var(--em);width:60px;text-align:right;flex-shrink:0}
.up-card{background:var(--bg1);border:1px solid var(--line2);border-left:3px solid var(--em);padding:15px 17px;margin-bottom:9px}
/* Categorias técnicas v2026.07 */
.up-card.cat-ro{border-left-color:var(--em)}
.up-card.cat-passivo{border-left-color:var(--rd)}
.up-card.cat-multiplo{border-left-color:var(--bl)}
.up-card.cat-qualitativo{border-left-color:var(--pu)}
.up-card.cat-paywall{border-left-color:var(--ink4)}
.up-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:7px}
.up-header-l{flex:1}
.up-num{display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--em-d);border:1px solid var(--em-l);text-align:center;font-size:9px;color:var(--em);font-weight:700;line-height:18px;margin-right:6px;vertical-align:middle}
.up-cat{display:inline-block;font-size:8px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-right:6px;padding:2px 7px;border-radius:3px}
.up-cat.cat-ro{background:var(--em-d);color:var(--em)}
.up-cat.cat-passivo{background:var(--rd-d);color:var(--rd)}
.up-cat.cat-multiplo{background:var(--bl-d);color:var(--bl)}
.up-cat.cat-qualitativo{background:var(--pu-d);color:var(--pu)}
.up-cat.cat-paywall{background:rgba(74,124,92,0.12);color:var(--ink4)}
/* Bloco lateral direito: valor R$ + % bruto + notinha (T1 do refactor laudo-pago) */
.up-valor-block{text-align:right;min-width:140px;flex-shrink:0;font-family:'DM Mono',monospace}
.up-valor-block .v-brl{font-size:15px;color:var(--em);font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
.up-valor-block .v-pct{font-size:11px;color:var(--ink4);margin-top:2px}
.up-valor-block .v-qual{font-size:11px;color:var(--ink4);font-style:italic}
.up-valor-block .v-nota{font-size:10px;color:var(--ink4);font-style:italic;margin-top:6px;line-height:1.4;max-width:180px;white-space:normal}
.up-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--ink);line-height:1.3;margin-top:4px}
.up-sub{font-size:10px;color:var(--ink4);margin-top:3px;line-height:1.4}
.up-desc{font-size:11px;color:var(--ink2);line-height:1.7;margin:8px 0}
.up-impacto{display:inline-block;font-size:10px;letter-spacing:.04em;color:var(--em);background:var(--em-d);border:1px solid var(--em-l);padding:4px 10px;font-weight:600;white-space:nowrap}
.up-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:9px;color:var(--ink4);letter-spacing:.04em}
.up-meta span{display:inline-flex;align-items:center;gap:4px}
.up-meta span::before{content:'·';color:var(--line2);margin-right:4px}
.up-meta span:first-child::before{display:none}
.up-cta{margin-top:10px;padding:10px 12px;background:var(--pu-d);border:1px solid var(--pu-l);font-size:10px;color:var(--pu);letter-spacing:.04em}
.op-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line2);border:1px solid var(--line2);margin-top:6px}
.op-cell{background:var(--bg1);padding:13px 16px;display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.op-cell-l{font-size:10px;color:var(--ink4);letter-spacing:.04em}
.op-cell-v{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--ink);text-align:right}
.kpi-mini{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--line2);border:1px solid var(--line2);margin-bottom:14px}
.kpi-mini-card{background:var(--bg1);padding:14px 16px}
.kpi-mini-l{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px}
/* anual em destaque (Fase 3.2.3): font-size maior, peso 800, line-height apertado */
.kpi-mini-v{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--ink);line-height:1.1;letter-spacing:-.02em}
.kpi-mini-v.g{color:var(--em)}.kpi-mini-v.a{color:var(--am)}.kpi-mini-v.r{color:var(--rd)}
/* mensal pequeno embaixo */
.kpi-mini-sub{font-size:11px;color:var(--ink4);margin-top:4px;font-family:'DM Mono',monospace}
/* ind-kpi: variante compacta horizontal pra sumário de indicadores caber em 1 linha */
.ind-kpi{display:flex;align-items:stretch;gap:1px;background:var(--line2);border:1px solid var(--line2);margin-bottom:14px;overflow:hidden}
.ind-kpi-card{flex:1;min-width:0;background:var(--bg1);padding:8px 10px;display:flex;flex-direction:column;justify-content:center;text-align:left}
.ind-kpi-l{font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ind-kpi-v{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--ink);line-height:1}
.ind-kpi-v.g{color:var(--em)}.ind-kpi-v.a{color:var(--am)}.ind-kpi-v.r{color:var(--rd)}
.compare-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-top:8px}
.compare-col{background:var(--bg1);border:1px solid var(--line2);padding:13px 14px}
.compare-col.recomendado{border-color:var(--em);background:var(--em-d)}
.compare-col[data-inelegivel="true"]{opacity:.55}
.compare-title{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;color:var(--ink);margin-bottom:5px;letter-spacing:-.01em}
.compare-total{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--ink);line-height:1;margin:6px 0 8px}
.compare-row{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;color:var(--ink3);padding:3px 0;border-bottom:1px solid var(--line)}
.compare-row:last-child{border:none}
.compare-row span:last-child{font-family:'DM Mono',monospace;color:var(--ink)}
.compare-motivo{font-size:9px;color:var(--rd);font-style:italic;margin-top:5px;line-height:1.4}
.hero-3{background:linear-gradient(135deg,var(--em-d),var(--bg1));border:1px solid var(--em-l);padding:22px 24px;margin-bottom:18px}
.hero-3-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
// Toggle dark/light — D-1 do mapeamento. Default light (impressão).
// Estado em memória (sem localStorage por design — briefing global).
function toggleTheme() {
  const root = document.documentElement;
  const atual = root.getAttribute('data-theme');
  const novo = atual === 'dark' ? 'light' : 'dark';
  if (novo === 'light') root.removeAttribute('data-theme');
  else root.setAttribute('data-theme', novo);
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.textContent = novo === 'dark' ? '☀ CLARO' : '☾ ESCURO';
}

const SUPABASE_URL = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';
let calcJson = null;

// ─── HELPERS ────────────────────────────────────────────────────────────────
const n = v => Number(v) || 0;
const fc = v => 'R$ ' + Math.round(n(v)).toLocaleString('pt-BR');
const fcShort = v => {
  const num = n(v);
  if (Math.abs(num) >= 1000000) return 'R$ ' + (num/1000000).toFixed(1).replace('.', ',') + 'M';
  if (Math.abs(num) >= 1000) return 'R$ ' + Math.round(num/1000) + 'k';
  return 'R$ ' + Math.round(num).toLocaleString('pt-BR');
};
const escapeHtml = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const hoje = () => new Date().toLocaleDateString('pt-BR');

function statusCor(status) {
  switch(status) {
    case 'no_alvo': return 'g';
    case 'atencao': return 'a';
    case 'abaixo':  return 'r';
    case 'neutro':  return 'm';
    default:        return 'm';
  }
}
function statusLabel(status) {
  // Labels visíveis (Fase 3.2.3) — id interno (no_alvo/atencao/abaixo/neutro) preservado no JSON
  switch(status) {
    case 'no_alvo': return 'Bom';
    case 'atencao': return 'Atenção';
    case 'abaixo':  return 'Crítico';
    case 'neutro':  return 'N/A';
    default:        return '—';
  }
}
function pilarCor(score10) {
  if (score10 >= 7) return 'g';
  if (score10 >= 5) return 'a';
  return 'r';
}
function fmtIndValor(item) {
  const v = n(item.valor);
  if (item.unidade === '%')    return v.toFixed(1) + '%';
  if (item.unidade === 'dias') return v.toFixed(0) + ' dias';
  if (item.unidade === 'unid') return v.toFixed(0);
  if (item.unidade === 'R$')   return fcShort(v);
  return v.toFixed(2);
}
// Parser markdown enxuto pra textos da Edge Function (#, ##, **, listas, parágrafos)
function markdownSimples(texto) {
  if (!texto) return '';
  let s = String(texto);
  // Escapa HTML primeiro pra não vazar tags do conteúdo do modelo
  s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Negrito **texto** → <strong>
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // Headers ## → h3, # → h3 (evita h1 dentro do laudo)
  s = s.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  s = s.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^# (.+)$/gm, '<h3>$1</h3>');
  // Listas (- ou *)
  s = s.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  // Agrupa <li> consecutivos em <ul>
  s = s.replace(/(<li>[\s\S]*?<\/li>(?:\s*<li>[\s\S]*?<\/li>)*)/g, '<ul>$1</ul>');
  // Parágrafos: linhas em branco viram quebras de parágrafo
  // Quebra em blocos por 2+ \n
  const blocos = s.split(/\n{2,}/);
  s = blocos.map(b => {
    const t = b.trim();
    if (!t) return '';
    // Se já é tag de bloco (h3/h4/ul), retorna direto
    if (/^<(h[1-6]|ul|ol|li|p|div)/i.test(t)) return t;
    // Senão, envolve em <p>
    return '<p>' + t.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return s;
}

function fmtIndBench(item) {
  if (item.benchmark == null) return '—';
  const b = n(item.benchmark);
  if (item.unidade === '%')    return b.toFixed(1) + '%';
  if (item.unidade === 'dias') return b.toFixed(0) + ' dias';
  if (item.unidade === 'unid') return b.toFixed(0);
  if (item.unidade === 'R$')   return fcShort(b);
  return b.toFixed(2);
}

// ─── LOADING ────────────────────────────────────────────────────────────────
let ldStep = 0;
const ldMsgs = ['Carregando dados...','Lendo análise da skill...','Montando DRE...','Calculando ISE...','Aplicando benchmarks...','Identificando upsides...','Preparando laudo...'];
function animLD() {
  const bar = document.getElementById('ld-bar');
  const msg = document.getElementById('ld-msg');
  if (ldStep < ldMsgs.length) {
    if (msg) msg.textContent = ldMsgs[ldStep];
    if (bar) bar.style.width = ((ldStep+1)/ldMsgs.length*85)+'%';
    ldStep++;
    setTimeout(animLD, 600);
  }
}
function hideLoading() {
  const bar = document.getElementById('ld-bar');
  if (bar) bar.style.width = '100%';
  setTimeout(() => {
    const ld  = document.getElementById('loading');
    const w   = document.getElementById('wrap');
    const btn = document.getElementById('btn-pdf');
    if (ld) ld.classList.add('hide');
    if (w)  w.classList.add('show');
    if (btn) btn.style.display = 'block';
  }, 400);
}


// ─── FETCH ──────────────────────────────────────────────────────────────────
async function resolverNegocioId(parametro) {
  if (parametro.match(/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i)) return parametro;
  const tryUrl = async (qs) => {
    const r = await fetch(SUPABASE_URL + '/rest/v1/negocios?' + qs, { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } });
    const d = await r.json();
    return d && d[0] ? d[0].id : null;
  };
  return await tryUrl('slug=eq.' + parametro + '&select=id') || await tryUrl('codigo_diagnostico=eq.' + parametro + '&select=id');
}

async function fetchLaudoV2(negocioId) {
  const url = SUPABASE_URL + '/rest/v1/laudos_v2?negocio_id=eq.' + negocioId + '&ativo=eq.true&select=calc_json,versao,criado_em';
  const r = await fetch(url, { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  return data && data.length > 0 ? data[0].calc_json : null;
}

// ─── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  animLD();
  const params = new URLSearchParams(window.location.search);

  if (params.get('demo') === 'true' || params.get('id') === 'demo') {
    // Modo demo desabilitado nesta versão (laudo-pago lê só calc_json v2 real).
    document.getElementById('ld-msg').textContent = 'Modo demo desabilitado. Use ?id=<UUID> com um laudo v2 real.';
    return;
  } else {
    const param = params.get('id') || params.get('c') || params.get('slug');
    if (!param) {
      document.getElementById('ld-msg').textContent = 'Parâmetro ?id=, ?c= ou ?slug= não fornecido (ou use ?demo=true).';
      return;
    }
    try {
      const negocioId = await resolverNegocioId(param);
      if (!negocioId) {
        document.getElementById('ld-msg').textContent = 'Negócio não encontrado: ' + param;
        return;
      }
      calcJson = await fetchLaudoV2(negocioId);
      if (!calcJson) {
        document.getElementById('ld-msg').textContent = 'Laudo v2 ainda não foi gerado para este negócio.';
        return;
      }
    } catch (e) {
      console.error(e);
      document.getElementById('ld-msg').textContent = 'Erro ao carregar laudo: ' + e.message;
      return;
    }
  }

  renderTudo();
  hideLoading();
}

window.addEventListener('DOMContentLoaded', init);

// ─── ORQUESTRADOR ───────────────────────────────────────────────────────────
// 15 seções numeradas conforme índice (não conta capa, folha de rosto, índice e fechamento).
function renderTudo() {
  if (!calcJson) return;
  const doc = document.getElementById('doc');

  // Ordem nova (revisão pós-validação): 10 principais + 3 anexos
  // Capa não tem número. Numeração 2 dígitos (01..10). Anexos A1/A2/A3.
  const blocks = [
    renderCapa(),                                                                                             // Capa (sem número)
    renderApresentacao(),                                                                                     // 01 Apresentação
    renderIndice(),                                                                                           // 02 Sumário
    renderMetodologia(),                                                                                      // 03 Metodologia

    renderDRE(),                                                                                              // 05 Os Números — DRE
    renderBalanco(),                                                                                          //    Os Números — BP (mesma seção visual)
    renderISE(),                                                                                              // 06 A Gestão (ISE)
    renderIndicadores(),                                                                                      // 07 Indicadores X Mercado

    renderUpsides(),                                                                                          // 09 Oportunidades
    renderFechamento(),                                                                                       // 10 Próximos passos
    // ── ANEXOS ──
    renderTeaser(),                                                                                           // A1
    renderPontosFortesAtencao(),                                                                              // A2
    renderEstudoTributarioDetalhado(),                                                                        // A3
    // REMOVIDOS: renderHeroResumo (Resumo Executivo — duplicava cards),
    //            renderTextoIA('publico_alvo_comprador') (não pedido como principal),
    //            renderAtratividade, renderTributaria do meio, renderOperacional
  ];

  doc.innerHTML = blocks.filter(Boolean).join('');
  // Inicializa Chart.js após o HTML estar no DOM (radar do ISE)
  if (typeof initChartsAfterRender === 'function') initChartsAfterRender();
}

// ─── CAPA (Fase 3.2.4) ──────────────────────────────────────────────────────
// Logo só no cabeçalho. Nome do negócio à ESQUERDA. Sem subtítulo do setor.
// Rodapé com encomenda + código no canto inferior esquerdo.

// ─── FOLHA DE ROSTO (Fase 3.2.4) ────────────────────────────────────────────
// "Apresentação" como eyebrow simples (não título). Texto com elementos
// auditáveis em destaque (data, nomes, versões).
function renderFolhaRosto() {
  const id = calcJson.identificacao || {};
  const responsavel = escapeHtml(id.nome_responsavel || '—');
  const negocio = escapeHtml(id.nome || '—');
  const data = hoje();
  const skillVer = escapeHtml(calcJson._skill_versao || '2.0');
  const benchVer = escapeHtml(calcJson._versao_parametros || '—');

  return ''
    + '<section class="intro">'
    + '  <div class="intro-top">'
    + '    <div class="intro-eyebrow">Apresentação</div>'
    + '    <div class="intro-texto">Este laudo apresenta uma análise do negócio <strong>' + negocio + '</strong>, encomendada por <strong>' + responsavel + '</strong> em <strong>' + data + '</strong>.</div>'
    + '    <div class="intro-texto">O diagnóstico estruturado foi preenchido por <strong>' + responsavel + '</strong> e processado pela <strong>skill avaliadora 1N versão ' + skillVer + '</strong>, usando <strong>benchmarks setoriais versão ' + benchVer + '</strong>.</div>'
    + '    <div class="intro-texto">Este documento foi desenvolvido para apoiar decisões sobre o futuro da operação: precificação, prioridades de melhoria, validação do regime tributário e planejamento estratégico.</div>'
    + '    <div class="intro-texto">Este laudo é confidencial e destinado ao solicitante.</div>'
    + '  </div>'
    + '  <div class="intro-rodape">'
    + '    <div>Gerado em <strong>' + data + '</strong></div>'
    + '    <div>Metodologia <strong>1N ' + escapeHtml(calcJson._versao_calc_json || '2.0') + '</strong> · skill <strong>' + skillVer + '</strong> · benchmarks <strong>' + benchVer + '</strong></div>'
    + '  </div>'

// ─── GRÁFICO 1: barra avaliação → potencial (SVG inline) ────────────────────
// Mostra: |======= avaliação atual =======|------ delta upsides ------|
//                              ↑ R$ atual                  ↑ R$ potencial
function chartProgressao(avaliacao, potencial) {
  const delta = Math.max(0, potencial - avaliacao);
  const total = potencial > 0 ? potencial : 1;
  const pctAtual = (avaliacao / total) * 100;
  const pctDelta = (delta / total) * 100;
  const W = 600, H = 28; // viewBox base
  const barAtual = (pctAtual / 100) * W;
  const barDelta = (pctDelta / 100) * W;

  // Cores: var(--em) verde 1N atual / var(--am) âmbar delta / var(--ink) topo
  return ''
    + '<div class="chart-bar">'
    + '  <div class="chart-bar-head"><span>Avaliação atual</span><span>Potencial em 12 meses</span></div>'
    + '  <svg class="chart-bar-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" role="img" aria-label="Barra de progressão da avaliação atual ao potencial em 12 meses">'
    + '    <rect x="0" y="6" width="' + W + '" height="' + (H - 12) + '" fill="rgba(13,43,30,0.06)"/>'
    + '    <rect x="0" y="6" width="' + barAtual.toFixed(1) + '" height="' + (H - 12) + '" fill="#1a7a4a"/>'
    + '    <rect x="' + barAtual.toFixed(1) + '" y="6" width="' + barDelta.toFixed(1) + '" height="' + (H - 12) + '" fill="#92470a" fill-opacity="0.78"/>'
    // Marcador no topo do limite atual (linha vertical fina)
    + '    <line x1="' + barAtual.toFixed(1) + '" y1="2" x2="' + barAtual.toFixed(1) + '" y2="' + (H - 2) + '" stroke="#0d2b1e" stroke-width="1.2"/>'
    + '  </svg>'
    + '  <div class="chart-bar-legend">'
    + '    <div class="chart-bar-legend-item">'
    + '      <div class="chart-bar-legend-label"><span class="chart-bar-legend-dot" style="background:#1a7a4a"></span>Avaliação 1N</div>'
    + '      <div class="chart-bar-legend-val">' + fcShort(avaliacao) + '</div>'
    + '    </div>'
    + '    <div class="chart-bar-legend-item">'
    + '      <div class="chart-bar-legend-label"><span class="chart-bar-legend-dot" style="background:#92470a;opacity:.78"></span>Ganho potencial</div>'
    + '      <div class="chart-bar-legend-val">+ ' + fcShort(delta) + '</div>'
    + '    </div>'
    + '    <div class="chart-bar-legend-item" style="align-items:flex-end">'
    + '      <div class="chart-bar-legend-label"><span class="chart-bar-legend-dot" style="background:#0d2b1e"></span>Total potencial</div>'
    + '      <div class="chart-bar-legend-val">' + fcShort(potencial) + '</div>'
    + '    </div>'
    + '  </div>'
    + '</div>';
}

// ─── GRÁFICO 2: funil DRE (SVG inline) ──────────────────────────────────────
// Top-down: Faturamento (100%) → Receita líq → Lucro bruto → Após pessoal →
// Após ocupação → RO. Cada bloco estreita proporcional ao % do faturamento.
// Linhas pontilhadas entre blocos com a categoria de custo deduzida.
function chartFunilDRE(dre) {
  const fat = n(dre.fat_mensal);
  if (fat <= 0) return '';
  const ded = dre.deducoes_receita || {};
  const pess = dre.pessoal || {};
  const ocp  = dre.ocupacao || {};
  const op   = dre.operacional_outros || {};

  const recLiq = n(dre.rec_liquida_mensal || dre.rec_liquida);
  const lb     = n(dre.lucro_bruto_mensal || dre.lucro_bruto);
  const aposPessoal  = lb - n(pess.folha_total_mensal || pess.folha_total);
  const aposOcupacao = aposPessoal - n(ocp.total_mensal || ocp.total);
  const ro = n(dre.ro_mensal); // = aposOcupacao - operacional_outros

  // Steps: label, valor, % do fat, custo deduzido entre o anterior
  const steps = [
    { label: 'Faturamento bruto',           valor: fat,           deduz: null },
    { label: 'Receita líquida',             valor: recLiq,        deduz: 'Deduções: ' + fcShort(n(ded.total_mensal || ded.total_deducoes)) },
    { label: 'Lucro bruto',                 valor: lb,            deduz: n(dre.cmv) > 0 ? 'CMV: ' + fcShort(dre.cmv) : null },
    { label: 'Após pessoal',                valor: aposPessoal,   deduz: 'Pessoal: ' + fcShort(n(pess.folha_total_mensal || pess.folha_total)) },
    { label: 'Após ocupação',               valor: aposOcupacao,  deduz: 'Ocupação: ' + fcShort(n(ocp.total_mensal || ocp.total)) },
    { label: 'Resultado operacional',       valor: ro,            deduz: 'Operacional outros: ' + fcShort(n(op.total_mensal || op.total)), final: true },
  ];

  const W = 600;
  const STEP_H = 50;        // altura visual de cada bloco (Fase 3.2.4: +6 pra respirar)
  const GAP = 34;           // gap entre blocos: faixa pontilhada não invade vizinhos
  const N = steps.length;
  const H = N * STEP_H + (N - 1) * GAP;
  const cx = W / 2;

  // Paleta de fundos por step (Fase 3.2.4: cores fixas, sem opacity decay)
  // 0: ink escuro (faturamento, base) — texto branco
  // 1-4: gradiente verde de claro→médio (intermediários) — texto branco em todos
  // 5 (final): âmbar sólido — texto branco
  const FUNNEL_FILLS = ['#0d2b1e', '#1a7a4a', '#2d6644', '#1f4a32', '#1a5238', '#92470a'];

  let svg = '<svg class="chart-funnel-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Funil da DRE — Faturamento até Resultado Operacional">';
  let y = 0;
  steps.forEach((s, i) => {
    const pct = fat > 0 ? Math.max(0, (s.valor / fat) * 100) : 0;
    // largura proporcional ao %, mín 22% pra os labels caberem
    const width = Math.max(W * 0.22, (pct / 100) * W);
    const x = cx - width / 2;
    const fill = s.final ? FUNNEL_FILLS[5] : FUNNEL_FILLS[Math.min(i, 4)];
    svg += '<rect x="' + x.toFixed(1) + '" y="' + y + '" width="' + width.toFixed(1) + '" height="' + STEP_H + '" fill="' + fill + '" rx="3"/>';
    // Texto sempre branco — todos os blocos têm fundo escuro o suficiente
    svg += '<text class="step-label" x="' + cx + '" y="' + (y + STEP_H / 2 - 3) + '" text-anchor="middle" fill="#ffffff">' + escapeHtml(s.label) + '</text>';
    svg += '<text class="step-val" x="' + cx + '" y="' + (y + STEP_H / 2 + 14) + '" text-anchor="middle" fill="#ffffff">' + fcShort(s.valor) + ' · ' + pct.toFixed(0) + '%</text>';
    // Linha pontilhada + label da dedução no espaço entre blocos (centralizada no GAP)
    if (i < N - 1 && steps[i + 1].deduz) {
      const ny = y + STEP_H + GAP / 2;
      svg += '<line x1="' + (cx - 90) + '" y1="' + (ny - 6).toFixed(1) + '" x2="' + (cx + 90) + '" y2="' + (ny - 6).toFixed(1) + '" stroke="#92470a" stroke-width="1" stroke-dasharray="3,3" opacity="0.45"/>';
      svg += '<text class="step-deduz" x="' + cx + '" y="' + (ny + 5).toFixed(1) + '" text-anchor="middle">↓ ' + escapeHtml(steps[i + 1].deduz) + '</text>';
    }
    y += STEP_H + GAP;
  });
  svg += '</svg>';

  return ''
    + '<div class="chart-funnel">'
    + '  <div class="chart-funnel-head">Funil do resultado operacional · cada bloco estreita conforme o % do faturamento que sobra</div>'
    + svg
    + '</div>';
}

function renderDRE() {
  const dre = calcJson.dre || {};
  const ind = calcJson.indicadores_vs_benchmark || {};
  const fat = n(dre.fat_mensal);
  const ded = dre.deducoes_receita || {};
  const pess = dre.pessoal || {};
  const ocp  = dre.ocupacao || {};
  const op   = dre.operacional_outros || {};

  // KPIs (Fase 3.2.3): anual em destaque grande, mensal pequeno embaixo
  let kpis = '<div class="kpi-mini">'
    + '<div class="kpi-mini-card"><div class="kpi-mini-l">Faturamento</div><div class="kpi-mini-v">' + fcShort(dre.fat_anual) + '</div><div class="kpi-mini-sub">' + fcShort(fat) + ' / mês</div></div>'
    + '<div class="kpi-mini-card"><div class="kpi-mini-l">Resultado operacional</div><div class="kpi-mini-v">' + fcShort(dre.ro_anual) + '</div><div class="kpi-mini-sub">' + fcShort(dre.ro_mensal) + ' / mês</div></div>'
    + '<div class="kpi-mini-card"><div class="kpi-mini-l">Margem operacional</div><div class="kpi-mini-v ' + (n(dre.margem_operacional_pct) >= 15 ? 'g' : n(dre.margem_operacional_pct) >= 5 ? 'a' : 'r') + '">' + n(dre.margem_operacional_pct).toFixed(1) + '%</div></div>'
    + '</div>';

  // DRE enxuta — só Linha · Mensal · Anual · %fat. Comparativo benchmark
  // continua acessível na seção dedicada "Indicadores vs Benchmark".
  // O 3º parâmetro (indicador) é mantido por compatibilidade com chamadas existentes
  // mas não é usado aqui — DRE não exibe benchmark/delta.
  function rowDRE(label, valor, _indicadorIgnorado, opts) {
    opts = opts || {};
    const v = n(valor);
    if (!opts.always && v <= 0) return ''; // filtra zeradas
    const anual = v * 12;
    const pctFat = fat > 0 ? (v / fat) * 100 : 0;
    let trCls = '';
    if (opts.tot) trCls = ' class="tot"';
    else if (opts.sub) trCls = ' class="sub"';
    else if (opts.hl) trCls = ' class="hl"';  // Fase 3.2.4: destaque sutil pra base (Faturamento)
    return '<tr' + trCls + '>'
      + '<td>' + escapeHtml(label) + '</td>'
      + '<td>' + fc(v) + '</td>'
      + '<td>' + fc(anual) + '</td>'
      + '<td>' + pctFat.toFixed(1) + '%</td>'
      + '</tr>';
  }
  function tHead() {
    // 4 colunas: Linha · Mensal · Anual · %fat (40/22/22/16%).
    return '<table class="tbl dre">'
      + '<colgroup>'
      + '<col style="width:40%"><col style="width:22%"><col style="width:22%"><col style="width:16%">'
      + '</colgroup>'
      + '<thead><tr>'
      + '<th>Linha</th><th>Mensal</th><th>Anual</th><th>% fat</th>'
      + '</tr></thead><tbody>';
  }

  // Bloco 1
  let h = '';
  h += '<div class="diag-bloco"><div class="diag-bloco-title">Bloco 1 — Receita e deduções</div>';
  h += tHead();
  h += rowDRE('Faturamento', fat, null, { always: true, hl: true });
  h += rowDRE('(–) Impostos', ded.impostos_calculados_mensal);
  h += rowDRE('(–) Taxas de recebimento', ded.taxas_recebimento);
  h += rowDRE('(–) Comissões', ded.comissoes);
  h += rowDRE('(–) Royalty franquia', ded.royalty_pct_aplicado);
  h += rowDRE('(–) Mkt franquia', ded.mkt_franquia_pct_aplicado);
  h += rowDRE('Total deduções', ded.total_mensal, ind.deducoes_pct, { sub: true });
  h += '</tbody></table></div>';

  // Bloco 2
  h += '<div class="diag-bloco"><div class="diag-bloco-title">Bloco 2 — CMV e lucro bruto</div>';
  h += tHead();
  h += rowDRE('Receita líquida', dre.rec_liquida_mensal, null, { always: true });
  h += rowDRE('(–) CMV / custo direto', dre.cmv, ind.cmv_pct);
  h += rowDRE('Lucro bruto', dre.lucro_bruto_mensal, null, { always: true, tot: true });
  h += '</tbody></table></div>';

  // Bloco 3
  h += '<div class="diag-bloco"><div class="diag-bloco-title">Bloco 3 — Pessoal</div>';
  h += tHead();
  h += rowDRE('Folha CLT bruta', pess.clt_folha_bruta);
  h += rowDRE('Encargos CLT', pess.clt_encargos);
  h += rowDRE('PJ', pess.pj_custo);
  h += rowDRE('Royalty fixo', pess.royalty_fixo);
  h += rowDRE('Mkt franquia fixo', pess.mkt_franquia_fixo);
  h += rowDRE('Total pessoal', pess.folha_total_mensal, ind.folha_pct, { sub: true });
  h += '</tbody></table></div>';

  // Bloco 4
  h += '<div class="diag-bloco"><div class="diag-bloco-title">Bloco 4 — Ocupação</div>';
  h += tHead();
  h += rowDRE('Aluguel', ocp.aluguel, ind.aluguel_pct);
  h += rowDRE('Facilities', ocp.facilities);
  h += rowDRE('Terceirizados', ocp.terceirizados);
  h += rowDRE('Total ocupação', ocp.total_mensal, null, { sub: true });
  h += '</tbody></table></div>';

  // Bloco 5
  h += '<div class="diag-bloco"><div class="diag-bloco-title">Bloco 5 — Operacional outros</div>';
  h += tHead();
  h += rowDRE('Sistemas', op.sistemas);
  h += rowDRE('Outros custos fixos', op.outros_cf, ind.outros_cf_pct);
  h += rowDRE('Marketing pago', op.mkt_pago, ind.mkt_pct);
  h += rowDRE('Total operacional', op.total_mensal, null, { sub: true });
  h += rowDRE('= Resultado operacional', dre.ro_mensal, ind.margem_operacional, { always: true, tot: true });
  h += '</tbody></table></div>';

  return ''
    + '<section class="sec">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">05</div>'
    + '    <div><div class="sec-label">Os Números</div><div class="sec-title">DRE — Demonstrativo de Resultados</div></div>'
    + '  </div>'
    + '  <div class="sec-body">' + kpis + chartFunilDRE(dre) + h + '</div>'
    + '</section>';
}

    + '<div class="kpi-mini-card"><div class="kpi-mini-l">Total passivos</div><div class="kpi-mini-v a">' + fcShort(pa.total) + '</div></div>'
    + '<div class="kpi-mini-card"><div class="kpi-mini-l">Patrimônio líquido</div><div class="kpi-mini-v ' + (n(bal.patrimonio_liquido) < 0 ? 'r' : 'g') + '">' + fcShort(bal.patrimonio_liquido) + '</div></div>'
    + '</div>';

  function row(label, valor, opts) {
    opts = opts || {};
    const v = n(valor);
    if (!opts.always && v <= 0) return '';
    const trCls = opts.tot ? ' class="tot"' : opts.sub ? ' class="sub"' : '';
    return '<tr' + trCls + '><td>' + escapeHtml(label) + '</td><td>' + fc(v) + '</td></tr>';
  }
  function tHead() {
    return '<table class="tbl"><thead><tr><th>Linha</th><th>Valor</th></tr></thead><tbody>';
  }

  let h = '';
  h += '<div class="diag-bloco"><div class="diag-bloco-title">Ativos</div>';
  h += tHead();
  h += row('Caixa', at.caixa);
  h += row('Contas a receber', at.contas_receber);
  h += row('Estoque', at.estoque);
  h += row('Equipamentos', at.equipamentos);
  h += row('Imóvel', at.imovel);
  h += row('Ativo franquia', at.ativo_franquia);
  h += row('Outros', at.outros);
  h += row('Total ativos', at.total, { always: true, tot: true });
  h += '</tbody></table></div>';

  h += '<div class="diag-bloco"><div class="diag-bloco-title">Passivos</div>';
  h += tHead();
  h += row('Fornecedores a vencer', pa.fornecedores_a_vencer);
  h += row('Fornecedores atrasados', pa.fornecedores_atrasados);
  h += row('Impostos atrasados', pa.impostos_atrasados_sem_parcelamento);
  h += row('Empréstimos', pa.saldo_devedor_emprestimos);
  h += row('Provisão CLT (13º + férias)', prov.valor);
  if (n(prov.valor) > 0 && prov.formula) {
    h += '<tr><td colspan="2" style="font-size:9px;color:var(--ink4);font-style:italic;padding-left:18px">fórmula: ' + escapeHtml(prov.formula) + '</td></tr>';
  }
  h += row('Outros passivos', pa.outros_passivos);
  h += row('Total passivos', pa.total, { always: true, tot: true });
  h += '</tbody></table></div>';

  // NCG e ciclo
  h += '<div class="diag-bloco"><div class="diag-bloco-title">Capital de giro e ciclo financeiro</div>';
  h += tHead();
  if (ncg.valor != null) h += row('NCG (necessidade de capital de giro)', ncg.valor, { always: true });
  if (cic.pmr_dias != null) h += '<tr><td>PMR (prazo médio recebimento)</td><td>' + cic.pmr_dias + ' dias</td></tr>';
  if (cic.pmp_dias != null) h += '<tr><td>PMP (prazo médio pagamento)</td><td>' + cic.pmp_dias + ' dias</td></tr>';
  if (cic.ciclo_dias != null) h += '<tr><td>Ciclo financeiro</td><td>' + cic.ciclo_dias + ' dias</td></tr>';
  h += '</tbody></table></div>';

  return ''
    + '<section class="sec">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num"></div>'
    + '    <div><div class="sec-label">Os Números</div><div class="sec-title">Balanço Patrimonial</div></div>'
    + '  </div>'
    + '  <div class="sec-body">' + kpis + h + '</div>'
    + '</section>';
}

    : (ise.classe || '').toLowerCase().includes('consolid') ? 'Negócio em estado saudável. Vende em condições normais de mercado.'
    : (ise.classe || '').toLowerCase().includes('operacion') ? 'Operacional. Vendável com negociação de 10–20% de desconto.'

  h += chartRadarISE(pilares);

  pilares.forEach(p => {

      h += '<div class="submet-list">';

    + '</section>';

// ─── INDICADORES VS BENCHMARK ───────────────────────────────────────────────
// 18 indicadores em formato tabular, sumário por status no header.
function renderIndicadores() {
  const ind = calcJson.indicadores_vs_benchmark || {};
  const keys = Object.keys(ind).filter(k => !k.startsWith('_'));
  if (keys.length === 0) return '';

  // Override de status pra indicadores específicos:
  // - pmp_dias/pmr_dias: sem status (não há referência universal isolada)
  // - ciclo_financeiro_dias: regra local baseada em valor (a regra do skill é
  //   genérica menor_melhor; aqui aplicamos faixas de negócio)
  function overrideStatus(it, k) {
    if (k === 'pmp_dias' || k === 'pmr_dias') return null;  // sem status
    if (k === 'ciclo_financeiro_dias') {
      const v = n(it.valor);
      if (v <= 0)  return { chip: 'g', label: 'EXCELENTE' };
      if (v <= 30) return { chip: 'g', label: 'BOM' };
      if (v <= 60) return { chip: 'm', label: 'NORMAL' };
      return       { chip: 'a', label: 'ATENÇÃO' };
    }
    return undefined;  // não-overridden — usa it.status
  }

  // Sumário por status (respeitando override)
  const cont = { no_alvo: 0, atencao: 0, abaixo: 0, neutro: 0, sem_benchmark: 0 };
  keys.forEach(k => {
    const it = ind[k];
    if (!it) return;
    const ov = overrideStatus(it, k);
    if (ov === null) return;  // PMP/PMR não entram no sumário
    if (ov && typeof ov === 'object') {
      if (ov.chip === 'g')      cont.no_alvo++;
      else if (ov.chip === 'a') cont.atencao++;
      else                       cont.neutro++;
      return;
    }
    if (it.status && cont[it.status] !== undefined) cont[it.status]++;
    else cont.sem_benchmark++;
  });

  // Sumário compacto em 1 linha: cada card só com label + contador
  let kpis = '<div class="ind-kpi">'
    + '<div class="ind-kpi-card"><div class="ind-kpi-l">Bom</div><div class="ind-kpi-v g">' + cont.no_alvo + '</div></div>'
    + '<div class="ind-kpi-card"><div class="ind-kpi-l">Atenção</div><div class="ind-kpi-v a">' + cont.atencao + '</div></div>'
    + '<div class="ind-kpi-card"><div class="ind-kpi-l">Crítico</div><div class="ind-kpi-v r">' + cont.abaixo + '</div></div>';
  if (cont.neutro > 0)        kpis += '<div class="ind-kpi-card"><div class="ind-kpi-l">N/A</div><div class="ind-kpi-v">' + cont.neutro + '</div></div>';
  if (cont.sem_benchmark > 0) kpis += '<div class="ind-kpi-card"><div class="ind-kpi-l">Sem bench</div><div class="ind-kpi-v">' + cont.sem_benchmark + '</div></div>';
  kpis += '<div class="ind-kpi-card"><div class="ind-kpi-l">Total</div><div class="ind-kpi-v">' + keys.length + '</div></div>'
    + '</div>';

  let tbl = '<table class="tbl"><thead><tr>'
    + '<th>Indicador</th><th>Negócio</th><th>Média setor</th><th>Diferença</th><th>Status</th>'
    + '</tr></thead><tbody>';
  keys.forEach(k => {
    const it = ind[k];
    if (typeof it !== 'object' || it === null) return;
    const valorTxt = fmtIndValor(it);
    const benchTxt = it.benchmark != null ? fmtIndBench(it) : '<span style="color:var(--ink4)">—</span>';
    let deltaTxt = '<span style="color:var(--ink4)">—</span>';
    if (it.delta_pp != null) {
      const sign = n(it.delta_pp) >= 0 ? '+' : '';
      const sufx = it.unidade === '%' || it.unidade === 'dias' ? (it.unidade === '%' ? 'pp' : 'd') : '';
      deltaTxt = sign + n(it.delta_pp).toFixed(1) + sufx;
    }
    const ov = overrideStatus(it, k);
    let statusTxt;
    if (ov === null) {
      // PMP/PMR — célula vazia (— neutro)
      statusTxt = '<span style="color:var(--ink4)">—</span>';
    } else if (ov && typeof ov === 'object') {
      // Override (ciclo_financeiro_dias)
      statusTxt = '<span class="chip ' + ov.chip + '">' + ov.label + '</span>';
    } else if (it.status) {
      statusTxt = '<span class="chip ' + statusCor(it.status) + '">' + statusLabel(it.status) + '</span>';
    } else {
      statusTxt = '<span style="color:var(--ink4);font-size:9px">sem bench</span>';
    }
    tbl += '<tr>'
      + '<td>' + escapeHtml(it.label || k) + (it.observacao ? '<div style="font-size:9px;color:var(--ink4);font-style:italic;margin-top:2px">' + escapeHtml(it.observacao) + '</div>' : '') + '</td>'
      + '<td>' + valorTxt + '</td>'
      + '<td>' + benchTxt + '</td>'
      + '<td>' + deltaTxt + '</td>'
      + '<td>' + statusTxt + '</td>'
      + '</tr>';
  });
  tbl += '</tbody></table>';

  return ''
    + '<section class="sec">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">07</div>'
    + '    <div><div class="sec-label">Indicadores X Mercado</div><div class="sec-title">' + keys.length + ' indicadores vs benchmark setorial</div></div>'
    + '  </div>'
    + '  <div class="sec-body">' + kpis + tbl + '</div>'
    + '</section>';
}

// ─── ANÁLISE TRIBUTÁRIA ─────────────────────────────────────────────────────
function renderTributaria() {
  const at = calcJson.analise_tributaria || {};
  const comp = at.comparativo_regimes || [];
  if (comp.length === 0) return '';

  let h = '';

  // Banner de inelegibilidade do regime declarado
  if (at.alerta_inelegibilidade) {
    h += '<div class="alert r"><strong>⚠ Você declarou ' + escapeHtml((at.alerta_inelegibilidade.regime || '').toUpperCase()) + ' mas não é elegível.</strong> '
      + escapeHtml(at.alerta_inelegibilidade.motivo || '') + ' Risco de autuação fiscal — recomenda-se migração imediata.</div>';
  }

  // Resumo (toggle 3-way: inelegível → 'r' Crítico vermelho / atual=ótimo → 'g' verde / divergente → 'a' amarelo)
  const inelegivel = at.alerta_inelegibilidade
    && at.alerta_inelegibilidade.regime === at.regime_declarado;
  const sameRegime = at.regime_otimo_calculado === at.regime_declarado;
  const corRegimeAtual = inelegivel ? 'r' : '';
  const corRegimeIdeal = inelegivel ? 'r' : (sameRegime ? 'g' : 'a');
  h += '<div class="kpi-mini">';
  h += '<div class="kpi-mini-card"><div class="kpi-mini-l">Regime atual</div><div class="kpi-mini-v ' + corRegimeAtual + '">' + escapeHtml((at.regime_declarado || '—').toUpperCase()) + (at.anexo_simples ? ' · ' + at.anexo_simples : '') + '</div></div>';
  h += '<div class="kpi-mini-card"><div class="kpi-mini-l">Regime ideal</div><div class="kpi-mini-v ' + corRegimeIdeal + '">' + escapeHtml((at.regime_otimo_calculado || '—').toUpperCase()) + (at.regime_otimo_anexo ? ' · ' + at.regime_otimo_anexo : '') + '</div></div>';
  if (at.fator_r_calculado != null) {
    const cls = at.fator_r_calculado < 0.28 ? 'a' : 'g';
    h += '<div class="kpi-mini-card"><div class="kpi-mini-l">Fator R calculado</div><div class="kpi-mini-v ' + cls + '">' + (at.fator_r_calculado * 100).toFixed(2) + '%</div></div>';
  }
  const eco = at.economia_potencial || {};
  if (n(eco.economia_anual) > 0) {
    h += '<div class="kpi-mini-card"><div class="kpi-mini-l">Economia anual</div><div class="kpi-mini-v g">' + fcShort(eco.economia_anual) + '</div><div class="kpi-mini-sub">' + n(eco.economia_pct_do_ro).toFixed(1) + '% do RO</div></div>';
  }
  h += '</div>';

  // Texto explicativo
  if (n(eco.economia_anual) > 0) {
    h += '<div class="alert g"><strong>Oportunidade tributária:</strong> migrar para ' + escapeHtml((at.regime_otimo_calculado || '').toUpperCase())
      + ' pode gerar economia anual de ' + fcShort(eco.economia_anual) + ' (' + n(eco.economia_pct_do_ro).toFixed(1) + '% do RO). Recomenda-se validação com contador antes da migração.</div>';
  }
  // 4 cards comparativos
  h += '<div class="diag-bloco"><div class="diag-bloco-title">Comparativo entre regimes</div>';
  h += '<div class="compare-grid">';
  comp.forEach(r => {
    const isOtimo = r.regime === at.regime_otimo_calculado;
    const isAtual = r.regime === at.regime_declarado;
    const isInelegivel = r.elegivel === false;
    let chips = '';
    if (isAtual) chips += '<span class="chip g">atual</span>';
    if (isOtimo && !isInelegivel) chips += '<span class="chip a">ideal</span>';
    if (isInelegivel) chips += '<span class="chip r">inelegível</span>';
    const cardCls = (isOtimo && !isInelegivel) ? ' recomendado' : '';
    h += '<div class="compare-col' + cardCls + '"' + (isInelegivel ? ' data-inelegivel="true"' : '') + '>'
      + '<div class="compare-title">' + escapeHtml(r.regime.toUpperCase()) + (r.anexo ? ' · ' + r.anexo : '') + chips + '</div>'
      + '<div class="compare-total">' + fcShort(r.total_anual) + '</div>'
      + '<div class="compare-row"><span>Imposto</span><span>' + fcShort(r.imposto_anual) + '</span></div>'
      + '<div class="compare-row"><span>Encargo folha</span><span>' + fcShort(r.encargo_folha_anual) + '</span></div>'
      + '<div class="compare-row"><span>Alíq. efetiva</span><span>' + n(r.aliquota_efetiva_pct).toFixed(2) + '%</span></div>';
    if (isInelegivel && r.motivo_inelegibilidade) {
      h += '<div class="compare-motivo">⚠ ' + escapeHtml(r.motivo_inelegibilidade) + '</div>';
    }
    h += '</div>';
  });
  h += '</div></div>';

  return ''
    + '<section class="sec">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">7</div>'
    + '    <div><div class="sec-label">Análise tributária</div><div class="sec-title">4 regimes comparados · economia potencial</div></div>'
    + '  </div>'
    + '  <div class="sec-body">' + h + '</div>'
    + '</section>';
}

// ─── UPSIDES ────────────────────────────────────────────────────────────────
// 10 upsides distribuídos em 4 categorias (sem 'bloqueado'). Filtra defensivamente.
function renderUpsides() {
  // Schema v2026.07: calcJson.upsides = { ativos: [], paywalls: [] }.
  // Categorias técnicas: ro · passivo · multiplo · qualitativo · paywall.
  const upsObj = calcJson.upsides || {};
  const ativosTodos = Array.isArray(upsObj.ativos) ? upsObj.ativos : [];
  const paywalls = Array.isArray(upsObj.paywalls) ? upsObj.paywalls : [];
  // recomendacoes_pre_venda é GERADA PELA SKILL a partir dos qualitativos do
  // catálogo (skill linha ~2530), portanto duplica os qualitativos de
  // upsides.ativos. Não iterar — caso contrário cada qualitativo aparece 2×.

  if (ativosTodos.length === 0 && paywalls.length === 0) return '';

  // Lookup id → {brl, pct} via potencial_12m.upsides_ativos (filtrado: só monetários).
  const valorPorId = {};
  const upsP12 = (calcJson.potencial_12m && calcJson.potencial_12m.upsides_ativos) || [];
  upsP12.forEach(u => { valorPorId[u.id] = { brl: u.contribuicao_brl, pct: u.contribuicao_bruta_pct }; });

  // Separar ativos por tipo
  const monetarios = ativosTodos.filter(u => ['ro', 'passivo', 'multiplo'].includes(u.categoria));
  const qualitativos = ativosTodos.filter(u => u.categoria === 'qualitativo');

  // D-3: ordem por R$ decrescente dentro dos monetários
  monetarios.sort((a, b) => {
    const va = (valorPorId[a.id] && valorPorId[a.id].brl) || 0;
    const vb = (valorPorId[b.id] && valorPorId[b.id].brl) || 0;
    return vb - va;
  });

  const CAT_LABEL = {
    ro: 'Resultado Operacional',
    passivo: 'Redução de Passivos',
    multiplo: 'Aumento de Múltiplo',
    qualitativo: 'Qualitativo',
    paywall: 'Análise complementar', // D-2: cliente já pagou
  };

  // Helper de card individual
  const renderCard = (u, idx) => {
    const cat = u.categoria || 'qualitativo';
    const catLabel = CAT_LABEL[cat] || cat;
    let card = '<div class="up-card cat-' + escapeHtml(cat) + '">';
    card += '<div class="up-header" style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px">';
    // Coluna esquerda: numeração + pill + título + descrição
    card += '<div class="up-header-l" style="flex:1;min-width:0">';
    card += '<span class="up-num">' + (idx + 1) + '</span>';
    card += '<span class="up-cat cat-' + escapeHtml(cat) + '">' + escapeHtml(catLabel) + '</span>';
    card += '<div class="up-title">' + escapeHtml(u.label || u.id) + '</div>';
    if (u.descricao) card += '<div class="up-desc">' + escapeHtml(u.descricao) + '</div>';
    if (u.efeito_explicacao) card += '<div class="up-efeito" style="margin-top:8px;font-size:11px;color:var(--ink4);font-style:italic;line-height:1.5">' + escapeHtml(u.efeito_explicacao) + '</div>';
    card += '</div>';
    // Coluna direita: valor R$ + notinha OU status textual
    card += '<div class="up-valor-block">';
    if (cat === 'qualitativo') {
      card += '<div class="v-qual">Ação necessária — sem valor monetário direto</div>';
    } else {
      // ro/passivo/multiplo OU paywall (D-2: paywall revela R$ no laudo-pago)
      // Lookup direto na potencial_12m.upsides_ativos pra pegar campos novos
      // (ganho_mensal_caixa_brl, impacto_valuation_brl) com fallback ao mapa antigo.
      const u_p12 = upsP12.find(x => x.id === u.id);
      const v = valorPorId[u.id];
      if (v && v.brl != null) {
        card += '<div class="v-brl">' + fcShort(v.brl) + '</div>';
        card += '<div class="v-pct">' + (v.pct * 100).toFixed(2) + '% bruto</div>';
        // Se temos ganho_mensal_caixa_brl + impacto_valuation_brl, mostrar breakdown
        if (u_p12 && cat !== 'multiplo' && n(u_p12.ganho_mensal_caixa_brl) > 0) {
          card += '<div class="v-nota">+' + fcShort(u_p12.ganho_mensal_caixa_brl) + '/mês de caixa · +' + fcShort(u_p12.impacto_valuation_brl || v.brl) + ' no valor de venda</div>';
        } else {
          card += '<div class="v-nota">↑ ganho estimado no valor de venda do negócio se a ação for executada</div>';
        }
      } else {
        card += '<div class="v-qual">contribuição não calculada</div>';
      }
    }
    card += '</div>';
    card += '</div>';  // fecha .up-header
    card += '</div>';  // fecha .up-card
    return card;
  };

  let h = '';
  let idx = 0;

  // 1. Monetários (ordenados por R$ desc)
  if (monetarios.length > 0) {
    monetarios.forEach(u => { h += renderCard(u, idx++); });
  }

  // 2. Análise complementar (paywalls — D-2: revelar R$, copy renomeado)
  if (paywalls.length > 0) {
    h += '<div style="margin-top:18px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);font-weight:600">Análises complementares</div>';
    paywalls.forEach(u => { h += renderCard(u, idx++); });
  }

  // 3. Qualitativos / Pré-venda
  if (qualitativos.length > 0) {
    h += '<div style="margin-top:18px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);font-weight:600">Qualitativos · Pré-venda</div>';
    qualitativos.forEach(u => { h += renderCard(u, idx++); });
  }

  const total = monetarios.length + paywalls.length + qualitativos.length;

  const intro = '<p style="font-size:11.5px;color:var(--ink2);line-height:1.6;margin-bottom:18px;max-width:560px">'
    + 'Cada ação abaixo tem um valor R$ estimado de ganho no valor de venda do negócio se executada nos próximos 12 meses. '
    + 'As ações qualitativas não geram contribuição monetária direta, mas são pré-requisitos para destravar valor.'
    + '</p>';

  return ''
    + '<section class="sec">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">09</div>'
    + '    <div><div class="sec-label">Oportunidades de melhoria</div><div class="sec-title">' + total + ' ações para destravar valor</div></div>'
    + '  </div>'
    + '  <div class="sec-body">' + intro + h + '</div>'
    + '</section>';
}

// ─── OPERACIONAL ────────────────────────────────────────────────────────────
// 8 fields raw (faturamento, num funcionários, num clientes, tempo, num sócios,
// pró-labore total, concentração status).
function renderOperacional() {
  const op = calcJson.operacional || {};
  if (Object.keys(op).length === 0) return '';

  function cell(label, valor) {
    return '<div class="op-cell"><div class="op-cell-l">' + escapeHtml(label) + '</div><div class="op-cell-v">' + valor + '</div></div>';
  }

  let h = '<div class="op-grid">';
  if (op.fat_mensal != null) h += cell('Faturamento mensal', fcShort(op.fat_mensal));
  if (op.fat_anual != null)  h += cell('Faturamento anual',  fcShort(op.fat_anual));
  if (op.num_funcionarios != null) h += cell('Funcionários', op.num_funcionarios);
  if (op.num_clientes != null)     h += cell('Clientes ativos', op.num_clientes);
  if (op.tempo_operacao_anos != null) h += cell('Tempo de operação', op.tempo_operacao_anos + ' anos');
  if (op.num_socios != null)       h += cell('Sócios', op.num_socios);
  if (op.prolabore_mensal_total != null) h += cell('Pró-labore mensal total', fcShort(op.prolabore_mensal_total));
  if (op.concentracao_status) {
    const cls = statusCor(op.concentracao_status);
    h += cell('Concentração de cliente', '<span class="chip ' + cls + '" style="font-size:9px">' + statusLabel(op.concentracao_status) + '</span>');
  }
  h += '</div>';

  return ''
    + '<section class="sec">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">14</div>'
    + '    <div><div class="sec-label">Dados operacionais</div><div class="sec-title">Estrutura do negócio (dados crus)</div></div>'
    + '  </div>'
    + '  <div class="sec-body">' + h + '</div>'
    + '</section>';
}

// ─── FECHAMENTO ─────────────────────────────────────────────────────────────
function renderFechamento() {
  return ''
    + '<section class="fechamento page-break">'
    + '  <div>'
    + '    <div class="fech-eyebrow">Fim do laudo</div>'
    + '    <div class="fech-titulo">Próximos <em>passos</em></div>'
    + '    <div class="fech-texto">Este é o seu laudo aprofundado. Use-o para tomar decisões sobre o futuro do negócio: ajustar precificação, priorizar upsides, validar regime tributário e, quando fizer sentido, abrir um anúncio na 1Negócio.</div>'
    + '  </div>'
    + '  <div class="fech-rodape">'
    + '    <div class="fech-rod-l">1Negócio · Documento confidencial · ' + hoje() + '</div>'
    + '    <div class="fech-rod-r">' + escapeHtml(calcJson._versao_calc_json || '2.0') + ' · ' + escapeHtml(calcJson._versao_parametros || '—') + '</div>'
    + '  </div>'
    + '</section>';
}

// ─── APRESENTAÇÃO (NOVA — após Capa, antes do Sumário) ───────────────────────
function renderApresentacao() {
  const id = calcJson.identificacao || {};
  const nome = id.nome || '—';
  const solicitante = id.solicitante || id.nome_responsavel || '—';
  const dataAvalIso = calcJson._data_avaliacao || (id && id.data_avaliacao);
  const dataAval = dataAvalIso ? new Date(dataAvalIso).toLocaleDateString('pt-BR') : hoje();
  const versaoSkill = calcJson._versao_skill || calcJson._versao_calc_json || '2.0';
  const versaoParam = calcJson._versao_parametros || '—';
  return ''
    + '<section class="sec page-break apresentacao">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">01</div>'
    + '    <div><div class="sec-label">Apresentação</div><div class="sec-title">Sobre este laudo</div></div>'
    + '  </div>'
    + '  <div class="sec-body">'
    + '    <div class="txt">Este laudo apresenta uma análise aprofundada do negócio <strong>' + escapeHtml(nome) + '</strong>, encomendado por ' + escapeHtml(solicitante) + ' em ' + escapeHtml(dataAval) + '.</div>'
    + '    <div class="txt">O diagnóstico foi estruturado e processado pela 1N em sua versão <strong>' + escapeHtml(versaoSkill) + '</strong>, usando parâmetros e benchmarks setoriais versão <strong>' + escapeHtml(versaoParam) + '</strong>.</div>'
    + '    <div class="txt">Este documento foi elaborado para apoiar decisões sobre o futuro da operação: avaliação do negócio, prioridades de melhoria, validação do regime tributário e planejamento estratégico.</div>'
    + '    <div class="txt confidencial" style="margin-top:24px;font-size:11px;color:var(--ink4);font-style:italic">Este laudo é confidencial e destinado ao solicitante.</div>'
    + '  </div>'
    + '</section>';
}

// ─── METODOLOGIA (NOVA — explicar a abordagem) ───────────────────────────────
function renderMetodologia() {
  return ''
    + '<section class="sec page-break metodologia">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">02</div>'
    + '    <div><div class="sec-label">Metodologia</div><div class="sec-title">Como esta avaliação foi construída</div></div>'
    + '  </div>'
    + '  <div class="sec-body">'
    + '    <div class="txt">A avaliação 1Negócio combina três abordagens complementares: múltiplos de mercado setoriais, análise de resultado operacional ajustado e solidez operacional medida pelo ISE (Índice de Saúde Empresarial). O resultado é um valor de transação ancorado na realidade de M&A de PMEs brasileiras.</div>'
    + '    <ol class="met-lista" style="margin:14px 0 0;padding-left:18px;line-height:1.6">'
    + '      <li><strong>Resultado Operacional Ajustado:</strong> RO normalizado, removendo pró-labore acima do mercado, despesas não recorrentes e provisões excessivas. Representa a capacidade real de geração de caixa.</li>'
    + '      <li><strong>Múltiplo Base Setorial:</strong> referência de transações comparáveis no Brasil para o setor, refletindo risco, crescimento esperado e liquidez.</li>'
    + '      <li><strong>Fator ISE:</strong> ajuste pela solidez operacional. Empresas mais sólidas recebem múltiplo maior e condições de venda mais favoráveis.</li>'
    + '      <li><strong>Fator 1N = Múltiplo Setorial × Fator ISE</strong>, ajustado pela forma específica de atuação dentro do setor.</li>'
    + '      <li><strong>Valor de Venda = (RO Anual × Fator 1N) + Patrimônio Líquido.</strong> Inclui ativos tangíveis líquidos das dívidas — o valor "porteira fechada".</li>'
    + '    </ol>'
    + '  </div>'
    + '</section>';
}

// ─── EXTRA 1: Teaser one-page (anônimo) ──────────────────────────────────────
function renderTeaser() {
  const id = calcJson.identificacao || {};
  const v  = calcJson.valuation || {};
  const dre = calcJson.dre || {};
  const setorLbl = (id.setor && id.setor.label) || '—';
  const cidade = (id.localizacao && id.localizacao.cidade) || '';
  const estado = (id.localizacao && id.localizacao.estado) || '';
  const local = [cidade, estado].filter(Boolean).join('/') || '—';
  const fatAnual = n(dre.fat_anual);
  const faixa = (function(f){
    if (f < 500000) return 'até R$ 500k/ano';
    if (f < 1000000) return 'R$ 500k a R$ 1M/ano';
    if (f < 5000000) return 'R$ 1M a R$ 5M/ano';
    if (f < 10000000) return 'R$ 5M a R$ 10M/ano';
    return 'acima de R$ 10M/ano';
  })(fatAnual);

  const ups = (calcJson.potencial_12m && calcJson.potencial_12m.upsides_ativos) || [];
  const top3 = ups.slice().sort((a,b) => n(b.contribuicao_brl) - n(a.contribuicao_brl)).slice(0,3);
  let highlights = '';
  top3.forEach(u => {
    const valor = n(u.impacto_valuation_brl) || n(u.contribuicao_brl);
    highlights += '<li class="teaser-li"><strong>' + escapeHtml(u.label || u.id) + '</strong> · +' + fcShort(valor) + ' no valor de venda</li>';
  });

  return ''
    + '<section class="sec page-break extra teaser">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">A1</div>'
    + '    <div><div class="sec-label">Anexo · Teaser</div><div class="sec-title">Apresentação anônima · One-page</div></div>'
    + '  </div>'
    + '  <div class="sec-body">'
    + '    <div class="kpi-mini" style="margin-bottom:18px">'
    + '      <div class="kpi-mini-card"><div class="kpi-mini-l">Setor</div><div class="kpi-mini-v">' + escapeHtml(setorLbl) + '</div></div>'
    + '      <div class="kpi-mini-card"><div class="kpi-mini-l">Localização</div><div class="kpi-mini-v">' + escapeHtml(local) + '</div></div>'
    + '      <div class="kpi-mini-card"><div class="kpi-mini-l">Faturamento</div><div class="kpi-mini-v">' + escapeHtml(faixa) + '</div></div>'
    + '      <div class="kpi-mini-card"><div class="kpi-mini-l">Valor de venda</div><div class="kpi-mini-v g">' + fcShort(n(v.valor_venda)) + '</div></div>'
    + '    </div>'
    + (highlights ? '    <div class="diag-bloco"><div class="diag-bloco-title">Destaques</div><ul style="margin:8px 0 0;padding-left:18px;line-height:1.7">' + highlights + '</ul></div>' : '')
    + '    <div class="txt" style="margin-top:24px;color:var(--ink4);font-size:11px">Quer saber mais sobre este negócio? Acesse <strong>1negocio.com.br</strong></div>'
    + '  </div>'
    + '</section>';
}

// ─── EXTRA 2: Pontos Fortes + Pontos de Atenção ─────────────────────────────
function renderPontosFortesAtencao() {
  const tIA = calcJson.textos_ia || {};
  const fortes = (tIA.texto_diferenciais && tIA.texto_diferenciais.conteudo) || '';
  const atencao = (tIA.texto_riscos_atencao && tIA.texto_riscos_atencao.conteudo) || '';

  // Derivação adicional via pilares ISE (score >= 8 = forte; <= 4 = atenção)
  const pilares = (calcJson.ise && calcJson.ise.pilares) || [];
  const pFortes = pilares.filter(p => n(p.score_0_10) >= 8).map(p => p.label || p.id);
  const pAtencao = pilares.filter(p => n(p.score_0_10) <= 4).map(p => p.label || p.id);

  const fmtTexto = (s) => s ? '<div class="txt">' + escapeHtml(s).replace(/\n\n+/g, '</div><div class="txt">') + '</div>' : '<div class="txt-pendente">[Texto pendente]</div>';
  const listaPilares = (arr) => arr.length ? '<ul style="margin:8px 0 0;padding-left:18px;line-height:1.7">' + arr.map(l => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>' : '<div class="txt-pendente" style="font-size:11px;color:var(--ink4)">Nenhum pilar nessa faixa.</div>';

  return ''
    + '<section class="sec page-break extra">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">A2</div>'
    + '    <div><div class="sec-label">Anexo · Análise consolidada</div><div class="sec-title">Pontos Fortes e Pontos de Atenção</div></div>'
    + '  </div>'
    + '  <div class="sec-body">'
    + '    <div class="diag-bloco"><div class="diag-bloco-title">Pontos Fortes</div>' + fmtTexto(fortes) + '<div style="margin-top:12px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)">Pilares ISE com score ≥ 8</div>' + listaPilares(pFortes) + '</div>'
    + '    <div class="diag-bloco" style="margin-top:18px"><div class="diag-bloco-title">Pontos de Atenção</div>' + fmtTexto(atencao) + '<div style="margin-top:12px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)">Pilares ISE com score ≤ 4</div>' + listaPilares(pAtencao) + '</div>'
    + '  </div>'
    + '</section>';
}

// ─── 08 · A AVALIAÇÃO (Hero cards + Parecer Técnico) ─────────────────────────
// Junta cards "Avaliação 1N" + "Potencial 12m" (de renderHeroResumo) com texto
// IA do parecer técnico, numa única seção principal "08 · A Avaliação".
// Texto IA renderizado via markdownSimples (issue de markdown cru no PDF).
function renderAvaliacao() {
  const id = calcJson.identificacao || {};
  const v  = calcJson.valuation || {};
  const avaliacao = n(v.valor_venda);
  const p12 = (calcJson.potencial_12m && calcJson.potencial_12m.potencial_final) || {};
  const potencial = n(p12.valor_projetado_brl) > 0 ? n(p12.valor_projetado_brl) : avaliacao;

  const tIA = calcJson.textos_ia || {};
  const tParecer = tIA.texto_parecer_tecnico || {};
  const parecerHtml = tParecer.conteudo
    ? '<div class="txt-md">' + markdownSimples(tParecer.conteudo) + '</div>'
    : '<div class="txt-pendente">[Parecer pendente — em geração pela IA]</div>';

  return ''
    + '<section class="sec page-break avaliacao">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">08</div>'
    + '    <div><div class="sec-label">Valuation</div><div class="sec-title">A Avaliação · como chegamos a esse valor</div></div>'
    + '  </div>'
    + '  <div class="sec-body">'
    + '    <div class="hero-3">'
    + '      <div class="hero-3-head"><div>'
    + '        <div class="hero-3-eyebrow">' + escapeHtml(id.nome || '—') + '</div>'
    + '        <div class="hero-3-setor">' + escapeHtml((id.setor && id.setor.label) || '—') + '</div>'
    + '      </div></div>'
    + '      <div class="hero-3-grid hero-2-grid">'
    + '        <div class="hero-3-cell"><div class="hero-3-cell-l">Avaliação 1Negócio</div><div class="hero-3-cell-v g">' + fcShort(avaliacao) + '</div><div class="hero-3-cell-sub">RO × Fator 1N + PL</div></div>'
    + '        <div class="hero-3-cell"><div class="hero-3-cell-l">Potencial em 12 meses</div><div class="hero-3-cell-v g">' + fcShort(potencial) + '</div><div class="hero-3-cell-sub">com plano de upsides</div></div>'
    + '      </div>'
    + chartProgressao(avaliacao, potencial)
    + '    </div>'
    + '    <div style="margin-top:24px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);font-weight:600">Parecer Técnico</div>'
    + '    ' + parecerHtml
    + '  </div>'
    + '</section>';
}

// ─── EXTRA 3: Estudo Tributário Detalhado ───────────────────────────────────
function renderEstudoTributarioDetalhado() {
  // Reutiliza renderTributaria mas envelopa como anexo
  const tributariaHTML = renderTributaria();
  if (!tributariaHTML) return '';
  // Substitui o sec-num e label do bloco original pra A3
  return tributariaHTML
    .replace(/<div class="sec-num">7<\/div>/, '<div class="sec-num">A3</div>')
    .replace(/<div class="sec-label">Análise tributária<\/div>/, '<div class="sec-label">Anexo · Tributário detalhado</div>')
    .replace(/<section class="sec">/, '<section class="sec page-break extra">');
}
</script>
