  const dataAval = dataAvalIso ? new Date(dataAvalIso).toLocaleDateString('pt-BR') : hoje();

  const valorVenda = n(v.valor_venda);
  const roAnual = n(dre.ro_anual) || (n(dre.ro_mensal) * 12);
  const fator = n(v.fator_final || v.fator_1n);
  const pl = n(bal.patrimonio_liquido);
  const margem = n(dre.margem_operacional_pct);
  const iseTotal = n(ise.ise_total);

  // Fórmula visual
  const formula = '<div class="op-formula">'
    + '<div class="op-formula-box"><div class="op-formula-label">RO anual</div><div class="op-formula-val">' + fcShort(roAnual) + '</div></div>'
    + '<div class="op-formula-op">×</div>'
    + '<div class="op-formula-box"><div class="op-formula-label">Fator 1N</div><div class="op-formula-val">' + fator.toFixed(2).replace('.', ',') + '×</div></div>'
    + '<div class="op-formula-op">+</div>'
    + '<div class="op-formula-box"><div class="op-formula-label">Patrimônio</div><div class="op-formula-val">' + fcShort(pl) + '</div></div>'
    + '<div class="op-formula-op">=</div>'
    + '<div class="op-formula-box hl"><div class="op-formula-label">Valor</div><div class="op-formula-val">' + fcShort(valorVenda) + '</div></div>'
    + '</div>';

  // KPIs (6)
  const kpis = '<div class="op-kpis">'
    + '<div class="op-kpi"><div class="op-kpi-l">Faturamento anual</div><div class="op-kpi-v">' + fcShort(dre.fat_anual) + '</div></div>'
    + '<div class="op-kpi"><div class="op-kpi-l">Result. operacional anual</div><div class="op-kpi-v g">' + fcShort(roAnual) + '</div></div>'
    + '<div class="op-kpi"><div class="op-kpi-l">Margem operacional</div><div class="op-kpi-v ' + (margem >= 15 ? 'g' : margem >= 5 ? 'a' : 'r') + '">' + margem.toFixed(1) + '%</div></div>'
    + '<div class="op-kpi"><div class="op-kpi-l">ISE · Solidez</div><div class="op-kpi-v g">' + iseTotal.toFixed(0) + '/100</div><div class="op-kpi-sub">' + escapeHtml(ise.classe || '—') + '</div></div>'
    + '<div class="op-kpi"><div class="op-kpi-l">Fator 1N</div><div class="op-kpi-v">' + fator.toFixed(2).replace('.', ',') + '×</div></div>'
    + '<div class="op-kpi"><div class="op-kpi-l">Tempo de operação</div><div class="op-kpi-v">' + escapeHtml(tempoLabel || '—') + '</div></div>'
    + '</div>';

  // Bloco DRE Resumida
  const ded = dre.deducoes_receita || {};
  const pess = dre.pessoal || {};
  const ocp = dre.ocupacao || {};
  let dreBloco = '<div class="op-bloco"><div class="op-bloco-title">DRE Resumida</div>';
  dreBloco += '<div class="op-item"><div class="op-item-l">Faturamento</div><div class="op-item-v">' + fcShort(dre.fat_mensal) + '/mês</div></div>';
  if (n(ded.impostos_calculados_mensal) > 0) dreBloco += '<div class="op-item"><div class="op-item-l">(−) Impostos</div><div class="op-item-v">' + fcShort(ded.impostos_calculados_mensal) + '</div></div>';
  if (n(dre.cmv) > 0) dreBloco += '<div class="op-item"><div class="op-item-l">(−) CMV</div><div class="op-item-v a">' + fcShort(dre.cmv) + '</div></div>';
  if (n(pess.folha_total_mensal) > 0) dreBloco += '<div class="op-item"><div class="op-item-l">(−) Pessoal</div><div class="op-item-v">' + fcShort(pess.folha_total_mensal) + '</div></div>';
  if (n(ocp.aluguel) > 0) dreBloco += '<div class="op-item"><div class="op-item-l">(−) Aluguel</div><div class="op-item-v">' + fcShort(ocp.aluguel) + '</div></div>';
  dreBloco += '<div class="op-item"><div class="op-item-l">Result. operacional</div><div class="op-item-v g">' + fcShort(dre.ro_mensal) + '</div></div>';
  dreBloco += '</div>';

  // Bloco Operação
  const headcount = (pess.headcount_total) || id.num_funcionarios || '—';
  const regime = at.regime_declarado ? at.regime_declarado.toUpperCase() : '—';
  const opBloco = '<div class="op-bloco"><div class="op-bloco-title">Operação</div>'
    + '<div class="op-item"><div class="op-item-l">Setor</div><div class="op-item-v">' + escapeHtml(setorLbl) + '</div></div>'
    + '<div class="op-item"><div class="op-item-l">Localização</div><div class="op-item-v">' + escapeHtml(local) + '</div></div>'
    + '<div class="op-item"><div class="op-item-l">Modelo</div><div class="op-item-v">' + escapeHtml(id.modelo_negocio || 'B2C') + '</div></div>'
    + '<div class="op-item"><div class="op-item-l">Equipe</div><div class="op-item-v">' + escapeHtml(String(headcount)) + ' pessoas</div></div>'
    + '<div class="op-item"><div class="op-item-l">Regime</div><div class="op-item-v">' + escapeHtml(regime) + '</div></div>'
    + '</div>';

  // Bloco ISE 8 Pilares
  const pilares = (ise.pilares || []).slice(0, 8);
  let iseBloco = '<div class="op-bloco"><div class="op-bloco-title">ISE · 8 Pilares</div>';
  pilares.forEach(p => {
    const score = n(p.score_0_10);
    const cor = score >= 7 ? 'g' : score >= 5 ? 'a' : 'r';
    const corVar = cor === 'g' ? 'var(--em)' : cor === 'a' ? 'var(--am)' : 'var(--rd)';
    iseBloco += '<div class="op-ise-bar">'
      + '<div class="op-ise-nome">' + escapeHtml((p.label || p.id || '').slice(0, 12)) + '</div>'
      + '<div class="op-ise-track"><div class="op-ise-fill" style="width:' + (score * 10).toFixed(0) + '%;background:' + corVar + '"></div></div>'
      + '<div class="op-ise-val" style="color:' + corVar + '">' + score.toFixed(0) + '/10</div>'
      + '</div>';
  });
  iseBloco += '</div>';

  // Bloco Top Destaques (em vez de Atratividade)
  const upsP12 = (calcJson.potencial_12m && calcJson.potencial_12m.upsides_ativos) || [];
  const top3 = upsP12.slice().sort((a, b) => n(b.contribuicao_brl) - n(a.contribuicao_brl)).slice(0, 3);
  let destBloco = '<div class="op-bloco"><div class="op-bloco-title">Top Destaques</div>';
  if (top3.length === 0) {
    destBloco += '<div class="op-item-l" style="font-size:10px;color:var(--ink4);font-style:italic">Sem upsides calculados</div>';
  } else {
    top3.forEach(u => {
      const valor = n(u.impacto_valuation_brl) || n(u.contribuicao_brl);
      destBloco += '<div class="op-item">'
        + '<div class="op-item-l">' + escapeHtml(u.label || u.id) + '</div>'
        + '<div class="op-item-v g">+' + fcShort(valor) + '</div>'
        + '</div>';
    });
  }
  destBloco += '</div>';

  // Bloco potencial 12 meses
  const potencialFinal = (calcJson.potencial_12m && calcJson.potencial_12m.potencial_final) || {};
  const valorProjetado = n(potencialFinal.valor_projetado_brl);
  const deltaBrl = n(potencialFinal.delta_brl);
  let potencialBloco = '';
  if (valorProjetado > 0 && deltaBrl > 0) {
    potencialBloco = '<div style="background:var(--em-d);border:1px solid var(--em-l);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">'
      + '<div>'
      + '<div style="font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--em);margin-bottom:6px">Potencial com oportunidades implementadas</div>'
      + '<div style="font-size:10px;color:var(--ink3);line-height:1.6">+' + fcShort(deltaBrl) + ' no valor de venda em 12 meses</div>'
      + '</div>'
      + '<div style="text-align:right;flex-shrink:0">'
      + '<div style="font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--em);margin-bottom:4px">Valor potencial</div>'
      + '<div style="font-family:\'Syne\',sans-serif;font-weight:800;font-size:22px;color:var(--em)">' + fcShort(valorProjetado) + '</div>'
      + '</div>'
      + '</div>';
  }

  // Footer
  const footer = '<div class="op-footer">'
    + '<div class="op-footer-l">' + escapeHtml(setorLbl) + ' em ' + escapeHtml(local) + ' · ' + escapeHtml(dataAval) + ' · Cód. ' + escapeHtml(codigo) + '</div>'
    + '<div class="op-footer-r">1negocio.com.br</div>'
    + '</div>';

  return ''
    + '<section class="op-wrap page-break">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num" style="color:var(--em)">' + getNum('teaser') + '</div>'
    + '    <div><div class="sec-label" style="color:var(--em)">Resumo Executivo</div><div class="sec-title">Visão Geral · One Page</div></div>'
    + '  </div>'
    + '  <div class="op-hero">'
    + '    <div>'
    + '      <div class="op-hero-eyebrow">Negócio em avaliação</div>'
    + '      <div class="op-hero-nome">' + escapeHtml(setorLbl) + ' em ' + escapeHtml(local) + '</div>'
    + (setorLinha ? '      <div class="op-hero-setor">' + escapeHtml(setorLinha) + '</div>' : '')
    + '    </div>'
    + '    <div class="op-hero-right">'
    + '      <div class="op-hero-valor-label">Valor de venda</div>'
    + '      <div class="op-hero-valor">' + fcShort(valorVenda) + '</div>'
    + '      <div class="op-hero-valor-tipo">Porteira fechada</div>'
    + '    </div>'
    + '  </div>'
    + '  ' + kpis
    + '  <div class="op-body">'
    + '    ' + formula
    + '    <div class="op-row">' + dreBloco + opBloco + '</div>'
    + '    <div class="op-row">' + iseBloco + destBloco + '</div>'
    + '    ' + potencialBloco
    + '  </div>'
    + '  ' + footer
    + '</section>';
}

// ─── EXTRA 2: Pontos Fortes + Pontos de Atenção ─────────────────────────────
function renderPontosFortesAtencao() {
  const tIA = calcJson.textos_ia || {};
  const fortes = (tIA.texto_diferenciais && tIA.texto_diferenciais.conteudo) || '';
  const atencao = (tIA.texto_riscos_atencao && tIA.texto_riscos_atencao.conteudo) || '';

  // Derivação adicional via pilares ISE (score >= 8 = forte; <= 4 = atenção)
  const pilares = (calcJson.ise && calcJson.ise.pilares) || [];
  const pFortes = pilares.filter(p => n(p.score_0_10) >= 8).map(p => p.label || p.id);
  const pAtencao = pilares.filter(p => n(p.score_0_10) <= 4).map(p => p.label || p.id);

  const fmtTexto = (s) => s ? '<div class="txt-md">' + markdownSimples(s) + '</div>' : '<div class="txt-pendente">[Texto pendente]</div>';
  const listaPilares = (arr) => arr.length ? '<ul style="margin:8px 0 0;padding-left:18px;line-height:1.7">' + arr.map(l => '<li>' + escapeHtml(l) + '</li>').join('') + '</ul>' : '<div class="txt-pendente" style="font-size:11px;color:var(--ink4)">Nenhum pilar nessa faixa.</div>';

  return ''
    + '<section class="sec page-break extra">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">' + getNum('pontos') + '</div>'
    + '    <div><div class="sec-label">Anexo · Análise consolidada</div><div class="sec-title">Pontos Fortes e Pontos de Atenção</div></div>'
    + '  </div>'
    + '  <div class="sec-body">'
    + '    <div class="diag-bloco"><div class="diag-bloco-title">Pontos Fortes</div>' + fmtTexto(fortes) + '<div style="margin-top:12px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)">Pilares ISE com score ≥ 8</div>' + listaPilares(pFortes) + '</div>'
    + '    <div class="diag-bloco" style="margin-top:18px"><div class="diag-bloco-title">Pontos de Atenção</div>' + fmtTexto(atencao) + '<div style="margin-top:12px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)">Pilares ISE com score ≤ 4</div>' + listaPilares(pAtencao) + '</div>'
    + '  </div>'
    + '</section>';
}

// ─── 08 · A AVALIAÇÃO (port v1) — fórmula + tabela + parecer ────────────────
function renderAvaliacao() {
  const v   = calcJson.valuation || {};
  const dre = calcJson.dre || {};
  const ise = calcJson.ise || {};
  const bal = calcJson.balanco || {};

  const roMensal = n(dre.ro_mensal);
  const roAnual  = n(dre.ro_anual) || roMensal * 12;
  const fator    = n(v.fator_final || v.fator_1n);
  const pl       = n(bal.patrimonio_liquido);
  const valorOp  = n(v.valor_operacao) || (roAnual * fator);
  const valorVenda = n(v.valor_venda);
  const iseTotal = n(ise.ise_total);

  // Parte A: fórmula visual .eq-wrap
  const eqWrap = '<div class="eq-wrap">'
    + '<div class="eq-box"><div class="eq-label">RO anual</div><div class="eq-val">' + fcShort(roAnual) + '</div></div>'
    + '<div class="eq-op">×</div>'
    + '<div class="eq-box"><div class="eq-label">Fator 1N</div><div class="eq-val g">' + fator.toFixed(2).replace('.', ',') + '×</div></div>'
    + '<div class="eq-op">+</div>'
    + '<div class="eq-box"><div class="eq-label">Patrimônio</div><div class="eq-val' + (pl < 0 ? '' : '') + '">' + fcShort(pl) + '</div></div>'
    + '<div class="eq-op">=</div>'
    + '<div class="eq-box hl"><div class="eq-label">Valor de venda</div><div class="eq-val g">' + fcShort(valorVenda) + '</div></div>'
    + '</div>';

  // Parte B: tabela detalhada
  const tbl = '<table class="tbl" style="margin-bottom:14px">'
    + '<thead><tr><th>Componente</th><th>Valor</th><th>Fonte</th></tr></thead><tbody>'
    + '<tr><td>Resultado operacional mensal</td><td>' + fc(roMensal) + '</td><td>DRE declarada</td></tr>'
    + '<tr><td>Resultado operacional anual</td><td>' + fc(roAnual) + '</td><td>Mensal × 12</td></tr>'
    + '<tr><td>ISE — Solidez empresarial</td><td>' + iseTotal.toFixed(0) + '/100</td><td>8 dimensões</td></tr>'
    + '<tr><td>Fator 1N aplicado</td><td>' + fator.toFixed(2).replace('.', ',') + '×</td><td>Múltiplo + ISE</td></tr>'
    + '<tr class="sub"><td>Valor de operação</td><td>' + fc(valorOp) + '</td><td>RO × Fator</td></tr>'
    + '<tr><td>Patrimônio líquido</td><td style="color:' + (pl < 0 ? 'var(--rd)' : 'inherit') + '">' + fc(pl) + '</td><td>Ativos − Passivos</td></tr>'
    + '<tr class="tot"><td>Valor de venda</td><td>' + fc(valorVenda) + '</td><td>Porteira fechada</td></tr>'
    + '</tbody></table>';

  // Parte C: Parecer Técnico
  const tIA = calcJson.textos_ia || {};
  const tParecer = tIA.texto_parecer_tecnico || {};
  const parecerHtml = tParecer.conteudo
    ? '<div class="parecer-texto">' + markdownSimples(tParecer.conteudo) + '</div>'
    : '<div class="txt-pendente">[Parecer pendente — em geração pela IA]</div>';

  const parecer = ''
    + '<div style="margin-top:24px">'
    + '  <div class="parecer-titulo">'
    + '    <div class="parecer-eyebrow">Análise independente · Equipe 1Negócio</div>'
    + '    <div class="parecer-h">Parecer Técnico — Fator 1N</div>'
    + '    <div class="parecer-linha"></div>'
    + '  </div>'
    + '  ' + parecerHtml
    + '</div>';

  return ''
    + '<section class="sec page-break">'
    + '  <div class="sec-header">'
    + '    <div class="sec-num">' + getNum('avaliacao') + '</div>'
    + '    <div><div class="sec-label">Laudo Principal</div><div class="sec-title">A Avaliação · Como chegamos a esse valor</div></div>'
    + '  </div>'
    + '  <div class="sec-body">' + eqWrap + tbl + parecer + '</div>'
    + '</section>';
}

// ─── EXTRA 3: Estudo Tributário Detalhado ───────────────────────────────────
// renderTributaria já usa getNum('tributario') = "A3" e label "Anexo · Tributário detalhado".
// Aqui só envolvemos com page-break/extra.
function renderEstudoTributarioDetalhado() {
  const tributariaHTML = renderTributaria();
  if (!tributariaHTML) return '';
  return tributariaHTML.replace(/<section class="sec">/, '<section class="sec page-break extra">');
}

// ─── ICD · Índice de Confiabilidade dos Dados (port v1) ─────────────────────
// Lê direto de calcJson.icd (vem pronto da skill v2).
// Coluna verde: respondidos (com asterisco em críticos).
// Coluna âmbar: não respondidos (omite coluna se vazia).
// Bloco benchmarks: omitido se array vazio.
function renderICD() {
  const icd = calcJson.icd;
  if (!icd) return '';

  const pct = n(icd.pct);
  const respondidos = Array.isArray(icd.respondidos) ? icd.respondidos : [];
  const naoResp = Array.isArray(icd.nao_respondidos) ? icd.nao_respondidos : [];

  // Nota dinâmica baseada no pct (ajuste 1 do briefing)
  let nota;
  if (pct >= 85) {
    nota = pct + '% dos dados foram declarados pelo proprietário. Índice Transparente — avaliação altamente defensável em due diligence.';
  } else if (pct >= 70) {
    nota = pct + '% dos dados foram declarados pelo proprietário. Índice Confiável — alguns campos secundários ainda podem ser refinados.';
  } else if (pct >= 50) {
    nota = pct + '% dos dados foram declarados. Índice Parcial — recomenda-se complementar campos faltantes para fortalecer a avaliação.';
  } else {
    nota = pct + '% dos dados foram declarados. Índice Limitado — laudo serve como ponto de partida, exige refinamento antes de uso em transações.';
  }

  // Coluna respondidos (verde) — asterisco verde em críticos
  let colRespondidos = '<div>'
    + '<div class="icd-col-title g">Informado pelo proprietário (' + respondidos.length + ')</div>';
  respondidos.forEach(item => {
    const star = item.critico ? '<span class="icd-item-star">★</span>' : '';
    const cls = item.critico ? ' critico' : '';
    colRespondidos += '<div class="icd-item' + cls + '">'
      + '<div class="icd-item-dot" style="background:var(--em)"></div>'
      + star
      + escapeHtml(item.label || item.id)
      + '</div>';
  });
  colRespondidos += '</div>';

  // Coluna não respondidos (âmbar) — só renderiza se houver
  let colNaoResp = '';
  if (naoResp.length > 0) {
    colNaoResp = '<div>'
      + '<div class="icd-col-title a">Não respondidos (' + naoResp.length + ')</div>';
    naoResp.forEach(item => {
      const star = item.critico ? '<span class="icd-item-star" style="color:var(--am)">★</span>' : '';
      const cls = item.critico ? ' critico' : '';
      colNaoResp += '<div class="icd-item' + cls + '">'
        + '<div class="icd-item-dot" style="background:var(--am)"></div>'
        + star
        + escapeHtml(item.label || item.id)
        + '</div>';
    });
    colNaoResp += '</div>';
  }

  const gridCls = naoResp.length === 0 ? 'icd-grid single' : 'icd-grid';

  return ''
    + '<section class="icd-wrap page-break">'
    + '  <div class="icd-header">'
    + '    <div class="icd-title">ICD · Índice de Confiabilidade dos Dados</div>'
    + '    <div class="icd-score">' + pct + '%</div>'
    + '  </div>'
    + '  <div class="icd-bar-track"><div class="icd-bar-fill" style="width:' + pct + '%"></div></div>'
    + '  <div class="' + gridCls + '">' + colRespondidos + colNaoResp + '</div>'
    + '  <div class="icd-nota">' + escapeHtml(nota) + '</div>'
    + '</section>';
}
</script>
</body>
</html>
