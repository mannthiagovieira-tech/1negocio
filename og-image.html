<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden;background:#080d0a}
body{font-family:'DM Mono',monospace;background:#080d0a;position:relative}
body::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;z-index:0}
body::after{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:800px;height:500px;border-radius:50%;background:radial-gradient(ellipse,rgba(61,255,122,.07) 0%,transparent 60%);z-index:0;pointer-events:none}
.accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,#3dff7a 0%,rgba(61,255,122,.2) 60%,transparent 100%);z-index:1}
.wrap{position:relative;z-index:1;width:1200px;height:630px;display:grid;grid-template-rows:auto 1fr auto;padding:44px 64px}
.top{display:flex;align-items:center;justify-content:space-between;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.02em;color:#f0f5f1}
.logo em{color:#3dff7a;font-style:normal}
.badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#3dff7a;border:1px solid rgba(61,255,122,.25);padding:7px 16px}
.center{display:flex;flex-direction:column;justify-content:center;padding:40px 0 32px}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,245,241,.3);margin-bottom:18px}
.headline{font-family:'Syne',sans-serif;font-weight:800;font-size:68px;line-height:1.05;letter-spacing:-.03em;color:#f0f5f1;margin-bottom:22px}
.headline em{color:#3dff7a;font-style:normal}
.sub{font-family:'DM Mono',monospace;font-size:15px;color:rgba(240,245,241,.4);letter-spacing:.03em;line-height:1.6;max-width:580px}
.bottom{display:flex;align-items:flex-end;justify-content:space-between;padding-top:24px;border-top:1px solid rgba(255,255,255,.07)}
.stats{display:flex;gap:52px}
.stat-val{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.02em;color:#3dff7a;line-height:1;margin-bottom:5px}
.stat-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,245,241,.25)}
.url{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;color:rgba(240,245,241,.2)}
</style>
</head>
<body>
<div class="accent"></div>
<div class="wrap">

  <div class="top">
    <div class="logo"><em>1</em>Negócio</div>
    <div class="badge">Avaliação · M&A · PMEs</div>
  </div>

  <div class="center">
    <div class="eyebrow">Laudo de avaliação gratuito</div>
    <div class="headline">
      Quanto vale<br>o seu <em>negócio?</em>
    </div>
    <div class="sub">
      Avaliação técnica com metodologia de M&A.<br>
      Resultado em 5 minutos — sem cadastro.
    </div>
  </div>

  <div class="bottom">
    <div class="stats">
      <div class="stat">
        <div class="stat-val">2.800+</div>
        <div class="stat-label">Negócios avaliados</div>
      </div>
      <div class="stat">
        <div class="stat-val">R$ 1.2B</div>
        <div class="stat-label">Volume avaliado</div>
      </div>
      <div class="stat">
        <div class="stat-val">100%</div>
        <div class="stat-label">Independente</div>
      </div>
    </div>
    <div class="url">1negocio.com.br</div>
  </div>

</div>
</body>
</html>
