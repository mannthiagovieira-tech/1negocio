<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Negócio — Meu Portal</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080808; --bg2: #101010; --bg3: #161616; --bg4: #1c1c1c;
  --b1: rgba(255,255,255,.07); --b2: rgba(255,255,255,.12);
  --ink: #f0f0ee; --dim: rgba(255,255,255,.38); --dim2: rgba(255,255,255,.16);
  --green: #10b981; --green-dim: rgba(16,185,129,.1); --green-bdr: rgba(16,185,129,.25);
  --amber: #f59e0b; --red: #ef4444; --blue: #60a5fa;
}
html, body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; }

/* LOADING */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
  flex-direction: column; gap: 16px;
}
.load-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: .12em; }
.load-logo em { color: var(--green); font-style: normal; }
.load-bar { width: 120px; height: 2px; background: var(--b1); border-radius: 1px; overflow: hidden; }
.load-bar-fill { height: 100%; background: var(--green); animation: loadAnim 1.4s ease-in-out infinite; }
@keyframes loadAnim { 0%{width:0%;margin-left:0} 50%{width:100%;margin-left:0} 100%{width:0%;margin-left:100%} }

/* AUTH GATE */
#auth-gate {
  display: none; min-height: 100vh;
  align-items: center; justify-content: center; padding: 32px 20px;
}
.auth-card {
  max-width: 400px; width: 100%;
  background: var(--bg2); border: 1px solid var(--b1); border-radius: 12px; padding: 36px;
  text-align: center;
}
.auth-icon { font-size: 36px; margin-bottom: 16px; }
.auth-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.auth-sub { font-size: 11px; color: var(--dim); line-height: 1.7; margin-bottom: 24px; }
.auth-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--b1);
  border-radius: 6px; padding: 11px 14px; color: var(--ink);
  font-family: 'Inter', sans-serif; font-size: 13px; outline: none;
  transition: border-color .15s; margin-bottom: 12px; text-align: center;
}
.auth-input:focus { border-color: var(--green-bdr); }
.auth-input::placeholder { color: var(--dim2); }
.auth-btn {
  width: 100%; padding: 13px; background: var(--green); border: none; border-radius: 6px;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .14em; color: #000; cursor: pointer; transition: opacity .15s;
}
.auth-btn:hover { opacity: .88; }
.auth-btn:disabled { opacity: .4; cursor: default; }
.auth-err { font-size: 9px; color: var(--red); margin-top: 10px; min-height: 14px; }
.auth-sent { font-size: 10px; color: var(--green); margin-top: 10px; }

/* APP */
#app { display: none; min-height: 100vh; flex-direction: column; }

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 52px;
  border-bottom: 1px solid var(--b1); background: rgba(8,8,8,.96);
  position: sticky; top: 0; z-index: 100; flex-shrink: 0;
}
.logo { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; letter-spacing: -.02em; text-decoration: none; color: var(--ink); }
.logo span { color: var(--green); }
.nav-user { display: flex; align-items: center; gap: 10px; }
.nav-user-name { font-size: 11px; color: var(--dim); }
.nav-logout { background: none; border: 1px solid var(--b1); color: var(--dim); padding: 5px 12px; border-radius: 4px; font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: .1em; cursor: pointer; transition: all .15s; }
.nav-logout:hover { color: var(--red); border-color: rgba(239,68,68,.3); }

/* MAIN */
main { flex: 1; padding: 32px 24px; max-width: 760px; margin: 0 auto; width: 100%; }

/* STATUS HERO */
.status-hero {
  background: var(--bg2); border: 1px solid var(--b1); border-radius: 12px;
  padding: 28px; margin-bottom: 20px; position: relative; overflow: hidden;
}
.status-hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--green), transparent);
}
.status-eyebrow { font-size: 7.5px; letter-spacing: .22em; color: var(--green); margin-bottom: 8px; }
.status-nome { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
.status-meta { font-size: 11px; color: var(--dim); margin-bottom: 20px; }
.status-badge-wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: .08em;
}
.sb-avaliacao { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
.sb-publicado { background: rgba(16,185,129,.12); color: var(--green); border: 1px solid var(--green-bdr); }
.sb-negociacao { background: rgba(96,165,250,.12); color: var(--blue); border: 1px solid rgba(96,165,250,.25); }
.sb-encerrado { background: rgba(255,255,255,.05); color: var(--dim); border: 1px solid var(--b1); }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-dot.pulse { animation: pulseAnim 2s ease-in-out infinite; }
@keyframes pulseAnim { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

/* CARDS */
.card {
  background: var(--bg2); border: 1px solid var(--b1); border-radius: 10px;
  overflow: hidden; margin-bottom: 16px;
}
.card-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px; border-bottom: 1px solid var(--b1);
  font-size: 8px; font-weight: 700; letter-spacing: .18em; color: var(--dim); text-transform: uppercase;
}
.card-body { padding: 20px; }

/* REUNIÃO */
.reuniao-empty { font-size: 12px; color: var(--dim); line-height: 1.6; }
.reuniao-slot {
  display: flex; align-items: flex-start; gap: 16px;
}
.reuniao-date-box {
  flex-shrink: 0; background: var(--green-dim); border: 1px solid var(--green-bdr);
  border-radius: 8px; padding: 10px 14px; text-align: center; min-width: 64px;
}
.reuniao-dia { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--green); line-height: 1; }
.reuniao-mes { font-size: 9px; letter-spacing: .14em; color: var(--green); margin-top: 2px; text-transform: uppercase; }
.reuniao-info { flex: 1; }
.reuniao-titulo { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.reuniao-hora { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--green); margin-bottom: 10px; }
.reuniao-link {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; background: var(--green); border: none; border-radius: 5px;
  font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .1em;
  color: #000; cursor: pointer; text-decoration: none; transition: opacity .15s;
}
.reuniao-link:hover { opacity: .85; }

/* PRÓXIMOS PASSOS */
.passos { display: flex; flex-direction: column; gap: 0; }
.passo {
  display: flex; gap: 16px; padding: 14px 0;
  border-bottom: 1px solid var(--b1);
}
.passo:last-child { border-bottom: none; }
.passo-num {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400; margin-top: 1px;
}
.passo-num.done { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-bdr); }
.passo-num.active { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.25); }
.passo-num.pending { background: var(--b1); color: var(--dim2); border: 1px solid var(--b1); }
.passo-body { flex: 1; }
.passo-title {
  font-size: 13px; font-weight: 600; margin-bottom: 3px;
}
.passo-title.done { text-decoration: line-through; color: var(--dim); }
.passo-title.active { color: var(--amber); }
.passo-title.pending { color: var(--dim); }
.passo-desc { font-size: 11px; color: var(--dim); line-height: 1.6; }

/* EMPTY STATE */
.portal-empty {
  text-align: center; padding: 60px 20px;
}
.portal-empty-ico { font-size: 48px; margin-bottom: 16px; }
.portal-empty-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.portal-empty-sub { font-size: 12px; color: var(--dim); line-height: 1.7; max-width: 360px; margin: 0 auto; }
.portal-empty-cta {
  display: inline-block; margin-top: 20px; padding: 12px 24px;
  background: var(--green); border: none; border-radius: 6px;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: .12em; color: #000; cursor: pointer; text-decoration: none;
  transition: opacity .15s;
}
.portal-empty-cta:hover { opacity: .88; }

/* CONTATO CONSULTOR */
.consultor-box {
  background: linear-gradient(135deg, #064e3b, #065f46);
  border: 1px solid var(--green-bdr); border-radius: 8px;
  padding: 18px 20px; display: flex; align-items: center; gap: 14px;
}
.consultor-ico { font-size: 24px; flex-shrink: 0; }
.consultor-info { flex: 1; }
.consultor-label { font-size: 9px; letter-spacing: .14em; color: rgba(16,185,129,.7); margin-bottom: 3px; }
.consultor-txt { font-size: 12px; color: #fff; line-height: 1.5; }
.consultor-btn {
  flex-shrink: 0; padding: 9px 16px; background: var(--green); border: none; border-radius: 5px;
  font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .1em;
  color: #000; cursor: pointer; text-decoration: none; transition: opacity .15s; white-space: nowrap;
}
.consultor-btn:hover { opacity: .85; }
@media (max-width: 480px) {
  .consultor-box { flex-direction: column; text-align: center; }
  .reuniao-slot { flex-direction: column; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="load-logo">1<em>N</em>EGÓCIO</div>
  <div class="load-bar"><div class="load-bar-fill"></div></div>
</div>

<!-- AUTH GATE -->
<div id="auth-gate" style="display:flex">
  <div class="auth-card">
    <div class="auth-icon">📬</div>
    <div class="auth-title">Acesse seu portal</div>
    <div class="auth-sub">Acompanhe a avaliação do seu negócio e receba alertas quando compradores demonstrarem interesse.</div>
    <!-- Social login -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <button onclick="loginSocial('google')" style="width:100%;padding:10px 14px;background:#161616;border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#f0f0ee;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-3.59-13.46-8.66l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        ENTRAR COM GOOGLE
      </button>
      <button onclick="loginSocial('azure')" style="width:100%;padding:10px 14px;background:#161616;border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#f0f0ee;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        <svg width="16" height="16" viewBox="0 0 21 21"><rect width="10" height="10" fill="#F25022"/><rect x="11" width="10" height="10" fill="#7FBA00"/><rect y="11" width="10" height="10" fill="#00A4EF"/><rect x="11" y="11" width="10" height="10" fill="#FFB900"/></svg>
        ENTRAR COM MICROSOFT
      </button>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div>
      <span style="font-size:8px;color:rgba(255,255,255,.25);letter-spacing:.1em">OU USE SEU E-MAIL</span>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.07)"></div>
    </div>
    <input class="auth-input" id="auth-email" type="email" placeholder="seu@email.com" autocomplete="email">
    <div class="auth-err" id="auth-err"></div>
    <button class="auth-btn" id="auth-btn" onclick="sendPortalLink()">RECEBER LINK DE ACESSO →</button>
    <div class="auth-sent" id="auth-sent" style="display:none">📬 Link enviado! Verifique seu e-mail.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav>
    <a href="/" class="logo">1<span>N</span>EGÓCIO<span style="opacity:.3;font-weight:400;font-size:11px">.COM.BR</span></a>
    <div class="nav-user">
      <span class="nav-user-name" id="nav-email"></span>
      <button class="nav-logout" onclick="logout()">SAIR</button>
    </div>
  </nav>
  <main id="main-content">
    <div id="loading-data" style="text-align:center;padding:60px 20px;color:var(--dim);font-size:12px">Carregando seu portal...</div>
  </main>
</div>

<script>
var SB = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
var ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';
var session = null;

// ── AUTH ──
async function getSession() {
  // Tenta pegar sessão do hash (magic link callback)
  var hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    var params = new URLSearchParams(hash.substring(1));
    var accessToken = params.get('access_token');
    var refreshToken = params.get('refresh_token');
    if (accessToken) {
      // Troca o token por sessão
      var res = await fetch(SB + '/auth/v1/user', {
        headers: { 'apikey': ANON, 'Authorization': 'Bearer ' + accessToken }
      });
      if (res.ok) {
        var user = await res.json();
        session = { access_token: accessToken, user: user };
        // Limpa o hash da URL
        history.replaceState(null, '', window.location.pathname);
        return session;
      }
    }
  }
  // Tenta localStorage
  var stored = null;
  try { stored = JSON.parse(localStorage.getItem('1n_session') || 'null'); } catch(e) {}
  if (stored && stored.access_token) {
    // Valida se ainda é válida
    var r2 = await fetch(SB + '/auth/v1/user', {
      headers: { 'apikey': ANON, 'Authorization': 'Bearer ' + stored.access_token }
    });
    if (r2.ok) {
      session = stored;
      return session;
    } else {
      localStorage.removeItem('1n_session');
    }
  }
  return null;
}

async function sendPortalLink() {
  var email = (document.getElementById('auth-email').value || '').trim().toLowerCase();
  var err = document.getElementById('auth-err');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    err.textContent = 'Informe um e-mail válido.';
    return;
  }
  err.textContent = '';
  var btn = document.getElementById('auth-btn');
  btn.disabled = true; btn.textContent = 'Enviando...';
  try {
    var res = await fetch(SB + '/auth/v1/otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON, 'Authorization': 'Bearer ' + ANON },
      body: JSON.stringify({
        email: email,
        options: { emailRedirectTo: window.location.href.split('?')[0] }
      })
    });
    if (!res.ok) { var d = await res.json(); throw new Error(d.msg || 'Erro ao enviar'); }
    document.getElementById('auth-sent').style.display = 'block';
    btn.textContent = 'REENVIAR LINK';
    btn.disabled = false;
  } catch(e) {
    err.textContent = 'Erro: ' + e.message;
    btn.disabled = false; btn.textContent = 'RECEBER LINK DE ACESSO →';
  }
}

function loginSocial(provider) {
  var redirectTo = window.location.href.split('?')[0];
  window.location.href = SB + '/auth/v1/authorize?provider=' + provider +
    '&redirect_to=' + encodeURIComponent(redirectTo);
}

async function logout() {
  localStorage.removeItem('1n_session');
  session = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-gate').style.display = 'flex';
}

// ── PORTAL DATA ──
async function loadPortalData() {
  try {
    var res = await fetch(SB + '/functions/v1/portal-proxy', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': ANON,
        'Authorization': 'Bearer ' + session.access_token
      },
      body: JSON.stringify({ action: 'get_portal_data' })
    });
    if (!res.ok) throw new Error('Erro ' + res.status);
    return res.json();
  } catch(e) {
    return null;
  }
}

// ── STATUS MAP ──
var STATUS_MAP = {
  'em_avaliacao':        { label: 'Em Avaliação', cls: 'sb-avaliacao', pulse: true },
  'aguardando_aprovacao':{ label: 'Aguardando Aprovação', cls: 'sb-avaliacao', pulse: true },
  'publicado':           { label: 'Publicado', cls: 'sb-publicado', pulse: false },
  'em_negociacao':       { label: 'Em Negociação', cls: 'sb-negociacao', pulse: true },
  'pausado':             { label: 'Pausado', cls: 'sb-encerrado', pulse: false },
  'encerrado':           { label: 'Encerrado', cls: 'sb-encerrado', pulse: false },
  'vendido':             { label: 'Vendido ✓', cls: 'sb-publicado', pulse: false },
  'expirado':            { label: 'Expirado', cls: 'sb-encerrado', pulse: false },
};

function getPassos(status) {
  var ordem = ['em_avaliacao','aguardando_aprovacao','publicado','em_negociacao','vendido'];
  var idx = ordem.indexOf(status);
  var passos = [
    { key: 'em_avaliacao',         title: 'Levantamento concluído', desc: 'Suas informações foram registradas e estão em análise pela equipe 1Negócio.' },
    { key: 'aguardando_aprovacao', title: 'Avaliação em andamento',  desc: 'Nosso consultor está preparando a avaliação do negócio e os termos de publicação.' },
    { key: 'publicado',            title: 'Negócio publicado',       desc: 'Seu anúncio está ativo na plataforma e sendo apresentado a compradores qualificados.' },
    { key: 'em_negociacao',        title: 'Negociação iniciada',     desc: 'Um comprador qualificado demonstrou interesse e a mesa de negociação foi aberta.' },
    { key: 'vendido',              title: 'Negócio vendido',         desc: 'Parabéns! A transação foi concluída com sucesso.' },
  ];
  return passos.map(function(p, i) {
    var state = i < idx ? 'done' : i === idx ? 'active' : 'pending';
    return Object.assign({}, p, { state: state });
  });
}

function fmtDataReuniao(iso) {
  var d = new Date(iso);
  return {
    dia: d.toLocaleDateString('pt-BR', { day: '2-digit', timeZone: 'America/Sao_Paulo' }),
    mes: d.toLocaleDateString('pt-BR', { month: 'short', timeZone: 'America/Sao_Paulo' }).replace('.','').toUpperCase(),
    hora: d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo' }),
    completo: d.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', timeZone: 'America/Sao_Paulo' })
  };
}

// ── RENDER ──
function renderPortal(data) {
  var el = document.getElementById('main-content');
  var negocio = data && data.negocio;
  var draft = data && data.draft;
  var reunioes = data && data.reunioes ? data.reunioes : [];
  var userName = (negocio && negocio.nome) || (draft && draft.nome) || 'Vendedor';

  // Sem negócio ainda
  if (!negocio && !draft) {
    el.innerHTML = '<div class="portal-empty">' +
      '<div class="portal-empty-ico">📋</div>' +
      '<div class="portal-empty-title">Nenhum negócio encontrado</div>' +
      '<div class="portal-empty-sub">Seu perfil foi criado mas ainda não há um negócio vinculado. Clique abaixo para iniciar o levantamento.</div>' +
      '<a href="/chat.html" class="portal-empty-cta">INICIAR AVALIAÇÃO →</a>' +
      '</div>';
    return;
  }

  var status = negocio ? (negocio.status || 'em_avaliacao') : 'em_avaliacao';
  var statusInfo = STATUS_MAP[status] || STATUS_MAP['em_avaliacao'];
  var nomeProjeto = negocio ? negocio.nome : (draft && draft.campos_json && draft.campos_json.nome_negocio ? draft.campos_json.nome_negocio : 'Seu Negócio');
  var passos = getPassos(status);

  var html = '';

  // HERO STATUS
  html += '<div class="status-hero">';
  html += '<div class="status-eyebrow">MEU NEGÓCIO</div>';
  html += '<div class="status-nome">' + esc(nomeProjeto) + '</div>';
  if (negocio && (negocio.categoria || negocio.cidade)) {
    html += '<div class="status-meta">' + [negocio.categoria, negocio.cidade && negocio.estado ? negocio.cidade + ' / ' + negocio.estado : negocio.cidade].filter(Boolean).join(' · ') + '</div>';
  }
  html += '<div class="status-badge-wrap">';
  html += '<span class="status-badge ' + statusInfo.cls + '"><span class="status-dot' + (statusInfo.pulse ? ' pulse' : '') + '"></span>' + statusInfo.label + '</span>';
  html += '</div></div>';

  // REUNIÃO
  html += '<div class="card"><div class="card-hd">📅 Reunião Agendada</div><div class="card-body">';
  if (reunioes.length > 0) {
    var r = reunioes[0];
    var dt = fmtDataReuniao(r.start);
    var attendee = r.attendees && r.attendees[0];
    html += '<div class="reuniao-slot">';
    html += '<div class="reuniao-date-box"><div class="reuniao-dia">' + dt.dia + '</div><div class="reuniao-mes">' + dt.mes + '</div></div>';
    html += '<div class="reuniao-info">';
    html += '<div class="reuniao-titulo">' + esc((r.eventType && r.eventType.title) || r.title || 'Conversa com Consultor') + '</div>';
    html += '<div class="reuniao-hora">' + dt.hora + ' (Horário de Brasília)</div>';
    html += '<div style="font-size:10px;color:var(--dim);margin-bottom:12px">' + dt.completo + '</div>';
    if (r.meetingUrl) {
      html += '<a href="' + r.meetingUrl + '" target="_blank" class="reuniao-link">ENTRAR NA REUNIÃO →</a>';
    } else {
      html += '<div style="font-size:10px;color:var(--dim)">O consultor entrará em contato pelo seu WhatsApp.</div>';
    }
    html += '</div></div>';
  } else {
    html += '<div class="reuniao-empty">Nenhuma reunião agendada no momento.<br>Nosso consultor vai entrar em contato pelo WhatsApp para combinar o melhor horário.</div>';
    html += '<div style="margin-top:16px"><a href="https://cal.com/1negocio/avaliacao-gratuita" target="_blank" class="reuniao-link" style="display:inline-flex">AGENDAR AGORA →</a></div>';
  }
  html += '</div></div>';

  // PRÓXIMOS PASSOS
  html += '<div class="card"><div class="card-hd">◈ Próximos Passos</div><div class="card-body">';
  html += '<div class="passos">';
  passos.forEach(function(p, i) {
    html += '<div class="passo">';
    html += '<div class="passo-num ' + p.state + '">' + (p.state === 'done' ? '✓' : (i + 1)) + '</div>';
    html += '<div class="passo-body">';
    html += '<div class="passo-title ' + p.state + '">' + esc(p.title) + '</div>';
    if (p.state !== 'done') {
      html += '<div class="passo-desc">' + esc(p.desc) + '</div>';
    }
    html += '</div></div>';
  });
  html += '</div></div></div>';

  // FALAR COM CONSULTOR
  html += '<div class="consultor-box">';
  html += '<div class="consultor-ico">💬</div>';
  html += '<div class="consultor-info"><div class="consultor-label">DÚVIDAS?</div>';
  html += '<div class="consultor-txt">Nosso consultor está disponível para responder qualquer pergunta sobre o processo.</div></div>';
  html += '<a href="https://wa.me/5511999999999?text=Olá%2C+tenho+dúvidas+sobre+o+processo+de+venda" target="_blank" class="consultor-btn">FALAR NO WHATSAPP</a>';
  html += '</div>';

  el.innerHTML = html;
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ──
async function init() {
  var s = await getSession();
  document.getElementById('loading').style.display = 'none';

  if (s) {
    // Salva sessão
    try { localStorage.setItem('1n_session', JSON.stringify(s)); } catch(e) {}
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('nav-email').textContent = s.user && s.user.email ? s.user.email : '';
    var data = await loadPortalData();
    renderPortal(data);
  } else {
    document.getElementById('auth-gate').style.display = 'flex';
  }
}

document.getElementById('auth-email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendPortalLink();
});

init();
</script>
