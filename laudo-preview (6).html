<style>
:root{
  --bg:#0c0c0a;--s1:#111110;--s2:#161614;--s3:#1c1c19;
  --ink:#f5f4ef;--ink2:rgba(245,244,239,.6);--ink3:rgba(245,244,239,.28);--ink4:rgba(245,244,239,.12);
  --sep:rgba(255,255,255,.07);--bdr:rgba(255,255,255,.14);
  --green:#10b981;--gdim:rgba(16,185,129,.15);
  --amber:#f59e0b;--blue:#60a5fa;--red:#f87171;--violet:#6366f1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;font-size:12px;min-height:100vh;}

/* ── TOPBAR FIXA ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:500;
  background:rgba(12,12,10,.97);backdrop-filter:blur(12px);
  border-bottom:.5px solid var(--sep);
  padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.topbar-logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:.02em;}
.topbar-logo em{color:var(--green);font-style:normal;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn-fechar{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:7px 16px;border:.5px solid var(--bdr);background:transparent;
  color:var(--ink2);cursor:pointer;transition:all .15s;
}
.btn-fechar:hover{background:var(--s2);color:var(--ink);}
.badge-previa{
  font-size:8px;letter-spacing:.16em;text-transform:uppercase;
  padding:4px 10px;border:.5px solid rgba(245,158,11,.35);
  color:var(--amber);background:rgba(245,158,11,.06);
}

/* Marca d'água aplicada via JS só sobre o valor */
.val-wm-wrap{position:relative;overflow:hidden;}
.val-wm-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:2;
}
.val-wm-text{
  font-family:'Syne',sans-serif;font-size:14px;font-weight:800;
  color:rgba(255,255,255,.18);letter-spacing:.12em;text-transform:uppercase;
  transform:rotate(-25deg);white-space:nowrap;user-select:none;
  text-align:center;line-height:1.6;
}

/* ── DOCUMENTO ── */
.doc{
  max-width:820px;margin:0 auto;
  padding:80px 24px 100px;
}

/* ── PÁGINAS ── */
.page{
  background:var(--s1);
  border:.5px solid var(--sep);
  margin-bottom:3px;
  position:relative;
  overflow:hidden;
}

/* ── CABEÇALHO DA PÁGINA ── */
.page-header{
  padding:16px 24px;border-bottom:.5px solid var(--sep);
  display:flex;align-items:center;justify-content:space-between;
}
.page-num{
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);
}
.page-label{
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);
}

/* ── BLOCOS ── */
.bloco{padding:24px;border-bottom:.5px solid var(--sep);}
.bloco:last-child{border-bottom:none;}
.bloco-titulo{
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);
  margin-bottom:16px;display:flex;align-items:center;gap:8px;
}
.bloco-titulo::before{content:'';display:block;width:16px;height:1px;background:var(--sep);}

/* ── CAPA ── */
.capa-glow{
  position:absolute;top:-100px;right:-100px;width:400px;height:400px;
  background:radial-gradient(circle,rgba(16,185,129,.06) 0%,transparent 65%);
  pointer-events:none;
}
.capa-top{
  padding:32px 28px 0;
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:28px;
}
.capa-logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.capa-logo em{color:var(--green);font-style:normal;}
.capa-selos{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.selo{font-size:8px;font-family:'Syne',sans-serif;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border:.5px solid;}
.selo-previa{color:var(--amber);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.06);}
.selo-data{color:var(--ink3);border-color:var(--sep);}

.capa-body{padding:0 28px 32px;}
.capa-eyebrow{
  font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--green);
  margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.capa-eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--green);}
.capa-titulo{
  font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,40px);font-weight:800;
  letter-spacing:-.03em;line-height:1.1;color:var(--ink);margin-bottom:8px;
}
.capa-sub{font-size:11px;color:var(--ink3);line-height:1.7;margin-bottom:20px;}
.capa-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.ctag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border:.5px solid var(--sep);color:var(--ink3);}
.ctag-g{border-color:rgba(16,185,129,.3);color:var(--green);background:rgba(16,185,129,.04);}
.capa-aviso{
  padding:10px 14px;border-left:2px solid rgba(245,158,11,.35);
  background:rgba(245,158,11,.03);font-size:10px;color:rgba(245,158,11,.65);line-height:1.7;
}

/* ── GRID IDENTIF ── */
.id-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--sep);}
.id-item{padding:12px 16px;background:var(--s1);}
.id-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.id-valor{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--ink);}
.id-sub{font-size:10px;color:var(--ink3);margin-top:2px;}

/* ── IA BLOCO ── */
.ia-secao{padding:20px 24px;border-bottom:.5px solid var(--sep);}
.ia-secao-titulo{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;}
.ia-texto{font-size:11px;color:var(--ink2);line-height:1.85;}
.ia-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--sep);margin-top:12px;}
.ia-stat{padding:10px 14px;background:var(--s1);}
.ia-stat-l{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.ia-stat-v{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--ink);}
.ia-lista{margin-top:10px;display:flex;flex-direction:column;gap:5px;}
.ia-lista-item{display:flex;gap:8px;font-size:11px;color:var(--ink2);line-height:1.6;}
.ia-lista-item::before{content:'→';color:var(--green);flex-shrink:0;}

/* ── ISE ── */
.ise-hero{
  padding:28px 24px;
  background:rgba(0,0,0,.2);
  position:relative;overflow:hidden;
  border-bottom:.5px solid var(--sep);
}
.ise-glow{
  position:absolute;top:-40px;right:-40px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(16,185,129,.12) 0%,transparent 70%);
  pointer-events:none;
}
.ise-eyebrow{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
.ise-row{display:flex;align-items:flex-end;gap:16px;margin-bottom:14px;}
.ise-numero{
  font-family:'Syne',sans-serif;font-size:64px;font-weight:800;
  line-height:.9;letter-spacing:-.04em;
}
.ise-info{padding-bottom:6px;}
.ise-nivel{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:-.01em;}
.ise-de100{font-size:10px;color:var(--ink3);margin-top:3px;}
.ise-niveis{display:flex;gap:2px;margin-bottom:12px;}
.ise-nivel-item{
  flex:1;padding:5px 6px;
  font-family:'Syne',sans-serif;font-size:7px;font-weight:800;
  text-transform:uppercase;letter-spacing:.05em;
}
.ise-barra-wrap{height:3px;background:var(--sep);overflow:hidden;margin-bottom:20px;}
.ise-barra{height:100%;background:linear-gradient(90deg,#6366f1,var(--green));}

/* ── PILARES ── */
.pilares{display:flex;flex-direction:column;gap:8px;padding:20px 24px;border-bottom:.5px solid var(--sep);}
.pilar-row{display:grid;grid-template-columns:1fr 28px;gap:10px;align-items:center;}
.pilar-nome{font-size:10px;color:var(--ink3);margin-bottom:4px;}
.pilar-bar-wrap{height:2px;background:var(--sep);overflow:hidden;}
.pilar-bar{height:100%;}
.pilar-nota{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;text-align:right;}

/* ── ANÁLISE ISE ── */
.analise-bloco{padding:20px 24px;border-bottom:.5px solid var(--sep);}
.analise-titulo{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
.analise-item{
  padding:12px 0;border-bottom:.5px solid var(--sep);
  display:flex;gap:12px;align-items:flex-start;
}
.analise-item:last-child{border-bottom:none;padding-bottom:0;}
.analise-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;
}
.analise-texto{font-size:11px;color:var(--ink2);line-height:1.7;}
.analise-label{font-family:'Syne',sans-serif;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}

/* ── DRE ── */
.dre{padding:20px 24px;border-bottom:.5px solid var(--sep);}
.dre-header{
  display:grid;grid-template-columns:1fr 90px 100px;gap:8px;
  font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);
  padding-bottom:8px;border-bottom:.5px solid var(--sep);margin-bottom:6px;
}
.dre-row{
  display:grid;grid-template-columns:1fr 90px 100px;gap:8px;align-items:center;
  padding:6px 0;border-bottom:.5px solid rgba(255,255,255,.03);font-size:11px;
}
.dre-row:last-child{border-bottom:none;}
.dre-row.total{
  border-top:.5px solid rgba(255,255,255,.1);
  margin-top:4px;padding-top:10px;
}
.dre-label{color:var(--ink3);}
.dre-label.bold{color:var(--ink);font-weight:600;}
.dre-val{text-align:right;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;}
.dre-anual{text-align:right;font-size:10px;color:var(--ink3);}

/* ── BP ── */
.bp{padding:20px 24px;}
.bp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--sep);margin-top:12px;}
.bp-item{padding:14px 16px;background:var(--s1);}
.bp-label{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.bp-valor{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;}

/* ── VALUATION ── */
.val-hero{
  padding:36px 28px 28px;
  background:linear-gradient(160deg,rgba(16,185,129,.05) 0%,transparent 60%);
  position:relative;overflow:hidden;
  border-bottom:.5px solid var(--sep);
}
.val-glow{
  position:absolute;top:-60px;right:-60px;width:300px;height:300px;
  background:radial-gradient(circle,rgba(16,185,129,.1) 0%,transparent 70%);
  pointer-events:none;
}
.val-top{
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(16,185,129,.5),transparent);
}
.val-eyebrow{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:rgba(16,185,129,.7);margin-bottom:6px;}
.val-sub{font-size:10px;color:var(--ink3);margin-bottom:20px;}
.val-numero{
  font-family:'Syne',sans-serif;
  font-size:clamp(48px,10vw,80px);
  font-weight:800;color:var(--green);
  line-height:.9;letter-spacing:-.05em;
  margin-bottom:16px;
  text-shadow:0 0 60px rgba(16,185,129,.25);
}
.val-faixa{
  display:inline-flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.03);border:.5px solid var(--sep);
  padding:6px 14px;margin-bottom:20px;
}
.val-faixa-l{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);}
.val-faixa-v{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--ink2);}

.val-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-left:2px solid;
  background:rgba(255,255,255,.02);
  font-size:11px;margin-top:8px;
}

/* ── BREAKDOWN ── */
.breakdown{padding:20px 24px;border-bottom:.5px solid var(--sep);}
.breakdown-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:10px 0;border-bottom:.5px solid rgba(255,255,255,.04);
}
.breakdown-row:last-child{border-bottom:none;}
.breakdown-row.destaque{
  border-top:.5px solid rgba(255,255,255,.1);
  margin-top:4px;padding-top:14px;
}
.breakdown-l{font-size:11px;color:var(--ink3);}
.breakdown-l.bold{color:var(--ink);font-weight:600;font-size:12px;}
.breakdown-sub{font-size:9px;color:var(--ink3);margin-top:2px;}
.breakdown-v{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;white-space:nowrap;}

/* ── DISCLAIMER ── */
.disclaimer{
  padding:16px 24px;border-bottom:.5px solid var(--sep);
  border-left:2px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.01);
}
.disclaimer-titulo{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;}
.disclaimer-texto{font-size:10px;color:var(--ink3);line-height:1.8;}

/* ── OPORTUNIDADES ── */
.opps{padding:20px 24px;border-bottom:.5px solid var(--sep);}
.opp-item{
  padding:12px 0;border-bottom:.5px solid rgba(245,158,11,.06);
  display:flex;gap:12px;align-items:flex-start;
}
.opp-item:last-child{border-bottom:none;padding-bottom:0;}
.opp-dot{width:5px;height:5px;background:var(--amber);border-radius:50%;flex-shrink:0;margin-top:5px;}
.opp-titulo{font-family:'Syne',sans-serif;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:3px;}
.opp-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.7;}

/* ── ASSINATURA ── */
.assinatura{padding:24px;border-bottom:.5px solid var(--sep);}
.ass-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;}
.ass-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.ass-logo em{color:var(--green);font-style:normal;}
.ass-desc{font-size:10px;color:var(--ink3);line-height:1.7;margin-top:4px;}
.ass-dir{text-align:right;}
.ass-validade{font-size:9px;color:var(--ink3);margin-bottom:8px;}
.ass-linha{height:1px;background:var(--bdr);margin-bottom:8px;}
.ass-nome{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;}
.ass-cargo{font-size:9px;color:var(--ink3);}

/* ── CTAs ── */
.ctas{padding:24px;}
.ctas-titulo{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;}
.ctas-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.cta-item{
  padding:18px;cursor:pointer;
  border:.5px solid var(--sep);
  transition:background .15s;position:relative;overflow:hidden;
}
.cta-item:hover{background:var(--s2);}
.cta-item.destaque{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.03);}
.cta-item.destaque:hover{background:rgba(16,185,129,.06);}
.cta-item.azul{border-color:rgba(96,165,250,.25);background:rgba(96,165,250,.03);}
.cta-top{position:absolute;top:0;left:0;right:0;height:1px;}
.cta-badge{
  position:absolute;top:-1px;right:8px;
  font-family:'Syne',sans-serif;font-size:7px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  background:var(--amber);color:#000;padding:2px 8px;
}
.cta-label{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.cta-titulo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;line-height:1.1;margin-bottom:5px;}
.cta-desc{font-size:10px;color:var(--ink3);line-height:1.6;margin-bottom:12px;}
.cta-btn{
  display:inline-block;
  font-family:'Syne',sans-serif;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  padding:8px 14px;
}

/* ── KPIs 4 ── */
.kpis4{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--sep);border-bottom:.5px solid var(--sep);}
.kpi-item{padding:16px;background:var(--s1);}
.kpi-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;}
.kpi-valor{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.02em;}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:28px;height:28px;border:2px solid var(--sep);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── PRINT ── */
@media print{
  .topbar,.watermark{display:none!important;}
  body{background:#fff!important;color:#111!important;}
  .doc{padding:16px;}
  .page,.bloco,.ia-secao,.val-hero,.ctas,.assinatura,.disclaimer{border-color:#e5e5e5!important;}
  :root{--bg:#fff;--s1:#fafafa;--s2:#f5f5f5;--ink:#111;--ink2:#444;--ink3:#888;--sep:#e5e5e5;--green:#059669;}
}
</style>

function comentarioPilar(id, val){
  var c=COMENTARIOS[id];
  if(!c)return null;
  if(id==='p10'){
    if(val<=30)return c.low;
    if(val<=60)return c.mid;
    return c.high;
  }
  // Para sliders (p2, p4, p8, p10): mapear para faixas
  if(id==='p2'||id==='p4'||id==='p8'){
    if(val<=2)return c[0];if(val<=4)return c[2];if(val<=6)return c[4];
    if(val<=8)return c[6];return c[8]||c[10];
  }
  // Para cards: valor exato
  if(c[val]!==undefined)return c[val];
  // Fallback por faixa
  var chaves=Object.keys(c).map(Number).sort(function(a,b){return a-b;});
  var closest=chaves.reduce(function(prev,curr){return Math.abs(curr-val)<Math.abs(prev-val)?curr:prev;});
  return c[closest];
}

// ── OPORTUNIDADES ──────────────────────────────────────────────
function getOportunidades(n, score_pilares){
  var opps=[];
  if(!score_pilares)return opps;
  try{
    var pilares=typeof score_pilares==='string'?JSON.parse(score_pilares):score_pilares;
    // Ordenar por valor ascendente → piores primeiro
    var sorted=[...pilares].sort(function(a,b){return (a.val||0)-(b.val||0);});
    var pilar_map={
      p1:{t:'Independência operacional',d:'Estruturar processos e delegar decisões pode aumentar significativamente o valor percebido pelo comprador.'},
      p2:{t:'Processo comercial',d:'Formalizar o processo de vendas traz previsibilidade de receita — um dos critérios mais valorizados em M&A.'},
      p3:{t:'Posicionamento da oferta',d:'Clarificar e padronizar a entrega ao cliente facilita a transição e aumenta o valor intangível do negócio.'},
      p4:{t:'Gestão e processos internos',d:'Documentar processos reduz a dependência de pessoas-chave e acelera due diligence.'},
      p5:{t:'Resultado financeiro',d:'Melhorar margens e consistência do resultado impacta diretamente o múltiplo de avaliação.'},
      p6:{t:'Balanço patrimonial',d:'Organizar ativos e passivos com clareza facilita a negociação e reduz risco percebido.'},
      p7:{t:'Estrutura de dívida',d:'Reduzir o nível de endividamento antes da venda pode aumentar o valor líquido recebido.'},
      p8:{t:'Situação legal e fiscal',d:'Regularizar pendências antes de iniciar negociações evita descontos no preço final.'},
      p9:{t:'Concentração de receita',d:'Diversificar a base de clientes reduz risco e pode elevar o múltiplo de avaliação.'},
      p10:{t:'Potencial de escala',d:'Identificar e documentar caminhos de crescimento atrai compradores estratégicos.'}
    };
    sorted.slice(0,4).forEach(function(p){
      var m=pilar_map[p.id];
      if(m&&(p.val||0)<7)opps.push({t:m.t,d:m.d});
    });
  }catch(e){}
  return opps.slice(0,4);
}

// ── HELPERS DE LAYOUT ──────────────────────────────────────────
function dreRow(label,vMes,vAno,cor,bold){
  var bs=bold?'font-weight:700;':'';
  return'<div class="dre-row'+(bold?' total':'')+'">'
    +'<span class="dre-label'+(bold?' bold':'')+'" style="'+bs+'">'+label+'</span>'
    +'<span class="dre-val" style="color:'+cor+'">'+vMes+'</span>'
    +'<span class="dre-anual">'+vAno+'</span>'
    +'</div>';
}
function bRow(label,valor,sub,cor,bold){
  return'<div class="breakdown-row'+(bold?' destaque':'')+'">'
    +'<div><div class="breakdown-l'+(bold?' bold':'')+'">'+label+'</div>'+(sub?'<div class="breakdown-sub">'+sub+'</div>':'')+'</div>'
    +'<div class="breakdown-v" style="color:'+cor+'">'+valor+'</div>'
    +'</div>';
}
function parseBP(n, tipo){
  try{
    if(tipo==='ativos'&&n.ativos_json){
      var a=typeof n.ativos_json==='string'?JSON.parse(n.ativos_json):n.ativos_json;
      return Object.values(a).reduce(function(s,v){return s+(parseFloat(v)||0);},0);
    }
    if(tipo==='passivos'&&n.passivos_json){
      var p=typeof n.passivos_json==='string'?JSON.parse(n.passivos_json):n.passivos_json;
      return Object.values(p).reduce(function(s,v){return s+(parseFloat(v)||0);},0);
    }
  }catch(e){}
  if(tipo==='ativos')return(n.ativo_imovel||0)+(n.ativo_equipamentos||0)+(n.ativo_estoque||0);
  return n.divida_total||n.dividas||0;
}

// ── CARREGAR DADOS ─────────────────────────────────────────────
async function carregarNegocio(){
  if(!NEG_ID){
    document.getElementById('doc').innerHTML='<div style="padding:60px;text-align:center;color:var(--ink3)">ID do negócio não informado na URL.<br><br><a href="/" style="color:var(--green)">← Voltar para início</a></div>';
    return;
  }
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/negocios?id=eq.'+NEG_ID+'&select=*&limit=1',{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    var rows=await r.json();
    if(!rows||!rows.length){
      document.getElementById('doc').innerHTML='<div style="padding:60px;text-align:center;color:var(--ink3)">Negócio não encontrado.<br><br><a href="/" style="color:var(--green)">← Voltar</a></div>';
      return;
    }
    var neg = rows[0];
    // Buscar dados do usuário para "Preparado para" (modos previa e vendedor)
    if(MODO==='previa'||MODO==='vendedor'){
      try{
        var sessResp = await fetch(SUPA_URL+'/auth/v1/user',{
          headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
        });
        // Tenta pegar do localStorage do Supabase (sessão do browser)
        var stored = Object.keys(localStorage).find(function(k){return k.includes('supabase.auth.token');});
        if(stored){
          var sess = JSON.parse(localStorage.getItem(stored));
          var u = sess&&sess.currentSession&&sess.currentSession.user;
          if(u){
            neg.prepared_for_nome = (u.user_metadata&&(u.user_metadata.nome||u.user_metadata.full_name))||'';
            neg.prepared_for_email = u.email||'';
          }
        }
      }catch(e){}
    }
    renderDoc(neg);
  }catch(e){
    document.getElementById('doc').innerHTML='<div style="padding:60px;text-align:center;color:var(--red)">Erro ao carregar: '+e.message+'</div>';
  }
}

carregarNegocio();
</script>
