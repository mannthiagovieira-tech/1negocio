<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>1Negócio · Diagnóstico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Instrument+Serif:ital@0;1&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --fs:"Instrument Serif",serif;
  --bg:#0c0c0a;--bg2:#111110;--bg3:#161614;
  --ink:rgba(255,255,255,.88);--ink2:rgba(255,255,255,.46);
  --ink3:rgba(255,255,255,.22);--ink4:rgba(255,255,255,.08);
  --sep:rgba(255,255,255,.07);--dim:rgba(255,255,255,.46);
  --faint:rgba(255,255,255,.07);
  --green:#10b981;--amber:#f59e0b;--blue:#60a5fa;--red:#f87171;
  --bdr:rgba(255,255,255,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;overflow-x:hidden;text-transform:uppercase;letter-spacing:.05em}
.q{text-transform:none!important;letter-spacing:normal!important;font-family:'Syne',sans-serif!important;font-weight:800!important}
.q em{color:var(--green);font-style:italic;font-weight:800}
.hint{text-transform:none!important;letter-spacing:normal!important}
input,textarea,select{text-transform:none!important;letter-spacing:normal!important}
.opt-t{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.opt-s{text-transform:none;letter-spacing:normal}
/* neon cards */
.neon-g{box-shadow:0 0 0 1px rgba(16,185,129,.4),0 0 16px rgba(16,185,129,.1)}
.neon-b{box-shadow:0 0 0 1.5px rgba(96,165,250,.5),0 0 20px rgba(96,165,250,.12)}
.neon-a{box-shadow:0 0 0 1px rgba(245,158,11,.4),0 0 16px rgba(245,158,11,.1)}
.eyebrow{font-family:'Syne',sans-serif;font-size:8px;font-weight:700;letter-spacing:.26em}
/* PROGRESS */
.prog-wrap{position:fixed;top:0;left:0;right:0;z-index:100;height:6px;background:rgba(255,255,255,.06);overflow:visible}
.prog-fill{height:100%;background:var(--green);transition:width .6s cubic-bezier(.4,0,.2,1);width:0%;box-shadow:0 0 10px rgba(16,185,129,.9),0 0 24px rgba(16,185,129,.5),0 0 48px rgba(16,185,129,.2)}
/* HEADER */
.hdr{position:fixed;top:3px;left:0;right:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(12,12,10,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--faint)}
.hdr-logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.hdr-logo em{color:var(--green);font-style:normal}
.hdr-info{text-align:center}
.hdr-section{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--green)}

.hdr-save{font-size:9px;color:var(--dim);display:flex;align-items:center;gap:5px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);opacity:0}
.sdot.on{opacity:1;animation:blink 1.2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
/* PAGE */
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 24px 80px}
/* CARD */
.card{max-width:580px;width:100%;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card.out{animation:fout .2s ease forwards}
@keyframes fout{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-12px)}}
/* EYEBROW */
.eyebrow{font-size:6.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:7px;font-weight:500}
.eyebrow::before{content:'';width:16px;height:1px;background:var(--green);display:block;flex-shrink:0}
/* QUESTION */
.q{font-family:var(--fs);font-size:clamp(20px,3.5vw,32px);line-height:1.25;color:var(--ink);margin-bottom:6px}
.q em{color:var(--green);font-style:italic}
.hint{font-size:12px;color:var(--ink2);margin-bottom:24px;line-height:1.65}
/* INPUT */
.field{margin-bottom:14px}
.fl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;display:block}
input[type=text],input[type=number],textarea,select{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--bdr);
  padding:13px 16px;color:var(--ink);font-family:'DM Mono',monospace;
  font-size:14px;outline:none;transition:border-color .2s;
  -webkit-appearance:none;border-radius:0;
}
input:focus,textarea:focus,select:focus{border-color:rgba(16,185,129,.5);background:rgba(16,185,129,.04)}
input[type=text]:placeholder-shown,input[type=number]:placeholder-shown{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.02)}
textarea{resize:vertical;min-height:80px;line-height:1.6}
select option{background:#111}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* OPTIONS */
.opts{display:grid;gap:7px;margin-bottom:8px}
.opts.c2{grid-template-columns:1fr 1fr}
.opts.c3{grid-template-columns:1fr 1fr 1fr}
.opts.c1{grid-template-columns:1fr}
.opt{border:1px solid var(--sep);background:rgba(255,255,255,.03);padding:13px 16px;cursor:pointer;transition:all .12s;display:flex;align-items:flex-start;gap:10px;text-align:left;position:relative;width:100%}
.opt:hover{border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.04)}
.opt.sel{border-color:rgba(16,185,129,.55);background:rgba(16,185,129,.08)}
.opt-ico{font-size:18px;flex-shrink:0;line-height:1;margin-top:1px}
.opt-t{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:1px;line-height:1.3}
.opt-s{font-size:11px;color:var(--dim);line-height:1.35}
.opt-ck{position:absolute;top:9px;right:10px;width:14px;height:14px;border-radius:50%;border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--green);flex-shrink:0}
.opt.sel .opt-ck{background:var(--green);border-color:var(--green);color:#000}
/* COUNTER */
.ctr-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--sep)}
.ctr-row:last-child{border:none}
.ctr-lbl{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink)}
.ctr-sub{font-size:10px;color:var(--dim);margin-top:3px;text-transform:none;letter-spacing:normal;font-family:'DM Mono',monospace}
.ctr-ctrl{display:flex;align-items:center;gap:0;flex-shrink:0}
.ctr-btn{width:34px;height:34px;background:var(--bg2);border:1px solid var(--bdr);color:var(--ink);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;font-weight:300}
.ctr-btn:hover{border-color:var(--green);color:var(--green);background:rgba(16,185,129,.06)}
.ctr-v{width:40px;text-align:center;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--ink)}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px}
.tbl th{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:8px 8px 6px;text-align:left;border-bottom:1px solid var(--faint)}
.tbl td{padding:5px 4px;border-bottom:1px solid var(--faint)}
.tbl td input,.tbl td select{padding:8px 10px;font-size:12px}
.del-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 8px;font-size:13px;transition:color .12s}
.del-btn:hover{color:var(--red)}
.add-btn{width:100%;border:1px dashed rgba(16,185,129,.3);background:none;color:var(--green);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:9px;cursor:pointer;margin-top:2px;transition:all .12s}
.add-btn:hover{background:rgba(16,185,129,.04)}
/* CALC BOX */
.calc-box{border:1px solid rgba(16,185,129,.2);background:rgba(16,185,129,.04);padding:14px 16px;margin:12px 0;font-size:12px;line-height:1.6;color:var(--dim)}
.calc-val{font-size:20px;font-weight:600;color:var(--green);font-family:var(--fs);margin-top:4px}
/* WARN */
.warn-box{border:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.04);padding:12px 16px;margin:12px 0;font-size:12px;line-height:1.6;color:var(--amber)}
/* NOTE */
.note{border-left:2px solid rgba(16,185,129,.35);padding:8px 14px;font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:14px}
/* BTNS */
.btn-row{display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-next{background:var(--green);color:#000;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:14px 28px;border:none;cursor:pointer;transition:all .13s}
.btn-next:hover{background:#34d399}
.btn-next:active{transform:scale(.98)}
.btn-back{background:transparent;color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:14px 18px;border:1px solid var(--bdr);cursor:pointer;transition:all .13s}
.btn-back:hover{color:var(--ink)}
.btn-skip{background:transparent;color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:14px 0;border:none;cursor:pointer;opacity:.6;transition:opacity .12s}
.btn-skip:hover{opacity:1}
/* INLINE EXPAND */
.expand{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--faint)}
/* RESULT */
.r-wrap{max-width:580px;width:100%;animation:fu .5s ease}
.r-top{border:1px solid rgba(16,185,129,.18);background:rgba(16,185,129,.035);padding:28px 32px;margin-bottom:12px}
.r-ey{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:8px}
.r-lbl{font-size:11px;color:var(--dim);margin-bottom:4px}
.r-val{font-family:var(--fs);font-size:clamp(32px,5vw,50px);color:var(--ink);line-height:1;margin-bottom:3px}
.r-range{font-size:12px;color:var(--dim)}
.r-warn{padding:12px 16px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);font-size:12px;color:var(--amber);margin-top:12px;line-height:1.65}
.r-pillars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.pillar{padding:12px 14px;border:1px solid var(--faint);background:var(--bg2)}
.p-n{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.p-bar{height:2px;background:var(--faint);margin-bottom:5px}
.p-fill{height:100%;background:var(--green);transition:width 1s ease .2s}
.p-sc{font-size:12px;color:var(--ink);font-weight:500}
.r-cta{border:1px solid var(--bdr);background:var(--bg2);padding:22px 26px;margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.btn-cal{background:var(--amber);color:#000;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:13px 20px;border:none;cursor:pointer;transition:all .13s;flex-shrink:0}
.btn-cal:hover{background:#fbbf24}
.saving-bar{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--faint);padding:9px 14px;font-size:9px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:6px;pointer-events:none}
.saving-bar.show{opacity:1}
@media(max-width:600px){
  .hdr{padding:12px 16px}
  .page{padding:76px 16px 60px}
  .opts.c2,.opts.c3{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .r-pillars{grid-template-columns:1fr}
}
</style>

function resetDiag(){
  if(!confirm('Apagar todas as respostas e reiniciar do começo?')) return;
  try{localStorage.removeItem('1n_diag');localStorage.removeItem('1n_diag_meta');}catch(e){}
  Object.keys(D).forEach(function(k){
    if(typeof D[k]==='number') D[k]=0;
    else if(Array.isArray(D[k])) D[k]=[];
    else D[k]='';
  });
  D.dividas=[];D.socios=[];D.urg=5;
  qIdx=0;_navHist=[];
  var rs=document.getElementById('result-screen');
  if(rs){rs.innerHTML='';rs.style.display='none';}
  var nb=document.getElementById('nav-bar');
  if(nb) nb.style.display='flex';
  document.getElementById('prog').style.width='0%';
  renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleTipo(btn, t){
  var i=D.tiposNeg.indexOf(t);

function esc(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function fmtM(v){if(!v||v===0)return '';return Number(v).toLocaleString('pt-BR');}
function parseMoney(s){if(!s)return 0;return parseInt((s+'').replace(/[^0-9]/g,''))||0;}
function maskInp(el){var v=parseMoney(el.value);el.value=v?v.toLocaleString('pt-BR'):'';}
function fmtBRL(v){if(!v||isNaN(v))return '—';if(v>=1e6)return 'R$ '+(v/1e6).toFixed(1).replace('.',',')+'M';if(v>=1e3)return 'R$ '+Math.round(v/1e3)+'K';return 'R$ '+v.toLocaleString('pt-BR');}

function card(sec,title,hint,body,validateFn){
  var q=QUESTIONS[qIdx];if(q)q._validate=validateFn||null;
  return '<div class="card" id="cur-card">'
    +'<div class="eyebrow">'+sec+'</div>'
    +'<h1 class="q">'+title+'</h1>'
    +(hint?'<p class="hint">'+hint+'</p>':'')
    +body
    +'</div>';
}

function opts(items,key,cols,onChange,multi){
  var html='<div class="opts '+cols+'">';
  items.forEach(function(item){
    var ico=item.length===3?item[0]:'';
    var title=item[ico?1:0];
    var sub=item[ico?2:1]||'';
    var isArr=multi&&Array.isArray(D[key]);
    var sel=isArr?D[key].includes(title):D[key]===title;
    var handler=multi?
      'onclick="selMulti(this,\''+key+'\''+(onChange?',function(){'+onChange.toString().replace(/"/g,"'")+'}'  :'')+')\"':
      'onclick="selOne(this,\''+key+'\',\''+title.replace(/'/g,"\\'")+'\')'+(onChange?';('+onChange.toString()+')()':'')+'"';
    html+='<button class="opt'+(sel?' sel':'')+'" '+handler+'>'
      +(ico?'<div class="opt-ico">'+ico+'</div>':'')
      +'<div><div class="opt-t">'+title+'</div>'+(sub?'<div class="opt-s">'+sub+'</div>':'')+'</div>'
      +'<div class="opt-ck">✓</div>'
      +'</button>';
  });
  html+='</div>';
  return html;
}

function selOne(el,key,val){
  D[key]=val;
  el.closest('.opts').querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
  // Auto-advance: if current question only has this opts group and it validates, advance
  setTimeout(function(){
    var curQ=QUESTIONS[qIdx];
    if(!curQ) return;
    if(typeof curQ._validate==='function'&&curQ._validate()){
      // Only auto-advance if card has no text inputs or textareas (pure opts question)
      var card=document.getElementById('cur-card');
      if(card){
        var hasInputs=card.querySelectorAll('input[type=text],input[type=number],textarea,select').length;
        var hasExpand=card.querySelectorAll('.expand').length;
        if(!hasInputs&&!hasExpand) next();
      }
    }
  }, 320);
}
function selMulti(el,key){
  if(!Array.isArray(D[key]))D[key]=[];
  var title=el.querySelector('.opt-t').textContent.trim();
  if(el.classList.contains('sel')){el.classList.remove('sel');D[key]=D[key].filter(function(v){return v!==title;});}
  else{el.classList.add('sel');if(!D[key].includes(title))D[key].push(title);}
}

function ctrRow(id,lbl,sub){
  var v=typeof D[id]==='number'?D[id]:0;
  return '<div class="ctr-row"><div><div class="ctr-lbl">'+lbl+'</div><div style="font-size:10px;color:var(--dim)">'+sub+'</div></div>'
    +'<div class="ctr-ctrl">'
    +'<button class="ctr-btn" onclick="adjCtr(\''+id+'\',-1)">−</button>'
    +'<div class="ctr-v" id="ctr-'+id+'">'+v+'</div>'
    +'<button class="ctr-btn" onclick="adjCtr(\''+id+'\',1)">+</button>'
    +'</div></div>';
}
function adjCtr(id,delta){
  D[id]=Math.max(0,(D[id]||0)+delta);
  var el=document.getElementById('ctr-'+id);
  if(el) el.textContent=D[id];
}

function showMarkup(){
  var c=D.markupComp,v=D.markupVenda;
  var el=document.getElementById('markup-result');
  if(!el||!c||!v)return;
  var mg=((v-c)/v*100).toFixed(1);
  var mult=(v/c).toFixed(2);
  el.innerHTML='<div class="calc-box">Margem bruta: <strong style="color:var(--green)">'+mg+'%</strong> &nbsp;·&nbsp; Markup: <strong style="color:var(--green)">'+mult+'×</strong></div>';
}

function renderQ(){
  buildQuestions();
  var q=QUESTIONS[qIdx];
  if(!q){calcResult();return;}
  document.getElementById('hdr-sec').textContent=q.section;

  var pct=Math.round((qIdx+1)/QUESTIONS.length*95);
  document.getElementById('prog').style.width=pct+'%';
  var pl=document.getElementById('prog-label');
  if(pl) pl.textContent=pct+'%';
  var wrap=document.getElementById('card-wrap');
  wrap.innerHTML=q.render();
  // restore slider
  if(q.id==='urg'){
    var sl=document.getElementById('q-urg');
    if(sl){sl.style.setProperty('--v',D.urg);sl.style.accentColor='var(--green)';}
  }
  saveLocal();
}

function next(){
  buildQuestions();
  var curQ=QUESTIONS[qIdx];
  if(curQ&&typeof curQ._validate==='function'&&!curQ._validate()){flash();return;}
  _navHist.push(qIdx);
  qIdx++;
  buildQuestions();
  if(qIdx>=QUESTIONS.length){calcResult();return;}
  renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}

function back(){
  var rs=document.getElementById('result-screen');
  if(rs&&rs.style.display!='none'&&rs.innerHTML.length>10) return;
  if(_navHist.length>0){qIdx=_navHist.pop();renderQ();window.scrollTo({top:0,behavior:'smooth'});}
}
function skip(){
  _navHist.push(qIdx);qIdx++;
  if(qIdx>=QUESTIONS.length){calcResult();return;}
  renderQ();window.scrollTo({top:0,behavior:'smooth'});
}
function flash(){
  var c=document.getElementById('cur-card');
  if(!c)return;
  c.style.animation='none';
  c.style.border='1px solid rgba(248,113,113,.5)';
  // Show inline error
  var existing = document.getElementById('flash-msg');
  if(existing) existing.remove();
  var msg = document.createElement('div');
  msg.id = 'flash-msg';
  msg.style.cssText = 'color:#f87171;font-size:11px;margin-top:10px;letter-spacing:.06em;animation:fu .2s ease';
  msg.textContent = '← Preencha este campo para continuar, ou clique em Pular';
  c.appendChild(msg);
  setTimeout(function(){
    c.style.border='';
    if(msg.parentNode) msg.remove();
  }, 2500);
}

function calcIndiceValor(){
  // Use best multiple across all selected cats + subcat
  var _allCats=Array.isArray(D.cats)&&D.cats.length?D.cats:[D.cat||'Outro'];
  var base=_BASE_SUBCAT[D.subcat]||0;
  if(!base){_allCats.forEach(function(c){var b=_BASE_SETOR[c]||0;if(b>base)base=b;});}
  if(!base) base=2.5;
  // Prêmio de maturidade (max +40%)
  var premio=0;
  if(D.processosDocs==='Sim, tudo documentado') premio+=0.10;
  if(D.ausencia==='Opera normalmente') premio+=0.15;
  if(Array.isArray(D.ativos)){
    if(D.ativos.some(function(a){return a.includes('Contratos');})) premio+=0.10;
    if(D.ativos.some(function(a){return a.includes('Equipe');}))    premio+=0.08;
    if(D.ativos.some(function(a){return a.includes('Marca');}))     premio+=0.07;
    if(D.ativos.some(function(a){return a.includes('Tecnologia');})) premio+=0.06;
    if(D.ativos.some(function(a){return a.includes('Carteira');}))  premio+=0.08;
  }
  if(D.churn==='Sim, receita muito recorrente') premio+=0.12;
  if(D.crescPct==='Cresceu acima de 10%') premio+=0.08;
  premio=Math.min(premio,0.30);
  // Desconto de risco (max -35%)
  var risco=0;
  if(D.ausencia==='Para ou perde muito')           risco+=0.20;
  if(D.conc==='Mais de 50%')                       risco+=0.15;
  if(D.antecipa&&D.antecipa.includes('Sim'))        risco+=0.08;
  if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%')                          risco+=0.12;
  if(D.pjs>0&&(D.pjs/Math.max(1,D.clt+D.pjc+D.pjs))>0.3) risco+=0.06;
  if(D.alvaras==='Tem pendências')                 risco+=0.08;
  if(D.riscoLegal==='Sim, processos relevantes')   risco+=0.10;
  risco=Math.min(risco,0.30);
  return Math.max(1.2,Math.min(base*(1+premio-risco),7.5));
}


function calcResult(){
  // ── Tabela Selic de referência (atualizar trimestralmente)
  var SELIC_ANUAL = 13.25; // % ao ano - ref. Mar/2026

  // ── 1. EBITDA AJUSTADO ─────────────────────────────────────
  var sobra    = D.sobraVal || 0;
  var addback  = 0;
  if(D.prolaboreInc === 'Não, sai desse valor') addback += D.prolaboreVal || 0;
  if(D.sobraType === 'Antes'){
    var totalParc = D.dividas.reduce(function(s,d){return s+(d.parcela||0);},0);
    addback += totalParc;
  }
  var ebitda_m = sobra + addback;
  var ebitda_a = ebitda_m * 12;

  // ── 2. MÚLTIPLO SETORIAL ───────────────────────────────────
  var cat  = (Array.isArray(D.cats)&&D.cats[0])||D.cat||'Outro';
  var mult = calcIndiceValor();
  var multMax = Math.min(mult + 1.5, 7.5);

  // trend replaced by crescPct
  if(D.crescPct==='Cresceu acima de 10%'||D.crescPct==='Cresceu até 10%') mult+=0.3;
  if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%') mult-=0.4;
  if(D.ausencia === 'Opera normalmente')      mult += 0.5;
  if(D.ausencia === 'Para ou perde muito')    mult -= 0.6;
  if(D.conc === 'Menos de 20%')  mult += 0.3;
  if(D.conc === 'Mais de 50%')   mult -= 0.4;
  if(Array.isArray(D.ativos) && D.ativos.length >= 4) mult += 0.4;
  if(D.alvaras === 'Sim, tudo em dia') mult += 0.1;
  if(D.alvaras === 'Tem pendências')   mult -= 0.3;
  if(D.urg >= 8)  mult -= 0.3;  // urgência comprime
  mult = Math.max(1.5, Math.min(mult, 7));

  // ── 3. VALOR DO NEGÓCIO (Enterprise Value) ─────────────────
  var fatAnual = (D.fat || 0) * 12;
  var valOp    = ebitda_a > 0 ? ebitda_a * mult : fatAnual * 0.10 * mult;

  // ── 4. ATIVOS TANGÍVEIS ────────────────────────────────────
  var aEstoque  = D.estoque    || 0;
  var aFisicos  = (D.ativMaquinas||0)+(D.ativMoveisEq||0)+(D.ativVeiculos||0)+(D.ativTecnologia||0)+(D.ativReformas||0)+(D.ativosVal||0);
  var aImovel   = D.imovelVendaJunto === 'Sim' ? (D.imovelVendaVal || 0) : 0;
  var aReceber  = D.ctaReceberCli || 0;
  var totalAtivos = aEstoque + aFisicos + aImovel;

  // ── 5. PASSIVOS ────────────────────────────────────────────
  var totalDividas  = D.dividas.reduce(function(s,d){return s+(d.total||0);},0)
    + (D.passFinanciamento||0)+(D.passImpostos||0)+(D.passForns||0)+(D.passOutros||0);
  var ctaPagar      = D.ctaPagarForn || 0;
  var giroLiq       = aReceber - ctaPagar; // capital de giro líquido

  // ── 6. VALOR DO NEGÓCIO vs VALOR DE VENDA ─────────────────
  var valorNegocio = valOp + totalAtivos;          // Enterprise Value
  var valorVenda   = valorNegocio + giroLiq - totalDividas; // Equity Value
  valorVenda       = Math.max(0, valorVenda);

  // Porteira fechada: comprador assume as dívidas hoje
  var porteiraSeca = Math.max(0, valorNegocio - totalDividas);

  var lo = Math.max(0, valorVenda * 0.90);
  var hi = valorVenda * 1.10;

  // ── 7. PILARES ─────────────────────────────────────────────
  var p1=calcPF();var p2=calcPCresc();var p3=calcPC();var p4=calcPClientes();
  var p5=calcPO();var p6=calcPSocio();var p7=calcPR();var p8=calcPBal();
  var p9=calcPMarca();var p10=calcPTime();
  var saudeGlobal=Math.round(p1*.20+p2*.10+p3*.12+p4*.10+p5*.12+p6*.10+p7*.10+p8*.08+p9*.04+p10*.04);

  // ── 8. OPORTUNIDADES DE MELHORIA (pontos fracos) ──────────
  var opps = [];
  if(D.ausencia !== 'Opera normalmente')
    opps.push({t:'Reduzir sócio-dependência', d:'Negócios que operam sem o sócio valem até 50% mais. Processos documentados e equipe autônoma aumentam diretamente o múltiplo.'});
  if(D.urg >= 7)
    opps.push({t:'Diminuir urgência de venda', d:'Urgência percebida comprime o preço. Cada ponto de urgência reduz até 5-10% na negociação. Tempo é capital na M&A.'});
  if(D.conc === 'Mais de 50%')
    opps.push({t:'Diversificar base de clientes', d:'Concentração acima de 50% em poucos clientes é o fator de risco mais citado por compradores. Reduzir para <30% pode elevar o múltiplo em 0,5x.'});
  if(D.trend === 'Diminuíram')
    opps.push({t:'Retomar crescimento de receita', d:'Tendência de queda é o maior inibidor de múltiplos. Dois trimestres de crescimento podem recuperar 30-40% do valor.'});
  if(!Array.isArray(D.ativos) || !D.ativos.some(function(a){return a.includes('Processos');}))
    opps.push({t:'Documentar processos operacionais', d:'Empresas com manual de operação e processos documentados transmitem mais segurança ao comprador e exigem menos transição.'});
  if(totalDividas > ebitda_a * 2)
    opps.push({t:'Reduzir endividamento antes da venda', d:'Dívidas acima de 2× EBITDA comprimem diretamente o preço líquido. Quitação parcial antes da venda pode aumentar o retorno líquido.'});

  // ── 9. TAXA DE RISCO DE CAPITAL (WACC referência) ─────────
  var WACC_SETOR = {
    Tecnologia:18, Saúde:22, Educação:24, Alimentação:26,
    Varejo:28, Serviços:25, Indústria:26, Construção:28, Outro:25
  };
  var wacc = WACC_SETOR[cat] || 25;

  // Show DRE confirmation before result
  showResumo({
    ebitda_a:ebitda_a, mult:mult, multMax:multMax, fatAnual:fatAnual,
    valorNegocio:valorNegocio, valorVenda:valorVenda, porteiraSeca:porteiraSeca,
    lo:lo, hi:hi, totalAtivos:totalAtivos, totalDividas:totalDividas, giroLiq:giroLiq,
    p1:p1,p2:p2,p3:p3,p4:p4,p5:p5,p6:p6,p7:p7,p8:p8,p9:p9,p10:p10,saudeGlobal:saudeGlobal,
    opps:opps, wacc:wacc, SELIC_ANUAL:SELIC_ANUAL, cat:cat
  });
}

function parseFld(id){
  var el=document.getElementById(id);
  if(!el) return 0;
  return parseMoney(el.value)||0;
}

  function pct(a,b){return b>0?(a/b*100).toFixed(0)+'%':'—';}

  var fat   = parseFld('dre-fat')   || D.fat        || 0;
  var folha = parseFld('dre-folha') || D.folha       || 0;
  var alug  = parseFld('dre-alug')  || D.aluguelVal  || 0;
  var cust  = parseFld('dre-cust')  || D.custoFixo   || 0;
  var mkt   = parseFld('dre-mkt')   || (D.marketing==='Sim, investe'?D.marketingVal:0)||0;
  var prol  = parseFld('dre-prol')  || (D.prolaboreInc==='Não, sai desse valor'?D.prolaboreVal:0)||0;
  var parcelas = D.sobraType==='Antes'?D.dividas.reduce(function(s,d){return s+(d.parcela||0);},0):0;

function dreRecalc(){
  // Save current values BEFORE rebuilding
  var passIds=D.dividas.map(function(d,i){return 'pass-'+i;});
  var ids=['dre-fat','dre-folha','dre-alug','dre-cust','dre-mkt','dre-prol','dre-cmv','dre-res','bal-estoque','bal-equip','bal-arec','bal-imovel'].concat(passIds);
  var vals={};
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el) vals[id]=parseMoney(el.value);
  });
  // Store in D
  if(vals['dre-fat'])   D.fat=vals['dre-fat'];
  if(vals['dre-folha']) D.folha=vals['dre-folha'];
  if(vals['dre-alug'])  D.aluguelVal=vals['dre-alug'];
  if(vals['dre-cust'])  D.custoFixo=vals['dre-cust'];
  if(vals['dre-mkt'])   D.marketingVal=vals['dre-mkt'];
  if(vals['dre-prol'])  D.prolaboreVal=vals['dre-prol'];
  if(vals['dre-res'])   D.sobraVal=vals['dre-res'];
  if(vals['bal-estoque'])D.estoque=vals['bal-estoque'];
  if(vals['bal-equip']) D.ativosVal=vals['bal-equip'];
  if(vals['bal-arec'])  D.ctaReceberCli=vals['bal-arec'];
  // Remember which field had focus
  var focused=document.activeElement?document.activeElement.id:null;
  buildDREScreen();
  // Restore focus
  if(focused){
    var el=document.getElementById(focused);
    if(el){el.focus();var len=el.value.length;el.setSelectionRange(len,len);}
  }
}

function dreCheckConfirm(){
  var fat=parseFld('dre-fat')||D.fat||0;
  var declarado=parseFld('dre-res')||D.sobraVal||0;
  var obs=D.dreObs||'';
  var needsJust=fat>0&&Math.abs((declarado-(fat>0?fat*.2:0))/Math.max(fat,1)*100)>20;
  needsJust=fat>0&&Math.abs(declarado)/Math.max(fat,1)*100>0&&(function(){
    var calc=0;// rough recalc
    return false; // defer to buildDREScreen's outrosPct
  })();
  // Simpler: check if inline obs textarea exists (means outrosPct>20)
  var inlineObs=document.getElementById('dre-obs-inline');
  if(inlineObs){
    var ok=inlineObs.value.trim().length>10;
    var btn=document.getElementById('dre-confirm-btn');
    var hint=document.getElementById('obs-hint-inline');
    if(btn){btn.disabled=!ok;btn.style.background=ok?'var(--green)':'rgba(255,255,255,.1)';btn.style.color=ok?'#000':'rgba(255,255,255,.3)';btn.style.cursor=ok?'pointer':'not-allowed';btn.textContent=ok?'CONFIRMAR E VER MINHA AVALIAÇÃO →':'PREENCHA A OBSERVAÇÃO ACIMA PARA CONTINUAR';}
    if(hint){hint.textContent=ok?'✓ Obrigado.':'Escreva pelo menos uma linha para continuar.';hint.style.color=ok?'var(--green)':'#f87171';}
    D.dreObs=inlineObs.value;
  }
}

function confirmDRE(v){
  if(!v) v=window._dreV;
  var obs=document.getElementById('dre-obs');
  if(obs) D.dreObs=obs.value;
  // Update D with final values from DRE
  D.dividas.forEach(function(d,i){var v=parseFld('pass-'+i);if(v) d.total=v;});
  D.fat      =parseFld('dre-fat')   ||D.fat;
  D.folha    =parseFld('dre-folha') ||D.folha;
  D.aluguelVal=parseFld('dre-alug') ||D.aluguelVal;
  D.custoFixo=parseFld('dre-cust')  ||D.custoFixo;
  D.marketingVal=parseFld('dre-mkt')||D.marketingVal;
  D.prolaboreVal=parseFld('dre-prol')||D.prolaboreVal;
  D.sobraVal =parseFld('dre-res')   ||D.sobraVal;
  D.estoque  =parseFld('bal-estoque')||D.estoque;
  D.ativosVal=parseFld('bal-equip') ||D.ativosVal;
  D.ctaReceberCli=parseFld('bal-arec')||D.ctaReceberCli;
  renderResult(v);
}



function renderResult(v){
  var ea=v.ebitda_a,mult=v.mult,vN=v.valorNegocio,vV=v.valorVenda,ps=v.porteiraSeca;
  var lo=v.lo,hi=v.hi,tA=v.totalAtivos,tD=v.totalDividas,gL=v.giroLiq;
  var opps=v.opps,wacc=v.wacc,SL=v.SELIC_ANUAL,cat=v.cat,sg=v.saudeGlobal||0;
  var pilares=[
    {n:'FINANCEIRO',s:v.p1||0},{n:'CRESCIMENTO',s:v.p2||0},{n:'COMERCIAL',s:v.p3||0},
    {n:'CLIENTES',s:v.p4||0},{n:'OPERAÇÃO',s:v.p5||0},{n:'SÓCIO-DEP.',s:v.p6||0},
    {n:'RISCO LEGAL',s:v.p7||0},{n:'BALANÇO',s:v.p8||0},{n:'MARCA',s:v.p9||0},{n:'TIME',s:v.p10||0}

function calcPF(){
  var s=50;
  if(D.sobraVal>0&&D.fat>0){var mg=D.sobraVal/D.fat;if(mg>.25)s+=30;else if(mg>.12)s+=15;else if(mg<.05)s-=15;}
  if(D.crescPct==='Cresceu acima de 10%')s+=15;else if(D.crescPct==='Cresceu até 10%')s+=10;
  if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%')s-=20;
  if(D.temDivida==='Sim, tem dívidas')s-=10;
  if(D.antecipa==='Sim, antecipo recebíveis')s-=22;
  if(D.churn==='Sim, receita muito recorrente')s+=12;
  if(D.churn==='Raramente'||D.churn==='Única transação por natureza')s-=8;
  return Math.max(5,Math.min(s,98));
}
function calcPCresc(){
  var s=50;
  if(D.crescPct==='Mais de 30%')s+=35;
  else if(D.crescPct==='Cresceu até 10%')s+=18;
  else if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%')s-=25;
  if(D.projecao==='Crescer acima de 15%')s+=18;
  else if(D.projecao==='Crescer até 15%')s+=8;
  else if(D.projecao==='Reduzir ou incerto')s-=22;
  if(D.crescPct==='Cresceu acima de 10%'||D.crescPct==='Cresceu até 10%')s+=10;
  if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%')s-=15;
  return Math.max(5,Math.min(s,98));
}
function calcPC(){
  var s=50;
  if(D.conc==='Menos de 20%')s+=25;if(D.conc==='Mais de 50%')s-=22;
  if(Array.isArray(D.canais)&&D.canais.length>=3)s+=12;
  if(D.b2x&&D.b2x.includes&&D.b2x.includes('Empresas (B2B)'))s+=8;
  return Math.max(5,Math.min(s,98));
}
function calcPClientes(){
  var s=50;
  if(D.churn==='Sim, receita muito recorrente')s+=28;
  if(D.churn==='Raramente'||D.churn==='Única transação por natureza')s-=18;
  if(D.conc==='Menos de 20%')s+=15;if(D.conc==='Mais de 50%')s-=15;
  return Math.max(5,Math.min(s,98));
}
function calcPO(){
  var s=50;
  if(D.ausencia==='Opera normalmente')s+=30;
  if(D.ausencia==='Opera com dificuldade')s-=10;
  if(D.ausencia==='Para ou perde muito')s-=28;
  if(D.pjs>=6)s-=18;else if(D.pjs>=3)s-=9;
  if(D.processosDocs==='Sim, tudo documentado')s+=20;
  if(D.processosDocs==='Não — está na cabeça das pessoas')s-=14;
  if(D.sistema==='ERP ou sistema completo')s+=12;
  if(D.sistema==='Nada formalizado')s-=8;
  if(D.alvaras==='Sim, tudo em dia')s+=8;
  if(D.alvaras==='Tem pendências')s-=14;
  return Math.max(5,Math.min(s,98));
}
function calcPSocio(){
  var s=50;
  if(D.ausencia==='Opera normalmente')s+=35;
  if(D.ausencia==='Para ou perde muito')s-=38;
  if(D.processosDocs==='Sim, tudo documentado')s+=15;
  if(D.equipePos==='Sim, toda a equipe ficaria')s+=12;
  if(D.equipePos==='Provavelmente não')s-=20;
  return Math.max(5,Math.min(s,98));
}
function calcPR(){
  var s=70;
  if(D.riscoLegal==='Sim, processos relevantes')s-=35;
  if(D.riscoLegal==='Sim, processos pequenos')s-=12;
  if(D.alvaras==='Tem pendências')s-=18;
  if(D.antecipa==='Sim, antecipo recebíveis')s-=12;
  if(D.temDivida==='Sim, tem dívidas')s-=10;
  return Math.max(5,Math.min(s,98));
}
function calcPBal(){
  var s=55;
  var tD=D.dividas.reduce(function(a,d){return a+(d.total||0);},0);
  var ebitda=(D.sobraVal||0)*12;
  if(ebitda>0&&tD<ebitda)s+=20;
  if(ebitda>0&&tD>ebitda*2)s-=20;
  if((D.estoque||0)>0||(D.ativosVal||0)>0)s+=10;
  if(D.alvaras==='Sim, tudo em dia')s+=10;
  return Math.max(5,Math.min(s,98));
}
function calcPMarca(){
  var s=45;
  if(Array.isArray(D.ativos)){
    if(D.ativos.some(function(a){return a.includes('Marca');}))s+=22;
    if(D.ativos.some(function(a){return a.includes('Reputação');}))s+=15;
    if(D.ativos.some(function(a){return a.includes('Contratos');}))s+=12;
    if(D.ativos.some(function(a){return a.includes('Tecnologia');}))s+=10;
  }
  if(D.diferencial&&D.diferencial.length>40)s+=10;
  return Math.max(5,Math.min(s,98));
}
function calcPTime(){
  var s=50;
  if(D.equipePos==='Sim, toda a equipe ficaria')s+=35;
  if(D.equipePos==='A maioria ficaria')s+=15;
  if(D.equipePos==='Provavelmente não')s-=30;
  var pjs=D.pjs||0;
  if(pjs>=6)s-=15;else if(pjs>=3)s-=8;
  return Math.max(5,Math.min(s,98));
}

.calc-val{font-size:20px;font-weight:600;color:var(--green);font-family:var(--fs);margin-top:4px}
/* WARN */
.warn-box{border:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.04);padding:12px 16px;margin:12px 0;font-size:12px;line-height:1.6;color:var(--amber)}
/* NOTE */
.note{border-left:2px solid rgba(16,185,129,.35);padding:8px 14px;font-size:11px;color:var(--dim);line-height:1.6;margin-bottom:14px}
/* BTNS */
.btn-row{display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-next{background:var(--green);color:#000;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;padding:14px 28px;border:none;cursor:pointer;transition:all .13s}
.btn-next:hover{background:#34d399}
.btn-next:active{transform:scale(.98)}
.btn-back{background:transparent;color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:14px 18px;border:1px solid var(--bdr);cursor:pointer;transition:all .13s}
.btn-back:hover{color:var(--ink)}
.btn-skip{background:transparent;color:var(--dim);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:14px 0;border:none;cursor:pointer;opacity:.6;transition:opacity .12s}
.btn-skip:hover{opacity:1}
/* INLINE EXPAND */
.expand{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--faint)}
/* RESULT */
.r-wrap{max-width:580px;width:100%;animation:fu .5s ease}
.r-top{border:1px solid rgba(16,185,129,.18);background:rgba(16,185,129,.035);padding:28px 32px;margin-bottom:12px}
.r-ey{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:8px}
.r-lbl{font-size:11px;color:var(--dim);margin-bottom:4px}
.r-val{font-family:var(--fs);font-size:clamp(32px,5vw,50px);color:var(--ink);line-height:1;margin-bottom:3px}
.r-range{font-size:12px;color:var(--dim)}
.r-warn{padding:12px 16px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);font-size:12px;color:var(--amber);margin-top:12px;line-height:1.65}
.r-pillars{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.pillar{padding:12px 14px;border:1px solid var(--faint);background:var(--bg2)}
.p-n{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:5px}
.p-bar{height:2px;background:var(--faint);margin-bottom:5px}
.p-fill{height:100%;background:var(--green);transition:width 1s ease .2s}
.p-sc{font-size:12px;color:var(--ink);font-weight:500}
.r-cta{border:1px solid var(--bdr);background:var(--bg2);padding:22px 26px;margin-top:12px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.btn-cal{background:var(--amber);color:#000;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:13px 20px;border:none;cursor:pointer;transition:all .13s;flex-shrink:0}
.btn-cal:hover{background:#fbbf24}
.saving-bar{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--faint);padding:9px 14px;font-size:9px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:6px;pointer-events:none}

function resetDiag(){
  if(!confirm('Apagar todas as respostas e reiniciar do começo?')) return;
  try{localStorage.removeItem('1n_diag');localStorage.removeItem('1n_diag_meta');}catch(e){}
  Object.keys(D).forEach(function(k){
    if(typeof D[k]==='number') D[k]=0;
    else if(Array.isArray(D[k])) D[k]=[];
    else D[k]='';
  });
  D.dividas=[];D.socios=[];D.urg=5;
  qIdx=0;_navHist=[];

function esc(s){return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function fmtM(v){if(!v||v===0)return '';return Number(v).toLocaleString('pt-BR');}
function parseMoney(s){if(!s)return 0;return parseInt((s+'').replace(/[^0-9]/g,''))||0;}
function maskInp(el){var v=parseMoney(el.value);el.value=v?v.toLocaleString('pt-BR'):'';}
function fmtBRL(v){if(!v||isNaN(v))return '—';if(v>=1e6)return 'R$ '+(v/1e6).toFixed(1).replace('.',',')+'M';if(v>=1e3)return 'R$ '+Math.round(v/1e3)+'K';return 'R$ '+v.toLocaleString('pt-BR');}

function card(sec,title,hint,body,validateFn){
  var q=QUESTIONS[qIdx];if(q)q._validate=validateFn||null;
  return '<div class="card" id="cur-card">'
    +'<div class="eyebrow">'+sec+'</div>'
    +'<h1 class="q">'+title+'</h1>'
    +(hint?'<p class="hint">'+hint+'</p>':'')
    +body
    +'</div>';
}

function opts(items,key,cols,onChange,multi){
  var html='<div class="opts '+cols+'">';
  items.forEach(function(item){
    var ico=item.length===3?item[0]:'';
    var title=item[ico?1:0];
    var sub=item[ico?2:1]||'';
    var isArr=multi&&Array.isArray(D[key]);
    var sel=isArr?D[key].includes(title):D[key]===title;
    var handler=multi?
      'onclick="selMulti(this,\''+key+'\''+(onChange?',function(){'+onChange.toString().replace(/"/g,"'")+'}'  :'')+')\"':
      'onclick="selOne(this,\''+key+'\',\''+title.replace(/'/g,"\\'")+'\')'+(onChange?';('+onChange.toString()+')()':'')+'"';
    html+='<button class="opt'+(sel?' sel':'')+'" '+handler+'>'
      +(ico?'<div class="opt-ico">'+ico+'</div>':'')
      +'<div><div class="opt-t">'+title+'</div>'+(sub?'<div class="opt-s">'+sub+'</div>':'')+'</div>'
      +'<div class="opt-ck">✓</div>'
      +'</button>';
  });
  html+='</div>';
  return html;
}

function selOne(el,key,val){
  D[key]=val;
  el.closest('.opts').querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel');});
  el.classList.add('sel');
  // Auto-advance: if current question only has this opts group and it validates, advance
  setTimeout(function(){
    var curQ=QUESTIONS[qIdx];
    if(!curQ) return;
    if(typeof curQ._validate==='function'&&curQ._validate()){
      // Only auto-advance if card has no text inputs or textareas (pure opts question)
      var card=document.getElementById('cur-card');
      if(card){
        var hasInputs=card.querySelectorAll('input[type=text],input[type=number],textarea,select').length;
        var hasExpand=card.querySelectorAll('.expand').length;
        if(!hasInputs&&!hasExpand) next();
      }
    }
  }, 320);
}
function selMulti(el,key){
  if(!Array.isArray(D[key]))D[key]=[];
  var title=el.querySelector('.opt-t').textContent.trim();
  if(el.classList.contains('sel')){el.classList.remove('sel');D[key]=D[key].filter(function(v){return v!==title;});}
  else{el.classList.add('sel');if(!D[key].includes(title))D[key].push(title);}
}

function ctrRow(id,lbl,sub){
  var v=typeof D[id]==='number'?D[id]:0;
  return '<div class="ctr-row"><div><div class="ctr-lbl">'+lbl+'</div><div style="font-size:10px;color:var(--dim)">'+sub+'</div></div>'
    +'<div class="ctr-ctrl">'
    +'<button class="ctr-btn" onclick="adjCtr(\''+id+'\',-1)">−</button>'
    +'<div class="ctr-v" id="ctr-'+id+'">'+v+'</div>'
    +'<button class="ctr-btn" onclick="adjCtr(\''+id+'\',1)">+</button>'
    +'</div></div>';
}
function adjCtr(id,delta){
  D[id]=Math.max(0,(D[id]||0)+delta);
  var el=document.getElementById('ctr-'+id);
  if(el) el.textContent=D[id];
}

function showMarkup(){
  var c=D.markupComp,v=D.markupVenda;
  var el=document.getElementById('markup-result');
  if(!el||!c||!v)return;
  var mg=((v-c)/v*100).toFixed(1);
  var mult=(v/c).toFixed(2);
  el.innerHTML='<div class="calc-box">Margem bruta: <strong style="color:var(--green)">'+mg+'%</strong> &nbsp;·&nbsp; Markup: <strong style="color:var(--green)">'+mult+'×</strong></div>';
}

// ═══════════════════════════════════════════════════

function renderQ(){
  buildQuestions();
  var q=QUESTIONS[qIdx];
  if(!q){calcResult();return;}
  document.getElementById('hdr-sec').textContent=q.section;

  var pct=Math.round((qIdx+1)/QUESTIONS.length*95);
  document.getElementById('prog').style.width=pct+'%';
  var pl=document.getElementById('prog-label');
  if(pl) pl.textContent=pct+'%';
  var wrap=document.getElementById('card-wrap');
  wrap.innerHTML=q.render();
  // restore slider
  if(q.id==='urg'){
    var sl=document.getElementById('q-urg');
    if(sl){sl.style.setProperty('--v',D.urg);sl.style.accentColor='var(--green)';}
  }
  saveLocal();
}

function next(){
  buildQuestions();
  var curQ=QUESTIONS[qIdx];
  if(curQ&&typeof curQ._validate==='function'&&!curQ._validate()){flash();return;}
  _navHist.push(qIdx);
  qIdx++;
  buildQuestions();
  if(qIdx>=QUESTIONS.length){calcResult();return;}
  renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}

function back(){
  var rs=document.getElementById('result-screen');
  if(rs&&rs.style.display!='none'&&rs.innerHTML.length>10) return;
  if(_navHist.length>0){qIdx=_navHist.pop();renderQ();window.scrollTo({top:0,behavior:'smooth'});}
}
function skip(){
  _navHist.push(qIdx);qIdx++;
  if(qIdx>=QUESTIONS.length){calcResult();return;}
  renderQ();window.scrollTo({top:0,behavior:'smooth'});
}
function flash(){
  var c=document.getElementById('cur-card');
  if(!c)return;
  c.style.animation='none';
  c.style.border='1px solid rgba(248,113,113,.5)';
  // Show inline error
  var existing = document.getElementById('flash-msg');
  if(existing) existing.remove();
  var msg = document.createElement('div');
  msg.id = 'flash-msg';
  msg.style.cssText = 'color:#f87171;font-size:11px;margin-top:10px;letter-spacing:.06em;animation:fu .2s ease';
  msg.textContent = '← Preencha este campo para continuar, ou clique em Pular';
  c.appendChild(msg);
  setTimeout(function(){
    c.style.border='';
    if(msg.parentNode) msg.remove();
  }, 2500);
}

function saveLocal(){
  try{localStorage.setItem('1n_diag',JSON.stringify({data:D,qIdx:qIdx,_navHist:_navHist}));}catch(e){}
  var bar=document.getElementById('saving-bar');
  bar.classList.add('show');
  setTimeout(function(){bar.classList.remove('show');},1400);
  document.getElementById('sdot').classList.add('on');
  document.getElementById('stxt').textContent='Salvo';
}

function calcIndiceValor(){
  // Use best multiple across all selected cats + subcat
  var _allCats=Array.isArray(D.cats)&&D.cats.length?D.cats:[D.cat||'Outro'];
  var base=_BASE_SUBCAT[D.subcat]||0;
  if(!base){_allCats.forEach(function(c){var b=_BASE_SETOR[c]||0;if(b>base)base=b;});}
  if(!base) base=2.5;
  // Prêmio de maturidade (max +40%)
  var premio=0;
  if(D.processosDocs==='Sim, tudo documentado') premio+=0.10;
  if(D.ausencia==='Opera normalmente') premio+=0.15;
  if(Array.isArray(D.ativos)){
    if(D.ativos.some(function(a){return a.includes('Contratos');})) premio+=0.10;
    if(D.ativos.some(function(a){return a.includes('Equipe');}))    premio+=0.08;
    if(D.ativos.some(function(a){return a.includes('Marca');}))     premio+=0.07;
    if(D.ativos.some(function(a){return a.includes('Tecnologia');})) premio+=0.06;
    if(D.ativos.some(function(a){return a.includes('Carteira');}))  premio+=0.08;
  }
  if(D.churn==='Sim, receita muito recorrente') premio+=0.12;
  if(D.crescPct==='Cresceu acima de 10%') premio+=0.08;
  premio=Math.min(premio,0.30);
  // Desconto de risco (max -35%)
  var risco=0;
  if(D.ausencia==='Para ou perde muito')           risco+=0.20;
  if(D.conc==='Mais de 50%')                       risco+=0.15;
  if(D.antecipa&&D.antecipa.includes('Sim'))        risco+=0.08;
  if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%')                          risco+=0.12;
  if(D.pjs>0&&(D.pjs/Math.max(1,D.clt+D.pjc+D.pjs))>0.3) risco+=0.06;
  if(D.alvaras==='Tem pendências')                 risco+=0.08;
  if(D.riscoLegal==='Sim, processos relevantes')   risco+=0.10;
  risco=Math.min(risco,0.30);
  return Math.max(1.2,Math.min(base*(1+premio-risco),7.5));
}


function calcResult(){
  // ── Tabela Selic de referência (atualizar trimestralmente)
  var SELIC_ANUAL = 13.25; // % ao ano - ref. Mar/2026

  // ── 1. EBITDA AJUSTADO ─────────────────────────────────────
  var sobra    = D.sobraVal || 0;
  var addback  = 0;
  if(D.prolaboreInc === 'Não, sai desse valor') addback += D.prolaboreVal || 0;
  if(D.sobraType === 'Antes'){
    var totalParc = D.dividas.reduce(function(s,d){return s+(d.parcela||0);},0);
    addback += totalParc;
  }
  var ebitda_m = sobra + addback;
  var ebitda_a = ebitda_m * 12;

  // ── 2. MÚLTIPLO SETORIAL ───────────────────────────────────
  var cat  = (Array.isArray(D.cats)&&D.cats[0])||D.cat||'Outro';
  var mult = calcIndiceValor();
  var multMax = Math.min(mult + 1.5, 7.5);

  // trend replaced by crescPct
  if(D.crescPct==='Cresceu acima de 10%'||D.crescPct==='Cresceu até 10%') mult+=0.3;
  if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%') mult-=0.4;
  if(D.ausencia === 'Opera normalmente')      mult += 0.5;
  if(D.ausencia === 'Para ou perde muito')    mult -= 0.6;
  if(D.conc === 'Menos de 20%')  mult += 0.3;
  if(D.conc === 'Mais de 50%')   mult -= 0.4;
  if(Array.isArray(D.ativos) && D.ativos.length >= 4) mult += 0.4;
  if(D.alvaras === 'Sim, tudo em dia') mult += 0.1;
  if(D.alvaras === 'Tem pendências')   mult -= 0.3;
  if(D.urg >= 8)  mult -= 0.3;  // urgência comprime
  mult = Math.max(1.5, Math.min(mult, 7));

  // ── 3. VALOR DO NEGÓCIO (Enterprise Value) ─────────────────
  var fatAnual = (D.fat || 0) * 12;
  var valOp    = ebitda_a > 0 ? ebitda_a * mult : fatAnual * 0.10 * mult;

  // ── 4. ATIVOS TANGÍVEIS ────────────────────────────────────
  var aEstoque  = D.estoque    || 0;
  var aFisicos  = (D.ativMaquinas||0)+(D.ativMoveisEq||0)+(D.ativVeiculos||0)+(D.ativTecnologia||0)+(D.ativReformas||0)+(D.ativosVal||0);
  var aImovel   = D.imovelVendaJunto === 'Sim' ? (D.imovelVendaVal || 0) : 0;
  var aReceber  = D.ctaReceberCli || 0;
  var totalAtivos = aEstoque + aFisicos + aImovel;

  // ── 5. PASSIVOS ────────────────────────────────────────────
  var totalDividas  = D.dividas.reduce(function(s,d){return s+(d.total||0);},0)
    + (D.passFinanciamento||0)+(D.passImpostos||0)+(D.passForns||0)+(D.passOutros||0);
  var ctaPagar      = D.ctaPagarForn || 0;
  var giroLiq       = aReceber - ctaPagar; // capital de giro líquido

  // ── 6. VALOR DO NEGÓCIO vs VALOR DE VENDA ─────────────────
  var valorNegocio = valOp + totalAtivos;          // Enterprise Value
  var valorVenda   = valorNegocio + giroLiq - totalDividas; // Equity Value
  valorVenda       = Math.max(0, valorVenda);

  // Porteira fechada: comprador assume as dívidas hoje
  var porteiraSeca = Math.max(0, valorNegocio - totalDividas);

  var lo = Math.max(0, valorVenda * 0.90);
  var hi = valorVenda * 1.10;

  // ── 7. PILARES ─────────────────────────────────────────────
  var p1=calcPF();var p2=calcPCresc();var p3=calcPC();var p4=calcPClientes();
  var p5=calcPO();var p6=calcPSocio();var p7=calcPR();var p8=calcPBal();
  var p9=calcPMarca();var p10=calcPTime();
  var saudeGlobal=Math.round(p1*.20+p2*.10+p3*.12+p4*.10+p5*.12+p6*.10+p7*.10+p8*.08+p9*.04+p10*.04);

  // ── 8. OPORTUNIDADES DE MELHORIA (pontos fracos) ──────────
  var opps = [];
  if(D.ausencia !== 'Opera normalmente')
    opps.push({t:'Reduzir sócio-dependência', d:'Negócios que operam sem o sócio valem até 50% mais. Processos documentados e equipe autônoma aumentam diretamente o múltiplo.'});
  if(D.urg >= 7)
    opps.push({t:'Diminuir urgência de venda', d:'Urgência percebida comprime o preço. Cada ponto de urgência reduz até 5-10% na negociação. Tempo é capital na M&A.'});
  if(D.conc === 'Mais de 50%')
    opps.push({t:'Diversificar base de clientes', d:'Concentração acima de 50% em poucos clientes é o fator de risco mais citado por compradores. Reduzir para <30% pode elevar o múltiplo em 0,5x.'});
  if(D.trend === 'Diminuíram')
    opps.push({t:'Retomar crescimento de receita', d:'Tendência de queda é o maior inibidor de múltiplos. Dois trimestres de crescimento podem recuperar 30-40% do valor.'});
  if(!Array.isArray(D.ativos) || !D.ativos.some(function(a){return a.includes('Processos');}))
    opps.push({t:'Documentar processos operacionais', d:'Empresas com manual de operação e processos documentados transmitem mais segurança ao comprador e exigem menos transição.'});
  if(totalDividas > ebitda_a * 2)
    opps.push({t:'Reduzir endividamento antes da venda', d:'Dívidas acima de 2× EBITDA comprimem diretamente o preço líquido. Quitação parcial antes da venda pode aumentar o retorno líquido.'});

  // ── 9. TAXA DE RISCO DE CAPITAL (WACC referência) ─────────
  var WACC_SETOR = {
    Tecnologia:18, Saúde:22, Educação:24, Alimentação:26,
    Varejo:28, Serviços:25, Indústria:26, Construção:28, Outro:25
  };
  var wacc = WACC_SETOR[cat] || 25;

  // Show DRE confirmation before result
  showResumo({
    ebitda_a:ebitda_a, mult:mult, multMax:multMax, fatAnual:fatAnual,
    valorNegocio:valorNegocio, valorVenda:valorVenda, porteiraSeca:porteiraSeca,
    lo:lo, hi:hi, totalAtivos:totalAtivos, totalDividas:totalDividas, giroLiq:giroLiq,
    p1:p1,p2:p2,p3:p3,p4:p4,p5:p5,p6:p6,p7:p7,p8:p8,p9:p9,p10:p10,saudeGlobal:saudeGlobal,
    opps:opps, wacc:wacc, SELIC_ANUAL:SELIC_ANUAL, cat:cat
  });
}

function voltarParaPerguntas(){
  var rs=document.getElementById('result-screen');
  rs.innerHTML='';rs.style.display='none';
  var nb=document.getElementById('nav-bar');
  if(nb) nb.style.display='flex';
  // Go back to last question
  if(_navHist.length>0){qIdx=_navHist[_navHist.length-1];_navHist.pop();}
  else{qIdx=Math.max(0,qIdx-1);}
  renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}


function showDREConfirm(v){
  document.getElementById('prog').style.width='100%';
  document.getElementById('hdr-sec').textContent='CONFIRME OS DADOS';
  document.getElementById('card-wrap').innerHTML='';
  var nb=document.getElementById('nav-bar');
  if(nb) nb.style.display='none';
  var rs=document.getElementById('result-screen');
  rs.style.display='block';
  rs.innerHTML='<div id="dre-wrap" style="max-width:580px;width:100%;margin:0 auto;padding:0 0 80px;animation:fu .4s ease"></div>';

  window._dreMode='mensal';
  buildDREScreen();
}

function parseFld(id){
  var el=document.getElementById(id);
  if(!el) return 0;
  return parseMoney(el.value)||0;
}

     'Manufatura / Produção local','Indústria com distribuição','Indústria com marca própria'].indexOf(D.subcat)>-1;
  var cmvBase=0;
  if(temCMV&&D.markupVenda>0&&D.markupComp>0){cmvBase=Math.round(fat/(D.markupVenda/D.markupComp));}
  else if(temCMV&&fat>0){var pctMap={'Varejo':.55,'Alimentação':.40,'Indústria':.45};var _catForCMV=_catsA.find(function(c){return pctMap[c];})||_catsArr.find(function(c){return pctMap[c];})||D.cat;cmvBase=Math.round(fat*(pctMap[_catForCMV]||.45));}
  var cmv = parseFld('dre-cmv')||cmvBase;

  var arec   =parseFld('bal-arec')   ||D.ctaReceberCli||0;

function dreRecalc(){
  // Save current values BEFORE rebuilding
  var passIds=D.dividas.map(function(d,i){return 'pass-'+i;});
  var ids=['dre-fat','dre-folha','dre-alug','dre-cust','dre-mkt','dre-prol','dre-cmv','dre-res','bal-estoque','bal-equip','bal-arec','bal-imovel'].concat(passIds);
  var vals={};
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el) vals[id]=parseMoney(el.value);
  });
  // Store in D
  if(vals['dre-fat'])   D.fat=vals['dre-fat'];
  if(vals['dre-folha']) D.folha=vals['dre-folha'];
  if(vals['dre-alug'])  D.aluguelVal=vals['dre-alug'];
  if(vals['dre-cust'])  D.custoFixo=vals['dre-cust'];
  if(vals['dre-mkt'])   D.marketingVal=vals['dre-mkt'];
  if(vals['dre-prol'])  D.prolaboreVal=vals['dre-prol'];
  if(vals['dre-res'])   D.sobraVal=vals['dre-res'];
  if(vals['bal-estoque'])D.estoque=vals['bal-estoque'];
  if(vals['bal-equip']) D.ativosVal=vals['bal-equip'];
  if(vals['bal-arec'])  D.ctaReceberCli=vals['bal-arec'];
  // Remember which field had focus
  var focused=document.activeElement?document.activeElement.id:null;
  buildDREScreen();
  // Restore focus
  if(focused){
    var el=document.getElementById(focused);
    if(el){el.focus();var len=el.value.length;el.setSelectionRange(len,len);}
  }
}

function dreCheckConfirm(){
  var fat=parseFld('dre-fat')||D.fat||0;
  var declarado=parseFld('dre-res')||D.sobraVal||0;
  var obs=D.dreObs||'';
  var needsJust=fat>0&&Math.abs((declarado-(fat>0?fat*.2:0))/Math.max(fat,1)*100)>20;
  needsJust=fat>0&&Math.abs(declarado)/Math.max(fat,1)*100>0&&(function(){
    var calc=0;// rough recalc
    return false; // defer to buildDREScreen's outrosPct
  })();
  // Simpler: check if inline obs textarea exists (means outrosPct>20)
  var inlineObs=document.getElementById('dre-obs-inline');
  if(inlineObs){
    var ok=inlineObs.value.trim().length>10;
    var btn=document.getElementById('dre-confirm-btn');
    var hint=document.getElementById('obs-hint-inline');
    if(btn){btn.disabled=!ok;btn.style.background=ok?'var(--green)':'rgba(255,255,255,.1)';btn.style.color=ok?'#000':'rgba(255,255,255,.3)';btn.style.cursor=ok?'pointer':'not-allowed';btn.textContent=ok?'CONFIRMAR E VER MINHA AVALIAÇÃO →':'PREENCHA A OBSERVAÇÃO ACIMA PARA CONTINUAR';}
    if(hint){hint.textContent=ok?'✓ Obrigado.':'Escreva pelo menos uma linha para continuar.';hint.style.color=ok?'var(--green)':'#f87171';}
    D.dreObs=inlineObs.value;
  }
}

function confirmDRE(v){
  if(!v) v=window._dreV;
  var obs=document.getElementById('dre-obs');
  if(obs) D.dreObs=obs.value;
  // Update D with final values from DRE
  D.dividas.forEach(function(d,i){var v=parseFld('pass-'+i);if(v) d.total=v;});
  D.fat      =parseFld('dre-fat')   ||D.fat;
  D.folha    =parseFld('dre-folha') ||D.folha;
  D.aluguelVal=parseFld('dre-alug') ||D.aluguelVal;
  D.custoFixo=parseFld('dre-cust')  ||D.custoFixo;
  D.marketingVal=parseFld('dre-mkt')||D.marketingVal;
  D.prolaboreVal=parseFld('dre-prol')||D.prolaboreVal;
  D.sobraVal =parseFld('dre-res')   ||D.sobraVal;
  D.estoque  =parseFld('bal-estoque')||D.estoque;
  D.ativosVal=parseFld('bal-equip') ||D.ativosVal;
  D.ctaReceberCli=parseFld('bal-arec')||D.ctaReceberCli;
  renderResult(v);
}

function calcPF(){
  var s=50;
  if(D.sobraVal>0&&D.fat>0){var mg=D.sobraVal/D.fat;if(mg>.25)s+=30;else if(mg>.12)s+=15;else if(mg<.05)s-=15;}
  if(D.crescPct==='Cresceu acima de 10%')s+=15;else if(D.crescPct==='Cresceu até 10%')s+=10;
  if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%')s-=20;
  if(D.temDivida==='Sim, tem dívidas')s-=10;
  if(D.antecipa==='Sim, antecipo recebíveis')s-=22;
  if(D.churn==='Sim, receita muito recorrente')s+=12;
  if(D.churn==='Raramente'||D.churn==='Única transação por natureza')s-=8;
  return Math.max(5,Math.min(s,98));
}
function calcPCresc(){
  var s=50;
  if(D.crescPct==='Mais de 30%')s+=35;
  else if(D.crescPct==='Cresceu até 10%')s+=18;
  else if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%')s-=25;
  if(D.projecao==='Crescer acima de 15%')s+=18;
  else if(D.projecao==='Crescer até 15%')s+=8;
  else if(D.projecao==='Reduzir ou incerto')s-=22;
  if(D.crescPct==='Cresceu acima de 10%'||D.crescPct==='Cresceu até 10%')s+=10;
  if(D.crescPct==='Caiu acima de 10%'||D.crescPct==='Caiu até 10%')s-=15;
  return Math.max(5,Math.min(s,98));
}

          setTimeout(function(){_gb.style.transition='opacity .7s';_gb.style.opacity='0';setTimeout(function(){_gb.remove();},800);},5000);
        }
      }
    }
  }catch(e){}

  // Read plano from URL
  try{
    var _urlP=new URLSearchParams(window.location.search).get('plano')||'';
    if(_urlP) window._planoAtual=_urlP;
    // Read lead metadata (nome/email from entrada.html)
    var _metaRaw=localStorage.getItem('1n_diag_meta');
    if(_metaRaw){
      var _meta=JSON.parse(_metaRaw);
      if(_meta.nome) window._userName=_meta.nome.split(' ')[0];
      if(_meta.email) window._userEmail=_meta.email;
    }
  }catch(e){}

  try{
    var saved=localStorage.getItem('1n_diag');
    if(saved){
      var p=JSON.parse(saved);
      // Version check — if old format (no tiposNeg field), clear and restart
      if(p.data && p.data.tiposNeg === undefined){
        localStorage.removeItem('1n_diag');
      } else {
        if(p.data)Object.assign(D,p.data);
        if(typeof p.qIdx==='number')qIdx=p.qIdx;
        if(Array.isArray(p._navHist))_navHist=p._navHist;
      }
    }
  }catch(e){}
  buildQuestions();
  renderQ();

  // Enter key advances
  document.addEventListener('keydown', function(e){
    if(e.key !== 'Enter') return;
    var tag = document.activeElement ? document.activeElement.tagName : '';
    // Don't fire on textarea or multi-line inputs
    if(tag === 'TEXTAREA') return;
    // Don't fire when result screen is showing
    var rs = document.getElementById('result-screen');
    if(rs && rs.style.display !== 'none' && rs.innerHTML.length > 10) return;
    e.preventDefault();
    next();
  });
})();
</script>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────────────
var _SB_URL='https://dbijmgqlcrgjlcfrastg.supabase.co';
var _SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';
var _sb=window.supabase&&window.supabase.createClient(_SB_URL,_SB_ANON);

// Stored result for saving after account creation
var _resultData=null;

// ── ctaFree — opens modal ────────────────────────────────────────────────
function ctaFree(){
  var m=document.getElementById('modal-conta');
  m.style.display='flex';
  m.style.alignItems='center';
  m.style.justifyContent='center';
  m.style.padding='24px';
  // Pre-fill email if available
  try{
    var lead=JSON.parse(localStorage.getItem('1n_diag_meta')||'{}');
    if(lead.email) document.getElementById('conta-email').value=lead.email;

  document.getElementById('conta-email').focus();

function fecharModal(){

async function criarContaEsalvar(){
  var email=document.getElementById('conta-email').value.trim();
  var pass=document.getElementById('conta-pass').value;
  var err=document.getElementById('conta-err');
  var btn=document.getElementById('btn-criar-conta');

  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    err.textContent='Informe um e-mail válido.';err.style.display='block';return;
  }
  if(pass.length<8){
    err.textContent='Senha deve ter no mínimo 8 caracteres.';err.style.display='block';return;
  }
  err.style.display='none';
  btn.textContent='Criando conta...';btn.disabled=true;

  if(!_sb){
    // Supabase not loaded yet — just redirect
    window.location.href='/portal-usuario.html';return;
  }

  // Sign up
  var signRes=await _sb.auth.signUp({
    email:email,password:pass,
    options:{data:{full_name:(D.nomeProprietario||D.nome||'')}}
  });

  if(signRes.error){
    // If already registered, try sign in
    if(signRes.error.message&&signRes.error.message.includes('already')){
      var inRes=await _sb.auth.signInWithPassword({email:email,password:pass});
      if(inRes.error){
        err.textContent='E-mail já cadastrado. Senha incorreta.';err.style.display='block';
        btn.textContent='Criar conta e publicar →';btn.disabled=false;return;
      }
      signRes.data=inRes.data;
    } else {
      err.textContent=signRes.error.message;err.style.display='block';
      btn.textContent='Criar conta e publicar →';btn.disabled=false;return;
    }
  }

  var uid=signRes.data&&signRes.data.user&&signRes.data.user.id;
  if(!uid){
    btn.textContent='Criar conta e publicar →';btn.disabled=false;
    window.location.href='/portal-usuario.html';return;
  }

  // Upsert public.usuarios
  await _sb.from('usuarios').upsert({
    id:uid,email:email,
    nome:D.nomeProprietario||D.nome||email.split('@')[0],
    tipo:'sell',updated_at:new Date().toISOString()
  });

  // Save negócio to DB
  await salvarNegocioDB(uid);

  btn.textContent='✓ Conta criada!';
  document.getElementById('conta-body').innerHTML='<div style="text-align:center;padding:20px 0">'
    +'<div style="font-size:32px;margin-bottom:12px">✅</div>'
    +'<div style="font-family:\'Syne\',sans-serif;font-size:14px;font-weight:800;color:#fff;margin-bottom:8px">Publicação solicitada!</div>'
    +'<div style="font-size:11px;color:rgba(255,255,255,.45);text-transform:none;letter-spacing:normal;line-height:1.65;margin-bottom:20px">Nossa equipe entrará em contato em até 48h para finalizar seu anúncio. Você pode acompanhar o status no portal.</div>'
    +'<a href="/portal-usuario.html" style="display:block;background:var(--green);color:#000;font-family:\'Syne\',sans-serif;font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;padding:13px;text-decoration:none;text-align:center">Acessar meu portal →</a>'
    +'</div>';
}

async function salvarNegocioDB(uid){
  if(!_sb||!uid) return;
  try{
    // Build negócio object from D
    var plano=(localStorage.getItem('1n_plano')||'gratuito');
    var cat=Array.isArray(D.cats)&&D.cats[0]?D.cats[0]:(D.cat||'');
    var subcat=D.subcat||'';
    var negData={
      vendedor_id:uid,
      nome:(D.nomeEmpresa||subcat||cat||'Meu negócio'),
      categoria:cat,
      subcategoria:subcat,
      cidade:D.cidade||'',
      estado:D.estado||'',
      regime_fiscal:D.regime==='Simples Nacional'?'simples':D.regime==='Lucro Presumido'?'presumido':D.regime==='Lucro Real'?'real':null,
      faturamento_anual:(D.fat||0)*12,
      resultado_liquido_mensal:D.sobraVal||0,
      aluguel_mensal:D.aluguelVal||0,
      folha_pagamento:D.folha||0,
      funcionarios:(D.clt||0)+(D.pjc||0)+(D.pjs||0),
      motivo_venda:D.motivo||'',
      urgencia:String(D.urg||5),
      status:'em_avaliacao',
      plano:plano,
      comissao_pct:plano==='guiado'?5:10,
      score_saude:0,
      ativos_json:JSON.stringify({
        maquinas:D.ativMaquinas||0,moveisEq:D.ativMoveisEq||0,
        veiculos:D.ativVeiculos||0,ti:D.ativTecnologia||0,
        reformas:D.ativReformas||0,estoque:D.estoque||0
      }),
      created_at:new Date().toISOString(),
      updated_at:new Date().toISOString()
    };
    // Add price expectations
    if(D.preco) negData.preco_pedido=parseMoney(D.preco)||null;
    
    var res=await _sb.from('negocios').insert(negData).select().single();
    if(res.data&&res.data.id){
      try{localStorage.setItem('1n_neg_id',res.data.id);}catch(e){}

      // Notify admin — insert into admin_agenda as free submission
      var lead={};
      try{lead=JSON.parse(localStorage.getItem('1n_diag_meta')||'{}');}catch(e){}
      await _sb.from('admin_agenda').insert({
        tipo: 'gratuito',
        status: 'pendente',
        nome_cliente: negData.nome||'—',
        email_cliente: lead.email||'',
        whatsapp_cliente: D.whatsapp||'',
        pagamento_valor: 0,
        pagamento_status: 'gratuito',
        notas_admin: 'Publicação gratuita solicitada · '
          +(cat||'')+(negData.cidade?' · '+negData.cidade:'')
          +' · Fat: R$'+Math.round((D.fat||0)).toLocaleString('pt-BR')+'/mês'
          +' · Score: '+(D._saudeGlobal||'—'),
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      });
    }
    return res;
  }catch(e){console.error('salvarNegocioDB',e);}
}
</script>
