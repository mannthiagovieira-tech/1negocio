<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrando · 1Negócio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c0a;color:rgba(255,255,255,.88);font-family:'Courier New',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.wrap{padding:40px}
.logo{font-size:20px;font-weight:800;margin-bottom:32px;letter-spacing:.05em}
.logo em{color:#10b981;font-style:normal}
.msg{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:8px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#10b981;margin:0 3px;animation:blink 1.2s ease infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.err{color:#f87171;font-size:12px;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><em>1</em>NEGÓCIO</div>
  <div class="msg">Verificando sua conta</div>
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  <div class="err" id="err">Erro ao autenticar. <a href="/portal-usuario.html" style="color:#10b981">Tentar novamente</a></div>
</div>

<script>
var SB_URL = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

var sb = window.supabase.createClient(SB_URL, SB_ANON);

sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_IN' && session) {
    window.location.href = '/portal-usuario.html';
  }
});

// Também tenta pegar sessão existente
sb.auth.getSession().then(function(res) {
  if (res.data && res.data.session) {
    window.location.href = '/portal-usuario.html';
  } else {
    // Aguarda 3 segundos (token pode demorar para processar)
    setTimeout(function() {
      sb.auth.getSession().then(function(res2) {
        if (res2.data && res2.data.session) {
          window.location.href = '/portal-usuario.html';
        } else {
          document.getElementById('err').style.display = 'block';
        }
      });
    }, 3000);
  }
});
</script>
</body>
</html>
