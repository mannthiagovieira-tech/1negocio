<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Negócio · Gerenciador de Anúncios</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f7f5;--wh:#fff;--green:#10b981;--gd:#166534;--gm:#059669;--gbg:#f0faf5;--gbg2:#e6f7ef;--tx:#1a1a18;--tl:#666;--tm:#999;--am:#f59e0b;--rd:#f87171;--line:rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;font-size:13px;line-height:1.6}
.topbar{background:var(--gd);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff}.topbar-logo span{color:var(--green)}
.topbar-r{display:flex;gap:16px;align-items:center}
.topbar-link{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none}.topbar-link:hover{color:#fff}
.topbar-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5)}
.page{max-width:1100px;margin:0 auto;padding:24px 20px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.toolbar-left{display:flex;align-items:center;gap:10px}
.toolbar-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--gd)}
.toolbar-count{font-size:11px;color:var(--tm);background:var(--gbg);padding:3px 10px;border-radius:10px}
.btn-new{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;background:var(--green);color:#fff;border:none;cursor:pointer}.btn-new:hover{background:var(--gm)}
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.f-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border:1px solid var(--line);background:var(--wh);color:var(--tm);cursor:pointer}.f-btn.on{background:var(--gd);color:#fff;border-color:var(--gd)}
.tbl{width:100%;border-collapse:collapse;background:var(--wh)}
.tbl th{font-size:8px;letter-spacing:2px;text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:2px solid var(--gbg2);color:var(--tm);position:sticky;top:48px;background:var(--wh);z-index:10}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);font-size:11px}
.tbl tr{cursor:pointer}.tbl tr:hover td{background:var(--gbg)}
.td-nome{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--gd);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-cat{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--gm)}
.badge{font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block}
.b-publicado{background:var(--gbg2);color:var(--gd)}.b-em_avaliacao{background:#fef3c7;color:#92400e}.b-rascunho{background:#f3f4f6;color:#6b7280}.b-pausado,.b-standby{background:#fef2f2;color:#991b1b}
.b-oportunidade{background:var(--gbg2);color:var(--gd)}.b-justo{background:#f0f4ff;color:#3b82f6}.b-acima{background:#fef3c7;color:#92400e}.b-abaixo{background:#fef2f2;color:#991b1b}
.td-int{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--green)}
/* DETAIL */
.detail{display:none;background:var(--wh);border:1px solid var(--line);margin-bottom:20px}.detail.open{display:block}
.det-header{background:var(--gbg);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.det-title{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--gd)}
.det-close{background:none;border:none;font-size:20px;color:var(--tm);cursor:pointer}
.det-body{padding:20px 24px}
.det-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.det-card{padding:12px;background:var(--bg);border:1px solid var(--line)}
.det-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--tm);margin-bottom:3px}
.det-val{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--gd)}.det-val.sm{font-size:12px}
.det-sub{font-size:9px;color:var(--tm);margin-top:2px}
.det-section{margin-bottom:20px}
.det-sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--gd);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.det-links{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.det-link{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;border:1px solid var(--line);color:var(--tl);text-decoration:none}.det-link:hover{border-color:var(--green);color:var(--gd)}
.det-link.wpp{border-color:var(--gm);color:var(--gm)}.det-link.wpp:hover{background:var(--gm);color:#fff}
.det-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.03);font-size:11px}.det-row:last-child{border-bottom:none}
.det-row-l{color:var(--tm)}.det-row-r{color:var(--tx);font-weight:500}
.int-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.int-tbl th{font-size:8px;letter-spacing:2px;text-transform:uppercase;text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);color:var(--tm)}
.int-tbl td{padding:6px 8px;border-bottom:1px solid rgba(0,0,0,.03)}
.int-obs{width:100%;padding:4px 8px;border:1px solid var(--line);font-family:'DM Mono',monospace;font-size:10px;background:var(--bg);resize:none;height:28px}
/* EDIT */
.edit-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.edit-full{grid-column:1/-1}
.edit-grp{display:flex;flex-direction:column;gap:3px}
.edit-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--tm)}
.edit-inp{padding:8px 10px;border:1px solid var(--line);background:var(--bg);font-family:'DM Mono',monospace;font-size:11px;color:var(--tx)}.edit-inp:focus{outline:none;border-color:var(--green)}
textarea.edit-inp{min-height:60px;resize:vertical}
.edit-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--line)}
.btn-s{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;border:none;cursor:pointer}
.btn-save{background:var(--green);color:#fff}.btn-pub{background:var(--gd);color:#fff}.btn-pause{background:var(--am);color:#fff}.btn-del{background:var(--rd);color:#fff}.btn-cancel{background:var(--wh);color:var(--tl);border:1px solid var(--line)}
.char-count{font-size:9px;color:var(--tm);text-align:right;margin-top:2px}.char-count.over{color:var(--rd)}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-search{background:var(--wh);max-width:500px;width:100%;padding:28px}
.modal-search h3{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--gd);margin-bottom:16px}
.modal-search input{width:100%;padding:12px;border:1px solid var(--line);font-family:'DM Mono',monospace;font-size:14px;margin-bottom:12px}.modal-search input:focus{outline:none;border-color:var(--green)}
.search-result{padding:10px;border:1px solid var(--line);margin-bottom:6px;cursor:pointer}.search-result:hover{background:var(--gbg);border-color:var(--green)}
.sr-nome{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--gd)}.sr-meta{font-size:10px;color:var(--tm)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--gd);color:#fff;padding:12px 20px;font-size:11px;letter-spacing:1px;z-index:300;display:none}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-logo"><span>1</span>NEGÓCIO</div><div class="topbar-r"><a href="/laudo-admin.html" class="topbar-link">Laudo admin</a><a href="/" class="topbar-link">Home</a><div class="topbar-badge">Gerenciador de Anúncios</div></div></div>
<div class="page">
  <div class="toolbar"><div class="toolbar-left"><div class="toolbar-title">Anúncios</div><div class="toolbar-count" id="count">—</div></div><button class="btn-new" onclick="abrirBusca()">+ Criar anúncio</button></div>
  <div class="filters" id="filters"></div>
  <table class="tbl"><thead><tr><th>Título</th><th>Categoria</th><th>Local</th><th>Fat. anual</th><th>ISE</th><th>Avaliação 1N</th><th>Preço</th><th>Tag</th><th>Plano</th><th>Status</th><th>Int.</th></tr></thead><tbody id="tbody"></tbody></table>
  <div class="detail" id="detail"></div>
</div>
<div class="modal-overlay" id="modal-busca" onclick="if(event.target===this)fecharBusca()">
  <div class="modal-search"><h3>Criar anúncio a partir de diagnóstico</h3><input id="busca-input" placeholder="Código (1N-XXXXX) ou nome" oninput="buscar()"><div id="busca-results"></div><div style="margin-top:16px;text-align:right"><button class="btn-s btn-cancel" onclick="fecharBusca()">Cancelar</button></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const SB='https://dbijmgqlcrgjlcfrastg.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const TITULO_MAX=60;
let allData=[],interesses=[],calcCache={},activeFilter='todos',openId=null;
function brl(v){return v?'R$ '+Number(v).toLocaleString('pt-BR'):'—'}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',3000)}
function tagPreco(p,v){if(!p||!v)return{t:'—',c:''};const d=((v-p)/v*100);if(d>=15)return{t:'Oportunidade',c:'b-oportunidade'};if(d>=-5)return{t:'Justo',c:'b-justo'};if(d>=-20)return{t:'Acima',c:'b-acima'};return{t:'Muito acima',c:'b-abaixo'}}
const catMap={'servicos_locais':'Serviços','servicos_empresas':'Serviços','alimentacao':'Alimentação','saude':'Saúde','beleza_estetica':'Saúde & Estética','beleza_saude':'Saúde & Estética','educacao':'Educação','varejo':'Varejo & Moda','tecnologia':'Tecnologia / SaaS','tech':'Tecnologia / SaaS','industria':'Indústria','construcao':'Construção','hospedagem':'Hospedagem','logistica':'Logística','pet':'Saúde','comercio':'Varejo & Moda'};
const CATS=['Alimentação','Saúde','Saúde & Estética','Educação','Varejo & Moda','Serviços','Tecnologia / SaaS','Indústria','Construção','Hospedagem','Logística'];
const STATUSES=['rascunho','em_avaliacao','aguardando_aprovacao','publicado','pausado','standby','encerrado'];

async function load(){
  try{
    const r=await fetch(SB+'/rest/v1/negocios?select=id,codigo,codigo_diagnostico,titulo_anuncio,nome,categoria,cidade,estado,faturamento_anual,score_saude,valor_1n,preco_pedido,status,plano_comissao,comissao_pct,created_at&order=created_at.desc&limit=300',{headers:H});
    const d=await r.json(); allData=Array.isArray(d)?d:[];
  }catch(e){allData=[]}
  try{
    const r=await fetch(SB+'/rest/v1/interesses?select=*&order=created_at.desc',{headers:H});
    const d=await r.json(); interesses=Array.isArray(d)?d:[];
  }catch(e){interesses=[]}
  renderFilters();renderTable();
}

function renderFilters(){
  const s=[...new Set(allData.map(d=>d.status))].filter(Boolean);
  document.getElementById('filters').innerHTML='<button class="f-btn on" data-f="todos" onclick="setFilter(this)">Todos</button>'+s.map(x=>'<button class="f-btn" data-f="'+x+'" onclick="setFilter(this)">'+x+'</button>').join('');
}
function setFilter(el){document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');activeFilter=el.dataset.f;renderTable()}

function renderTable(){
  const f=activeFilter==='todos'?allData:allData.filter(d=>d.status===activeFilter);
  document.getElementById('count').textContent=f.length+' de '+allData.length;
  document.getElementById('tbody').innerHTML=f.map(d=>{
    const t=d.titulo_anuncio||d.nome||d.codigo_diagnostico||'—';
    const tag=tagPreco(d.preco_pedido,d.valor_1n);
    const ni=interesses.filter(i=>i.negocio_codigo===(d.codigo||d.codigo_diagnostico)).length;
    const p=d.plano_comissao||'gratuito';
    return '<tr onclick="abrirDetalhe(\''+d.id+'\')"><td class="td-nome">'+t+'</td><td class="td-cat">'+(catMap[d.categoria]||d.categoria||'—')+'</td><td>'+(d.cidade||'—')+'/'+(d.estado||'—')+'</td><td>'+brl(d.faturamento_anual)+'</td><td>'+(d.score_saude||'—')+'</td><td>'+brl(d.valor_1n)+'</td><td>'+brl(d.preco_pedido)+'</td><td><span class="badge '+tag.c+'">'+tag.t+'</span></td><td><span class="badge '+(p==='guiado'?'b-publicado':'b-rascunho')+'">'+p+(d.comissao_pct?' '+d.comissao_pct+'%':'')+'</span></td><td><span class="badge b-'+(d.status||'rascunho')+'">'+(d.status||'—')+'</span></td><td class="td-int">'+(ni||'—')+'</td></tr>';
  }).join('');
}

// ── DETALHE ──
async function abrirDetalhe(id){
  openId=id;
  // Buscar negócio
  const r1=await fetch(SB+'/rest/v1/negocios?id=eq.'+id+'&select=*',{headers:H});
  const d1=await r1.json(); if(!Array.isArray(d1)||!d1[0])return;
  const n=d1[0], dj=n.dados_json||{};
  
  // Buscar calc_json
  let cj={};
  try{
    const r2=await fetch(SB+'/rest/v1/laudos_completos?slug=eq.'+id+'&select=calc_json',{headers:H});
    const d2=await r2.json(); if(Array.isArray(d2)&&d2[0]) cj=d2[0].calc_json||{};
  }catch(e){}
  calcCache[id]=cj;
  
  // ── DADOS RESOLVIDOS (prioridade: tabela > calc_json > dados_json) ──
  const fat    = n.faturamento_anual || dj.fat_anual || (cj.fat_mensal?cj.fat_mensal*12:0) || 0;
  const fatM   = cj.fat_mensal || dj.fat_mensal || (fat/12) || 0;
  const ro     = n.resultado_liquido_mensal || cj.ro_mensal || dj.ro_mensal || dj.resultado_op || 0;
  const margem = n.margem_ebitda || (fatM>0?Math.round(Number(ro)/Number(fatM)*1000)/10:0);
  const ise    = n.score_saude || cj.ise_total || dj.ise_parcial || 0;
  const val1n  = n.valor_1n || cj.valor_venda || 0;
  const preco  = n.preco_pedido || dj.expectativa_val || 0;
  const pl     = n.patrimonio_liquido || (cj.totAtiv?cj.totAtiv-(cj.totPass||0):0) || ((dj.total_ativos||0)-(dj.total_passivos||0)) || 0;
  const rec    = n.recorrencia_pct || cj.recorrencia || 0;
  const anos   = n.anos_existencia || cj.anos || dj.cnpj_anos || 0;
  const funcs  = n.num_funcionarios || ((dj.clt_qtd||0)+(dj.pj_qtd||0)) || 0;
  const atr    = cj.atr_score || 0;
  const fator  = cj.fator || 0;
  const ints   = interesses.filter(i=>i.negocio_codigo===(n.codigo||n.codigo_diagnostico));
  const tag    = tagPreco(preco,val1n);
  const wpp    = dj.whatsapp?'https://wa.me/55'+dj.whatsapp.replace(/\D/g,''):'#';
  const titulo = n.titulo_anuncio||dj.nome_negocio||n.nome||'—';
  const catAtual= catMap[n.categoria]||n.categoria||catMap[dj.setor]||dj.setor||'';
  const validoAte=n.anuncio_valido_ate?new Date(n.anuncio_valido_ate).toLocaleDateString('pt-BR'):'Não definido';
  const comPct = n.comissao_pct||(n.plano_comissao==='guiado'?5:10);
  const iseNome= ise>=80?'Sólido':ise>=65?'Estável':ise>=50?'Operacional':ise>=30?'Em desenvolvimento':'Fragilizado';

  const det=document.getElementById('detail');
  det.className='detail open';
  det.innerHTML=`
  <div class="det-header"><div class="det-title">${titulo}</div><button class="det-close" onclick="fecharDetalhe()">&times;</button></div>
  <div class="det-body">
  <div class="det-links">
    <a href="${wpp}" target="_blank" class="det-link wpp">WhatsApp ${dj.nome_contato||'vendedor'}</a>
    <a href="/laudo-completo.html?id=${n.id}" target="_blank" class="det-link">Laudo gratuito</a>
    <a href="/laudo-pago.html?id=${n.id}" target="_blank" class="det-link">Laudo pago</a>
    <a href="/laudo-admin.html?id=${n.id}" target="_blank" class="det-link">Laudo admin</a>
  </div>
  <div class="det-grid">
    <div class="det-card"><div class="det-label">Fat. anual</div><div class="det-val">${brl(fat)}</div><div class="det-sub">${brl(fatM)}/mês</div></div>
    <div class="det-card"><div class="det-label">RO mensal</div><div class="det-val">${brl(ro)}</div><div class="det-sub">Margem ${margem}%</div></div>
    <div class="det-card"><div class="det-label">ISE</div><div class="det-val">${ise}/100</div><div class="det-sub">${iseNome}</div></div>
    <div class="det-card"><div class="det-label">Atratividade</div><div class="det-val sm">${Number(atr).toFixed(1)}/10</div></div>
    <div class="det-card"><div class="det-label">Avaliação 1N</div><div class="det-val">${brl(val1n)}</div><div class="det-sub">Múltiplo ${Number(fator).toFixed(2)}×</div></div>
    <div class="det-card"><div class="det-label">Preço pedido</div><div class="det-val">${brl(preco)}</div><div class="det-sub"><span class="badge ${tag.c}">${tag.t}</span></div></div>
    <div class="det-card"><div class="det-label">Patrimônio líq.</div><div class="det-val">${brl(pl)}</div></div>
    <div class="det-card"><div class="det-label">Válido até</div><div class="det-val sm">${validoAte}</div></div>
    <div class="det-card"><div class="det-label">Recorrência</div><div class="det-val sm">${rec}%</div></div>
    <div class="det-card"><div class="det-label">Anos</div><div class="det-val sm">${anos}</div></div>
    <div class="det-card"><div class="det-label">Funcionários</div><div class="det-val sm">${funcs}</div></div>
    <div class="det-card"><div class="det-label">Motivação</div><div class="det-val sm">${dj.motivacao||'—'}</div></div>
  </div>

  <div class="det-section"><div class="det-sec-title">Editar anúncio</div>
    <div class="edit-row">
      <div class="edit-grp edit-full"><div class="edit-lbl">Título (máx ${TITULO_MAX} chars) <button class="btn-s" style="font-size:8px;padding:3px 8px;background:var(--green);color:#fff;margin-left:8px" onclick="gerarTitulos('${n.id}')">Gerar sugestões</button></div><input class="edit-inp" id="e-titulo" maxlength="${TITULO_MAX}" value="${n.titulo_anuncio||''}" oninput="updCC()"><div class="char-count" id="cc">${(n.titulo_anuncio||'').length}/${TITULO_MAX}</div><div id="sug-titulo" style="display:none;margin-top:6px"></div></div>
    </div>
    <div class="edit-row">
      <div class="edit-grp"><div class="edit-lbl">Categoria</div><select class="edit-inp" id="e-cat">${CATS.map(c=>'<option'+(c===catAtual?' selected':'')+'>'+c+'</option>').join('')}</select></div>
      <div class="edit-grp"><div class="edit-lbl">Status</div><select class="edit-inp" id="e-status">${STATUSES.map(s=>'<option'+(s===n.status?' selected':'')+'>'+s+'</option>').join('')}</select></div>
      <div class="edit-grp"><div class="edit-lbl">Plano</div><select class="edit-inp" id="e-plano"><option value="gratuito"${(n.plano_comissao||'gratuito')==='gratuito'?' selected':''}>Gratuito</option><option value="guiado"${n.plano_comissao==='guiado'?' selected':''}>Guiado R$588</option></select></div>
    </div>
    <div class="edit-row">
      <div class="edit-grp"><div class="edit-lbl">Comissão %</div><input class="edit-inp" id="e-com" type="number" step="0.5" value="${comPct}"></div>
      <div class="edit-grp"><div class="edit-lbl">Preço pedido (vendedor)</div><input class="edit-inp" id="e-preco" type="number" value="${preco||''}"></div>
      <div class="edit-grp"><div class="edit-lbl">Avaliação 1N</div><input class="edit-inp" id="e-val1n" type="number" value="${val1n||''}"></div>
    </div>
    <div class="edit-row">
      <div class="edit-grp"><div class="edit-lbl">Score ISE (0-100)</div><input class="edit-inp" id="e-score" type="number" value="${ise||''}"></div>
      <div class="edit-grp"><div class="edit-lbl">Margem %</div><input class="edit-inp" id="e-marg" type="number" value="${margem||''}"></div>
      <div class="edit-grp"><div class="edit-lbl">RO mensal</div><input class="edit-inp" id="e-ro" type="number" value="${ro||''}"></div>
    </div>
    <div class="edit-row">
      <div class="edit-grp"><div class="edit-lbl">Patrimônio líq.</div><input class="edit-inp" id="e-pl" type="number" value="${pl||''}"></div>
      <div class="edit-grp"><div class="edit-lbl">Recorrência %</div><input class="edit-inp" id="e-rec" type="number" value="${rec||''}"></div>
      <div class="edit-grp"><div class="edit-lbl">Anos</div><input class="edit-inp" id="e-anos" type="number" value="${anos||''}"></div>
    </div>
    <div class="edit-row">
      <div class="edit-grp"><div class="edit-lbl">Funcionários</div><input class="edit-inp" id="e-funcs" type="number" value="${funcs||''}"></div>
      <div class="edit-grp"><div class="edit-lbl">Fat. anual</div><input class="edit-inp" id="e-fat" type="number" value="${fat||''}"></div>
      <div class="edit-grp"><div class="edit-lbl">Modelo</div><input class="edit-inp" id="e-modelo" value="${n.modelo_negocio||dj.modelo_atuacao_multi||''}"></div>
    </div>
    <div class="edit-row"><div class="edit-grp edit-full"><div class="edit-lbl">Descrição (anônima)</div><textarea class="edit-inp" id="e-desc">${n.descricao||dj.descricao_final||''}</textarea></div></div>
    <div class="edit-row"><div class="edit-grp edit-full"><div class="edit-lbl">Notas internas (só admin)</div><textarea class="edit-inp" id="e-notas" placeholder="Observações...">${n.notas_admin||''}</textarea></div></div>
    <div class="edit-actions">
      <button class="btn-s btn-del" onclick="excluir('${n.id}')">Excluir</button>
      ${n.status==='publicado'?'<button class="btn-s btn-pause" onclick="mudarStatus(\''+n.id+'\',\'pausado\')">Pausar</button>':'<button class="btn-s btn-pub" onclick="mudarStatus(\''+n.id+'\',\'publicado\')">Publicar</button>'}
      <button class="btn-s btn-save" onclick="salvar('${n.id}')">Salvar</button>
    </div>
  </div>

  <div class="det-section"><div class="det-sec-title">Interesses recebidos (${ints.length})</div>
    ${ints.length?'<table class="int-tbl"><thead><tr><th>Data</th><th>Nome</th><th>WhatsApp</th><th>Status</th><th>Observação</th></tr></thead><tbody>'+ints.map(i=>'<tr><td>'+new Date(i.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})+'</td><td style="font-weight:500">'+i.nome+'</td><td><a href="https://wa.me/55'+(i.whatsapp||'').replace(/\\D/g,'')+'" target="_blank" style="color:var(--gm)">'+i.whatsapp+'</a></td><td><span class="badge '+(i.status==='contatado'?'b-publicado':'b-em_avaliacao')+'">'+(i.status||'novo')+'</span></td><td><textarea class="int-obs" onblur="salvarObs(\''+i.id+'\',this.value)">'+(i.observacao_admin||'')+'</textarea></td></tr>').join('')+'</tbody></table>':'<div style="font-size:11px;color:var(--tm);padding:8px 0">Nenhum interesse recebido.</div>'}
  </div>

  <div class="det-section"><div class="det-sec-title">Contato do vendedor</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div class="det-row"><span class="det-row-l">Contato</span><span class="det-row-r">${dj.nome_contato||'—'}</span></div>
      <div class="det-row"><span class="det-row-l">WhatsApp</span><span class="det-row-r">${dj.whatsapp||'—'}</span></div>
      <div class="det-row"><span class="det-row-l">Expectativa</span><span class="det-row-r">${brl(dj.expectativa_val)}</span></div>
      <div class="det-row"><span class="det-row-l">Código</span><span class="det-row-r">${n.codigo_diagnostico||'—'}</span></div>
      <div class="det-row"><span class="det-row-l">Empresa</span><span class="det-row-r"><a href="/laudo-admin.html?id=${n.id}" target="_blank" style="color:var(--green)">Ver no laudo admin →</a></span></div>
    </div>
  </div>
  </div>`;
  det.scrollIntoView({behavior:'smooth',block:'start'});
}
function fecharDetalhe(){document.getElementById('detail').className='detail';openId=null}
function updCC(){const v=document.getElementById('e-titulo').value;const el=document.getElementById('cc');el.textContent=v.length+'/'+TITULO_MAX;el.className=v.length>TITULO_MAX?'char-count over':'char-count'}

async function salvar(id){
  const st=document.getElementById('e-status').value;
  const body={
    titulo_anuncio:document.getElementById('e-titulo').value.slice(0,TITULO_MAX)||null,
    categoria:document.getElementById('e-cat').value||null,
    status:st,
    plano_comissao:document.getElementById('e-plano').value||'gratuito',
    comissao_pct:parseFloat(document.getElementById('e-com').value)||10,
    preco_pedido:parseFloat(document.getElementById('e-preco').value)||null,
    valor_1n:parseFloat(document.getElementById('e-val1n').value)||null,
    score_saude:parseInt(document.getElementById('e-score').value)||null,
    margem_ebitda:parseFloat(document.getElementById('e-marg').value)||null,
    resultado_liquido_mensal:parseFloat(document.getElementById('e-ro').value)||null,
    patrimonio_liquido:parseFloat(document.getElementById('e-pl').value)||null,
    recorrencia_pct:parseFloat(document.getElementById('e-rec').value)||null,
    anos_existencia:parseInt(document.getElementById('e-anos').value)||null,
    num_funcionarios:parseInt(document.getElementById('e-funcs').value)||null,
    faturamento_anual:parseFloat(document.getElementById('e-fat').value)||null,
    modelo_negocio:document.getElementById('e-modelo').value||null,
    descricao:document.getElementById('e-desc').value||null,
    notas_admin:document.getElementById('e-notas').value||null,
  };
  if(st==='publicado'){body.publicado_em=new Date().toISOString();const dt=new Date();dt.setFullYear(dt.getFullYear()+1);body.anuncio_valido_ate=dt.toISOString()}
  const r=await fetch(SB+'/rest/v1/negocios?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify(body)});
  if(r.ok){toast('Salvo');load().then(()=>{if(openId)abrirDetalhe(openId)})}else toast('Erro: '+(await r.text()));
}
async function mudarStatus(id,s){
  const body={status:s};
  if(s==='publicado'){body.publicado_em=new Date().toISOString();const d=new Date();d.setFullYear(d.getFullYear()+1);body.anuncio_valido_ate=d.toISOString()}
  await fetch(SB+'/rest/v1/negocios?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify(body)});
  toast('Status: '+s);load().then(()=>{if(openId)abrirDetalhe(openId)});
}
async function excluir(id){if(!confirm('Excluir permanentemente?'))return;await fetch(SB+'/rest/v1/negocios?id=eq.'+id,{method:'DELETE',headers:H});toast('Excluído');fecharDetalhe();load()}
async function salvarObs(iid,obs){await fetch(SB+'/rest/v1/interesses?id=eq.'+iid,{method:'PATCH',headers:H,body:JSON.stringify({observacao_admin:obs})})}

// ── GERADOR TÍTULOS ──
function gerarTitulos(id){
  const cj=calcCache[id]||{};
  // Buscar dados do detalhe aberto
  const n=allData.find(x=>x.id===id)||{};
  const setor=catMap[n.categoria]||n.categoria||'Negócio';
  const loc=(n.cidade||'')+'/'+(n.estado||'');
  const fat=n.faturamento_anual||0;
  const fatLbl=fat>=1e6?Math.round(fat/1e6)+'M':fat>=1e3?Math.round(fat/1e3)+'k':'';
  const funcs=n.num_funcionarios||0;
  const anos=n.anos_existencia||0;
  const rec=n.recorrencia_pct||0;
  const ops=[];
  ops.push(setor+' · '+loc);
  if(fatLbl)ops.push(setor+' R$'+fatLbl+'/ano · '+loc);
  if(funcs)ops.push(setor+' com '+funcs+' Colaboradores · '+loc);
  if(anos)ops.push(setor+' com '+anos+' Anos · '+loc);
  if(rec>0)ops.push(setor+' '+rec+'% Recorrente · '+loc);
  ops.push(setor+' Operação Consolidada · '+loc);
  const c=document.getElementById('sug-titulo');c.style.display='block';
  c.innerHTML=ops.slice(0,5).map(t=>{const tr=t.length>TITULO_MAX?t.slice(0,TITULO_MAX-1)+'…':t;return '<div style="padding:6px 10px;border:1px solid var(--line);margin-bottom:4px;cursor:pointer;font-size:11px" onmouseover="this.style.borderColor=\'var(--green)\'" onmouseout="this.style.borderColor=\'var(--line)\'" onclick="document.getElementById(\'e-titulo\').value=this.dataset.v;updCC();this.parentElement.style.display=\'none\'" data-v="'+tr.replace(/"/g,'&quot;')+'">'+tr+' <span style="color:var(--tm);font-size:9px">('+tr.length+')</span></div>'}).join('');
}

// ── BUSCA ──
function abrirBusca(){document.getElementById('modal-busca').style.display='flex';document.getElementById('busca-input').value='';document.getElementById('busca-results').innerHTML='';document.getElementById('busca-input').focus()}
function fecharBusca(){document.getElementById('modal-busca').style.display='none'}
let bt;
async function buscar(){
  clearTimeout(bt);const q=document.getElementById('busca-input').value.trim();
  if(q.length<2){document.getElementById('busca-results').innerHTML='';return}
  bt=setTimeout(async()=>{
    let url=SB+'/rest/v1/negocios?select=id,nome,codigo_diagnostico,setor,cidade,estado,faturamento_anual&limit=10';
    if(q.startsWith('1N-'))url+='&codigo_diagnostico=ilike.*'+q+'*';
    else url+='&or=(nome.ilike.*'+encodeURIComponent(q)+'*,codigo_diagnostico.ilike.*'+encodeURIComponent(q)+'*)';
    const r=await fetch(url,{headers:H});const d=await r.json();
    if(!Array.isArray(d)){document.getElementById('busca-results').innerHTML='<div style="color:var(--rd);font-size:11px">Erro</div>';return}
    document.getElementById('busca-results').innerHTML=d.length?d.map(x=>'<div class="search-result" onclick="preencherDiag(\''+x.id+'\')"><div class="sr-nome">'+(x.nome||'—')+' <span style="font-size:10px;color:var(--tm)">'+(x.codigo_diagnostico||'')+'</span></div><div class="sr-meta">'+(x.setor||'—')+' · '+(x.cidade||'—')+'/'+(x.estado||'—')+' · '+brl(x.faturamento_anual)+'</div></div>').join(''):'<div style="font-size:11px;color:var(--tm);padding:8px">Nenhum encontrado.</div>';
  },400);
}

async function preencherDiag(id){
  fecharBusca();toast('Preenchendo todos os campos...');
  const r=await fetch(SB+'/rest/v1/negocios?id=eq.'+id+'&select=*',{headers:H});
  const d=await r.json();if(!Array.isArray(d)||!d[0]){toast('Erro');return}
  const n=d[0],dj=n.dados_json||{};
  // Buscar calc_json
  let cj={};
  try{const r2=await fetch(SB+'/rest/v1/laudos_completos?slug=eq.'+id+'&select=calc_json',{headers:H});const d2=await r2.json();if(Array.isArray(d2)&&d2[0])cj=d2[0].calc_json||{}}catch(e){}
  
  const fatM=Number(cj.fat_mensal)||Number(dj.fat_mensal)||0;
  const ro=Number(cj.ro_mensal)||Number(dj.ro_mensal)||Number(dj.resultado_op)||0;
  const totAtiv=Number(cj.totAtiv)||Number(dj.total_ativos)||0;
  const totPass=Number(cj.totPass)||Number(dj.total_passivos)||0;
  
  // Crescimento
  const crescPct=Number(dj.crescimento_pct)||0;
  const crescStatus=crescPct>20?'crescendo':crescPct>0?'estavel':'declinando';
  
  // Upsides do calc_json
  let upsides=null;
  if(cj.upsides&&Array.isArray(cj.upsides)&&cj.upsides.length>0){
    upsides=cj.upsides;
  } else if(dj.upsides&&Array.isArray(dj.upsides)&&dj.upsides.length>0){
    upsides=dj.upsides;
  }
  
  const body={
    // Identificação
    categoria: catMap[dj.setor]||dj.setor||n.categoria||null,
    cidade: dj.cidade||n.cidade||null,
    estado: dj.estado||n.estado||null,
    descricao: n.descricao||dj.descricao_final||null,
    codigo: n.codigo||n.codigo_diagnostico||null,
    
    // Financeiro
    faturamento_anual: Number(dj.fat_anual)||(fatM*12)||Number(n.faturamento_anual)||null,
    margem_ebitda: fatM>0?Math.round(ro/fatM*1000)/10:null,
    resultado_liquido_mensal: ro||null,
    patrimonio_liquido: (totAtiv-totPass)||null,
    
    // Avaliação
    score_saude: Number(cj.ise_total)||Number(dj.ise_parcial)||null,
    valor_1n: Number(cj.valor_venda)||null,
    
    // Operação
    recorrencia_pct: Number(cj.recorrencia)||null,
    anos_existencia: Number(cj.anos)||Number(dj.cnpj_anos)||null,
    num_funcionarios: (Number(dj.clt_qtd)||0)+(Number(dj.pj_qtd)||0)||null,
    modelo_negocio: Array.isArray(dj.modelo_atuacao_multi)?dj.modelo_atuacao_multi.join(', '):null,
    crescimento_status: crescStatus,
    
    // Avaliação data
    avaliacao_finalizada_em: new Date().toISOString(),
  };
  
  // Upsides
  if(upsides) body.upsides_json=upsides;
  
  // Remove nulls (mas mantém zeros válidos como recorrencia=0)
  Object.keys(body).forEach(k=>{
    if(body[k]===null || body[k]===undefined) delete body[k];
  });
  
  console.log('[preencherDiag] Salvando:', body);
  const up=await fetch(SB+'/rest/v1/negocios?id=eq.'+id,{method:'PATCH',headers:H,body:JSON.stringify(body)});
  if(up.ok)toast('✓ Todos os campos preenchidos — edite e publique');
  else toast('Erro: '+(await up.text()));
  await load();abrirDetalhe(id);
}

load();
</script>
