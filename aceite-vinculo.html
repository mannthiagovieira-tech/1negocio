<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aceite de vínculo · 1Negócio</title>
<meta name="description" content="Decisão de aceite ou recusa de vínculo de sócio-assessor 1Negócio.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7f5;--bg-2:#ffffff;--surface:#ffffff;--surface-2:#f1f3ef;
  --line:rgba(10,15,12,.1);--line-2:rgba(10,15,12,.18);
  --ink:#0a1510;--ink-2:rgba(10,21,16,.78);--ink-3:rgba(10,21,16,.58);--ink-4:rgba(10,21,16,.38);
  --accent:#0aa85a;--accent-ink:#ffffff;
  --accent-soft:rgba(10,168,90,.12);--accent-line:rgba(10,168,90,.3);
  --alert:#dc2626;--alert-soft:rgba(220,38,38,.08);--alert-line:rgba(220,38,38,.3);
  --warn:#f5b955;--warn-soft:rgba(245,185,85,.12);
  --shadow-card:0 24px 60px -18px rgba(10,20,12,.18), 0 2px 0 rgba(10,20,12,.02);
  --shadow-soft:0 6px 24px -10px rgba(10,20,12,.1);
  --serif:'Syne', ui-serif, serif;
  --sans:'Geist','Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono', ui-monospace, monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);font-size:15px;line-height:1.6;
  color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"ss01","cv01","tnum";
  min-height:100vh;display:flex;flex-direction:column;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}

.topbar{
  position:sticky;top:0;z-index:80;height:62px;
  display:flex;align-items:center;justify-content:flex-start;padding:0 28px;
  background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:saturate(140%) blur(14px);
  -webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--line);
}
.logo-text{font-family:var(--serif);font-weight:800;font-size:20px;letter-spacing:-.04em;color:var(--ink)}
.logo-text .lead{color:var(--accent)}
@media(max-width:768px){.topbar{padding:0 16px;height:58px}}

main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:48px 24px 64px}
.card{
  max-width:640px;width:100%;
  background:var(--surface);border:1px solid var(--line-2);border-radius:24px;
  padding:36px 36px 32px;box-shadow:var(--shadow-card);
}
@media(max-width:560px){.card{padding:28px 22px 24px;border-radius:18px}}

.eyebrow{
  font-family:var(--mono);font-size:11px;font-weight:500;
  letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
  display:inline-flex;align-items:center;gap:10px;margin-bottom:14px;
}
.eyebrow::before{content:"";width:24px;height:1px;background:currentColor}
.eyebrow.warn{color:var(--warn)}
.eyebrow.alert{color:var(--alert)}

.card h1{
  font-family:var(--serif);font-weight:800;
  font-size:clamp(24px,3.6vw,32px);line-height:1.1;letter-spacing:-.022em;color:var(--ink);
  margin-bottom:14px;
}
.card h1 .accent{color:var(--accent)}

.editorial{font-size:15px;color:var(--ink-2);line-height:1.7;margin-top:14px}
.editorial strong{color:var(--ink);font-weight:600}

.resumo{
  margin:20px 0;padding:18px 20px;border-radius:14px;
  background:var(--surface-2);border:1px solid var(--line);
}
.resumo-titulo{
  font-family:var(--mono);font-size:10.5px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:12px;
}
.resumo-row{display:grid;grid-template-columns:130px 1fr;gap:8px;padding:6px 0;border-bottom:1px dashed var(--line)}
.resumo-row:last-child{border-bottom:0}
.resumo-key{
  font-family:var(--mono);font-size:10px;font-weight:600;
  letter-spacing:.10em;text-transform:uppercase;color:var(--ink-4);padding-top:1px;
}
.resumo-val{font-size:13.5px;color:var(--ink);font-weight:500;line-height:1.4}

.ctas{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.cta-primary, .cta-outline{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:50px;padding:0 26px;border-radius:999px;
  font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;
  transition:transform .12s,box-shadow .15s,background .15s;
}
.cta-primary{background:var(--accent);color:var(--accent-ink);border:1px solid transparent}
.cta-primary:hover{transform:translateY(-1px);box-shadow:0 8px 22px -8px var(--accent-line)}
.cta-outline{background:transparent;color:var(--ink);border:1px solid var(--line-2)}
.cta-outline:hover{background:var(--surface-2);border-color:var(--ink-3)}
.cta-outline.danger{color:var(--alert);border-color:var(--alert-line)}
.cta-outline.danger:hover{background:var(--alert-soft);border-color:var(--alert)}
.cta-primary[disabled],.cta-outline[disabled]{opacity:.55;cursor:not-allowed;transform:none}

.ttl{
  margin-top:18px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink-3);text-align:center;
}

.skeleton{
  font-family:var(--mono);font-size:12px;color:var(--ink-3);text-align:center;padding:24px;
}

.icon-circle{
  display:inline-flex;width:56px;height:56px;border-radius:50%;
  align-items:center;justify-content:center;margin-bottom:14px;
}
.icon-circle.ok{background:var(--accent-soft);color:var(--accent)}
.icon-circle.warn{background:var(--warn-soft);color:#a06d08}
.icon-circle.alert{background:var(--alert-soft);color:var(--alert)}
.icon-circle svg{width:28px;height:28px;stroke-width:2}

.feedback-msg{
  margin-top:12px;font-size:13px;color:var(--alert);
  font-family:var(--mono);letter-spacing:.04em;min-height:18px;
}

.footer{
  margin-top:auto;padding:28px;border-top:0.5px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
.footer-logo{font-family:var(--serif);font-weight:800;font-size:16px;letter-spacing:-.02em;color:var(--ink)}
.footer-logo .lead{color:var(--accent)}
.footer-txt{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
</style>
</head>
<body>

<header class="topbar" role="banner">
  <a href="/" class="logo-text" aria-label="1Negócio · página inicial"><span class="lead">1</span>NEGÓCIO</a>
</header>

<main>
  <div class="card" id="container">
    <div class="skeleton">carregando aceite…</div>
  </div>
</main>

<footer class="footer" role="contentinfo">
  <a href="/" class="footer-logo" aria-label="1Negócio · página inicial"><span class="lead">1</span>NEGÓCIO</a>
  <div class="footer-txt">avaliado e vendido</div>
</footer>

<script>
(function(){
  'use strict';
  const SUPABASE_URL = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const container = document.getElementById('container');

  function _h(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function fmtMoeda(n){
    if (n == null) return '—';
    const v = Number(n);
    if (!isFinite(v)) return '—';
    return 'R$ ' + v.toLocaleString('pt-BR', { maximumFractionDigits: 0 });
  }

  function fmtTTL(iso){
    if (!iso) return '30 dias';
    const ms = new Date(iso).getTime() - Date.now();
    if (ms <= 0) return 'agora · expirado';
    const dias = Math.ceil(ms / (24*60*60*1000));
    if (dias === 1) return '1 dia';
    if (dias < 30) return dias + ' dias';
    return '30 dias';
  }

  function fmtData(iso){
    if (!iso) return '—';
    try { return new Date(iso).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' }); }
    catch(e){ return '—'; }
  }

  if (!token) { renderInvalido('link inválido · sem token'); return; }

  carregar();

  async function carregar(){
    try {
      const r = await fetch(SUPABASE_URL + '/functions/v1/consultar-notificacao-proprietario', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': ANON,
          'Authorization': 'Bearer ' + ANON,
        },
        body: JSON.stringify({ token })
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        renderInvalido(data.error === 'token_invalido' ? 'link inválido ou já cancelado' : 'erro ao carregar · tente novamente');
        return;
      }
      const notif = data.notif;
      if (notif.expirado && notif.status === 'pendente') { renderExpirado(notif); return; }
      if (notif.status === 'pendente') { renderPendente(notif); return; }
      renderJaDecidido(notif);
    } catch (e) {
      console.error(e);
      renderInvalido('erro de conexão · tente novamente');
    }
  }

  function renderResumoTese(t){
    if (!t) return '<div class="resumo-row"><div class="resumo-key">Tese</div><div class="resumo-val">—</div></div>';
    const setores = Array.isArray(t.setores) ? t.setores.join(' · ') : (t.setores || '—');
    const loc = t.localizacao_tipo === 'brasil_todo' ? 'Brasil todo'
              : (t.cidade ? (t.cidade + (t.estado ? ' / ' + t.estado : '')) : (t.estado || '—'));
    const ticket = (t.valor_minimo || t.valor_maximo)
      ? (fmtMoeda(t.valor_minimo) + ' – ' + fmtMoeda(t.valor_maximo))
      : '—';
    return [
      `<div class="resumo-row"><div class="resumo-key">Código</div><div class="resumo-val">${_h(t.codigo || '—')}</div></div>`,
      `<div class="resumo-row"><div class="resumo-key">Setores</div><div class="resumo-val">${_h(setores)}</div></div>`,
      `<div class="resumo-row"><div class="resumo-key">Ticket alvo</div><div class="resumo-val">${_h(ticket)}</div></div>`,
      `<div class="resumo-row"><div class="resumo-key">Localização</div><div class="resumo-val">${_h(loc)}</div></div>`,
      t.observacoes ? `<div class="resumo-row"><div class="resumo-key">Observações</div><div class="resumo-val">${_h(t.observacoes)}</div></div>` : ''
    ].join('');
  }

  function renderResumoDiagnostico(d){
    if (!d) return '<div class="resumo-row"><div class="resumo-key">Diagnóstico</div><div class="resumo-val">—</div></div>';
    return [
      `<div class="resumo-row"><div class="resumo-key">Código</div><div class="resumo-val">${_h(d.codigo || '—')}</div></div>`,
      `<div class="resumo-row"><div class="resumo-key">Nome</div><div class="resumo-val">${_h(d.nome || '—')}</div></div>`,
      `<div class="resumo-row"><div class="resumo-key">Setor</div><div class="resumo-val">${_h((d.setor || '—') + (d.categoria ? ' · ' + d.categoria : ''))}</div></div>`,
      `<div class="resumo-row"><div class="resumo-key">Localização</div><div class="resumo-val">${_h((d.cidade || '—') + (d.estado ? ' / ' + d.estado : ''))}</div></div>`,
      d.faturamento_anual ? `<div class="resumo-row"><div class="resumo-key">Faturamento</div><div class="resumo-val">${_h(fmtMoeda(d.faturamento_anual))}/ano</div></div>` : ''
    ].join('');
  }

  function renderPendente(notif){
    const v = notif.vinculo;
    const socio = v.socio || {};
    const tipo = v.tipo;
    const isTese = tipo === 'tese';
    const tipoTexto = isTese ? 'tese de investimento' : 'diagnóstico de empresa';
    const resumo = isTese ? renderResumoTese(v.tese) : renderResumoDiagnostico(v.diagnostico);

    container.innerHTML = `
      <div class="eyebrow">Aceite de vínculo · pendente</div>
      <h1><span class="accent">${_h(socio.nome || 'Sócio-Assessor')}</span> · ${_h(socio.codigo || 'S-????')} cadastrou uma ${_h(tipoTexto)} em seu nome.</h1>
      <p class="editorial">
        Esse cadastro está em <strong>seu nome</strong> · você é o proprietário.
        Você pode <strong>aceitar</strong> (vira sua ${_h(tipoTexto)} oficial · sócio fica vinculado) ou <strong>recusar</strong> (cadastro é cancelado).
      </p>

      <div class="resumo">
        <div class="resumo-titulo">Resumo do que foi cadastrado</div>
        ${resumo}
      </div>

      <div class="ctas">
        <button class="cta-primary" id="btn-aceitar">Aceitar · é meu</button>
        <button class="cta-outline danger" id="btn-recusar">Recusar · não conheço</button>
      </div>
      <div class="feedback-msg" id="feedback"></div>
      <div class="ttl">Este link expira em ${_h(fmtTTL(notif.expira_em))}.</div>
    `;
    document.getElementById('btn-aceitar').onclick = () => decidir('aceitar');
    document.getElementById('btn-recusar').onclick = () => decidir('recusar');
  }

  function renderJaDecidido(notif){
    const aceito = notif.status === 'aceito';
    const data = fmtData(notif.proprietario_decidiu_em);
    const verbo = aceito ? 'aceitou' : 'recusou';
    const iconClass = aceito ? 'ok' : 'alert';
    const iconSvg = aceito
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    container.innerHTML = `
      <div class="icon-circle ${iconClass}">${iconSvg}</div>
      <div class="eyebrow ${aceito ? '' : 'alert'}">Decisão registrada</div>
      <h1>Você já <span class="accent">${_h(verbo)}</span> esse vínculo.</h1>
      <p class="editorial">Decisão em <strong>${_h(data)}</strong>. Não há mais ação a fazer aqui.</p>
      <div class="ctas">
        <a href="/portal-usuario.html" class="cta-primary">Ir pra meu portal</a>
        <a href="/" class="cta-outline">Voltar pra home</a>
      </div>
    `;
  }

  function renderExpirado(notif){
    container.innerHTML = `
      <div class="icon-circle warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="eyebrow warn">Link expirado</div>
      <h1>Este link <span class="accent">expirou</span>.</h1>
      <p class="editorial">O sócio-assessor pode te enviar um novo link · ou você pode entrar em contato com a 1Negócio diretamente.</p>
      <div class="ctas">
        <a href="https://wa.me/5511952136406?text=Ol%C3%A1+%C2%B7+vim+do+link+de+aceite+expirado+na+1Neg%C3%B3cio" target="_blank" rel="noopener" class="cta-primary">Falar com a 1Negócio</a>
        <a href="/" class="cta-outline">Voltar pra home</a>
      </div>
    `;
  }

  function renderInvalido(msg){
    container.innerHTML = `
      <div class="icon-circle alert"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <div class="eyebrow alert">Link indisponível</div>
      <h1>Este link não está mais disponível.</h1>
      <p class="editorial">${_h(msg || 'O link pode ter expirado · sido cancelado · ou ser inválido.')}</p>
      <div class="ctas">
        <a href="/" class="cta-primary">Ir pra home</a>
        <a href="https://wa.me/5511952136406?text=Ol%C3%A1+%C2%B7+vim+do+aceite-vinculo+da+1Neg%C3%B3cio" target="_blank" rel="noopener" class="cta-outline">Falar com a 1Negócio</a>
      </div>
    `;
  }

  async function decidir(decisao){
    const btnA = document.getElementById('btn-aceitar');
    const btnR = document.getElementById('btn-recusar');
    const feedback = document.getElementById('feedback');
    if (btnA) btnA.disabled = true;
    if (btnR) btnR.disabled = true;
    if (feedback) feedback.textContent = '';
    try {
      const r = await fetch(SUPABASE_URL + '/functions/v1/proprietario-decidir', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': ANON,
          'Authorization': 'Bearer ' + ANON,
        },
        body: JSON.stringify({ token, decisao })
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok && data.ok) {
        // Re-carrega · vai cair em renderJaDecidido
        await carregar();
        return;
      }
      if (data.error === 'expirado') { renderExpirado({ expira_em: null }); return; }
      if (data.error === 'token_invalido') { renderInvalido('token inválido'); return; }
      if (data.error === 'ja_decidido') { await carregar(); return; }
      if (feedback) feedback.textContent = 'Erro: ' + (data.error || 'tente novamente');
      if (btnA) btnA.disabled = false;
      if (btnR) btnR.disabled = false;
    } catch (e) {
      if (feedback) feedback.textContent = 'Erro de conexão · tente novamente';
      if (btnA) btnA.disabled = false;
      if (btnR) btnR.disabled = false;
    }
  }
})();
</script>

<!-- V8 B8.6 · hamburger drawer unificado (preserva logo→home + nav) -->
<script src="/js/hamburger-account.js"></script>
<script src="/js/hamburger-drawer.js"></script>
</body>
</html>
