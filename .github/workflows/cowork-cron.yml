name: Cowork · cron diário (plano de hoje)

# Roda todo dia 8h UTC = 5h BRT
# Single edge function ativa nesta etapa A · cowork-gerar-plano-diario.
# Outras crons (B-G) ficam comentadas até admin ativar.

on:
  schedule:
    - cron: '0 8 * * *'   # plano diário · 5h BRT
  workflow_dispatch:       # permite trigger manual via GitHub UI

jobs:
  gerar-plano-diario:
    runs-on: ubuntu-latest
    steps:
      - name: POST /functions/v1/cowork-gerar-plano-diario
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            'https://dbijmgqlcrgjlcfrastg.supabase.co/functions/v1/cowork-gerar-plano-diario'
          echo ""
