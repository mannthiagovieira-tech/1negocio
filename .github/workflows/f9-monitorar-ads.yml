name: F9 · monitorar ads concorrentes (DESATIVADO ATÉ ADMIN VALIDAR)

# F9 · monitora Meta Ad Library dos 20 concorrentes cadastrados
# Análise inferencial Sonnet · WhatsApp domingo 8h pro admin
#
# CUSTO ESTIMADO (20 concorrentes · ~50 ads cada):
#   Apify · 20 × ~$0.50 = $10 (R$ 50)/semana = R$ 200/mês
#   Sonnet · 20 × ~R$ 0,15 = R$ 3/semana = R$ 12/mês
#   TOTAL · ~R$ 212/mês
#
# ATIVAÇÃO: descomenta o `schedule` abaixo + commit + push
# Pra rodar manual: GitHub Actions tab → Run workflow

on:
  workflow_dispatch:       # trigger manual (ATIVO)
  # schedule:
  #   - cron: '30 6 * * 0'  # domingo 03h30 BRT (06:30 UTC) (DESATIVADO)

jobs:
  monitorar-ads:
    runs-on: ubuntu-latest
    steps:
      - name: Captura ads + análise Sonnet · POST /functions/v1/monitorar-ads-concorrente
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"com_analise_ia":true,"notificar_admin":true}' \
            'https://dbijmgqlcrgjlcfrastg.supabase.co/functions/v1/monitorar-ads-concorrente'
          echo ""
