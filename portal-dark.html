<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>1Negócio — Empresas à venda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800&family=DM+Mono:wght@400;500&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#080d0a;--ink2:#0d1109;--green:#3dff7a;
  --cab:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;--bg:#080d0a;
}
html{background:var(--bg);-webkit-font-smoothing:antialiased;font-size:16px}
body{min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:var(--bg);font-family:var(--mono)}

/* ════════════════════════
   CABEÇALHO COMPACTO
   ════════════════════════ */
.hdr{background:var(--ink);border-radius:0 0 20px 20px;overflow:hidden;position:sticky;top:0;z-index:200;flex-shrink:0}

/* L1 — logo + botão */
.h1{display:flex;align-items:center;justify-content:space-between;height:38px;padding:0 12px;border-bottom:0.5px solid rgba(255,255,255,0.07)}
.logo{font-family:'Syne',sans-serif;font-weight:900;font-size:15px;letter-spacing:-0.02em;color:#fff;text-decoration:none}
.logo em{color:#3dff7a;font-style:normal}
.btn-av{font-family:var(--cab);font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:#080d0a;background:var(--green);padding:4px 11px;border:none;border-radius:20px;cursor:pointer;white-space:nowrap;text-decoration:none}

/* L2 — stats scroll */
.s1{display:flex;align-items:stretch;height:26px;border-bottom:0.5px solid rgba(255,255,255,0.07);overflow-x:auto;-webkit-overflow-scrolling:touch}
.s1::-webkit-scrollbar{display:none}
.st{display:flex;align-items:center;gap:4px;padding:0 9px;border-right:0.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.sv{font-family:var(--cab);font-weight:800;font-size:10px;color:#fff;letter-spacing:-0.02em;white-space:nowrap}
.sv em{color:var(--green);font-style:normal}
.sl{font-size:6.5px;text-transform:uppercase;letter-spacing:0.07em;color:rgba(255,255,255,0.25);white-space:nowrap}

/* L3 — nav */
.s-nav{display:flex;align-items:stretch;height:26px;border-bottom:0.5px solid rgba(255,255,255,0.07);overflow-x:auto;-webkit-overflow-scrolling:touch}
.s-nav::-webkit-scrollbar{display:none}
.nl{font-family:var(--cab);font-weight:500;color:rgba(255,255,255,0.35);font-size:9px;padding:0 9px;display:flex;align-items:center;border-right:0.5px solid rgba(255,255,255,0.06);white-space:nowrap;flex-shrink:0;text-decoration:none}
.nl.on{color:rgba(255,255,255,0.88);font-weight:700}

/* L4 — botão estado FIXO à esquerda + carrossel de categorias */
.s-filter{
  display:flex;align-items:center;
  height:34px;
  border-bottom:none; /* última linha, ponte vem logo depois */
  overflow:hidden;
}

/* botão estado — fixo à esquerda, design sólido */
.btn-estado{
  display:flex;align-items:center;gap:4px;
  height:100%;padding:0 10px;
  border:none;cursor:pointer;
  background:var(--ink2);
  font-family:var(--cab);font-weight:700;font-size:9px;
  color:rgba(255,255,255,0.7);
  border-right:0.5px solid rgba(255,255,255,0.1);
  flex-shrink:0;white-space:nowrap;
  position:relative;
}
.btn-estado .pin{font-size:10px}
.btn-estado .arr{font-size:8px;opacity:0.45;margin-left:1px}
/* indicador verde quando tem filtro ativo */
.btn-estado.ativo{color:#fff}
.btn-estado.ativo::before{
  content:'';position:absolute;top:6px;right:6px;
  width:5px;height:5px;border-radius:50%;background:var(--green);
}

/* carrossel de tags — scroll horizontal */
.cat-scroll{
  flex:1;min-width:0;
  display:flex;align-items:center;
  gap:5px;padding:0 8px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  background:var(--ink);
}
.cat-scroll::-webkit-scrollbar{display:none}

.tag-all{
  font-family:var(--cab);font-weight:700;font-size:8px;
  text-transform:uppercase;letter-spacing:0.05em;
  padding:3px 9px;border-radius:20px;border:none;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:all 0.15s;
  background:rgba(255,255,255,0.88);color:var(--ink);
}
.tag-all.off{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4)}

.cat-tag{
  font-family:var(--cab);font-weight:700;font-size:8px;
  text-transform:uppercase;letter-spacing:0.04em;
  padding:3px 9px;border-radius:20px;
  border:1.5px solid transparent;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all 0.15s;opacity:0.45;
}
.cat-tag.on{opacity:1}

/* badge contador — extremo direito */
.fbadge{
  display:flex;align-items:center;gap:3px;
  padding:0 9px;font-size:7.5px;
  color:rgba(255,255,255,0.28);flex-shrink:0;
  background:var(--ink);font-family:var(--mono);
  border-left:0.5px solid rgba(255,255,255,0.07);
  height:100%;
}
.fdot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:blink 2.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.fbadge strong{color:rgba(255,255,255,0.6);font-weight:500}

/* ponte */
.bridge{height:16px;background:var(--ink)}

/* ════════════════════════
   MODAL ESTADO
   ════════════════════════ */
.loc-modal{display:none;position:fixed;inset:0;z-index:400;background:rgba(13,43,31,0.5);align-items:flex-end;justify-content:center}
.loc-modal.on{display:flex}
.loc-sheet{width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;padding:18px 16px 36px}
.loc-handle{width:36px;height:4px;border-radius:2px;background:rgba(13,43,31,0.12);margin:0 auto 14px}
.loc-sheet h3{font-family:var(--cab);font-weight:800;font-size:14px;color:var(--ink);margin-bottom:12px}
.loc-opts{display:flex;flex-wrap:wrap;gap:7px}
.loc-opt{font-family:var(--cab);font-weight:600;font-size:11px;padding:6px 13px;border-radius:20px;border:0.5px solid rgba(13,43,31,0.15);background:#fff;color:rgba(13,43,31,0.55);cursor:pointer;transition:all 0.12s}
.loc-opt.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ════════════════════════
   CARDS
   ════════════════════════ */
.main{flex:1;padding:8px 8px 24px;overflow:hidden}

.card{
  border-radius:14px;overflow:hidden;
  position:relative;margin-top:-44px;
  border:0.5px solid;height:148px;cursor:pointer;
  /* transição suave para animação de flutuação */
  transition:transform 0.35s cubic-bezier(.34,1.56,.64,1), box-shadow 0.35s ease;
  transform:translateY(0);
  will-change:transform;
}
.card:first-child{margin-top:0}
/* flutuação ao entrar na viewport */
.card.float-in{
  animation:floatIn 0.4s cubic-bezier(.34,1.4,.64,1) both;
}
@keyframes floatIn{
  from{transform:translateY(22px);opacity:0.6}
  to{transform:translateY(0);opacity:1}
}
/* último card — esticado levemente (efeito wallet) */
.card.last-stretch{
  transition:transform 0.2s cubic-bezier(.34,1.56,.64,1);
}

.cl{display:flex;height:100%}
.left{flex:1;min-width:0;padding:9px 8px 9px 11px;display:flex;flex-direction:column;justify-content:space-between}
.top-area{display:flex;align-items:flex-start;justify-content:space-between;gap:5px}
.tt{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.tmeta{font-size:7.5px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.42}
.ttitle{font-family:var(--cab);font-weight:800;font-size:11.5px;letter-spacing:0.03em;text-transform:uppercase;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ise-tag{font-size:6.5px;font-weight:700;text-transform:uppercase;padding:1.5px 6px;border-radius:20px;display:inline-block;margin-top:2px;white-space:nowrap}
.op-tag{font-size:6.5px;font-weight:700;text-transform:uppercase;padding:2.5px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:10px;background:#059669;color:#fff}
.row5{display:flex;border-top:0.5px solid rgba(0,0,0,0.08);padding-top:5px;flex-shrink:0}
.d{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;padding-right:4px;border-right:0.5px solid rgba(0,0,0,0.08)}
.d:last-child{border-right:none;padding-right:0}
.d.pl{padding-left:4px}
.dl{font-size:6px;text-transform:uppercase;letter-spacing:0.07em;opacity:0.36;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dv{font-family:var(--cab);font-weight:800;font-size:9.5px;letter-spacing:-0.01em}
.cdiv{width:0.5px;background:currentColor;opacity:0.1;flex-shrink:0}
.right{width:88px;flex-shrink:0;padding:8px 9px;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:space-between}
.rsep{width:100%;height:0.5px;background:currentColor;opacity:0.08}
.vl{font-size:5px;text-transform:uppercase;letter-spacing:0.1em;opacity:0.3}
.vv{font-family:var(--cab);font-weight:800;font-size:17px;letter-spacing:-0.025em;line-height:1;display:flex;align-items:baseline;gap:1px}
.vrs{font-size:9px;font-weight:700;opacity:0.55}
.obs{display:flex;flex-direction:column;gap:3px;width:100%}
.pll{font-size:5px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.26}
.plv{font-family:var(--cab);font-weight:500;font-size:7.5px;opacity:0.42}
.ell{font-size:5px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.28}
.elv{font-family:var(--cab);font-weight:700;font-size:8.5px;opacity:0.55}
.mll{font-size:5px;text-transform:uppercase;letter-spacing:0.08em;opacity:0.28}
.mlv{font-family:var(--cab);font-weight:800;font-size:10px}

/* ════════════════════════
   CARD EXPANDIDO
   Usa as cores do card fonte — sem bloco branco genérico
   ════════════════════════ */
.overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(13,43,31,0.55);align-items:flex-end;justify-content:center}
.overlay.on{display:flex}

.exp-sheet{
  width:100%;max-width:480px;
  height:calc(100dvh - 44px);
  border-radius:20px 20px 0 0;
  overflow:hidden;display:flex;flex-direction:column;
  /* sem background fixo — vem do card */
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(.32,0,.15,1);
}
.overlay.on .exp-sheet{transform:translateY(0)}

/* TOPO do sheet — mesma cor e estética do card recolhido */
.exp-top{
  flex-shrink:0;padding:12px 14px 14px;position:relative;
  /* borda, radius e cores injetados via JS */
  border-radius:20px 20px 0 0;
  border-bottom:0.5px solid rgba(0,0,0,0.08);
}
.exp-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,0.12);margin:0 auto 10px}
.btn-fechar{
  position:absolute;top:10px;right:12px;
  width:26px;height:26px;border-radius:50%;
  background:rgba(0,0,0,0.08);border:0.5px solid rgba(0,0,0,0.1);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:12px;line-height:1;
}
.exp-meta{font-size:8px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.45;margin-bottom:3px;font-family:var(--mono)}
.exp-title{font-family:var(--cab);font-weight:800;font-size:13px;letter-spacing:0.03em;text-transform:uppercase;line-height:1.2;margin-bottom:10px}
/* valores no header — mesma linha dos dados do card */
.exp-vals{display:flex;gap:0;border-top:0.5px solid rgba(0,0,0,0.08);padding-top:10px}
.ev{display:flex;flex-direction:column;gap:2px;flex:1;padding-right:10px;border-right:0.5px solid rgba(0,0,0,0.08)}
.ev:last-child{border-right:none;padding-right:0}
.ev.pl{padding-left:10px}
.ev-l{font-size:7px;text-transform:uppercase;letter-spacing:0.1em;opacity:0.4;font-family:var(--mono)}
.ev-v{font-family:var(--cab);font-weight:800;font-size:14px;letter-spacing:-0.02em;line-height:1}
.ev-tag{margin-top:3px}
.exp-op-tag{font-size:7px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:20px;display:inline-block;background:#059669;color:#fff}
.exp-ise-tag{font-size:7px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:20px;display:inline-block}

/* carrossel */
.car-outer{flex:1;overflow:hidden;display:flex;flex-direction:column;background:#f8faf8;min-height:0}
.car-wrap{flex:1;overflow:hidden;min-height:0}
.car-track{display:flex;height:100%;transition:transform 0.3s cubic-bezier(.4,0,.2,1)}
.slide{min-width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 10px;display:flex;flex-direction:column;gap:10px}

/* dots */
.car-dots{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 0;background:#fff;border-top:0.5px solid rgba(13,43,31,0.07);flex-shrink:0}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(13,43,31,0.15);cursor:pointer;transition:all 0.2s}
.dot.on{width:16px;border-radius:3px;background:var(--green)}

/* nav */
.car-nav{display:flex;align-items:center;justify-content:space-between;padding:5px 12px 6px;background:#fff;border-top:0.5px solid rgba(13,43,31,0.06);flex-shrink:0}
.car-btn{background:none;border:0.5px solid rgba(13,43,31,0.12);font-family:var(--mono);font-size:10px;color:rgba(13,43,31,0.45);padding:4px 11px;cursor:pointer;border-radius:20px}
.car-btn:disabled{opacity:0.2;pointer-events:none}
.car-lbl{font-size:10px;color:rgba(13,43,31,0.3);font-family:var(--mono)}

/* ações */
.car-actions{display:flex;gap:8px;padding:8px 12px 14px;background:#f8faf8;border-top:0.5px solid rgba(13,43,31,0.07);flex-shrink:0}
.btn-info{flex:1;background:var(--ink);color:#fff;border:none;font-family:var(--cab);font-weight:700;font-size:11px;padding:10px;cursor:pointer;border-radius:10px;text-transform:uppercase;letter-spacing:0.04em}
.btn-share{background:none;border:0.5px solid rgba(13,43,31,0.18);font-family:var(--mono);font-size:11px;color:rgba(13,43,31,0.45);padding:10px 12px;cursor:pointer;border-radius:10px;display:flex;align-items:center;gap:4px}

/* slides */
.slide-lbl{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.14em;color:rgba(13,43,31,0.35)}
.ia-block{background:#fff;border:0.5px solid rgba(13,43,31,0.08);border-radius:10px;padding:10px 12px}
.ia-tit{font-family:var(--cab);font-weight:700;font-size:0.78rem;color:#064e3b;margin-bottom:4px}
.ia-txt{font-size:0.67rem;color:rgba(13,43,31,0.6);line-height:1.6}
.nums-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.nc{background:#fff;border:0.5px solid rgba(13,43,31,0.08);border-radius:8px;padding:8px 10px}
.nc-l{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(13,43,31,0.38);margin-bottom:2px}
.nc-v{font-family:var(--cab);font-weight:800;font-size:0.95rem;color:#064e3b;letter-spacing:-0.02em;line-height:1}
.nc-v.g{color:#059669}.nc-v.a{color:#b45309}
.nc-sub{font-size:0.5rem;color:rgba(13,43,31,0.32);margin-top:2px}
.dre-wrap,.val-bloco{background:#fff;border:0.5px solid rgba(13,43,31,0.08);border-radius:10px;padding:10px 12px}
.bp-wrap{background:#fff;border:0.5px solid rgba(13,43,31,0.08);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.dre-row,.bp-row,.vb-row{display:flex;align-items:baseline;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid rgba(13,43,31,0.05)}
.dre-row:last-child,.bp-row:last-child,.vb-row:last-child{border-bottom:none}
.dre-row.tot{border-top:0.5px solid rgba(13,43,31,0.12);margin-top:2px;padding-top:6px}
.dre-l,.bp-l,.vb-l{font-size:0.63rem;color:rgba(13,43,31,0.5)}
.dre-l.ind{padding-left:10px;font-size:0.58rem;color:rgba(13,43,31,0.38)}
.bp-sec{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.12em;color:rgba(13,43,31,0.32);margin-bottom:3px}
.dre-v,.bp-v,.vb-v{font-family:var(--cab);font-weight:700;font-size:0.7rem;color:#064e3b}
.dre-v.g,.vb-v.g{color:#059669}.dre-v.r{color:#b45309}.dre-v.b{font-size:0.8rem;font-weight:800}
.vb-v.ink{color:#064e3b}
.bp-total{display:flex;justify-content:space-between;padding-top:6px;border-top:0.5px solid rgba(13,43,31,0.12)}
.bp-total-l{font-size:0.63rem;color:#064e3b;font-weight:500}
.bp-total-v{font-family:var(--cab);font-weight:800;font-size:0.82rem}
.ise-hero{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#f0fdf4;border:0.5px solid #bbf7d0;border-radius:10px}
.ise-num{font-family:var(--cab);font-weight:800;font-size:2rem;color:#059669;letter-spacing:-0.03em;line-height:1}
.ise-lbl{font-size:0.67rem;color:#065f46;font-weight:500}
.ise-sub{font-size:0.55rem;color:rgba(6,78,59,0.55);margin-top:2px}
.pilar{margin-bottom:6px}
.pilar-head{display:flex;justify-content:space-between;margin-bottom:2px;font-size:0.58rem}
.pilar-nome{color:rgba(13,43,31,0.55)}.pilar-nota{font-weight:500}
.pilar-bar{height:2px;background:rgba(13,43,31,0.07);border-radius:2px;overflow:hidden}
.pilar-fill{height:100%;border-radius:2px}
.bench-item{margin-bottom:8px}
.bench-head{display:flex;justify-content:space-between;margin-bottom:3px;font-size:0.58rem}
.bench-l{color:rgba(13,43,31,0.5)}.bench-emp{font-weight:500;color:#059669}.bench-set{color:rgba(13,43,31,0.32)}
.bench-bar{height:4px;background:rgba(13,43,31,0.06);border-radius:3px;position:relative}
.bf-s{position:absolute;left:0;top:0;height:100%;background:rgba(13,43,31,0.15);border-radius:3px}
.bf-e{position:absolute;left:0;top:0;height:100%;background:#059669;border-radius:3px}
.bf-e.low{background:#b45309}
.up-card{background:#f0fdf4;border:0.5px solid #bbf7d0;border-radius:10px;overflow:hidden;margin-bottom:5px}
.up-head{padding:8px 12px 6px}
.up-tit{font-family:var(--cab);font-weight:800;font-size:0.7rem;color:#064e3b;margin-bottom:2px}
.up-desc{font-size:0.58rem;color:rgba(6,78,59,0.6);line-height:1.5}
.up-nums{display:grid;grid-template-columns:1fr 1fr;border-top:0.5px solid #bbf7d0}
.un{padding:6px 12px;border-right:0.5px solid #bbf7d0}
.un:last-child{border-right:none}
.un-l{font-size:0.5rem;text-transform:uppercase;letter-spacing:0.1em;color:rgba(6,78,59,0.45);margin-bottom:1px}
.un-v{font-family:var(--cab);font-weight:800;font-size:0.7rem;color:#059669}
.mais-up{background:#fff;border:0.5px solid rgba(13,43,31,0.1);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.mu-icon{width:26px;height:26px;border-radius:50%;background:rgba(5,150,105,0.1);display:flex;align-items:center;justify-content:center;font-family:var(--cab);font-weight:800;font-size:11px;color:#059669;flex-shrink:0}
.mu-t{flex:1;font-size:0.63rem;color:#064e3b;font-weight:500}
.mu-sub{font-size:0.56rem;color:rgba(13,43,31,0.4);margin-top:1px}
.vb-tag{font-size:0.5rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px}
.desc-box{background:rgba(5,150,105,0.07);border:0.5px solid #a7f3d0;border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.db-l{font-size:0.6rem;color:#065f46}
.db-v{font-family:var(--cab);font-weight:800;font-size:0.8rem;color:#059669}
.metod{font-size:0.52rem;color:rgba(13,43,31,0.28);line-height:1.7;padding-top:5px}

function getP(cat){return PALETA[CAT_MAP[(cat||'').toLowerCase().trim()]||'outros']}

function brl(v){if(v==null)return'—';v=parseFloat(v);if(v>=1e9)return'R$\u00a0'+(v/1e9).toFixed(1).replace('.',',')+'B';if(v>=1e6)return'R$\u00a0'+(v/1e6).toFixed(1).replace('.',',')+'M';if(v>=1e3)return'R$\u00a0'+Math.round(v/1e3)+'k';return'R$\u00a0'+Math.round(v).toLocaleString('pt-BR')}
function brlS(v){if(v==null)return'—';v=parseFloat(v);if(v>=1e9)return(v/1e9).toFixed(1).replace('.',',')+'B';if(v>=1e6)return(v/1e6).toFixed(1).replace('.',',')+'M';if(v>=1e3)return Math.round(v/1e3)+'k';return Math.round(v).toLocaleString('pt-BR')}
function pct(v){return v!=null?parseFloat(v).toFixed(0)+'%':'—'}
function n(v){return v?parseFloat(v):0}

function calcIO(nd){
  const d=n(nd.valor_1n)&&n(nd.preco_pedido)?Math.max(0,(n(nd.valor_1n)-n(nd.preco_pedido))/n(nd.valor_1n)):0;
  const dPts=d>=0.15?35:d>=0.05?22:d>0?12:0;
  const isePts=(n(nd.score_saude)||0)/100*25;
  const tags=Array.isArray(nd.tags_calculadas)?nd.tags_calculadas:[];
  const uPts=tags.length>=3?20:tags.length>=2?14:8;
  const aPts=nd.abertura_negociacao==='negociavel'?15:8;
  return Math.round(dPts+isePts+uPts+aPts);
}
function iseLabel(s){
  if(s>=75)return{label:'1N SÓLIDO',bg:'rgba(5,150,105,0.12)',cor:'#065f46'};
  if(s>=50)return{label:'1N EM DESENVOLVIMENTO',bg:'rgba(180,83,9,0.12)',cor:'#92400e'};
  return{label:'1N FRAGILIZADO',bg:'rgba(185,28,28,0.12)',cor:'#991b1b'};
}
function calcPL(nd){
  const a=nd.ativos_json&&typeof nd.ativos_json==='object'?Object.values(nd.ativos_json).reduce((s,v)=>s+n(v),0):0;
  const p=nd.passivos_json&&typeof nd.passivos_json==='object'?Object.values(nd.passivos_json).reduce((s,v)=>s+n(v),0):0;
  return a-p;
}
function aderMerc(nd){
  const b={'Saúde & Estética':21,'Tecnologia / SaaS':28,'Alimentação':18,'Educação':22,'Comércio / Distribuição':12};
  const m=n(nd.margem_ebitda);
  return m?Math.round(m-(b[nd.categoria]||18)):null;
}

/* fetch */
async function fetchNegocios(){
  const r=await fetch(
    `${SUPA}/rest/v1/negocios?status=eq.publicado`+
    `&select=id,codigo,titulo_anuncio,categoria,cidade,estado,`+
    `faturamento_anual,resultado_liquido_mensal,ebitda,margem_ebitda,`+

    `preco_pedido,valor_1n,score_saude,score_pilares,`+
    `ativos_json,passivos_json,tags_calculadas,tag_preco,`+
    `abertura_negociacao,descricao_geral,teaser_contexto_ia`+
    `&titulo_anuncio=not.is.null&preco_pedido=not.is.null&valor_1n=not.is.null`+
    `&order=publicado_em.desc`,
    {headers:{apikey:KEY,Authorization:'Bearer '+KEY}}
  );
  if(!r.ok)throw new Error('fetch');
  return r.json();
}

/* ── EFEITO CATRACA ── */
function setupCatraca(lastCard){
  let pulling=false,startY=0;
  const THRESHOLD=60;

  document.addEventListener('touchstart',e=>{
    const scrollEl=document.scrollingElement||document.documentElement;
    const atBottom=scrollEl.scrollTop+scrollEl.clientHeight>=scrollEl.scrollHeight-8;
    if(atBottom){pulling=true;startY=e.touches[0].clientY;}
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!pulling)return;
    const dy=startY-e.touches[0].clientY; /* quanto puxou pra baixo */
    if(dy>0){
      const stretch=Math.min(dy/2,20);
      lastCard.style.transform=`scaleY(${1+stretch*0.003}) translateY(-${stretch*0.5}px)`;
    }
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!pulling)return;
    pulling=false;
    /* catraca — volta com bounce */
    lastCard.style.transition='transform 0.35s cubic-bezier(.34,1.56,.64,1)';
    lastCard.style.transform='';
    setTimeout(()=>lastCard.style.transition='',400);
  },{passive:true});
}

    ${am!=null?`<div class="bench-item"><div class="bench-head"><span class="bench-l">Aderência ao mercado</span><span class="bench-emp" style="color:${am>=0?'#059669':'#b45309'}">${am>0?'+'+am+'pp acima':am+'pp abaixo'}</span></div><div class="bench-bar"><div class="bf-s" style="width:50%"></div><div class="${am>=0?'bf-e':'bf-e low'}" style="width:${Math.min(50+am*2,100)}%"></div></div></div>`:''}
    ${n(nd.ebitda)?`<div class="bench-item"><div class="bench-head"><span class="bench-l">Múltiplo EBITDA</span><div><span class="bench-emp">${(n(nd.valor_1n)/n(nd.ebitda)).toFixed(1)}× empresa</span> · <span class="bench-set">4–7× setor</span></div></div><div class="bench-bar"><div class="bf-s" style="width:70%"></div><div class="${(n(nd.valor_1n)/n(nd.ebitda))>=4?'bf-e':'bf-e low'}" style="width:${Math.min((n(nd.valor_1n)/n(nd.ebitda))/7*100,100)}%"></div></div></div>`:''}
    </div>`,

    `<div class="slide"><div class="slide-lbl">07 · Upsides identificados</div>
    ${tags.length?tags.map(t=>`<div class="up-card"><div class="up-head"><div class="up-tit">${t}</div><div class="up-desc">Oportunidade identificada pela 1N com potencial de valorização.</div></div><div class="up-nums"><div class="un"><div class="un-l">Impacto estimado</div><div class="un-v">A quantificar</div></div><div class="un"><div class="un-l">Upside valuation</div><div class="un-v">A quantificar</div></div></div></div>`).join(''):'<p style="font-size:0.65rem;color:rgba(13,43,31,0.4)">Disponível no dossiê.</p>'}
    <div class="mais-up"><div class="mu-icon">${tags.length}</div><div><div class="mu-t">${tags.length} upsides identificados</div><div class="mu-sub">Solicite o dossiê para análise</div></div></div>
    </div>`,

    `<div class="slide"><div class="slide-lbl">08 · Valor de venda × avaliação 1N</div>
    <div class="val-bloco">
      <div class="vb-row"><span class="vb-l">Valor de venda (dono)</span><span class="vb-v ink">${brl(nd.preco_pedido)}</span></div>
      <div class="vb-row"><span class="vb-l">Avaliação independente 1N</span><div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px"><span class="vb-v g">${brl(nd.valor_1n)}</span>${isOp?`<span class="vb-tag" style="background:#059669;color:#fff">OPORTUNIDADE</span>`:'<span class="vb-tag" style="background:rgba(13,43,31,0.07);color:rgba(13,43,31,0.45)">NA FAIXA</span>'}</div></div>
    </div>
    ${desconto&&parseFloat(desconto)>0?`<div class="desc-box"><span class="db-l">Desconto implícito</span><span class="db-v">${desconto}% abaixo</span></div>`:''}
    <div class="val-bloco">
      <div class="vb-row"><span class="vb-l">Patrimônio líquido</span><span class="vb-v" style="color:${pl>=0?'#059669':'#b45309'}">${pl>=0?'+ ':'– '}${brl(Math.abs(pl))}</span></div>
      <div class="vb-row"><span class="vb-l">Valor efetivo</span><span class="vb-v ink">${brl(efetivo)}</span></div>
    </div>
    <div class="metod">Avaliação 1N independente · EBITDA × múltiplo setorial · patrimônio sobre ativos e passivos declarados</div>
    </div>`,
  ];
}

function abrirCard(nd){
  const p=getP(nd.categoria);
  const il=iseLabel(n(nd.score_saude));
  const pl=calcPL(nd);
  const efetivo=n(nd.preco_pedido)-pl;
  const io=calcIO(nd);
  const isOp=io>=75||nd.tag_preco==='oportunidade';

  /* topo do sheet = mesma cor e estética do card */
  const top=document.getElementById('expTop');
  top.style.cssText=`background:${p.bg};color:${p.cor};border-color:${p.bd};border:0.5px solid ${p.bd};border-radius:20px 20px 0 0;padding:12px 14px 14px;flex-shrink:0;position:relative;border-bottom:0.5px solid rgba(0,0,0,0.08)`;
  top.innerHTML=`
    <div class="exp-handle" style="background:rgba(0,0,0,0.1)"></div>
    <button class="btn-fechar" onclick="fechar()" style="color:${p.cor};background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.08)">✕</button>
    <div class="exp-meta" style="color:${p.cor};opacity:0.45">${nd.codigo} · ${nd.categoria} · ${nd.cidade}, ${nd.estado}</div>
    <div class="exp-title" style="color:${p.cor}">${nd.titulo_anuncio}</div>
    <div class="exp-vals">
      <div class="ev">
        <div class="ev-l" style="color:${p.cor}">Valor de venda</div>
        <div class="ev-v" style="color:${p.cor}">${brl(nd.preco_pedido)}</div>
      </div>
      <div class="ev pl">
        <div class="ev-l" style="color:${p.cor}">Valor efetivo</div>
        <div class="ev-v" style="color:${p.cor}">${brl(efetivo)}</div>
      </div>
      <div class="ev pl">
        <div class="ev-l" style="color:${p.cor}">Aval. 1N</div>
        <div class="ev-v" style="color:${p.acc}">${brl(nd.valor_1n)}</div>
        <div class="ev-tag">${isOp?`<span class="exp-op-tag">OPORTUNIDADE</span>`:`<span class="exp-ise-tag" style="background:${il.bg};color:${il.cor}">${il.label}</span>`}</div>
      </div>
    </div>`;

  /* sheet herda a cor de fundo do card */
  document.getElementById('expSheet').style.background=p.bg;

  const track=document.getElementById('carTrack');
  const slides=buildSlides(nd,p,pl,efetivo);
  track.innerHTML=slides.join('');
  track.style.width=(NS*100)+'%';
  track.querySelectorAll('.slide').forEach(s=>s.style.width=(100/NS)+'%');

  const dots=document.getElementById('carDots');
  dots.innerHTML='';
  for(let i=0;i<NS;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.onclick=()=>goSlide(i);
    dots.appendChild(d);
  }

  document.getElementById('btnInfo').onclick=()=>{
    const msg=encodeURIComponent(`Olá! Vi na 1Negócio [${nd.codigo}] e tenho interesse. Pode me passar mais detalhes?`);
    window.open(`https://wa.me/5548999999999?text=${msg}`,'_blank');
  };

  carCur=0;goSlide(0);
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}

function fechar(){
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow='';
}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)fechar();});

/* carrossel */
function goSlide(i){
  carCur=Math.max(0,Math.min(NS-1,i));
  document.getElementById('carTrack').style.transform=`translateX(-${carCur*(100/NS)}%)`;
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('on',j===carCur));
  document.getElementById('carLbl').textContent=`${carCur+1} / ${NS}`;
  document.getElementById('carPrev').disabled=carCur===0;
  document.getElementById('carNext').disabled=carCur===NS-1;
}
function carNav(d){goSlide(carCur+d)}
function compartilhar(){if(navigator.share)navigator.share({title:'1Negócio',url:window.location.href}).catch(()=>{});else{navigator.clipboard?.writeText(window.location.href);alert('Link copiado!');}}

/* swipe carrossel */
let sx=0,sy=0;
document.getElementById('expSheet').addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.getElementById('expSheet').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)carNav(dx<0?1:-1);},{passive:true});

/* tags */
function buildTagStripe(list){
  const families=new Set(list.map(x=>(CAT_MAP[(x.categoria||'').toLowerCase().trim()]||'outros')));
  const scroll=document.getElementById('catScroll');
  scroll.querySelectorAll('.cat-tag').forEach(t=>t.remove());
  CATS_ORDER.filter(f=>families.has(f)).forEach(f=>{
    const p=PALETA[f];
    const btn=document.createElement('button');
    btn.className='cat-tag';btn.dataset.fam=f;
    btn.style.cssText=`background:${p.bg};border-color:${p.bd};color:${p.cor}`;
    btn.textContent=p.label.toUpperCase();
    btn.onclick=()=>filtrarCat(f);
    scroll.appendChild(btn);
  });
}
function filtrarCat(fam){
  catAtiva=fam;
  document.getElementById('tagAll').classList.toggle('off',fam!==null);
  document.querySelectorAll('.cat-tag').forEach(t=>t.classList.toggle('on',t.dataset.fam===fam));
  aplicar();
}

/* localização */
function buildLoc(list){
  const estados=[...new Set(list.map(x=>x.estado).filter(Boolean))].sort();
  const opts=document.getElementById('locOpts');
  opts.innerHTML='';
  const all=document.createElement('button');
  all.className='loc-opt on';all.textContent='Todos os estados';all.onclick=()=>filtrarEstado(null);
  opts.appendChild(all);
  estados.forEach(e=>{
    const b=document.createElement('button');
    b.className='loc-opt';b.textContent=e;b.dataset.est=e;b.onclick=()=>filtrarEstado(e);
    opts.appendChild(b);
  });
}
function filtrarEstado(est){
  estadoAtivo=est;
  document.querySelectorAll('.loc-opt').forEach(o=>o.classList.toggle('on',est===null?!o.dataset.est:o.dataset.est===est));
  document.getElementById('locLabel').textContent=est||'BR';
  const btn=document.getElementById('btnEstado');
  est?btn.classList.add('ativo'):btn.classList.remove('ativo');
  fecharLoc();aplicar();
}
function abrirLoc(){document.getElementById('locModal').classList.add('on');document.body.style.overflow='hidden'}
function fecharLoc(e){if(!e||e.target===document.getElementById('locModal')){document.getElementById('locModal').classList.remove('on');document.body.style.overflow='';}}

/* stats */
function popularStats(list){
  const fat=list.reduce((s,x)=>s+n(x.faturamento_anual),0);
  const val=list.reduce((s,x)=>s+n(x.valor_1n),0);
  const res=list.reduce((s,x)=>s+n(x.resultado_liquido_mensal)*12,0);
  const iseList=list.filter(x=>n(x.score_saude)>0);
  const iseMed=iseList.length?Math.round(iseList.reduce((s,x)=>s+n(x.score_saude),0)/iseList.length):0;
  document.getElementById('sN').textContent=list.length;
  document.getElementById('sFat').innerHTML=`<em>R$ ${brlS(fat)}</em>`;
  document.getElementById('sVal').innerHTML=`<em>R$ ${brlS(val)}</em>`;
  document.getElementById('sRes').innerHTML=`<em>R$ ${brlS(res)}</em>`;
  document.getElementById('sIse').textContent=iseMed;
}

/* render */
function aplicar(){
  let lista=[...todos];
  if(catAtiva)lista=lista.filter(x=>(CAT_MAP[(x.categoria||'').toLowerCase().trim()]||'outros')===catAtiva);
  if(estadoAtivo)lista=lista.filter(x=>x.estado===estadoAtivo);
  lista.sort((a,b)=>calcIO(b)-calcIO(a));
  filtrados=lista;
  renderStack();
}
function renderStack(){
  const stack=document.getElementById('stack');
  const cnt=document.getElementById('fCount');
  stack.innerHTML='';
  if(!filtrados.length){stack.innerHTML='<p style="text-align:center;font-size:12px;color:rgba(13,43,31,0.3);padding:3rem 0">Nenhum anúncio com estes filtros.</p>';cnt.innerHTML='';return;}
  cnt.innerHTML=`<strong>${filtrados.length}</strong> anúncio${filtrados.length!==1?'s':''}`;
  filtrados.forEach((nd,i)=>stack.appendChild(buildCard(nd,i,filtrados.length)));
}

(async()=>{
  try{
    todos=await fetchNegocios();
    todos.sort((a,b)=>calcIO(b)-calcIO(a));
    filtrados=[...todos];
    buildTagStripe(todos);
    buildLoc(todos);
    popularStats(todos);
    renderStack();
  }catch(e){
    document.getElementById('stack').innerHTML='<p style="text-align:center;font-size:12px;color:rgba(13,43,31,0.3);padding:3rem 0">Erro ao carregar. Recarregue a página.</p>';
    console.error(e);
  }
})();
</script>
</body>
