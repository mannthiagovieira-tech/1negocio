<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Negócio · Laudo Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f7f5;--wh:#fff;--green:#10b981;--gd:#166534;--gm:#059669;--gbg:#f0faf5;--gbg2:#e6f7ef;--tx:#1a1a18;--tl:#666;--tm:#999;--am:#f59e0b;--rd:#f87171;--bl:#60a5fa;--line:rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace;font-size:13px;line-height:1.6}

.topbar{background:var(--gd);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;letter-spacing:-.02em}
.topbar-logo span{color:var(--green)}
.topbar-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5)}

.page{max-width:900px;margin:0 auto;padding:30px 20px}

/* HEADER */
.header{background:var(--wh);border:1px solid var(--line);padding:28px;margin-bottom:20px}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.header-name{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--gd);letter-spacing:-.02em}
.header-code{font-size:11px;color:var(--tm);letter-spacing:2px}
.header-meta{display:flex;gap:20px;flex-wrap:wrap}
.meta-item{font-size:11px;color:var(--tl)}
.meta-item b{color:var(--tx);font-weight:500}

/* ACTION BAR */
.action-bar{background:var(--gbg);border:1px solid rgba(16,185,129,.15);padding:16px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.action-label{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--gd)}
.action-links{display:flex;gap:12px}
.action-links a{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--green);text-decoration:none;padding:6px 14px;border:1px solid var(--green)}
.action-links a:hover{background:var(--green);color:#fff}
.action-links a.wpp{border-color:var(--gm);color:var(--gm)}
.action-links a.wpp:hover{background:var(--gm);color:#fff}

/* SECTIONS */
.section{background:var(--wh);border:1px solid var(--line);margin-bottom:16px}
.section-header{padding:14px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--gd);text-transform:uppercase;letter-spacing:1px}
.section-badge{font-size:9px;padding:3px 8px;letter-spacing:1px;text-transform:uppercase}
.badge-green{background:var(--gbg2);color:var(--gd)}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fef2f2;color:#991b1b}

.section-body{padding:20px 28px}

/* DATA ROWS */
.row{display:flex;border-bottom:1px solid var(--line);padding:8px 0}
.row:last-child{border-bottom:none}
.row-label{min-width:220px;font-size:11px;color:var(--tm);text-transform:uppercase;letter-spacing:1px;padding-top:2px}
.row-value{flex:1;font-size:13px;color:var(--tx)}
.row-value.green{color:var(--gd);font-weight:500}
.row-value.amber{color:#92400e}
.row-value.red{color:#991b1b}
.row-value.muted{color:var(--tm)}

/* GRID 2 COL */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 40px}

/* TEXTO LONGO */
.text-block{font-size:12px;color:var(--tl);line-height:1.8;white-space:pre-wrap;background:var(--bg);padding:14px;border:1px solid var(--line)}

/* LOADING */
.loading{text-align:center;padding:80px 20px;color:var(--tm);font-size:12px;letter-spacing:2px;text-transform:uppercase}

/* PRINT */
@media print{.topbar,.action-bar{display:none}.page{padding:0}.section{break-inside:avoid}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo"><span>1</span>NEGÓCIO</div>
  <div class="topbar-badge">Laudo Admin · Uso Interno</div>
</div>

<div class="page" id="page">
  <div class="loading" id="loading">Carregando dados...</div>
</div>

<script>
const SUPABASE_URL = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

function brl(v) {
  if (!v && v !== 0) return '—';
  return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
}
function pct(v) { return v != null ? v + '%' : '—'; }
function sn(v) { return v === true || v === 'sim' ? 'Sim' : v === false || v === 'nao' ? 'Não' : v || '—'; }
function txt(v) { return v || '—'; }

async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const codigo = params.get('c');

  let query = `${SUPABASE_URL}/rest/v1/negocios?select=*`;
  if (id) query += `&id=eq.${id}`;
  else if (codigo) query += `&codigo_diagnostico=eq.${codigo}`;
  else { document.getElementById('loading').textContent = 'ID ou código não informado'; return; }

  const res = await fetch(query, {
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
  });
  const data = await res.json();
  if (!data || !data[0]) { document.getElementById('loading').textContent = 'Negócio não encontrado'; return; }

  const n = data[0];
  const d = n.dados_json || {};
  render(n, d);
}

function render(n, d) {
  const page = document.getElementById('page');
  const wppLink = d.whatsapp ? `https://wa.me/55${d.whatsapp.replace(/\D/g,'')}` : '#';
  const laudoLink = `https://1negocio.com.br/laudo-completo.html?c=${n.codigo_diagnostico}`;
  const laudoPagoLink = `https://1negocio.com.br/laudo-pago.html?c=${n.codigo_diagnostico}`;
  const dataFormatada = new Date(n.created_at).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', timeZone:'America/Sao_Paulo' });

  const motivacaoMap = { curiosidade:'Curiosidade', vender:'Quer vender', sucessao:'Sucessão', captar_socio:'Captar sócio', planejamento:'Planejamento', socio:'Busca sócio' };

  page.innerHTML = `
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-name">${txt(d.nome_negocio || n.nome)}</div>
        <div class="header-code">${n.codigo_diagnostico || '—'} · ${txt(d.cnpj_razao)}</div>
      </div>
      <div style="text-align:right">
        <div class="header-code">${dataFormatada}</div>
        <div class="header-code">Status: ${n.status}</div>
      </div>
    </div>
    <div class="header-meta">
      <div class="meta-item"><b>Contato:</b> ${txt(d.nome_contato)}</div>
      <div class="meta-item"><b>WhatsApp:</b> ${txt(d.whatsapp)}</div>
      <div class="meta-item"><b>Motivação:</b> ${motivacaoMap[d.motivacao] || txt(d.motivacao)}</div>
      <div class="meta-item"><b>Setor:</b> ${txt(d.setor)}</div>
      <div class="meta-item"><b>Local:</b> ${txt(d.cidade)}/${txt(d.estado)}</div>
      <div class="meta-item"><b>CNPJ:</b> ${txt(d.cnpj)}</div>
    </div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar">
    <div class="action-label">Ações</div>
    <div class="action-links">
      <a href="${wppLink}" target="_blank" class="wpp">WhatsApp</a>
      <a href="${laudoLink}" target="_blank">Laudo gratuito</a>
      <a href="${laudoPagoLink}" target="_blank">Laudo pago</a>
    </div>
  </div>

  <!-- IDENTIFICAÇÃO -->
  <div class="section">
    <div class="section-header"><div class="section-title">Identificação</div></div>
    <div class="section-body">
      <div class="grid2">
        <div class="row"><div class="row-label">Nome fantasia</div><div class="row-value">${txt(d.nome_negocio)}</div></div>
        <div class="row"><div class="row-label">Razão social</div><div class="row-value">${txt(d.cnpj_razao)}</div></div>
        <div class="row"><div class="row-label">CNPJ</div><div class="row-value">${txt(d.cnpj)}</div></div>
        <div class="row"><div class="row-label">Nome fantasia CNPJ</div><div class="row-value">${txt(d.cnpj_nome_fantasia)}</div></div>
        <div class="row"><div class="row-label">Município CNPJ</div><div class="row-value">${txt(d.cnpj_municipio)}</div></div>
        <div class="row"><div class="row-label">UF CNPJ</div><div class="row-value">${txt(d.cnpj_uf)}</div></div>
        <div class="row"><div class="row-label">Anos CNPJ</div><div class="row-value">${txt(d.cnpj_anos)}</div></div>
        <div class="row"><div class="row-label">Anexo Simples</div><div class="row-value">${txt(d.anexo_simples)}</div></div>
        <div class="row"><div class="row-label">Bairro</div><div class="row-value">${txt(d.bairro)}</div></div>
        <div class="row"><div class="row-label">Metragem</div><div class="row-value">${d.metragem ? d.metragem + ' m²' : '—'}</div></div>
        <div class="row"><div class="row-label">Local tipo</div><div class="row-value">${txt(d.local_tipo)}</div></div>
        <div class="row"><div class="row-label">Local onde</div><div class="row-value">${txt(d.local_onde)}</div></div>
        <div class="row"><div class="row-label">Imóvel</div><div class="row-value">${txt(d.imovel_tipo)}</div></div>
        <div class="row"><div class="row-label">Contrato</div><div class="row-value">${txt(d.contrato)}</div></div>
        <div class="row"><div class="row-label">Franquia</div><div class="row-value">${sn(d.franquia)}</div></div>
        <div class="row"><div class="row-label">Marca INPI</div><div class="row-value">${txt(d.marca_inpi)}</div></div>
      </div>
    </div>
  </div>

  <!-- FATURAMENTO -->
  <div class="section">
    <div class="section-header"><div class="section-title">Faturamento e Receita</div></div>
    <div class="section-body">
      <div class="grid2">
        <div class="row"><div class="row-label">Faturamento mensal</div><div class="row-value green">${brl(d.fat_mensal)}</div></div>
        <div class="row"><div class="row-label">Faturamento anual</div><div class="row-value green">${brl(d.fat_anual)}</div></div>
        <div class="row"><div class="row-label">Fat. produto</div><div class="row-value">${brl(d.fat_produto)}</div></div>
        <div class="row"><div class="row-label">Fat. serviço</div><div class="row-value">${brl(d.fat_servico)}</div></div>
        <div class="row"><div class="row-label">% Produto</div><div class="row-value">${pct(d.pct_produto)}</div></div>
        <div class="row"><div class="row-label">Crescimento</div><div class="row-value">${txt(d.crescimento)}</div></div>
        <div class="row"><div class="row-label">Crescimento %</div><div class="row-value">${pct(d.crescimento_pct)}</div></div>
        <div class="row"><div class="row-label">Crescimento projetado</div><div class="row-value">${pct(d.crescimento_proj_pct)}</div></div>
        <div class="row"><div class="row-label">Recorrência</div><div class="row-value">${sn(d.recorrencia)}</div></div>
        <div class="row"><div class="row-label">Concentração %</div><div class="row-value">${pct(d.concentracao_pct)}</div></div>
        <div class="row"><div class="row-label">Canais</div><div class="row-value">${(d.canais||[]).join(', ') || '—'}</div></div>
        <div class="row"><div class="row-label">Presença digital</div><div class="row-value">${(d.online||[]).join(', ') || '—'}</div></div>
        <div class="row"><div class="row-label">Modelo atuação</div><div class="row-value">${(d.modelo_atuacao_multi||[]).join(', ') || '—'}</div></div>
        <div class="row"><div class="row-label">Base de clientes</div><div class="row-value">${sn(d.base_clientes)}</div></div>
      </div>
    </div>
  </div>

  <!-- CUSTOS -->
  <div class="section">
    <div class="section-header"><div class="section-title">Estrutura de Custos</div></div>
    <div class="section-body">
      <div class="grid2">
        <div class="row"><div class="row-label">CMV %</div><div class="row-value">${pct(d.cmv_pct)}</div></div>
        <div class="row"><div class="row-label">CMV valor</div><div class="row-value">${brl(d.cmv_valor)}</div></div>
        <div class="row"><div class="row-label">CMV fonte</div><div class="row-value">${txt(d.cmv_fonte)}</div></div>
        <div class="row"><div class="row-label">Aluguel</div><div class="row-value">${brl(d.aluguel)}</div></div>
        <div class="row"><div class="row-label">CLT qtd</div><div class="row-value">${txt(d.clt_qtd)}</div></div>
        <div class="row"><div class="row-label">CLT folha</div><div class="row-value">${brl(d.clt_folha)}</div></div>
        <div class="row"><div class="row-label">CLT encargos</div><div class="row-value">${brl(d.clt_encargos)}</div></div>
        <div class="row"><div class="row-label">CLT provisões</div><div class="row-value">${brl(d.clt_provisoes)}</div></div>
        <div class="row"><div class="row-label">CLT total</div><div class="row-value">${brl(d.clt_total)}</div></div>
        <div class="row"><div class="row-label">PJ qtd</div><div class="row-value">${txt(d.pj_qtd)}</div></div>
        <div class="row"><div class="row-label">PJ custo</div><div class="row-value">${brl(d.pj_custo)}</div></div>
        <div class="row"><div class="row-label">Terceiros</div><div class="row-value">${brl(d.custo_terceiros)}</div></div>
        <div class="row"><div class="row-label">Folha total</div><div class="row-value">${brl(d.folha_total)}</div></div>
        <div class="row"><div class="row-label">Comissão %</div><div class="row-value">${pct(d.comissao_pct)}</div></div>
        <div class="row"><div class="row-label">Comissões</div><div class="row-value">${brl(d.custo_comissoes)}</div></div>
        <div class="row"><div class="row-label">Marketing</div><div class="row-value">${brl(d.mkt_valor)}</div></div>
        <div class="row"><div class="row-label">Marketing pago</div><div class="row-value">${sn(d.mkt_pago)}</div></div>
        <div class="row"><div class="row-label">Sistemas</div><div class="row-value">${brl(d.custo_sistemas)}</div></div>
        <div class="row"><div class="row-label">Utilities</div><div class="row-value">${brl(d.custo_utilities)}</div></div>
        <div class="row"><div class="row-label">Outros custos fixos</div><div class="row-value">${brl(d.outros_custos_fixos)}</div></div>
        <div class="row"><div class="row-label">Custo pessoal total</div><div class="row-value">${brl(d.custo_pessoal)}</div></div>
      </div>
    </div>
  </div>

  <!-- IMPOSTOS E RECEBIMENTO -->
  <div class="section">
    <div class="section-header"><div class="section-title">Impostos e Meios de Recebimento</div></div>
    <div class="section-body">
      <div class="grid2">
        <div class="row"><div class="row-label">Regime tributário</div><div class="row-value">${txt(d.regime_tributario || d.regime)}</div></div>
        <div class="row"><div class="row-label">Alíquota imposto</div><div class="row-value">${d.aliquota_imposto ? (d.aliquota_imposto * 100).toFixed(1) + '%' : '—'}</div></div>
        <div class="row"><div class="row-label">Imposto mensal</div><div class="row-value">${brl(d.impostos_mensal)}</div></div>
        <div class="row"><div class="row-label">Imposto calculado</div><div class="row-value">${brl(d.imposto_calculado)}</div></div>
        <div class="row"><div class="row-label">Fator R</div><div class="row-value">${d.fator_r ? (d.fator_r * 100).toFixed(1) + '%' : '—'}</div></div>
        <div class="row"><div class="row-label">Meios selecionados</div><div class="row-value">${(d.meios_selecionados||[]).join(', ') || '—'}</div></div>
        <div class="row"><div class="row-label">Meios % (PIX/Déb/Créd)</div><div class="row-value">${d.meios_pct ? JSON.stringify(d.meios_pct) : '—'}</div></div>
        <div class="row"><div class="row-label">Taxas meios</div><div class="row-value">${d.meios_taxa ? JSON.stringify(d.meios_taxa) : '—'}</div></div>
        <div class="row"><div class="row-label">Custo cartões</div><div class="row-value">${brl(d.custo_cartoes)}</div></div>
        <div class="row"><div class="row-label">Custo recebimento total</div><div class="row-value">${brl(d.custo_recebimento_total)}</div></div>
        <div class="row"><div class="row-label">Antecipa</div><div class="row-value">${sn(d.antecipa)}</div></div>
        <div class="row"><div class="row-label">Custo antecipação</div><div class="row-value">${brl(d.custo_antecipacao)}</div></div>
        <div class="row"><div class="row-label">PMR (dias)</div><div class="row-value">${txt(d.pmr)}</div></div>
      </div>
    </div>
  </div>

  <!-- RESULTADO -->
  <div class="section">
    <div class="section-header"><div class="section-title">Resultado Operacional</div></div>
    <div class="section-body">
      <div class="grid2">
        <div class="row"><div class="row-label">Receita líquida</div><div class="row-value green">${brl(d.receita_liquida)}</div></div>
        <div class="row"><div class="row-label">Margem bruta</div><div class="row-value green">${brl(d.margem_bruta)}</div></div>
        <div class="row"><div class="row-label">Resultado operacional</div><div class="row-value green">${brl(d.ro_mensal || d.resultado_op)}</div></div>
        <div class="row"><div class="row-label">Pró-labore calculado</div><div class="row-value">${brl(d.prolabore_calculado || d.prolabore)}</div></div>
        <div class="row"><div class="row-label">Remuneração sócios</div><div class="row-value">${txt(d.remuneracao_socios)}</div></div>
        <div class="row"><div class="row-label">Potencial caixa</div><div class="row-value">${brl(d.potencial_caixa)}</div></div>
      </div>
    </div>
  </div>

  <!-- ATIVOS E PASSIVOS -->
  <div class="section">
    <div class="section-header"><div class="section-title">Ativos e Passivos</div></div>
    <div class="section-body">
      <div class="grid2">
        <div class="row"><div class="row-label">Caixa</div><div class="row-value">${brl(d.at_caixa)}</div></div>
        <div class="row"><div class="row-label">Contas a receber</div><div class="row-value">${brl(d.contas_receber || d.at_cr)}</div></div>
        <div class="row"><div class="row-label">Estoque</div><div class="row-value">${brl(d.at_estoque || d.estoque_valor)}</div></div>
        <div class="row"><div class="row-label">Equipamentos</div><div class="row-value">${brl(d.at_equip)}</div></div>
        <div class="row"><div class="row-label">Veículos</div><div class="row-value">${brl(d.at_veiculos)}</div></div>
        <div class="row"><div class="row-label">Imóvel</div><div class="row-value">${brl(d.at_imovel)}</div></div>
        <div class="row"><div class="row-label">Total ativos</div><div class="row-value green">${brl(d.total_ativos)}</div></div>
        <div class="row"><div class="row-label">Fornecedores a pagar</div><div class="row-value">${brl(d.fornec_a_pagar)}</div></div>
        <div class="row"><div class="row-label">Fornecedores a vencer</div><div class="row-value">${brl(d.fornec_a_vencer)}</div></div>
        <div class="row"><div class="row-label">Fornecedores atrasadas</div><div class="row-value ${d.fornec_atrasadas > 0 ? 'red' : ''}">${brl(d.fornec_atrasadas)}</div></div>
        <div class="row"><div class="row-label">Parcelas mensais</div><div class="row-value">${brl(d.parcelas_mensais)}</div></div>
        <div class="row"><div class="row-label">Tem dívidas</div><div class="row-value ${d.tem_dividas === 'sim' ? 'amber' : ''}">${sn(d.tem_dividas)}</div></div>
        <div class="row"><div class="row-label">Total passivos</div><div class="row-value ${d.total_passivos > 0 ? 'red' : ''}">${brl(d.total_passivos)}</div></div>
        <div class="row"><div class="row-label">Prazo fornecedores</div><div class="row-value">${txt(d.prazo_fornec)} dias</div></div>
      </div>
    </div>
  </div>

  <!-- GESTÃO E OPERAÇÃO -->
  <div class="section">
    <div class="section-header"><div class="section-title">Gestão e Operação</div></div>
    <div class="section-body">
      <div class="grid2">
        <div class="row"><div class="row-label">Dependência do dono</div><div class="row-value ${d.dependencia === 'dependente' ? 'red' : 'green'}">${txt(d.dependencia)}</div></div>
        <div class="row"><div class="row-label">Gestor autônomo</div><div class="row-value">${sn(d.gestor_autonomo)}</div></div>
        <div class="row"><div class="row-label">Equipe permanece</div><div class="row-value">${txt(d.equipe_permanece)}</div></div>
        <div class="row"><div class="row-label">Processos</div><div class="row-value">${txt(d.processos)}</div></div>
        <div class="row"><div class="row-label">Organograma</div><div class="row-value">${txt(d.organograma)}</div></div>
        <div class="row"><div class="row-label">Sócios</div><div class="row-value">${sn(d.socios)}</div></div>
        <div class="row"><div class="row-label">Sócio ativo</div><div class="row-value">${sn(d.socio_ativo)}</div></div>
        <div class="row"><div class="row-label">ERP</div><div class="row-value">${sn(d.erp)} ${d.erp_nome ? '('+d.erp_nome+')' : ''}</div></div>
        <div class="row"><div class="row-label">CRM</div><div class="row-value">${txt(d.crm)}</div></div>
        <div class="row"><div class="row-label">Contabilidade formal</div><div class="row-value">${sn(d.contabilidade_formal)}</div></div>
        <div class="row"><div class="row-label">Processos jurídicos</div><div class="row-value ${d.processos_juridicos === 'sim' ? 'red' : ''}">${sn(d.processos_juridicos)}</div></div>
        <div class="row"><div class="row-label">Reputação</div><div class="row-value">${txt(d.reputacao)}</div></div>
        <div class="row"><div class="row-label">Escalabilidade</div><div class="row-value">${pct(d.scalability_pct)}</div></div>
        <div class="row"><div class="row-label">Digital puro</div><div class="row-value">${sn(d.digital_puro)}</div></div>
      </div>
    </div>
  </div>

  <!-- AVALIAÇÃO -->
  <div class="section">
    <div class="section-header"><div class="section-title">Avaliação e Expectativa</div></div>
    <div class="section-body">
      <div class="grid2">
        <div class="row"><div class="row-label">ISE parcial</div><div class="row-value green">${txt(d.ise_parcial)}/100</div></div>
        <div class="row"><div class="row-label">Múltiplo usado</div><div class="row-value">${txt(d.multiplo_usado)}×</div></div>
        <div class="row"><div class="row-label">Avaliação mín</div><div class="row-value">${brl(d.avaliacao_min)}</div></div>
        <div class="row"><div class="row-label">Avaliação máx</div><div class="row-value">${brl(d.avaliacao_max)}</div></div>
        <div class="row"><div class="row-label">Valor operação</div><div class="row-value">${brl(d.valor_operacao)}</div></div>
        <div class="row"><div class="row-label">Valor 1N</div><div class="row-value">${brl(d.valor_1n)}</div></div>
        <div class="row"><div class="row-label">Expectativa do cliente</div><div class="row-value amber">${brl(d.expectativa_val)}</div></div>
      </div>
    </div>
  </div>

  <!-- PLANO E MOTIVAÇÃO -->
  <div class="section">
    <div class="section-header"><div class="section-title">Plano e Motivação</div></div>
    <div class="section-body">
      <div class="row"><div class="row-label">Motivação</div><div class="row-value">${motivacaoMap[d.motivacao] || txt(d.motivacao)}</div></div>
      <div class="row"><div class="row-label">Tem plano</div><div class="row-value">${sn(d.plano)}</div></div>
      ${d.plano_texto ? `<div style="margin-top:12px"><div class="row-label" style="margin-bottom:6px">Plano do empresário</div><div class="text-block">${d.plano_texto}</div></div>` : ''}
      ${d.contexto ? `<div style="margin-top:12px"><div class="row-label" style="margin-bottom:6px">Contexto adicional</div><div class="text-block">${d.contexto}</div></div>` : ''}
    </div>
  </div>

  <!-- DESCRIÇÃO GERADA -->
  <div class="section">
    <div class="section-header"><div class="section-title">Descrição Final Gerada</div></div>
    <div class="section-body">
      <div class="text-block">${txt(d.descricao_final)}</div>
    </div>
  </div>
  `;
}

init();
</script>
</body>
</html>
