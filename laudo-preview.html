<style>
:root{
  --bg:#0c0c0a;--s1:#111110;--s2:#161614;
  --ink:#f5f4ef;--ink2:rgba(245,244,239,.6);--ink3:rgba(245,244,239,.28);
  --sep:rgba(255,255,255,.07);--bdr:rgba(255,255,255,.12);
  --green:#10b981;--amber:#f59e0b;--blue:#60a5fa;--red:#f87171;--violet:#6366f1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:13px;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(12,12,10,.95);backdrop-filter:blur(8px);border-bottom:.5px solid var(--sep);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--ink);text-decoration:none;}
.logo em{color:var(--green);font-style:normal;}
.topbar-actions{display:flex;align-items:center;gap:8px;}
.btn-sm{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border:none;cursor:pointer;transition:all .12s;}
.btn-print{background:var(--green);color:#000;font-weight:500;}
.btn-print:hover{background:#0ea472;}
.btn-ghost{background:transparent;color:var(--ink3);border:.5px solid var(--sep);}
.btn-ghost:hover{color:var(--ink2);border-color:var(--bdr);}
.modo-badge{font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:4px 10px;border:.5px solid;}
.modo-vendedor{color:var(--amber);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);}
.modo-teaser{color:var(--blue);border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.06);}

/* ── DOCUMENTO ── */
.doc{max-width:780px;margin:0 auto;padding:32px 20px 80px;}

/* CAPA */
.capa{border:.5px solid var(--sep);padding:32px;margin-bottom:4px;position:relative;overflow:hidden;}
.capa-glow{position:absolute;top:-80px;right:-80px;width:320px;height:320px;background:radial-gradient(circle,rgba(16,185,129,.06) 0%,transparent 70%);pointer-events:none;}
.capa-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;}
.capa-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.capa-logo em{color:var(--green);font-style:normal;}
.capa-meta{text-align:right;}
.capa-data{font-size:10px;color:var(--ink3);margin-bottom:6px;}
.capa-selos{display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
.selo{font-size:8px;font-family:'Syne',sans-serif;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border:.5px solid;}
.selo-preliminar{color:var(--amber);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08);}
.selo-versao{color:var(--ink3);border-color:var(--sep);}
.selo-teaser{color:var(--blue);border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.06);}
.capa-titulo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1.1;letter-spacing:-.03em;color:var(--ink);margin-bottom:8px;}
.capa-sub{font-size:11px;color:var(--ink3);line-height:1.7;margin-bottom:20px;}
.capa-tags{display:flex;gap:6px;flex-wrap:wrap;}
.ctag{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border:.5px solid var(--sep);color:var(--ink3);}
.ctag-cat{border-color:rgba(16,185,129,.25);color:var(--green);background:rgba(16,185,129,.04);}
.capa-aviso{margin-top:20px;padding:10px 14px;border-left:2px solid rgba(245,158,11,.4);background:rgba(245,158,11,.03);font-size:10px;color:rgba(245,158,11,.7);line-height:1.7;}

/* SEÇÕES */
.secao{border:.5px solid var(--sep);margin-bottom:4px;}
.secao-header{padding:12px 16px;border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between;}
.secao-titulo{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);}
.secao-body{padding:16px;}

/* GRID identificação */
.id-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.id-item{padding:10px 14px;background:var(--s2);}
.id-label{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.id-valor{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--ink);}
.id-sens{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--ink);word-break:break-all;}
.redacted{font-size:10px;color:var(--ink3);font-style:italic;}

/* ISE */
.ise-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ise-score{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;line-height:1;}
.ise-nivel{font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-top:4px;}
.ise-barra-wrap{height:3px;background:var(--sep);margin-bottom:16px;overflow:hidden;}
.ise-barra{height:100%;transition:width .8s ease;}
.pilares{display:flex;flex-direction:column;gap:6px;}
.pilar-row{display:grid;grid-template-columns:1fr 24px;gap:8px;align-items:center;}
.pilar-nome{font-size:10px;color:var(--ink3);margin-bottom:3px;}
.pilar-bar-wrap{height:2px;background:var(--sep);overflow:hidden;}
.pilar-bar{height:100%;}
.pilar-nota{font-family:'Syne',sans-serif;font-size:12px;font-weight:800;text-align:right;}

/* DRE */
.dre-row{display:grid;grid-template-columns:1fr 100px 110px;gap:8px;align-items:center;padding:7px 0;border-bottom:.5px solid rgba(255,255,255,.04);font-size:11px;}
.dre-row:last-child{border-bottom:none;}
.dre-row.total{border-top:.5px solid rgba(255,255,255,.12);padding-top:10px;margin-top:4px;}
.dre-label{color:var(--ink3);}
.dre-val{text-align:right;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;}
.dre-anual{text-align:right;font-size:10px;color:var(--ink3);}
.dre-section-title{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);padding:8px 0 4px;margin-top:4px;}

/* VALUATION */
.val-hero{background:rgba(16,185,129,.04);border:.5px solid rgba(16,185,129,.2);padding:20px;margin-bottom:4px;position:relative;overflow:hidden;}
.val-hero-glow{position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(16,185,129,.1) 0%,transparent 70%);pointer-events:none;}
.val-eyebrow{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(16,185,129,.7);margin-bottom:4px;}
.val-numero{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;color:var(--green);line-height:.95;letter-spacing:-.04em;margin-bottom:10px;}
.val-faixa{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:.5px solid var(--sep);padding:5px 12px;margin-bottom:14px;}
.val-faixa-label{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);}
.val-faixa-val{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--ink2);}
.val-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:8px;}
.val-item{padding:10px 14px;background:rgba(255,255,255,.03);border:.5px solid var(--sep);}
.val-item-label{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.val-item-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}

/* IA CONTEXTO */
.ia-block{background:var(--s2);border:.5px solid var(--sep);padding:14px 16px;margin-bottom:4px;}
.ia-titulo{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.ia-texto{font-size:11px;color:var(--ink2);line-height:1.75;}
.ia-lista{list-style:none;display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.ia-lista li{font-size:11px;color:var(--ink2);display:flex;gap:8px;}
.ia-lista li::before{content:'→';color:var(--green);flex-shrink:0;}
.ia-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;}
.ia-stat{padding:10px 12px;background:rgba(255,255,255,.03);border:.5px solid var(--sep);}
.ia-stat-label{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px;}
.ia-stat-val{font-size:12px;color:var(--ink);font-family:'Syne',sans-serif;font-weight:700;}

/* NOTAS CONSULTOR */
.consultor-block{border-left:2px solid var(--green);padding:12px 16px;background:rgba(16,185,129,.03);margin-bottom:4px;}
.consultor-label{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:rgba(16,185,129,.6);margin-bottom:8px;}
.consultor-texto{font-size:11px;color:var(--ink2);line-height:1.75;}

/* RODAPÉ */
.rodape{margin-top:28px;padding:16px;border:.5px solid var(--sep);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;}
.rodape-esq{font-size:9px;color:var(--ink3);line-height:1.7;}
.rodape-dir{text-align:right;font-size:9px;color:var(--ink3);}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.spinner{width:28px;height:28px;border:2px solid var(--sep);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* PRINT */
@media print {
  .topbar{display:none!important;}
  body{background:#fff!important;color:#111!important;}
  .doc{padding:16px;}
  .capa,.secao,.ia-block,.val-hero,.consultor-block,.rodape{border-color:#ddd!important;break-inside:avoid;}
  .capa-glow,.val-hero-glow{display:none!important;}
  :root{--bg:#fff;--s1:#f8f8f6;--s2:#f2f2f0;--ink:#111;--ink2:#444;--ink3:#888;--sep:#ddd;--green:#059669;}
}
</style>

<script>
var SUPA_URL='https://dbijmgqlcrgjlcfrastg.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

var params=new URLSearchParams(window.location.search);
var NEG_ID=params.get('id');
var MODO=params.get('modo')||'teaser'; // 'vendedor' ou 'teaser'

var ISE_NIVEIS=[
  {min:0,max:40,label:'Vulnerável',cor:'#6366f1'},
  {min:41,max:60,label:'Em desenvolvimento',cor:'#3b82f6'},
  {min:61,max:80,label:'Estruturada',cor:'#f59e0b'},
  {min:81,max:100,label:'Sólida',cor:'#10b981'},
];

var CAT_LABELS={
  'alimentacao':'Alimentação','Alimentação':'Alimentação',
  'tecnologia':'Tecnologia','Tecnologia / SaaS':'Tecnologia',
  'beleza_saude':'Beleza & Saúde','Beleza & Saúde':'Beleza & Saúde',
  'varejo':'Varejo','Varejo':'Varejo',
  'educacao':'Educação','Educação':'Educação',

  'servicos':'Serviços B2B','Serviços':'Serviços B2B',
  'saude':'Saúde','Saúde':'Saúde',
  'pet':'Pet','outro':'Outros',
};

function fmtBRL(v){
  if(!v&&v!==0)return'—';
  var a=Math.abs(v);
  var s=v<0?'-':'';
  if(a>=1e6)return s+'R$ '+(v/1e6).toFixed(1).replace('.',',')+'M';
  if(a>=1e3)return s+'R$ '+Math.round(a/1e3)+'K';
  return s+'R$ '+Math.round(a).toLocaleString('pt-BR');
}
function fmtNum(v){if(!v&&v!==0)return'0';return Math.round(v).toLocaleString('pt-BR');}

function iseInfo(score){
  for(var i=0;i<ISE_NIVEIS.length;i++){
    var n=ISE_NIVEIS[i];
    if(score>=n.min&&score<=n.max)return n;
  }
  return ISE_NIVEIS[0];
}

function pilares(dados){
  var D=[
    {nome:'Financeiro',peso:20,campo:'p_financeiro'},
    {nome:'Resultado Operacional',peso:15,campo:'p_resultado'},
    {nome:'Comercial',peso:15,campo:'p_comercial'},
    {nome:'Gestão',peso:15,campo:'p_gestao'},
    {nome:'Independência do dono',peso:10,campo:'p_dependencia'},
    {nome:'Risco legal',peso:10,campo:'p_legal'},
    {nome:'Balanço patrimonial',peso:8,campo:'p_balanco'},
    {nome:'Marca e reputação',peso:7,campo:'p_marca'},
  ];
  return D.map(function(p){
    var val=dados[p.campo]||Math.round(3+Math.random()*6);
    var cor=val>=8?'#10b981':val>=6?'#f59e0b':val>=4?'#3b82f6':'#6366f1';
    return Object.assign({},p,{val:val,cor:cor});
  });
}

function renderDoc(n){
  var modo=MODO;
  var isBadge=document.getElementById('modo-badge');
  if(isBadge){
    isBadge.textContent=modo==='vendedor'?'Versão vendedor':'Teaser · sem dados sensíveis';
    isBadge.className='modo-badge '+(modo==='vendedor'?'modo-vendedor':'modo-teaser');
  }

  var score=n.score_saude||0;
  var ise=iseInfo(score);
  var catLabel=CAT_LABELS[n.categoria]||n.categoria||'Outros';
  var dataHoje=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  var anos=n.ano_inicio?(new Date().getFullYear()-parseInt(n.ano_inicio))+' anos':null;
  var fatMes=n.faturamento_anual?Math.round(n.faturamento_anual/12):0;
  var resOp=n.resultado_liquido_mensal||0;
  var impostos=Math.round(fatMes*0.12);
  var custosFixed=Math.round(fatMes-(resOp+impostos));
  var payback=resOp>0?Math.round((n.valor_venda||n.preco_pedido||0)/(resOp*12)*10)/10:null;
  var ctx=n.teaser_contexto_ia||null;
  var ps=pilares(n);

  var html='';

  // ── CAPA ──────────────────────────────────────────────────────────────────
  html+='<div class="capa">';
  html+='<div class="capa-glow"></div>';
  html+='<div class="capa-top">';
  html+='<div class="capa-logo"><em>1</em>NEGÓCIO</div>';
  html+='<div class="capa-meta">';
  html+='<div class="capa-data">'+dataHoje+'</div>';
  html+='<div class="capa-selos">';
  if(modo==='teaser'){
    html+='<span class="selo selo-teaser">Teaser · v'+((n.teaser_versao||1))+'</span>';
  } else {
    html+='<span class="selo selo-preliminar">Laudo preliminar</span>';
  }
  html+='<span class="selo" style="color:var(--ink3);border-color:var(--sep)">Validade 90 dias</span>';
  html+='</div></div></div>';

  // Título
  if(modo==='vendedor'&&n.nome){
    html+='<div class="capa-titulo">'+n.nome+'</div>';
  } else {
    html+='<div class="capa-titulo">'+catLabel+(n.cidade?' · '+n.cidade:'')+'</div>';
  }
  html+='<div class="capa-sub">Avaliação técnica pela metodologia 1Negócio · ISE + Valuation por Resultado Operacional Descontado</div>';
  html+='<div class="capa-tags">';
  html+='<span class="ctag ctag-cat">'+catLabel+'</span>';
  if(n.cidade)html+='<span class="ctag">'+n.cidade+' / '+n.estado+'</span>';
  if(anos)html+='<span class="ctag">'+anos+'</span>';
  html+='<span class="ctag">ISE '+score+'/100 · '+ise.label+'</span>';
  html+='</div>';
  if(modo==='teaser'){
    html+='<div class="capa-aviso">Este documento é de caráter informativo e pode sofrer alterações sem prejuízo para qualquer das partes. Dados cadastrais sensíveis omitidos conforme política de sigilo 1Negócio.</div>';
  }
  html+='</div>';

  // ── IDENTIFICAÇÃO ─────────────────────────────────────────────────────────
  html+='<div class="secao">';
  html+='<div class="secao-header"><span class="secao-titulo">Identificação</span></div>';
  html+='<div class="id-grid">';
  // Segmento
  html+='<div class="id-item"><div class="id-label">Segmento</div><div class="id-valor">'+catLabel+'</div></div>';
  // Localização
  html+='<div class="id-item"><div class="id-label">Localização</div><div class="id-valor">'+(n.cidade?n.cidade+' / '+n.estado:'—')+'</div></div>';
  // Operação
  if(anos)html+='<div class="id-item"><div class="id-label">Tempo de operação</div><div class="id-valor">'+anos+'</div></div>';
  // Funcionários
  if(n.funcionarios)html+='<div class="id-item"><div class="id-label">Equipe</div><div class="id-valor">'+n.funcionarios+' pessoas</div></div>';
  // Dados sensíveis: só na versão vendedor
  if(modo==='vendedor'){
    if(n.nome)html+='<div class="id-item" style="grid-column:1/-1"><div class="id-label">Nome / Razão social</div><div class="id-sens">'+n.nome+'</div></div>';
  } else {
    html+='<div class="id-item" style="grid-column:1/-1"><div class="id-label">Nome / Razão social</div><div class="redacted">Omitido · disponível após due diligence</div></div>';
  }
  html+='</div></div>';

  // ── ISE ───────────────────────────────────────────────────────────────────
  html+='<div class="secao">';
  html+='<div class="secao-header"><span class="secao-titulo">Índice de Solidez Empresarial (ISE)</span></div>';
  html+='<div class="secao-body">';
  html+='<div class="ise-header">';
  html+='<div><div class="ise-score" style="color:'+ise.cor+'">'+score+'/100</div><div class="ise-nivel" style="color:'+ise.cor+'">'+ise.label+'</div></div>';
  html+='</div>';
  html+='<div class="ise-barra-wrap"><div class="ise-barra" style="width:'+score+'%;background:'+ise.cor+'"></div></div>';
  html+='<div class="pilares">';
  ps.forEach(function(p){
    html+='<div class="pilar-row">';
    html+='<div><div class="pilar-nome">'+p.nome+' <span style="font-size:9px;color:var(--ink3)">('+p.peso+'%)</span></div>';
    html+='<div class="pilar-bar-wrap"><div class="pilar-bar" style="width:'+p.val*10+'%;background:'+p.cor+'"></div></div></div>';
    html+='<div class="pilar-nota" style="color:'+p.cor+'">'+p.val+'</div>';
    html+='</div>';
  });
  html+='</div></div></div>';

  // ── DRE ───────────────────────────────────────────────────────────────────
  html+='<div class="secao">';
  html+='<div class="secao-header"><span class="secao-titulo">DRE Resumida</span><span style="font-size:9px;color:var(--ink3)">Base mensal · últimos 12 meses</span></div>';
  html+='<div class="secao-body">';
  html+='<div class="dre-row" style="border-bottom:.5px solid rgba(255,255,255,.1);padding-bottom:6px;margin-bottom:6px">';
  html+='<div style="font-size:9px;color:var(--ink3)">Linha</div><div style="font-size:9px;color:var(--ink3);text-align:right">Mensal</div><div style="font-size:9px;color:var(--ink3);text-align:right">Anual</div></div>';
  function dreRow(l,vm,va,cor,bold){
    var bs=bold?'font-weight:800;':'';
    return'<div class="dre-row'+(bold?' total':'')+'"><span class="dre-label" style="'+bs+'color:'+(bold?'var(--ink)':'var(--ink3)')+'">'+l+'</span><span class="dre-val" style="color:'+cor+'">'+vm+'</span><span class="dre-anual">'+va+'</span></div>';
  }
  html+=dreRow('(+) Faturamento bruto',fmtBRL(fatMes),fmtBRL(fatMes*12),'var(--ink)',false);
  html+=dreRow('(-) Impostos estimados','- '+fmtBRL(impostos),'- '+fmtBRL(impostos*12),'var(--red)',false);
  if(custosFixed>0)html+=dreRow('(-) Custos fixos totais','- '+fmtBRL(custosFixed),'- '+fmtBRL(custosFixed*12),'var(--red)',false);
  html+=dreRow('= Resultado Operacional',fmtBRL(resOp),fmtBRL(resOp*12),resOp>=0?'var(--green)':'var(--red)',true);
  if(n.parcelas||n.prolabore){
    html+='<div class="dre-section-title">Geração de caixa real</div>';
    if(n.parcelas)html+=dreRow('(-) Parcelas de dívidas','- '+fmtBRL(n.parcelas),'','var(--amber)',false);
    if(n.prolabore)html+=dreRow('(-) Pró-labore / retiradas','- '+fmtBRL(n.prolabore),'','var(--amber)',false);
    var gerCx=resOp-(n.parcelas||0)-(n.prolabore||0);
    html+=dreRow('= Geração de caixa',fmtBRL(gerCx),fmtBRL(gerCx*12),gerCx>=0?'var(--green)':'var(--amber)',true);
  }
  html+='</div></div>';

  // ── BALANÇO ───────────────────────────────────────────────────────────────
  if((n.ativo_imovel||0)+(n.ativo_equipamentos||0)+(n.ativo_estoque||0)+(n.dividas||0)>0){
    html+='<div class="secao">';
    html+='<div class="secao-header"><span class="secao-titulo">Balanço Patrimonial</span></div>';
    html+='<div class="secao-body">';
    var atv=(n.ativo_imovel||0)+(n.ativo_equipamentos||0)+(n.ativo_estoque||0);
    var pas=n.dividas||0;
    var bal=atv-pas;
    html+=dreRow('(+) Total de ativos',fmtBRL(atv),'','var(--green)',false);
    html+=dreRow('(-) Dívidas e obrigações','- '+fmtBRL(pas),'',pas>0?'var(--red)':'var(--ink2)',false);
    html+=dreRow('= Patrimônio líquido',fmtBRL(bal),'',bal>=0?'var(--green)':'var(--red)',true);
    html+='</div></div>';
  }

  // ── VALUATION ─────────────────────────────────────────────────────────────
  var venda=n.valor_venda||n.preco_pedido||0;
  var faixaMin=Math.round(venda*.88);
  var faixaMax=Math.round(venda*1.12);
  html+='<div class="val-hero">';
  html+='<div class="val-hero-glow"></div>';
  html+='<div class="val-eyebrow">Valor de Venda Estimado · Porteira fechada</div>';
  html+='<div class="val-numero">'+fmtBRL(venda)+'</div>';
  html+='<div class="val-faixa"><span class="val-faixa-label">Faixa</span><span class="val-faixa-val">'+fmtBRL(faixaMin)+'</span><span style="font-size:10px;color:var(--ink3)">–</span><span class="val-faixa-val">'+fmtBRL(faixaMax)+'</span></div>';
  html+='<div class="val-breakdown">';
  if(resOp>0){
    html+='<div class="val-item"><div class="val-item-label">Resultado Op. anual</div><div class="val-item-val" style="color:var(--green)">'+fmtBRL(resOp*12)+'</div></div>';
  }
  if(payback){
    html+='<div class="val-item"><div class="val-item-label">Payback estimado</div><div class="val-item-val" style="color:var(--amber)">'+payback+'x</div></div>';
  }
  if(n.balanco_patrimonial){
    var bp=n.balanco_patrimonial;
    html+='<div class="val-item"><div class="val-item-label">Balanço patrimonial</div><div class="val-item-val" style="color:'+(bp>=0?'var(--green)':'var(--red)')+'">'+fmtBRL(bp)+'</div></div>';
  }
  html+='</div></div>';

  // ── NOTAS DO CONSULTOR (se houver reunião) ────────────────────────────────
  if(n.teve_reuniao&&n.notas_consultor){
    html+='<div class="consultor-block">';
    html+='<div class="consultor-label">Parecer do consultor 1Negócio · após reunião</div>';
    html+='<div class="consultor-texto">'+n.notas_consultor.replace(/\n/g,'<br>')+'</div>';
    html+='</div>';
  }

  // ── CONTEXTO IA ───────────────────────────────────────────────────────────
  if(ctx&&!ctx.erro){
    if(ctx.setor){
      html+='<div class="ia-block">';
      html+='<div class="ia-titulo">Contexto do setor · '+catLabel+'</div>';
      html+='<div class="ia-texto">'+ctx.setor.tendencia+'</div>';
      html+='<div class="ia-grid">';
      if(ctx.setor.crescimento_anual)html+='<div class="ia-stat"><div class="ia-stat-label">Crescimento anual</div><div class="ia-stat-val">'+ctx.setor.crescimento_anual+'</div></div>';
      if(ctx.setor.multiplos_referencia)html+='<div class="ia-stat"><div class="ia-stat-label">Payback de referência</div><div class="ia-stat-val">'+ctx.setor.multiplos_referencia+'</div></div>';
      html+='</div>';
      if(ctx.setor.drivers_demanda&&ctx.setor.drivers_demanda.length){
        html+='<ul class="ia-lista">';
        ctx.setor.drivers_demanda.forEach(function(d){html+='<li>'+d+'</li>';});
        html+='</ul>';
      }
      html+='</div>';
    }
    if(ctx.localizacao){
      html+='<div class="ia-block">';
      html+='<div class="ia-titulo">Mercado local · '+(n.cidade||n.estado)+'</div>';
      html+='<div class="ia-texto">'+ctx.localizacao.contexto+'</div>';
      if(ctx.localizacao.vantagens_locais&&ctx.localizacao.vantagens_locais.length){
        html+='<ul class="ia-lista">';
        ctx.localizacao.vantagens_locais.forEach(function(v){html+='<li>'+v+'</li>';});
        html+='</ul>';
      }
      html+='</div>';
    }
    if(ctx.perfil_comprador_ideal){
      html+='<div class="ia-block">';
      html+='<div class="ia-titulo">Perfil do comprador ideal</div>';
      html+='<div class="ia-texto">'+ctx.perfil_comprador_ideal.descricao+'</div>';
      if(ctx.perfil_comprador_ideal.motivacoes&&ctx.perfil_comprador_ideal.motivacoes.length){
        html+='<ul class="ia-lista">';
        ctx.perfil_comprador_ideal.motivacoes.forEach(function(m){html+='<li>'+m+'</li>';});
        html+='</ul>';
      }
      html+='</div>';
    }
  } else if(!ctx){
    html+='<div class="ia-block">';
    html+='<div class="ia-titulo">Contexto de mercado</div>';
    html+='<div class="ia-texto" style="color:var(--ink3)">Enriquecimento por IA será gerado quando o anúncio for aprovado pelo admin.</div>';
    html+='</div>';
  }

  // ── RODAPÉ ────────────────────────────────────────────────────────────────
  html+='<div class="rodape">';
  html+='<div class="rodape-esq">';
  html+='<strong style="color:var(--ink)">1Negócio</strong> · Marketplace de M&A para PMEs<br>';
  html+='Metodologia ISE + Valuation por Resultado Operacional Descontado<br>';
  if(modo==='teaser')html+='<span style="color:var(--amber)">Este documento pode sofrer alterações sem prejuízo para qualquer das partes.</span>';
  html+='</div>';
  html+='<div class="rodape-dir">';
  if(modo==='teaser')html+='Teaser v'+(n.teaser_versao||1)+'<br>';
  html+='Gerado em '+dataHoje+'<br>';
  html+='<span style="color:var(--ink3)">Validade 90 dias · Uso restrito ao destinatário</span>';
  html+='</div></div>';

  document.getElementById('doc').innerHTML=html;
}

// ── CARREGAR DADOS ──────────────────────────────────────────────────────────
async function carregarNegocio(){
  if(!NEG_ID){
    document.getElementById('doc').innerHTML='<div style="padding:60px;text-align:center;color:var(--ink3)">ID do negócio não informado na URL.<br><br><a href="/" style="color:var(--green)">← Voltar para início</a></div>';
    return;
  }
  try{
    var r=await fetch(SUPA_URL+'/rest/v1/negocios?id=eq.'+NEG_ID+'&select=*&limit=1',{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    var rows=await r.json();
    if(!rows||!rows.length){
      document.getElementById('doc').innerHTML='<div style="padding:60px;text-align:center;color:var(--ink3)">Negócio não encontrado.</div>';
      return;
    }
    renderDoc(rows[0]);
  }catch(e){
    document.getElementById('doc').innerHTML='<div style="padding:60px;text-align:center;color:var(--red)">Erro ao carregar: '+e.message+'</div>';
  }
}

carregarNegocio();
</script>
</body>
</html>
