<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meu Anúncio · 1Negócio</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Cabinet+Grotesk:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7f5;--surface:#ffffff;--surface-2:#f1f3ef;
  --line:rgba(13,43,30,.08);--line-2:rgba(13,43,30,.16);
  --ink:#0d2b1e;--ink-2:#2d5a3d;--ink-3:#4a7c5c;--ink-4:#8aaa96;
  --em:#0aa85a;--em-d:rgba(10,168,90,.10);--em-l:rgba(10,168,90,.30);
  --warn:#dca726;
  --serif:'Syne',sans-serif;--sans:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;min-height:100vh}
.header{padding:18px 24px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--ink);letter-spacing:-.02em}
.logo .em{color:var(--em)}
.btn-voltar{font-family:var(--mono);font-size:12px;color:var(--ink-3);text-decoration:none;padding:8px 14px;border-radius:8px;border:1px solid var(--line-2);transition:all .15s}
.btn-voltar:hover{border-color:var(--em);color:var(--em)}
.container{max-width:760px;margin:0 auto;padding:24px 18px 80px}
.card{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:24px;margin-bottom:18px;box-shadow:0 4px 24px rgba(13,43,30,.04)}
.hero-titulo{font-family:var(--serif);font-weight:800;font-size:26px;color:var(--ink);line-height:1.15;letter-spacing:-.01em}
.hero-meta{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-top:6px}
.hero-status{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.hero-status-item{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.hero-status-item strong{color:var(--ink);font-weight:700}
.section-titulo{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}
.timeline{display:flex;flex-direction:column;gap:14px}
.tarefa{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line)}
.tarefa:last-child{border-bottom:none}
.tarefa-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.tarefa-icon.ok{background:var(--em);color:#fff}
.tarefa-icon.now{background:rgba(220,167,38,.15);color:var(--warn);border:2px solid var(--warn);font-size:11px}
.tarefa-icon.future{background:transparent;color:var(--ink-4);border:1.5px solid var(--line-2);font-size:11px}
.tarefa-corpo{flex:1;min-width:0}
.tarefa-titulo{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--ink);line-height:1.3}
.tarefa-titulo.ok{color:var(--ink-2)}
.tarefa-titulo.future{color:var(--ink-3)}
.tarefa-desc{font-family:var(--sans);font-size:13px;color:var(--ink-3);margin-top:3px;line-height:1.5}
.tarefa-data{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:4px;letter-spacing:.04em}
.tarefa-notas{font-family:var(--sans);font-size:13px;color:var(--ink-2);margin-top:8px;background:var(--surface-2);padding:10px 12px;border-radius:8px;border-left:2px solid var(--em);line-height:1.5}
.tarefa-progresso{margin-top:10px}
.tarefa-progresso-num{font-family:var(--serif);font-weight:700;font-size:18px;color:var(--ink)}
.tarefa-progresso-num strong{color:var(--em);font-size:24px;font-weight:800}
.tarefa-progresso-bar{margin-top:8px;height:8px;background:var(--surface-2);border-radius:999px;overflow:hidden}
.tarefa-progresso-bar-fill{height:100%;background:var(--em);transition:width .6s ease;border-radius:999px}
.tarefa-progresso-pct{font-family:var(--mono);font-size:11px;color:var(--em);font-weight:600;letter-spacing:.04em;margin-top:4px}
.empty{padding:40px 20px;text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:12px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--line-2);border-top-color:var(--em);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.contato-card{background:var(--em-d);border:1px solid var(--em-l);text-align:center}
.contato-card a{display:inline-block;background:var(--em);color:#fff;text-decoration:none;padding:10px 22px;border-radius:999px;font-family:var(--serif);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;margin-top:12px;transition:all .15s}
.contato-card a:hover{filter:brightness(1.08);transform:translateY(-1px)}
.banner-erro{background:rgba(200,68,68,.08);border:1px solid rgba(200,68,68,.30);color:#c84444;padding:14px 18px;border-radius:12px;font-family:var(--mono);font-size:12px;line-height:1.5}
@media (max-width:520px){.hero-titulo{font-size:22px}.card{padding:20px}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">1<span class="em">Negócio</span></div>
  <a class="btn-voltar" href="/portal-usuario.html">← Voltar ao portal</a>
</header>

<div class="container">
  <div id="root">
    <div class="empty"><div class="spinner"></div><div style="margin-top:12px">Carregando seu projeto...</div></div>
  </div>
</div>

<script>
const SB = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

function escapeHtml(s){if(s===null||s===undefined)return '';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function dataBR(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('pt-BR');}

function authHeaders() {
  let token = AK;
  try {
    const sess = JSON.parse(localStorage.getItem('1n_auth') || '{}');
    if (sess.token && sess.token.length > 50) token = sess.token;
  } catch(e){}
  return { apikey: AK, Authorization: 'Bearer ' + token };
}

async function carregar() {
  const params = new URLSearchParams(location.search);
  const negId = params.get('id');
  if (!negId) { renderErro('Link inválido', 'Falta o ID do negócio na URL.'); return; }

  try {
    // Busca negócio + tarefas em paralelo
    const [rNeg, rTarefas] = await Promise.all([
      fetch(`${SB}/rest/v1/negocios?id=eq.${negId}&select=id,nome,cidade,estado,setor,plano,status,created_at`, { headers: authHeaders() }),
      fetch(`${SB}/rest/v1/projeto_tarefas?negocio_id=eq.${negId}&order=ordem.asc&select=id,ordem,titulo,descricao,data_prevista,concluido,concluido_em,notas_cliente,contador_atual,contador_alvo`, { headers: authHeaders() })
    ]);
    if (!rNeg.ok) { renderErro('Acesso negado', 'Você não tem permissão pra ver este projeto.'); return; }
    const negArr = await rNeg.json();
    if (!negArr.length) { renderErro('Negócio não encontrado', 'Verifique o link.'); return; }
    const neg = negArr[0];
    const tarefas = rTarefas.ok ? await rTarefas.json() : [];

    renderTela(neg, tarefas);
  } catch(e) {
    renderErro('Erro de rede', 'Verifique sua conexão e tente novamente.');
  }
}

function renderErro(titulo, msg) {
  document.getElementById('root').innerHTML = `
    <div class="card">
      <div class="banner-erro"><strong>${escapeHtml(titulo)}</strong><br>${escapeHtml(msg)}</div>
    </div>`;
}

function calcularMesAtual(criadoEm) {
  const t0 = new Date(criadoEm).getTime();
  const agora = Date.now();
  const meses = Math.floor((agora - t0) / (30 * 24 * 60 * 60 * 1000)) + 1;
  return Math.max(1, Math.min(12, meses));
}

function renderTela(neg, tarefas) {
  const negTit = neg.nome || '—';
  const local = (neg.cidade || '—') + '/' + (neg.estado || '—');
  const setor = neg.setor || '—';
  const planoLbl = neg.plano === 'assessorada' ? 'Venda Assessorada' : (neg.plano || '—').toUpperCase();
  const mesAtual = calcularMesAtual(neg.created_at);

  // Hero
  let html = `
    <div class="card">
      <div class="hero-titulo">${escapeHtml(negTit)}</div>
      <div class="hero-meta">${escapeHtml(local)} · ${escapeHtml(setor)}</div>
      <div class="hero-status">
        <div class="hero-status-item"><strong>Plano:</strong> ${escapeHtml(planoLbl)}</div>
        ${neg.plano === 'assessorada' ? `<div class="hero-status-item"><strong>Mês ${mesAtual}</strong> de 12</div>` : ''}
        <div class="hero-status-item"><strong>Status:</strong> ${escapeHtml((neg.status || '—').replace(/_/g,' '))}</div>
      </div>
    </div>
  `;

  // Timeline
  if (!tarefas.length) {
    html += `
      <div class="card">
        <div class="section-titulo">Jornada</div>
        <div class="empty">
          Seu projeto ainda não foi iniciado.<br>
          Em breve a equipe da 1Negócio vai configurar seu painel de acompanhamento.
        </div>
      </div>
    `;
  } else {
    // Próxima tarefa em curso = primeira não concluída
    const proximaIdx = tarefas.findIndex(t => !t.concluido);

    html += `
      <div class="card">
        <div class="section-titulo">Jornada</div>
        <div class="timeline">
          ${tarefas.map((t, i) => renderTarefa(t, i, proximaIdx)).join('')}
        </div>
      </div>
    `;
  }

  // Contato
  html += `
    <div class="card contato-card">
      <div style="font-family:var(--serif);font-weight:700;font-size:16px;color:var(--ink);margin-bottom:6px">Falar com a 1Negócio</div>
      <div style="font-family:var(--sans);font-size:13px;color:var(--ink-2)">Dúvida ou sugestão sobre o projeto?</div>
      <a href="https://wa.me/5511952136406" target="_blank" rel="noopener">WhatsApp do consultor</a>
    </div>
  `;

  document.getElementById('root').innerHTML = html;
}

function renderTarefa(t, idx, proximaIdx) {
  const ok = t.concluido;
  const now = !ok && idx === proximaIdx;
  const future = !ok && !now;

  const iconHtml = ok ? '<div class="tarefa-icon ok">✓</div>'
                  : (now ? '<div class="tarefa-icon now">⏳</div>'
                  : '<div class="tarefa-icon future">○</div>');

  const tituloCls = ok ? 'ok' : (future ? 'future' : '');
  const dataInfo = ok ? `Concluída em ${dataBR(t.concluido_em)}`
                  : (t.data_prevista ? `Previsto: ${dataBR(t.data_prevista)}` : '');

  const notas = (ok && t.notas_cliente) ? `<div class="tarefa-notas">${escapeHtml(t.notas_cliente)}</div>` : '';

  // Tarefa contador (+200 contatos)
  let progresso = '';
  if (t.contador_alvo && t.contador_alvo > 0) {
    const atual = t.contador_atual || 0;
    const pct = Math.min(100, Math.round((atual / t.contador_alvo) * 100));
    progresso = `
      <div class="tarefa-progresso">
        <div class="tarefa-progresso-num"><strong>${atual}</strong> de ${t.contador_alvo}</div>
        <div class="tarefa-progresso-bar"><div class="tarefa-progresso-bar-fill" style="width:${pct}%"></div></div>
        <div class="tarefa-progresso-pct">${pct}% concluído</div>
      </div>
    `;
  }

  return `
    <div class="tarefa">
      ${iconHtml}
      <div class="tarefa-corpo">
        <div class="tarefa-titulo ${tituloCls}">${escapeHtml(t.titulo)}</div>
        ${t.descricao ? `<div class="tarefa-desc">${escapeHtml(t.descricao)}</div>` : ''}
        ${dataInfo ? `<div class="tarefa-data">${dataInfo}</div>` : ''}
        ${progresso}
        ${notas}
      </div>
    </div>
  `;
}

carregar();
</script>

</body>
</html>
