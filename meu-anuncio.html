<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meu Anúncio · 1Negócio</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Cabinet+Grotesk:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f7f5;--surface:#ffffff;--surface-2:#f1f3ef;
  --line:rgba(13,43,30,.08);--line-2:rgba(13,43,30,.16);
  --ink:#0d2b1e;--ink-2:#2d5a3d;--ink-3:#4a7c5c;--ink-4:#8aaa96;
  --em:#0aa85a;--em-d:rgba(10,168,90,.10);--em-l:rgba(10,168,90,.30);
  --warn:#dca726;
  --serif:'Syne',sans-serif;--sans:'Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;min-height:100vh}
.header{padding:18px 24px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);font-weight:800;font-size:20px;color:var(--ink);letter-spacing:-.02em}
.logo .em{color:var(--em)}
.btn-voltar{font-family:var(--mono);font-size:12px;color:var(--ink-3);text-decoration:none;padding:8px 14px;border-radius:8px;border:1px solid var(--line-2);transition:all .15s}
.btn-voltar:hover{border-color:var(--em);color:var(--em)}
.container{max-width:760px;margin:0 auto;padding:24px 18px 80px}
.card{background:var(--surface);border:1px solid var(--line-2);border-radius:18px;padding:24px;margin-bottom:18px;box-shadow:0 4px 24px rgba(13,43,30,.04)}
.hero-titulo{font-family:var(--serif);font-weight:800;font-size:26px;color:var(--ink);line-height:1.15;letter-spacing:-.01em}
.hero-meta{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-top:6px}
.hero-status{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.hero-status-item{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.hero-status-item strong{color:var(--ink);font-weight:700}
.section-titulo{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px}
.timeline{display:flex;flex-direction:column;gap:14px}
.tarefa{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line)}
.tarefa:last-child{border-bottom:none}
.tarefa-icon{flex-shrink:0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.tarefa-icon.ok{background:var(--em);color:#fff}
.tarefa-icon.now{background:rgba(220,167,38,.15);color:var(--warn);border:2px solid var(--warn);font-size:11px}
.tarefa-icon.future{background:transparent;color:var(--ink-4);border:1.5px solid var(--line-2);font-size:11px}
.tarefa-corpo{flex:1;min-width:0}
.tarefa-titulo{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--ink);line-height:1.3}
.tarefa-titulo.ok{color:var(--ink-2)}
.tarefa-titulo.future{color:var(--ink-3)}
.tarefa-desc{font-family:var(--sans);font-size:13px;color:var(--ink-3);margin-top:3px;line-height:1.5}
.tarefa-data{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:4px;letter-spacing:.04em}
.tarefa-notas{font-family:var(--sans);font-size:13px;color:var(--ink-2);margin-top:8px;background:var(--surface-2);padding:10px 12px;border-radius:8px;border-left:2px solid var(--em);line-height:1.5}
.tarefa-progresso{margin-top:10px}
.tarefa-progresso-num{font-family:var(--serif);font-weight:700;font-size:18px;color:var(--ink)}
.tarefa-progresso-num strong{color:var(--em);font-size:24px;font-weight:800}
.tarefa-progresso-bar{margin-top:8px;height:8px;background:var(--surface-2);border-radius:999px;overflow:hidden}
.tarefa-progresso-bar-fill{height:100%;background:var(--em);transition:width .6s ease;border-radius:999px}
.tarefa-progresso-pct{font-family:var(--mono);font-size:11px;color:var(--em);font-weight:600;letter-spacing:.04em;margin-top:4px}
.empty{padding:40px 20px;text-align:center;color:var(--ink-3);font-family:var(--mono);font-size:12px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--line-2);border-top-color:var(--em);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.contato-card{background:var(--em-d);border:1px solid var(--em-l);text-align:center}
.contato-card a{display:inline-block;background:var(--em);color:#fff;text-decoration:none;padding:10px 22px;border-radius:999px;font-family:var(--serif);font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;margin-top:12px;transition:all .15s}
.contato-card a:hover{filter:brightness(1.08);transform:translateY(-1px)}
.banner-erro{background:rgba(200,68,68,.08);border:1px solid rgba(200,68,68,.30);color:#c84444;padding:14px 18px;border-radius:12px;font-family:var(--mono);font-size:12px;line-height:1.5}
@media (max-width:520px){.hero-titulo{font-size:22px}.card{padding:20px}}

/* v9.11 · Estratégia */
.estrategia-bloco{margin-bottom:16px}
.estrategia-texto{font-size:15px;line-height:1.6;color:var(--ink-2)}
.estrategia-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-top:12px}
.estrategia-grid > div{padding:12px;background:var(--surface-2);border-radius:10px}
.estrategia-num{font-family:var(--serif);font-weight:700;font-size:18px;letter-spacing:-.02em;color:var(--ink);margin-top:4px}

/* v9.11 · Pool de compradores anonimizado */
.pool-resumo{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--ink-2);margin:12px 0 16px}
.pool-resumo span{padding:4px 10px;background:var(--surface-2);border-radius:999px;font-family:var(--mono);letter-spacing:.04em}
.pool-card{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--line)}
.pool-card:last-child{border-bottom:none}
.pool-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pool-status-dot.frio{background:var(--ink-3)}
.pool-status-dot.contatado,.pool-status-dot.respondeu{background:#3b82f6}
.pool-status-dot.qualificado{background:var(--em)}
.pool-status-dot.nda{background:var(--warn)}
.pool-status-dot.proposta{background:#a855f7}
.pool-status-dot.fechou{background:#10b981}
.pool-status-dot.perdeu{background:#c84444}
.pool-card-info{flex:1;min-width:0}
.pool-card-info strong{font-size:14px;display:block;color:var(--ink);font-family:var(--sans);font-weight:600}
.pool-card-info .label-mono{font-family:var(--mono);font-size:11px;color:var(--ink-3);letter-spacing:.04em;margin-top:2px;display:block}
.pool-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;background:var(--surface-2);color:var(--ink-2);flex-shrink:0}
.pool-badge.qualificado{background:rgba(10,168,90,.10);color:var(--em)}
.pool-badge.nda{background:rgba(220,167,38,.15);color:var(--warn)}
.pool-badge.proposta{background:rgba(168,85,247,.12);color:#a855f7}
.pool-badge.fechou{background:rgba(16,185,129,.12);color:#10b981}
.pool-badge.perdeu{background:rgba(200,68,68,.10);color:#c84444}
.pool-tempo{font-size:11px;color:var(--ink-3);font-family:var(--mono);flex-shrink:0;display:none}
@media (min-width:520px){.pool-tempo{display:inline}}
.pool-mais{padding:10px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink-3);background:var(--surface-2);border-radius:8px;margin-top:8px}

/* v9.11 · Vencimentos cliente */
.vencimentos-bloco{margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
.label-mono{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
.venc-linha{display:grid;grid-template-columns:auto 90px 1fr auto auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
.venc-linha:last-child{border-bottom:none}
.venc-dot{width:8px;height:8px;border-radius:50%}
.venc-linha.atrasado .venc-dot{background:#c84444}
.venc-linha.aberto .venc-dot{background:var(--ink-3)}
.venc-linha.proximo .venc-dot{background:var(--warn)}
.venc-linha.recebido .venc-dot{background:var(--em)}
.venc-linha.cancelado .venc-dot{background:var(--ink-4)}
.venc-data{font-family:var(--mono);color:var(--ink-2)}
.venc-categoria{color:var(--ink-2);font-size:13px}
.venc-categoria small{color:var(--ink-3);font-size:11px;font-family:var(--mono);font-style:italic;display:block;margin-top:2px}
.venc-valor{font-family:var(--serif);font-weight:700;font-size:15px;color:var(--ink)}
.venc-tag{font-family:var(--mono);font-size:11px;letter-spacing:.04em}
.venc-tag.atrasado{color:#c84444;font-weight:600}
.venc-tag.proximo{color:var(--warn)}
.venc-tag.neutro{color:var(--ink-4)}
.venc-tag.recebido{color:var(--em)}
@media (max-width:640px){
  .venc-linha{grid-template-columns:auto 1fr auto;row-gap:4px}
  .venc-data{grid-column:2/3}
  .venc-tag{grid-column:1/-1;font-size:10px;padding-top:2px}
}
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo" aria-label="1Negócio · página inicial" style="text-decoration:none;color:inherit">1<span class="em">Negócio</span></a>
  <a class="btn-voltar" href="/portal-usuario.html">← Voltar ao portal</a>
</header>

<div class="container">
  <div id="root">
    <div class="empty"><div class="spinner"></div><div style="margin-top:12px">Carregando seu projeto...</div></div>
  </div>
</div>

<script>
const SB = 'https://dbijmgqlcrgjlcfrastg.supabase.co';
const AK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiaWptZ3FsY3JnamxjZnJhc3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNzYxNjMsImV4cCI6MjA4ODY1MjE2M30.mV2rANZ8Nb_AbifTmkEvdfX_nsm8zeT6Al_bPrCzNAA';

function escapeHtml(s){if(s===null||s===undefined)return '';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function dataBR(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('pt-BR');}

function authHeaders() {
  const token = localStorage.getItem('sb_access_token') ||
                (function(){
                  try {
                    const sess = JSON.parse(localStorage.getItem('1n_auth') || '{}');
                    return (sess.token && sess.token.length > 50) ? sess.token : null;
                  } catch(e) { return null; }
                })() || AK;
  return { apikey: AK, Authorization: 'Bearer ' + token };
}

async function carregar() {
  const params = new URLSearchParams(location.search);
  const negId = params.get('id');
  if (!negId) { renderErro('Link inválido', 'Falta o ID do negócio na URL.'); return; }

  try {
    // Busca negócio + entregáveis + termo + pool + vencimentos em paralelo
    const [rNeg, rEntregaveis, rTermo, rPool, rVenc] = await Promise.all([
      fetch(`${SB}/rest/v1/negocios?id=eq.${negId}&select=id,nome,cidade,estado,setor,plano,status,created_at,metadata:projeto_metadata(iniciado_em,proxima_onda_em,status,publico_alvo_descricao,meta_abordagens_mensal,meta_abordagens_anual,valor_venda_alvo,comissao_percentual)`, { headers: authHeaders() }),
      fetch(`${SB}/rest/v1/projeto_entregaveis?negocio_id=eq.${negId}&order=ordem.asc&select=id,ordem,mes_relativo,titulo,descricao_cliente,tipo,data_prevista,status,concluido_em,notas_cliente,contador_atual,contador_alvo`, { headers: authHeaders() }),
      fetch(`${SB}/rest/v1/termos_adesao?negocio_id=eq.${negId}&plano=eq.assessorada&status=in.(assinado,ativo)&order=assinatura_em.desc.nullslast,gerado_em.desc.nullslast&limit=1&select=id,codigo,plano,status,mensalidade,stripe_subscription_id,stripe_status,ultimo_pagamento_em,proximo_pagamento_em,assinatura_em`, { headers: authHeaders() }),
      fetch(`${SB}/rest/v1/projeto_pool_contatos_publico?negocio_id=eq.${negId}&select=*&order=updated_at.desc.nullslast,created_at.desc&limit=500`, { headers: authHeaders() }),
      fetch(`${SB}/rest/v1/projeto_vencimentos_cliente?negocio_id=eq.${negId}&order=data_prevista.asc&limit=500`, { headers: authHeaders() })
    ]);
    if (!rNeg.ok) { renderErro('Acesso negado', 'Você não tem permissão pra ver este projeto.'); return; }
    const negArr = await rNeg.json();
    if (!negArr.length) { renderErro('Negócio não encontrado', 'Verifique o link.'); return; }
    const neg = negArr[0];
    const entregaveis = rEntregaveis.ok ? await rEntregaveis.json() : [];
    const termoArr = rTermo.ok ? await rTermo.json() : [];
    const termo = termoArr[0] || null;
    const pool = rPool.ok ? await rPool.json() : [];
    const vencimentos = rVenc.ok ? await rVenc.json() : [];
    let pagamentos = [];
    if (termo) {
      const rPag = await fetch(`${SB}/rest/v1/pagamentos_pix_manual?termo_id=eq.${termo.id}&order=competencia.desc&limit=12&select=competencia,valor,recebido_em,registrado_em`, { headers: authHeaders() });
      if (rPag.ok) pagamentos = await rPag.json();
    }

    renderTela(neg, entregaveis, termo, pagamentos, pool, vencimentos);
  } catch(e) {
    renderErro('Erro de rede', 'Verifique sua conexão e tente novamente.');
  }
}

function renderErro(titulo, msg) {
  document.getElementById('root').innerHTML = `
    <div class="card">
      <div class="banner-erro"><strong>${escapeHtml(titulo)}</strong><br>${escapeHtml(msg)}</div>
    </div>`;
}

function calcularMesAtual(criadoEm) {
  const t0 = new Date(criadoEm).getTime();
  const agora = Date.now();
  const meses = Math.floor((agora - t0) / (30 * 24 * 60 * 60 * 1000)) + 1;
  return Math.max(1, Math.min(12, meses));
}

function fmtBRL(n){if(n===null||n===undefined)return '—';return Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function fmtCompetencia(c){
  if(!c)return '—';
  const [y,m]=c.split('-');
  const meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const idx=parseInt(m,10)-1;
  return (meses[idx]||m)+'/'+y;
}

function renderPagamentos(termo, pagamentosPix, vencimentos) {
  // Render se houver termo OU se houver vencimentos pendentes
  const temVencs = Array.isArray(vencimentos) && vencimentos.length > 0;
  if ((!termo || termo.plano !== 'assessorada') && !temVencs) return '';
  if (!termo || termo.plano !== 'assessorada') {
    // Só vencimentos · render bloco minimalista
    return `<div class="card"><div class="section-titulo">Pagamentos</div>${renderVencimentos(vencimentos)}</div>`;
  }
  const mens = fmtBRL(termo.mensalidade);
  const stripeAtivo = !!termo.stripe_subscription_id && termo.stripe_status === 'active';
  const stripePastDue = termo.stripe_status === 'past_due';

  // Constrói lista dos últimos 6 meses
  const hoje = new Date();
  const linhas = [];
  const compsPagasPix = new Set((pagamentosPix||[]).filter(p => p.recebido_em).map(p => p.competencia));
  const compAtual = hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');

  for (let i = 0; i < 6; i++) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
    const c = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const pix = (pagamentosPix||[]).find(p => p.competencia === c && p.recebido_em);
    if (pix) {
      linhas.push(`<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-2);padding:6px 0"><span style="color:var(--em);font-weight:700">✓</span><span>${fmtCompetencia(c)} · pago em ${dataBR(pix.recebido_em)} <span style="color:var(--ink-3);font-size:11px;font-family:var(--mono)">(Pix manual)</span></span></div>`);
    } else if (stripeAtivo && termo.ultimo_pagamento_em && c === ultimoStripeCompetencia(termo.ultimo_pagamento_em)) {
      linhas.push(`<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-2);padding:6px 0"><span style="color:var(--em);font-weight:700">✓</span><span>${fmtCompetencia(c)} · pago em ${dataBR(termo.ultimo_pagamento_em)} <span style="color:var(--ink-3);font-size:11px;font-family:var(--mono)">(Stripe)</span></span></div>`);
    } else if (c === compAtual) {
      const lbl = stripeAtivo ? 'em cobrança automática' : (stripePastDue ? 'em atraso · revisar pagamento' : 'pendente');
      const cor = stripePastDue ? '#c84444' : 'var(--ink-3)';
      linhas.push(`<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:${cor};padding:6px 0"><span>○</span><span>${fmtCompetencia(c)} · ${lbl}</span></div>`);
    } else {
      linhas.push(`<div style="display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-4);padding:6px 0"><span>—</span><span>${fmtCompetencia(c)} · sem registro</span></div>`);
    }
  }

  const fonte = stripeAtivo ? 'Cartão (Stripe)' : (stripePastDue ? 'Cartão · em atraso' : 'Pix manual');
  const proximaInfo = (stripeAtivo && termo.proximo_pagamento_em)
    ? `<div style="font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:12px;padding-top:10px;border-top:1px solid var(--line)">Próxima cobrança automática: <strong style="color:var(--ink)">${dataBR(termo.proximo_pagamento_em)}</strong></div>`
    : '';

  return `
    <div class="card">
      <div class="section-titulo">Pagamentos</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:14px">
        <div>
          <div style="font-family:var(--serif);font-weight:700;font-size:20px;color:var(--ink)">R$ ${mens} <span style="font-size:13px;color:var(--ink-3);font-weight:500">/mês</span></div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:2px;letter-spacing:.04em">Forma: ${escapeHtml(fonte)}</div>
        </div>
        ${stripePastDue ? '<div style="background:rgba(200,68,68,.10);border:1px solid rgba(200,68,68,.30);color:#c84444;padding:6px 12px;border-radius:999px;font-family:var(--mono);font-size:11px">⚠️ Pagamento em atraso</div>' : ''}
      </div>
      <div style="display:flex;flex-direction:column">
        ${linhas.join('')}
      </div>
      ${proximaInfo}
      ${renderVencimentos(vencimentos)}
    </div>
  `;
}

// v9.11 · Bloco Estratégia
function renderEstrategia(meta) {
  if (!meta) return '';
  const temAlgo = meta.publico_alvo_descricao || meta.meta_abordagens_mensal ||
                  meta.meta_abordagens_anual || meta.valor_venda_alvo;
  if (!temAlgo) return '';
  const publicoHtml = meta.publico_alvo_descricao
    ? `<div class="estrategia-bloco"><div class="label-mono">PÚBLICO-ALVO</div><p class="estrategia-texto">${escapeHtml(meta.publico_alvo_descricao)}</p></div>`
    : '';
  const gridParts = [];
  if (meta.meta_abordagens_mensal) {
    gridParts.push(`<div><div class="label-mono">META MENSAL</div><div class="estrategia-num">${meta.meta_abordagens_mensal} abordagens</div></div>`);
  }
  if (meta.meta_abordagens_anual) {
    gridParts.push(`<div><div class="label-mono">META ANUAL</div><div class="estrategia-num">${meta.meta_abordagens_anual} abordagens</div></div>`);
  }
  if (meta.valor_venda_alvo) {
    gridParts.push(`<div><div class="label-mono">VALOR ALVO</div><div class="estrategia-num">R$ ${fmtBRL(meta.valor_venda_alvo)}</div></div>`);
  }
  const gridHtml = gridParts.length ? `<div class="estrategia-grid">${gridParts.join('')}</div>` : '';
  if (!publicoHtml && !gridHtml) return '';
  return `<div class="card"><div class="section-titulo">🎯 Estratégia</div>${publicoHtml}${gridHtml}</div>`;
}

// v9.11 · Bloco Pool de compradores anonimizado
const POOL_DESCRITIVOS = {
  linkedin: 'Contato via LinkedIn',
  indicacao: 'Indicação',
  cold_outreach: 'Outreach direto',
  evento: 'Conhecido em evento',
  midia: 'Vindo da mídia',
  outro: 'Contato direto',
};
const POOL_STATUS_LBL = {
  frio: 'contato inicial',
  contatado: 'abordado',
  respondeu: 'respondeu',
  qualificado: 'qualificado',
  nda: 'em NDA',
  proposta: 'em proposta',
  fechou: 'fechou',
  perdeu: 'não qualificado',
};

function renderPool(pool) {
  if (!Array.isArray(pool) || pool.length === 0) return '';
  const counts = {};
  pool.forEach(c => { counts[c.status] = (counts[c.status] || 0) + 1; });
  const resumoParts = [];
  const contatadosTotal = (counts.contatado || 0) + (counts.respondeu || 0);
  if (contatadosTotal) resumoParts.push(`<span>${contatadosTotal} contatado${contatadosTotal === 1 ? '' : 's'}</span>`);
  if (counts.qualificado) resumoParts.push(`<span>${counts.qualificado} qualificado${counts.qualificado === 1 ? '' : 's'}</span>`);
  if (counts.nda) resumoParts.push(`<span>${counts.nda} em NDA</span>`);
  if (counts.proposta) resumoParts.push(`<span>${counts.proposta} em proposta</span>`);
  if (counts.fechou) resumoParts.push(`<span>${counts.fechou} fechou</span>`);
  const resumoHtml = resumoParts.length ? `<div class="pool-resumo">${resumoParts.join('')}</div>` : '';

  const cards = pool.slice(0, 10).map(c => {
    const descritivo = POOL_DESCRITIVOS[c.origem || 'outro'] || POOL_DESCRITIVOS.outro;
    const statusKey = c.status || 'frio';
    const statusLbl = POOL_STATUS_LBL[statusKey] || statusKey;
    const tempo = pjPoolDiasDesde(c.updated_at || c.created_at);
    const tempoStr = tempo != null ? (tempo === 0 ? 'hoje' : `há ${tempo} dia${tempo === 1 ? '' : 's'}`) : '';
    const meta = [c.setor_alvo, c.regiao_alvo, c.faixa_faturamento].filter(Boolean).map(escapeHtml).join(' · ');
    return `<div class="pool-card">
      <div class="pool-status-dot ${escapeHtml(statusKey)}"></div>
      <div class="pool-card-info">
        <strong>${escapeHtml(descritivo)}</strong>
        ${meta ? `<span class="label-mono">${meta}</span>` : ''}
      </div>
      <span class="pool-badge ${escapeHtml(statusKey)}">${escapeHtml(statusLbl)}</span>
      <span class="pool-tempo">${escapeHtml(tempoStr)}</span>
    </div>`;
  }).join('');
  const maisHtml = pool.length > 10 ? `<div class="pool-mais">+${pool.length - 10} contato${pool.length - 10 === 1 ? '' : 's'} adicional${pool.length - 10 === 1 ? '' : 'is'}</div>` : '';

  return `<div class="card">
    <div class="section-titulo">👥 Pool de compradores · ${pool.length} contato${pool.length === 1 ? '' : 's'} sendo trabalhado${pool.length === 1 ? '' : 's'}</div>
    ${resumoHtml}
    ${cards}
    ${maisHtml}
  </div>`;
}

function pjPoolDiasDesde(ts) {
  if (!ts) return null;
  return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
}

// v9.11 · Bloco Vencimentos do cliente (sub-bloco dentro de Pagamentos)
const VENC_CATEGORIAS_LBL = {
  mensalidade_assessorada: 'Mensalidade Assessorada',
  taxa_plataforma: 'Taxa de plataforma',
  venda_empresa: 'Comissão da venda',
};

function renderVencimentos(vencimentos) {
  if (!Array.isArray(vencimentos) || vencimentos.length === 0) return '';

  const abertos = vencimentos.filter(v => v.status_computado === 'aberto' || v.status_computado === 'atrasado');
  const pagos = vencimentos.filter(v => v.status_computado === 'recebido').slice(0, 6);

  function linha(v) {
    const sc = v.status_computado || 'aberto';
    let tag = '<span class="venc-tag neutro">—</span>';
    let tagCls = 'aberto';
    if (sc === 'atrasado') {
      const d = v.dias_atraso || 0;
      tag = `<span class="venc-tag atrasado">ATRASADO há ${d} dia${d === 1 ? '' : 's'}</span>`;
      tagCls = 'atrasado';
    } else if (sc === 'aberto' && v.data_prevista) {
      const dRef = new Date(v.data_prevista + 'T00:00');
      const dias = Math.ceil((dRef.getTime() - Date.now()) / 86400000);
      if (dias >= 0 && dias <= 7) {
        tag = `<span class="venc-tag proximo">vence em ${dias} dia${dias === 1 ? '' : 's'}</span>`;
        tagCls = 'proximo';
      }
    } else if (sc === 'recebido') {
      tag = `<span class="venc-tag recebido">✓ pago${v.recebido_em ? ' em ' + dataBR(v.recebido_em) : ''}</span>`;
      tagCls = 'recebido';
    } else if (sc === 'cancelado') {
      tag = '<span class="venc-tag neutro">cancelado</span>';
      tagCls = 'cancelado';
    }
    const catLbl = VENC_CATEGORIAS_LBL[v.categoria] || v.categoria;
    return `<div class="venc-linha ${tagCls}">
      <span class="venc-dot"></span>
      <span class="venc-data">${escapeHtml(v.data_prevista || '—')}</span>
      <span class="venc-categoria">${escapeHtml(catLbl)}${v.descricao ? `<small>${escapeHtml(v.descricao)}</small>` : ''}</span>
      <span class="venc-valor">R$ ${fmtBRL(v.valor)}</span>
      ${tag}
    </div>`;
  }

  let html = '';
  if (abertos.length) {
    html += `<div class="vencimentos-bloco"><div class="label-mono">⏳ Próximos vencimentos</div>${abertos.map(linha).join('')}</div>`;
  }
  if (pagos.length) {
    html += `<div class="vencimentos-bloco"><div class="label-mono">✓ Pagos</div>${pagos.map(linha).join('')}</div>`;
  }
  return html;
}

function ultimoStripeCompetencia(iso) {
  // Dado um ultimo_pagamento_em ISO, retorna a competência (YYYY-MM) correspondente.
  const d = new Date(iso);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function renderTela(neg, entregaveis, termo, pagamentos, pool, vencimentos) {
  const negTit = neg.nome || '—';
  const local = (neg.cidade || '—') + '/' + (neg.estado || '—');
  const setor = neg.setor || '—';
  const planoLbl = neg.plano === 'assessorada' ? 'Venda Assessorada' : (neg.plano || '—').toUpperCase();
  const meta = Array.isArray(neg.metadata) ? neg.metadata[0] : neg.metadata;
  const baseMes = meta?.iniciado_em || neg.created_at;
  const mesAtual = calcularMesAtual(baseMes);

  // Hero
  let html = `
    <div class="card">
      <div class="hero-titulo">${escapeHtml(negTit)}</div>
      <div class="hero-meta">${escapeHtml(local)} · ${escapeHtml(setor)}</div>
      <div class="hero-status">
        <div class="hero-status-item"><strong>Plano:</strong> ${escapeHtml(planoLbl)}</div>
        ${neg.plano === 'assessorada' ? `<div class="hero-status-item"><strong>Mês ${mesAtual}</strong> de 12</div>` : ''}
        <div class="hero-status-item"><strong>Status:</strong> ${escapeHtml((neg.status || '—').replace(/_/g,' '))}</div>
      </div>
    </div>
  `;

  // v9.11 · Bloco Estratégia (antes da Jornada)
  html += renderEstrategia(meta);

  // Timeline · agrupa por mês relativo
  if (!entregaveis.length) {
    html += `
      <div class="card">
        <div class="section-titulo">Jornada · entregáveis do trimestre</div>
        <div class="empty">
          Seu projeto ainda não foi iniciado.<br>
          Em breve a equipe da 1Negócio vai configurar seu painel de acompanhamento.
        </div>
      </div>
    `;
  } else {
    const grupos = {};
    entregaveis.forEach(e => { if (!grupos[e.mes_relativo]) grupos[e.mes_relativo]=[]; grupos[e.mes_relativo].push(e); });
    const mesesOrdenados = Object.keys(grupos).map(Number).sort((a,b)=>a-b);
    const proximoIdx = entregaveis.findIndex(e => e.status !== 'concluido');
    const baseDt = new Date(baseMes);
    const mesNomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    html += `
      <div class="card">
        <div class="section-titulo">Jornada · entregáveis do trimestre</div>
        ${mesesOrdenados.map(m => {
          const dt = new Date(baseDt.getFullYear(), baseDt.getMonth() + m, 1);
          const lbl = `MÊS ${m} · ${mesNomes[dt.getMonth()].toUpperCase()} ${dt.getFullYear()}`;
          return `
            <div style="margin-bottom:18px">
              <div style="font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line)">${lbl}</div>
              <div class="timeline">
                ${grupos[m].map((e, i) => renderEntregavel(e, entregaveis.indexOf(e), proximoIdx)).join('')}
              </div>
            </div>
          `;
        }).join('')}
        <div style="margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--ink-4);text-align:center">Próximas etapas geradas conforme avançamos.</div>
      </div>
    `;
  }

  // v9.11 · Bloco Pool de compradores (depois da Jornada)
  html += renderPool(pool || []);

  // Pagamentos (só Assessorada) + Vencimentos do cliente
  html += renderPagamentos(termo, pagamentos, vencimentos || []);

  // Contato
  html += `
    <div class="card contato-card">
      <div style="font-family:var(--serif);font-weight:700;font-size:16px;color:var(--ink);margin-bottom:6px">Falar com a 1Negócio</div>
      <div style="font-family:var(--sans);font-size:13px;color:var(--ink-2)">Dúvida ou sugestão sobre o projeto?</div>
      <a href="https://wa.me/5511952136406" target="_blank" rel="noopener">WhatsApp do consultor</a>
    </div>
  `;

  document.getElementById('root').innerHTML = html;
}

function renderEntregavel(t, idx, proximaIdx) {
  const ok = t.status === 'concluido';
  const now = !ok && idx === proximaIdx;
  const future = !ok && !now;

  const iconHtml = ok ? '<div class="tarefa-icon ok">✓</div>'
                  : (now ? '<div class="tarefa-icon now">⏳</div>'
                  : '<div class="tarefa-icon future">○</div>');

  const tituloCls = ok ? 'ok' : (future ? 'future' : '');
  const dataInfo = ok ? `Concluída em ${dataBR(t.concluido_em)}`
                  : (t.data_prevista ? `Previsto: ${dataBR(t.data_prevista)}` : '');

  const notas = (ok && t.notas_cliente) ? `<div class="tarefa-notas">${escapeHtml(t.notas_cliente)}</div>` : '';

  let progresso = '';
  if (t.contador_alvo && t.contador_alvo > 0) {
    const atual = t.contador_atual || 0;
    const pct = Math.min(100, Math.round((atual / t.contador_alvo) * 100));
    progresso = `
      <div class="tarefa-progresso">
        <div class="tarefa-progresso-num"><strong>${atual}</strong> de ${t.contador_alvo}</div>
        <div class="tarefa-progresso-bar"><div class="tarefa-progresso-bar-fill" style="width:${pct}%"></div></div>
        <div class="tarefa-progresso-pct">${pct}% concluído</div>
      </div>
    `;
  }

  return `
    <div class="tarefa">
      ${iconHtml}
      <div class="tarefa-corpo">
        <div class="tarefa-titulo ${tituloCls}">${escapeHtml(t.titulo)}</div>
        ${t.descricao_cliente ? `<div class="tarefa-desc">${escapeHtml(t.descricao_cliente)}</div>` : ''}
        ${dataInfo ? `<div class="tarefa-data">${dataInfo}</div>` : ''}
        ${progresso}
        ${notas}
      </div>
    </div>
  `;
}

carregar();
</script>
