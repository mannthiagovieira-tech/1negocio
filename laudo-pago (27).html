<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Negócio · Laudo de Avaliação</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef5f0;--bg1:#ffffff;--bg2:#f4f9f5;--bg3:#e8f2eb;
  --em:#1a7a4a;--em-d:rgba(26,122,74,.08);--em-l:rgba(26,122,74,.22);
  --am:#92470a;--am-d:rgba(146,71,10,.08);--am-l:rgba(146,71,10,.22);
  --rd:#b91c1c;--rd-d:rgba(185,28,28,.08);--rd-l:rgba(185,28,28,.22);
  --pu:#6d28d9;--pu-d:rgba(109,40,217,.08);--pu-l:rgba(109,40,217,.22);
  --ink:#0d2b1e;--ink2:#1f4a32;--ink3:#2d6644;--ink4:#4a7c5c;
  --line:rgba(13,43,30,.08);--line2:rgba(13,43,30,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace}
#loading{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
#loading.hide{opacity:0;visibility:hidden;pointer-events:none}
.ld-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.02em;margin-bottom:28px}
.ld-logo em{color:var(--em);font-style:normal}
.ld-bar-wrap{width:200px;height:3px;background:var(--line2);border-radius:2px;overflow:hidden;margin-bottom:20px}
.ld-bar{height:100%;width:0%;background:var(--em);border-radius:2px;transition:width .6s ease}
.ld-msg{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink4);min-height:16px}
#wrap{opacity:0;transition:opacity .6s}
#wrap.show{opacity:1}
.page-break{page-break-before:always;break-before:page}
.doc{max-width:680px;margin:0 auto;padding-bottom:60px}
.capa{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);border-bottom:2px solid var(--line2);position:relative;overflow:hidden}
.capa-accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--em),transparent)}
.capa-top{display:flex;align-items:center;justify-content:space-between;padding:24px 32px;border-bottom:1px solid var(--line2)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.02em;color:var(--ink);display:flex;align-items:center;gap:2px}
.logo-1{color:var(--em)}
.capa-badge{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--am);background:var(--am-d);border:1px solid var(--am-l);padding:5px 12px}
.capa-body{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:72px 32px 40px}
.capa-logo-grande{margin-bottom:auto;padding-bottom:72px}
.capa-logo-grande-txt{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(56px,14vw,80px);letter-spacing:-.04em;line-height:.9}
.capa-tagline{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink4);margin-top:10px}
.capa-negocio-label{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink4);margin-bottom:12px}
.capa-nome{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(26px,6vw,36px);letter-spacing:-.03em;line-height:1.05;color:var(--ink);margin-bottom:10px}
.capa-setor{font-size:12px;color:var(--ink3);letter-spacing:.05em;display:flex;align-items:center;gap:8px;margin-bottom:28px}
.capa-setor::before{content:'';width:20px;height:1.5px;background:var(--em)}
.capa-meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line2);border:1px solid var(--line2)}
.capa-meta-item{background:var(--bg1);padding:14px 16px}
.capa-meta-l{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}
.capa-meta-v{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--ink)}
.capa-bottom{padding:18px 32px;border-top:1px solid var(--line2);display:flex;align-items:center;justify-content:space-between}
.capa-data{font-size:9px;letter-spacing:.1em;color:var(--ink4)}
.capa-conf{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--em);display:flex;align-items:center;gap:6px}
.capa-conf::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--em)}
.sumario{background:var(--bg1);border-bottom:1px solid var(--line2);padding:32px}
.sumario-title{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);margin-bottom:20px}
.sumario-item{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--line)}
.sumario-item:last-child{border:none}
.sumario-num{font-size:9px;letter-spacing:.1em;color:var(--em);width:24px;flex-shrink:0}
.sumario-nome{font-size:12px;color:var(--ink);flex:1}
.sumario-tag{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.sec{border-bottom:1px solid var(--line2)}
.sec-header{padding:28px 32px 0;display:flex;align-items:flex-start;gap:16px;margin-bottom:22px}
.sec-num{font-size:9px;letter-spacing:.12em;color:var(--em);flex-shrink:0;padding-top:3px}
.sec-label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.sec-title{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;color:var(--ink);line-height:1.2}
.sec-body{padding:0 32px 32px}
.txt{font-size:11px;color:var(--ink2);line-height:1.85;margin-bottom:12px}
.txt:last-child{margin-bottom:0}
.val-nota{font-size:11px;color:var(--ink2);line-height:1.7;padding:14px 16px;background:var(--bg2);border-left:3px solid var(--em);margin-top:10px}
.footnote{font-size:9px;color:var(--ink3);line-height:1.7;padding:12px 14px;background:var(--bg2);border-left:2px solid var(--line2);margin-top:12px}
.met-step{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.met-step:last-child{border:none}
.met-num{width:24px;height:24px;border-radius:50%;background:var(--em-d);border:1px solid var(--em-l);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--em);flex-shrink:0;font-weight:700;margin-top:2px}
.met-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--ink);margin-bottom:4px}
.met-desc{font-size:10px;color:var(--ink3);line-height:1.65}
.tbl{width:100%;border-collapse:collapse;margin-bottom:4px}
.tbl th{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);padding:9px 7px;text-align:right;border-bottom:1px solid var(--line2)}
.tbl th:first-child{text-align:left}
.tbl td{padding:9px 7px;border-bottom:1px solid var(--line);font-size:11px;text-align:right;color:var(--ink)}
.tbl td:first-child{text-align:left;color:var(--ink2)}
.tbl tr.sub td{background:var(--bg2);font-weight:700;color:var(--ink);border-bottom:1px solid var(--line2)}
.tbl tr.tot td{background:var(--em-d);font-weight:700;color:var(--em);border-bottom:2px solid var(--em-l)}
.tbl tr.sep td{padding:2px;border:none}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot.g{background:var(--em)}.dot.a{background:var(--am)}.dot.r{background:var(--rd)}
.eq-wrap{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;padding:22px 0 18px}
.eq-box{background:var(--bg2);border:1px solid var(--line2);padding:14px 16px;text-align:center;min-width:76px}
.eq-box.hl{background:var(--em-d);border-color:var(--em-l)}
.eq-label{font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}
.eq-val{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--ink)}
.eq-val.g{color:var(--em)}
.eq-op{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--ink4)}
.ise-hero{display:flex;align-items:center;gap:20px;padding:18px;background:var(--em-d);border:1px solid var(--em-l);margin-bottom:16px}
.ise-score{font-family:'Syne',sans-serif;font-weight:800;font-size:56px;color:var(--em);line-height:1;letter-spacing:-.03em}
.ise-class{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.ise-class-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--em)}
.ise-desc{font-size:10px;color:var(--ink3);margin-top:5px;line-height:1.55;max-width:280px}
.pilar{margin-bottom:10px}
.pilar-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.pilar-nome{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);width:110px;flex-shrink:0}
.pilar-bar{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.pilar-fill{height:100%;border-radius:3px}
.pilar-fill.g{background:var(--em)}.pilar-fill.a{background:var(--am)}.pilar-fill.r{background:var(--rd)}
.pilar-val{font-size:10px;width:36px;text-align:right;flex-shrink:0;font-weight:500}
.pilar-val.g{color:var(--em)}.pilar-val.a{color:var(--am)}.pilar-val.r{color:var(--rd)}
.pilar-desc{font-size:9px;color:var(--ink4);line-height:1.5;padding-left:120px;margin-bottom:4px}
.ind-card{background:var(--bg1);border:1px solid var(--line2);padding:13px 15px;margin-bottom:9px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.ind-nome{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.ind-desc{font-size:10px;color:var(--ink3);line-height:1.55}
.ind-val{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;text-align:right;white-space:nowrap}
.ind-val.g{color:var(--em)}.ind-val.a{color:var(--am)}.ind-val.r{color:var(--rd)}
.ind-status{font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;display:inline-block;margin-top:3px;text-align:right}
.ind-status.g{background:var(--em-d);color:var(--em)}.ind-status.a{background:var(--am-d);color:var(--am)}.ind-status.r{background:var(--rd-d);color:var(--rd)}
.bench-item{margin-bottom:16px}
.bench-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.bench-nome{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.bench-vals{display:flex;gap:12px;align-items:center}
.bench-emp{font-size:11px;font-weight:700}
.bench-emp.g{color:var(--em)}.bench-emp.a{color:var(--am)}.bench-emp.r{color:var(--rd)}
.bench-ref{font-size:9px;color:var(--ink4)}
.chip{display:inline-block;font-size:8px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:10px;font-weight:500;margin-left:6px}
.chip.g{background:var(--em-d);color:var(--em)}.chip.a{background:var(--am-d);color:var(--am)}.chip.r{background:var(--rd-d);color:var(--rd)}
.bench-bar{height:5px;background:var(--bg3);border-radius:3px;position:relative;overflow:hidden}
.bench-bar-ref{position:absolute;left:0;top:0;height:100%;background:var(--line2);border-radius:3px}
.bench-bar-val{position:absolute;left:0;top:0;height:100%;border-radius:3px}
.bench-bar-val.g{background:var(--em)}.bench-bar-val.a{background:var(--am)}.bench-bar-val.r{background:var(--rd)}
.atr-hero{background:var(--bg1);border:1px solid var(--line2);padding:18px;margin-bottom:16px}
.atr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.atr-score{font-family:'Syne',sans-serif;font-weight:800;font-size:40px;color:var(--em);line-height:1}
.atr-denom{font-size:14px;color:var(--ink3)}
.atr-badge{font-size:8px;letter-spacing:.1em;text-transform:uppercase;background:var(--em);color:#fff;padding:5px 12px;font-weight:700}
.atr-bar-wrap{height:4px;background:var(--line2);margin-bottom:14px;overflow:hidden}
.atr-bar{height:100%;background:var(--em)}
.atr-pilar{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.atr-pilar:last-child{border:none}
.atr-pilar-nome{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3);width:110px;flex-shrink:0}
.atr-pilar-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.atr-pilar-fill{height:100%;border-radius:2px;background:var(--em)}
.atr-pilar-val{font-size:10px;color:var(--em);width:32px;text-align:right;flex-shrink:0}
.atr-just{font-size:10px;color:var(--ink3);line-height:1.65;margin-top:12px;padding:12px 14px;background:var(--bg2)}
.op-card{background:var(--bg1);border:1px solid var(--line2);border-left:3px solid var(--em);padding:15px 17px;margin-bottom:9px}
.op-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px}
.op-num{width:20px;height:20px;border-radius:50%;background:var(--em-d);border:1px solid var(--em-l);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--em);font-weight:700;flex-shrink:0}
.op-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--ink)}
.op-desc{font-size:10px;color:var(--ink3);line-height:1.6;margin-bottom:8px}
.op-ganho{display:inline-block;font-size:9px;letter-spacing:.06em;color:var(--em);background:var(--em-d);border:1px solid var(--em-l);padding:3px 10px}
.diag-bloco{margin-bottom:18px}
.diag-bloco-title{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--em);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.diag-bloco-title::after{content:'';flex:1;height:1px;background:var(--em-l)}
.diag-row{display:flex;align-items:baseline;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)}
.diag-row:last-child{border:none}
.diag-label{font-size:10px;color:var(--ink3)}
.diag-val{font-size:10px;color:var(--ink);text-align:right;font-weight:500}
.parecer-titulo{margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--line2)}
.parecer-eyebrow{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink3);margin-bottom:9px}
.parecer-h{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--ink);letter-spacing:-.02em;line-height:1.2}
.parecer-linha{width:32px;height:2px;background:var(--em);margin-top:13px}
.parecer-texto p{font-size:11px;color:var(--ink2);line-height:1.85;margin-bottom:14px}
.parecer-texto p:last-child{margin-bottom:0}
.onep-wrap{border-bottom:1px solid var(--line2)}
.onep-hero{background:linear-gradient(135deg,var(--em-d),var(--bg1));border-bottom:1px solid var(--em-l);padding:24px 32px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.onep-hero-eyebrow{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--em);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.onep-hero-eyebrow::before{content:'';width:18px;height:1.5px;background:var(--em)}
.onep-hero-nome{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;color:var(--ink);letter-spacing:-.03em;line-height:1.1;margin-bottom:5px}
.onep-hero-setor{font-size:10px;color:var(--ink3)}
.onep-hero-right{text-align:right;flex-shrink:0}
.onep-valor-label{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}
.onep-valor{font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:var(--em);letter-spacing:-.03em;line-height:1}
.onep-valor-tipo{font-size:9px;color:var(--ink4);margin-top:4px}
.onep-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line2)}
.onep-kpi{background:var(--bg);padding:14px 16px}
.onep-kpi-l{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}
.onep-kpi-v{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--ink);line-height:1}
.onep-kpi-v.g{color:var(--em)}.onep-kpi-v.a{color:var(--am)}
.onep-kpi-sub{font-size:9px;color:var(--ink4);margin-top:3px}
.onep-body{padding:20px 32px;display:flex;flex-direction:column;gap:16px}
.onep-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.onep-bloco{background:var(--bg2);border:1px solid var(--line2);padding:16px}
.onep-bloco-title{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--em);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.onep-bloco-title::after{content:'';flex:1;height:1px;background:var(--em-l)}
.onep-item{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--line)}
.onep-item:last-child{border:none}
.onep-item-l{font-size:10px;color:var(--ink3)}
.onep-item-v{font-size:10px;color:var(--ink);font-weight:600;text-align:right}
.onep-item-v.g{color:var(--em)}.onep-item-v.a{color:var(--am)}
.onep-formula{background:var(--em-d);border:1px solid var(--em-l);padding:14px 16px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.onep-fbox{background:var(--bg1);border:1px solid var(--line2);padding:10px 14px;text-align:center;min-width:64px}
.onep-fbox.hl{background:var(--em);border-color:var(--em)}
.onep-fbox-label{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:4px}
.onep-fbox.hl .onep-fbox-label{color:rgba(255,255,255,.7)}
.onep-fbox-val{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--ink)}
.onep-fbox.hl .onep-fbox-val{color:#fff}
.onep-fop{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--ink4)}
.onep-ise-bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.onep-ise-nome{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);width:80px;flex-shrink:0}
.onep-ise-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.onep-ise-fill{height:100%;border-radius:3px}
.onep-ise-val{font-size:9px;width:30px;text-align:right;flex-shrink:0;font-weight:600}
.onep-footer{border-top:1px solid var(--line2);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.onep-footer-l{font-size:9px;color:var(--ink4);letter-spacing:.06em}
.onep-footer-r{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--em)}
.icd-wrap{background:var(--bg1);border-bottom:1px solid var(--line2);padding:20px 28px}
.icd-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.icd-title{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4)}
.icd-score{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--em);letter-spacing:-.02em}
.icd-bar-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:12px}
.icd-bar-fill{height:100%;border-radius:3px;background:var(--em)}
.icd-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.icd-col-title{font-size:7px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.icd-col-title::after{content:'';flex:1;height:1px}
.icd-col-title.g{color:var(--em)}.icd-col-title.g::after{background:var(--em-l)}
.icd-col-title.a{color:var(--am)}.icd-col-title.a::after{background:var(--am-l)}
.icd-item{font-size:9px;color:var(--ink3);padding:4px 0;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px}
.icd-item:last-child{border:none}

function calcISE(fat,ro,recorrencia,concentracao,processos,dependencia,caixa,passivo_juridico,emprest,totAtiv,marca_inpi,D){
  // ═══════════════════════════════════════════════════════════════
  // ISE — 10 PILARES PONDERADOS (alinhado com laudo-completo v19)
  // Conforme Repositório de Regras 1Negócio
  // ═══════════════════════════════════════════════════════════════
  
  const roAnual = ro * 12;
  const pl = totAtiv - emprest;
  const parcelasMensais = D?.parcelas_mensais || 0;
  
  // P1 — Dependência dos Sócios (18%) — INVERTIDO: menor dependência = melhor
  const depNota = dependencia === 'total' ? 9 : dependencia === 'parcial' ? 5 : 2;
  const p1 = 10 - depNota; // Inverte: total(9)→1, nenhuma(2)→8
  
  // P2 — Comercial/Vendas (24%)
  const p2 = D?.comercial_vendas || 5;
  
  // P3 — Financeiro (20%)
  const margemOp = fat > 0 ? (ro / fat * 100) : 0;
  const p3 = margemOp >= 25 ? 9 : margemOp >= 15 ? 7 : margemOp >= 8 ? 5 : 3;
  
  // P4 — Gestão/Processos (20%)
  const p4 = processos === 'documentados' ? 8 : processos === 'parcial' ? 5 : 2;
  
  // P5 — Marca (7%)
  const p5 = marca_inpi === 'sim' ? 8 : marca_inpi === 'processo' ? 6 : 4;
  
  // P6 — Balanço (8%) — CALCULADO AUTOMATICAMENTE
  let p6;
  if (pl > roAnual * 2) p6 = 10;
  else if (pl > roAnual) p6 = 8;
  else if (pl > 0) p6 = 6;
  else if (pl > -roAnual) p6 = 4;
  else if (pl > -roAnual * 2) p6 = 2;
  else p6 = 0;
  
  // P7 — Dívida (5%) — CALCULADO AUTOMATICAMENTE
  let p7;
  const dividaPct = roAnual > 0 ? (parcelasMensais * 12 / roAnual * 100) : 0;
  if (parcelasMensais === 0) p7 = 10;
  else if (dividaPct < 10) p7 = 9;
  else if (dividaPct < 20) p7 = 7;
  else if (dividaPct < 35) p7 = 5;
  else if (dividaPct < 50) p7 = 3;
  else p7 = 1;
  
  // P8 — Risco Jurídico (5%) — INVERTIDO
  const riscoNota = D?.risco_juridico || (passivo_juridico ? 7 : 2);
  const p8 = 10 - riscoNota;
  
  // P9 — Concentração de Cliente (10%)
  let p9;
  if (concentracao <= 5) p9 = 10;
  else if (concentracao <= 15) p9 = 8;
  else if (concentracao <= 25) p9 = 6;
  else if (concentracao <= 40) p9 = 4;
  else if (concentracao <= 60) p9 = 2;
  else p9 = 0;
  
  // P10 — Escalabilidade (10%)
  const p10 = Math.min(10, Math.round(recorrencia / 10));
  
  // Cálculo ponderado
  const total = Math.round(
    p1 * 0.18 +  // Dependência sócios
    p2 * 0.20 +  // Comercial
    p3 * 0.15 +  // Financeiro (resultado)
    p4 * 0.15 +  // Gestão
    p5 * 0.05 +  // Marca
    p6 * 0.08 +  // Balanço
    p7 * 0.05 +  // Dívida
    p8 * 0.05 +  // Risco jurídico
    p9 * 0.05 +  // Concentração
    p10 * 0.04   // Escalabilidade
  ) * 10;
  
  // Trava: 2+ pilares críticos (< 3) → limita a 40
  const criticos = [p1, p2, p3, p4, p6].filter(v => v < 3).length;
  const finalTotal = criticos >= 2 ? Math.min(total, 40) : Math.min(100, Math.max(0, total));
  
  return {
    total: finalTotal,
    dep: p1, com: p2, fin: p3, ges: p4, mar: p5,
    bal: p6, div: p7, ris: p8, conc: p9, esc: p10
  };
}

function calcFator(ro, ise, b, D) {
  // ═══════════════════════════════════════════════════════════════
  // FATOR 1N — Tabela definitiva conforme spec 07/04/2026
  // Arquitetura: Setor define base → T04b ajusta → ISE multiplica
  // ═══════════════════════════════════════════════════════════════

  // 1. MÚLTIPLO BASE por setor (T03)
  const MULTIPLO_SETOR = {
    'alimentacao':       1.50,
    'varejo':            1.50,
    'saude':             2.00,
    'beleza_estetica':   1.75,
    'educacao':          2.50,
    'servicos_locais':   1.75,
    'servicos_empresas': 2.00,
    'bem_estar':         2.00,
    'hospedagem':        1.75,
    'industria':         1.75,
    'construcao':        1.50,
    'outro':             1.75
  };

  // 2. AJUSTADOR por modelo_atuacao_multi (T04b) — array, pega o maior ajuste
  const AJUSTE_MODELO = {
    'presta_servico':  0,
    'produz_revende':  -0.25,
    'fabricacao':      -0.25,
    'revenda':         -0.25,
    'distribuicao':    -0.25,
    'vende_governo':   +0.50,
    'saas':            +1.00,
    'assinatura':      +0.50
  };

  // 3. FATOR ISE — multiplica o resultado final
  function fISE(i) {
    if (i >= 85) return 1.30;
    if (i >= 70) return 1.15;
    if (i >= 50) return 1.00;
    if (i >= 35) return 0.85;
    return 0.70;
  }

  // Ler setor — código exato do diagnóstico
  const setor = (D?.setor || '').toLowerCase();

  // Múltiplo base pelo setor
  const mulBase = MULTIPLO_SETOR[setor] || 1.75;

  // Ajuste pelo modelo_atuacao_multi (array do T04b)
  // Lê do dados_json via D._raw ou D.modelo_atuacao_multi
  const modelos = D?.modelo_atuacao_multi || D?._raw?.modelo_atuacao_multi || [];
  let ajuste = 0;
  if (Array.isArray(modelos) && modelos.length > 0) {
    // Soma todos os ajustes dos modelos selecionados (multi-select)
    modelos.forEach(m => {
      ajuste += (AJUSTE_MODELO[m] || 0);
    });
    // Limita o ajuste total entre -0.25 e +1.0 para evitar distorções
    ajuste = Math.max(-0.25, Math.min(1.0, ajuste));
  }

  const multiplo = (mulBase + ajuste) * fISE(ise);
  return Math.max(1.5, Math.min(6, multiplo));
}


function calcAtr(ise, margemOp, recorrencia, D) {
  // ═══════════════════════════════════════════════════════════════
  // ÍNDICE DE ATRATIVIDADE — 6 PILARES
  // Conforme laudo-completo v19
  // ═══════════════════════════════════════════════════════════════
  
  const SETOR_SCORE = {
    'tecnologia': 9, 'saas': 9, 'saude': 8, 'educacao': 8,
    'servicos_b2b': 7, 'alimentacao': 6, 'varejo': 4,
    'industria': 5, 'logistica': 4, 'construcao': 3
  };
  
  function mapSetorScore(setor) {
    const s = (setor || '').toLowerCase();
    if (s === 'saude') return 8;
    if (s === 'educacao') return 8;
    if (s === 'servicos_empresas') return 7;
    if (s === 'beleza_estetica') return 7;
    if (s === 'bem_estar') return 6;
    if (s === 'alimentacao') return 6;
    if (s === 'hospedagem') return 5;
    if (s === 'industria') return 5;
    if (s === 'varejo') return 4;
    if (s === 'servicos_locais') return 4;
    if (s === 'construcao') return 3;
    if (s === 'outro') return 4;
    if (s.includes('saas') || s.includes('software') || s.includes('tech')) return 9;
    if (s.includes('saude') || s.includes('clinica')) return 8;
    if (s.includes('educa') || s.includes('escola')) return 8;
    if (s.includes('b2b') || s.includes('consultoria')) return 7;
    if (s.includes('beleza') || s.includes('estetica') || s.includes('salao')) return 7;
    if (s.includes('academia') || s.includes('fitness')) return 6;
    if (s.includes('alimenta') || s.includes('restaurante')) return 6;
    if (s.includes('hospedagem') || s.includes('hotel')) return 5;
    if (s.includes('industria') || s.includes('fabrica')) return 5;
    if (s.includes('varejo') || s.includes('comercio')) return 4;
    if (s.includes('logistica') || s.includes('transporte')) return 4;
    if (s.includes('construcao') || s.includes('obra')) return 3;
    return 5;
  }  
  const setor = D?.setor || '';
  const crescimento = D?.historico_crescimento || 5;
  const margemBench = 15; // benchmark médio
  
  // P1: ISE / 10 (17%)
  const p1 = (ise?.total || 50) / 10;
  
  // P2: Score setor (17%)
  const p2 = mapSetorScore(setor);
  
  // P3: Recorrência / 10 (17%)
  const p3 = Math.min(10, (recorrencia || 0) / 10);
  
  // P4: Independência (17%) — já invertido no ISE
  const p4 = ise?.dep || 5;
  
  // P5: Crescimento (17%)
  const p5 = crescimento >= 8 ? 10 : crescimento >= 6 ? 7 : crescimento >= 4 ? 4 : 2;
  
  // P6: Margem vs Benchmark (15%)
  const p6 = Math.min(10, ((margemOp || 0) / margemBench) * 5);
  
  const score = Math.round(
    (p1 * 0.17 + p2 * 0.17 + p3 * 0.17 + p4 * 0.17 + p5 * 0.17 + p6 * 0.15) * 10
  ) / 10;
  
  // esc = escalabilidade (era cre/crescimento, mantido para compatibilidade com HTML)
  return { score: score || 5, sol: p1, set: p2, rec: p3, ges: p4, cre: p5, esc: p5, mar: p6 };
}

async function render(raw){
  const d=raw.dados_json||{};

  // ═══════════════════════════════════════════════════════════════
  // LEITURA DOS DADOS JÁ CALCULADOS PELO DIAGNÓSTICO
  // O laudo-pago apenas LEIA os valores — não recalcula
  // Isso garante consistência entre diagnóstico e laudo
  // ═══════════════════════════════════════════════════════════════
  
  const fat=n(raw.fat_mensal||d.fat_mensal);
  const b=getBench(raw.setor);
  
  // Impostos: LER do diagnóstico (Motor Tributário já calculou)
  const impostos = n(d.impostos_mensal) || n(d.impostos) || fat * 0.10;
  const aliquotaImposto = n(d.aliquota_imposto) || (fat > 0 ? (impostos / fat * 100) : 10);
  
  // Taxas e comissões: LER valores absolutos do diagnóstico
  // O diagnóstico salva: d.custo_cartoes (taxas), d.custo_comissoes (comissões)
  const taxas = n(d.custo_cartoes) || n(d.custo_taxas_recebimento) || n(d.custo_recebimento) || fat * (n(d.taxa_proc || d.pct_cartoes) / 100);
  const comissoes = n(d.custo_comissoes) || fat * (n(d.pct_comissao || d.taxa_comissao || d.comissao_pct) / 100);
  const mkt=n(d.mkt_valor||raw.mkt_mensal);
  
  // CMV
  const cmv=fat*(n(d.cmv_pct||raw.cmv_pct)/100);
  
  // Folha: LER do diagnóstico (encargos já calculados corretamente)
  // IMPORTANTE: Usar folha_total que inclui encargos e provisões
  const folhaBruta = n(d.clt_folha || raw.custo_pessoal);
  const encargos = n(d.clt_encargos);
  const provisoes = n(d.clt_provisoes);
  const folha = n(d.folha_total) || (folhaBruta + encargos + provisoes);
  const pjCusto = n(d.pj_custo || raw.pj_custo);
  
  // Custos fixos: LER separadamente para evitar duplicação
  const aluguel=n(d.aluguel||raw.aluguel);
  const terceirizados=n(d.terceirizados||d.custo_terceiros);
  const facilities=n(d.facilities||d.custo_utilities);
  const outrosCf=n(d.outros_custos_fixos||raw.outros_custos_fixos);
  
  // Resultado Operacional: PREFERIR valor já calculado pelo diagnóstico
  let ro, recLiq, lb;
  
  // Calcular receita líquida e lucro bruto (sempre necessário para DRE)
  recLiq = fat - impostos - taxas - comissoes;
  lb = recLiq - cmv;
  
  // cf = total de custos fixos (para a tabela DRE)
  const cf = terceirizados + facilities + outrosCf;
  
  // Debug: mostrar valores lidos
  console.log('LAUDO-PAGO DEBUG:', {
    fat, impostos, taxas, comissoes, recLiq, cmv, lb,
    folhaBruta, encargos, provisoes, folha, pjCusto,
    aluguel, terceirizados, facilities, mkt, outrosCf,
    'ro_mensal no d': d.ro_mensal,
    'resultado_op no d': d.resultado_op,
    'custo_cartoes no d': d.custo_cartoes,
    'custo_comissoes no d': d.custo_comissoes
  });
  
  // RO: SEMPRE RECALCULAR usando a mesma fórmula do laudo-completo
  // Isso garante que laudo-pago e laudo-completo mostrem valores idênticos
  ro = lb - folha - pjCusto - aluguel - terceirizados - facilities - outrosCf - mkt;
  console.log('RO: CALCULADO (igual laudo-completo) =', ro);
  
  const prol=n(d.prolabore||raw.prolabore);
  const parc=n(d.parcelas_mensais||raw.parcelas_mensais);
  const rf=ro-prol-parc;
  const margem=pct(rf,fat);

  // Balanço patrimonial
  const caixa=n(d.at_caixa||raw.at_caixa);
  const receber=n(d.at_cr||raw.at_cr);
  const estoque=n(d.at_estoque||raw.at_estoque);
  const equip=n(d.at_equip||raw.at_equip);
  const imovel=n(d.at_imovel||raw.at_imovel);
  const totAtiv=caixa+receber+estoque+equip+imovel;
  const forn=n(d.fornec_a_pagar||raw.fornec_a_pagar);
  const emprest=n(d.saldo_devedor||raw.saldo_devedor);
  const totPass=forn+emprest;
  const pl=totAtiv-totPass;

  const recorrencia=n(d.recorrencia_pct||d.pct_recorrencia||raw.recorrencia_pct);
  const concentracao=n(d.concentracao_pct||d.maior_cliente_pct||raw.maior_cliente_pct);
  
  // Objeto D para passar às funções de cálculo (compatível com laudo-completo v19)
  const D = {
    setor: raw.setor || d.setor,

ente para validação de sazonalidade e sustentabilidade do modelo.'}\n\nO Fator 1N de ${fator.toFixed(2)}x foi determinado com base no múltiplo setorial de ${b.mulBase}x (referência ${b.mulRange} para ${setorLbl}) e ajustado pelo ISE de ${ise.total}/100. O ajuste de ${(fator-b.mulBase)>=0?'+':''} ${(fator-b.mulBase).toFixed(2)}x em relação ao múltiplo base reflete a solidez operacional relativa do negócio. Aplicado ao resultado operacional anual de ${brlF(ro*12)}, resulta em Valor de Operação de ${brlF(valorOp)}, ao qual se soma o Patrimônio Líquido de ${pl<0?"R\$ 0":brlF(Math.max(0,pl))}, chegando ao Valor de Venda de ${brlF(valorVenda)}. O potencial de valorização é real: a implementação das 10 oportunidades identificadas pode ampliar o resultado operacional mensal em ${brl(totalOps)}, elevando substancialmente o valor de transação em uma segunda rodada de captação.`;

<div class="sec page-break">

  <div class="sec-body">
    <div class="val-nota" style="margin-bottom:20px">A avaliação da 1Negócio combina três abordagens complementares: múltiplos de mercado setoriais, análise de resultado operacional e solidez operacional (ISE). O resultado é um valor de transação ajustado à realidade de M&A de PMEs brasileiras.</div>
    <div class="met-step"><div class="met-num">1</div><div><div class="met-title">Resultado Operacional Ajustado</div><div class="met-desc">Resultado operacional normalizado — remove pró-labore acima do mercado, despesas não recorrentes e provisões excessivas. Representa a capacidade real de geração de caixa do negócio.</div></div></div>
    <div class="met-step"><div class="met-num">2</div><div><div class="met-title">Múltiplo Base Setorial</div><div class="met-desc">Referência de transações comparáveis no Brasil para o setor. Reflete o risco, crescimento esperado e liquidez típica de cada segmento de mercado.</div></div></div>
    <div class="met-step"><div class="met-num">3</div><div><div class="met-title">Fator ISE — Ajuste de Solidez</div><div class="met-desc">O ISE avalia 8 dimensões operacionais do negócio. Empresas mais sólidas recebem múltiplo maior e condições de venda mais favoráveis na negociação.</div></div></div>
    <div class="met-step"><div class="met-num">4</div><div><div class="met-title">Fator 1N = Múltiplo Base x Ajuste ISE</div><div class="met-desc">Multiplicador proprietário aplicado ao resultado operacional anual. Resultado: o Valor de Operação — quanto vale o negócio com base em sua capacidade produtiva futura.</div></div></div>
    <div class="met-step"><div class="met-num">5</div><div><div class="met-title">Valor de Venda = Valor de Operação + Patrimônio Líquido</div><div class="met-desc">O valor final inclui os ativos tangíveis líquidos das dívidas: estoque, equipamentos, imóveis, carteira de contratos. É o valor "porteira fechada" apresentado ao comprador.</div></div></div>
    <div class="footnote">Esta avaliação é baseada nos dados fornecidos pelo proprietário e em benchmarks setoriais da 1Negócio. Não substitui due diligence completa.</div>
  </div>
</div>

  </div>

</div>

<div class="icd-wrap page-break">
  <div class="icd-header"><div class="icd-title">ICD · Índice de Confiabilidade dos Dados</div><div class="icd-score">${icdPct}%</div></div>
  <div class="icd-bar-track"><div class="icd-bar-fill" style="width:${icdPct}%"></div></div>
  <div class="icd-grid">
    <div><div class="icd-col-title g">Informado pelo proprietário</div>${[d.fat_mensal?'Faturamento mensal':null,d.regime?'Regime tributário':null,(d.pct_comissao||d.taxa_comissao)?'Comissões de venda':null,d.mkt_valor?'Marketing mensal':null,d.prolabore?'Pró-labore dos sócios':null,(d.cli_1m||d.clientes_ativos)?'Clientes ativos':null,(d.recorrencia_pct||d.pct_recorrencia)?'Recorrência de receita':null,d.processos?'Processos e gestão':null,d.saldo_devedor!==undefined?'Situação de dívidas':null].filter(Boolean).map(i=>`<div class="icd-item"><div class="icd-item-dot" style="background:var(--em)"></div>${i}</div>`).join('')}</div>
    <div><div class="icd-col-title a">Estimado por benchmark</div>${[!d.at_caixa?'Saldo de caixa':null,!d.at_cr?'Contas a receber':null].filter(Boolean).map(i=>`<div class="icd-item"><div class="icd-item-dot" style="background:var(--am)"></div>${i}</div>`).join('')}</div>
  </div>
  <div class="icd-nota">${icdPct}% dos dados foram declarados diretamente pelo proprietário. Os restantes foram estimados com base em benchmarks do setor de ${setorLbl}. Quanto maior o ICD, mais precisa e defensável é a avaliação em uma due diligence.</div>

    <div class="fech-texto">Este laudo representa a avaliação técnica independente da 1Negócio sobre o negócio avaliado. Os dados aqui contidos são de uso exclusivo do proprietário e não devem ser compartilhados sem autorização expressa da plataforma.</div>
    <div class="fech-ass"><div class="fech-ass-logo"><em>1</em>NEGÓCIO</div><div class="fech-ass-sep"></div><div class="fech-ass-txt">Plataforma de compra e venda de empresas<br>1negocio.com.br · Avaliação independente</div></div>
  </div>
  <div class="fech-rodape"><div class="fech-rod-l">Documento confidencial · ${nomeN} · ${dataAv}</div><div class="fech-rod-r">1negocio.com.br</div></div>
</div>`;

  document.getElementById('doc').innerHTML=html;

  // ── SALVAR calc_json para laudo-completo usar como espelho ──
  window._calcJson = {

    total_ops: totalOps,

    bench: b,

    icd_pct: icdPct,

    data_avaliacao: hoje()

  hideLoading();

async function saveCache(negocioId, html, calcJson){
  if(!negocioId||negocioId==='DEMO')return;
  try{
    const payload = {html:html, atualizado_em:new Date().toISOString()};
    if(calcJson) payload.calc_json = calcJson;
    // Atualiza laudos_completos onde slug = negocioId
    const r = await fetch(SB_URL+'/rest/v1/laudos_completos?slug=eq.'+negocioId,{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(payload)
    });
    // Se não existir ainda, cria
    if(r.status===404||r.status===0){
      await fetch(SB_URL+'/rest/v1/laudos_completos',{
        method:'POST',
        headers:{'apikey':SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({slug:negocioId,...payload,pago:false})
      });
    }
  }catch(e){console.error('saveCache:',e);}
}

async function init(){
  animLD();
  const p=new URLSearchParams(window.location.search);
  const id=p.get('id'),codigo=p.get('c')||p.get('slug');
  const h={'apikey':SB_KEY};
  let raw=null,negocioId=null;

  // 1. Busca dados do negócio
  if(id){try{const r=await fetch(SB_URL+'/rest/v1/negocios?id=eq.'+id+'&select=*',{headers:h});const data=await r.json();if(data&&data.length>0){raw=data[0];negocioId=raw.id;}}catch(e){console.error(e);}}
  if(!raw&&codigo){try{const r=await fetch(SB_URL+'/rest/v1/negocios?codigo_diagnostico=eq.'+codigo+'&select=*',{headers:h});const data=await r.json();if(data&&data.length>0){raw=data[0];negocioId=raw.id;}}catch(e){console.error(e);}}

  // 2. Verifica se já tem laudo cacheado em laudos_completos — se tiver, SEMPRE serve, nunca regenera
  if(negocioId){
    try{
      const r=await fetch(SB_URL+'/rest/v1/laudos_completos?slug=eq.'+negocioId+'&select=html,pago',{headers:h});
      const data=await r.json();
      if(data&&data.length>0&&data[0].html){
        document.getElementById('ld-msg').textContent='Carregando laudo...';
        document.getElementById('doc').innerHTML=data[0].html;
        hideLoading();
        return;
      }
    }catch(e){console.error('cache check:',e);}
  }

  if(!raw){raw={id:'DEMO',nome:'Restaurante Sabor & Arte',setor:'Alimentacao',cidade:'Florianópolis',estado:'SC',anos_existencia:8,regime_tributario:'simples',fat_mensal:120000,cmv_pct:38,prolabore:15000,parcelas_mensais:3500,saldo_devedor:45000,custo_pessoal:28000,aluguel:8500,at_caixa:35000,at_cr:25000,at_estoque:45000,at_equip:95000,at_imovel:0,fornec_a_pagar:18000,clt_qtd:8,pj_qtd:2,codigo_diagnostico:'DEMO',dados_json:{recorrencia_pct:45,concentracao_pct:12,processos:'parcial',dependencia:'parcial',gestor_autonomo:'nao',mkt_valor:12000,cli_1m:180,pct_comissao:3,taxa_proc:2.5}};}

  // 3. Gera o laudo
  await render(raw);

  // 4. Salva HTML gerado para futuras visualizações
  const htmlGerado=document.getElementById('doc').innerHTML;
  await saveCache(negocioId||raw.id, htmlGerado, window._calcJson||null);
}
window.onload=init;
</script>
<div id="wrap"><div class="doc" id="doc"></div></div>
